<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>دستیار هوشمند جزوهٔ گزارش‌نویسی</title>
<meta name="description" content="دستیار پرسش و پاسخ کاملاً آفلاین و کلاینت‌ساید، صرفاً بر پایهٔ متن جزوهٔ مستندسازی و گزارش‌نویسی." />
<style>
  :root{
    --bg:#05060f;
    --bg-2:#0a0d1f;
    --panel:rgba(255,255,255,0.05);
    --panel-2:rgba(255,255,255,0.08);
    --border:rgba(0,229,255,0.18);
    --border-hot:rgba(255,0,229,0.25);
    --text:#e6f1ff;
    --muted:#8b98b8;
    --neon:#00e5ff;
    --neon-2:#7c5cff;
    --magenta:#ff00e5;
    --lime:#b6ff3d;
    --danger:#ff5577;
  }
  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    font-family: Vazirmatn, Tahoma, "Segoe UI", "Iran Sans", "Tahoma", sans-serif;
    color:var(--text);
    background:
      radial-gradient(1200px 700px at 85% -10%, rgba(124,92,255,0.18), transparent 60%),
      radial-gradient(900px 600px at -10% 20%, rgba(0,229,255,0.15), transparent 60%),
      radial-gradient(700px 500px at 50% 110%, rgba(255,0,229,0.12), transparent 60%),
      var(--bg);
    background-attachment: fixed;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  body::before{
    content:"";
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
    background-size: 42px 42px;
    mask-image: radial-gradient(ellipse at center, black 40%, transparent 85%);
    pointer-events:none; z-index:0;
  }
  .app{
    position:relative; z-index:1;
    display:grid;
    grid-template-rows:auto 1fr auto;
    height:100dvh;
    max-width:1100px;
    margin:0 auto;
    padding:16px;
    gap:14px;
  }
  header.top{
    display:flex; align-items:center; gap:14px;
    padding:14px 18px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    box-shadow: 0 0 0 1px rgba(0,229,255,0.05) inset, 0 10px 40px rgba(0,229,255,0.08);
  }
  .logo{
    width:42px; height:42px; border-radius:12px;
    background:
      conic-gradient(from 210deg, var(--neon), var(--neon-2), var(--magenta), var(--neon));
    box-shadow: 0 0 24px rgba(0,229,255,0.5), inset 0 0 12px rgba(255,255,255,0.4);
    display:grid; place-items:center;
    color:#00121a; font-weight:900; font-size:20px;
  }
  .titles h1{
    margin:0; font-size:16px; letter-spacing:.2px;
    background:linear-gradient(90deg,#fff,#9be7ff 40%,#ffb6f5);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .titles p{margin:2px 0 0; font-size:12px; color:var(--muted)}
  .top .actions{margin-inline-start:auto; display:flex; gap:8px; flex-wrap:wrap}
  .btn{
    appearance:none; border:1px solid var(--border);
    background:var(--panel-2); color:var(--text);
    padding:8px 12px; border-radius:10px; cursor:pointer;
    font-family:inherit; font-size:12px;
    transition:.15s transform,.15s box-shadow,.2s background;
    display:inline-flex; align-items:center; gap:6px;
  }
  .btn:hover{transform:translateY(-1px); box-shadow:0 0 18px rgba(0,229,255,0.28)}
  .btn.primary{
    border-color:transparent;
    background:linear-gradient(135deg, var(--neon), var(--neon-2));
    color:#001019; font-weight:800;
    box-shadow:0 0 22px rgba(0,229,255,0.35);
  }
  .btn.ghost{background:transparent}
  .chat{
    position:relative;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    overflow:hidden;
    display:flex; flex-direction:column;
  }
  .messages{
    flex:1; overflow-y:auto; padding:18px;
    scrollbar-width:thin; scrollbar-color: rgba(0,229,255,0.4) transparent;
  }
  .messages::-webkit-scrollbar{width:8px}
  .messages::-webkit-scrollbar-thumb{background:rgba(0,229,255,0.3); border-radius:8px}
  .msg{display:flex; margin-bottom:14px; animation:pop .25s ease}
  @keyframes pop{from{opacity:0; transform:translateY(6px)} to{opacity:1; transform:none}}
  .msg .bubble{
    max-width:82%;
    padding:12px 14px; border-radius:14px;
    line-height:1.85; font-size:14.5px;
    white-space:pre-wrap; word-wrap:break-word;
  }
  .msg.user{justify-content:flex-start}
  .msg.user .bubble{
    background:linear-gradient(135deg, rgba(0,229,255,0.18), rgba(124,92,255,0.18));
    border:1px solid rgba(0,229,255,0.35);
    color:#eafcff;
    box-shadow: 0 0 14px rgba(0,229,255,0.15);
  }
  .msg.bot{justify-content:flex-end}
  .msg.bot .bubble{
    background:rgba(15,20,40,0.55);
    border:1px solid rgba(255,255,255,0.08);
    color:var(--text);
    position:relative;
  }
  .msg.bot .meta{
    margin-top:8px; padding-top:8px;
    border-top:1px dashed rgba(255,255,255,0.08);
    display:flex; align-items:center; gap:8px;
    font-size:11px; color:var(--muted);
  }
  .msg.bot .copy{
    margin-inline-start:auto;
    background:transparent; border:1px solid var(--border);
    color:var(--neon); font-size:11px; padding:4px 8px;
    border-radius:8px; cursor:pointer; font-family:inherit;
  }
  .msg.bot .copy:hover{background:rgba(0,229,255,0.08)}
  .msg.bot.notfound .bubble{
    border-color:rgba(255,85,119,0.4);
    background:rgba(60,10,25,0.4);
  }
  .empty{
    height:100%; display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center; padding:20px; color:var(--muted);
  }
  .empty h2{
    color:var(--text); margin:12px 0 6px; font-size:18px;
  }
  .chips{
    display:flex; flex-wrap:wrap; gap:8px; justify-content:center;
    margin-top:14px; max-width:600px;
  }
  .chip{
    background:var(--panel-2); border:1px solid var(--border);
    color:var(--text); padding:6px 10px; border-radius:999px;
    font-size:12px; cursor:pointer; font-family:inherit;
    transition:.15s;
  }
  .chip:hover{border-color:var(--neon); box-shadow:0 0 12px rgba(0,229,255,0.25)}

  .loading{display:inline-flex; align-items:center; gap:8px; color:var(--neon)}
  .loading .dots{display:inline-flex; gap:4px}
  .loading .dots i{
    width:6px; height:6px; border-radius:50%;
    background:var(--neon); display:inline-block;
    animation:bl 1.1s infinite ease-in-out;
    box-shadow:0 0 8px var(--neon);
  }
  .loading .dots i:nth-child(2){animation-delay:.15s; background:var(--neon-2); box-shadow:0 0 8px var(--neon-2)}
  .loading .dots i:nth-child(3){animation-delay:.3s; background:var(--magenta); box-shadow:0 0 8px var(--magenta)}
  @keyframes bl{0%,80%,100%{transform:scale(.6); opacity:.4} 40%{transform:scale(1); opacity:1}}

  .composer{
    display:flex; gap:10px; align-items:flex-end;
    padding:12px;
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:18px;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }
  .composer textarea{
    flex:1; resize:none; min-height:46px; max-height:160px;
    background:transparent; color:var(--text);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px; padding:12px 14px;
    font-family:inherit; font-size:14.5px; line-height:1.7;
    outline:none;
    transition:.15s border-color,.15s box-shadow;
  }
  .composer textarea:focus{
    border-color:var(--neon);
    box-shadow:0 0 0 3px rgba(0,229,255,0.15);
  }
  .send{
    width:46px; height:46px; border-radius:50%;
    border:none; cursor:pointer; flex:none;
    background: conic-gradient(from 200deg, var(--neon), var(--magenta), var(--neon-2), var(--neon));
    color:#00111a; font-size:20px; font-weight:900;
    box-shadow:0 0 22px rgba(0,229,255,0.45);
    display:grid; place-items:center;
    transition:.15s transform;
  }
  .send:hover{transform:scale(1.05)}
  .send:disabled{opacity:.4; cursor:not-allowed; transform:none}

  .toast{
    position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(20px);
    background:rgba(10,15,30,0.9);
    border:1px solid var(--neon);
    color:var(--text);
    padding:10px 16px; border-radius:12px; font-size:13px;
    box-shadow:0 0 24px rgba(0,229,255,0.35);
    opacity:0; pointer-events:none;
    transition:.25s;
    z-index:1000;
  }
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}

  @media (max-width:640px){
    .app{padding:10px; gap:10px}
    .titles h1{font-size:14px}
    .titles p{font-size:11px}
    .logo{width:36px; height:36px; font-size:16px}
    .btn{padding:6px 9px; font-size:11px}
    .msg .bubble{max-width:92%; font-size:14px}
  }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo">ج</div>
    <div class="titles">
      <h1>دستیار هوشمند جزوهٔ گزارش‌نویسی</h1>
      <p>۱۰۰٪ آفلاین • مبتنی بر متن اصلی جزوه • بدون سرور</p>
    </div>
    <div class="actions">
      <button class="btn ghost" id="clearBtn" title="پاک کردن گفتگو">↺ پاک‌کردن</button>
    </div>
  </header>

  <section class="chat">
    <div class="messages" id="messages">
      <div class="empty" id="empty">
        <div style="font-size:44px">🧠</div>
        <h2>هر سوالی از متن جزوه بپرس</h2>
        <div>پاسخ‌ها منحصراً از متن هاردکد‌شدهٔ جزوه استخراج می‌شوند.</div>
        <div class="chips" id="chips"></div>
      </div>
    </div>
  </section>

  <form class="composer" id="form" autocomplete="off">
    <textarea id="input" placeholder="سوال خود را بنویسید… (مثلاً: مستندسازی را تعریف کنید)" rows="1"></textarea>
    <button class="send" id="send" type="submit" aria-label="ارسال">➤</button>
  </form>
</div>
<div class="toast" id="toast"></div>

/* =========================================================
   موتور جستجو و پاسخ‌دهی کلاینت‌ساید
   ========================================================= */

const STOPWORDS = new Set([
  "و","در","به","از","که","این","آن","است","را","با","برای","یک","هم","تا","یا",
  "بر","بی","نیز","ولی","اما","اگر","چه","چون","هر","هیچ","همه","هم‌چنین","همچنین",
  "می","نمی","شود","شد","کرد","کند","کنند","کنیم","دارد","دارند","بود","بودند",
  "ما","شما","او","آن‌ها","آنها","خود","من","تو","ایشان","کسی","چیزی","چیست",
  "چگونه","چرا","کدام","چه‌چیز","چه‌چیزی","کیست","کجاست","کجا","توضیح","دهید",
  "بگو","بگویید","بیان","کنید","نام","ببرید","تعریف","بنویس","بنویسید",
  "؟","،",".","!","(",")",":","«","»","-","—","–"
]);

function normalizeFa(str){
  if(!str) return "";
  return str
    .replace(/[\u064B-\u065F\u0670\u0640]/g, "") // اعراب و کشیده
    .replace(/ي/g,"ی").replace(/ك/g,"ک")
    .replace(/[٠-٩]/g, d => String("٠١٢٣٤٥٦٧٨٩".indexOf(d)))
    .replace(/[۰-۹]/g, d => String("۰۱۲۳۴۵۶۷۸۹".indexOf(d)))
    .replace(/\u200c/g, " ")
    .replace(/[،؛؟!?.,()«»"'\-—–:]/g, " ")
    .replace(/\s+/g, " ")
    .trim()
    .toLowerCase();
}

function tokenize(str){
  const n = normalizeFa(str);
  if(!n) return [];
  return n.split(" ").filter(w => w && !STOPWORDS.has(w) && w.length > 1);
}

// ایندکس جملات
const SENTENCES = [];
const QA_PAIRS = [];
JOZVEH.forEach(sec => {
  sec.paragraphs.forEach((p, pi) => {
    // شکستن پاراگراف به جملات کوتاه‌تر برای امتیازدهی دقیق‌تر
    const parts = p.split(/(?<=[.؟!])\s+|(?<=:)\s+(?=[۱-۹])/);
    parts.forEach((s, si) => {
      const text = s.trim();
      if(text.length < 4) return;
      SENTENCES.push({
        sectionId: sec.id,
        sectionTitle: sec.title,
        page: sec.page,
        text,
        tokens: tokenize(text),
        norm: normalizeFa(text),
        sortKey: pi * 100 + si
      });
    });
  });
  sec.qa.forEach(pair => {
    QA_PAIRS.push({
      sectionId: sec.id,
      sectionTitle: sec.title,
      page: sec.page,
      q: pair.q,
      qNorm: normalizeFa(pair.q),
      qTokens: tokenize(pair.q),
      a: pair.a
    });
  });
});

// محاسبه IDF
const DF = new Map();
SENTENCES.forEach(s => {
  new Set(s.tokens).forEach(t => DF.set(t, (DF.get(t)||0)+1));
});
const N = SENTENCES.length || 1;
const IDF = new Map();
DF.forEach((df, t) => IDF.set(t, Math.log(1 + N / df)));

function scoreTokens(queryTokens, docTokens, docNorm, qNorm){
  if(!queryTokens.length) return 0;
  const docSet = new Set(docTokens);
  let score = 0;
  let matched = 0;
  queryTokens.forEach(t => {
    if(docSet.has(t)){
      score += (IDF.get(t) || 1);
      matched++;
    } else {
      // امتیاز جزئی برای زیررشته
      for(const dt of docTokens){
        if(dt.includes(t) || t.includes(dt)){
          score += (IDF.get(t) || 0.5) * 0.35;
          matched += 0.4;
          break;
        }
      }
    }
  });
  // بونس عبارت کامل
  if(qNorm && docNorm.includes(qNorm)) score *= 2.2;
  // نسبت پوشش
  score *= (0.5 + matched / queryTokens.length);
  return score;
}

function answerQuestion(rawQuery){
  const query = rawQuery.trim();
  if(!query) return null;
  const qNorm = normalizeFa(query);
  const qTokens = tokenize(query);
  if(qTokens.length === 0){
    return {
      notFound: true,
      text: "لطفاً سوال خود را کامل‌تر بنویسید تا بتوانم در متن جزوه جست‌وجو کنم."
    };
  }

  // ۱) تطابق مستقیم با جفت‌های Q/A
  let bestQA = null;
  let bestQAScore = 0;
  QA_PAIRS.forEach(pair => {
    let s = scoreTokens(qTokens, pair.qTokens, pair.qNorm, qNorm);
    // بونس اگر عبارت پرسش‌گونهٔ کاربر شامل کلمات کلیدی سوال باشد
    if(pair.qNorm && qNorm){
      const common = pair.qTokens.filter(t => qTokens.includes(t)).length;
      if(pair.qTokens.length){
        s += (common / pair.qTokens.length) * 3;
      }
    }
    if(s > bestQAScore){ bestQAScore = s; bestQA = pair; }
  });

  // ۲) امتیازدهی جملات
  const scored = SENTENCES.map(s => ({
    s,
    score: scoreTokens(qTokens, s.tokens, s.norm, qNorm)
  })).filter(x => x.score > 0)
     .sort((a,b) => b.score - a.score);

  const topSentenceScore = scored.length ? scored[0].score : 0;

  // اگر QA خیلی خوب مطابقت داشت
  if(bestQA && bestQAScore >= Math.max(2.5, topSentenceScore * 0.9)){
    return {
      notFound: false,
      text: `بر اساس متن جزوه:\n${bestQA.a}`,
      section: bestQA.sectionTitle,
      page: bestQA.page
    };
  }

  // در غیر این صورت، از جملات برتر پاسخ بساز
  if(scored.length === 0 || topSentenceScore < 1.2){
    // بررسی حالت مرزی: اگر QA موجود ولی ضعیف بود
    if(bestQA && bestQAScore >= 1.8){
      return {
        notFound: false,
        text: `بر اساس متن جزوه:\n${bestQA.a}`,
        section: bestQA.sectionTitle,
        page: bestQA.page
      };
    }
    return {
      notFound: true,
      text: "این موضوع دقیقاً در متن جزوه یافت نشد. لطفاً سوال را با کلمات کلیدی جزوه (مانند «مستندسازی»، «گزارش تفصیلی»، «حشو»، «ساختار گزارش» و …) بازنویسی کنید."
    };
  }

  // انتخاب جملات برتر از یک بخش (اگر ممکن) برای انسجام
  const topSectionId = scored[0].s.sectionId;
  const topSectionSentences = scored
    .filter(x => x.s.sectionId === topSectionId)
    .slice(0, 4)
    .sort((a,b) => a.s.sortKey - b.s.sortKey)
    .map(x => x.s.text);

  // اگر جملات بخش برتر کم بود، از سایر جملات هم اضافه کن
  let extras = [];
  if(topSectionSentences.length < 2){
    extras = scored
      .filter(x => x.s.sectionId !== topSectionId)
      .slice(0, 2)
      .map(x => x.s.text);
  }

  const glued = [
    "بر اساس متن جزوه:",
    ...topSectionSentences.map((t,i) =>
      i === 0 ? t
      : i === 1 ? "همچنین، " + lowerFirst(t)
      : i === 2 ? "افزون بر این، " + lowerFirst(t)
      : "به علاوه، " + lowerFirst(t)
    ),
    ...extras.map(t => "در بخش دیگری از جزوه نیز آمده است که " + lowerFirst(t))
  ].join("\n");

  const sec = JOZVEH.find(s => s.id === topSectionId);
  return {
    notFound: false,
    text: glued,
    section: sec ? sec.title : "",
    page: sec ? sec.page : null
  };
}

function lowerFirst(str){
  return str.replace(/^./, m => m); // فارسی حالت small ندارد، فقط passthrough
}

/* =========================================================
   رابط کاربری چت
   ========================================================= */

const messagesEl = document.getElementById("messages");
const emptyEl = document.getElementById("empty");
const chipsEl = document.getElementById("chips");
const form = document.getElementById("form");
const input = document.getElementById("input");
const sendBtn = document.getElementById("send");
const clearBtn = document.getElementById("clearBtn");
const toast = document.getElementById("toast");

const SUGGESTIONS = [
  "مستندسازی را تعریف کنید",
  "اهداف گزارش را نام ببرید",
  "حشو قوی چیست؟",
  "مراحل تهیه گزارش را بگو",
  "ویژگی‌های یک گزارش خوب",
  "نقاط ضعف یک گزارش تحقیقی",
  "تفاوت گزارش رسمی و غیررسمی",
  "ساده‌نویسی یعنی چه؟"
];
SUGGESTIONS.forEach(q => {
  const b = document.createElement("button");
  b.type = "button";
  b.className = "chip";
  b.textContent = q;
  b.addEventListener("click", () => { input.value = q; submit(); });
  chipsEl.appendChild(b);
});

function showToast(msg){
  toast.textContent = msg;
  toast.classList.add("show");
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => toast.classList.remove("show"), 1800);
}

function autoresize(){
  input.style.height = "auto";
  input.style.height = Math.min(input.scrollHeight, 160) + "px";
}
input.addEventListener("input", autoresize);
input.addEventListener("keydown", e => {
  if(e.key === "Enter" && !e.shiftKey){
    e.preventDefault();
    submit();
  }
});

function hideEmpty(){
  if(emptyEl && emptyEl.parentNode){
    emptyEl.parentNode.removeChild(emptyEl);
  }
}

function addUser(text){
  hideEmpty();
  const el = document.createElement("div");
  el.className = "msg user";
  const b = document.createElement("div");
  b.className = "bubble";
  b.textContent = text;
  el.appendChild(b);
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addLoading(){
  const el = document.createElement("div");
  el.className = "msg bot loading-msg";
  const b = document.createElement("div");
  b.className = "bubble";
  b.innerHTML = '<span class="loading">در حال جست‌وجو در جزوه <span class="dots"><i></i><i></i><i></i></span></span>';
  el.appendChild(b);
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return el;
}

function addBot(result){
  const el = document.createElement("div");
  el.className = "msg bot" + (result.notFound ? " notfound" : "");
  const b = document.createElement("div");
  b.className = "bubble";
  const body = document.createElement("div");
  body.textContent = result.text;
  b.appendChild(body);

  const meta = document.createElement("div");
  meta.className = "meta";
  if(!result.notFound){
    const src = document.createElement("span");
    src.textContent = "منبع: " + (result.section || "جزوه") + (result.page ? " — صفحهٔ " + result.page : "");
    meta.appendChild(src);
  } else {
    const src = document.createElement("span");
    src.textContent = "خارج از محدودهٔ جزوه";
    meta.appendChild(src);
  }
  const copy = document.createElement("button");
  copy.type = "button";
  copy.className = "copy";
  copy.textContent = "📋 کپی پاسخ";
  copy.addEventListener("click", () => {
    navigator.clipboard.writeText(result.text).then(() => showToast("پاسخ کپی شد"));
  });
  meta.appendChild(copy);
  b.appendChild(meta);

  el.appendChild(b);
  messagesEl.appendChild(el);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function submit(){
  const q = input.value.trim();
  if(!q) return;
  addUser(q);
  input.value = "";
  autoresize();
  sendBtn.disabled = true;
  const loader = addLoading();
  // شبیه‌سازی زمان پردازش سبک برای حس طبیعی‌تر
  setTimeout(() => {
    const res = answerQuestion(q);
    loader.remove();
    addBot(res || { notFound:true, text:"پاسخی یافت نشد." });
    sendBtn.disabled = false;
    input.focus();
  }, 420);
}
form.addEventListener("submit", e => { e.preventDefault(); submit(); });
clearBtn.addEventListener("click", () => {
  messagesEl.innerHTML = "";
  messagesEl.appendChild(emptyEl);
  if(!emptyEl.parentNode) messagesEl.appendChild(emptyEl);
});
</script>
</body>
</html>
