d-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/page_6.jpg` `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/page_7.jpg` `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/page_8.jpg` `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/page_9.jpg`"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "از خواننده انتظار می رود پس از مطالعه مطالب این فصل بتواند: ۱. تعریف های مختلف آسیب شنوایی را به صورت تحلیلی- مقایسه ای بیان کند ۲. شیوه های مختلف طبقه بندی آسیب های شنوایی را شرح دهد ۳. میزان شیوع آسیب های شنوایی را شرح دهد ۴. علت های مختلف آسیب شنوایی را بر حسب نوع آسیب و محل آسیب توضیح دهد ۵. ویژگی های مختلف افراد با آسیب شنوایی را بر حسب کنش های مختلف شرح دهد ۶. روش های مختلف ارتباطی را در افراد با آسیب شنوایی بیان نماید ۷. فرهنگ ناشنوایی را توضیح داده و مورد نقد قرار دهد"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "اولین حسی که در انسان به وجود می آید و آخرین حسی که در انسان از بین می رود حس شنوایی است. بنابراین انسان ها از طریق شنیدن اطلاعات زیادی را درباره جهان اطراف کسب می کنند و شنیدن نقش بسیار مهمی را در تحول فرد ایفا می کند. بدین ترتیب آسیب شنوایی بسته به شدت و زمان بروز، تحول فرد را در کنش های مختلف با تأخیرهای جدی روبرو می سازد. با این حال با غربالگری و شناسایی زودهنگام، و در نتیجه ارائه خدمات آموزشی، توانبخشی و پزشکی می توان تا حد زیادی تأثیر منفی آسیب شنوایی را به حداقل رساند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "**تعریف و طبقه بندی** سیستم های طبقه بندی برای آسیب شنوایی وجود دارد. اگرچه که این فکر رایج است ناشنوا بودن به معنای عدم توانایی در شنیدن هر چیزی است و سخت شنوایی به این معنا است که فرد تا حدی کمی می تواند بشنود؛ اما این مسئله به طور کلی درست نیست. بیشتر افراد ناشنوا تا حدی از باقیمانده شنوایی برخوردارند. دو دیدگاه یا جهت گیری فیزیولوژیکی و جهت گیری آموزشی در ارتباط با تعریف آسیب شنوایی مطرح است."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "جهت گیری فیزیولوژیکی بیشتر به میزان قابل اندازه گیری آسیب شنوایی مرتبط است. کودکی که نمی تواند صداها را در یک سطح شدت خاص یا بالاتر بشنود در طبقه ناشنوا و بقیه افراد با آسیب شنوایی به عنوان سخت شنوا در نظر گرفته می شوند. حساسیت شنوایی بر حسب دسی بل اندازه گیری می شود. بر اساس دیدگاه فیزیولوژیکی، به طور کلی افراد با آسیب"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "شنوایی به اندازه 90 دسی بل یا بیشتر به عنوان ناشنوا و افراد با آسیب های شنوایی پایین تر از این میزان به عنوان سخت شنوا در نظر گرفته می شوند (هالاهان و کافمن، 2009)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "متخصصان با جهت گیری آموزشی به این نکته توجه دارند که تا چه اندازه آسیب شنوایی احتمالاً بر توانایی کودک در صحبت کردن و تحول زبان تأثیر می گذارد. این متخصصان به علت ارتباط خیلی نزدیک بین آسیب شنوایی و تأخیر در تحول زبان، ملاک طبقه بندی را بیشتر بر اساس توانایی های زبان شفاهی قرار می دهند. آسیب شنوایی اصطلاح وسیعی است که افراد با آسیب های خفیف تا عمیق را در بر می گیرد. آن شامل افراد ناشنوا و سخت شنوا می گردد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "تعاریف ناشنوا و سخت شنوا بر اساس دیدگاه آموزشی به صورت زیر است: فرد ناشنوا کسی است که ناتوانی شنیدن او از پردازش موفقیت آمیز اطلاعات زبانی از طریق شنیدن با و یا بدون وسایل کمک شنیداری جلوگیری می کند. فرد سخت شنوا به طور کلی می تواند با وسایل کمک شنیداری از باقیمانده شنوایی خود برای پردازش موفق اطلاعات زبانی از طریق شنیدن استفاده کند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "مربیان تا حد زیادی درباره سن شروع آسیب شنوایی نگران هستند. بین آسیب شنوایی و تأخیر در زبان رابطه نزدیکی وجود دارد. هر چه آسیب شنوایی در زندگی کودک زودتر رخ دهد، تحول زبان در کودک با مشکلات بیشتری مواجه خواهد بود. به همین دلیل متخصصان به طور مکرر از اصطلاحات ناشنوایی مادرزادی (افرادی که ناشنوا به دنیا می آیند) و ناشنوایی اتفاقی (افرادی که مدت زمانی بعد از تولد ناشنوا می شوند) استفاده می کنند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "دو اصطلاح رایج دیگر که در ارتباط خاص تری با زبان هستند عبارتند از ناشنوایی پیش زبانی و ناشنوایی پس زبانی. ناشنوایی پیش زبانی به ناشنوایی اشاره دارد که در هنگام تولد یا بسیار زود در زندگی یعنی قبل از تحول زبان و گفتار رخ می دهد. ناشنوایی پس زبانی به ناشنوایی اشاره دارد که بعد از تحول زبان و گفتار رخ می دهد. متخصصان درباره نقطه جداکننده این دو نوع ناشنوایی اختلاف نظر دارند. برخی معتقدند زمان هجده ماهگی باید ملاک تقسیم دو نوع ناشنوایی پیش زبانی و پس زبانی باشد و برخی دیگر فکر می کنند این زمان باید در سنین پایین تری یعنی 12 ماهگی یا حتی 6 ماهگی باشد (میدو - اورلنز، 1987)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "برخی متخصصان، آسیب شنوایی را بر حسب سطح آستانه شنوایی طبقه بندی کردند: خفیف (۲۶ تا ۴۰ دسی بل)، متوسط (۴۱ تا ۵۵ دسی بل)، نیمه شدید (۵۶ تا ۷۰ دسی بل)، شدید (۷۱ تا ۹۰ دسی بل) و عمیق (۹۱ دسی بل و بالاتر) (اندروز، لای، و واینر، ۲۰۰۴). این سطوح شدت بر اساس از دست دادن حساسیت شنوایی، طبقه بندی های وسیع ناشنوایی و سخت شنوا را کنار می زند. طبقه بندی های وسیع تر به طور مستقیم به حساسیت شنوایی وابسته نیستند، در عوض آنها بر میزان تأثیرپذیری زبان و گفتار تأکید می کنند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "صدا از طریق شدت و فرکانس آن اندازه گیری می شود. شدت و فرکانس، اندازه های فیزیکی هستند که می توان آنها را به سادگی معادل بلندی و زیر و بمی دانست. بلندی صدا با دسی بل سنجیده می شود. در دسی بل صفر، شخصی که شنوایی طبیعی دارد می تواند ضعیف ترین صدا را تشخیص دهد. نجوا حدود ۱۰ دسی بل و گفتگوی معمولی حدود ۵۰ دسی بل شدت دارد. صدایی که بیش از ۱۲۵ دسی بل شدت داشته باشد ممکن است موجب درد گوش شود و به سلول های مویی حلزون آسیب برساند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "زیر و بمی صدا با دور در ثانیه یا هرتز اندازه گیری می شود. یک هرتز برابر با یک دور در ثانیه است. انسان ها می توانند صداهایی با فرکانس ۲۰ تا ۲۰۰۰۰ هرتز را بشنوند، اما فرکانس بسیاری از صداها پایین تر یا بالاتر از فرکانس صداهای گفتاری است. بیشتر صداهای محیطی بین ۱۲۵ تا ۸۰۰۰ هرتز قرار می گیرند، در حالی که مهم ترین صداهای گفتاری در محدوده ۳۰۰ تا ۳۰۰۰ هرتز قرار دارند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "میزان شیوع برآورد تعداد کودکان با آسیب شنوایی به علت اختلاف در تعاریف، جمعیت های مورد مطالعه و صحت آزمون گری تا حد قابل ملاحظه ای گوناگون است. آمارهای وزارت آموزش و پرورش ایالات متحده آمریکا نشان می دهد که ۰/۱۳ درصد جمعیت ۶ تا ۱۷ سال مدارس عمومی، ناشنوا یا سخت شنوا هستند. هرچند که این دپارتمان آمارهای مجزا برای مقوله های ناشنوا و سخت شنوا ارائه نمی دهد، با این حال شواهد قوی حاکی از آن است که میزان شیوع"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "۲۴۲ روان شناسی و آموزش کودکان و نوجوانان"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "دانش آموزان سخت شنوا بیشتر از دانش آموزان ناشنوا است (میدو - ارلاتر، مرتنز، و ساس- لهرر، ۲۰۰۳)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "تقریباً ۲۸ میلیون نفر در آمریکا اختلال های شنوایی دارند (هس، ۱۹۹۱) و یک درصد جمعیت به اختلال شنوایی مبتلا هستند (هیوارد، ۲۰۰۶). تعیین تعداد دقیق دانش آموزان دارای اختلال شنوایی دشوار است، زیرا بیشتر گزارش ها تنها دانش آموزانی را که آموزش ویژه را دریافت می کنند جزء آمار به حساب می آورند. به سبب این که بسیاری از دانش آموزان دارای نقص شنوایی شناسایی نمی شوند یا نقص شنوایی خفیف دارند و خدمات ویژه دریافت نمی کنند، میزان شیوع نقص شنوایی کمتر از مقدار واقعی آن برآورد شده است."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "نورترن و داونز (۲۰۰۱) گزارش کردند که از هر ۱۰۰۰ کودکی که متولد می شود، ۱ کودک ناشنوا است و از هر ۱۰۰۰ نفر، دو کودک دیگر نیز در نخستین سال های زندگی ناشنوا می شوند. از هر ۵۰ نوزادی نیز که به مراقبت های ویژه نیاز دارند ۱ کودک به ناشنوایی یا سخت شنوایی مبتلا می شود. آن ها همچنین گزارش کردند که ۱۰ تا ۱۵ درصد از همه دانش آموزان نمی توانند آزمایش های شنوایی مدارس را با موفقیت پشت سر بگذارند. برخی افراد از دیگر گروه های با نیازهای ویژه نیز دارای آسیب های شنوایی هستند. به عنوان مثال دانش آموزان مبتلا به نشانگان داون و دانش آموزان مبتلا به فلج مغزی ممکن است اختلال شنوایی داشته باشند. علاوه بر این، به نظر می رسد ناشنوایی هایی که ناشی از عوامل ارثی و عفونت هایی مانند مننژیت هستند و نقایص شنوایی که به علت قرار گرفتن طولانی مدت در محیط های پر سرو صدا و عفونت هایی مانند گوش میانی رخ می دهند، رو به افزایش اند (هیوارد، ۲۰۰۶)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "**آناتومی گوش** گوش به سه بخش تقسیم می شود: گوش بیرونی، گوش میانی، و گوش درونی. گوش بیرونی شامل، لاله گوش و مجرای شنوایی است. گوش بیرونی صداها را جمع می کند و آن ها را از راه مجرای شنوایی انتقال می دهد. این صداها به گوش میانی فرستاده می شوند (شکل ۱-۸)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "گوش میانی شامل پرده صماخ و سه استخوان کوچک به نام های چکشی، سندانی، و رکابی است. مجموع این سه استخوان، استخوانچه ها یا زنجیره استخوانچه ای نامیده می شود. استخوان سندانی به استخوان رکابی چسبیده است. استخوان رکابی نیز به دریچه بیضی یا ورودی گوش درونی وصل است. هنگامی که امواج صدا از دریچه شنوایی می گذرند، به پرده صماخ برخورد می کنند و باعث لرزش آن می شوند. لرزش های مکانیکی به زنجیره استخوانچه ای می رسند و سپس انرژی مکانیکی به گوش درونی انتقال داده می شود. شیپور استاش که از پشت حلق تا گوش میانی ادامه دارد، باز و بسته می شود و فشار هوا را در دو طرف پرده صماخ متعادل می سازد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "گوش درونی شامل حلزون، مجاری نیم دایره و ابتدای عصب شنوایی است. حلزون حس شنوایی را مهار می کند و مجاری نیم دایره وظیفه مهار حس تعادل را بر عهده دارند. حلزون حفره ای پر از مایع است که با سلول های مویی کوچک پوشانده شده است. هنگامی که حرکات زنجیره استخوانچه ای به گوش درونی وارد می شوند، مایع موجود در حلزون را به حرکت در می آورند و باعث می شوند که سلول های مویی به حرکت مایع واکنش نشان دهند. واکنش های سلول های مویی (تکانه های عصبی) به عصب شنوایی فرستاده می شوند. این تکانه ها از راه عصب شنوایی به مغز می روند و توسط کورتکس شنوایی مغز پردازش می شوند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "مجاری نیم دایره استخوان چکشی استخوان سندانی استخوان رکابی سلول های ماستوئید دهلیز غضروف عصب دهلیزی عصب صورتی عصب حلزونی مجرای شنیداری خارجی عضله پرده گوش حلزون دریچه گرد دریچه بیضی پرده گوش مجرای استاش (با گلو ارتباط دارد) لاله گوش"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "شکل ۸-۱: بخش های مختلف گوش (خارجی، میانی، داخلی)"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "علل آسیب شنوایی را می توان بر اساس نوع آسیب (یعنی انتقالی، حسی - عصبی، و مختلط) و محل آسیب شنوایی (یعنی بیرونی، میانی، درونی) مورد بررسی قرار داد. قانون کلی این است که آسیب های شنوایی بیشتر از ۶۰ تا ۷۰ دسی بل مربوط به گوش داخلی است. هنگامی که عاملی مانع از ورود صداها به گوش بیرونی یا میانی می شود، نقص شنوایی انتقالی رخ می دهد. زمانی که گوش درونی وظیفه خود را به خوبی انجام ندهد، نقص شنوایی حسی - عصبی پدید می آید. نقایص شنوایی انتقالی هنگامی رخ می دهند که صداها از گوش بیرونی و میانی به خوبی عبور نمی کنند. هر گونه بسته شدن کانال گوش، مانند جمع شدن جرم گوش یا نقص مادرزادی در شکل گیری کانال گوش ممکن است در انتقال صداها مشکل ایجاد کند. نقص شنوایی انتقالی اغلب ناشی از تجمع مایع در گوش میانی به دلیل عفونت است (عفونت گوش میانی). تجمع مایع در گوش میانی موجب می شود که زنجیره استخوانچه ها نتواند صدا را به گوش درونی انتقال دهد. علاوه بر این، عفونت ها و بیماری ها ممکن است باعث شوند که پرده صماخ یا استخوانچه ها به خوبی کار نکنند. اتواسکلروز، عارضه ای که مشخصه آن رشد استخوان اسفنجی شکل بر روی استخوانچه هاست، مانع از ارتعاش مناسب استخوانچه ها و انتقال مؤثر صداها به حلزون می شود. در بیشتر موارد می توان نقص انتقالی را از طریق جراحی، درمان دارویی یا تقویت صداها برطرف نمود تا صداها بتوانند از گوش میانی بگذرند و ساختارهای گوش درونی را تحریک کنند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "نقایص شنوایی حسی - عصبی هنگامی رخ می دهند که صداها از گوش درونی به مغز انتقال نمی یابند یا به صورت تحریف شده به مغز فرستاده می شوند. وارد شدن آسیب به حلزون و عصب شنوایی موجب نقص شنوایی حسی - عصبی می شود. مهم ترین علل نقص شنوایی حسی - عصبی عبارتند از: بیماری های ویروسی، ناسازگاری Rh، داروهایی که به مکانیسم شنوایی آسیب می زنند اما برای درمان بیماری های دیگر استفاده می شوند، پیری و قرار گرفتن مداوم در معرض صداهای بلند. نقص شنوایی حسی - عصبی معمولاً پایدار و"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "**علل مشترک آسیب شنوایی** همیشگی است. این نوع نقص از طریق تقویت صدا برطرف می شود، اما به طور معمول با دارو یا جراحی درمان پذیر نیست. نقص شنوایی آمیخته هنگامی رخ می دهد که شخص، ترکیبی از نقص شنوایی انتقالی و حسی - عصبی را دارا باشد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "**عوامل ایجاد کننده آسیب شنوایی قبل از اکتساب زبان** ناشنوایی پیش زبانی اشاره دارد که در هنگام تولد یا بسیار زود در زندگی یعنی قبل از تحول زبان و گفتار رخ می دهد. برخی از شایع ترین علل نقص شنوایی پیش زبانی عبارتند از: سرخجه مادری، ابتلای مادر به سرخجه در دوران بارداری به ویژه در سه ماهه نخست بسیار خطرناک است. این ویروس می تواند موجب نقایص شنوایی، نقایص بینایی و قلبی در نوزاد گردد. عامل وراثت، ۹۰ درصد از افراد مبتلا به ناشنوایی مادرزادی، والدین شنوا دارند و در حدود ۲۰ درصد از بستگان آنها ناشنوا یا کم شنوا هستند (مورس، ۱۹۹۶). برآوردها نشان می دهند که حداقل ۶۰ درصد از نقایص حسی - عصبی متوسط تا عمیق که پیش از اکتساب زبان رخ می دهند، ناشی از عوامل ژنتیکی هستند (مارازیتا و همکاران، ۱۹۹۳). نارس بودن نوزاد و کم وزنی به هنگام تولد. نتایج تحقیقات حاکی از آن است که نارس بودن نوزاد و پایین بودن وزن آن و همچنین زایمان های سخت با آسیب های شنوایی رابطه دارند. عفونت های ویروسی. مننژیت ممکن است سلول های مویی گوش درونی را تخریب کند و به آسیب شنوایی زود هنگام و پایدار منجر شود. ویروس سایتومگال مادرزادی. این ویروس تقریباً ۱ درصد از همه نوزادان را مبتلا می کند. ویروس سایتومگال علت حدود ۳ درصد از نقایص شنوایی در کودکان زیر ۶ سال (تقریباً ۱۰۰۰۰ نفر) و ۴۰۰۰ مورد نقص شنوایی خفیف تا عمیق در دانش آموزان است. تقریباً ۹۰ درصد از دانش آموزان واجد شرایط، نقص شنوایی پیش زبانی دارند و اغلب حلزون آنها آسیب دیده است (اشتراوش، ۱۹۹۷؛ به نقل از امیری مجد، ۱۳۸۹)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "**عوامل ایجاد کننده آسیب شنوایی پس از اکتساب زبان** ناشنوایی پس زبانی به ناشنوایی اشاره دارد که بعد از تحول زبان و گفتار رخ می دهد. تنها ۵ درصد از کودکان ناشنوا یا سخت شنوا، آسیب شنوایی پس زبانی دارند. برای درمان آموزشی نقص"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "پس زبانی معمولاً تلاش می شود تا مهارت های گفتاری و زبانی که پیش از شروع نقص شنوایی کسب شده اند حفظ شوند. برخی از شایع ترین علل نقص شنوایی پس زبانی عبارتند از: مننژیت. عامل اصلی اختلال شنوایی پیش زبانی و نیز اختلال شنوایی پس زبانی، مننژیت است. مننژیت به عفونت باکتریایی یا ویروسی سیستم اعصاب مرکزی اشاره دارد که در اغلب موارد باعث آسیب های شنوایی عمیق می شود. عفونت گوش میانی. عفونت گوش میانی یک اصطلاح کلی برای عفونت هایی است که موجب تجمع مایع در حفره گوش میانی می شوند. عدم درمان به موقع عفونت ها ممکن است باعث ایجاد آسیب شنوایی انتقالی دائم گردد. نقص شنوایی ناشی از سروصدا. سر و صدای همیشگی ممکن است موجب بروز نقص شنوایی حسی- عصبی شود. مردان جوان بیش از زنان جوان در خطر ابتلا به نقص شنوایی ناشی از صدای بلند قرار دارند، زیرا مردان بیشتر از زنان به فعالیت هایی مانند تیراندازی و تعمیر موتور ماشین می پردازند (هالاهان و کافمن، ۲۰۰۶). علل ناشناخته. علت حدود ۵۰ درصد از همه نقایص شنوایی پس زبانی ناشناخته است (اسمیت، ۲۰۰۶). در اغلب موارد، تعیین سبب شناسی بسیاری از نقایص شنوایی دشوار است، زیرا این نقایص در طول زمان ایجاد می شوند یا ناشی از مواجهه مکرر با شرایط یا عارضه های متعددی هستند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "ویژگی های افراد با آسیب شنوایی تحول زبان در افراد مبتلا به اختلال شنوایی، درک و کاربرد زبان شفاهی بیشتر آسیب می بیند و شاید بزرگترین مشکل اصلی کودکان با آسیب شنوایی، زبان آموزی باشد. در این افراد هم گفتار و هم زبان ممکن است آسیب ببیند. با توجه به نقش تحول زبان در تحول شناختی، هیجانی و اجتماعی، لازم است که والدین شیوه ارتباطی مناسب با ویژگی های کودک با آسیب شنوایی را پیدا کرده و به کار گیرند. در این ارتباط نقش مادر در برقراری ارتباط مناسب با فرزند ناشنوای خویش و در نتیجه تحول مناسب زبان کودک بسیار مهم است. نقص شنوایی و زبان ممکن است به درجات مختلف در کودکان دارای اختلال شنوایی وجود داشته باشد. در حالی که همه دانش آموزانی که به لحاظ عصب شناختی سالم هستند"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "می توانند شکلی از زبان را یاد بگیرند، با این حال یادگیری گفتار و زبان شفاهی با شدت نقص شنوایی ارتباط مستقیم دارد. بزرگترین مشکل کسانی که نمی توانند برای دریافت اطلاعات از حس شنوایی بهره بگیرند (آنهایی که نقص شنوایی شدید یا عمیق دارند) این است که نمی توانند زبان شفاهی جامعه خود را یاد بگیرند و بیشتر آنها نقص شدید زبانی دارند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "به طور کلی افراد با آسیب شنوایی از لحاظ درک زبان، تولید زبان، و گفتار با دشواری هایی مواجه هستند؛ واضح بودن گفتار با میزان آسیب شنوایی و سن شروع آسیب ارتباط دارد. حتی بعد از گفتاردرمانی عمیق، به ندرت کودکان با ناشنوایی عمیق پیش زبانی، گفتار قابل فهمی را رشد می دهند (مارشاک، ۲۰۰۲). نوزادانی که قبل از ناشنوا شدن قادر به شنیدن صداهای خود و بزرگسالان هستند، نسبت به نوزادانی که ناشنوا متولد می شوند برتری دارند. کودکان ناشنوا در یادگیری ارتباط دادن احساس خود در هنگام حرکت دادن فک، دهان، و زبان با صداهای شنیداری که این حرکت ها را ایجاد می کنند، با مشکلاتی مواجه هستند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "جدول زیر تأثیر آسیب شنوایی را بر حسب شدت بر روی برقراری ارتباط نشان می دهد (به نقل از هالا هان و کافمن، ۲۰۰۹)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "سطح شنوایی بر حسب دسی بلبرچسبتأثیر بر برقراری ارتباط ۱۰ تا ۱۵ دسی بلنرمالدر برقراری ارتباط تأثیری ندارد ۱۶ - ۲۵جزییدر محیط آرام فرد در تشخیص گفتار مشکلی ندارد، اما در محیط های پرسرو صدا، درک گفتار ضعیف دشوار است. ۲۶ - ۴۰خفیفدر محیط های مکالمه آرام که موضوع شناخته شده است و مکالمه محدود است، فرد مشکلی در برقراری ارتباط ندارد. شنیدن گفتار ضعیف دشوار است، حتی اگر محیط آرام باشد. دنبال کردن بحث های کلاس درس چالش برانگیز است."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "41-55متوسطفرد می تواند گفتار مکالمه ای را فقط در فاصله نزدیک بشنود. فعالیت های گروهی مانند بحث های کلاس درس با چالش های ارتباطی مواجه است. 56-70نیمه شدیدفرد فقط می تواند گفتار مکالمه ای بلند و آشکار را بشنود و مشکلات زیادی را در موقعیت های گروهی دارد. اغلب اوقات گفتار فرد از لحاظ وضوح مشکل دارد. 71-90شدیدفرد نمی تواند گفتار مکالمه ای را بشنود مگر این که بسیار بلند باشد. فرد نمی تواند بسیاری از کلمات را تشخیص دهد. صداهای محیطی می تواند تشخیص داده شود، اگرچه که همیشه قابل شناسایی نیست. گفتار فرد در مجموع قابل فهم نیست. 91 به بالاعمیقفرد ممکن است صداهای بسیار بلند را بشنود، اما هرگز نمی تواند گفتار مکالمه ای را بشنود. بینایی، روش اصلی برقراری ارتباط است."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "برای سالیان متمادی، متخصصان اعتقاد داشتند که توانایی مفهومی افراد ناشنوا به علت مشکلات در زبان شفاهی، نارسا است. با این حال ما هم اکنون می دانیم که افراد ناشنوا ممکن است در زبان شفاهی مشکلی داشته باشند، اما زبان اشاره مورد استفاده در آنها (مانند زبان اشاره آمریکایی) زبان واقعی است که دارای قواعد گرامری مخصوص خود است. هر گونه آزمونگری هوشی در افراد ناشنوا باید نارسایی زبان شفاهی آنها را مورد توجه قرار دهد. آزمون های عملکردی به جای آزمون های کلامی به خصوص اگر با زبان اشاره به کار روند، سنجش منصفانه تری از هوش بهر یک فرد با آسیب شنوایی ارائه می دهند. هنگامی که آزمون های عملکردی مورد استفاده قرار گیرند در هوش بهر افراد ناشنوا و عادی تفاوتی دیده نمی شود (پرینز و همکاران، 1996)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "متاسفانه بیشتر کودکان ناشنوا، نارسایی های عمده ای در پیشرفت تحصیلی دارند. توانایی خواندن احتمالا مهم ترین حوزه ای است که آسیب می بیند. برای مثال سطح درک خواندن در دانش آموزان ۱۸ ساله با آسیب شنوایی، در حد پایه چهارم است (ترکسلر، ۲۰۰۰). حتی در ریاضی که بهترین موضوع تحصیلی افراد شنوا است، تفاوت معناداری با همسالان شنوا دارند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "به طور کلی عوامل متعددی با میزان پیشرفت تحصیلی دانش آموزان ناشنوا ارتباط دارند مانند:"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "شدت اختلال شنوایی: هرچه نقص شنوایی شدیدتر باشد، بیشتر احتمال دارد که کودک در یادگیری و مهارت های تحصیلی مشکل داشته باشد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "سن شروع نقص شنوایی: نقص شنوایی پیش از اکتساب زبان (نقص پیش زبانی) بسیار مخرب تر از نقص شنوایی پس از اکتساب زبان (نقص پس زبانی) است."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "ثمرات هوشی: هرچه هوشبر کودک بالاتر باشد، احتمال موفقیت تحصیلی وی بیشتر خواهد بود."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "جایگاه اجتماعی - اقتصادی خانواده: کودکان ناشنوا و دارای اختلال شنوایی که سطح اجتماعی - اقتصادی خانواده های آن ها بالاتر است، معمولا در مقایسه با کودکانی که در طبقات اجتماعی - اقتصادی پایین تر قرار دارند، پیشرفت تحصیلی بیشتری نشان می دهند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "وضعیت شنوایی والدین: کودک ناشنوایی که والدین ناشنوا دارد احتمالا موفقیت تحصیلی بیشتری نسبت به کودکی خواهد داشت که والدین شنوا دارد. این موضوع به ویژه زمانی درست است که والدین ناشنوا از تحصیلات بالایی برخوردار باشند. به نظر می رسد موفقیت تحصیلی کودک به این دلیل باشد که حواس او زودتر و بیشتر تحریک می شود و زبان اشاره را زودتر آموخته است."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "مطالعات متعدد نشان داده است کودکان ناشنوایی که دارای والدین ناشنوا هستند، سطح پیشرفت خواندن و مهارت های زبانی بهتری نسبت به کودکان ناشنوایی که دارای والدین شنوا هستند، دارا هستند. درباره علت این یافته توافق جهانی وجود ندارد (پاورز، ۲۰۰۳). با این حال بسیاری از مؤلفان بر این نظرند که علت این مسئله مربوط به تأثیرگذاری مثبت زبان اشاره است. والدین ناشنوا ممکن است بهتر بتوانند با کودک ناشنوایشان ارتباط برقرار کنند و حمایت"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "های مورد نیاز را برای آن ها فراهم کنند. محیط حمایتی خانه با پیشرفت تحصیلی بالاتر در دانش آموزان ناشنوا مرتبط است. خانواده هایی که در آموزش کودک خود بیشتر مشارکت دارند، درباره شرایط کودک اطلاعات کسب می کنند، انتظارات بالایی برای پیشرفت کودک خود دارند، و حمایت بیش از حد از کودک خود به عمل نمی آورند، احتمالا کودکانشان از پیشرفت بالاتری برخوردار خواهد بود."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "سازش یافتگی اجتماعی تحول اجتماعی و تحول شخصیت در جمعیت افراد ناشنوا تا حد زیادی به برقراری ارتباط بستگی دارد؛ این نکته در مورد افراد ناشنوا نیز فرقی ندارد. یک فرد شنوا در پیدا کردن افرادی که بتواند با آن ها ارتباط برقرار کند مشکلی ندارد، ولی فرد ناشنوا در پیدا کردن فردی که بتواند با او گفتگو داشته باشد، با مشکلاتی مواجه است. نتایج مطالعات حاکی از آن است که بسیاری از دانش آموزان ناشنوا در معرض خطر تنهایی هستند (کامبرا، ۱۹۹۶؛ کارلسون، استرانگ و گالد، ۱۹۹۲). دو عامل مهم در گوشه گیری دانش آموزان ناشنوا عبارتند از: تلفیق و وضعیت شنوایی والدین (هالاهان و کافمن، ۲۰۰۹). نتایج تحقیقات حاکی از آن است که در موقعیت های تلفیقی، تعامل بسیار کمی معمولا بین دانش آموزان ناشنوا و عادی رخ می دهد (کلووین و همکاران، ۲۰۰۲). علاوه بر این اگر دانش آموزان ناشنوا در موقعیت های تلفیقی با افراد ناشنوای دیگر تعامل داشته باشند، از امنیت هیجانی بیشتری برخوردار خواهند بود (استینسون و وایت مایر، ۱۹۹۲). با این حال با توجه به میزان شیوع پایین آسیب شنوایی، این مسئله همیشه ممکن نیست. برخی مداخلات با استفاده از یادگیری مشارکتی در افزایش تعامل بین دانش آموزان ناشنوا و همسالان شنوا موفق بوده است (کلووین و همکاران، ۲۰۰۲). سازش یافتگی اجتماعی و شخصیتی دانش آموزان شنوا عمدتاً به مهارت های ارتباطی و تعامل با اعضای خانواده و دیگران بستگی دارد. همین قاعده در مورد افراد دارای اختلال شنوایی درست است. دانش آموزان ناشنوایی که والدین ناشنوا دارند، در مقایسه با دانش آموزان"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "شنوایی که والدینشان شنوا هستند، نمریافتگی اجتماعی بیشتری دارند، با ناشنوایی بهتر سازش پیدا می کنند و رفتارهایشان را بهتر مهار می کنند که احتمالاً به این دلیل است که زودتر زبان اشاره را به کار می گیرند (هالاهان و کافمن، ۲۰۰۶؛ هیورد، ۲۰۰۶)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "برخی مؤلفان بر این باورند کودک ناشنوایی که والدین شنوا دارد در مقایسه با کودک ناشنوایی که والدین ناشنوا دارد، کام نایافتگی های بیشتر و شادزیستی کمتری را تجربه می کند. علت آن است که بسیاری از والدین شنوا در زبان اشاره تخصص ندارند و نمی توانند با فرزندشان ارتباط برقرار کنند. با این وجود در حدود ۹۵ درصد از کودکان ناشنوا دارای والدین شنوا هستند (میچل و کارچمر، ۲۰۰۴)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "آسیب شنوایی شرایط چندوجهی است که دارای جنبه های مختلف پزشکی و اجتماعی است. کودکان با آسیب شنوایی در مقایسه با کودکان عادی بیشتر در معرض بدرفتاری ها و سوء استفاده های مختلف مانند سوء استفاده جنسی، سوء استفاده فیزیکی، سوء استفاده روان شناختی و بی توجهی قرار دارند. این افراد نسبت به کودکان شنوا تا میزان ۲ تا ۳ برابر بیشتر در معرض خطر بدرفتاری های مختلف قرار دارند (حسین خانزاده، ۱۳۸۹) که این مسئله احتمال بروز مشکلات سلامت روان را در آنها در طول زندگی افزایش می دهد. بی تردید عواملی مانند فزونی مشکلات عضوی، مشکلات رفتاری، تأخیر در دسترسی به خدمات، عوامل مرتبط با شکست تحصیلی و سوء استفاده های مختلف، توجیه کننده فزونی مشکلات سلامت روانی در افراد با آسیب شنوایی است (دیدفیو و فرگوسن، ۲۰۰۳)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "میزان شیوع مشکلات سلامت روان در افراد با آسیب شنوایی بر اساس مطالعه هایندلی و همکاران (۱۹۹۴)، ۳۱ درصد؛ هایندلی (۲۰۰۰)، ۴۰ تا ۵۰ درصد در مقابل ۲۵ درصد در جمعیت عادی؛ وان الدیک (۲۰۰۴)، ۴۳ تا ۵۰ درصد گزارش شده است. بر اساس مطالعه نتایج پژوهش های مختلف به طور کلی چهار دسته از عوامل میزان و شکل آسیب شنوایی، روش ارتباطی، موقعیت و عملکرد مدرسه، و مشارکت والدین در پیش بینی سلامت روانی افراد"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "با آسیب شنوایی مؤثرند. همچنین سن وقوع ناشنوایی، وجود معلولیت های اضافی، موقعیت آموزشی جداسازی شده یا تلفیقی، سن و جنس فرد ناشنوا نیز در کنش وری سلامت روانی افراد با آسیب شنوایی تأثیرگذار هستند (به نقل از حسین خانزاده، ۱۳۸۶)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "شناسایی و مداخله زودهنگام برای دانش آموزان ناشنوا یا دارای آسیب شنوایی شدید ضروری است. به دلیل این که مهارت های ارتباطی از نوزادی تحول می یابند، اگر ارائه خدمات تا زمان شروع مدرسه به تأخیر بیفتد باعث می شود که این دانش آموزان در مهارت های گفتاری، زبان شفاهی و خواندن دچار آسیب های جبران ناپذیری شوند. هدف برنامه های مداخله زودهنگام در دوره پیش دبستانی فقط آموزش دانش آموز نیست، بلکه آموزش مستقیم والدین و خانواده نیز جزء هدف های اصلی این برنامه هاست. به طور خاص والدین شنوایی که فرزندشان ناشنواست یا اختلال شنوایی شدید یا عمیق دارد به برنامه های حمایتی زیادی نیاز دارند. احتمالا این والدین با زبان اشاره آشنا نیستند یا نمی دانند که فرزندشان به جنبه های دیداری محیط وابسته است نه جنبه های شنیداری."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "والدین شنوایی که فرزند ناشنوا دارند، نسبت به فرزند خود دید منفی تری دارند، در حالی که والدین ناشنوا نسبت به فرزند ناشنوای خود دید مثبت تری دارند. در نتیجه والدین شنوا ممکن است وضعیت فرزند خود را ناگوارتر از آنچه هست توصیف کنند (هالاهان و کافمن، ۲۰۰۶). برنامه های مداخله زودهنگام باید به دانش آموز دارای اختلال شنوایی کمک کنند تا در ساختار خانواده پرورش یابد. برای بهبود تحول کودک، والدین باید تحول طبیعی را بشناسند و از توانایی های کودک نیز آگاه باشند. والدین باید مهارت های مورد نیاز را بیاموزند تا بتوانند به تحول کودک کمک کنند. اساسی ترین مهارت هایی که والدین باید یاد بگیرند عبارتند از: مهارت در ایجاد ارتباط، آگاهی از تحول زبانی و انتقال خودپنداشت مثبت به دانش آموز. برنامه های پیش دبستانی نیز برای دانش آموزان دارای اختلال شنوایی اهمیت دارند. این برنامه ها به بسیاری از دانش آموزان دارای اختلال شنوایی کمک می کنند تا با دانش آموزان شنوا و سخت شنوا ارتباط برقرار کنند. دانش آموز می تواند به کمک این برنامه ها مهارت های زیر را یاد بگیرد: مهارت فعالیت در گروه؛ قواعد تعامل در گروه مانند نحوه بازی کردن، همکاری کردن و رعایت نوبت؛ و مهارت های اجتماعی مختلف که برای موفقیت در تحصیل ضروری هستند. برنامه های پیش دبستانی برای دانش آموزان و والدین فرصتی"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "فراهم می کنند تا بتوانند زبان اشاره را تمرین کنند، به دانش آموزان کمک می کنند تا با آموزش شنیداری و سمعک یاد بگیرند از باقیمانده شنوایی خود استفاده کنند و مهارت های خواندن و ریاضیات خود را بهبود بخشند (کرک، آناستازیو و کلمن، ۲۰۰۶)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "روش های برقراری ارتباط را می توان در سه مقوله روش های دستی (آنها که بر استفاده از ایما و اشاره تأکید می کنند)، روش های شفاهی (آنها که بر گفتار تأکید دارند)، و ارتباط کلی یا همزمان (زبان اشاره و گفتار به صورت همزمان استفاده می شوند) تقسیم نمود."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "در روش های دستی بر انتقال اطلاعات از طریق زبان اشاره تأکید می شود. ارتباط دستی برای ارائه واژه ها از دو شیوه مختلف استفاده می کند. روش نخست، هجی کردن با انگشتان یا هجی کردن واژه ها، حرف به حرف با استفاده از الفبای دستی است که در آن هر شکل دست مطابقت یک به یک با الفبای نوشتاری دارد. اگرچه هجی کردن با انگشتان روش کارآمد و دقیقی است، با این حال کم اثرترین شکل ارتباط دستی است. در این روش هر حرف و هر واژه باید ایجاد شود که موجب می شود این روش نسبتاً روش ارتباطی مشکلی باشد. امروزه، هجی کردن با انگشتان برای بیان اسامی خاص، اصطلاحات فنی و رویدادهای بدون اشاره به عنوان مکمل تمام شکل های ارتباط دستی استفاده می شود. روش دوم، ارائه واژه یا مفاهیم از راه اشاره است. اشاره ها به جای بیان تک تک حروف، اندیشه یا واژه کامل را بیان می کنند. هر اشاره دارای چهار ویژگی است: ۱) مکان دست ها، ۲) شکل دست ها، ۳) حرکت دست ها در موقعیت های گوناگون و ۴) جهت کف دست ها."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "بیان و دریافت زبان از راه اشاره یا حرکات ممکن است در برگیرنده زبان اشاره رسمی باشد، مانند زبان اشاره آمریکایی یا زبان اشاره فرانسوی، کشورها و زبان های مختلف دارای زبان اشاره متفاوتی هستند. در چنین مواردی، زبان اشاره دارای ساختار دستوری و گنجینه واژگان مخصوص به خود است و از گرامر آن زبان پیروی نمی کند. پژوهش نشان داده است زبان اشاره آمریکایی زبانی کامل و مستقل است که تمام ویژگی های یک زبان واقعی را دارد و"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "صرفاً برگردان اشاره زبان انگلیسی نیست. در زبان اشاره آمریکایی حالت ها چهره و زبان بدن می توانند معانی گوناگون را منتقل کنند و چنانچه برای واژه یا مفهومی خاص اشاره ای وجود نداشت باشد از الفبای دستی استفاده می شود. کودکانی که باقیمانده شنوایی اندکی دارند یا آنهایی که بهره ناچیزی از سمعک می برند اغلب در استفاده از این روش موفق عمل می کنند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "زبان اشاره از حرکت های بیانگر برای بیان کلمات، ایده ها و مفاهیم استفاده می کند. برخی اشاره ها تصویری هستند! یعنی شبیه به آن چیزی هستند که بیان می کنند، اما بیشتر اشاره ها تصویری نیستند. زبان های اشاره مختلفی وجود دارند. زبان اشاره آمریکایی، زبان جامعه ناشنوایان آمریکا و کاناداست. برآورد می شود که زبان اشاره آمریکایی بیش از ۶۰۰۰ اشاره مختلف دارد. مدافعان این رویکرد معتقدند که زبان اشاره، زبان طبیعی افراد ناشنوا محسوب می شود. زبان اشاره آمریکایی یک گونه زبانی معتبر است که قواعد ترکیب شناختی، معناشناختی و کاربردشناختی مخصوص به خود دارد (ترن بال و همکاران، ۲۰۰۴). شکل و حرکت دست ها، شدت حرکت ها و حالت های چهره، همگی معانی و اطلاعات را منتقل می کنند. فضا و حرکت، عناصر زبانی به شمار می آیند. قواعد زبان اشاره آمریکایی با انگلیسی گفتاری متفاوت است. ترجمه زبان اشاره آمریکایی شبیه به ترجمه زبان خارجی است. بیشتر دانش آموزان ناشنوا زبان اشاره آمریکایی را از دانش آموزان مدارس شبانه روزی یاد می گیرند، نه از والدین خود که معمولاً شنوا هستند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "در سال های اخیر برای آموزش کودکانی که کاهش شنوایی چشمگیری دارند، توجه زیادی به استفاده از رویکرد دو زبانی - دو فرهنگی شده است. این رویکرد در کشورهایی که زبان اولیه آنها زبان اشاره آمریکایی است، پیروان زیادی دارد. در این رویکرد کودک برای برقراری ارتباط از زبان اشاره آمریکایی به عنوان زبان نخست استفاده می کند، سپس همچنان که مهارت های خواندن و نوشتن خود را کامل می کند انگلیسی را در مدرسه می آموزد. فرض بر این است اگر نخست نظامی زبانی برای اندیشیدن و بیان در کودک تحول پیدا کند، مهارت های پایه برای یادگیری مهارت های مشابه در زبان دوم منتقل می شوند. منطق اولیه این روش این واقعیت است که کودکان ناشنوای دارای والدین ناشنوا (که از زبان اشاره آمریکایی استفاده"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "می کند، در مقایسه با کودکان ناشنوای والدین شنوا، اغلب عملکرد زبانی و سوادآموزی بهتری دارند. بنابراین هدف این رویکرد این است که دانش آموزان با این روش تبدیل به بزرگسالانی می شوند که به دو زبان تسلط دارند: زبان اشاره آمریکایی که زبان اولیه آنها است و زبان رایج مدرسه ای."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "در مقابل روش های دستی، روش هایی که بیشتر بر انتقال زبان از راه گوش دادن و حرف زدن تمرکز می کنند به عنوان روش های شفاهی شناخته می شوند. چندین رویکرد مختلف برای ارتباط از راه گوش دادن و حرف زدن وجود دارد که عبارتند از: شنیداری/ کلامی و شنیداری/ شفاهی."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "رویکرد شنیداری/ کلامی با تأکید بر اهمیت تجویز زودهنگام سمعک مناسب یا دیگر شنیدارافزارها، به کودک کمک می کند از باقیمانده شنوایی تقویت شده اش برای تحول زبان و گفتار استفاده کند. در این روش کودک به گوش دادن صحبت دیگران تشویق می شود و گفتارخوانی (لب خوانی) به طور رسمی آموخته نمی شود. اگرچه تماس چشمی خوب مهم است معلم و والدین توجه کودک را به چهره یا دهان گوینده متوجه نمی کنند. با هدایت پیوسته توجه کودک به گوش دادن به صداها و آواها، شنوایی بخشی از تجربه کودک می شود. وقتی گوش دادن بخش یکپارچه ای از تمام تجربیات کودک شد، کودک ممکن است از سرنخ های دیداری (گفتارخوانی) هر اندازه که لازم باشد استفاده کند. در حقیقت چون هیچ توجه ویژه ای به گفتارخوانی نشده است، کودک از گفتارخوانی به طور طبیعی استفاده می کند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "سمعک، پرکاربردترین فناوری برای افراد دارای اختلال شنوایی است. دهها نوع سمعک وجود دارند. سمعک صداها را تقویت می کند تا به شخص کمک کند صداها را بهتر بشنود. برخی سمعک ها صداهایی را تقویت می کنند که فرکانس آن ها در دامنه صداهای گفتاری قرار دارد. سمعک های دیگر صداهای دارای فرکانس های پایین، متوسط یا بالا را (متناسب با نقص شنوایی فرد) تقویت می کنند. برخی سمعک ها در کانال گوش و برخی نیز در پشت گوش قرار می گیرند. سمعک ها آگاهی فرد را از صداها افزایش می دهند و همچنین صداها را بلندتر می کنند نه واضح تر. فردی"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "که سمعک می زند باید صدای تقویت شده را بفهمد. هر چه کودک سریع تر با سمعک سازش یابد، زودتر می تواند از سمعک برای یادگیری و آگاهی از صداهای محیطی استفاده کند. مدافعان تقویت صدا معتقدند که سمعک باید در تمام روز استفاده شود تا کودک بتواند همه صداها را بشنود، نه فقط صداهای گفتاری را (هیورد، ۲۰۰۶)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "از آن جا که در رویکرد شنیداری/کلامی، استفاده از باقیمانده شنوایی به حداکثر می رسد کودک می تواند با استفاده از زبان و گفتار شفاهی ارتباط برقرار کرده و از به کارگیری هر ایما یا اشاره طبیعی صرف نظر کند. از این رو کودک برای موفقیت در این روش باید شنوایی قابل استفاده داشته باشد. هدف برنامه های شنیداری/کلامی، عادی سازی کودک در برنامه های آموزش عادی در زودترین زمان ممکن است. عادی سازی در برنامه های آموزش عادی می تواند مهارت های اجتماعی کودک را بالا برده و او را در تحول الگوهای طبیعی گفتار و زبان توانا سازد. این روش اغلب برای والدین خوشایند است که شنوایی طبیعی دارند، چون آن ها را قادر می سازد با کودکانشان با استفاده از روش طبیعی، ارتباط برقرار کنند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "رویکرد شنیداری/شفاهی بسیاری از فلسفه های برنامه شنیداری/کلامی (تجویز زودهنگام سمعک مناسب، استفاده از باقیمانده شنوایی، گفتار به عنوان روش اولیه ارتباط، و در نهایت عادی سازی) را دارا است اما تفاوت آن با رویکرد شنیداری/کلامی در انتقال زبان و تشویق کودک به گفتارخوانی (لب خوانی) برای تکمیل اطلاعات شنیداری است. همچنین، برنامه های شنیداری/شفاهی از نظر عادی سازی نیز تا اندازه ای متفاوتند. در حالی که رویکرد شنیداری/کلامی برای بالا بردن مهارت های اجتماعی طرفدار عادی سازی زودهنگام در برنامه های آموزش عادی (کودکستان عادی) است و بهترین راه عادی سازی موفق را قرار گرفتن در معرض قرار گرفتن الگوهای گفتار طبیعی می داند، برنامه های شنیداری/شفاهی بر این باورند بهترین راه عادی سازی موفق از راه آموزش ویژه زود هنگام است. در برنامه شفاهی/شنیداری تا زمانی که والدین و آموزگاران حس نکنند کودک برای عادی سازی آماده است کودک از خدمات آموزش ویژه بهره مند می شود و در برنامه آموزشی که از نظر تحولی برایش مناسب است همراه با تأکید بر تحول مهارت های گفتارخوانی، گفتار، زبان، و شنیدن شرکت می کند. گفتارخوانی معادلی است که اخیراً جایگزین لب خوانی شده است، زیرا گفتارخوانی چیزی"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "بیش از نگاه کردن به لب های گوینده است. در عوض، مشاهده دقیق کل چهره گوینده به لب خوان کمک می کند تا پیام را بفهمد. نشانه های دیداری به تمیز برخی صداها بیشتر کمک می کند. باقیمانده شنوایی، آشنایی با گوینده، و آشنایی با بافت پیام موجب می شوند توانایی درک گفتار افزایش یابد. دانش آموزان باید گفتارخوانی را یاد بگیرند. به سبب این که بسیاری از صداها و کلمات شبیه به هم تلفظ می شوند و افراد از حرکت ها و حالت های چهره ای متفاوتی استفاده می کنند، یادگیری گفتارخوانی دشوار و خسته کننده است."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "گفتار نشانه ای بر یادگیری و استفاده از مجموعه خاصی از علائم استوار است و مکمل گفتار شفاهی به شمار می آید. گفتار نشانه ای (که اندکی از کودکان دارای کاهش شنوایی عمیق از آن استفاده می کنند) روشی ارتباطی است که در آن برای تکمیل گفتارخوانی از علائم دست مبتنی بر نظام واج شناختی استفاده می شود. بنابراین، گوینده، هنگامی که صحبت می کند همزمان پیام را سرنخ دهی می کند. نشانه دست به خودی خود غیرقابل تفسیر است اما هنگامی که با نشانه دیداری/ شنیداری همراه شود سرنخ هایی درباره ویژگی های غیرقابل دیدن محرک شفاهی (مثلا واکداری در مقابل بی واکی) فراهم می کند و موجب تشخیص واج های هم دید از یکدیگر می شود، از این رو بازشناسی گفتار را افزایش می دهد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "این علائم با زبان اشاره یا هجی کردن با انگشتان متفاوتند. برای ایجاد علائم، شخص در هنگام صحبت کردن دستانش را در نزدیکی چانه اش حرکت می دهد. این علائم به تنهایی به کار نمی روند، بلکه با گفتار شفاهی استفاده می شوند. در اصل، هشت حالت دست، نشان دهنده صامت ها و چهار حالت دیگر در اطراف دهان و چانه نشان دهنده مصوت ها هستند. حالت دست و محل آن در نزدیکی دهان و چانه نشانه هایی فراهم می کند تا شنونده بتواند پیام شفاهی را بهتر درک کند. هر چند این سیستم تا حدودی در سطح جهان رواج دارد، اما افراد سخت شنوا و مربیان آمریکایی هرگز آن را نپذیرفته اند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "ارتباط کلی، فقط یک روش ارتباطی برای آموزش کودکان ناشنوا نیست، که فلسفه ای است شامل استفاده از تمامی روش ها برای برقراری ارتباط شامل ترکیب گفتار، نوشتار، اشاره ها، ایماها، گفتارخوانی، استفاده از شنیدارافزا و برحسب شرایط، دیگر روش هایی که فرد می تواند برای برقراری ارتباط از آن ها کمک بگیرد. فلسفه ارتباط کلی، حق هر کودک ناشنوا یا سخت شنوا را برای برقراری ارتباط با هر روشی که سودمند تشخیص داده شود به رسمیت می شناسد. در برخی موارد، گفتار ممکن است در پیام تأکید شود و در موارد دیگر اشاره ممکن است مورد تأکید قرار بگیرد. به طور معمول استفاده از اشاره ها مطابق ساختار نحوی زبان شفاهی، رمزگذاری با دست نامیده می شود. در این روش آنچه در زبان شفاهی گفته می شود اشاره می شود. برای نمونه، وقتی پسری می گوید: \"گربه موش را گرفت.\" به ترتیب \"گربه\"، \"موش\"، \"را\"، \"و\" گرفت را اشاره خواهد کرد. روش روچستر که عبارت است از استفاده همزمان از گفتار و هجی کردن با انگشتان از جمله روش های رمزگذاری شده با دست است. روش ارتباط کلی برای دانش آموزان، آزادی عمل بیشتری را فراهم می کند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "وسایل کمکی که مخصوص دانش آموزان دارای نقص شنوایی ساخته شده اند شامل سمعک و سیستم های تقویت صدا هستند که در بخش های قبل توضیح داده شدند. در این بخش، فناوری پزشکی و کمکی را توضیح می دهیم، به ویژه در مورد کاشت حلزون، کامپیوتر، وسایل کمکی و وسایل زیرنویس و هشدار دهنده بحث خواهیم کرد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "کسانی که نقص شنوایی حسی-عصبی شدید تا عمیق دارند و نمی توانند با استفاده از سمعک اطلاعات شنیداری را دریافت کنند، می توانند از تکنیک کاشت حلزون بهره بگیرند. این روش شامل قرار دادن مجموعه ای الکترود در حلزون است. الکترودها به گیرنده ای وصل می شوند که صداها را می گیرد و آن ها را به تکانه الکتریکی رمزگردانی می کند. آن گاه الکترودها، تکانه الکتریکی را از طریق مسیرهای عصبی به مغز می فرستند تا پردازش شود. اگر این فرایند"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "موفقیت آمیز باشد، فرد می تواند صداهای محیطی مانند زنگ تلفن، بوق اتومبیل و سرو صدای ماشین ها را بشنود. علاوه بر این، کاشت حلزون می تواند به دانش آموزان دارای نقص شنوایی شدید و عمیق کمک کند تا گفتار را بهتر بیاموزند. کاشت حلزون، روشی جدید است و بحث هایی را نیز پدید آورده است. این روش گران است و اثر بخشی درازمدت آن هنوز مشخص نشده است. در مجموع کودکانی که کاشت حلزون داشتند، در درک، تأیید و وضوح گفتار پیشرفت بیشتری داشتند. نکته حائز اهمیت این است که پس از کاشت حلزون در سال های اولیه زندگی باید به کودک آموزش های فشرده داده شود. برخی اعضای جامعه ناشنوایان به دلایل بالا با روش کاشت حلزون مخالف هستند. علاوه بر این، آنها معتقدند که این روش به هویت فرهنگی ناشنوایان آسیب می زند و خودپنداشت آنها را به عنوان اعضای سالم و با کفایت جامعه تضعیف می کند. حتی برای کودکان ۱۸ ماهه می توان از کاشت حلزون استفاده کرد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "کامپیوترها و برنامه های آموزشی کامپیوتری به دانش آموزان دارای نقص شنوایی و نیز دانش آموزان شنوا در بازنمایی دیداری کمک می کنند. استفاده از کامپیوتر در کلاس های درس، دسترسی افراد به محتوای درسی و برقراری ارتباط با دیگران را تسهیل می نماید. علاوه بر این، برنامه های مخصوصی نیز برای دانش آموزان ناشنوا تهیه شده اند و به آنها کمک می کنند تا مهارت های خواندن و نوشتن را یاد بگیرند و بر هجی کردن با انگشتان و زبان اشاره تسلط پیدا کنند. در برنامه هجی کردن با انگشتان، کاربران دستکش ویژه ای می پوشند و حروف را هجی می کنند و کامپیوتر حروف هجی شده را به متن تبدیل می کند. مزیت این برنامه ها آن است که به اعضای خانواده و همسالان امکان می دهند تا مهارت ها را تمرین کنند؛ بدون این که برای نظارت بر جلسات تمرین، متخصصی حضور داشته باشد. افراد با آسیب شنوایی می توانند با استفاده از اینترنت در سایت های مختلف جستجو کنند و با دوستان و معلمان خود ارتباط برقرار کنند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "تا قبل از سال ۱۹۶۴ افراد با آسیب شنوایی نمی توانستند از تلفن استفاده کنند. تا این که رابرت ویتبرشت فیزیکدان آمریکایی که خود ناشنوا بود در سال ۱۹۶۴ دستگاهی برای برقراری ارتباط از طریق خط تلفن اختراع کرد و به تدریج ابزارهای ارتباط تلفنی برای ناشنوایان ساخته شد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "شدند. دورنویس ها یا وسایل ارتباط از راه دور برای ناشنوایان سیستم تلفنی هستند که به کاربران امکان می دهند تا پیامی را در تلفن تایپ کنند. این وسایل، تلفن های متنی نیز نامیده می شوند. شماره های خاص (مانند ۱۱۸) به افرادی که دورنویس یا وسایل ارتباط از راه دور ندارند کمک می کنند تا از طریق تلفن با افراد سخت شنوا ارتباط برقرار کنند. در این روش، اپراتورها نقش مترجم را بازی می کنند؛ آن ها پیام های نوشتاری را برای فرد شنوا می خوانند و پیام های گفتاری افراد شنوا را برای افراد ناشنوا تایپ می کنند. تعداد زیادی از شرکت ها و سازمان ها سیستم های تلفنی مخصوص به خود دارند و به اپراتور نیاز ندارند. قانون افراد آمریکایی دارای ناتوانی (۱۹۹۰) همه شرکت های مخابراتی را ملزم می کند تا خدمات ویژه را برای همیشه برای ناشنوا فراهم نمایند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "زیرنویس در این روش، گفتگوهای تلویزیونی و فیلم ها به صورت زیرنویس در صفحه تلویزیون نمایش داده می شوند. استفاده از این روش در فیلم و سایر برنامه های تلویزیونی به افراد با آسیب شنوایی کمک می کند تا گفتار را درک کنند. بیشتر برنامه های سرگرم کننده، ورزشی و خبری زیرنویس پنهان دارند؛ یعنی بینندگانی که تلویزیون آن ها به دستگاه رمزگشایی مجهز است می توانند زیرنویس ها را ببینند. از ژوئیه سال ۱۹۹۳ به بعد، همه تلویزیون های ۱۳ اینچ یا بزرگ تر که در آمریکا فروخته یا تولید شده اند به تراشه زیرنویسی مجهز هستند که به بینندگان امکان می دهند تا زیرنویس های برنامه ها را ببینند (هاردمن، درو و اگن، ۲۰۰۵). افراد دارای نقص شنوایی با استفاده از زیرنویس ها می توانند از رویدادها و مسائل اجتماعی روز آگاه شوند. بسیاری از افراد شنوا در محیط های پر سرو صدا از برنامه های زیرنویس شده استفاده می کنند. همچنین لازم به یادآوری است که معلمان در برنامه های آموزشی خود می توانند از فیلم های زیرنویس دار استفاده کنند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "بیشتر وسایل هشداردهنده ای که برای افراد شنوا ساخته شده اند تغییر یافته اند تا افراد سخت شنوا بتوانند از آن ها استفاده کنند. زنگ منزل و زنگ های دیگر به چراغ های هشداردهنده تبدیل شده اند. بالش های لرزاننده به صدای زنگ واکنش نشان می دهند و فرد ناشنوا را بیدار می کنند. علائم هشدار دهنده آتش، هم به صورت دیداری و هم شنیداری عمل می کنند. کاتالوگ هایی وجود دارند که حاوی انواع مختلف وسایل هشدار دهنده ابتکاری و پیشرفته هستند. این کاتالوگ ها را می توان از متخصصانی که به افراد دارای نقص شنوایی خدمات می دهند، درخواست کرد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "پس از پی بردن به این موضوع که زبان اشاره آمریکایی زبانی واقعی و مجزا است و تمام ویژگی های یک زبان واقعی مانند گویش، زبان عامیانه، وام گیری از دیگر زبان ها و ... را دارد و تنها برگردان اشاره ای زبان انگلیسی نیست مفهوم فرهنگ ناشنوایان شکل گرفت. برخی افراد، ناشنوایان را اقلیتی جداگانه می دانند و ناشنوایی را مشخصه فرهنگی آن اقلیت تلقی می کنند. آنهایی که به فرهنگ ناشنوایی باور دارند، ناشنوایی را \"صفت\" می دانند نه ناتوانی. توجیه این باور آن است که افراد ناشنوا، مانند افراد عضو سایر گروه های فرهنگی، ویژگی های جسمی مشترک (ناشنوایی و نقص شنوایی)، زبان مشترک (زبان اشاره) و نیازهای مشترک (تغییرات ویژه در فرایند ارتباط) دارند. مدافعان فرهنگ ناشنوایی هنگامی که به جمعیت خاص خودشان اشاره می کنند، حرف اول کلمه ناشنوا (Deaf) را به صورت بزرگ می نویسند. آنها واژه Deaf را به عنوان صفت به کار می برند؛ یعنی، افراد ناشنوا کسانی هستند که نقص شنوایی دارند. برخی از ناشنوایان اصطلاح افراد ناشنوا را به کار می برند تا بر پیوند فرهنگی شان تأکید کنند (ترن بال و همکاران، ۲۰۰۴). اعضای جامعه ناشنوایان، زبان اشاره آمریکایی را زبان اول کودک ناشنوا می دانند و معتقدند که انگلیسی، زبان دوم وی محسوب می شود. آنها ادعا می کنند که پس از این که کودک بر زبان اشاره آمریکایی تسلط یافت، انگلیسی را می توان به عنوان زبان دوم آموزش داد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "در اصطلاح فرهنگی اجتماعی، جامعه ناشنوایان دارای زبان و فرهنگ مشترک (فرهنگ ناشنوایان) است. فرهنگ ناشنوایان شامل زبان، ارزش ها، رفتارها، و سنت های افراد ناشنوا است. شاید زبان مشترک اعضای یک اقلیت فرهنگی مهم ترین ویژگی شناسایی آن فرهنگ باشد. بنابراین زبان اشاره آمریکایی مهم ترین ویژگی مشخصه مرتبط با فرهنگ ناشنوایان است. افراد ناشنوا زبان اشاره آمریکایی را به عنوان زبان انحصاری پذیرفته و تحسین می کنند و به فرهنگ ناشنوایان می بالند. البته تمام افراد دارای آسیب شنوایی خود را بخشی از فرهنگ ناشنوایان نمی دانند. علاوه بر استفاده و ارزش بالای زبان اشاره آمریکایی، فرهنگ ناشنوایان دارای ویژگی های ارزشی دیگری نیز هست. برای نمونه، اگرچه بسیاری از افراد ناشنوا از گفتار هنگام ارتباط با افراد دارای شنوایی بهنجار استفاده می کنند، فرهنگ ناشنوایان بهای زیادی به گفتار نمی دهد و در حقیقت حرف زدن را هنگام اشاره کردن رفتار مناسبی نمی داند. متخصصان دیگر بیان کرده اند که آموزش تلفیقی اغلب موجب جدایی دانش آموزان ناشنوا از جامعه ناشنوایان می شود و آن ها را در خطر انزوا، تنهایی و افسردگی قرار می دهد، زیرا ممکن است بتوانند تنها با عده کمی ارتباط برقرار کنند. اگر دانش آموزان ناشنوا بتوانند با دیگر افراد ناشنوا ارتباط پایداری ایجاد کنند، بیشتر احساس امنیت می کنند. در نتیجه بسیاری از افراد ناشنوا با همتایان خود ارتباط های گسترده ای برقرار می کنند. این ارتباط موجب انتقال زبان اشاره و یادگیری فرهنگ ناشنوایی می شود."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "افراد ناشنوا معمولاً (و نه همیشه) گرایش به ازدواج با دیگر افراد ناشنوا دارند و ترجیح می دهند کودکانی ناشنوا مانند خود داشته باشند. ارتباطات در جامعه ناشنوایان معمولاً همیشگی است و افراد ناشنوا نوعاً دوستی های دوران کودکی خود را حفظ می کنند. فعالیت های اجتماعی و گردهمایی ها روش مهم حفظ تماس، ارتباط، و تعامل با دیگر اعضای این فرهنگ است. در فرهنگ ناشنوایان ارزش بالایی برای سازماندهی افراد ناشنوا وجود دارد. برای نمونه، انجمن های ناشنوایان سازمان های مردم نهادی هستند که با فرهنگ ناشنوایان ارتباط تنگاتنگی دارند. آمریکا و کشورهای اسکاندیناوی (نروژ، فنلاند، دانمارک، سوئد، و ایسلند) کشورهایی هستند که فرهنگ ناشنوایان به طور فزاینده در آن ها به رسمیت شناخته شده است."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "در گذشته، انزوای خودخواسته ناشنوایان از جامعه شنوا نوعی مشکل اجتماعی در نظر گرفته می شد. برخی متخصصان، این انزوا را طبیعی می دانند که ناشی از پیوند مشترکی است که ناشنوایان از طریق زبان اشاره با هم برقرار کرده اند. با وجود این، زبان مشترک تنها یکی از"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "جنبه های این پیوند است. ریگان (۱۹۹۲) عواملی دیگری را ذکر می کند که ممکن است فرهنگ ناشنوایی را تأیید کنند. برای مثال، ناشنوایان یک گروه دو زبانه هستند که به زبان اشاره آمریکایی و زبان انگلیسی تکلم می کنند، مانند فرهنگ اسپانیایی که آنها نیز دو زبان مختلف دارند. در جامعه ناشنوایان، نگرش ها و تصوراتی وجود دارند که در جامعه شنوایان رایج نیستند، مانند این دیدگاه که اختلال های شنوایی بیماری یا ناتوانی نیستند و به درمان نیاز ندارند (پاگلیارو، ۲۰۰۱). اعضای جامعه ناشنوایان از همدیگر حمایت می کنند و معتقدند که با کار گروهی می توانند به بسیاری از منافع دست یابند، مانند دسترسی بیشتر به مشاغل مختلف، تصویب قانون برای زیرنویس کردن برنامه ها و فراهم بودن برنامه فناوری کمکی در مکان های عمومی. به سبب این که در مدارس شبانه روزی، ارزش های فرهنگی جامعه ناشنوایان به آسانی به افراد شنوا منتقل می شوند، نگرانی هایی در این باره وجود دارند که برخی سیاست گذاری ها مانند آموزش تلفیقی و جایدهی دانش آموزان ناشنوا در کلاس عادی به فرهنگ ناشنوایی آسیب بزند. عده ای تلاش می کنند دوره هایی درباره تاریخ و فرهنگ ناشنوایی برای دانش آموزانی برگزار کنند که از جامعه ناشنوایان دور بوده اند و در مدارس غیرشبانه روزی تحصیل کرده اند (گومستاد و کلووین، ۱۹۹۲). موافقان و مخالفان آموزش فرهنگی جداگانه ممکن است هیچ گاه نتوانند با هم کنار بیایند. دکتر کینگ جردن، رئیس دانشگاه گالودت و تنها رئیس ناشنوای دانشگاه در جهان، درباره اختلاف نظر متخصصان درباره فرهنگ ناشنوایی چنین می نویسد:"}, {"c": "فصل هشتم: آسیب شنوایی", "t": "هر برچسبی که گروه خاصی را تعریف می کند... گروه دیگری را نادیده می گیرد. در حالی که جامعه ناشنوایان افتخار فرهنگی در سطح جهان محسوب می شود، ممکن است برخی افراد ناشنوا را که خودشان را عضو این جامعه نمی دانند، نادیده بگیرد. ما همیشه در حال تعریف و تغییر خود بوده و به دنبال زبان جدیدی هستیم که نشان دهنده دیدگاه گسترده ما باشد (جردن، ۱۹۹۲؛ به نقل از امیری مجد، ۱۳۸۹)."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "انسان ها از دوران جنینی تا لحظه های احتضار می توانند بشنوند؛ بنابراین شنیدن نقش مهمی را در تحول فرد بازی می کند و آسیب شنوایی نیز بسته به شدت و زمان بروز، تحول فرد را در کنش های مختلف مواجه می سازد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "آسیب شنوایی اصطلاحی وسیعی است که افراد با آسیب های خفیف تا عمیق را در بر می گیرد و طبقه بندی های مختلفی از آن وجود دارد که عبارتند از: ناشنوا، سخت شنوا، ناشنوایی مادرزادی، ناشنوایی اتفاقی، ناشنوایی پیش زبانی، ناشنوایی پس زبانی. همچنین آسیب شنوایی را بر حسب سطح آستانه شنوایی نیز می توان به طبقه های خفیف، متوسط، نیمه شدید، شدید، و عمیق تقسیم کرد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "گوش از سه بخش بیرونی، میانی، و درونی تشکیل شده است. آسیب در هر یک از بخش های گوش باعث ایجاد آسیب شنوایی در فرد می گردد. شایع ترین علل نقص شنوایی پیش زبانی عبارتند از: سرخجه مادر، عامل وراثت، نارس بودن نوزاد و کم وزنی به هنگام تولد، عفونت های ویروسی و ویروس سایتومگال مادرزادی. همچنین از عوامل ایجاد کننده آسیب شنوایی پس از اکتساب زیان می توان به مننژیت، عفونت گوش میانی، نقش شنوایی ناشی از سر و صدا، و عوامل ناشناخته اشاره کرد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "با توجه به این که حس شنوایی نقش بسیار مهمی در تحول انسان بازی می کند، آسیب شنوایی بسته به شدت زمان بروز، تحول کنش های اساسی فرد را با تأخیرهای مهمی مواجه می سازد. به طور کلی افراد با آسیب شنوایی در درک زبان، تولید زبان و گفتار با دشواری هایی مواجه هستند. یادگیری گفتار و زبان شفاهی با شدت نقص شنوایی ارتباط مستقیم دارد. همچنین توانایی مفهومی افراد ناشنوا به علت مشکلات در زبان شفاهی، نارسا است. نکته مهم در ارزیابی هوشی افراد ناشنوا، استفاده از آزمون های عملکردی به جای آزمون های کلامی است. در صورت استفاده از آزمون های عملکردی، در هوشبر افراد عادی و ناشنوا، تفاوت قابل ملاحظه ای وجود ندارد."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "آسیب شنوایی بر روی توانایی تحصیلی افراد تأثیر عمده ای می گذارد. خواندن مهمترین حوزه ای است که آسیب می بیند. میزان تأثیر آسیب شنوایی بر پیشرفت تحصیلی، افراد، به شدت اختلال شنوایی، سن شروع نقص شنوایی، توانایی هوشی فرد، وضعیت اجتماعی - اقتصادی خانواده، و وضعیت شنوایی والدین بستگی دارد. افراد ناشنوا با توجه به مشکلات ارتباطی در معرض خطر تنهایی هستند. سازش یافتگی اجتماعی و شخصیتی دانش آموزان ناشنوا به میزان مهارت های ارتباطی آنها بستگی دارد. کودکان ناشنوایی که دارای والدین ناشنوا هستند نسبت به کودکان ناشنوای دارای والدین شنوا، از نمویافتگی اجتماعی بالاتری برخوردارند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "روش های برقراری ارتباط در افراد ناشنوا را می توان در سه مقوله کلی روش های دستی (تأکید بر ایما و اشاره)، روش های شفاهی (تأکید بر گفتار)، و ارتباط کلی یا همزمان (استفاده همزمان از زبان اشاره و گفتار) تقسیم نمود. در روش های دستی بر انتقال اطلاعات از طریق زبان اشاره تأکید می شود که به دو شیوه هجی کردن با انگشتان و استفاده از اشاره برای واژه ها یا مفاهیم صورت می گیرد. در روش های شفاهی بر انتقال زبان از راه گوش دادن و حرف زدن تأکید می شود. دو رویکرد مهم در روش های شفاهی عبارتند از رویکرد شنیداری/کلامی و رویکرد شنیداری/شفاهی. در نهایت این که در روش ارتباط کلی از تمامی روش ها مانند ترکیب گفتار، نوشتار، ایما و اشاره، گفتارخوانی و شنیدافزاها برای برقراری ارتباط استفاده می شود. روش ارتباط کلی برای دانش آموزان، آزادی عمل بیشتری را فراهم می کند."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "آخرین نکته در آموزش و توانبخشی افراد با آسیب شنوایی استفاده از فناوری های مختلف است. مهمترین فناوری ها عبارتند از: سمعک، کاشت حلزون، کامپیوترها، وسایل ارتباط کمکی، زیرنویس، و وسایل هشدار دهنده."}, {"c": "فصل هشتم: آسیب شنوایی", "t": "Extracted images (84): `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p10_1.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p10_2.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p11_1.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p11_2.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p12_1.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p12_2.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p13_1.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p13_2.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p14_1.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p14_2.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p15_1.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p15_2.jpg` `parsed-documents://20260708-121908-113543/فصل_۸_کودکان_با_نیا // ---------- Persian NLP helpers ----------
const STOP = new Set(("و در به از که این آن با را برای یا هم تا اگر ولی اما نیز چون یعنی اند است شد شود می ای بر بی هر چه چون چگونه چیست چیه چیزی چیزهایی نوع انواع مورد موارد وجود دارد دارند داشته باشد بین طور طوری کدام کدامیک کدامست کدامند های ها ست هستند بوده باشد باشند شده شده‌اند شده اند طبق دیگر گاه گاهی زیرا زیرا که کنید کنیم کنند کند کرد کردن کردند کند این‌که چنین همچنین البته اکنون کنون سپس نه بله می‌شود می‌شوند می‌کند می‌کنند می‌گیرد می‌گیرند قابل ممکن حالا حتی بیشتر کمتر بسیار خیلی همه هیچ باید نباید تنها فقط پس دیگری همان همانی آنان آنها ایشان او ما شما من تو خود خویش دو سه چهار پنج شش هفت هشت نه ده یکی برخی هرگز اگرچه چنان‌که چنانکه چه‌طور چطور کجا کجاست کی چه‌قدر چقدر چه‌گونه چهگونه بنا بنابر بنابراین بنابر این نسبت طور به‌طور بطور آنکه اینکه است.").split(/\s+/));

function normFa(s){
  return (s||"").toString()
    .replace(/[يى]/g,'ی').replace(/ك/g,'ک')
    .replace(/[\u064B-\u065F\u0670]/g,'')  // remove diacritics
    .replace(/[\u200c\u200f\u200e]/g,' ')
    .replace(/[«»"'`.,،؛;:!؟?()[\]{}<>\/\\—–\-*_]/g,' ')
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
}
function tokens(s){
  return normFa(s).split(' ').filter(w=>w && w.length>1 && !STOP.has(w));
}

// ---------- Build TF-IDF index ----------
const N = DATA.length;
const df = new Map();
const docs = DATA.map(p=>{
  const t = tokens(p.t);
  const tf = new Map();
  t.forEach(w=>tf.set(w,(tf.get(w)||0)+1));
  tf.forEach((_,w)=>df.set(w,(df.get(w)||0)+1));
  return {tf, len:t.length, norm:normFa(p.t)};
});
const idf = new Map();
df.forEach((v,w)=>idf.set(w, Math.log(1+(N-v+0.5)/(v+0.5))));

function scoreDoc(qTokens, qPhrase, i){
  const d = docs[i];
  if(!d.len) return 0;
  let s=0;
  qTokens.forEach(w=>{
    const f = d.tf.get(w); if(!f) return;
    const w_idf = idf.get(w)||0;
    s += w_idf * (f*2.2)/(f+1.2*(0.25+0.75*d.len/120));
  });
  // exact phrase bonus
  if(qPhrase && d.norm.includes(qPhrase)) s += 8;
  // partial phrase bonus (2-grams)
  for(let k=0;k<qTokens.length-1;k++){
    const bg = qTokens[k]+' '+qTokens[k+1];
    if(d.norm.includes(bg)) s += 2.2;
  }
  return s;
}

function retrieve(question, k=5){
  const qT = tokens(question);
  if(!qT.length) return [];
  const qP = normFa(question);
  const scored = [];
  for(let i=0;i<N;i++){
    const s = scoreDoc(qT, qP, i);
    if(s>0) scored.push([s,i]);
  }
  scored.sort((a,b)=>b[0]-a[0]);
  return scored.slice(0,k).map(([s,i])=>({score:s, ...DATA[i]}));
}

// ---------- Answer synthesis ----------
function splitSents(t){
  return t.split(/(?<=[.!؟?])\s+/).map(x=>x.trim()).filter(x=>x.length>15);
}
function stripFootnotes(t){
  return t.replace(/\s+\d+\s*$/,'').replace(/\s{2,}/g,' ').trim();
}
function sentenceScore(sent, qTokens){
  const st = normFa(sent);
  let s=0;
  qTokens.forEach(w=>{ if(st.includes(w)) s += (idf.get(w)||0.5)+0.3 });
  return s;
}

function synthesize(question, hits, mode){
  if(!hits.length || hits[0].score < 1.2){
    return {text:"پاسخ این پرسش به‌طور مشخص در متن این جزوه یافت نشد. لطفاً پرسش خود را با کلمات کلیدی متفاوت یا نزدیک‌تر به عنوان‌های فصل بازنویسی کنید.", refs:[]};
  }
  const qT = tokens(question);
  // gather sentences from top 3 hits, rank
  const pool = [];
  hits.slice(0,3).forEach(h=>{
    splitSents(h.t).forEach(s=>{
      pool.push({s:stripFootnotes(s), sc:sentenceScore(s,qT), c:h.c});
    });
  });
  pool.sort((a,b)=>b.sc-a.sc);
  const seen = new Set(); const picked = [];
  for(const p of pool){
    if(p.sc<=0) break;
    const key = p.s.slice(0,60);
    if(seen.has(key)) continue;
    seen.add(key); picked.push(p);
    if(picked.length>=6) break;
  }
  if(!picked.length){
    // fall back to first hit's first sentences
    splitSents(hits[0].t).slice(0,3).forEach(s=>picked.push({s:stripFootnotes(s), sc:1, c:hits[0].c}));
  }
  // order picked by their original order in source paragraph for coherence
  const orderMap = new Map();
  hits.slice(0,3).forEach(h=>{
    splitSents(h.t).forEach((s,idx)=>orderMap.set(stripFootnotes(s), (hits.indexOf(h)*100)+idx));
  });
  picked.sort((a,b)=>(orderMap.get(a.s)??0)-(orderMap.get(b.s)??0));

  const refs = [...new Set(hits.slice(0,3).map(h=>h.c))];
  let text;
  if(mode==='test'){
    // Test-style: extract key concept, present as MCQ-style answer
    const key = picked[0].s;
    const explanation = picked.slice(0,4).map(p=>p.s).join(' ');
    text = "پاسخ کلیدی: \n" + key + "\n\nتوضیح تشریحی (برگرفته از متن جزوه):\n" + naturalize(explanation, question);
  } else {
    const body = picked.map(p=>p.s).join(' ');
    text = naturalize(body, question);
  }
  return {text, refs};
}

function naturalize(body, question){
  // Insert soft connectors between sentences for smoother Persian flow
  const sents = body.split(/(?<=[.!؟?])\s+/).filter(Boolean);
  const conns = ['','همچنین ','افزون بر این، ','بر این اساس، ','در ادامه، ','از سوی دیگر، ','گفتنی است ',''];
  const out = sents.map((s,i)=>{
    if(i===0) return s;
    if(/^(همچنین|افزون|علاوه|بر این اساس|از سوی|در ادامه|گفتنی|همان‌طور|بنابراین)/.test(s)) return s;
    return conns[i%conns.length] + s;
  }).join(' ');
  // Intro based on question keywords
  let intro = '';
  const qn = normFa(question);
  if(/چیست|تعریف|به چه معنا|یعنی چه/.test(qn)) intro = 'بر پایه متن جزوه، ';
  else if(/چرا|علت|دلیل|چه دلیلی/.test(qn)) intro = 'مطابق آنچه در جزوه آمده است، ';
  else if(/چگونه|چطور|چه روش/.test(qn)) intro = 'در متن جزوه چنین توضیح داده شده است که ';
  else if(/انواع|طبقه|دسته|چند نوع/.test(qn)) intro = 'بر اساس دسته‌بندی ارائه‌شده در جزوه، ';
  else if(/ویژگی|خصوصیات|نشانه|علائم/.test(qn)) intro = 'ویژگی‌ها و نشانه‌های ذکرشده در جزوه عبارت‌اند از این که ';
  else intro = 'بر اساس متن جزوه، ';
  return intro + out;
}

function addMsg(who, content, refs){
  const wrap = document.createElement('div');
  wrap.className = 'msg '+who;
  const b = document.createElement('div');
  b.className = 'bubble';
  if(typeof content === 'string'){
    b.textContent = content;
  } else b.appendChild(content);
  if(refs && refs.length){
    const r = document.createElement('div');
    r.className='refs';
    r.textContent = 'منبع در جزوه: '+ refs.join(' · ');
    b.appendChild(r);
  }
  wrap.appendChild(b);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return b;
}

function typing(){
  const t = document.createElement('div');
  t.className='typing';
  t.innerHTML='<i></i><i></i><i></i>';

}

async function ask(question){

  addMsg('user', question);
  const bubble = addMsg('bot', typing());
  await new Promise(r=>setTimeout(r, 250));
  try{
    const hits = retrieve(question, 6);
    const {text, refs} = synthesize(question, hits, mode);
    bubble.textContent = text;
    if(refs.length){
      const r = document.createElement('div');
      r.className='refs';
      r.textContent = 'منبع در جزوه: '+ refs.join(' · ');
      bubble.appendChild(r);
    }
  }catch(e){
    bubble.textContent = 'خطا در پردازش: '+ e.message;
  }
  send.disabled=false; q.focus();
}

form.addEventListener('submit',e=>{
  e.preventDefault();
  const v = q.value.trim();
  if(!v) return;
  q.value=''; q.style.height='56px';
  ask(v);
});
q.addEventListener('keydown',e=>{
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); form.requestSubmit(); }
});
q.addEventListener('input',()=>{
  q.style.height='56px';
  q.style.height=Math.min(180,q.scrollHeight)+'px';
});
</script>
</body>
