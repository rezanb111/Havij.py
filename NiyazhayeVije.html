_اول_و_چهارم_کتاب_کودکان_و_نوجوانان_با_نیازهای_ویژه_تالیف_خانزاده_compressed.pdf/images/page_9.jpg`"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "☑ هدف های یادگیری از خواننده انتظار می رود پس از مطالعه مطالب این فصل بتواند: 1. تعریف اختلال نارسایی توجه / فزون کنشی را به همراه ریخت های مختلف آن و نشانه های تشخیصی بیان نماید 2. فرایند سنجش و تشخیص اختلال نارسایی توجه / فزون کنشی را شرح دهد 3. عوامل ایجادکننده اختلال نارسایی توجه / فزون کنشی را توضیح دهد 4. ویژگی های اختلال نارسایی توجه / فزون کنشی را به کامل بیان نماید 5. راهبردهای مختلف در درمان اختلال نارسایی توجه / فزون کنشی را شرح دهد"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "قانون آموزش افراد با ناتوانی، کودکان مبتلا به اختلال نارسایی توجه/ فزون کنشی را در طبقه جداگانه ای قرار داده است و از زمان تصویب مجدد قانون آموزش افراد با ناتوانی در سال ۱۹۹۷ و ۱۹۹۱، کودکان مبتلا به این اختلال، بسته به نشانه های اختلال در طبقه «دیگر اختلال های سلامتی»، ناتوانی های یادگیری، یا آشفتگی های هیجانی قرار گرفتند و از آموزش ویژه بهره گرفتند. اختلال نارسایی توجه/ فزون کنشی در همه گروه های فرهنگی، نژادی و اجتماعی - اقتصادی وجود دارد."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "افراد مبتلا به اختلال نارسایی توجه/ فزون کنشی ممکن است دارای رفتارهای تکانشی، بی قراری و نارسایی توجه باشند. آنها به سادگی دچار حواس پرتی می شوند و انرژی فراوانی دارند. دانش آموزان مبتلا به نارسایی توجه/ فزون کنشی در مدرسه با مشکلات قابل توجهی روبرو هستند و همیشه برای معلمان چالش برانگیز هستند. بنابراین با توجه به اهمیت موضوع و تعداد رو به فزونی کودکان مبتلا به اختلال نارسایی توجه/ فزون کنشی در مدارس، در این فصل به طور جداگانه به بررسی این اختلال پرداخته می شود."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "بیشتر متخصصان به ملاک های تشخیص انجمن روانپزشکی آمریکا برای تشخیص اختلال نارسایی توجه/ فزون کنشی استفاده می کنند. در طول سال ها محققان و متخصصان بحث کردند که آیا این اختلال یک نشانگان واحد است یا زیرمقوله های مختلفی از آن وجود دارد. در نتیجه نام این شرایط در طول زمان تغییر کرده است. برای مثال برای سالیان متعدد، انجمن روانپزشکی آمریکا از اصطلاح کلی «اختلال نارسایی توجه» برای همه افراد با این شرایط"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "استفاده کرده است. آن همچنین از زیرمقوله های «اختلال نارسایی توجه همراه با فزون کنشی» و «اختلال نارسایی توجه بدون فزون کنشی» استفاده کرده است (هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "راهنمای آماری و تشخیص اختلال های روانی در حال حاضر از اصطلاح نارسایی توجه/فزون کنشی به عنوان یک اصطلاح کلی استفاده کرده است و آن را به سه مقوله تقسیم کرده است: ۱) نارسایی توجه، غلبه بر نوع نارسایی توجه، ۲) نارسایی توجه/فزون کنشی، نوع فزون کنشی، غلبه بر نوع فزون کنشی و تکانشگری، و ۳) نارسایی توجه/فزون کنشی، نوع ترکیبی (انجمن روان پزشکی آمریکا، ۲۰۰۰)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "در جدول ۱-۵ ملاک های تشخیصی اختلال نارسایی توجه/فزون کنشی بر اساس چهارمین راهنمای آماری و تشخیص اختلال های روانی- متن تجدید نظر شده ارائه شده است:"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "جدول ۱-۵: ملاک های تشخیصی اختلال نارسایی توجه/فزون کنشی"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "الف) وجود مورد ۱ یا ۲ ۱. نارسایی توجه: شش مورد یا بیشتر از نشانه های نارسایی توجه را حداقل به مدت شش ماه و به شکل سازش نایافته و ناهماهنگ با سطح تحول نشان دهد: اغلب نمی تواند به جزئیات توجه کند و از روی بی دقتی در کارهای مدرسه، شغلی یا سایر فعالیت ها اشتباه می کند در انجام تکالیف و بازی ها اغلب نمی تواند توجهش را حفظ کند اغلب به نظر می رسد که وقتی به طور مستقیم مورد خطاب قرار می گیرد، نمی شنود اغلب اوقات از دستورالعمل ها پیروی نمی کند و از عهده اتمام تکلیف های مدرسه، وظایف شغلی یا سایر فعالیت ها برنمی آید (نه به خاطر رفتار تضادورزانه یا شکست در درک دستورالعمل ها) اغلب در سازماندهی تکالیف و فعالیت ها ناتوان است اغلب از مشارکت در تکالیفی که مستلزم فعالیت ذهنی مستمر است اجتناب کرده یا بیزاری و بی میلی نشان می دهد (مانند تکالیف مدرسه یا تکالیف خانه)"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "اغلب اشیای لازم برای تکالیف مدرسه، مداد، کتاب، تکالیف به راحتی توسط او گم می شود اغلب در فعالیت های روزمره فراموشکار است ۲. فزون کنشی - تکانشگری: شش مورد یا بیشتر از نشانه های فزون کنشی یا تکانشگری را حداقل به مدت شش ماه نشان دهد: فزون کنشی اغلب دست و پاهای خود را تکان می دهد یا در صندلی می لولد در کلاس یا دیگر موقعیت هایی که انتظار می رود فرد بنشیند، صندلی را ترک می کند اغلب در جاهایی که مناسب نیست می دود یا از در و دیوار بالا می رود (در نوجوانان یا بزرگسالان ممکن است به احساس بی قراری محدود شود) اغلب در بازی یا فعالیت های تفریحی نمی تواند آرام باشد اغلب در حال حرکت است یا انگار موتوری به او وصل است اغلب زیاد حرف می زند تکانشگری اغلب قبل از اینکه سوال تمام شود، پاسخ می دهد رعایت نوبت برای او دشوار است اغلب حرف دیگران را قطع می کند یا مزاحم کار دیگران می شود (مثلاً در گفتگوها یا بازی ها وارد می شود)"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "ب) برخی از نشانه های نارسایی توجه یا فزون کنشی-تکانشگری که موجب اختلال شده اند، قبل از ۷ سالگی وجود داشته اند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "پ) برخی از اختلال های ناشی از نشانه ها در دو یا چند موقعیت وجود دارند (مثلاً در مدرسه، کار یا خانه)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "ت) باید شواهد روشنی از اختلال بالینی در عملکرد اجتماعی، تحصیلی یا شغلی وجود داشته باشد."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "اغلب اشیای لازم برای انجام تکالیف و فعالیت ها را گم می کند (مانند اسباب بازی ها، تکالیف مدرسه، مداد، کتاب یا سایر ابزارها) اغلب به راحتی توسط محرک های نامربوط دچار حواس پرتی می شود در فعالیت های روزمره اغلب فراموشکار است. ۲. فزون کنشی - تکانشگری: شش مورد یا بیشتر از نشانه های فزون کنشی - تکانشگری زیر را حداقل به مدت شش ماه و به شکل سازش نایافته و ناهماهنگ با سطح تحول نشان دهد فزون کنشی اغلب دست و پاهایش بی قرار است و در حالت نشسته وول می خورد در کلاس یا دیگر موقعیت هایی که انتظار می رود یک جا بنشیند، اغلب صندلی خود را ترک می کند اغلب در جاهای نامناسب این طرف و آن طرف می رود یا بالا و پایین می پرد (در نوجوانان و بزرگسالان ممکن است به شکل احساس بی قراری باشد) اغلب در بازی کردن یا مشارکت در فعالیت های اوقات فراغت مشکل دارد اغلب در حال حرکت است و به نظر می رسد که توسط موتوری به حرکت در می آید اغلب زیاد حرف می زند تکانشگری اغلب قبل از تمام شدن سوال ها، جواب می دهد رعایت نوبت برایش دشوار است اغلب حرف دیگران را قطع کرده یا مداخله می کند (به عنوان مثال وسط گفتگو یا بازی دیگران وارد می شود) ب) برخی از نشانه های فزون کنشی - تکانشگری یا نارسایی توجه منجر به اختلال قبل از ۷ سالگی وجود داشته باشد پ) برخی از این نشانه در دو موقعیت یا بیشتر دیده می شوند ت) باید شواهد آشکار درباره آسیب بالینی معنادار از لحاظ کنش وری اجتماعی، تحصیلی یا شغلی وجود داشته باشد"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "ث) نشانه ها منحصراً در طی دوره اختلال فراگیر تحولی، یا با دیگر اختلال های سایکوتیک رخ نمی دهد یا نمی توان آن را با تشخیص اختلال روانی دیگر (مانند اختلال خلقی، اختلال اضطرابی، اختلال تجزیه ای، یا اختلال شخصیت) بهتر تبیین نمود."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "کدگذاری بر اساس نوع: اختلال نارسایی توجه/فزون کنشی، نوع مرکب: اگر در شش ماه گذشته ملاک الف (۱ و ۲) وجود داشته باشد. اختلال نارسایی توجه/فزون کنشی، غلبه بر نارسایی توجه: اگر در شش ماه گذشته ملاک الف یک وجود داشته باشد، ولی ملاک الف دو وجود نداشته باشد. اختلال نارسایی توجه/فزون کنشی، غلبه بر فزون کنشی - تکانشگری: اگر در شش ماه گذشته ملاک الف دو وجود داشته باشد، ولی ملاک الف یک وجود نداشته باشد. یادآوری: برای افرادی (به خصوص نوجوانان و بزرگسالان) که در حال حاضر نشانه هایی دارند که با ملاک های مطرح شده مطابقت کامل ندارد باید عبارت \"بهبودی نسبی\" ذکر شود."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "لازم به یادآوری است که اختلال نارسایی توجه/فزون کنشی اغلب با سایر مشکلات رفتاری و یادگیری در فرد وجود دارد. دو نمونه از اختلال های همبود با اختلال نارسایی توجه/ فزون کنشی عبارتند از ناتوانی یادگیری و اختلال های هیجانی - رفتاری. مطالعات با استفاده از ملاک های تشخیصی دقیق، همپوشی ۱۰ تا ۲۵ درصد را بین نارسایی توجه/فزون کنشی و ناتوانی های یادگیری نشان دادند (فورنس و کاوال، ۲۰۰۲). برخی متخصصان مطرح کردند که رابطه بین ناتوانی های یادگیری و اختلال نارسایی توجه/فزون کنشی که غلبه بر نارسایی توجه است، نسبت به ریخت های دیگر بیشتر است. همچنین نتایج تحقیقات مختلف حاکی از آن است که همپوشی بین اختلال نارسایی توجه/ فزون کنشی با برخی شکل های اختلال هیجانی/ رفتاری از ۲۵ تا ۵۰ درصد است (فورنس و کاوال، ۲۰۰۲). برخی افراد مبتلا به نارسایی توجه/فزون کنشی، رفتارهای"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "فصل پنجم: نارسایی توجه/ فزون کنشی و برون ریزی را نشان می دهند که همراه با اضطراب و افسردگی است."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "میزان شیوع میزان شیوع اختلال نارسایی توجه/ فزون کنشی یک سوم تا یک دوم موارد ارجاعی به کلینیک ها است (ریچترز و همکاران، ۱۹۹۵). در جمعیت سنین مدرسه مبتلا به اختلال های سلامت روان، ۲۰۰۳). با این حال، نارسایی توجه/ فزون کنشی را به عنوان شایع ترین اختلال این که چه تعداد دانش آموزان خدمات ویژه دریافت می کنند، دشوار است. در هر صورت نتایج مطالعات مختلف (دالی، ۲۰۰۴). بر اساس ملاک های DSM-IV، شیوع متغیر است. اختلال نارسایی توجه/ فزون کنشی، نوع فزون کنشی - تکانشگری کمتر از نوع مرکب است (ایگان، ۲۰۰۶). این اختلال در پسران ۳ تا ۹ برابر بالاتر (بارکلی، ۲۰۰۳) است. بیشتر به عنوان اختلال دوران کودکی شناخته می شود، کمتر به عنوان نارسایی توجه در بزرگسالی که گرایش دارند نوع"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "پرخاشگرانه و برون ریزی را نشان می دهند، در حالی که برخی دیگر از آنها رفتارهای گوشه گیرانه را که همراه با اضطراب و افسردگی است نشان می دهند (هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "**میزان شیوع** میزان شیوع اختلال نارسایی توجه/ فزون کنشی روز به روز در حال افزایش است. در حدود یک سوم تا یک دوم مواردی که به کلینیک های راهنمایی ارجاع داده می شوند، برای همین اختلال است (ریچترز و همکاران، ۱۹۹۵). بیشتر مؤلفان برآورد کردند که سه تا پنج درصد جمعیت سنین مدرسه مبتلا به اختلال نارسایی توجه/ فزون کنشی هستند (انستیتوی ملی سلامت روان، ۲۰۰۳). با این حال چون دپارتمان آموزش و پرورش ایالات متحده، نارسایی توجه/ فزون کنشی را به عنوان یک مقوله مجزای آموزش ویژه در نظر نگرفته است، برآورد این که چه تعداد دانش آموز مبتلا به نارسایی توجه/ فزون کنشی در آموزش ویژه خدمات دریافت می کنند، دشوار است."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "در هر صورت نارسایی توجه/ فزون کنشی رایج ترین اختلال در دوره کودکی است (دالی، ۲۰۰۴). بر اساس برخی دیدگاه ها، ریخت های مختلف اختلال نارسایی توجه/ فزون کنشی دارای شیوع متفاوت هستند، به طوری که بیشتر از نیمی از افراد مبتلا، نوع ترکیبی نارسایی توجه/ فزون کنشی، ۲۷ درصد مربوط به نوع نارسایی توجه، و ۱۸ درصد مربوط به نوع فزون کنشی - تکانشگری را دارا هستند (مک برنت، ۱۹۹۵؛ به نقل از هاردمن، درو و ایگان، ۲۰۰۶)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "این اختلال در پسرها با فراوانی بیشتری نسبت به دخترها رخ می دهد؛ یعنی نسبت ۵ به ۱ یا بالاتر (بارکلی، ۱۹۹۸). این میزان شیوع منجر به این پیشنهاد شده است که پسرها ممکن است بیشتر به عنوان نارسایی توجه/ فزون کنشی شناسایی شوند و یا دخترها ممکن است کمتر به عنوان نارسایی توجه/ فزون کنشی شناسایی شوند. برخی نیز مطرح کردند که پسران گرایش دارند نوع غلبه بر فزون کنشی یا تکانشگری را اغلب اوقات نشان دهند، ولی نوع غلبه"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "نارسایی توجه در دختران بیشتر است. بارکلی (۱۹۹۸) بر این باور است که تفاوت های جنسیتی احتمالا ناشی از تفاوت های سرشتی یا زیست شناختی است."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "**سنجش** فرآیند سنجش و تشخیص اختلال نارسایی توجه/فزون کنشی باید توسط متخصصان حوزه پزشکی، روان شناسی و آموزش صورت گیرد؛ بنابراین متخصصان بر این باورند که چهار مؤلفه مهم داده های مختلف در تشخیص، بیشتر متخصصان در دانش آموز در نظر گرفته باید برای سنجش و تشخیص اختلال نارسایی توجه/فزون کنشی در دانش آموز در نظر گرفته شود: معاینه پزشکی، مصاحبه بالینی، مقیاس درجه بندی معلم و والدین، و مشاهدات رفتاری. معاینه پزشکی برای بررسی شرایط پزشکی مانند تومورهای مغزی، مشکلات تیروئید، یا اختلال های صرع به عنوان علت نارسایی توجه و یا فزون کنشی ضروری است (بارکلی، ۱۹۹۸). مصاحبه بالینی با والدین و کودک اطلاعاتی را درباره ویژگی های جسمانی و روان شناختی و پویایی های خانواده و تعاملات با همسالان فراهم می کند. اگرچه که مصاحبه برای تشخیص نارسایی توجه/فزون کنشی ضروری است، با این حال متخصصان بالینی باید ماهیت غیرطبیعی موقعیت مصاحبه را در نظر بگیرند. برخی کودکان مبتلا به این اختلال می توانند به طور شگفت انگیزی در موقعیت سازمان یافته و جدید مطب دکتر، به صورت بهنجار رفتار کنند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "متخصصان همچنین برخی مقیاس های درجه بندی را برای والدین و معلمان فراهم کردند که معروف ترین آن ها مقیاس درجه بندی نارسایی توجه/فزون کنشی است که توسط کانرز تهیه شده است و ویرایش های مختلفی از این مقیاس برای معلمان و والدین وجود دارد (کانرز، ۱۹۸۹ الف و ب و ۱۹۹۷). مقیاس درجه بندی نارسایی توجه/فزون کنشی - ویرایش چهارم (دیوپال و همکاران، ۱۹۹۸) بر اساس ملاک های چهارمین راهنمای آماری و تشخیص اختلال روانی ساخته شده است (به نقل از هالا هان و کافمن، ۲۰۰۹)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "در صورت امکان متخصص بالینی باید دانش آموز را از لحاظ رفتاری مشاهده کند. این کار می تواند در کلاس درس صورت گیرد یا این که متخصص بالینی که در تشخیص و درمان کودکان نارسایی توجه/فزون کنشی تخصص دارد، اتاق های خاصی را در مرکز خود در نظر می گیرد و به دانش آموز تکالیفی برای انجام در آن اتاق ارائه می دهد که مستلزم حفظ توجه است."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "**سبب شناسی** دیدگاه های مختلفی درباره سبب شناسی اختلال نارسایی توجه/فزون کنشی وجود دارد. عوامل متعددی در ایجاد این اختلال نقش دارند مانند ساختار مغز، عوامل ژنتیکی و عوامل محیطی مختلف. متخصصان در اوایل و اواسط قرن بیستم نارسایی توجه و فزون کنشی را به مشکلات ناشی از صدمه مغزی نسبت می دادند. تحول تکنیک های تصویربرداری از نرون ها مانند MRI و PET به دانشمندان امکان داده است تا اندازه های مفصل تر و معتبرتری از کنش وری مغز به دست بیاورند. محققان با استفاده از این تکنیک ها شواهد زیادی را در ارتباط با پایه های عصب شناختی نارسایی توجه/فزون کنشی پیدا کردند. محققان نشان دادند که اختلال نارسایی توجه/فزون کنشی همانند ناتوانی های یادگیری با احتمال زیاد ناشی از نارساکنش وری عصب شناسی است تا آسیب مغزی واقعی. همچنین مشابه ناتوانی های یادگیری، شواهد حاکی از آن است که وراثت به همراه تراتوژن ها و سایر عوامل پزشکی، نقش بسیار مهمی را در ایجاد نارساکنش وری مغزی ایفا می کنند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "نتایج بررسی با استفاده از تکنیک های تصویربرداری از مغز نشان داده است که لوب های فرونتال، عقده های پایه و مخچه در افراد مبتلا به نارسایی توجه/فزون کنشی نابهنجار است (کاستلانو، ۲۰۰۱؛ کاستلانو و همکاران، ۲۰۰۲؛ تیچر و همکاران، ۲۰۰۰). به طور خاص محققان دریافتند که اندازه هر یک از این نواحی در کودکان و بزرگسالان مبتلا به نارسایی توجه/فزون کنشی نسبت به افراد عادی کوچک تر است. علاوه بر این نتایج اسکن های PET نشان داده است که فعالیت های متابولیکی در لب های فرونتال و عقده های پایه در افراد مبتلا به نارسایی توجه/فزون کنشی پایین است (لو و همکاران، ۱۹۸۴ و ۱۹۸۹؛ به نقل از هالا هان و کافمن، ۲۰۰۹). لب های فرونتال مسئول کنش های اجرایی هستند. کنش های اجرایی یعنی توانایی فرد در تنظیم رفتار خود. همچنین عقده های پایه مسئول هماهنگی و مهار رفتارهای حرکتی هستند (پینل، ۲۰۰۳). در نهایت این که مخچه نیز مسئول هماهنگی و مهار رفتار حرکتی است."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "نتایج تحقیقات گوناگون نشان داده است که نابهنجاری در انتقال دهنده های عصبی می تواند باعث اختلال نارسایی توجه/فزون کنشی گردد. انتقال دهنده های عصبی مواد شیمیایی"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "هستند که در ارسال پیام ها بین نورون ها در مغز نقش ایفا می کنند. محققان دریافتند که سطوح غیرعادی دو انتقال دهنده به نام های دوپامین و نوراپینفرین در اختلال نارسایی توجه/فزون کنشی نقش دارند (بارکلی، ۲۰۰۰؛ سولانتو، ۲۰۰۲)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "در مورد نقش عامل وراثت تاکنون هیچ ژن یا ژن های مشخصی که ممکن است در بروز نارسایی توجه/فزون کنشی نقش داشته باشند شناسایی نشد. بارکلی (۱۹۹۸) در بررسی مطالعات مختلف نتیجه گرفت که به طور کلی برادر یا خواهر کودک مبتلا به نارسایی توجه/فزون کنشی همین اختلال را دارا باشند. همچنین چندین مطالعه نشان داد که والدین کودکان مبتلا به نارسایی توجه/فزون کنشی در مقایسه با والدین کودکان بدون این اختلال، دو تا هشت برابر احتمال دارد که خود دارای این اختلال باشند (فاراواد و دویله، ۲۰۰۱). همچنین مطالعات بر روی دوقلوهای یک تخمکی و دوتخمکی نیز نشان داده است که اگر یکی از دوقلوهای یک تخمکی، مبتلا به نارسایی توجه/فزون کنشی باشد، با احتمال زیاد آن یکی نیز همین اختلال را دارا است. این احتمال در دوقلوهای یک تخمکی بیشتر از دوقلوهای دوتخمکی است."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "در نهایت این که تراتوژن ها و عوامل پزشکی نیز می توانند در ایجاد اختلال نارسایی توجه/فزون کنشی نقش ایفا کنند. تراتوژن ها عوامل سمی موجود در محیط هستند که در تحول طبیعی جنین اختلال ایجاد می کنند. سرب، دود سیگار و مصرف مشروبات الکلی توسط مادران باردار با بروز نارسایی توجه/فزون کنشی همبستگی دارند. هرچند که نقش مواد سمی به اندازه نقش وراثت در ایجاد نارسایی توجه/فزون کنشی نیست، با این حال تأثیر آن را نمی توان نادیده گرفت. شرایط پزشکی مانند عوارض هنگام تولد و کم وزنی به هنگام تولد با اختلال نارسایی توجه/فزون کنشی مرتبط هستند (میلبرگر و همکاران، ۱۹۹۷)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "**ویژگی ها** اگرچه که بسیاری از افراد فکر می کنند که نارسایی توجه ویژگی های اصلی اختلال نارسایی توجه/فزون کنشی است، با این حال اجماع رو به افزایشی وجود دارد که نارسایی توجه، فزون کنشی، و تکانشگری در واقع نتیجه مشکلات در بازداری رفتاری هستند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "**مدل بارکلی از نارسایی توجه/ فزون کنشی** حجم زیادی از پژوهش ها مشکلات در بازداری رفتاری را در افراد مبتلا به نارسایی توجه/ فزون کنشی نشان دادند (بارکلی، ۱۹۹۶، ۲۰۰۰، الف، ب؛ سمرود-کلیکمن و همکاران، ۲۰۰۰؛ ویلکات و همکاران، ۲۰۰۱). بارکلی مدل خاصی از تبیین نارسایی توجه/ فزون کنشی را ارائه کرد که بازداری رفتاری عامل اصلی آن است. این مدل بر اساس ساده ترین شکل بیان می کند که مشکلات در بازداری رفتاری مشکلاتی را در کنش های اجرایی و آگاهی و مدیریت زمان به وجود می آورد که در نتیجه توانایی فرد برای مشارکت در رفتارهای هدف محور پایدار مختل می گردد."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "۱) بازداری رفتاری: بازداری رفتاری شامل توانایی انجام دادن موارد زیر است: تأخیر در پاسخ دادن توانایی بازداری از تداوم پاسخ، در صورتی که فرد تشخیص دهد که پاسخ، به علت تغییرات ناگهانی در الزامات تکلیف نامناسب است. حفظ پاسخ در مقابل محرک های حواس پرت کن یا متناقض (لارنس و همکاران، ۲۰۰۲). مشکلات در بازداری رفتاری می تواند در توانایی فرد برای انتظار نوبت، خودداری از قطع کردن مکالمه دیگران، مقاومت در مقابل حواس پرتی های بالقوه در حین کار کردن، یا تأخیر در لذت جویی جهت به دست آوردن پاداش های درازمدت، منعکس گردد (تریپ و آل اوپ، ۲۰۰۱). علاوه بر این شواهد حاکی از آن است که مشکلات در بازداری رفتاری در کودکان مبتلا به نارسایی توجه/ فزون کنشی با نابهنجاری ها در هسته دمی مغز ارتباط دارد (سمرود-کلیکمن و همکاران، ۲۰۰۰)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "۲) کنش های اجرایی: توانایی مشارکت در رفتارهای خودهدایت شده به عنوان کنش های اجرایی ارجاع داده می شود. کنش های اجرایی توسط لوب های فرونتال و پروفرونتال کنترل می شوند و نتایج مطالعات با استفاده از تصویربرداری از نرون ها نشان داده است که این نواحی"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "مغز در افراد مبتلا به نارسایی توجه/فزون کنشی غیرعادی است. بر اساس مدل بارکلی افراد مبتلا به نارسایی توجه/فزون کنشی مشکلاتی را در کنش های اجرایی به چهار روش کلی دارند: اول این که آنها اغلب مشکلاتی را در حافظه کاری دارند. نارسایی در حافظه کاری در افراد مبتلا به نارسایی توجه/فزون کنشی می تواند منجر به فراموشکاری، فقدان بازاندیشی و مشکلات در مدیریت زمان گردد. دوم این که افراد مبتلا به این اختلال به طور مکرر مشکلاتی را در گفتار درونی دارند. گفتار درونی، صدای درونی است که به افراد اجازه می دهد تا درباره راه حل های گوناگون در موقع حل مسئله با خودشان صحبت کنند. دانش آموزان مبتلا به این اختلال که در گفتار درونی مشکل دارند، مشکلاتی در هدایت رفتار خود در موقعیت هایی که مستلزم پیروی از مقررات یا دستورالعمل هاست، دارا هستند. سوم این که کودکان و بزرگسالان مبتلا به نارسایی توجه/فزون کنشی مشکلاتی را در مهار هیجان ها و سطوح برانگیختگی خود دارند. آنها اغلب بر تجربه های مثبت یا منفی، واکنش بیش از حد نشان می دهند. آنها با شنیدن یک خبر خوب ممکن است با صدای بلند جیغ بزنند و قادر به مهار هیجان خود نباشند. چهارم این که کودکان و بزرگسالان مبتلا به این اختلال مشکلاتی را در تحلیل مشکلات و مشارکت دادن راه حل ها با دیگران دارند. آنها به هنگام رویارویی با موقعیت های دشوار، اغلب به صورت تکانشی پاسخ می دهند، یعنی اولین پاسخی را که به ذهن آنها می آید بیان می کنند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "۳) آگاهی و مدیریت زمان: بارکلی (۲۰۰۰ الف) مشکلاتی را در آگاهی و مدیریت زمان در افراد مبتلا به نارسایی توجه/فزون کنشی پیدا کرده است. بارکلی می گوید \"درک زمان و چگونگی سازماندهی رفتارهایمان در قالب زمان یک عامل اصلی در درک نارسایی توجه/فزون کنشی است\"."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "۴) رفتارهای هدف محور پایدار: بسیاری از مشکلات در کنش های اجرایی که توسط افراد مبتلا به نارسایی توجه/فزون کنشی تجربه می شود به نارسایی هایی در مشارکت در فعالیت های هدف محور پایدار منجر می گردد. از دیدگاه بارکلی مشکلات در اختلال نارسایی توجه/"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "فزون کنشی نشانه اصلی خودتنظمی بخشی یا مهارت"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "مشکلات در سازش کودکان و نوجوانان مبتلا به همسالان با مشکلاتی در همسالان و حتی معلمان مختلف دارند و در مشکلات در بازداری شدت اختلال برخی از افراد مبتلا به عصبی می شوند و نارسایی توجه/فزون کنشی ثابت نشان می دهند که به نارسایی توجه/فزون کنشی مانند کوکائین در دوران (پیدرمن و همکاران، ۲۰۰۲) اختلال که همزمان با هستند، بیشتر اسیر مشکلاتی هستند که دوستان کمی دارند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "مشکلات تحصیلی یکی از مشکلات زیادی را تجربه می کنند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "فزون کنشی نشانه اصلی آن نیست، بلکه مشکلات توجه پیامد نارسایی در بازداری رفتاری و خودنظم بخشی یا مهار اجرایی رفتار است."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "**مشکلات در سازش یافتگی اجتماعی** کودکان و نوجوانان مبتلا به نارسایی توجه/ فزون کنشی اغلب در برقراری روابط اجتماعی با همسالان با مشکلاتی مواجه هستند. رفتارهای چالش برانگیز آن ها باعث طرد آن ها از سوی همسالان و حتی معلمان می گردد. این افراد همچنین مشکلاتی را در مهارت های سازشی مختلف دارند و در نتیجه دوستان بسیار اندکی دارند. افراد مبتلا به این اختلال به علت مشکلات در بازداری رفتاری و هیجانی توسط دیگران، گستاخ نگریسته می شوند. شدت اختلال در برقراری روابط اجتماعی بسیار مؤثر است و دارای پیامدهای متفاوتی است. برخی از افراد مبتلا به این اختلال زمانی که سعی می کنند دوست پیدا کنند، به طور فزاینده ای عصبانی می شوند و حتی فرد مقابل را بیشتر آزار می دهند. تقریباً ۷۵ درصد کودکانی که تشخیص نارسایی توجه/ فزون کنشی را دریافت می کنند، نشانه های رفتاری پرخاشگری و نافرمانی را به طور ثابت نشان می دهند. همچنین نتایج تحقیقات نشان داده است که مصرف مواد مخدر در افراد مبتلا به نارسایی توجه/ فزون کنشی زیاد است. احتمال مصرف مشروبات الکلی یا وابستگی به داروهایی مانند کوکائین در افراد مبتلا به نارسایی توجه/ فزون کنشی دو برابر بیشتر از افراد عادی است (بیدرمن و همکاران، ۱۹۹۸؛ لامبرت و هارت ساگ، ۱۹۹۸). این احتمال در نوجوانان مبتلا به این اختلال که همزمان دارای اختلال های دیگری مانند رفتارهای پرخاشگرانه و آسیب های اجتماعی هستند، بیشتر است. به طور خلاصه افراد مبتلا به این اختلال در سازش و همراهی با دیگران دارای مشکلاتی هستند، در نتیجه در برقراری روابط با همسالان شکست می خورند و در بیشتر اوقات دوستان کمی دارند و آن ها را رنج می دهند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "**مشکلات تحصیلی** یکی از حوزه هایی که دانش آموزان مبتلا به نارسایی توجه/ فزون کنشی در آن مشکلات زیادی را تجربه می کنند، مشکلات تحصیلی است. دانش آموزان مبتلا به این اختلال در کلاس های"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "درس به علت مشکلات توجه، از پیشرفت تحصیلی بالایی برخوردار نیستند. تکرار پایه تحصیلی در آنها فراوان است. مشکلات تحصیلی در آنها اغلب بر عزت نفس آنها نیز تأثیر می گذارد و احتمال بروز مشکلات بیشتر را در آنها افزایش می دهد. بیشتر از ۱۰ تا ۳۰ درصد از آنها ممکن است نتوانند از دبیرستان فارغ التحصیل گردند و مشکلات تحصیلی آنها اغلب در سال های اولیه ورود به مدرسه آشکار می شود (لاهی و همکاران، ۱۹۹۸؛ به نقل از شکوهی یکتا و پرند، ۱۳۸۴)."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "**مداخله های آموزشی و درمانی** درمان مؤثر اختلال نارسایی توجه/ فزون کنشی شامل در نظر گرفتن رویکرد تیمی، بین رشته ای و ترکیبی از روش های گوناگون است. مداخله های لازم برای این اختلال در دو مقوله کلی رفتاری و پزشکی قرار می گیرند. داروهای محرک مانند متیل فیندیت و دکستروآمفتامین تقریباً در سه چهارم کودکان مبتلا به نارسایی توجه/ فزون کنشی مؤثر است. متیل فیندیت با تأثیر کوتاه مدت است و به طور معمول در ساعت های مدرسه مورد استفاده قرار می گیرد تا کودک بتواند در کلاس درس بماند و تمرکز کند. شایع ترین عوارض این دارو عبارتند از سردرد، دل درد، تهوع و بی خوابی. برخی کودکان، اثر واکنشی به این دارو نشان می دهند یعنی برای دوره کوتاهی پس از تمام شدن دارو، نشانه های فزون کنشی در آنها افزایش می یابد. همچنین مصرف متیل فیندیت ممکن است امکان وقفه در تحول فرد را موجب گردد، بنابراین باید مصرف دارو در آخر هفته یا تابستان متوقف گردد تا تحول طبیعی حاصل گردد."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "دکستروآمفتامین به هنگامی که متیل فیندیت مؤثر واقع نشود، به طور معمول به عنوان داروی ردیف دوم تجویز می شود نکته جالب این است که مصرف یک دارو ممکن است برای یک کودک مبتلا به نارسایی توجه/ فزون کنشی، مؤثر واقع گردد، ولی همان دارو برای کودک دیگر مؤثر نباشد."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "دارودرمانی فقط دانش آموز را برای یادگیری آماده می کند و به تنهایی نمی تواند موجب بهبود یادگیری و پیشرفت دانش آموز گردد. مداخله های رفتاری در سال های اخیر پیشرفت و برد، مانند تقویت مثبت و منفی، شکل دهی رفتارها، الگو دهی، زنجیره سازی. نکته قابل توجه"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "این است که مدیریت رفتار و تکنیک های اصلاح رفتار باید به والدین به طور کامل آموزش داده شود، زیرا کودک بیشتر زمان های شبانه روز را در خانواده به سر می برد و والدین از وضعیت رفتاری او متأصل می گردند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "به کارگیری روش های شناختی/رفتاری نیز برای برخی افراد مبتلا به نارسایی توجه/فزون کنشی می تواند مفید باشد. در این روش کمک می شود تا مهارت های حل مسئله را یاد بگیرد و توانایی خودمهارگری را افزایش دهد. به نظر می رسد که ترکیب آموزش والدین و آموزش خودمهارگری به همراه دارودرمانی و رفتاردرمانی بتواند وضعیت کودک را تا حد زیادی بهبود ببخشد."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "نکته دیگر ساماندهی کلاس درس است. چینش صندلی ها در کلاس و شیوه گروهبندی دانش آموزان در کلاس درس باید به گونه ای باشد که تکانشگری کودک مبتلا به نارسایی توجه/فزون کنشی باعث مزاحمت دیگران نگردد. معلمان باید قواعد و برنامه های روشنی داشته باشند و برخی زمان ها به کودک مبتلا اجازه دهند که بایستد یا بیرون برود. همچنین معلمان باید تکالیف و دستورالعمل ها را به صورت گام به گام برای دانش آموز مبتلا به نارسایی توجه/فزون کنشی ارائه کنند. دستورالعمل ها باید هم به صورت شفاهی و هم به صورت کتبی به آنها داده شود."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "در نهایت این که استفاده از نرم افزارهای آموزشی و رایانه در کلاس درس، برقراری ارتباط چشمی مناسب با دانش آموز، ارتباط مناسب با والدین و شناخت و به کارگیری تکنیک های اصلاح رفتار، از فعالیت های دیگری است که معلمان باید در کلاس های درس به کار ببرند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "در مجموع می توان چنین نتیجه گیری کرد که مجموعه ای از افراد با تخصص های مختلف مانند پزشک، روانشناس، معلم و مدیریت مدرسه به همراه معلم باید با یک برنامه منظم و دقیق در آموزش و درمان کودک مبتلا به نارسایی توجه/فزون کنشی مشارکت داشته باشند. ترکیب روش های دارودرمانی، رفتاردرمانی، شناخت/رفتاردرمانگری، آموزش والدین،"}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "آموزش مهارت های اجتماعی و مدیریت کلاس درس، بسته به شدت اختلال بهترین نتیجه را خواهد داد."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "**خلاصه فصل** اختلال نارسایی توجه/ فزون کنشی یکی از شایع ترین مشکلات رفتاری است که معلمان و والدین را به استیصال می کشاند. ریخت های مختلفی از این اختلال وجود دارد که عبارتند از: ۱) نارسایی توجه/ فزون کنشی، غلبه بر نوع نارسایی توجه، ۲) نارسایی توجه/ فزون کنشی، غلبه بر نوع فزون کنشی و تکانشگری، و ۳) نارسایی توجه/ فزون کنشی، نوع ترکیبی. این اختلال همپوشی قابل ملاحظه ای با مقوله ناتوانی یادگیری و اختلال های هیجانی/ رفتاری دارد. میزان شیوع این اختلال روز به روز در حال افزایش است و در حدود سه تا پنج درصد جمعیت سنین مدرسه به اختلال نارسایی توجه/ فزون کنشی مبتلا هستند. اختلال نارسایی توجه/ فزون کنشی در پسرها رایج تر از دخترها است (نسبت ۵ به ۱ یا بالاتر) که احتمالا ناشی از تفاوت های زیست شناختی است. این اختلال هم دارای جنبه های پزشکی است و هم دارای جنبه های روان شناختی و آموزشی. بنابراین در تشخیص این اختلال باید معاینه پزشکی، مصاحبه بالینی، مقیاس های درجه بندی معلم و والدین، و مشاهدات رفتاری لحاظ گردد. عوامل مختلفی مانند ساختار مغز، عوامل ژنتیکی و عوامل محیطی در ایجاد اختلال نارسایی توجه/ فزون کنشی نقش دارند. محققان با استفاده از تکنیک های MRI و PET دریافتند که همانند افراد مبتلا به ناتوانی های یادگیری، نارسا کنش وری مغزی در افراد مبتلا به نارسایی توجه/ فزون کنشی مشهود است. همچنین شواهد حاکی از آن است که اندازه لوب های فرونتال، عقده های پایه و مخچه در افراد مبتلا به نارسایی توجه/ فزون کنشی نسبت به افراد عادی کوچک تر است. مطالعه بر روی دوقلوهای یک تخمکی و دوتخمکی نیز نقش عوامل ژنتیکی را در ایجاد این اختلال آشکار ساخته است. در نهایت تراتوژن ها (عوامل سمی موجود در محیط) و شرایط پزشکی مانند کم وزنی به هنگام تولد نیز در ایجاد این اختلال نقش دارند. اختلال نارسایی توجه/ فزون کنشی با ویژگی های زیر همراه است: ضعف در بازداری رفتاری، ضعف در کنش های اجرایی، مشکلات در مدیریت زمان، مشکلات در رفتارهای هدف محور پایدار، مشکلات در سازش یافتگی اجتماعی، و مشکلات تحصیلی. از آن جایی که اختلال نارسایی توجه/ فزون کنشی دارای جنبه های مختلف پزشکی، آموزشی و رفتاری است، بنابراین درمان آن نیازمند رویکردهای رفتاری درمانی، دارودرمانی، آموزش والدین، آموزش معلمان و از دیگر برنامه های مداخله ای داده شده اند."}, {"c": "فصل پنجم: نارسایی توجه / فزون‌کنشی (ADHD)", "t": "بنابراین درمان آن نیز به مجموعه ای از مداخله ها توسط تیم متخصص نیاز دارد. دارو درمانی و رفتار درمانی شایع ترین مداخله های ممکن هستند. علاوه بر این شناخت/رفتاردرمانگری، آموزش والدین، آموزش مهارت های اجتماعی، و مدیریت رفتار در کلاس درس توسط معلم، از دیگر برنامه های مداخله ای هستند که در درمان نارسایی توجه/فزون کنشی بسیار مؤثر نشان داده شده اند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "از خواننده انتظار می رود پس از مطالعه مطالب این فصل بتواند:"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "1. تعریف های مختلف اختلال های هیجانی / رفتاری را به صورت تحلیلی / مقایسه ای بیان نماید. 2. طبقه بندی های مختلف اختلال های هیجانی / رفتاری را شرح دهد. 3. میزان شیوع و عوامل مؤثر بر اختلال های هیجانی / رفتاری را توضیح دهد. 4. عوامل ایجاد کننده اختلال های هیجانی / رفتاری را به طور کامل شرح دهد. 5. فرایند شناسایی اختلال های هیجانی / رفتاری را توضیح دهد. 6. ویژگی های کودکان و نوجوانان مبتلا به اختلال های هیجانی / رفتاری را توضیح دهد. 7. روش های عمده در مداخله و درمان افراد مبتلا به اختلال های هیجانی / رفتاری را بیان نماید."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "اختلال های رفتاری به طور قابل ملاحظه ای بر عملکرد تحصیلی، اجتماعی و حرفه ای کودکان و نوجوانان تأثیر منفی می گذارد و احتمال ابتلای به بیماری های روانی در دوره بزرگسالی را افزایش می دهد (پاندینا و همکاران، ۲۰۰۷). اختلال های رفتاری، احتمال ابتلای افراد به سوء مصرف مواد، فعالیت های بزهکارانه، اختلال های اضطرابی و خلقی، ناتوانی یادگیری، اختلال های عصب روان شناختی و اختلال شخصیت مرزی را افزایش می دهد (بامیستر و سوین، ۱۹۹۰). این کودکان دارای دامنه توجه کوتاهی هستند، عزت نفس پایینی دارند، در ارتباط با اعضای خانواده، اطرافیان و مردم مشکل دارند و به آسانی مأیوس می شوند (سوزر و والر، ۲۰۰۶)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "تکانشگری، بی قراری و فزون کنشی، پرخاشگری، دروغگویی و دزدی، عملکرد تحصیلی ضعیف و ادراک ضعیف از خودکارآمدی نیز از ویژگی های کودکان و نوجوانان دارای اختلال های رفتاری است (انجمن روانپزشکی آمریکا، ۱۹۹۴). همچنین خودآزاری، دیگرآزاری، تخریب محیط، نافرمانی، حرکات و گفتار کلیشه ای، گوشه گیری از دیگر ویژگی های کودکان و نوجوانان دارای اختلال های رفتاری است (فارل، ۲۰۰۶). این قبیل الگوهای رفتاری در کودکان مبتلا به اختلال های رفتاری در خانه، مدرسه، و در برخورد با همسالان دیده می شوند. اگر این الگوها تداوم یابند ممکن است منجر به مشکلات عمده ای در سازش یافتگی گردند و از کیفیت زندگی بکاهند. وضعیت اقتصادی - اجتماعی پایین، فقدان شایستگی اجتماعی، سوء استفاده از کودک، تعداد زیاد اعضای خانواده، مشکلات زناشویی (از قبیل جدایی، طلاق، اختلافات"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "خانوادگی، عدم سازش والدین و خشونت خانوادگی) و مشکلات والدین (از قبیل مشکلات و بیماری های روانی، جسمانی و رفتارهای بزهکارانه) از جمله عوامل خطرساز ابتلای کودکان و نوجوانان به اختلال های رفتاری هستند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**تعریف اختلال های هیجانی/رفتاری** ارائه تعریف عینی از اختلال های هیجانی/رفتاری چندان ساده نیست. عواملی که تعریف از این اختلال ها را با مشکلاتی مواجه می سازند عبارتند از: فقدان تعریف های دقیق از سلامت روان و رفتار بهنجار تفاوت های اساسی در بین مدل های مفهومی نادقیق بودن اندازه گیری هیجان ها و رفتارها همپوشی بین اختلال های هیجانی و رفتاری با سایر ناتوانی ها عدم توافق بین متخصصانی که در امر تشخیص و ارائه خدمات فعالیت می کنند (هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**تعریف دولت فدرال آمریکا** تعریفی که برای آشفتگی هیجانی بر اساس قانون دولت فدرال آمریکا و در متن قانون آموزش افراد با ناتوانی آمده است به صورت زیر است: ۱. این اصطلاح به معنای وجود شرایطی است که واجد یک یا چند مورد از ویژگی های زیر با بروز طولانی مدت و شدت کافی باشد و بر عملکرد تحصیلی فرد تأثیر منفی گذارد. این ویژگی ها عبارتند از: ناتوانی در یادگیری که ناشی از عوامل هوشی، حسی، یا سلامتی نباشد ناتوانی در ایجاد یا حفظ روابط رضایت بخش با همسالان و معلمان وجود انواع رفتارها یا احساس های نامناسب تحت شرایط بهنجار زندگی وضعیت خلقی اندوه یا افسرده فراگیر کلی تمایل به نشان دادن نشانه های جسمانی یا ترس های مرتبط با مشکلات شخصی یا تحصیلی"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "۲. این اصطلاح کودکان اسکیزوفرنیک را شامل می گردد، ولی کودکان سازش نایافته اجتماعی را در بر نمی گیرد، مگر این که مشخص گردد دارای آشفتگی هیجانی هستند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "تعریف دولت فدرال با انتقادهای زیادی مواجه شده است. یکی از مهمترین انتقادها مربوط به خارج ساختن کودکان سازش نایافته اجتماعی که دارای اختلال هیجانی نیستند از تعریف است (هالاهان و کافمن، ۲۰۰۹). انتقاد دیگر نیز مربوط به عدم به کارگیری اصطلاح رفتاری در تعریف است یعنی اصطلاح آشفتگی یا اختلال هیجانی به جای اختلال های هیجانی-رفتاری استفاده شده است (ترنبال و همکاران، ۲۰۰۲؛ به نقل از شکوهی یکتا و پرند، ۱۳۸۴)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "اختلال های هیجانی/رفتاری به شرایطی اطلاق می شود که در آن پاسخ های هیجانی و رفتاری در مدرسه با هنجارهای فرهنگی، سنی و قومی تفاوت داشته باشد، به طوری که بر عملکرد تحصیلی فرد، مراقبت از خود، روابط اجتماعی، سازش یافتگی فردی، رفتار در کلاس و سازش یافتگی در محیط کار نیز تأثیر منفی گذارد. اختلال های هیجانی/رفتاری شامل پاسخ های قابل قبول کودک یا نوجوان به عوامل تنیدگی زای محیطی نمی شود. این اختلال ها بر اساس داده های حاصل از منابع مختلف در مورد کنش های هیجانی یا رفتاری فرد شناسایی می شوند و باید دست کم در دو موقعیت متفاوت که یکی از آنها مدرسه است بروز نماید. اختلال های هیجانی/رفتاری می تواند به طور همزمان با سایر معلولیت ها نیز ظاهر شود. این اختلال ها شامل اسکیزوفرنی، نارسایی توجه، و سازش نایافته گی نیز می گردد (انجمن کودکان استثنایی، ۱۹۹۱)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "مزیت های تعریف شورای کودکان استثنایی نسبت به تعریف دولت فدرال"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "۱. این تعریف آسیب های مربوط به رفتار انطباقی را که در رفتارها و هیجان ها نشان داده می شوند نیز در بر می گیرد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "۲. در ارزیابی فرد به هنجارهای فرهنگی و قومی توجه می کند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "۳. قبل از این که کودک یا نوجوان در گروه افراد مبتلا قرار بگیرد در جهت تغییر رفتار او تلاش می گردد. ۴. افراد سازش نایافته اجتماعی را نیز شامل می گردد (هاردمن، درو و ایگان، ۱۹۹۹)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**تعریف ائتلاف آموزش ویژه و سلامت روان** ۱. اصطلاح اختلال هیجانی/رفتاری به معنای ارائه پاسخ های رفتاری و هیجانی در مدرسه به گونه ای است که با هنجارهای سنی، فرهنگی، یا نژادی تفاوت زیادی دارد و بر عملکرد آموزشی فرد تأثیر نامطلوب می گذارد. عملکرد آموزشی شامل مهارت های تحصیلی، اجتماعی، حرفه ای، و شخصی می گردد. این ناتوانی: بیشتر از پاسخ موقتی و مورد انتظار به رویدادهای تنیدگی زا در محیط است به طور مستمر در دو موقعیت مختلف بروز پیدا می کند، که حداقل یکی از آنها مدرسه است، و مداخله مستقیم مربوط به آموزش عمومی برای آن کارساز نیست، به سخن دیگر شرایط کودک به گونه ای است که مداخله های آموزش عمومی برای آن ناکافی است. ۲. اختلال های هیجانی/رفتاری می توانند همراه با سایر اختلال ها وجود داشته باشند ۳. اختلال های اسکیزوفرنی، اختلال عاطفی، اختلال اضطراب، یا سایر اختلال های در رفتار هنجاری یا سازش یافتگی هنگامی که بر عملکرد آموزشی کودک یا نوجوان مطابق با بند ۱ تأثیر منفی گذارند، در این مقوله قرار می گیرند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "امتیازات این تعریف در مقایسه با تعریف فدرال به شرح زیر است: ۱. این تعریف از اصطلاحاتی استفاده می کند که مورد توافق متخصصان کنونی بوده و همسو با کمینه سازی برچسب گذاری است ۲. هم اختلال های رفتاری و هم اختلال های هیجانی را در بر می گیرد و مشخص می کند که این دو دسته اختلال ممکن است به طور جدا از هم یا به صورت ترکیبی ظاهر گردند ۳. این تعریف مدرسه محور است اما در عین حال تصدیق می کند اختلال هایی که در بیرون از مدرسه رخ می دهند نیز دارای اهمیت هستند ۴. این تعریف به تفاوت های نژادی و فرهنگی حساس است"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "۵. این تعریف مشکلات جزیی یا پاسخ های معمولی به تنیدگی را شامل نمی گردد. ۶. این تعریف بر این نکته تأکید می کند که کودکان و نوجوانان می توانند ناتوانی های چندگانه داشته باشند. ۷. دامنه وسیعی از اختلال های هیجانی یا رفتاری مورد توجه متخصصان سلامت روان و آموزش ویژه را بدون خارج ساختن اختیاری در بر می گیرد (هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "در هر صورت با توجه به تمامی تعاریف بالا، توافق کلی بین همه آن ها این است که اختلال هیجانی یا رفتاری به موارد زیر اشاره دارد: رفتاری که در حد افراطی است؛ یعنی با وضعیت عادی خرد تفاوت معنادار دارد مشکلی مزمن است؛ یعنی مشکلی است که به سرعت ناپدید نمی گردد رفتاری است که به علت انتظارات اجتماعی یا فرهنگی غیرقابل پذیرش است"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**طبقه بندی** تاکنون طبقه بندی های مختلفی برای اختلال های رفتاری صورت گرفته است. بعضی از پژوهشگران اختلال های رفتاری را به دو دسته بزرگ تقسیم کرده اند: اختلال های رفتاری درونی سازی که شامل مواردی است که با دنیای درونی فرد سروکار دارد مانند افسردگی و اضطراب که با تعارض های روانی و هیجانی همراه است، و اختلال های رفتاری برونی سازی که شامل مواردی است که به مشکلات فرد با دیگران ارتباط دارد (آخن باخ، هاول، کوای، و کانرز، ۱۹۹۱)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "همه اختلال ها می توانند در این دو بعد وسیع قرار گیرند. برخی افراد ممکن است ویژگی های رفتاری هر دو بعد را نشان دهند. یعنی کودک یا نوجوان ممکن است برخی رفتارهایی نشان دهد که با مشکلات درونی سازی مرتبط باشد مانند دامنه توجه کوتاه، تمرکز پایین و برخی رفتارهایی نشان دهد که با مشکلات برونی سازی مرتبط باشد (مانند دعوا کردن، تخریب گری، آزار دادن دیگران). در واقع همبودی دو یا چند شرایط در یک فرد معمول نیست."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "حال در ایالات متحده، هدف های آموزشی ویژه ویکس - نلون و کودکان و نوجوانان را به اختلال نارسایی توجه لجبازی و نافرمانی: ۵ اختلال رفتار هنجاری: ۹ اضطراب فراگیر: ۹ هراس: ۵ درصد وسواس: ۱/۹ درصد اوتیسم: ۰/۰۵ درصد افسردگی: ۰/۴ تا افسردگی خویی: ۰/۶ هراس اجتماعی: اضطراب جدایی: بیشتر کودکان بسیاری از موارد در گزارش های بوده است (کافمن مسائلی مانند پنج به یک یا از دختران است نتایج تحت در دختران شایع"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "(کولینان، ۲۰۰۴)، افراد کمی با اختلال هیجانی یا رفتاری وجود دارند که فقط یک نوع رفتار سازش نایافته را نشان دهند. اختلال های رفتاری دامنه وسیعی دارند و مشکلات بسیاری را در بر می گیرند، به طوری که هر طبقه در برگیرنده گروه هایی است که ممکن است ویژگی های متفاوتی داشته باشند. طبقه بندی به ویژه برای مقاصد آموزشی مفید به نظر می رسد، زیرا که ریشه ها و علل اختلال ها متفاوتند. برای مثال کودکی ممکن است مضطرب و گوشه گیر و کودکی دیگر عصبانی و تندخو باشد. اگرچه هر دو در طبقه اختلال های رفتاری قرار می گیرند ولی به خدمات آموزشی متفاوتی نیاز دارند (کرک، گالاگر و آناستازیو، ۲۰۰۰). همان گونه که اشاره شد در حیطه اختلال های رفتاری، طبقه بندی های متعددی ارائه شده است که برخی از آن ها بر روش های آماری پیشرفته مبتنی است. در این روش ها خوشه ها و الگوهای مربوط به رفتارها مشخص می شوند. برای مثال کوای و پیترسون (۱۹۸۷) اختلال های رفتاری را به شش دسته تقسیم کرده اند: اختلال رفتار هنجاری، پرخاشگری اجتماعی، مشکلات مربوط به توجه و ناپختگی، اضطراب- گوشه گیری، رفتار روان گسستگی و تحرک مفرط. آخن باخ (۱۹۹۱) نیز اختلال های رفتاری را به ده طبقه تقسیم کرده است: اضطراب، افسردگی، شکایت های جسمانی ، مشکلات اجتماعی، مشکلات تفکر، مشکلات توجه، قانون شکنی، رفتارهای پرخاشگرانه، درونی سازی و برونی سازی، و سایر مشکلات."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "میزان شیوع برآورد میزان شیوع اختلال های هیجانی یا رفتاری در کودکان و نوجوانان بسیار گوناگون است، زیرا تعریف استاندارد و معتبر و ابزار غربالگری دقیق وجود ندارد. همچنین برآورد میزان شیوع اختلال های رفتاری به دلیل فقدان تعاریف واحد، مشکلات روش شناختی، سیاست های اجتماعی، و عوامل اقتصادی با دشواری هایی همراه است. مطالعات دقیق در ایالات متحده و دیگر کشورها به طور مستمر نشان دادند که حداقل ۶ تا ۱۰ درصد کودکان و نوجوانان سن مدرسه مشکلات جدی و پایدار هیجانی/ رفتاری نشان می دهند (کافمن، ۲۰۰۵ الف). با این"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "حال در ایالات متحده حدود یک درصد از کودکان مدرسه به عنوان آشفتگی هیجانی جهت هدف های آموزشی ویژه شناسایی می شوند. ویکس-نلسون و ایزرائیل (۲۰۰۳) طبقه بندی و میزان شیوع اختلال های رفتاری در بین کودکان و نوجوانان را به شرح زیر گزارش کرده است: اختلال نارسایی توجه/ فزون کنشی: ۳ تا ۵ درصد لجبازی و نافرمانی: ۵ تا ۱۰ درصد اختلال رفتار هنجاری: ۱ تا ۱۶ درصد اضطراب فراگیر: ۲/۹ تا ۱۴ درصد هراس: ۵ درصد وسواس: ۱/۹ درصد اوتیسم: ۰/۰۵ درصد افسردگی: ۰/۴ تا ۲/۵ درصد افسرده خویی: ۰/۶ تا ۱/۷ درصد هراس اجتماعی: ۱ درصد اضطراب جدایی: ۳ تا ۱۲ درصد"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "بیشتر کودکان و نوجوانان گاهی مشکلات هیجانی و رفتاری را نشان می دهند، ولی در بسیاری از موارد این رفتارها گذراست و دوام ندارند و ملاک های اختلال را دریافت نمی کنند. در گزارش های مختلف شیوع این اختلال در میان جمعیت مدرسه ای بین ۰/۵ تا ۲۰ درصد بوده است (کافمن، ۲۰۰۱). شایع ترین مشکلاتی که در افراد با اختلال های رفتاری مشاهده می شود مسائلی مانند پرخاشگری و رفتارهای مخرب است. نسبت تعداد پسران در مقایسه با دختران پنج به یک یا بیشتر است. به طور کلی گرایش پسران به رفتارهای پرخاشگرانه و مخرب بیش از دختران است (کازدین، ۱۹۹۷). نتایج تحقیقات حاکی از آن است که اختلال های رفتاری پنهان مانند افسردگی و اضطراب در دختران شیوع بیشتری دارد (کافمن، ۲۰۰۵؛ کیس و لیدلی، ۲۰۰۷) و بالعکس اختلال های"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "رفتاری آشکار مانند اختلال نارسایی توجه/فزون کنشی، اختلال رفتار هنجاری، پرخاشگری و رفتارهای ضداجتماعی در پسران شایع تر است (براست- ت ت و باتلر، ۲۰۰۷). به طور کلی گزارش شده است که شیوع اختلال های رفتاری در پسران بیشتر از دختران است. این امر می تواند ناشی از عوامل زیر باشد: اولاً همان گونه که ذکر شد اختلال های رفتاری پسران بیشتر از نوع اختلال های رفتاری آشکار است، هم بیشتر هستند و هم راحت تر قابل تشخیص اند (هورویتز و همکاران، ۱۹۹۲). ثانیاً شیوه های سنجش اختلال های رفتاری متناسب با جنسیت نیست و دختران و پسران هر دو به یک شیوه ارزیابی می شوند (وهبای و همکاران، ۱۹۹۷)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**سبب شناسی** اگرچه که در بیشتر موارد نمی توان به طور دقیق مشخص کرد که علت اختلال ناشی از چیست، با این حال بر اساس نتایج پژوهش های مختلف می توان مجموعه ای از عوامل زیست شناختی، روابط خانوادگی نابسامان، تجربیات نامطلوب در مدرسه، و تأثیرات فرهنگی منفی را در ایجاد اختلال های هیجانی/رفتاری دخیل دانست. پیدا کردن یک علت واحد که به طور مستقیم منجر به یک اختلال گردد، تا حد بسیار زیادی غیر معمول است."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**عوامل زیست شناختی** رفتارها و هیجان ها ممکن است توسط عوامل ژنتیکی، عصب شناختی، یا زیست شیمیایی یا ترکیبی از این عوامل تأثیر پذیرند. بی تردید بین بدن و رفتار رابطه وجود دارد، بنابراین در نظر گرفتن عامل زیست شناختی برای برخی اختلال های هیجانی یا رفتاری منطقی به نظر می رسد (کوپر، ۲۰۰۵). برای بیشتر کودکان با اختلال های هیجانی یا رفتاری به سادگی نمی توان مشخص کرد که عوامل زیست شناختی ممکن است در شرایط آنها نقش داشته باشد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "همه کودکان با سبک رفتاری از قبیل تعیین شده زیست شناختی با خلق و خو خاص به دنیا می آیند. هر چند که خلق و خوی کودکان ممکن است با توجه به روش تربیتی تغییر یابد، با این حال برخی افراد معتقدند که کودکان با خلق و خوهای به اصطلاح دشوار، مستعد اختلال های هیجانی یا رفتاری هستند. با این حال رابطه یک به یک بین \"خلق و خو\" و اختلال ها وجود ندارد (کوگ، ۲۰۰۳). سایر عوامل زیست شناختی مانند بیماری، سوءتغذیه و آسیب مغزی در کنار \"خلق و خو\" بر مشکلات هیجانی یا رفتاری مؤثرند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "در مورد عوامل زیست شناختی باید همواره در نظر داشت که: ۱. به ندرت علت یک اختلال هیجانی/رفتاری منحصراً زیست شناختی یا روان شناختی است. هنگامی که یک اختلال زیست شناختی رخ می دهد، تقریباً همیشه منجر به مشکلات روانی / اجتماعی می گردد که در ایجاد اختلال هیجانی یا رفتاری نقش دارند. ۲. درمان زیست شناختی یا پزشکی اختلال به ندرت برای حل مشکل کافی است. دارودرمانی ممکن است فواید زیادی داشته باشد، اما به ندرت تنها مداخله مورد نیاز است (فورنس و کاوال، ۲۰۰۱). جنبه های روان شناختی و اجتماعی اختلال باید همچنین مورد توجه قرار گیرد، و ۳. رویکردهای پزشکی یا زیست شناختی برخی اوقات فایده ای ندارند و مداخلات اصلی جنبه روان شناختی یا رفتاری دارند؛ هرچند که علت اختلال، زیست شناختی تشخیص داده شده باشد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "عوامل خانوادگی برخی اوقات والدین بسیار خوب، کودکان مبتلا به اختلال های هیجانی یا رفتاری بسیار شدید دارند و برخی اوقات والدین بدون صلاحیت، غفلت کننده یا سوء استفاده گر، کودکان مبتلا به اختلال های هیجانی یا رفتاری معنادار ندارند. رابطه بین فرزندپروری و اختلال های هیجانی یا رفتاری ساده نیست، اما برخی اعمال فرزندپروری بی تردید بهتر از برخی دیگر است. حساس بودن به نیازهای کودکان و روش های متمرکز بر دوست بودن در رویارویی با رفتارهای نادرست و به کارگیری تقویت مثبت برای رفتارهای مناسب، بی تردید باعث ایجاد رفتارهای مطلوب در کودکان می گردد. والدینی که به طور کلی در تربیت کودک اهمال کاری می کنند و در عوض در"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "رویارویی با رفتارهای نادرست، خصمانه، طردکننده، ظالمانه و ناپایدار عمل می کنند، احتمالاً کودکانی پرخاشگر و بزهکار خواهند داشت. خانواده های از هم پاشیده و نابسامانی که در آن والدین خود سابقه خشونت و نقض قوانین دارند، احتمالاً فرزندان آن ها بزهکار و فاقد قابلیت اجتماعی هستند. باید توجه داشت که والدین کودکان با اختلال های هیجانی/رفتاری می خواهند که فرزندشان به طور مناسبی رفتار کند و هر کاری را برای کمک به فرزندشان انجام می دهند. بنابراین این والدین به منابع حمایتی نیاز دارند، نه سرزنش و انتقاد. در نتیجه باید روش های فرزندپروری و چگونگی اصلاح رفتار فرزندشان را به طور منظم به آن ها آموزش داد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**عامل مدرسه** برخی کودکان با ورود به مدرسه و سال های بعد از آن به خاطر تجربه های آسیب زا در کلاس درس به اختلال های هیجانی یا رفتاری دچار می شوند. رفتارهای همکلاسی ها و معلمان می تواند همراه با خلق و خو و قابلیت اجتماعی کودک در ایجاد مشکلات هیجانی یا رفتاری نقش داشته باشد. مدرسه می تواند در رشد مشکلات هیجانی به روش های متعددی عمل کند. برای مثال معلمان ممکن است به فردیت کودکان حساس نباشند و آن ها را بدون تفکر به همسویی با قوانین و مقررات وا دارند. معلمان یا والدین ممکن است انتظارات بسیار بالا یا پایینی برای پیشرفت تحصیلی و یا رفتار کودک در نظر بگیرند. شیوه انضباطی مدرسه ممکن است بسیار سهل گیرانه، بسیار سخت گیرانه یا ناپایدار باشد. محیط مدرسه ممکن است به گونه ای باشد که رفتار نادرست کودک با توجه خاص (حتی اگر به صورت انتقاد کردن یا تنبیه باشد) پاداش داده شود، در حالی که کودکی که به درستی رفتار می کند مورد بی توجهی قرار گیرد. در نهایت این که معلمان و همسالان ممکن است مدل های رفتار نادرست باشند و کودک ممکن است با تقلید از آن ها عمل کند (کافمن، ۲۰۰۵ الف، کافمن و همکاران، ۲۰۰۶)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**عوامل فرهنگی** بسیاری از شرایط محیطی بر انتظارات بزرگسالان از کودکان و انتظارات کودکان از بزرگسالان و همسالان تأثیر می گذارند. ارزش ها و استانداردهای رفتاری از طریق دامنه ای از شرایط فرهنگی،"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "تقاضاها، بازداری ها، و مدل های فرهنگی به کودکان منتقل می شوند. تأثیرات فرهنگی خاص مانند سطح خشونت در رسانه، در دسترس بودن داروها، و سوءاستفاده از آن ها، تغییر دادن استانداردهای رفتار جنسی، تقاضاهای مذهبی و محدودیت های رفتاری و بسیاری از عوامل دیگر بر مسائل رفتاری و هیجانی کودکان تأثیر می گذارند. همسالان منبع مهم دیگر تأثیر فرهنگی است که به طور خاص بعد از این که کودک وارد پایه های ابتدایی بالاتر می گردد، عمل می کند (فارمر، ۲۰۰۰). بی تردید فرهنگی که کودک در آن پرورش می یابد بر تحول هیجانی، اجتماعی و رفتاری او تأثیر می گذارد. سطح خشونت که توسط تلویزیون و فیلم ها نشان داده می شود یک عامل مؤثر در افزایش خشونت کودکان است. در هر صورت با توجه به این که اثرات فرهنگی بر چگونگی رفتار کودکان در مدرسه مشهود است، با این حال ما باید از اثرات تعامل عوامل مختلف ایجاد کننده مسائل و مشکلات هیجانی و رفتاری کودکان آگاه باشیم. مدارس و خانواده ها بر فرهنگ تأثیر می گذارند و در تعامل با یکدیگر بر رفتارهای کودکان تأثیر می گذارند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**فرایند شناسایی** شناسایی اختلال های رفتاری نسبت به تعریف، طبقه بندی و سبب شناسی آن آسان تر است. برخی اوقات چنین دانش آموزانی به کسی آزار نمی رسانند، بنابراین غیرقابل مشاهده هستند. اما تشخیص آن ها به طور معمول برای معلمان با تجربه آسان است. معلمان اغلب در ارزیابی توانمندی های دانش آموزان مبتلا به اختلال های هیجانی یا رفتاری شکست می خورند. با این حال ارزیابی توانمندی های این دانش آموزان علاوه بر نقاط ضعف و نارسایی های آن ها مهم است. رایج ترین نوع اختلال هیجانی یا رفتاری، اختلال رفتار هنجاری است که یک مشکل برونی سازی است. این اختلال توجه فوری را به دنبال دارد و به ندرت در شناسایی آن مشکل اساسی وجود دارد. دانش آموزان با مشکلات درونی سازی ممکن است کمتر آشکار باشند، اما شناسایی آن ها نیز چندان دشوار نیست. دانش آموزان مبتلا به اختلال های هیجانی یا رفتاری به آسانی توسط پرسنل مدرسه شناسایی می شوند. تشخیص کودکان مبتلا به اسکیزوفرنی به ندرت با افراد از لحاظ تحولی بهنجار مشتبه می گردد. زبان غیرمعمول آن ها، ادا و اطوار، و روش های برقراری ارتباط با دیگران بسیار زود مورد توجه والدین و معلمان قرار می گیرد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "کودکان مبتلا به اسکیزوفرنی درصد بسیار کوچکی از افراد با اختلال های هیجانی/رفتاری را تشکیل می دهند و در شناسایی آن ها معمولاً مشکلی وجود ندارد. با این حال آن ها ممکن است در ابتدا برچسب اختلال های دیگر مانند نارسایی توجه/فزون کنشی یا افسردگی را دریافت کنند و در مراحل بعد تشخیص اسکیزوفرنی را دریافت کنند. هر چه کودک سن پایین تری داشته باشد، قضاوت درباره جدی بودن مشکل او دشوارتر است. برخی از کودکان مبتلا به اختلال های هیجانی/رفتاری تشخیص داده نمی شوند، زیرا معلمان به مشکلات کودکان حساس نیستند و حتی معلمان حساس نیز برخی اوقات در قضاوت دچار اشتباه می گردند. همچنین به یاد داشته باشید که برخی از کودکان مبتلا به اختلال های هیجانی/رفتاری در محیط مدرسه مشکلاتی را نشان نمی دهند. غربالگری اولیه و شناسایی اولیه صحیح با هدف برنامه ریزی آموزشی، با توجه به مشکلات در تعریف اختلال های هیجانی/رفتاری پیچیده می گردد. اما به طور کلی اطلاعات معلمان و قضاوت آن ها به عنوان روش های معتبر و روا جهت غربالگری دانش آموزان است (در مقایسه با قضاوت های روان شناسان و روان پزشکان). در هر صورت معلمان گرایش دارند تا دانش آموزان با مشکلات رفتاری برونی سازی را بیشتر ارجاع داده و دانش آموزان با مشکلات درونی سازی را کمتر ارجاع دهند. بدین منظور می توان به شرح زیر عمل کرد: معلم دانش آموزان با مشکلات برونی سازی و درونی سازی را فهرست و رتبه بندی کند. سپس آن ها را بر اساس میزان نزدیک بودن ویژگی های آن ها به نشانه های اختلال های برونی سازی و درونی سازی مرتب کند. سپس هر یک از دانش آموزانی را که از نظر مشکلات رفتاری دارای بالاترین رتبه هستند مشخص نماید. در مرحله بعد روان شناس مدرسه یا هر فرد دیگر در حیاط مدرسه یا کلاس درس آن ها را مورد مشاهده عمیق قرار دهد. مشاهدات کلاس درس، میزانی که دانش آموز انتظارات رفتاری را برآورده می سازد نشان می دهد و مشاهدات زمین بازی، کیفیت و ماهیت رفتار اجتماعی را مشخص می سازد. چنین سیستم غربالگری می تواند به ارائه خدمات پیشرفته برای کودکان مبتلا به اختلال های هیجانی یا رفتاری منجر گردد. لازم به یادآوری است که بعد از این سیستم غربالگری، می توان کودک مورد نظر را جهت تشخیص نهایی، با تست های استاندارد مورد ارزیابی دقیق رسمی قرار داد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "ویژگی های افراد... توصیف ویژگی های... زیرا دامنه این اختلال... نوع اختلال مطرح..."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "هوش و پیشرفت... نتایج تحقیقات مت... رفتاری در اطراف... دارند. البته باید... هوشی بسیار بالا... دارد. مشکلات... هوشی موانعی... تحصیلی و اج... بیشتر د... استاندارد شد... یک دانش آم... خود عمل ت... در واقع بس... ریاضی ه... بکارگیری..."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "ویژگی... ویژگی های... برونی سازی... برون دار..."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**ویژگی های افراد مبتلا به اختلال های هیجانی/ رفتاری** توصیف ویژگی های کودکان و نوجوانان با اختلال های هیجانی/ رفتاری بسیار دشوار است، زیرا دامنه این اختلال ها گسترده است و نمی توان یک ویژگی قطعی را برای همه کودکان با هر نوع اختلال مطرح کرد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**هوش و پیشرفت** نتایج تحقیقات متعدد حاکی از آن است که هوشبهر بیشتر کودکان مبتلا به اختلال های هیجانی/ رفتاری در اطراف ۹۰ است و برخی از آن ها در دامنه دیرآموز و کم توان ذهنی خفیف قرار دارند. البته باید یادآور شد که برخی از کودکان مبتلا به اختلال های هیجانی/ رفتاری از نمرات هوشی بسیار بالایی برخوردارند. همچنین در ارزیابی هوشی این کودکان نیز چالش هایی وجود دارد. مشکلات هیجانی یا رفتاری این دانش آموزان در پاسخ دهی و نمره گرفتن در تست های هوشی موانعی ایجاد می کند. با این حال هوشبهر عامل پیش بینی کننده خوبی برای پیشرفت تحصیلی و اجتماعی این دانش آموزان است."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "بیشتر دانش آموزان مبتلا به اختلال های هیجانی یا رفتاری با استفاده از تست های استاندارد شده در مدرسه جزء دانش آموزان با پیشرفت پایین هستند (کافمن، ۲۰۰۵، الف). یک دانش آموز مبتلا به اختلال هیجانی/ رفتاری معمولاً به اندازه سطح مورد انتظار سن ذهنی خود عمل نمی کند. به طور کلی این دانش آموزان به ندرت از لحاظ تحصیلی پیشرفته هستند. در واقع بسیاری از دانش آموزان با اختلال های شدید فاقد مهارت های اساسی خواندن و ریاضی هستند و عده کمی از آن ها به نظر می رسد در خواندن یا ریاضی قابل هستند، قادر به بکارگیری مهارت هایشان در مسایل روزمره نیستند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**ویژگی های اجتماعی و هیجانی** ویژگی های دانش آموزان مبتلا به اختلال های هیجانی/ رفتاری را می توان در دو مقوله برونی سازی و درونی سازی توصیف کرد. بعد برونی سازی با رفتارهای پرخاشگرانه و برونی ریزی و بعد درونی سازی با رفتارهای اضطرابی، گوشه گیرانه، و افسردگی مشخص می گردد. با این حال برخی دانش آموزان ممکن است هر دو دسته رفتارهای پرخاشگرانه و"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "گوشه گیرانه یا افسرده وار را نشان دهند. نتایج مطالعات حاکی از آن است که افراد مبتلا به اختلال های هیجانی/رفتاری ممکن است از نظر اجتماعی طرد شوند. طرد اولیه توسط همسالان و رفتار پرخاشگرانه، کودک را در معرض خطر بالا برای مشکلات اجتماعی و هیجانی بعدی قرار می دهد. رابطه بین اختلال های هیجانی/رفتاری و اختلال های ارتباطی به طور فزاینده ای آشکار است. بسیاری از کودکان و نوجوانان مبتلا به اختلال های هیجانی/رفتاری مشکلات زیادی در درک و استفاده از زبان در موقعیت های اجتماعی دارند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "در مقوله مشکلات رفتاری برونی سازی، اختلال رفتار هنجاری رایج ترین مشکلی است که توسط دانش آموزان با مشکلات هیجانی/رفتاری نشان داده می شود. ویژگی هایی مانند کتک زدن، دعوا کردن، فریاد زدن، امتناع از اجابت درخواست ها، گریه کردن، تخریب گری، زورگویی در کودکان با این اختلال شایع هستند. کودکان عادی نیز تقریباً این رفتارها را انجام می دهند اما نه به صورت تکانشی و نه اغلب اوقات."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "در مقوله مشکلات رفتاری برونی سازی، اختلال دیگر نارسایی توجه/فزون کنشی است. رفتار این کودکان نه تنها بسیار مزاحم است، که همچنین از طریق شیوه انضباطی عادی قابل تغییر نیست. اختلال نارسایی توجه/فزون کنشی در فصلی جداگانه به طور مفصل مورد بحث قرار گرفته است، بنابراین از توضیح آن در این بخش صرف نظر می گردد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "پرخاشگری نیز از دیدگاه های مختلف تحلیل شده است. قوی ترین نظریه در این ارتباط مربوط به نظریه های یادگیری اجتماعی مانند بندورا (۱۹۷۳، ۱۹۸۶) و روانشناسان رفتاری مانند کالوین (۲۰۰۴)، والکر و همکاران (۲۰۰۴) و پاترسون و همکاران (۱۹۹۲) است. مطالعات آنها بر تجربه کودک و انگیزه او بر پایه پیامدهای پیش بینی شده پرخاشگری است. به طور خلاصه آنها پرخاشگری را به عنوان رفتار یاد گرفته شده در نظر گرفته و فرض می کنند که می توان شرایطی که در آن پرخاشگری آموخته می شود، شناسایی کرد. کودکان، بسیاری از رفتارهای پرخاشگرانه را با مشاهده والدین، برادر و خواهر، همبازی ها، و افرادی که در تلویزیون و فیلم ها نشان داده می شوند، یاد می گیرند. افرادی که به عنوان مدل های پرخاشگری عمل می کنند اگر مورد تنبیه قرار نگیرند و به گونه ای پاداش هم دریافت کنند، کاملا مورد تقلید قرار می گیرند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "مفیدترین تکنیک ها برای درمان پرخاشگری عبارتند از: کمک کردن به کودک جهت تمرین کردن یا ایفای نقش رفتار غیرپرخاشگرانه فراهم کردن نمونه ها یا مدل هایی از پاسخ های رفتاری غیرپرخاشگرانه که در شرایط تحریک کننده پرخاشگری بروز کردند فراهم کردن تقویت برای رفتار غیرپرخاشگرانه جلوگیری از به دست آوردن پیامدهای مثبت برای رفتار پرخاشگرانه، و استفاده از روش های تنبیهی مانند محروم سازی یا جداسازی اجتماعی."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "اما در بعد دیگر اختلال های هیجانی / رفتاری، کودکان با مشکلات درونی سازی قرار دارند که دارای رفتارهای نامونایافته، گوشه گیری و افسردگی هستند. چنین اختلال هایی نه تنها پیامدهای جدی برای افراد در سال های کودکی به دنبال دارند، که همچنین پیش آگهی بسیار ضعیفی برای سلامت روانی بزرگسالی به دنبال دارند. کودک با این ویژگی ها نمی تواند روابط انسانی نزدیک و رضایت بخشی که نشانگر تحول بهنجار است برقرار کند. این کودکان برای برقراری تعامل با دیگران دچار تردید هستند، گوشه گیری اجتماعی دارند، دوستان اندکی دارند، به ندرت با دوستان هم سن خود بازی می کنند، و فاقد مهارت های اجتماعی ضروری هستند (هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "دیدگاه روان تحلیل گری در تبیین گوشه گیری و افسردگی، آن را به تعارض های درونی و انگیزه های ناهوشیار پیوند می دهد. روان شناسان رفتاری نگر چنین مشکلاتی را به صورت شکست در یادگیری اجتماعی تبیین می کنند که پژوهش های تجربی نیز از آن حمایت کرده است (کافمن، ۲۰۰۵ الف). تحلیل یادگیری اجتماعی گوشه گیری و نامونایافتگی را به یک محیط نامناسب نسبت می دهد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "به طور کلی می توان ویژگی های افراد مبتلا به اختلال های هیجانی / رفتاری را به صورت زیر خلاصه نمود: بیشتر کودکان مبتلا به اختلال های رفتاری در مقایسه با کودکان عادی، هوش متوسط و متوسط به پایین دارند این افراد مشکلات متعددی را در سازش یافتگی در محیط های خانه، مدرسه و محیط های اجتماعی دارند"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "کمتر به مقررات و قوانین مدرسه و جامعه تن می دهند و رفتارهای تضادورزانه در آن ها زیاد است مهارت های حل مسئله در آن ها ضعیف است در برقراری ارتباط با دیگران و به طور کلی در دوستیابی با مشکلاتی روبرو هستند غیبت از مدرسه و ترک تحصیل در آن ها زیاد است و به طور کلی عملکرد تحصیلی در آن ها پایین است."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**برنامه های مداخله ای** دانش آموزان مبتلا به اختلال های هیجانی/رفتاری به طور معمول از نظر پیشرفت تحصیلی در سطح پایینی قرار دارند، میزان ترک تحصیل در آن ها بیشتر و میزان فارغ التحصیلی در آن ها کمتر است. کیفیت برنامه های آموزشی برای دانش آموزان مبتلا به اختلال های هیجانی/رفتاری اغلب ناامیدکننده است. تمرکز برنامه ها اغلب بر مهار بیرونی رفتار دانش آموز است و آموزش تحصیلی و یادگیری اجتماعی اغلب اوقات در مرحله دوم اهمیت هستند یا تقریباً به طور کلی مورد غفلت قرار می گیرند (کافمن، ۲۰۰۵ الف). معلمان ممکن است دانش و مهارت های لازم در تدریس مهارت های اساسی مانند خواندن نداشته باشند (کولمن و واگن، ۲۰۰۰). راهبردهای مهار رفتاری یک بخش ضروری برنامه های آموزشی برای دانش آموزان با مشکلات برونی سازی است (کالوین، ۲۰۰۴). بدون راهبردهای مؤثر مهار رفتارهای مخرب، یادگیری اجتماعی و تحصیلی تا حد زیادی نامحتمل است. آموزش مهارت های تحصیلی بسیار مطلوب، بی تردید بسیاری از مشکلات رفتاری را کاهش می دهد (کافمن و همکاران، ۲۰۰۶). با این حال بهترین برنامه های آموزشی، رفتارهای مخرب همه دانش آموزان را حذف نمی کند. معلمان دانش آموزان مبتلا به اختلال های هیجانی/رفتاری، دارای نیازهای چندگانه و پیچیده هستند. آن ها علاوه بر داشتن مشکلات در مدرسه، در خانه و جامعه نیز با مشکلاتی روبرو هستند (مانند مشارکت در فعالیت های غیرقانونی، فقدان روابط مطلوب با همسالان و بزرگسالان، سوءاستفاده از دارو، مشکلاتی در پیدا کردن و حفظ شغل)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "بنابراین کودکان و نوجوانان مبتلا به اختلال های هیجانی و رفتاری ممکن است علاوه بر آموزش ویژه به دامنه ای از خدمات مبتنی بر خانواده، روان درمانی یا مشاوره، نظارت اجتماعی، آموزش مرتبط با استخدام و نظایر آن نیاز داشته باشند. یک مؤسسه منفرد نمی تواند نیازهای بیشتر این کودکان و نوجوانان را برآورده سازد، اما روشن است که مدرسه یک نقش مهم را ایفا می کند (فارمر و فارمر، ۱۹۹۹). یکپارچه ساختن خدمات مورد نیاز در یک تلاش مؤثر و هماهنگ تر، هم اکنون به عنوان یک ضرورت نگریسته می شود."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "بدون توجه به مدل های مفهومی آموزش، راهبردهای مؤثری را می توان برای برنامه ریزی آموزشی کودکان و نوجوانان مبتلا به اختلال های هیجانی/رفتاری از مداخله اولیه تا انتقال در نظر گرفت. این راهبردها شامل عناصر زیر است:"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "مداخله های نظام مند مبتنی بر داده ها: مداخله هایی که به طور نظام مند و مستمر به کار گرفته می شوند و مبتنی بر داده های پژوهشی معتبر هستند. سنجش مستمر و بازبینی پیشرفت: سنجش مستقیم و روزانه عملکرد با برنامه ریزی مبتنی بر نتایج بازبینی. آماده سازی برای تمرین مهارت های جدید: مهارت ها در انزوا تدریس نمی شوند و به طور مستقیم در موقعیت های روزمره از طریق الگو دهی، تمرین و تکرار، و تمرین هدایت شده به کار گرفته می شوند. درمان با مشکل همسو باشد: مداخله هایی که برای برآوردن نیازهای فردی دانش آموزان و شرایط خاص زندگی آن ها طراحی می شوند، نه فرمول های کلی که ماهیت، پیچیدگی و شدت مسئله را نادیده می گیرند. درمان چند مؤلفه ای: مداخله های بسیار متفاوتی برای برآوردن نیازهای چندگانه دانش آموزان ضروری است (مانند آموزش مهارت های اجتماعی، اصلاح تحصیلی، دارودرمانی، مشاوره یا روان درمانی، و خانواده درمانی، یا آموزش والدین). برنامه ریزی برای انتقال و نگهداری: مداخله هایی برای بهبود انتقال یادگیری به موقعیت های جدید طراحی شوند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "تعهد نسبت به مداخله مستمر: مداخله ها با توجه به این واقعیت طراحی شوند که بسیاری از اختلال های هیجانی / رفتاری، ناتوانی های تحولی هستند که به طور کامل حذف نمی شوند یا درمان نمی گردند. بنابراین برنامه های مداخله ای باید مستمر باشند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "بسیاری از دانش آموزان مبتلا به اختلال های هیجانی یا رفتاری قبل از شناسایی، در مدارس عادی جای دارند و الگوهای مناسب را از همسالان مشاهده و یاد می گیرند. با این حال مشاهده و صرفاً حضور با دیگر دانش آموزان در کلاس های درس عادی و یادگیری اجتماعی و اتفاقی برای حل مشکلات آن ها کافی نیست (کالوین، ۲۰۰۴). این دانش آموزان برای این که مدل های رفتاری مناسب را از همسالان یاد بگیرند به آموزش آشکار و متمرکز درباره نحوه تقلید کردن (از چه کسی و از چه رفتارهایی تقلید کنند) نیاز دارند. علاوه بر این آن ها ممکن است به آموزش آشکار و فشرده در زمینه مهارت های اجتماعی مانند این که چه وقت، کجا و چگونه انواع رفتارهای خاص را نشان دهند، نیاز داشته باشند (والکر و همکاران، ۲۰۰۴)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "برنامه درسی برای بیشتر دانش آموزان با اختلال های هیجانی یا رفتاری با دانش آموزان عادی همان است. موفقیت تحصیلی برای هر فردی در جامعه ضروری و مهم است. شکست در آموزش خواندن، نوشتن، و حساب کردن به یک دانش آموز، شانس او را برای سازش یافتگی موفق برای برآورده ساختن تقاضاهای روزمره زندگی کاهش می دهد. این دانش آموزان که اکتسابات آموزشگاهی را کسب نمی کنند، احتمالاً از لحاظ اجتماعی طرد می گردند (کافمن، ۲۰۰۵، الف)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "مهارت های اجتماعی رفتارهای آموخته شده و مقبول جامعه هستند که موجب برقراری ارتباط متقابل می گردند و منجر به بروز پاسخ های مثبت و پرهیز از پاسخ های منفی می شوند (کارتلج و میلبرن، ۱۹۹۵). به طور کلی مهارت های اجتماعی به انجام رفتارهای خاص مطابق با هنجارها و الزامات محیط اجتماعی و تعاملات بین فردی، و انجام ندادن یا عدم بروز رفتارهای اجتماع ناپسند اطلاق می گردد (حسین خانزاده، ۱۳۸۹). رفتارهای اجتماعی مناسب و دیگر مهارت های سازشی، پایه های سازش یافتگی شخصی و اجتماعی را در زندگی تشکیل می دهند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "(ماتر و راترفورد، ۱۹۹۶) کار و مشارکت در فعالیت های گروهی برای به دست آوردن مهارت های اجتماعی استفاده می شوند. مهارت های اجتماعی برای مقابله و سازش یافتگی با محیط قابلیت های اجتماعی را افزایش می دهند شامل طرد شدن، انزوا، پرخاشگری، گوشه گیری، جرم و بزهکاری (کافمن، ۲۰۰۵؛ والکر، رمسی، و گشام، ۲۰۰۴). به طور کلی به طور کلی اختلال های هیجانی و رفتاری و مشکلات ارتباطی با دیگران، اختلال هایی مانند افسردگی، اضطراب، اختلال های خوردن (اسپنس و همکاران، ۲۰۰۳)، اسکیزوفرنی اسکیزوفرنی و همکاران، ۲۰۰۳). آموزش مهارت های اجتماعی (کافمن، ۲۰۰۵؛ همکاران، ۲۰۰۴) می تواند به طور قابل توجهی کاهش رجوع به مراکز روان درمانی و افزایش پیشرفت تحصیلی و سازش یافتگی مالکی و همکاران، ۱۳۸۹)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "(ماتر و راتر فورد، ۱۹۹۶). مهارت های اجتماعی یک فرد بر توانایی او در بازی کردن، یادگیری، کار، و مشارکت در فعالیت های تفریحی در طول زندگی تأثیر می گذارد. مهارت های اجتماعی برای به دست آوردن تقویت و پذیرش اجتماعی و اجتناب از موقعیت های اجتماعی آزارنده استفاده می شوند. مهارت های اجتماعی دسته ای از قابلیت ها را نشان می دهند که تمامی افراد را برای مقابله و سازش با نیازهای روزمره محیط اجتماعی توانمند می سازند. افرادی که در تحول قابلیت های اجتماعی مناسب شکست می خورند، در معرض مواجه شدن با پیامدهای منفی شامل طرد شدن توسط همسالان، ظهور اختلال های روان شناختی، اخراج از مدرسه، گوشه گیری، جرم و جنایت، و عملکرد تحصیلی پایین هستند (گرشام، وان، و کوک، ۲۰۰۶؛ والکر، رامسی، و گرشام، ۲۰۰۴)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "به طور کلی نتایج تحقیقات مختلف حاکی از آن است که مهارت های اجتماعی ضعیف و مشکلات ارتباطی با همسالان، خانواده و معلمان با بسیاری از شکل های مشکلات روانی مانند افسردگی (سگرین، ۲۰۰۰)، اختلال رفتار هنجار (اسپنس، ۱۹۸۱)، هراس اجتماعی (اسپنس و همکاران، ۱۹۹۹)، نشانگان اوتیسم و آسپرگر (هاریس، ۱۹۹۸)، و شروع زودهنگام اسکیزوفرنی (اسکولز و کولر، ۱۹۸۹) مرتبط است (به نقل از اسپنس، ۲۰۰۳). همچنین آموزش مهارت های اجتماعی باعث کاهش مشکلات رفتاری در دانش آموزان (ورداین و همکاران، ۱۹۹۰؛ سوگای و لویس، ۱۹۹۶؛ کامپز و کای، ۲۰۰۲؛ سیم و همکاران، ۲۰۰۶) کاهش تعداد رفتارهای بزهکارانه و کاهش رجوع نوجوانان به دادگاه (هامند، ۱۹۹۱) افزایش پیشرفت تحصیلی و مشارکت بیشتر در فعالیت های مدرسه (گاتفردسون، ۱۹۸۷؛ مالکی و الیوت، ۲۰۰۲)، کاهش تعداد رفتارهای نامناسب در کلاس درس مانند پرخاشگری،"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "۲۱۰ روان شناسی و آموزش کودکان و نوجوانان"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "**مداخله اولیه** شناسایی اولیه و پیشگیری هدف های اصلی برنامه های مداخله برای هر نوع ناتوانی است. همواره هزینه ارائه خدمات پیشگیرانه کمتر از هزینه های مربوط به درمان در سنین بالاتر است. مداخله های مربوط به کودکان خردسال با هدف پیشگیری یا کاهش تأثیر اختلال رفتاری است. نقش خانواده در این میان بسیار مهم است، چرا که کودک در محیط خانه به سر می برد. گسترش مهارت های ارتباطی و تعامل اجتماعی مناسب با اعضای خانواده از محورهای عمده مداخله است."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "از آن جایی که رفتارهای اجتماعی- هیجانی کودکان خردسال بسیار انعطاف پذیر است، به نظر می رسد که شانس موفقیت تلاش های پیشگیرانه بالا باشد (کافمن، ۲۰۰۵ ج). تعریف اختلال های هیجانی- رفتاری کار دشواری است، با این حال تعریف و شناسایی این اختلال ها در کودکان پیش دبستانی جهت مداخله اولیه با دشواری های بیشتری روبرو است که عبارتند از: ۱. تکالیف تحولی که از کودکان خردسال انتظار می رود در مقایسه با کودکان مسن تر آسان تر است، زیرا دامنه رفتارهای بهنجاری که از کودکان خردسال انتظار می رود، کاملاً محدود است. از نوزادان و کودکان خردسال خوردن، خوابیدن، و انجام مهارت های حرکتی نسبتاً ساده و پاسخدهی اجتماعی به والدین انتظار می رود. با این حال کودکان سنین مدرسه باید مهارت های"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "شناختی و حرکتی پیچیده تری را انجام دهند و با دامنه ای از همسالان و بزرگسالان روابط اجتماعی داشته باشند. ۲. در فعالیت های پرورش کودک توسط والدین شایسته و در انتظارات خانواده از رفتارهای کودکان پیش دبستانی در فرهنگ های مختلف، تنوع زیادی وجود دارد. رفتارهایی که در یک خانواده نمودنایافته، گوشه گیرانه و پرخاشگرانه توصیف می شود، ممکن است در خانواده دیگر این گونه تصور نگردد. ۳. در سال های پیش دبستانی، تحول کودکان سریع و اغلب غیریکنواخت است، بنابراین قضاوت درباره این که چه پیشرفت های ارتجالی ممکن است رخ دهد، دشوار است. ۴. شدیدترین انواع اختلال های هیجانی - رفتاری اغلب اوقات در ابتدا در سال های پیش دبستانی مشاهده می گردند. اما در بیشتر موارد تفاوت بین اختلال های هیجانی/رفتاری با شرایط دیگری مانند کم توانی ذهنی دشوار است. اغلب، اولین نشانه ها مشکلات در کنش های زیست شناختی پایه (مانند تغذیه، خوابیدن، دفع)، پاسخ های اجتماعی نامناسب، یا تأخیر در یادگیری زبان است. مشکلات در این ابعاد اساسی یا در نقاط عطف تحولی مانند راه رفتن و صحبت کردن نشان می دهند که کودک ممکن است ناتوانی های هیجانی یا رفتاری داشته باشد، اما این مشکلات ممکن است همچنین نشانگرهای شرایط دیگر مانند کم توانی ذهنی، آسیب حسی، یا ناتوانی های جسمانی باشند (هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "بسیاری از کودکانی که به خاطر رفتارهای مخرب در سنین ۷ تا ۱۲ سالگی به متخصصان بالینی ارجاع داده می شوند، نشانه های آشکار مشکلات رفتاری را در سنین ۴ الی ۷ سالگی نشان دادند (لوبر و همکاران، ۱۹۹۲؛ والکر و همکاران، ۲۰۰۴). نوزادان و خردسالانی که دارای خلق و خوی دشوار هستند (یعنی دارای الگوهای نامنظم خواب، تغذیه، و دفع هستند؛ پاسخ های بسیار شدید به بسیاری از محرک ها و واکنش های منفی نسبت به موقعیت های جدید نشان می دهند) در معرض خطر جدی مشکلات رفتاری هستند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "از آن جایی که رفتارهای کودکان نسبت به شرایط محیط اجتماعی کاملاً پاسخ دهنده است، بنابراین نقش پیشگیری اولیه بسیار مهم است. اگر والدین و معلمان بتوانند مهارت های مؤثر مدیریت رفتار کودک را بیاموزند، احتمالاً بسیاری از مشکلات رفتاری کودک پیشگیری"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "می گردد (والکر و همکاران، ۲۰۰۴). همچنین در صورتی که والدین و معلمان از این مهارت ها برخوردار باشند، از بدتر شدن وضعیت کودکان مبتلا به اختلال های هیجانی - رفتاری جلوگیری می گردد (پیشگیری ثانویه)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "در صورتی که رفتارهای پرخاشگرانه یا گوشه گیرانه در کودکان پیش دبستانی مشاهده گردد، بهترین نوع مداخله از نوع مداخله های رفتاری است که تا حد زیادی مؤثر هستند. یک رویکرد رفتاری به تعریف و اندازه گیری رفتارهای کودک و چیدمان مجدد محیط (به خصوص پاسخ های بزرگسالان و دیگر کودکان نسبت به مشکل کودک) جهت تدریس و حمایت از رفتارهای مناسب تر اشاره دارد. در مورد کودکان پرخاشگر، پاداش های اجتماعی برای پرخاشگری باید قطع گردد. به عنوان مثال کتک زدن دیگران به جای دریافت توجه بزرگسال باید طرد اجتماعی و محروم سازی را به دنبال داشته باشد. در هر صورت اگر کودکان مبتلا به اختلال های هیجانی - رفتاری در سنین اولیه شناسایی گردند و مداخله کافی جامع، شدید و مستمر دریافت کنند، با احتمال زیاد بهبود می یابند و الگوهای رفتاری از نظر تحولی بهنجار را نشان خواهند داد (والکر و همکاران، ۲۰۰۴)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "خلاصه فصل تعریف اختلال های هیجانی/رفتاری به علت فقدان تعریف دقیق از سلامت روان و رفتار بهنجار، تفاوت های اساسی در مدل های مفهومی و مشکلات در اندازه گیری هیجان ها و رفتار چندان ساده نیست. این اختلال ها تأثیر معناداری را بر عملکرد تحصیلی، اجتماعی و حرفه ای افراد می گذارند. طبقه بندی های مختلفی از اختلال های هیجانی/رفتاری تاکنون صورت گرفته است که رایج ترین آن عبارت است از: اختلال های رفتاری درونی سازی (مانند اضطراب و افسردگی) و اختلال های رفتاری برونی سازی (مانند پرخاشگری، تخریب گری). برخی کودکان ممکن است هر دو دسته اختلال های درونی سازی و برونی سازی را دارا باشند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "نتایج تحقیقات حاکی از آن است که حداقل ۶ تا ۱۰ درصد کودکان و نوجوانان سن مدرسه مشکلات جدی و پایدار هیجانی/رفتاری را نشان می دهند. گزارش های مختلف میزان شیوع ۰/۵ تا ۲۰ درصد را در میان جمعیت مدرسه نشان داده اند. همچنین میزان شیوع اختلال های هیجانی/رفتاری در بین پسران نسبت به دختران بیشتر است (نسبت ۵ به ۱)."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "به طور کلی مجموعه ای از عوامل زیست شناختی، ژنتیکی، خانوادگی، و فرهنگی در ایجاد اختلال های هیجانی / رفتاری مؤثرند که تعیین سهم هر یک از آنها دشوار است. فرایند شناسایی اختلال های هیجانی / رفتاری نسبت به تعریف، طبقه بندی و سبب شناسی آسان تر است. با این حال هر چه سن کودک پایین تر باشد، قضاوت درباره جدی بودن مشکل او دشوار است و بسیاری از آنها مورد شناسایی قرار نمی گیرند. به نظر می رسد که غربالگری اولیه توسط معلمان و در مرحله بعد ارزیابی توسط روانشناس یا روانپزشک، فرایند شناسایی را دقیق و مطمئن می سازد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "نتایج تحقیقات حاکی از آن است که دانش آموزان مبتلا به اختلال های هیجانی / رفتاری از نظر هوشی در سطح متوسط یا پایین تر از متوسط قرار دارند و به ندرت از لحاظ پیشرفت تحصیلی، پیشرفته هستند. افت تحصیلی و اخراج از مدرسه در آنها شایع است. این دانش آموزان به مقررات عمل نمی کنند و قوانین خانه، مدرسه و جامعه را نادیده می گیرند. همچنین در برقراری ارتباط و دوست یابی دارای مشکلات اساسی هستند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "محورهای عمده در مداخله و درمان اختلال های هیجانی / رفتاری عبارتند از: آموزش خانواده، مشاوره، رفتاردرمانی و دارودرمانی. آموزش مهارت های اجتماعی بدون توجه به مدل های مفهومی متعدد، راهبردهای مؤثر در برنامه ریزی آموزشی دانش آموزان مبتلا به اختلال های هیجانی / رفتاری عبارتند از: مداخله های سیستماتیک مبتنی بر داده ها، سنجش مستمر و بازبینی پیشرفت، تمرین مهارت ها در محیط های طبیعی، همسو بودن درمان با مشکل، درمان چندمؤلفه ای، برنامه ریزی برای انتقال یادگیری به موقعیت های جدید، و تعهد نسبت به مداخله مستمر."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "یکی از محورهای عمده در درمان اختلال های هیجانی / رفتاری، آموزش مهارت های اجتماعی است. نتایج تحقیقات متعدد حاکی از آن است که آموزش مهارت های اجتماعی باعث کاهش در تعداد رفتارهای بزهکارانه، پرخاشگری، تکانشگری، نارسایی توجه، و افزایش پیشرفت تحصیلی، خودکارآمدپنداری اجتماعی و سازش یافتگی اجتماعی می گردد."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "در نهایت این که شناسایی اولیه و پیشگیری و مداخله اولیه همواره هم برای کودک و خانواده او و هم برای جامعه مفید و به صرفه است و بسیاری از کودکانی که در سنین مدرسه، مشکلات رفتاری زیادی را نشان می دهند در سنین خردسالی، نشانه های آشکار آن را"}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "دارا بودند. مهم ترین راهبرد در مورد مشکلات رفتاری کودکان پیش دبستانی، آموزش والدین و مداخله های رفتاری است."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "[x] هدف: از خواندن این فصل، انتظار می رود که دانشجو بتواند: ۱. تحول رفتارهای هنجار و نابهنجار را در دوران کودکی توضیح دهد. ۲. انواع اختلالات رفتاری شایع در دوران کودکی را نام ببرد. ۳. راهبردهای پیشگیری از مشکلات رفتاری را در کودکان بیان کند. ۴. روش های ارزیابی و تشخیص اختلالات رفتاری را شرح دهد. ۵. نظریه های تبیین کننده مشکلات رفتاری را با یکدیگر مقایسه کند."}, {"c": "فصل ششم: اختلال‌های هیجانی / رفتاری", "t": "Extracted images (126): `parsed-documents://20260708-121712-560132/فصل_5_و_6_کتاب_کودکان_و_نوجوانان_با_نیازهای_ویژه_تالیف_خانزاده_compressed.pdf/images/img_p10_1.jpg
