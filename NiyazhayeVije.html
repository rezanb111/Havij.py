ل های ارتباطی را توضیح دهد 4. راهبردهای آموزشی مختلف جهت بهبود اختلال های ارتباطی را شرح دهد 5. نقش خانواده را در پیشگیری از اختلال های ارتباطی بیان کند"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "برقراری ارتباط یک بخش طبیعی زندگی روزمره ما است و تنها شامل صحبت کردن نمی گردد. ارتباط، درک گفتار و ایما و اشاره، خواندن و نوشتن را نیز شامل می شود. برای برخی افراد، برقراری ارتباط بدون تلاش و همراه با احساس خوشایند نیست. مشاهده اکتساب گفتار و زبان در کودکان، والدین را شادمان و ناتوانی کودک در تحول زبان و گفتار، آنها را مستأصل می کند. همه اختلال های ارتباطی شامل اختلال های گفتار نمی گردد، همه اختلال های گفتاری که در تعامل اجتماعی معلولیت ایجاد می کنند، شامل لکنت نمی گردد، و در نهایت این که لکنت رایج ترین اختلال گفتار نیست. بدون شناخت تحول بهنجار زبان، درک اختلال های ارتباطی دشوار است. بنابراین قبل از بحث اختلال های زبان و گفتار، تحول بهنجار زبان را به طور مختصر شرح می دهیم."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "تحول زبان نسلون (۱۹۹۸) شش نظریه زبان را مطرح کرد که در زمان های مختلف درباره ارتباط انسانی مورد بحث قرار گرفتند: 1. یادگیری زبان به تحول مغز و کنش وری صحیح مغز وابسته است. اختلال های زبان بعضی زمان ها نتیجه نارساکنش وری مغز است، و روش های جبران نارساکنش وری بعضی اوقات می تواند آموزش داده شود. تأکید بر روی نمویافتگی زیست شناختی است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "۲. یادگیری زبان تحت تأثیر پیامدهای رفتار زبانی است. اختلال های زبان می تواند نتیجه یادگیری نامناسب باشد و پیامدها می تواند برخی اوقات برای تصحیح اختلال زبانی به کار گرفته شود. تأکید بر روان شناسی رفتاری است. ۳. زبان می تواند به عنوان درون دادها و برون دادهای مرتبط با پردازش اطلاعات مورد تحلیل قرار گیرد. پردازش ناقص ممکن است علت برخی اختلال های زبان باشد و مهارت های پردازش مؤثر وقت ها می تواند آموخته شود. تأکید روی پردازش اطلاعات است. ۴. زبان حاصل یک فرایند زیست شناختی است که قواعد حاکم بر فرم، محتوا، و استفاده از زبان را دیکته می کند. اختلال های زبان نتیجه شکست در کسب یا به کار بردن قواعد حاکم بر زبان است، و این اختلال ها با کمک به فرد جهت یادگیری این قواعد، قابل حل است. تأکید بر روی دیدگاه زبان شناسی ذاتی است. ۵. زبان یکی از مهارت های شناختی متعدد است. اختلال های زبان مشکلات اساسی در تفکر و یادگیری را منعکس می کند و بعضی وقت ها این اختلال ها می توانند به طور مؤثری با آموزش مهارت های شناختی خاص مورد توجه قرار گیرد. تأکید بر روی تحول شناختی است. ۶. زبان از نیاز به برقراری ارتباط در تعاملات اجتماعی برمی خیزد. اختلال های زبان شامل درهم شکستگی در توانایی ارتباط مؤثر با محیط است و محیط طبیعی بعضی وقت ها می تواند برای تدریس و حمایت مؤثرتر تعامل، سازماندهی شود. تأکید بر روی تعامل اجتماعی است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "همه این نظریه ها عناصر حقیقت علمی را در بر دارند، اما هیچ کدام توانایی تبیین تحول زبان و اختلال های زبان و اختلال های زبان به طور کامل را ندارند. هر شش نظریه فواید و معایبی برای تشخیص اختلال های زبان و تجویز مداخلات مؤثر دارا هستند. پیشرفت در فن آوری تصویربرداری از نورون ها منجر به درک بهتر پایه های زیست شناختی زبان شده است (فونداس، ۲۰۰۱). با این حال نظریه تعامل اجتماعی بیشترین استلزام های مستقیم را برای آسیب شناسان گفتار و زبان به دنبال دارد، زیرا بر چگونگی پرورش مهارت های ارتباطی از طریق تعامل بزرگسال - کودک تأکید می کند (آنز، ۲۰۰۴)."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "در سال اول و اوایل سال دوم زندگی باید از رفتارهای پیش زبان شناختی سخن گفت و نمی توان از زبان به معنای دقیق کلمه استفاده نمود. بیشتر نوزادان در دو تا سه ماهگی شروع به غان"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "و غون می کنند و در ۵ الی ۶ ماهگی صداهایی تولید می شود که شبیه کلمات است و با تقویت والدین، تکرار می گردند. سپس مهار تلفظ در تولید نخستین کلمات و ظرفیت بازپدیدآوری بلافاصله یا تقریبی کلماتی که بزرگسال می گوید صورت می گیرد. بیشتر کودکان تا یک سالگی اولین کلمات را بیان می کنند و در حدود ۱۸ ماهگی بیشتر آنها می توانند جمله های دو کلمه ای بسازند. افزایش کلمات تولیدی و دریافتی بین بروز نخستین کلمات که تا سن یک سالگی اتفاق می افتد و پایان سال دوم زندگی به نسبت کند است، ولی پس از آن با افزایش سریع مواجه هستیم که طی آن جمله های دوکلمه ای یا بیشتر بیان می گردند. به طور کلی تحول بهنجار زبان از سنین یک تا هفت سالگی در جدول ۱-۷ به صورت خلاصه ارائه شده است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "جدول ۱-۷: تحول بهنجار زبان از یک تا هفت سالگی"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "سنوضعیت زبان یک سالگیشناختن نام خود، انجام دستورات ساده، بیان یک یا دو کلمه، درهم آمیزی واژه ها و صوت های بی معنا، به کار بردن ادا و اطوارهای ارتباطی مانند نشان دادن و اشاره کردن دوسالگیبه کار بردن ۲۰۰ تا ۳۰۰ کلمه، بیان کردن نام اشیای رایج، بیان کردن عبارت های دو واژه ای یا طولانی، یادگیری چند حرف اضافه، ضمیر، فعل و علامت جمع (البته همیشه آنها را درست به کار نمی برد) سه سالگیبه کار بردن ۹۰۰ تا ۱۰۰۰ کلمه، ساختن جمله های ۳ تا ۴ کلمه ای، تکرار جمله های ۵ تا ۷ سیلابی، مفهوم بودن تکلم کودک برای اعضای خانواده چهار سالگیبه کار بردن ۱۵۰۰ تا ۱۶۰۰ واژه، شرح دادن داستان ها و رویدادهای گذشته نزدیک، به کار بردن حروف ربط (مانند اما، چون)، قابل فهم بودن تکلم کودک برای غریبه پنج سالگیبه کار بردن ۲۱۰۰ تا ۲۳۰۰ واژه، بیان نمودن احساس های خود، درک بیشتر حرف های اضافه مربوط به مکان (بالا، پایین) و زمان (قبل، بعد)، انجام دستورهای سه مرحله ای"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "زبان و گفتار، ابزارهای مورد استفاده برای برقراری ارتباط هستند. برقراری ارتباط فرایند مشارکت دادن اطلاعات بین دو یا چند نفر است. گفتار به معنای تولید شفاهی کلمات در یک زبان معین است و تنها زمانی که اصوات بتوانند منجر به تولید کلمات معناداری گردند، به گفتار تبدیل می شوند. چهار فرایند در تولید گفتار نقش دارند: ۱. تنفس که نیروی لازم را برای گفتار به وجود می آورد. ۲. صوتی سازی که تولید صوت بر اساس لرزش تارهای صوتی است. ۳. طنین که به کیفیت صدا اشاره دارد و ویژگی منحصر به فرد صدای گوینده را مشخص می سازد. ۴. تلفظ که به حرکت دهان و زبان و تبدیل صوت به آواهای تشکیل دهنده گفتار اشاره دارد. اختلال در هر یک از چهار فرایند بالا به اختلال گفتار می انجامد، ولی الزاماً یادگیری زبان یا خواندن و نوشتن را مختل نمی سازد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "اختلال ارتباطی ممکن است زبان یا گفتار یا هر دو را شامل شود و به کنش های ارتباطی (مانند تقاضاکردن، طرد کردن، بحث کردن و استدلال) آسیب برساند. ارتباط مستلزم رمزگذاری (ارسال پیام ها به صورت قابل فهم) و رمزگشایی (دریافت و فهم پیام ها) است. در برقراری ارتباط همواره یک فرستنده و یک گیرنده پیام مشارکت دارند، اما زبان همیشه درگیر نیست. برای مثال حیوانات، از طریق حرکت ها و صداها ارتباط برقرار می کنند، اما ارتباطشان به عنوان زبان حقیقی نیست (جاستیک، ۲۰۰۶). زبان و گفتار ابزارهای مهم برای ارتباط انسان هستند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "اما زبان، ارتباط افکار (فرستادن و دریافت آن ها) از طریق سیستم اختیاری نمادهاست و بر اساس قواعد معینی جهت انتقال معنا (مفهوم) به کار می رود؛ کنش پیچیده ای که بیان و ادراک حالت های عاطفی، مفاهیم و افکار را توسط نشانه های صوتی یا تصویری میسر می سازد. رمزگذاری یا ارسال پیام ها به زبان بیانی، و رمزگشایی یا فهم پیام به زبان دریافتی اشاره دارد. وقتی که افراد"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "به زبان فکر می کنند، آنها معمولا به زبان شفاهی فکر می کنند. گفتار - فعالیت ماهیچه ای/عصبی شکل دادن و زنجیره سازی صداهای زبان شفاهی - رایج ترین سیستم نمادی است که در ارتباط بین انسان ها استفاده می شود. با این حال بعضی زبان ها، مبتنی بر گفتار نیست. برای مثال زبان اشاره آمریکایی صداهای گفتار را درگیر نمی کند و یک زبان دستی (راهنما) است که توسط کسانی که نمی توانند گفتار را بشنوند، استفاده می شود."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "انجمن زبان - گفتار - شنیدن آمریکا (۲۰۰۱) تعریف اختلال های ارتباطی را شامل اختلال های گفتار و اختلال های زبان تعریف کرد. اختلال های گفتار، اختلال در تولید و استفاده از زبان شفاهی هستند و شامل ناتوانی هایی در ایجاد صداهای گفتار، تولید گفتار با جریان نرمال، و تولید صدا است. یک اختلال ارتباطی ممکن است در فرایندهای شنیدن، زبان یا گفتار نمایان شود. برای این که فرد مبتلا به اختلال ارتباطی واجد شرایط دریافت خدمات ویژه گردد، باید اختلال ارتباطی او بر یادگیری او تأثیر گذاشته باشد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "اختلال های زبان شامل مشکلات در دریافت و بیان است. زبان توسط برخی قواعد مدیریت می شود. مشکلات ممکن است شامل شکل، محتوا، یا کاربرد آن گردد. واج شناسی به قواعد حاکم بر صداهای گفتار، صداهای خاص و این که چطور آنها برای ایجاد کلمات بامعنا مرتب شوند اشاره دارد. واج ها به تنهایی واجد معنا نیستند. ریخت شناسی به قواعد حاکم بر تغییرات سازمان درونی کلمات مانند اضافه کردن پسوند و قواعد دستوری دیگر برای ساخت جمع های مناسب، زمان فعل، و غیره اشاره دارد. نحو، به قواعد سازماندهی جمله ها یعنی نظامی از قواعد که ترتیب و ترکیب کلمات را برای ساخت عبارت ها و جمله ها تعیین می کند اشاره دارد. معناشناسی به قواعد پیوند دادن معانی و مفاهیم به کلمات اشاره دارد. کاربردشناسی به قواعد استفاده از زبان برای هدف های اجتماعی اشاره دارد. اختلال های زبان ممکن است هر یک از مؤلفه های بالا یا ترکیبی از آنها را شامل گردد. تفاوت ها در گفتار یا زبان افراد یک منطقه معین، گروه اجتماعی، یا گروه فرهنگی/نژادی، نباید اختلال در نظر گرفته شود."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "به طور مشابه، استفاده از سیستم های ارتباط افزایشی یا جایگزین بر اختلال زبانی شخص دلالت ندارد. این سیستم ها توسط کسانی که ناتوانی های موقتی یا پایدار دارند و برای استفاده از گفتار جهت برقراری ارتباط مناسب، مورد استفاده قرار می گیرند. کسانی که از این سیستم ها استفاده می کنند ممکن است علاوه بر ناتوانی در استفاده از گفتار، دارای اختلال های زبان نیز باشند و ممکن است نباشند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "میزان شیوع تعیین میزان شیوع اختلال ارتباطی مشکل است چون آن ها به شدت متنوع اند، بعضی اوقات شناسایی آن ها مشکل است، و اغلب به عنوان بخشی از ناتوانی های دیگر مانند کم توانی ذهنی، آسیب مغزی، ناتوانی یادگیری، و اوتیسم وجود دارند. حدود یک میلیون کودک (یک پنجم همه کودکانی که برای آموزش ویژه تشخیص داده شدند) خدمات آموزش ویژه را بیشتر به خاطر اختلال های زبان یا گفتار دریافت می کنند. درمان گفتار- زبان یکی از رایج ترین خدمات فراهم شده برای کودکان با ناتوانی های اصلی دیگر مانند کم توانی ذهنی یا ناتوانی یادگیری است. شاید منطقی باشد که در حدود ۱۰ تا ۱۵ درصد کودکان پیش دبستانی و حدود ۶ درصد دانش آموزان پایه های ابتدایی و متوسط، اختلال های گفتاری دارند. حدود ۲ تا ۳ درصد کودکان پیش دبستانی و حدود ۱ درصد جمعیت سن مدرسه اختلال های زبانی دارند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "طبقه بندی اختلال های ارتباطی اختلال های ارتباطی را می توان در دو دسته کلی اختلال های گفتار و اختلال های زبان تقسیم نمود. اختلال های زبان را می توان بر اساس دو بعد اصلی حوزه (زیر سیستم یا نوع) و سبب شناسی طبقه بندی کرد. انجمن زبان - گفتار - شنیدن آمریکا، پنج زیرسیستم یا انواع زبان را مشخص کرده است: واج شناسی (صداها)، ریخت شناسی (شکل های کلمه)، نحوشناسی (آرایش کلمه و ساختار جمله)، معناشناسی (معانی کلمه و جمله)، کاربردشناسی (استفاده اجتماعی از زبان). مشکلات در هر یک از این ابعاد زبان با مشکلات در سایر ابعاد همراه است. با این حال کودکان با اختلال زبان اغلب در یک بعد مشکل خاص دارند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "روش دیگر طبقه بندی اختلال زبان مبنی بر علت مفروض یا شرایط مرتبط است. طبقه بندی بر اساس سبب شناسی به دو زیر مقوله اولیه و ثانویه تقسیم می شود. اختلال زبان اولیه، علت شناخته شده ندارد. یک اختلال زبان ثانویه توسط شرایط دیگر مانند کم توانی ذهنی، آسیب شنیداری، اختلال های طیف اوتیسم، فلج مغزی، یا آسیب مغزی ناشی از ضربه ایجاد می گردد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "اختلال های اولیه زبان: نارسایی زبانی ویژه به اختلال های زبان اشاره دارد که علت قابل شناسایی ندارد. این اختلال ها ناشی از کم توانی ذهنی نیستند و شامل جنبه های مختلف زبان می گردند. بسیاری از کودکان با این اختلال مشکلاتی را در تحول واژگان و دستور زبان خواهند داشت."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "تأخیر اولیه در زبان بیانی به کندی معنادار در تحول زبان بیانی اشاره دارد. حدود نیمی از کودکان که در تحول زبان به تأخیر افتادند از لحاظ تحولی در سن دو سالگی به تدریج به همالان خود می رسند و نیمی دیگر به سطح همسالان خود نمی رسند و به داشتن مشکلات زبان در سنین مدرسه ادامه می دهند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "نارسایی خواندن مبتنی بر زبان شامل مشکل در خواندن مبتنی بر یک اختلال زبانی است. این اختلال تا زمان آغاز یادگیری خواندن قابل شناسایی نیست. تحقیقات در مورد چنین توانایی هایی به عنوان آگاهی واج شناسی، شناخت حروف الفبا، و گفتار دستوری به تشخیص کودکان آسیب پذیر به این نوع اختلال کمک کرده است (جاستیک و اسکیول، ۲۰۰۴). بیش از ۵۰ درصد کودکانی که اختلال های زبان را در کودکستان نشان می دهند مشکلات آشکار خواندن را تا پایه دوم نشان می دهند (کتز و همکاران، ۲۰۰۱)."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "اختلال های ثانویه زبان: ادبیات پژوهشی در مورد اختلال های زبان اغلب شامل بحث در مورد اختلال های ارتباطی خاص افراد با شرایط ناتوان کننده دیگر مانند کم توانی ذهنی یا"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "اختلال طیف اوتیسم (اونز، ۲۰۰۴). مشکل در استفاده از زبان در تعاملات اجتماعی و روابط، هم اکنون به عنوان مشکل اصلی در بسیاری از اختلال ها نگریسته می شود. برای مثال اختلال های هیجانی و رفتاری، ممکن است از گوشه گیری اجتماعی تا برون ریزی شدید و پرخاشگری گسترده باشد (باتلر، ۱۹۹۹ الف). کودکان خردسالی که اختلال های زبان دارند ممکن است مشکل خاص در تحول مهارت ها در تعامل اجتماعی داشته باشند، زیرا آنها شرایط اجتماعی را درست تفسیر نمی کنند و در ابراز خود مشکل دارند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "اختلال های گفتار بسیار ناهمگن هستند. انواع، درجات و ترکیب های متفاوتی از این اختلال ها وجود دارد. اختلال های گفتار دامنه وسیعی از چالش های ارتباطی کودکان مدرسه را در بر می گیرد. کودکان مبتلا به اختلال های گفتار در تولید مناسب صداها، حفظ مناسب جریان یا ریتم گفتار، یا استفاده مناسب از صدا مشکل دارند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "گفتار طبیعی عادی با برخی وقفه ها در سیالی گفتار مشخص می شود. به طور خاص وقتی که یک کودک صحبت کردن را یاد می گیرد، نارسایی در سیالی گفتار او طبیعی است. به طور کلی این نارسایی ها شامل درنگ ها، تکرارها، و سایر وقفه های در سیالی گفتار، بخش های طبیعی یادگیری استفاده از زبان هستند. همه ما برخی صداهای گفتار را با نظم غلط (گفتن یارانه به جای رایانه) تلفظ می کنیم یا در جای نامناسبی در یک جمله توقف می کنیم و یا این که از الگوی نامناسب تاکید استفاده می کنیم. اما هنگامی که این نشانه ها فراگیر و مکرر صورت گیرد به طوری که فهم جملات را تحت تأثیر قرار دهد، به عنوان اختلال در نظر گرفته می شود."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "رایج ترین نوع اختلال در سیالی، لکنت است. لکنت با نارسایی طبیعی در سیالی گفتار از جنبه های میزان و نوع نارسایی در سیالی متفاوت است. کودکانی که لکنت دارند در مقایسه با کودکان بدون لکنت، عدم سیالی را در سطح وسیع تری نشان می دهند و تقریباً بیشتر از ده"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "درصد از گفتار آن ها را شامل می گردد (گیتار، ۱۹۹۸). لکنت زبان ویژگی سخن گفتن در کودکانی است که پیشایشی واکنش های فزون تندی در آن ها مشهود است. کودکانی که لکنت دارند بخش هایی از یک کلمه را تکرار می کنند (من- می- می- می- می خواهم)، طولانی کردن صدا (آن در خااا اا نه من است...) و انسداد صدا همگی انواع مشکلات در سیالی گفتار هستند. حدود ۱ درصد کودکان و بزرگسالان لکنت دارند. پسران بیشتر از دخترها لکنت دارند. بسیاری از کودکان به طور سریع عدم سیالی در گفتار را پشت سر می گذارند و والدین و معلمان آن ها درباره الگوی گفتارشان نگران نیستند. آنهایی که برای بیشتر از یک سال و نیم یا دو سال لکنت دارند با خطر لکنت های مزمن مواجه هستند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "به طور کلی لکنت با عوامل مختلفی مرتبط است، این عوامل عبارتند از: ۱) جنسیت: میزان لکنت در پسرها نسبت به دخترها ۳ تا ۷ برابر بیشتر است. ۲) عامل وراثت: تبیین رابطه لکنت و وراثت بسیار دشوار است. ۳) تقلید کردن: یکی از شایع ترین علت لکنت در کودکان تقلید و اکتساب از الگوهای ناصحیح است. بدین معنا که کودک با مشاهده نحوه تکلم افراد الکن در مجاورت خود، به صورت ناخودآگاه شیوه نادرست تکلم را یاد می گیرد و به لکنت دچار می شود. ۴) شرایط محیطی و عاطفی: شرایط تنش زا و نابسامان خانواده ها می تواند باعث ایجاد لکنت در کودک گردد. ترساندن کودک، تصادف با ماشین، افتادن از بلندی، و دیگر شرایط تنیدگی زا می تواند باعث ایجاد لکنت گردد. بر این اساس لکنت می تواند یک رفتار واکنشی باشد؛ یعنی پاسخ ناخودآگاه کودک به رویدادهای تنیدگی زای محیطی."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "برای درمان لکنت باید محورهای مختلفی را مورد توجه قرار داد مانند: آموزش والدین جهت برخورد مناسب با کودک، تقویت اعتماد به نفس کودک، صحبت کردن با فرد الکن درباره مشکل او، تشویق کودک به حرف زدن درباره ترس ها، تنش ها و کامیابی نافتگی های خود و در نتیجه کاهش تنیدگی های روانی، پذیرش کودک با وضعیت گفتاری که دارد با تمام وجود و با صمیمیت، نه با ترحم (نشان دادن واکنش هیجانی نامناسب والدین به هنگامی که کودکشان دچار لکنت می شود بسیار آسیب زا است)."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "در هر صورت کودکی که تصور می شود لکنت دارد باید توسط یک آسیب شناس گفتار - زبان ارزیابی شود. تشخیص زودهنگام برای اجتناب از تحول لکنت مزمن مهم است. متأسفانه، بسیاری از معلمان و پزشکان لکنت های بالقوه را برای سنجش عمیق ارجاع"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "نمی دهند، چون عدم سیالی را یک بخش طبیعی از تحول گفتار - زبان می پندارند. بعضی متخصصان همچنین از رویکرد «صبر و مشاهده» دفاع می کنند (کرلی و یارلی، 1997). اما عدم مراجعه برای کودکانی که در خطر لکنت هستند به شدت مضر است، اگر لکنت مداوم آن ها بدون درمان بماند ممکن است منجر به یک اختلال مادام العمر گردد که در توانایی شان برای ارتباط، تحول احساسات مثبت درباره خودشان، دنبال کردن فرصت های آموزشی و استخدام تأثیر گذارد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "ماهیچه هایی که گفتار را ممکن می سازند تحت مهار ارادی هستند. وقتی که آسیب در نواحی مغز که ماهیچه های مربوط به گفتار یا اعصاب منتهی به آن ماهیچه ها را مهار می کنند وجود دارد در توانایی صحبت کردن طبیعی، اختلال به وجود می آید. این اختلال ها ممکن است شامل صداهای گفتار (دیس آرتری) یا برنامه ریزی و هماهنگی گفتار (آپراکسیا) شود. هر دو اختلال بر تولید گفتار، آهستگی سرعت آن و کاهش قابلیت فهم تأثیر می گذارند (آنز و همکاران، 2000). به یاد داشته باشید که دیس آرتری و آپراکسیا مانعه الجمع نیستند و یک فرد می تواند هر دو مشکل را داشته باشد. چون این اختلال ها توسط مشکلات عصب شناختی ایجاد می شوند و اغلب به عنوان اختلال های گفتار نوروژنیک نامیده می شوند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "با شنیدن گفتار شخص و رسیدگی به مکانیسم گفتارش، آسیب شناسان گفتار - زبان توانایی شخص مبتلا به اختلال حرکت - گفتار یا اختلال گفتار نوروژنیک را با مهار نفس کشیدن، صوتی سازی، طنین و حرکت های مفصل بندی ارزیابی می کنند. متخصصان پزشکی، جراحی و توانبخشی در درمان اختلال های عصب شناختی، همچنین باید مشکل شخص را ارزیابی کنند و یک راهبرد مدیریتی را طرح ریزی کنند. در موارد این چنین که اختلال عصب"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "شناختی، گفتار شخص را غیر قابل فهم می سازد، یک سیستم ارتباطی افزایشی یا جایگزین ممکن است لازم باشد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "**اختلال دیس آرتریا:** مشکلات در صحبت کردن ممکن است به این علت باشد که ماهیچه های مهار کننده تنفس، حنجره، نای، زبان، فک (آرواره)، و یا لب ها نتوانند به درستی مهار گردند. بسته به ماهیت آسیب به مغز، کنش های ادراکی و شناختی ممکن است تحت تأثیر قرار گیرند و فرد ممکن است اختلال زبان را علاوه بر اختلال گفتار داشته باشد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "دیس آرتریا با گفتار آهسته، پرزحمت، جویده جویده، و غیردقیق مشخص می شود. در نتیجه آسیب مغز، حمایت تنفسی شخص برای تولید صداهای گفتار تحت تأثیر واقع می شود و گفتار فرد ممکن است با تنفس کم عمق، گرفتگی صدا، و کاهش بلندی مشخص شود. شخص ممکن است به خاطر ضعف ماهیچه، قادر به تولید صداهای گفتار به طور دقیق نباشد. احتمالاً شرایطی که به طور رایج در توجیح اختلال دیس آرتریا در کودکان مطرح است، فلج مغزی است. آسیب مغزی قبل، هنگام، و بعد از تولد به ضعف ماهیچه ای یا فلج منجر می گردد. بسیاری از علل آسیب مغزی عبارتند از: آسیب جسمانی، محرومیت اکسیژن، مسمومیت، بیماری ها و سکته. تصادفات وسایل نقلیه یک دلیل رایج آسیب مغزی ناشی از ضربه در نوجوانان و جوانان است. به طور کلی هر عاملی که به آسیب مغزی منجر گردد، می تواند باعث دیس آرتریا گردد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "**آپراکسیا:** آپراکسیا با اختلال در برنامه ریزی حرکتی مشخص می گردد، به گونه ای که گفتار آهسته، پرتقلا، و ناپایدار است. یک شخص با این اختلال ممکن است تشخیص دهد که خطاهایی دارد و برای اصلاح آن ها تلاش کند، اما تلاش هایش در جهت اصلاح، درک گفتار او را مشکل تر می سازد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "آپراکسیای تحولی، یک اختلال در برنامه ریزی حرکتی است که با تحول مهارت های گفتاری و زبانی کودک پدیدار می گردد. کودکان مبتلا به این اختلال تأخیر معناداری در توانایی تولید صداهای گفتار و سازمان دادن صداها به کلمات برای ارتباط مؤثر نشان می دهند. آپراکسیای اکتسابی، دارای نشانه های مشابه است، اما به خاطر یک سکته یا انوع دیگر آسیب مغزی بعد از یادگیری گفتار اتفاق می افتد. معمولاً شخص مبتلا به اختلال آپراکسیا می داند که خطاهایی دارد، می خواهد آن ها را تصحیح کند، و آنچه که برای ارتباط می خواهد را می داند؛ اما"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "به سادگی نمی تواند انجام دهد. در نتیجه آپراکسیا یک اختلال مأیوس کننده غیرمعمول برای گوینده است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "**فرآیند سنجش** اولین استراتژی به طور خاص شامل استفاده از آزمون های استاندارد، غیراستاندارد شده، مقیاس های تحولی و مشاهدات رفتاری است. آزمونگری استاندارد شده خطرات زیادی دارد و همیشه در برنامه ریزی یک برنامه مداخله ای مفید نیست. اما بعضی اوقات می تواند مقایسه های اجمالی از توانایی های کودک در حوزه معین مفید باشد. مقیاس های تحولی، مشاهدات یا درجه بندی هایی هستند که می توانند به وسیله مشاهده مستقیم یا مبتنی بر حافظه و گزارش های مراحل برجسته تحول کامل گردند. آزمون های غیراستاندارد شده و مشاهدات رفتاری، از لحاظ ماهیت غیرهنجاری هستند، اما می توانند بیشترین اطلاعات سنجش را به دست دهند. قضاوت غیرعینی یک متخصص بالینی با تجربه مبتنی بر مشاهده زبان کودک در محیط ها و شرایط گوناگون می تواند پایه مفیدتری برای مداخله فراهم کند. از آن جایی که اختلال ها از نظر ماهیت بسیار متنوع هستند در افراد در محدوده سنی اوایل کودکی تا سنین پیری دیده می شوند. سنجش و مداخله هرگز ساده نیستند و همیشه غیر متعارف هستند (گیلام و هافمن، ۲۰۰۱؛ اونز، ۲۰۰۴). یک طرح مداخله مبتنی بر سنجش باید به محتوا، شکل، زمینه اجتماعی، و استفاده از زبان توجه کند و در آن موارد زیر مورد توجه قرار گیرد: کودک درباره چه چیزی صحبت می کند و باید بیاموزد تا درباره چه چیزی صحبت کند؟ چطور کودک درباره امور مختلف صحبت می کند و چطور می تواند صحبت درباره امور مختلف را یاد بگیرد تا قابل فهم باشد کنش های کودک در بافت اجتماعی زبان شناسی چگونه است؟ چگونه کودک از زبان استفاده می کند و چگونه زبان کودک می تواند برای هدف های برقراری ارتباط و اجتماعی مؤثر استفاده شود."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "سازماندهی توالی آموزش بر اساس داده های سنجش، ممکن است بر پایه توالی تحول بهنجار کودک باشد. با این حال، توالی های دیگر آموزش ممکن است مؤثرتر باشد، زیرا کودکان مبتلا به اختلال های زبان به طور آشکار به روش بهنجار یاد نگرفته اند و تحقیقات"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "نشان داده است که توالی های متفاوت یادگیری ممکن است مؤثرتر باشد. به طور آشکار مداخله مؤثر زبان باید در محیط طبیعی کودک صورت گیرد و والدین و معلمان کلاس را نیز شامل می شود نه فقط آسیب شناسان گفتار - زبان (جاستیک، ۲۰۰۶؛ اونز، ۲۰۰۴)."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "**ملاحظات آموزشی** کودکان با همه انواع ناتوانی ها به طور فزاینده در کلاس های درس آموزش عمومی جای داده می شوند. این نکته به این معنی است که همه معلمان باید آگاه باشند که چگونه می توانند به مشکلات زبانی آن ها در کلاس درس توجه کنند (اونز، ۲۰۰۴). کمک به غلبه یافتن کودکان مبتلا به اختلال های گفتار و زبان مسئولیت هر متخصص نیست. ولی فرایند شناسایی، مسئولیت مشترک معلم کلاس، آسیب شناس گفتار - زبان و والدین است. معلم به هنگام صحبت کردن کودکان با گوش دادن با دقت و همدلانه، مدل های مناسب گفتار و زبان را برای کودکان با تقلید کردن، و تشویق کودکان برای استفاده از مهارت های ارتباطی شان به طور مناسب فراهم می کند. معلم کلاس می تواند نه تنها به بهبود گفتار و زبان کمک کند، که همچنین در پیشگیری از تحول برخی اختلال ها مؤثر باشد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "**تسهیل استفاده اجتماعی از زبان** نقش اولیه معلم کلاس، تسهیل استفاده اجتماعی از زبان است. اختلال های زبان و گفتار یک دانش آموز لزوماً به این معنی نیست که معلم یا متخصص بالینی باید برای تدریس دانش آموز درباره فرم، ساختار، یا محتوای زبان سخت تلاش کنند. در عوض زبان باید به عنوان یک روش حل مسایل با ایجاد درک مناسبی از خود و معنا بخشیدن به آنچه که دیگران می گویند تدریس شود."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "کلاس درس امکانات زیادی برای یادگیری زبان فراهم می سازد. آن، جایی است که فرصت های زیادی برای دانش آموزان و معلمان فراهم می سازد تا زبان را به کار گیرند و در روابط سازنده، پسخوراند دریافت کنند. زبان شیوه ای است که از طریق آن بسیاری از تکالیف یادگیری اجتماعی و تحصیلی صورت می گیرد. با این حال زبان مدرسه هم در کلاس های درس و هم در متن های کتاب اغلب برای دانش آموزان و معلمان مشکل است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "زبان مدرسه نسبت به زبان بسیاری از کودکان در خانه و با هم بازی ها رسمی تر است. زبان مدرسه یک گفتگوی سازمان یافته است که در آن شنونده و گوینده یا خواننده و نویسنده باید به طور آشکار و دقیق اطلاعات ضروری را به سرعت و سهولت انتقال داده و تفسیر نماید. بدون مهارت در استفاده از زبان مدرسه، کودک بی تردید از لحاظ تحصیلی شکست می خورد و از نظر اجتماعی ناموفق خواهد بود. بنابراین در مدرسه و کلاس درس معلمان باید به متخصصان زبان - گفتار در سنجش ناتوانی های زبانی دانش آموز و در ارائه مداخلات کمک کنند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "**راهبردهای پرسش - پاسخ** یک نمونه از نقش زبان معلم در گفتگوی کلاس درس، پرسیدن سوال است. معلمان اغلب در کلاس درس از دانش آموزان سوال هایی در حوزه هایی که ضعف دارند می پرسند و بنابراین استفاده از زبان بیانی دانش آموز را کاهش می دهند. به عنوان مثال معلم ممکن است از یک دانش آموز پیش دبستانی که رنگ ها را نمی شناسد، بخواهد که رنگ ها را شناسایی کند یا یک معلم ممکن است از سوال های بله/خیر، زیاد استفاده کند. این گونه پرسش ها، امکان گفتگو را در دانش آموزان کاهش می دهد. متأسفانه معلمان ممکن است ندانند که چگونه باید سوال های خود را در تدریس مؤثر مفاهیم اصلاح کنند و بنابراین سوال های آنها صرفاً به سردرگمی کودکان بیفزاید."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "بنابراین معلم باید در راهبردهای پرسشگری از دانش آموز تجدید نظر کند. هنگامی که دانش آموز در پاسخدهی به سوال سطح بالا که از سطح اطلاعات و مهارت او بالاتر است شکست می خورد، معلم باید مسئله را در سطح ساده تر مطرح کند و سپس گام به گام به سمت تکلیف نهایی پیش برود. برخی اوقات معلمان ممکن است منظورشان را در پرسشگری از دانش آموزان به طور آشکار بیان نکنند و موضوع سوال های خود را به طور آشکار حذف می کنند. برای مثال یک معلم ممکن است بپرسد \"چه چیزی را قصد داری به من بگویید\". در نتیجه دانش آموز دچار سردرگمی می شود. معلمان باید در چنین شرایطی به طور آشکار مسئله را بیان نمایند. معلمان همچنین باید به پاسخ های دانش آموزان به سوال ها، پسخوراند واضح ارائه کنند. در اغلب اوقات معلمان به علت ترس از نشان دادن عدم پذیرش به طور آشکار به دانش آموز نمی گویند که پاسخشان اشتباه است. عدم ارائه پسخوراند صحیح و آشکار، دانش آموز را از یادگیری مفاهیم موجود در آموزش باز می دارد. بنابراین به طور کلی نقش"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "معلم تنها آموزش دانش آموزان درباره زبان نیست، که همچنین باید نحوه استفاده از زبان را به دانش آموز یاد بدهند. به طور خاص معلم باید به دانش آموزان کمک کند تا چگونگی استفاده از زبان را در بافت کلاس درس بیاموزند. همچنین استفاده معلم از زبان یک عامل اصلی در کمک به دانش آموزان در جهت یادگیری مؤثر است؛ به خصوص اگر دانش آموزان دارای اختلال های زبانی باشند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "معلمان باید به یاد داشته باشند که اختلال های زبان می تواند با تحول کودک تغییر کند. اگر کودکی دارای زبان بیانی و دریافتی بهنجار در یک سن خاص است، بدین معنا نیست که در سنین بعدی از وضعیت بهنجار برخوردار خواهد بود. مداخله های زبانی می تواند ماهیت و روند توانایی های زبانی کودک را تغییر دهد، اما حتی از طریق آن یک کودک ممکن است دارای مشکلات زبانی مستمر باشد و توانایی های زبانی بهنجاری را نشان ندهد."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "زبان نوشتاری یک مشکل خاص برای بسیاری از دانش آموزان مبتلا به اختلال های زبان و گفتار است. با پیشرفت دانش آموزان در پایه های بالاتر، زبان نوشتاری اهمیت فزاینده ای می یابد. از دانش آموزان انتظار می رود متن های پیچیده و دشوار را بخوانند و معنای آن را درک کنند. علاوه بر این از آنها انتظار می رود تا خود را به طور آشکار به صورت نوشتاری بیان کنند. تعامل معلمان با دانش آموزان درباره نوشتن در غلبه بر ناتوانی های زبان نوشتاری بسیار مهم است. در این ارتباط معلمان باید سوال هایی را از دانش آموزان درباره نحوه نوشتن قابل فهم برای خوانندگان بپرسند (گراهام و همکاران، ۱۹۹۸). علاوه بر این راهبردهایی که معلمان برای کمک به دانش آموزان در جهت تسلط بر نظام الفبایی استفاده می کنند، نیز مهم است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "در نهایت این که برنامه مداخله ای مربوط به اختلال های زبانی، بسیاری از راهبردهای مورد استفاده برای درمان ناتوانی های یادگیری مانند آموزش فراشناختی، آموزش راهبردها و بسیاری از شیوه های دیگری که در فصل ناتوانی های یادگیری شرح داده شدند را شامل می گردد (هالاهان و همکاران، ۲۰۰۵)."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "مداخله اولیه در بهبود اختلال های زبان و گفتار کودک بسیار مهم است. اگر شروع مداخله در سنین بالاتر صورت گیرد، شانس اکتساب مهارت های زبانی مؤثر کمتر خواهد بود. مطالعات درباره تحول اولیه کودک نشان داده است که سال های اول زندگی یک دوره بسیار مهم برای یادگیری زبان است. زبان کودک و تحول اجتماعی او به ماهیت و کمیت تعامل زبانی او با والدین و سایر مراقبین بستگی دارد. در خانواده هایی که تعامل زبانی مطلوبی بین والدین و کودکان صورت می گیرد و رفتار کودکان مورد تأیید و تشویق قرار می گیرد، تحول زبانی در کودکان با سهولت صورت می گیرد و این کودکان در مدرسه نیز تعاملات زبانی خوبی با همسالان و معلمان خواهند داشت. بنابراین کلید پیشگیری از بسیاری از ناتوانی های مرتبط با تحول زبان، کمک به والدین در برقراری ارتباط مناسب با کودکان در دوران نوزادی و طفولیت است. با این حال برای بسیاری از کودکان، مداخلات در پایه های پیش دبستانی و ابتدایی ضروری است. این کودکان ممکن است دارای ناتوانی های چندگانه ای باشند که برخی اوقات در حد شدید یا عمیق است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "تحول زبان به طور نزدیکی با تحول شناختی گره خورده است، بنابراین نارسایی در توانمندی هوشی باین احتمالا با عقب افتادگی در تحول زبان همراه است. برعکس فقدان زبان نیز می تواند بر تحول شناختی تأثیر منفی بگذارد. از آن جایی که گفتار به تحول حرکتی و عصب شناختی وابسته است، هرگونه مشکل عصب شناختی یا حرکتی ممکن است بر توانایی صحبت کردن تأثیر بگذارد. تحول اجتماعی بهنجار در سال های پیش دبستانی همچنین به وجود زبان وابسته است، بنابراین یک کودک مبتلا به نارسایی زبان از لحاظ یادگیری اجتماعی در وضعیت نامساعدی قرار دارد. در نتیجه زبان کودک پیش دبستانی به ندرت تنها موضوع مورد مداخله است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "کودکان مبتلا به اختلال های زبان ممکن است از مراحل تحولی مشابهی همانند بیشتر کودکان برخوردار باشند، اما هر مهارت را در سنین بالاتری کسب نمایند. بسیاری از کودکان با تأخیر در تحول زبان، شکاف تحولی را تجربه می کنند که پشت سر نخواهند گذاشت (اونز، ۲۰۰۴). آنها به طور مکرر برچسب کم توان ذهنی یا دیگر کم توانی های تحولی را"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "تجربه می کنند. برخی اوقات این کودکان، به محیط های محروم از تجربه های مختلف مربوط مستند و از تحریکات زبانی مناسبی برخوردار نبودند یا این که به شدت مورد سوء استفاده یا غفلت قرار گرفتند. با این حال صرف نظر از دلایل تأخیر زبانی کودک، درک ماهیت تأخیر و مداخله های لازم جهت یادگیری استفاده از زبان به طور مؤثر بسیار مهم است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "برخی از کودکان تا سه سالگی از زبان به طور ارتجالی استفاده نمی کنند. آنها ممکن است صداهایی را تولید کنند، اما از آنها به روش هایی برای برقراری ارتباط استفاده می کنند که مشخصه برقراری ارتباط در نوزادان قبل از یادگیری گفتار است. به عبارت دیگر آنها از ارتباط پیش زبانی استفاده می کنند. برای مثال آنها ممکن است از ایما و اشاره ها و صداها برای خواستن اشیاء یا فعالیت هایی از سوی دیگران، درخواست های اجتماعی یا سلام و احوال پرسی استفاده کنند. به هنگام سنجش و برنامه ریزی مداخله برای کودکان مبتلا به تأخیر زبان، در نظر گرفتن رفتارهای زبانی و غیرزبانی که آنها تقلید می کنند، این که چه چیزهایی را درک می کنند، چه مهارت های ارتباطی را به طور انگیخته استفاده می کنند، و ارتباط چه نقشی در زندگی آنها بازی می کند؛ دارای اهمیت است. همچنین مداخله باید در بافت هایی که زبان برای تعامل اجتماعی بهنجار مورد استفاده قرار می گیرد، صورت گیرد. برای مثال والدین یا معلمان ممکن است از رویکرد تدریس محیطی استفاده کنند. این رویکرد مداخله زبانی طبیعت گرایانه ای است که برای تدریس مهارت های کنشی زبان طراحی شده است (کایسر و همکاران، ۱۹۹۵). بر اساس این رویکرد، تدریس بر اساس علایق کودک صورت می گیرد. هنگامی که کودک عمل، شی یا فعالیتی را از بزرگسال تقاضا می کند، بزرگسال زبان کودک را تشویق می کند و دسترسی کودک به تقاضای مورد نظرش را به تلاش برای برقراری ارتباط وابسته می سازد. تدریس محیطی یک رویکرد طبیعت گرایانه است که مداخله هایی را طراحی می کند که شامل گفتگوهای عادی بین والدین و کودکان است. ارتباط پیش زبانی ممکن است نشانگر خوبی از توانایی بعدی کودک برای استفاده از زبان باشد (کالاندولا و ویلکاکس، ۲۰۰۰). کارآمد بودن این رویکرد تدریس ممکن است به میزان پاسخگو بودن مادر"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "به شیوه های ارتباط پیش زبانی کودک (حداقل در برخی محیط ها) وابسته باشد (یادر و وارن، ۲۰۰۱؛ به نقل از هالا هان و کافمن، ۲۰۰۹)."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "تحول زبان به تعاملات اولیه مادر- کودک وابسته است. نگرانی در مورد تحول کودک از لحاظ توانایی ارتباطی نمی تواند از نگرانی در مورد سایر حوزه های تحولی کودک مجزا باشد. بنابراین آسیب شناسان گفتار- زبان بخش ضروری تیم بین رشته ای هستند که کودک با ناتوانی را ارزیابی می کنند و در طراحی طرح خدمات خانوادگی فردی شده، مشارکت دارند. برنامه های مداخله ای اولیه در حقیقت شامل گسترش نقش والدین است. این برنامه ها شامل بازی های ساده با کودک به همراه کلامی سازی است. مادر باید با کودک درباره اشیاء و فعالیت ها صحبت کند. باید از اشیاء، فعالیت ها و کلمات برای لفظی ها و یا آواگری های کودک استفاده نمود که احتمال یادگیری زبان کاربردی در کودک افزایش یابد (فی، کاتز و لاریو، ۱۹۹۵)."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "متخصصان دوران اولیه کودک بر این باورند که مداخله پیش زبانی برای تحول زبان مهم است. پایه های زبان در ماه های اولیه زندگی در طی گفتگوهای غیرکلامی نوزاد با مادر و مراقب شکل می گیرد (نلسون، ۱۹۹۸). بنابراین ارزیابی توانایی ها و نیازهای خانواده و آموزش والدین در جهت آموزش و مدیریت کودک مهم است. در واقع والدین می توانند با کمک متخصصان نقش مهمی را در تحول زبان کودک ایفا کنند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "مداخله در دوران کودکی اولیه بر پایه سنجش توانایی های کودک در ارتباط با محتوا، فرم، و به طور خاص استفاده از زبان در تعاملات اجتماعی باشد. سنجش و مداخله برای کودکی که هنوز زبان را یاد نگرفته است، بر تقلید بازی های تشریفاتی، بازی با اشیاء، و استفاده کنشی از اشیاء استوار است. هنگامی که استفاده کودک از زبان مورد توجه قرار می گیرد، اولیه ترین هدف ها باید شامل این موارد باشد: توجه کودک به بزرگسال در طی تعامل رعایت نوبت در بازی ها و فعالیت های لذت بخش دنبال کردن نگاه یک بزرگسال و هدایت رفتار توسط بزرگسال، و"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "استمرار در اصلاح ایما و اشاره ها، صداها یا کلماتی که بزرگسال به آن ها پاسخ نمی دهد. در سنین پیش دبستانی آموزش مهارت های گفتگو، تمرکز اصلی مداخله است. به طور خاص تأکید بر آموزش کودک جهت استفاده از گفتگوهای ضروری برای موفقیت در مدرسه است. روندهای کنونی در مداخله های زبان و گفتار مبتنی بر محیط های معمول کودکان است. بنابراین معلمان و آسیب شناسان گفتار - زبان باید روابط کاری نزدیکی داشته باشند. متخصص زبان و گفتار ممکن است به طور مستقیم با کودکان در کلاس درس کار کند و به معلم درباره مداخله ای که می تواند به عنوان بخشی از فعالیت عادی کلاس درس انجام دهد، پیشنهادهایی را ارائه کند (هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "خلاصه فصل زبان به عنوان یکی از کنش های اصلی انسان و به عنوان ابزار برقراری ارتباط به حساب می آید. در سال های اول و دوم زندگی باید از رفتارهای پیش زبانی سخن به میان آورد. بر اساس روند بهنجار تحول زبان، بیشتر نوزادان در سنین ۲ تا ۳ ماهگی شروع به غان و غون می کنند. تولید صداهایی شبیه کلمه در سنین ۵ تا ۶ ماهگی، تولید اولین کلمات تا یک سالگی، و جمله های دو کلمه در سنین ۱۸ ماهگی در بیشتر کودکان مشهود است. پس از پایان سال دوم زندگی افزایش سریع در تولید کلمات و جملات اتفاق می افتد. با این حال روند تحول بهنجار زبان و گفتار در برخی کودکان با مشکلاتی همراه است. به طور کلی اختلال های ارتباطی ممکن است زبان یا گفتار یک کودک را تحت تأثیر قرار دهد. اختلال های زبان شامل مشکلات در دریافت و بیان است و اختلال های گفتار، اختلال در تولید و استفاده از زبان شفاهی را در بر می گیرد. برآوردها حاکی از آن است که در حدود ۱۰ تا ۱۵ درصد کودکان پیش دبستانی و حدود ۶ درصد دانش آموزان پایه های ابتدایی و متوسطه به اختلال های گفتار و حدود ۲ تا ۳ درصد کودکان پیش دبستانی و حدود ۱ درصد جمعیت سنین مدرسه رو به اختلال های زبانی مبتلا هستند. اختلال های زبانی را می توان در دو مقوله اختلال های زبان اولیه و اختلال های زبان ثانویه تقسیم نمود. اختلال های زبان اولیه به اختلال هایی اشاره دارد که علت قابل شناسایی برای آن وجود ندارد، مانند تأخیر اولیه در زبان بیانی و اختلال خواندن مبتنی بر زبان. اختلال های زبان ثانویه به"}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "آن دسته از اختلال های زبانی اشاره دارد که توسط شرایط دیگر مانند کم توانی ذهنی، آسیب شنیداری، فلج مغزی و نظایر آن به وجود می آیند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "اختلال های گفتار بسیار ناهمگن هستند. کودکان مبتلا به اختلال های گفتار در تولید مناسب صداها، حفظ مناسب جریان یا ریتم گفتار یا استفاده مناسب از صدا مشکل دارند. اختلال های گفتار را می توان در دو دسته اختلال های در سیالی گفتار و اختلال های حرکتی-گفتار تقسیم نمود. رایج ترین نوع اختلال در سیالی، لکنت زبان است که با نارسایی طبیعی در سیالی گفتار متفاوت است. کودکانی که لکنت دارند تکرار بخش هایی از کلمه، طولانی کردن صدا و انسداد صدا در آن ها مشهود است. حدود یک درصد از کودکان و بزرگسالان لکنت دارند. این اختلال همچنین در پسران بیشتر از دختران است."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "اختلال حرکتی-گفتار ممکن است شامل دیس آرتری (اختلال در صداهای گفتار) و یا آپرکیا (اختلال در برنامه ریزی و هماهنگی گفتار) باشد. هر دو اختلال بر تولید گفتار، آهنگی سرعت آن و کاهش قابلیت فهم تأثیر می گذارد و ممکن است هر دو در یک فرد مشاهده گردند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "برای سنجش اختلال های ارتباطی می توان از آزمون های استاندارد، آزمون های غیراستاندارد، مقیاس های تحولی و مشاهده های رفتاری استفاده کرد. برنامه های مداخله ای باید مبتنی بر داده های سنجش صورت گیرد و در محیط طبیعی کودک صورت گیرد. نکته مورد توجه این است که علاوه بر متخصص زبان-گفتار، والدین و معلمان کلاس درس نیز باید در برنامه مداخله ای مشارکت داشته باشند."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "محورهای مهمی که در بخش برنامه های آموزشی و مداخله ای در این فصل مورد بحث قرار گرفتند عبارتند از: تسهیل استفاده اجتماعی از زبان، استفاده از راهبردهای مناسب پرسش و پاسخ، راهبردهای مناسب در تدریس زبان نوشتاری، تمرکز بر برنامه های مداخله اولیه، و نقش خانواده."}, {"c": "فصل هفتم: اختلال‌های ارتباطی", "t": "Extracted images (66): `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p10_1.jpg` `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p10_2.jpg` `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p11_1.jpg` `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p11_2.jpg` `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p12_1.jpg` `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p12_2.jpg` `parsed-documents://20260708-121821-359654/فصل_۷_کودکان_با_نیاز_های_ویژه_compressed.pdf/images/img_p13_1.jp
