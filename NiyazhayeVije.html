<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>دستیار جزوه — کودکان و نوجوانان با نیازهای ویژه</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05060d;
  --bg2:#0b0d1c;
  --panel:rgba(18,20,40,0.55);
  --border:rgba(0,240,255,0.18);
  --neon:#00f0ff;
  --neon2:#b467ff;
  --neon3:#ff2e88;
  --text:#e6f0ff;
  --muted:#8a95b8;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{
  font-family:'Vazirmatn',system-ui,-apple-system,'Tahoma',sans-serif;
  background:radial-gradient(1200px 800px at 15% -10%,rgba(180,103,255,.18),transparent 60%),
             radial-gradient(1000px 700px at 110% 10%,rgba(0,240,255,.14),transparent 55%),
             linear-gradient(180deg,var(--bg),var(--bg2));
  color:var(--text);
  min-height:100vh;
  overflow:hidden;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,240,255,.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,240,255,.045) 1px,transparent 1px);
  background-size:44px 44px;
  mask-image:radial-gradient(ellipse at center,black 40%,transparent 85%);
}
.app{
  position:relative;z-index:1;display:flex;flex-direction:column;
  height:100vh;max-width:960px;margin:0 auto;padding:16px;
}
header{
  display:flex;align-items:center;gap:14px;
  padding:14px 18px;border:1px solid var(--border);border-radius:18px;
  background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 0 30px rgba(0,240,255,.08),inset 0 0 30px rgba(180,103,255,.06);
}
.logo{
  width:42px;height:42px;border-radius:12px;flex:none;
  background:conic-gradient(from 210deg,var(--neon),var(--neon2),var(--neon3),var(--neon));
  box-shadow:0 0 18px rgba(0,240,255,.55),0 0 30px rgba(180,103,255,.35);
  position:relative;
}
.logo::after{
  content:"";position:absolute;inset:5px;border-radius:8px;background:#08091a;
  display:flex;align-items:center;justify-content:center;
}
.logo span{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  color:var(--neon);font-weight:700;z-index:2;text-shadow:0 0 8px var(--neon);
}
.title{display:flex;flex-direction:column;line-height:1.3}
.title b{
  font-size:16px;letter-spacing:.2px;color:#fff;
  text-shadow:0 0 12px rgba(0,240,255,.35);
}
.title small{color:var(--muted);font-size:12px;margin-top:2px}
.badge{
  margin-inline-start:auto;font-size:11px;color:var(--neon);
  border:1px solid var(--border);padding:5px 10px;border-radius:999px;
  background:rgba(0,240,255,.05);
}
main{
  flex:1;min-height:0;margin-top:14px;
  border:1px solid var(--border);border-radius:22px;
  background:var(--panel);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  box-shadow:0 0 40px rgba(0,0,0,.35),inset 0 0 30px rgba(180,103,255,.05);
  overflow:hidden;display:flex;flex-direction:column;
}
#chat{flex:1;overflow-y:auto;padding:22px 22px 8px;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:8px}
#chat::-webkit-scrollbar-thumb{background:rgba(0,240,255,.25);border-radius:99px}
.msg{display:flex;margin-bottom:14px;animation:pop .28s ease}
.msg.user{justify-content:flex-start}
.msg.bot{justify-content:flex-end}
.bubble{
  max-width:82%;padding:12px 15px;border-radius:16px;line-height:1.9;font-size:15px;
  word-wrap:break-word;white-space:pre-wrap;
}
.msg.user .bubble{
  background:linear-gradient(135deg,rgba(180,103,255,.18),rgba(0,240,255,.12));
  border:1px solid rgba(180,103,255,.35);
  color:#fff;border-top-right-radius:4px;
  box-shadow:0 0 20px rgba(180,103,255,.15);
}
.msg.bot .bubble{
  background:rgba(6,8,20,.55);
  border:1px solid var(--border);
  color:var(--text);border-top-left-radius:4px;
  box-shadow:inset 0 0 24px rgba(0,240,255,.06);
}
.bubble .meta{display:block;margin-top:8px;font-size:11px;color:var(--muted);letter-spacing:.3px}
.bubble .refs{margin-top:6px;font-size:11px;color:var(--neon);opacity:.85}
.typing{display:inline-flex;gap:5px;align-items:center;height:20px}
.typing i{
  width:7px;height:7px;border-radius:50%;background:var(--neon);
  box-shadow:0 0 8px var(--neon);animation:blink 1.1s infinite;
}
.typing i:nth-child(2){animation-delay:.2s;background:var(--neon2);box-shadow:0 0 8px var(--neon2)}
.typing i:nth-child(3){animation-delay:.4s;background:var(--neon3);box-shadow:0 0 8px var(--neon3)}
@keyframes blink{0%,80%,100%{transform:scale(.6);opacity:.5}40%{transform:scale(1);opacity:1}}
@keyframes pop{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.modes{
  display:flex;gap:8px;padding:10px 18px 6px;border-top:1px solid rgba(255,255,255,.05);
}
.mode{
  flex:1;padding:8px 10px;border-radius:12px;font-size:12px;text-align:center;cursor:pointer;
  border:1px solid rgba(255,255,255,.08);color:var(--muted);
  background:rgba(255,255,255,.02);transition:.2s;
}
.mode.active{
  color:#fff;border-color:var(--neon);
  background:linear-gradient(135deg,rgba(0,240,255,.14),rgba(180,103,255,.10));
  box-shadow:0 0 14px rgba(0,240,255,.25);
}
form{
  display:flex;gap:10px;padding:14px 18px 18px;border-top:1px solid rgba(255,255,255,.05);
}
textarea{
  flex:1;resize:none;height:56px;max-height:180px;padding:14px 16px;
  border-radius:14px;border:1px solid var(--border);
  background:rgba(4,6,16,.7);color:#fff;font-family:inherit;font-size:15px;
  outline:none;transition:.2s;
}
textarea:focus{border-color:var(--neon);box-shadow:0 0 18px rgba(0,240,255,.25)}
button.send{
  min-width:64px;border:none;cursor:pointer;color:#031017;font-weight:700;
  border-radius:14px;font-family:inherit;font-size:15px;
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  box-shadow:0 0 22px rgba(0,240,255,.35);transition:.2s;
}
button.send:hover{transform:translateY(-1px);box-shadow:0 0 28px rgba(180,103,255,.55)}
button.send:disabled{opacity:.5;cursor:wait}
.hint{padding:0 18px 8px;color:var(--muted);font-size:11px;text-align:center}
.hint kbd{background:rgba(255,255,255,.06);padding:1px 6px;border-radius:6px;font-size:10.5px;color:#cfe}
@media(max-width:640px){
  .app{padding:8px}
  .bubble{max-width:92%}
  header{padding:10px 12px;border-radius:14px}
  .title b{font-size:14px}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><span>N</span></div>
    <div class="title">
      <b>دستیار جزوه · نیازهای ویژه</b>
      <small>پاسخ‌گویی صرفاً بر پایه متن جزوه اختصاصی — بدون سرور، بدون اینترنت</small>
    </div>
    <div class="badge">آفلاین</div>
  </header>

  <main>
    <div id="chat"></div>
    <div class="modes">
      <div class="mode active" data-mode="descriptive">پاسخ تشریحی</div>
      <div class="mode" data-mode="test">پاسخ تستی (کلید و توضیح)</div>
    </div>
    <form id="f">
      <textarea id="q" placeholder="سؤال خود را از متن جزوه بپرسید…  مثلاً: تعریف ناشنوایی پیش‌زبانی چیست؟" rows="1"></textarea>
      <button class="send" id="send" type="submit">ارسال</button>
    </form>
    <div class="hint">Enter برای ارسال · Shift+Enter برای خط جدید · محتوا صرفاً از جزوه استخراج می‌شود</div>
  </main>
</div>

<script>
const DATA = [{"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "فصل اول مقدمه ای بر آموزش کودکان با نیازهای ویژه"}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "از خواننده انتظار می رود پس از مطالعه مطالب این فصل بتواند: ۱. تعریف یادگیرندگان با نیازهای ویژه را بداند ۲. ضرورت آموزش ویژه برای دانش آموزان با نیازهای ویژه بیان نماید ۳. گروه های مختلف دانش آموزان با نیازهای ویژه را نام ببرد ۴. میزان شیوع گروه های مختلف دانش آموزان با نیازهای ویژه را بیان کند ۵. موقعیت های آموزشی مختلف دانش آموزان با نیازهای ویژه را به طور کامل شرح دهد."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "یادگیرندگان استثنایی یا افراد با نیازهای ویژه از نظر آموزشی، افرادی هستند که شکوفا شدن توانایی- توانایی های بالقوه آنها نیاز به آموزش ویژه و خدمات مرتبط دارد. این افراد بنا به دلایل کم توانی ذهنی، مشکلات یادگیری، اختلال های هیجانی یا رفتاری، ناتوانی های جسمانی، اختلال های ارتباطی، اوتیسم، آسیب مغزی ناشی از ضربه، آسیب شنوایی، آسیب بینایی، یا تیزهوشی به آموزش ویژه نیاز دارند. بنابراین توانمندی ها و استعدادهای افراد با نیازهای ویژه با آموزشی که افراد عادی دریافت می کنند شکوفا نمی شود. آموزش ویژه و خدمات مرتبط بسته به نوع ناتوانی، شدت ناتوانی و زمان بروز آن می تواند از جنبه های محتوای آموزشی، راهبردهای آموزشی خاص، فن آوری آموزشی، موقعیت های آموزشی خاص و ... متنوع باشد. دانش آموزان استثنایی (که در این کتاب معادل دانش آموزان با نیازهای ویژه برای آنها به کار برده می شود) در مقایسه با جمعیت عادی، گروه بسیار متنوعی هستند و تعمیم دهی بسیار اندکی برای آنها صورت می گیرد. جنبه های خاص و استثنایی این کودکان شامل توانایی های حسی، جسمانی، شناختی، هیجانی، ارتباطی یا ترکیبی از این موارد است. علاوه بر این افراد با نیازهای ویژه از لحاظ سبب شناسی، شدت، و تأثیر بر پیشرفت آموزشی با هم فرق دارند و این اثرات ممکن است تا حد زیادی بسته به سن، جنس، و شرایط زندگی متفاوت باشد."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "هر دانش آموزی که آموزش ویژه را دریافت می کند ممکن است در وضعیت کنونی، ناتوانی آشکاری نداشته ولی در مدرسه ابتدایی و راهنمایی مشکلات پایداری در یادگیری داشته باشد، در نتیجه مشکلات او بیشتر جنبه تحصیلی، اجتماعی یا رفتاری داشته باشد. این مشکلات برای بسیاری از معلمان تا چند هفته یا ماه آشکار نمی شود. تلاش های معلم برای برآورد نیازهای این دانش آموزان با برنامه درسی عادی که بیشتر دانش آموزان در آن موفق عمل می کنند، به نتیجه نمی انجامد. بر اساس قانون فدرال هیچ دانش آموز استثنایی، واجد شرایط دریافت آموزش ویژه شناخته نمی شود، مگر این که سنجش دقیق نشان دهد که او در برنامه مدرسه عادی بدون دریافت خدمات ویژه قادر به پیشرفت رضایت بخش نیست."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "**میزان شیوع** میزان شیوع به درصد یا تعداد افرادی که یک ویژگی خاص یا استثنایی یا نیاز ویژه را دارا هستند اشاره دارد. برای مثال میزان شیوع اختلال کم توانی ذهنی ممکن است ۲/۳ درصد برآورد شود. این میزان بدین معناست که ۲/۳ درصد از افراد جمعیت یا ۲۳ نفر از هر هزار نفر فرض می شود که دارای اختلال کم توانی ذهنی هستند."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "برآورد میزان شیوع بیشتر گروه های با نیازهای ویژه بسیار دشوار است. برخی از عوامل مرتبط با میزان شیوع عبارتند از: مبهم بودن تعاریف، تغییرات مکرر در تعاریف، نقش مدارس در تعیین نیازهای ویژه، نمونه گیری های مختلف و عوامل دیگر (کافمن و هالاها، ۲۰۰۵ الف). درصد جمعیت افراد با نیازهای ویژه در طول دهه های مختلف به طور قابل ملاحظه ای تغییر کرده است. برای مثال تعداد دانش آموزان مبتلا به ناتوانی های یادگیری از اواسط دهه ۱۹۷۰ بیشتر از دو برابر شده است. در عوض درصد دانش آموزانی که ناتوانی اصلی آنها، آسیب های زبان یا گفتار است به طور قابل ملاحظه ای کاهش یافته است (یعنی در مقایسه با سال ۱۹۷۶، میزان شیوع آنها به نصف کاهش یافته است). البته باید یادآور شد که میزان شیوع بالای اختلال ناتوانی یادگیری تا حدی به خاطر نداشتن بار نگرشی منفی برچسب این اختلال و قابل پذیرش بودن آن است."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "برخی از ناتوانی ها با فراوانی نسبتاً بالایی رخ می دهند. ناتوانی های با میزان بروز بالا عبارتند از: ناتوانی های یادگیری، اختلال های ارتباطی (زبان و گفتار)، آشفتگی هیجانی، و کم توانی ذهنی خفیف. ناتوانی های دیگر که نسبتاً نادر هستند و میزان بروز آن ها پایین است عبارتند از: کم بینایی و نابینایی، ناشنوایی، ناشنوا-نابینا، کم توانی ذهنی شدید، و اوتیسم."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "اگرچه که میزان رخداد بیشتر ناتوانی های با میزان شیوع بالا در اوایل قرن بیست و یکم تقریباً ثابت مانده است، با این حال افزایش چشمگیری در برخی از گروه های با میزان شیوع پایین رخ داده است. برای مثال تغییر چشمگیری در شناسایی اختلال اوتیسم یا اختلال های طیف اوتیسم از سال ۱۹۹۵ اتفاق افتاده است. گروه دیگری که افزایش معناداری در بروز آن رخ داده است، آسیب مغزی ناشی از ضربه و آسیب های ارتوپدی است که خود ناشی از افزایش آسیب های مربوط به نخاع شوکی و زنده ماندن افراد با ضربات جسمانی شدید با توجه به پیشرفت های پزشکی می باشد."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "افزایش در تعداد افراد مبتلا به اوتیسم، احتمالاً مربوط به پیشرفت در روش های تشخیص و شناسایی موارد خفیف تر این اختلال است. اگرچه که افزایش موارد آسیب مغزی ناشی از ضربه، ممکن است ناشی از تشخیص بهتر باشد، با این حال ممکن است ناشی از افزایش واقعی در صدمات مغزی باشد. افزایش در تعداد افراد با آسیب های ارتوپدی نیز ممکن است ناشی از افزایش در میزان زنده ماندن نوزادانی که با نابهنجاری های جسمانی معنادار به دنیا می آیند و همچنین کودکان تصادفی باشد. در نهایت این که افزایش در تعداد افراد با مبتلا آسیب های بینایی و شنوایی نیز ممکن است ناشی از تشخیص بهتر این ناتوانی ها باشد (هالاهان و کافمن، ۲۰۰۲)."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "معرفی گروه های مختلف دانش آموزان با نیازهای ویژه"}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "دانش آموزان با نیازهای ویژه فقط شامل دانش آموزان با ناتوانی های مختلف نمی گردند. دانش آموزان تیزهوش و با استعداد نیز دارای نیازهای ویژه هستند. بر اساس گزارش وزارت آموزش و پرورش آمریکا (۱۹۹۴) حدود ۱۱ درصد دانش آموزان مدرسه ای در گروه دانش آموزان با ناتوانی قرار می گیرند. همچنین باید یادآور شد که بسیاری از دانش آموزان در مدارس، دارای مشکلات"}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "رفتاری و یادگیری هستند، ولی نه به آن اندازه که در گروه دانش آموزان با نیازهای ویژه قرار گیرند. این دانش آموزان در معرض خطر نام دارند و مشکلات و پیامدهای آن ها را نمی توان نادیده گرفت. بنابراین دانش آموزان با نیازهای ویژه را می توان بدین گونه تقسیم نمود: اختلال کم توانی ذهنی، اختلال های هیجانی / رفتاری، ناتوانی های یادگیری، اختلال های ارتباطی، آسیب های شنوایی، آسیب های بینایی، ناتوانی های جسمانی و آسیب های سلامت، اختلال های فراگیر تحولی، ناتوانی های چندگانه و شدید، و دانش آموزان تیزهوش، به این فهرست می توان دانش آموزان در معرض خطر را نیز اضافه نمود."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "**تعریف آموزش ویژه** آموزش ویژه به معنای برنامه ای است که برای برآوردن نیازهای خاص یک فرد استثنایی (با نیازهای ویژه) طراحی شده است. مواد ویژه، تکنیک های تدریس، یا تجهیزات و تسهیلات مورد نیاز بسته به نوع ناتوانی در فرایند آموزش ویژه مورد استفاده قرار می گیرند. برای مثال دانش آموزان مبتلا به آسیب بینایی ممکن است به مواد خواندنی با چاپ درشت یا بریل؛ دانش آموزان با آسیب شنوایی ممکن است به وسایل شنیداری و یا آموزش زبان اشاره؛ دانش آموزان با ناتوانی جسمانی به تجهیزات خاص و مانند آن نیاز داشته باشند. خدمات مرتبط مانند سنجش روان شناختی، فیزیوتراپی، درمان پزشکی، و مشاوره بسته به نوع و شدت اختلال ممکن است مورد نیاز باشد. مهم ترین هدف آموزش ویژه شناسایی و تاکید بر نقاط قوت دانش آموز با نیاز ویژه است. در مقایسه با آموزش عمومی، آموزش ویژه از لحاظ سرعت، شدت، ساختار، تقویت، برنامه درسی، نسبت شاگرد - معلم، و بازبینی و سنجش به دقت کنترل شده است (کافمن و هالأهان، ۲۰۰۵ الف). بهترین نوع آموزش عمومی نمی تواند جایگزین آموزش ویژه گردد؛ به خصوص برای افرادی که دارای ناتوانی های جدی هستند."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "**موقعیت آموزشی** فراهم کردن آموزش ویژه می تواند از ارائه توسط معلم عادی در مدرسه عادی تا ارائه در یک مرکز شبانه روزی متنوع باشد. این که چه کسی و در چه مکانی، آموزش ویژه را ارائه کند به دو عامل بستگی دارد: ۱) دانش آموز با نیاز ویژه تا چه اندازه از دانش آموز عادی تفاوت دارد، و"}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "۲) چه منابعی در... این دانش آموزان... کافمن، ۲۰۰۹): حداقل مج... دانش آموزان آگاه... تجهیزات و روش... متخصصان ممکن... نیازهای دانش... ناتوانی خفیف... در سطح... روش های خ... داشته باشد. - دهد، یا نحو... نیاز در حد... در س... و یا معلم... به مدرسه... یا در گرو... عادی فرا... ویژه هنو... در... مدرسه... می کنند... زمان -... ارزیابی..."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "۲) چه منابعی در مدرسه و جامعه در دسترس هستند. طرح های اجرایی مختلف برای آموزش این دانش آموزان بر اساس میزان یکپارچه سازی فیزیکی به شرح زیر است (هالاهان و کافمن، ۲۰۰۹):"}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "حداقل محیط خاص همان کلاس درس عادی است که معلم عادی از نیازهای فردی دانش آموزان آگاه است و در برآوردن نیازهای آن ها ماهر است و ممکن است بتواند مواد، تجهیزات و روش های آموزشی مناسب را برای آن ها فراهم سازد. در این سطح خدمات مستقیم متخصصان ممکن است مورد نیاز نباشد و تخصص معلم عادی ممکن است برای برآوردن نیازهای دانش آموزان کافی باشد. بنابراین در این کلاس ها نیازهای برخی از دانش آموزان با ناتوانی خفیف برآورده می شود."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "در سطح دوم معلم کلاس درس عادی ممکن است علاوه بر کسب مواد، تجهیزات یا روش های خاص به مشورت با مربی خاص یا دیگر متخصصان (مانند روانشناس مدرسه) نیاز داشته باشد. معلم خاص ممکن است معلم عادی را آموزش دهد، معلم را به منابع دیگر ارجاع دهد، یا نحوه استفاده از مواد، تجهیزات، یا روش ها را شرح دهد. بنابراین آموزش ویژه مورد نیاز در حد جزئی است."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "در سطح سوم یک معلم خاص ممکن است خدمات سیار را برای دانش آموز با نیاز ویژه و یا معلم کلاس درس عادی فراهم کند. معلم سیار برنامه مستمری را با حرکت از یک مدرسه به مدرسه دیگر و بازدید از کلاس های درس جهت آموزش دانش آموزان به صورت انفرادی یا در گروه های کوچک پی ریزی می کند. این معلم مواد و پیشنهادهای تدریس را برای معلم عادی فراهم می سازد و با معلم عادی درباره مشکلات خاص مشورت می کند. سطح آموزش ویژه هنوز بسیار بالا نیست."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "در سطح چهارم معلم مرجع خدمات را برای دانش آموزان و معلمان فقط در یک مدرسه فراهم می سازد. دانش آموزان تحت حمایت در کلاس های درس عادی ثبت نام می کنند و بسته به شدت و ماهیت مشکلات خاص با معلم آموزش دیده خاص برای مدت زمان طولانی کار می کنند. معلم مرجع به طور مستمر نیازهای دانش آموزان و معلمان را ارزیابی می کند و معمولاً با دانش آموزان به صورت انفرادی یا در گروه های کوچک در یک"}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "کلاس درس خاص به همراه تجهیزات و مواد خاص فعالیت می کند. به طور معمول معلم خاص همچنین به عنوان یک مشاور برای معلم کلاس درس عادی نیز عمل می کند و در زمینه آموزش و مدیریت دانش آموز در کلاس درس و احتمالاً شرح تکنیک های آموزشی کمک می کند. انعطاف پذیری این طرح و این واقعیت که دانش آموز با نیاز ویژه در بیشتر زمان ها با همسالان عادی به سر می برد، آن را راه حلی جذاب و رایج ساخته است. در سطح پنجم، آموزش در کلاس های مستقل خاص مطرح است. در چنین کلاسی به طور معمول پانزده دانش آموز استثنایی یا کمتر با ویژگی ها یا نیازهای خاص ثبت نام می کنند. به طور معمول معلمی که در زمینه آموزش ویژه تخصص دارد، همه یا بیشتر فرایند آموزش را برعهده دارد. دانش آموزان این کلاس ها به طور معمول همه یا بیشتر زمان مدرسه را مجزا از همسالان عادی سپری می کنند. اغلب دانش آموزان با ناتوانی با دانش آموزان عادی در بخشی از روز (شاید برای آموزش جسمانی، موسیقی، یا فعالیت های دیگری که به خوبی می توانند انجام دهند) تلفیق می گردند. در سطح ششم مدارس روزانه خاص مطرح هستند که طی آن دانش آموزان با نیازهای ویژه یا استثنایی در همه روزهای مدرسه در موقعیت آموزشی خاص جایدهی می شوند. مدرسه خاص معمولاً برای یک گروه خاص از دانش آموزان با نیازهای ویژه سازماندهی می شود و شامل تجهیزات خاص ضروری برای مراقبت و آموزش آن ها است. لازم به یادآوری است که دانش آموزان پس از اتمام مدرسه به خانه هایشان باز می گردند. در سطح هفتم در مدرسه شبانه روزی، دانش آموزان با نیازهای ویژه به دور از خانه و جامعه، مراقبت ۲۴ ساعته را دریافت می کنند. این روش بالاترین سطح ویژه بودن خدمات آموزشی و توانبخشی است که توسط قانون آموزش افراد با ناتوانی مشخص شده است. این دانش آموزان ممکن است بازدیدهای دوره ای از خانه داشته باشند و دوباره به مرکز شبانه روزی بازگردند. در سطح هشتم، آموزش محدود به خانه یا بیمارستان مطرح است که اغلب اوقات مربوط به دانش آموزان با ناتوانی های جسمانی است، هرچند برخی اوقات برای دانش آموزان"}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "با اختلال های هیجانی/رفتاری یا دیگر ناتوانایی هایی که هیچ گزینه دیگری برای آنها در دسترس نیست استفاده می گردد. به طور معمول دانش آموز در بیمارستان یا در خانه برای مدت زمانی کوتاه محبوس می گردد و معلم بیمارستانی یا مخصوص خانه، ارتباط خود را با معلم عادی حفظ می کند."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "این که نظام آموزشی برای جایدهی مناسب دانش آموزان با نیازهای ویژه بر اساس کدام یک از طرح های جایدهی بالا عمل کند، به عوامل متعددی بستگی دارد. قوانین آموزش ویژه ملزم کرده است که جایدهی دانش آموز با نیاز ویژه باید در محیط با کمترین میزان محدودیت باشد. بدین معنا که جدایی دانش آموز از همکلاسی های عادی، خانه، خانواده، و جامعه باید در پایین ترین حد ممکن باشد. یعنی زندگی دانش آموز باید تا حد ممکن عادی باشد و مداخله باید با نیازهای فرد همسو باشد و بیشتر از حد نیاز با آزادی های فرد تداخل ایجاد نکند. برای مثال اگر دانش آموزی می تواند خدمات مناسبی توسط معلم مرجع دریافت کند و نیازهای او برآورده شود نباید در کلاس های ویژه جایدهی شود و اگر نیازهای یک دانش آموز سر کلاس ویژه برآورده می شود، نباید در مدرسه شبانه روزی جایدهی شود و خدمات خاص دریافت کند."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "در هر صورت محیط مناسب برای آموزش و توانبخشی یک دانش آموز با نیازهای ویژه تا حد زیادی به نوع ناتوانی و شدت ناتوانی او بستگی دارد. به عنوان مثال بیشتر آموزان با ناتوانی یادگیری می توانند به طور مناسبی در کلاس های عادی جایدهی شوند. از سوی دیگر تدریس دانش آموزان با آسیب های شدید شنوایی و بینایی ممکن است به جایدهی پاره وقت آنها در کلاس های خاص نیاز داشته باشد. بحث بیشتر در زمینه آموزش تلفیقی و انواع مختلف آن در فصل آخر کتاب ارائه خواهد شد."}, {"c": "فصل اول: مقدمه‌ای بر آموزش کودکان با نیازهای ویژه", "t": "خلاصه فصل دانش آموزان با نیازهای ویژه افرادی هستند که برنامه های آموزش عمومی موجود در مدارس جهت شکوفایی استعدادها و توانایی های بالقوه آن ها کافی نیست و بسته به نوع و شدت ناتوانی به آموزش ویژه نیاز دارند. این دانش آموزان به محتوای آموزشی خاص، راهبردهای تدریس خاص، موقعیت آموزشی خاص و فن آوری آموزشی نیاز دارند. میزان شیوع به تعداد کل افراد مبتلا به یک اختلال در یک زمان خاص و میزان بروز به تعداد موارد جدیدی که به کل موارد مبتلا اضافه می شوند اشاره دارد. برآورد میزان شیوع بیشتر گروه های با نیازهای ویژه دشوار است. مبهم بودن تعاریف و تغییرات مکرر در آن، پیشرفت های پزشکی، اثرات منفی برچسب و نمونه گیری های مختلف از عوامل موثر بر میزان شیوع هستند. دانش آموزان با نیازهای ویژه بسته به شدت اختلال می توانند در موقعیت های مختلف آموزشی جایدهی شوند. این موقعیت های مختلف می توانند از کلاس عادی تا مدارس شبانه روزی گسترده باشد. این که کودک با نیازهای ویژه باید در چه موقعیتی جایدهی شود باید بر اساس اصل کمترین محدودیت عمل کرد. بدین معنا که جایدهی دانش آموز از همکلاسی های عادی، خانه، خانواده و جامعه باید در پایین ترین میزان ممکن باشد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "از خواننده انتظار می رود پس از مطالعه مطالب این فصل بتواند: ۱. تعریف های مختلف ناتوانی یادگیری را به صورت تحلیلی / مقایسه ای شرح دهد ۲. عوامل ایجاد کننده ناتوانی های مختلف یادگیری را بیان نماید ۳. روش های مختلف شناسایی و سنجش ناتوانی یادگیری را شرح دهد ۴. ویژگی های مختلف افراد مبتلا به ناتوانی های یادگیری را از جنبه های مختلف تحولی بیان کند ۵. راهبردهای آموزشی و درمانی گوناگون ناتوانی های یادگیری را شرح دهد ۶. اهمیت مداخله اولیه را در درمان ناتوانی های یادگیری توضیح دهد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "از دیدگاه تاریخی، ناتوانی های یادگیری به علت اختلال عصب شناختی رخ می دهند. بسیاری از والدین و معلمان بر این باورند که برچسب آسیب جزیی مغزی مشکل ساز است. این اصطلاح به افرادی اشاره دارد که نشانه های رفتاری را نشان می دهند نه نشانه های عصب شناختی. آنها همانند افراد با آسیب مغزی واقعی، رفتارهایی مانند حواس پرتی، فزون کنشی، و نارسایی های ادراکی را نشان می دهند، اما آزمایش های عصب شناختی آنها با افراد عادی قابل تشخیص نیست."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "برچسب آسیب جزیی مغز استلزام های بسیار خوبی برای برنامه ریزی آموزشی و به کارگیری درمان ندارد. اصطلاح نارساخوانی نیز فقط مشکلات خواندن را توصیف می کند و بسیاری از افراد مبتلا به ناتوانی یادگیری نیز در حوزه های تحصیلی دیگر مانند ریاضی دارند. همچنین اصطلاحات دیگر مانند ناتوان ادراکی و دیرآموز نیز نارسا است و توصیف کننده کامل وضعیت یک فرد مبتلا به ناتوانی یادگیری نیست. ساموئل کرک (1963) اصطلاح ناتوانی های یادگیری را برای افرادی که از نظر هوشی بهنجار هستند و نمی توان آنها را در کلاس های درسی ویژه جای داد، به کار برد. بسیاری از آنها دارای اختلال های رفتاری نیز هستند و برخی از آنها فاقد مشکلات رفتاری هستند. بنابراین جایدهی افراد مبتلا به"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۱۴۲ روان شناسی و آموزش کودکان و نوجوانان"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "ناتوانی های یادگیری در کلاس های درسی ویژه دانش آموزان با آشفتگی های هیجانی نیز غیرمنطقی و غیرعلمی است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**تعریف ناتوانی یادگیری** از سال ۱۹۶۰، یازده تعریف مختلف از ناتوانی های یادگیری ارائه شد که از درجات مختلف پذیرش برخوردار شدند (هامیل، ۱۹۹۰) دو تا از مؤثرترین تعریف ها، تعریف دولت فدرال آمریکا و تعریف کمیته ملی مشترک ناتوانی های یادگیری است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**تعریف دولت فدرال** اولین بار این تعریف در سال ۱۹۷۷ ارائه شد و با تغییرات جزیی در سال ۱۹۹۷ توسط دولت فدرال دوباره پذیرفته شد و در سال ۲۰۰۴ مجدداً تصویب شد (هالاهان و کافمن، ۲۰۰۹). اصطلاح ناتوانی یادگیری خاص عبارت است از وجود اختلال در یک یا بیشتر از یک فرایند روان شناختی پایه که در درک یا استفاده از زبان شفاهی یا نوشتاری نقش دارند. این اختلال ممکن است در توانایی ناکامل افراد در گوش دادن، فکر کردن، صحبت کردن، خواندن، نوشتن، هجی کردن، یا انجام محاسبات ریاضی ظاهر گردد.» این اصطلاح شرایطی مانند ناتوانی های ادراکی، آسیب مغزی، نارساکنش وری جزیی مغز، نارساخوانی، و ناگویی تحولی را شامل می گردد.» این اصطلاح مشکلات یادگیری را که بیشتر ناشی از ناتوانی های دیداری، شنیداری، یا حرکتی، کم توانی ذهنی، آشفتگی های هیجانی، یا شرایط نامساعد محیطی، فرهنگی، یا اقتصادی باشند، شامل نمی گردد.»"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**تعریف کمیته ملی مشترک ناتوانی های یادگیری:** این کمیته در هفت بند به شرح زیر تعریف دولت فدرال را نقد کرده و بر اساس آن تعریف خود را ارائه کرده است (هالان و کافمن، ۲۰۰۹):"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۱. رجوع به فرایندهای روان شناختی پایه. بسیاری از پیشگامان اولیه در حوزه ناتوانی های یادگیری بر این باورند که پردازش اطلاعات دیداری و شنیداری، علت زیربنایی مشکلات تحصیلی مانند ناتوانی های خواندن است. با این حال محققان مشخص کردند که تمرین های ادراکی و ادراکی/حرکتی منجر به پیشرفت در خواندن کودک نمی شود."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۲. حذف علت درونی ناتوانی های یادگیری. دولت فدرال عوامل علی اختلال ناتوانی یادگیری را بیان نکرده است، در حالی که کمیته ملی مشترک ناتوانی های یادگیری، ناتوانی یادگیری را ناشی از نارساکنش وری در سیستم عصبی مرکزی فرد تلقی کرده است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۳. حذف بزرگسالان. کمیته ملی مشترک ناتوانی های یادگیری، ناتوانی های یادگیری را یک اختلال مربوط به دوران کودکی در نظر نگرفته است. ناتوانی یادگیری مربوط به شرایط تمام دوران زندگی است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۴. حذف خودنظم بخشی و مشکلات در تعامل اجتماعی. کمیته ملی مشترک ناتوانی های یادگیری بیان کرده است که دانش آموزان مبتلا به ناتوانی های یادگیری اغلب مشکلاتی را در خودنظم بخشی و تعامل اجتماعی تجربه می کنند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۵. شمول اصطلاحاتی که تعریف آن ها مشکل است. کردن اصطلاحاتی مانند معلولیت های ادراکی، نارساخوانی، و نارساکنش وری جزیی مغز که تعریف شان مشکل است، مبهم می باشد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۶. سردرگمی در شرط عدم شمول. دولت فدرال مشکلات یادگیری که بیشتر ناشی از شرایط ناتوان کننده دیگر مانند کم توانی ذهنی هستند را خارج کرده است. اما وضعیت فردی که هم ناتوانی یادگیری دارد و هم دارای اختلال دیگر، مبهم است. کمیته ملی مشترک ناتوانی های یادگیری به طور آشکار مشخص ساخت که امکان دارد فرد با شرایط ناتوان کننده دیگر مانند کم توانی ذهنی نیز می تواند ناتوانی یادگیری داشته باشد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۷. شمول هجی کردن. کمیته ملی مشترک ناتوانی های یادگیری معتقد است که نیازی به ذکر هجی کردن در تعریف نیست."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "کمیته ملی مشترک ناتوانی های یادگیری بر اساس هفت نقدی که به شرح بالا بر تعریف دولت فدرال وارد کرده است، تعریف زیر را ارائه کرده است:"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "ناتوانی یادگیری یک اصطلاح کلی است که به گروهی ناهمگون از اختلال ها اشاره دارد که به صورت مشکلات معنادار در اکتساب و استفاده از گوش دادن، صحبت کردن، خواندن، نوشتن، استدلال، یا توانایی های ریاضی بروز می کند. این اختلال ها درونی بوده و فرض بر این است که ناشی از نارسا کنشی در سیستم اعصاب مرکزی هستند و ممکن است در تمام طول زندگی رخ دهند. مشکلات در رفتارهای خود نظم بخشی، درک اجتماعی و تعامل اجتماعی ممکن است همراه با ناتوانی های یادگیری وجود داشته باشد، اما ایجاد کننده ناتوانی یادگیری نیستند. اگرچه که ناتوانی یادگیری ممکن است همزمان با سایر معلولیت ها (مانند آسیب حسی، کم توانی ذهنی، آشفتگی های هیجانی شدید) یا عوامل بیرونی (مانند تفاوت های فرهنگی، آموزش ناکافی یا نامناسب) رخ دهد، با این حال نتیجه این شرایط یا عوامل نمی باشد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**میزان شیوع** بر اساس برآوردهای دولت آمریکا، در مدارس عمومی بین ۵ تا ۶ درصد دانش آموزان ۶ تا ۱۷ سال، مبتلا به ناتوانی یادگیری شناسایی شده اند. ناتوانی های یادگیری بزرگترین مقوله آموزش ویژه است. بیشتر از نیمی از همه دانش آموزانی که در مدارس عمومی برای دریافت آموزش ویژه شناسایی می شوند به ناتوانی یادگیری مبتلا هستند. از سال ۱۹۷۷-۱۹۷۶ یعنی زمانی که دولت فدرال شروع به نگهداری شکل های میزان شیوع کرد تا هم اکنون میزان مقوله ناتوانی یادگیری بیشتر از دو برابر شد. بسیاری از مؤلفان بر این عقیده اند که افزایش سریع مقوله ناتوانی های یادگیری، فعالیت تشخیصی ضعیف را منعکس می کند. آنها معتقدند که معلمان، دانش آموزان با مشکلات یادگیری جزیی را با سرعت برچسب ناتوانی یادگیری می زنند. با این حال برخی دیگر بحث می کنند که افزایش میزان شیوع ممکن است ناشی از تغییرات اجتماعی و فرهنگی باشد که باعث آسیب پذیری کودکان نسبت به ناتوانی یادگیری مشخص می کنند (هالاهان، ۱۹۹۲). برای مثال تعداد کودکانی که در فقر زندگی می کنند بین سال های ۱۹۷۵ و ۱۹۹۳ دو برابر شده است (مرکز ملی کودکان در فقر، ۲۰۰۲) و فقر با میزان بالاتر مشکلات اجتماعی و یادگیری همراه است. علاوه بر این حتی خانواده هایی که در فقر هم نیستند نسبت به هر زمان قبل تحت عوامل تنیدگی زا قرار دارند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "برخی دیگر معتقدند که یک رابطه علی بین کاهش در تعداد دانش آموزانی که کم توان ذهنی شناسایی می شوند و افزایش در تعداد دانش آموزانی که برچسب ناتوانی یادگیری دریافت می کنند وجود دارد. هنگامی که یک دانش آموز می تواند واجد شرایط دریافت کم توان ذهنی باشد، پرسنل مدرسه قواعد را به گونه ای پیش می برند تا برچسب ناتوانی یادگیری به کار برند (مک میلان و سیراستین، ۲۰۰۲)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "میزان شیوع ناتوانی یادگیری در پسران در مقایسه با دختران به نسبت ۳ به ۱ بیشتر است. برخی محققان میزان شیوع ناتوانی یادگیری در مردان نسبت به زنان را ناشی از آسیب پذیری زیست شناختی آن ها نسبت دادند. میزان مرگ و میر نوزادان پسر نسبت به دختر بیشتر است و مردان نسبت به زنان از لحاظ نابهنجاری های زیست شناختی در معرض خطر بیشتری قرار دارند. برخی دیگر از محققان میزان شیوع بیشتر ناتوانی یادگیری در پسران را ناشی از سوگیری در ارجاع می دانند. مثلاً معلمان دانش آموزان پسر را به خاطر فزون کنشی، بیشتر برای دریافت آموزش ویژه ارجاع می دهند تا دانش آموزان دختر (کلاریزیو و فلیس، ۱۹۸۶؛ شای ویتز و همکاران، ۱۹۹۰). در مجموع می توان گفت به رغم وجود برخی سوگیری ها، آسیب پذیری زیست شناختی نیز در مردان وجود دارد. زیرا بر اساس برآورد دولت فدرال آمریکا همه ناتوانی هایی که در مردان بیشتر از زنان است در برگیرنده شرایطی اند که نمی توان تصور کرد علت آن به خاطر سوگیری در سنجش یا ارجاع است مانند آسیب شنوایی (۵۳ درصد در مردان)، آسیب ارتوپدی (۵۴ درصد در مردان)، و آسیب بینایی (۵۶ درصد در مردان) (هالاهان و همکاران، ۲۰۰۵، ص ۳۵)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "برای سال ها بسیاری از متخصصان فکر می کردند که عوامل عصب شناختی علت اصلی ناتوانی های یادگیری هستند. با این حال شواهد عصب شناختی اندکی وجود دارد که در افراد مبتلا به ناتوانی یادگیری، آسیب واقعی در بافت های مغز وجود دارد. بنابراین امروزه اصطلاح"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "نارساکنش وری جایگزین آسیب یا صدمه شده است. بنابراین کودک مبتلا به ناتوانی یادگیری به نارساکنش وری در سیستم اعصاب مرکزی ارجاع داده می شود تا صدمه مغزی. نارساکنش وری ضرورتاً به معنای آسیب در بافت مغزی نیست، که به معنای بد کار کردن مغز یا سیستم اعصاب مرکزی است. در سال های اخیر محققان برای ارزیابی فعالیت مغز از فن آوری های پیشرفته ای استفاده می کنند که رایج ترین آن ها جهت تشخیص نارساکنش وری های عصب شناختی در برخی افراد مبتلا به ناتوانی یادگیری عبارتند از: MRI، fMRI، fMRIs، PET."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "با استفاده از این تکنیک ها محققان شواهدی را در ارتباط با تفاوت های ساختاری و کنشی بین مغزهای عادی و افراد مبتلا به ناتوانی یادگیری به خصوص افراد مبتلا به ناتوانی های خواندن جمع آوری کردند (ریچاردز، ۲۰۰۱). تفاوت های ساختاری، مربوط به اندازه مناطق مختلف مغز و تفاوت های کنشی مربوط به فعالیت در مغز است. برای مثال با توجه به تفاوت های کنشی، محققان دریافتند که نواحی مختلفی از مغز در طی تکالیف خواندن در افراد مبتلا به نارساخوانی در مقایسه با افراد عادی فعال می گردند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "باید یادآور شد که شواهد قطعی در مورد اساس عصب شناختی دانش آموزان مبتلا به ناتوانی یادگیری وجود ندارد و حتی اگر این شواهد جمع آوری گردد، باز هم این سوال باقی است که علت نارساکنش وری مغز در افراد مبتلا به ناتوانی یادگیری چیست؟ هالا هان و کافمن (۲۰۰۹) این علل را در سه مقوله ژنتیکی، تراتوژن ها، و عوامل پزشکی تقسیم کردند:"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "شواهد مختلف حاکی از آن است که ناتوانی های یادگیری می تواند ارثی باشد. شواهد مختلف مربوط به مطالعات بر روی دوقلوهای همسان یا یک تخمکی حاکی از آن است که اگر یکی از دوقلوها نارساخوان باشد، کودک دیگر نیز احتمالا به نارساخوانی مبتلا خواهد شد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "همچنین مشکلات خواندن و زبان در بین اعضای خانواده دانش آموزان مبتلا به ناتوانی یادگیری وجود دارد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**عوامل تراتوژن** تراتوژن ها عواملی هستند که می توانند موجب بدشکلی ها یا نقص هایی در رشد جنین گردند. به عنوان مثال نشانگان الکلی جنین یکی از عوامل ایجاد کننده کم توانی ذهنی است. محققان بر این باورند برخی افراد ممکن است در معرض سطوح مختلف این مواد قرار گیرند ولی نه به اندازه ای که منجر به کم توانی ذهنی گردد؛ بنابراین باعث ناتوانی یادگیری در آن ها می گردد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**عوامل پزشکی** برخی شرایط پزشکی وجود دارد که می تواند تأثیر منفی بر کودکان بگذارد. از جمله این شرایط، تولد پیش از موعد است که کودکان را در معرض خطر نارساکنش وری عصب شناختی قرار می دهد. به طور کلی عوامل ایجاد کننده احتمالی اختلال ناتوانی یادگیری را می توان بر حسب زمان نیز به سه دسته تقسیم کرد: ۱. عوامل قبل از تولد: مانند ناسازگاری عامل ارهاش، اشعه ایکس، مصرف مواد مخدر، مصرف دارو، سن مادر، عفونت هایی مانند سرخجه ۲. عوامل هنگام تولد: مانند کمبود اکسیژن، زایمان زودرس یا دیررس ۳. عوامل پس از تولد: مانند تب بالا، ضربات به سر، مننژیت"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**روش های شناسایی و سنجش ناتوانی یادگیری** شیوه های شناسایی ناتوانی یادگیری در حال حاضر در وضعیت انتقال است. همان طوری که در بخش تعریف این اختلال مطرح شد، دولت فدرال، قانون آموزش افراد با ناتوانی را در سال ۲۰۰۴ مجدداً تصویب کرد. همچنین روشی که دانش آموزان ممکن است جهت دریافت خدمات آموزشی ویژه واجد شرایط شوند، به طور چشمگیری تغییر کرد. رویکرد سنتی در"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "شناسایی، تفاوت پیشرفت - توانایی نام دارد. راه حل جایگزین برای شناسایی ناتوانی یادگیری، پاسخ به مداخله است که در تصویب مجدد دولت فدرال در سال ۲۰۰۴ ذکر شده است. به عبارت دیگر تصویب مجدد قانون آموزش افراد با ناتوانی در سال ۲۰۰۴ اجازه داده است تا بین استفاده از دو روش فوق برای شناسایی دانش آموزان مبتلا به ناتوانی یادگیری، انتخاب صورت گیرد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۱) تفاوت پیشرفت - توانایی بر اساس قواعد دولت فدرال بعد از ارائه تعریف در سال ۱۹۹۷، عنصر اساسی در شناسایی افراد مبتلا به ناتوانی یادگیری، وجود تفاوت شدید بین پیشرفت و توانایی هوشی است. دولت فدرال تصمیم گیری درباره تعیین این تفاوت شدید را بر عهده ایالت ها قرار داد. بسیاری از ایالت ها به تفاوت هوش بهر- پیشرفت متکی هستند، یعنی مقایسه بین نمرات هوش استاندارد شده و آزمون های پیشرفت. بسیاری از آن ها از فرمول های آماری مختلفی برای شناسایی تفاوت استفاده می کنند که در طول سال ها ایرادهای زیادی بر استفاده از این فرمول ها وارد شد. برخی از این فرمول ها از لحاظ آماری نقص دارند و منجر به قضاوت نادرست می گردند و برخی دیگر که از لحاظ آماری مناسب هستند، اجرای آن ها دشوار و هزینه بر است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "برخی مؤلفان مانند فلتچر (۲۰۰۲) علاوه بر دشوار بودن استفاده از فرمول ها، نقدهای مفهومی دیگری را مطرح کردند. به عنوان مثال این ایراد را مطرح کردند که هوش بهر یک عامل پیش بینی کننده بسیار قوی از توانایی خواندن نیست. علاوه بر این نمرات هوش بهر دانش آموزان مبتلا به ناتوانی یادگیری در معرض کم ترسنجی قرار دارد، زیرا عملکرد بر روی آزمون های هوش بهر تا اندازه ای به توانایی خواندن وابسته است. به عبارت دیگر دانش آموزان با مهارت های خواندن ضعیف در بسط دادن واژگان خود و یادگیری درباره جهان مشکلاتی دارند. در نتیجه این افراد نمرات پایین تر از متوسط را در آزمون های هوش بهر به دست می آورند و تفاوت بین هوش بهر و پیشرفت در آن ها کم می شود. در نهایت این که برخی مربیان نیز از دیدگاه تفاوت بدین صورت ایراد گرفتند که این روش در پایه های ابتدایی فاقد کاربرد است. در پایه-"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "های اول و دوم انتظار چندانی برای خواندن و یا ریاضی وجود ندارد. به خاطر همین تأخیر در شناسایی با این روش است که رویکرد تفاوت هوشبر- پیشرفت به مدل \"انتظار برای شکست\" مشهور است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۲) پاسخ به مداخله یا پاسخ به درمان بر اساس انتقادهای ذکر شده در مورد رویکرد تفاوت هوشبر- پیشرفت، محققان روش های جایگزینی را برای شناسایی دانش آموزان مبتلا به ناتوانی یادگیری مطرح کردند. رویکرد پاسخ به مداخله یا پاسخ به درمان در تعیین اختلال ناتوانی یادگیری شامل مؤلفه های زیر است: دانش آموزان آموزش مؤثر کلی را توسط معلم کلاس درس دریافت کنند پیشرفت آنها بازبینی گردد آنهایی که به آموزش پاسخ نمی دهند، آموزش دیگر یا بیشتری را توسط معلم خود یا شخص دیگر دریافت کنند پیشرفت آنها مجدداً مورد بازبینی گردد آنهایی که هنوز به آموزش پاسخ ندادند یا برای آموزش ویژه و یا برای ارزیابی جهت دریافت خدمات آموزش ویژه ارجاع داده شوند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "طرفداران رویکرد بالا ذکر می کنند که این روش علاوه بر اجتناب از نقایص رویکرد تفاوت پیشرفت - توانایی، این فایده مهم را دارد که تضمین می کند پیشرفت پایین دانش آموز ناشی از عدم دریافت آموزش مؤثر نیست."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "با این حال باید یادآور شد که تحقیقات بسیار کمی درباره کارآمدی این روش وجود دارد و فقدان این پژوهش ها سوال های زیر را بر می انگیزد: ماهیت مداخله چه چیزی باید باشد؟ آیا باید فردی باشد یا همه افراد مداخله یکسانی را دریافت کنند و در واقع مداخله باید شامل پروتکل استانداردی باشد؟ این روش برای دانش آموزان با مشکلات ریاضی چگونه عمل خواهد کرد؟ تاکنون این روش برای دانش آموزان با مشکلات خواندن استفاده شده است. آیا مداخله باید به صورت آموزش عادی که در کلاس درس آموزش عمومی ارائه می شود صورت گیرد یا باید نوع خاص تری از آموزش مانند آموزش یک به یک اجرا شود؟"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "چه کسی باید آموزش را ارائه دهد: معلم آموزش عمومی یا معلم آموزش خاص؟ چه ملاکی برای تعیین میزان پاسخ دهی این روش به کار رود؟ شدت مداخله چقدر باید باشد (مانند سی دقیقه در روز، هر روز، پنجاه دقیقه هر روز، سه بار در هفته)؟ چقدر مداخله باید طول بکشد، مانند ده هفته، یک نیمسال تحصیلی (به نقل از هالا هان و کافمن، ۲۰۰۹)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**روش های سنجش ناتوانی یادگیری** چهار نوع سنجش در حوزه ناتوانی های یادگیری رایج است: سنجش استاندارد پیشرفت، سنجش تکوینی، سنجش غیر رسمی، سنجش اصیل."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**۱. سنجش استاندارد پیشرفت** معلمان و روان شناسان به طور رایج از سنجش استاندارد پیشرفت برای دانش آموزان مبتلا به ناتوانی یادگیری استفاده می کنند، زیرا مشکلات در پیشرفت، ویژگی اصلی این دانش آموزان است. تست های متعددی برای این منظور وجود دارد. برای مثال تست پیشرفت انفرادی وکسلر- دومین ویرایش همه حوزه های تعریف فدرال را از ناتوانی یادگیری اندازه گیری می کند، مانند خواندن پایه، درک خواندن، هجی کردن، بیان نوشتاری، استدلال ریاضی، عملیات عددی، درک گوش دادن، و بیان شفاهی. تهیه کنندگان این تست آن را به گونه ای تهیه کردند تا بتوان از آن در تلفیق با مقیاس هوش وکسلر کودکان جهت بررسی تفاوت بین پیشرفت و توانایی استفاده کرد. محدودیت بیشتر ابزارهای استاندارد شده این است که نمی توانند درباره علت مشکلات دانش آموز اطلاعاتی ارائه دهند. معلمان و متخصصان بالینی از این تست ها بیشتر برای شناسایی دانش آموزان با مشکلات یادگیری و فراهم کردن نشانگرهای اصلی توانایی ها و ضعف های تحصیلی آنها استفاده می کنند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۲. سنجش تکوینی سنجش تکوینی به چگونگی عملکرد دانش آموز در مقایسه با دیگر دانش آموزان، کمتر مرتبط است ولی به چگونگی عملکرد دانش آموز در سایه توانایی های او مرتبط است. ویژگی های این نوع ارزیابی عبارت است از: سنجش معمولاً توسط معلم کودک انجام می گیرد تا روانشناس یا آزمونگر مدرسه. معلم رفتارهای کلاس درس را به طور مستقیم می سنجد. معلم رفتار دانش آموز را به طور مکرر و در طول زمان مشاهده و ثبت می کند. به عنوان مثال معلم می تواند عملکرد دانش آموز را دو یا سه بار در هفته اندازه گیری کند. معلم از این روش برای سنجش پیشرفت دانش آموز در هدف های آموزشی استفاده می کند. معلم از سنجش تکوینی برای بازبینی کارایی برنامه ریزی آموزشی استفاده می کند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "یک مدل خاص از سنجش تکوینی، سنجش مبتنی بر برنامه درسی است که تا حد زیادی توسط دنو و همکارانش طراحی شده است (دنو، ۱۹۸۵؛ فاکز و همکاران، ۱۹۸۴). در این روش عملکرد دانش آموز در برنامه درسی خاصی که از آن بهره گرفته است، اندازه گیری می شود. در سنجش مبتنی بر برنامه درسی عملکرد دانش آموز با ناتوانی با همسالان او در مدرسه خود یا در همان بخش مقایسه می گردد (به نقل از هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۳. سنجش غیر رسمی یک روش رایج سنجش توسط معلمان این است که از دانش آموزان خواسته می شود تا بر روی یک تکلیف تحصیلی فعالیت کنند و معلم نقاط قوت و ضعف دانش آموزان را یادداشت می کند. برای مثال در حوزه خواندن معلمان می توانند از یک سیاهه خواندن غیررسمی یعنی مجموعه ای از متن ها یا کلمات خواندن که بر حسب میزان دشواری مرتب شده است، استفاده کنند. دانش آموز با متن ساده شروع می کند و به تدریج سطح دشواری افزایش می یابد و معلم عملکرد دانش آموز را بازبینی می کند و در نتیجه می تواند سطح مشکلات دانش آموز را برآورد سازد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": ".۴ سنجش اصیل هدف سنجش اصیل، سنجیدن تفکر انتقادی و توانایی حل مسئله در موقعیت های زندگی واقعی است. یک نمونه از سنجش اصیل، مجموعه کار است. مجموعه کار، جمع آوری نمونه های کار دانش آموز است که در طول زمان انجام داده است. این روش شواهد وسیع تری را در ارتباط با کار دانش آموز در اختیار می گذارد؛ شواهدی که به طور نزدیکی با مهارت های زندگی واقعی ارتباط دارد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "با این حال سنجش از طریق مجموعه کار بسیار مشکل و زمان بر است (هالاهان و همکاران، ۲۰۰۵). معلمان باید به دانش آموزان بگویند که چه مواردی را باید در مجموعه کار قرار دهند و ملاک ارزیابی چیست. این روش اگر به درستی انجام شود منبع غنی از اطلاعات درباره توانایی ها و علایق دانش آموز در اختیار قرار می دهد. علاوه بر این مجموعه کار می تواند ارزش خاصی برای دانش آموزانی که از لحاظ فرهنگی متفاوت هستند داشته باشد، زیرا تست های استاندارد شده ممکن است نتواند توانایی هایی واقعی آن ها را منعکس کند (رودا و گارسیا، ۱۹۹۷)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "ویژگی های افراد مبتلا به ناتوانی یادگیری قبل از بحث درباره ویژگی های افراد مبتلا به ناتوانی یادگیری، باید یادآور شد که تنوع و یا تفاوت ویژگی های آن ها در دو سطح درون فردی و بین فردی قابل بحث است. در سطح تنوعات بین فردی در بین دانش آموزان مبتلا به ناتوانی یادگیری باید یادآور شد که برخی از آن ها مشکلاتی را در ریاضی دارند، برخی دیگر مشکلاتی را در هجی کردن و نظایر آن. یک اصطلاح برای چنین گوناگونی بین فردی، ناهمگنی است. اگرچه که ناهمگنی، مشخصه کودکان مربوط به همه گروه های با نیازهای ویژه است، با این حال عبارت «هیچ دو نفری"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "دقیقاً مثل هم نیستند»، این ناهمگنی بزرگترین تنوعات درون فردی و تنوعاتی را در نیمرخ توانایی ها از لحاظ خواندن دو یا سه سال کردن بسیار ضعیف تر از تنوع درون فردی در ریاضی به عنوان یکی از ویژگی های اصلی است. در هر صورت، در اینجا برخی از مهمترین ویژگی ها"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "مشکلات تحصیلی مشکلات تحصیلی در خواندن، قابل مشاهده است. ۱) خواندن: خواندن شامل مفاهیم جدید یادگیری بسیاری از مهارت های پایه برای آن ها است. در بسیاری از موارد در سال های اخیر، آموزش رسمی خواندن و بازشناسی و تلفظ کلمات می تواند در مدرسه"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "دقیقاً مثل هم نیستند »، به طور خاصی برازنده دانش آموزان مبتلا به ناتوانی یادگیری است. این ناهمگنی بزرگترین چالش معلمان در آموزش این دانش آموزان است. تنوعات درون فردی به این مسئله اشاره دارد که کودکان مبتلا به ناتوانی یادگیری، تنوعاتی را در نیمرخ توانایی های خود نشان می دهند. برای مثال یک کودک ممکن است از لحاظ خواندن دو یا سه سال بالاتر از سطح پایه خود عمل کند، ولی در نوشتن و یا حساب کردن بسیار ضعیف تر عمل کند. ساموئل کرک یکی از مؤثرترین افراد در حمایت از دیدگاه تنوع درون فردی در دانش آموزان مبتلا به ناتوانی یادگیری است. این دیدگاه اکنون نیز به عنوان یکی از ویژگی های مهم بسیاری از دانش آموزان مبتلا به ناتوانی یادگیری قابل پذیرش است. در هر صورت با این توضیح درباره تنوعات بین فردی و درون فردی، به بررسی اجمالی برخی از مهمترین ویژگی های دانش آموزان مبتلا به ناتوانی یادگیری می پردازیم."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "مشکلات تحصیلی مشکلات تحصیلی مهمترین شاخص ناتوانی های یادگیری است که در حوزه های مختلف زیر قابل مشاهده است: ۱) خواندن: خواندن یکی از مهارت های اساسی است که ما را در دریافت و درک اطلاعات و مفاهیم جدید یاری می دهد. اغلب دانش آموزان مبتلا به ناتوانی یادگیری در یک یا چند سطح از مهارت های اساسی مشکل دارند. اختلال در خواندن یکی از رایج ترین مشکلات در میان آنها است. در حدود ۹۰ درصد دانش آموزان مبتلا به ناتوانی یادگیری در خواندن مشکل دارند. در سال های اخیر، شواهد نشان داده اند که اختلال در خواندن قبل از ورود به مدرسه و شروع آموزش رسمی شکل می گیرد (پاگت، ۱۹۹۸). عدم توانایی خردسالان در به کارگیری درست بازشناسی و تولید واج های مجزا می تواند پیش بینی کننده مشکلات خواندن باشد. این مشکل می تواند در مشکلات تحصیلی کودکان هنگام ورود به مدرسه نمود پیدا کند. اغلب آنها در بدو ورود به مدرسه، ابتدا در یادگیری صدای حروف مشکلاتی را نشان می دهند، سپس مشکلات آنها به بازشناسی حروف نوشتاری و کلمه های ساده نیز تعمیم می یابد، در نهایت در پایان پایه تحصیلی اول، ناتوانی یادگیری به طور معناداری نمایان می گردد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "خواندن مهم ترین مشکل بیشتر دانش آموزان مبتلا به ناتوانی یادگیری است. دانش آموزان با ناتوانی های خواندن احتمالا مشکلاتی را در سه جنبه خواندن یعنی رمزگشایی، سیالی، و درک دارند (هالاهان و همکاران، ۲۰۰۵). رمزگشایی توانایی تبدیل نوشتار به زبان گفتاری است. این توانایی تا حد زیادی به آگاهی واج شناختی و آگاهی واجی وابسته است. آگاهی واج شناختی، درک این نکته است که گفتار شامل واحدهای کوچک صدا مانند کلمات، سیلاب ها و آواها تشکیل می شوند؛ مانند این که کلمه سلام از س ل ا م تشکیل شده است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "دانش آموزانی که مشکلاتی در رمزگشایی دارند به طور یکنواخت مشکلاتی در سیالی خواندن دارند. سیالی خواندن به توانایی خواندن بدون تلاش و آرام اشاره دارد. سرعت خواندن و توانایی خواندن با ابراز مناسب، مؤلفه های روانی خواندن هستند. مشکلات در سیالی خواندن دلیل اصلی مشکلات در درک خواندن در دانش آموزان است (گود و همکاران، ۲۰۰۱). درک خواندن توانایی به دست آوردن معنا از متن خواندن است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۲) زبان نوشتاری: افراد مبتلا به ناتوانی یادگیری اغلب مشکلاتی در یک یا بیشتر از یکی از حوزه های دست خط، هجی کردن، و ترکیب دارند (هالاهان و همکاران، ۲۰۰۵). اگرچه که حتی بهترین دانش آموزان ممکن است از لحاظ دست خط کامل نباشند، با این حال انواع مشکلاتی که توسط برخی دانش آموزان مبتلا به ناتوانی یادگیری نشان داده می شود، بسیار شدیدتر است. کودکان مبتلا به ناتوانی یادگیری اغلب نویسنده های بسیار کندی هستند. هجی کردن می تواند مسئله مهمی باشد، زیرا مشکلاتی را در درک تطابق بین صداها و حروف به وجود می آورد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "علاوه بر حوزه های مکانیکی تر دست خط و هجی کردن، دانش آموزان مبتلا به ناتوانی یادگیری به طور مکرر مشکلاتی را در جنبه های خلاق تر یعنی ترکیب کردن دارند (مونتاگ و..."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "گراوز (۱۹۹۲). برای مثال این دانش آموزان در مقایسه با همسالان عادی از ساختارهای جمله پیچیده کمتری استفاده می کنند، مانند استفاده از پاراگراف های کمتر سازمان یافته، عقاید کمتر در تولیدهای نوشتاری و نوشتن داستان هایی که مؤلفه های مهم کمتری دارند مانند معرفی ویژگی های اصلی، توصیف تعارض و حل آن (هالاهان و همکاران، ۲۰۰۵)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۳) زبان گفتاری. بسیاری از دانش آموزان مبتلا به ناتوانی یادگیری مشکلاتی را در نحو (گرامر)، مکانیکی و اجتماعی از زبان دارند. آنها از لحاظ مکانیکی مشکلاتی را در نحو (گرامر)، معناشناختی (معنای کلمه) و واج شناختی (توانایی شکستن کلمات به مؤلفه های آنها یعنی صداها و آمیختن صداها به یکدیگر برای ایجاد کلمه) دارا هستند. به طور خلاصه افراد مبتلا به ناتوانی یادگیری، گفت و کننده های بسیار خوبی نیستند. برای مثال گفتگوهای این افراد به طور مکرر با سکوت های طولانی همراه است و در پاسخ دهی به جملات یا سوال های دیگران ماهر نیستند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "٤) ریاضی. به طور کلی مشکلات ریاضی در دانش آموزان مبتلا به ناتوانی یادگیری کمتر مورد بررسی و مطالعه قرار گرفته است. حتی برای شناسایی این افراد و در بحث محاسبه تفاوت بین توانمندی فرد و پیشرفت تحصیلی، از عملکرد در خواندن استفاده می شود و به نمره های ریاضی فرد توجه چندانی نمی گردد. به همین دلیل بیشتر دانش آموزان با مشکلات ریاضی شناسایی نمی گردند و خدمات آموزش ویژه را دریافت نمی کنند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "توانایی های شناختی متعددی بر مهارت های ریاضی تأثیر دارند. توانایی های زبانی، درک روابط فضایی و استدلال از مهم ترین توانایی های شناختی محسوب می شوند که بر عملکرد افراد در ریاضی مؤثرند. انواع مشکلات ریاضی در افراد مبتلا به ناتوانی های یادگیری عبارتند از: مشکلات در مهارت های حساب کردن، راهبردهای حل مسئله، شمارش، مراحل محاسبه و مانند آن."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "نتایج مطالعات حاکی از آن است که کودکان مبتلا به ناتوانی یادگیری، دارای ناتوانی های ادراکی/دیداری و یا شنیداری هستند. کودک با مشکلات ادراک/دیداری ممکن است مشکلاتی را در حل پازل ها یا دیدن و به خاطر آوردن شکل های دیداری داشته باشد. کودک با"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "مشکلات ادراک شنیداری ممکن است مشکلاتی را در تمیز بین دو کلمه که شبیه هم هستند (مانند یارانه و رایانه) و پیروی از دستورالعمل های شفاهی داشته باشد. معلمان و والدین همچنین گزارش می کنند که برخی دانش آموزان مبتلا به ناتوانی یادگیری مشکلاتی را در فعالیت های فیزیکی از جمله مهارت های حرکتی دارند. مشکلات آن ها ممکن است هم در مهارت های حرکتی درشت (عضلات حرکتی بزرگ) باشد و هم در مهارت های حرکتی ظریف (عضلات حرکتی کوچک). مهارت های حرکتی ظریف اغلب شامل هماهنگی سیستم های دیداری حرکتی است (هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "مشکلات در توجه و فزون کنشی دانش آموزان با مشکلات توجه ویژگی هایی مانند حواس پرتی، تکانشگری و فزون کنشی را نشان می دهند. بر اساس توصیف والدین و معلمان، این کودکان اغلب قادر نیستند بر روی یک تکلیف به مدت طولانی بمانند، در گوش دادن به دیگران شکست می خورند، بدون توقف صحبت می کنند، و در برنامه ریزی فعالیت های خود در داخل و خارج از مدرسه به طور کلی سازمان نایافته عمل می کنند (هالاهان و کافمن، ۲۰۰۹). اغلب اوقات مشکلات توجه در افراد مبتلا به ناتوانی یادگیری به حدی است که برچسب نارسایی توجه/فزون کنشی را نیز دریافت می کنند. اختلال نارسایی توجه/فزون کنشی با ویژگی هایی مانند نارسایی توجه، فزون کنشی، و تکانشگری همراه است. بر اساس برآوردها، همپوشی ۱۰ تا ۲۵ درصدی بین مقوله ناتوانی یادگیری و اختلال نارسایی توجه/فزون کنشی وجود دارد (فورنس و کاوال، ۲۰۰۲)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "حافظه معلمان و والدین به خوبی آگاه هستند که دانش آموزان مبتلا به ناتوانی یادگیری مشکلاتی را در به خاطرآوری تکالیف دارند. مشکلات واقعی حافظه در این دانش آموزان در یافته های پژوهشی متعدد نیز تأیید شده است. این دانش آموزان حداقل در دو نوع حافظه یعنی حافظه"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "کوتاه مدت و حافظه کاری مشکلات در حافظه کوتاه مدت، از دیدن یا شنیدن آن است که کلماتی که به صورت دیداری یا حافظه کاری بر توانایی شنیدن خودانگیخته یک تکلیف شنیداری در حین گوش دادن به دستورات است. مشکلات در حافظه کاری مختلف، مربوط می شود. به خاطر سپاری، نام ها را بیشتر دانش آموزان مبتلا به ناتوانی یادگیری نمی کنند. بنابراین باید این دانش عملکرد تحصیلی آن ها با تکالیف"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "شناخت نارسایی در استفاده از راهبردهای ناتوانی یادگیری مشکلاتی را در جنبه های مختلف تفکر و حل تفکر سازمان نایافته ای را در زندگی آن ها در مدرسه و خانه"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "فراشناخت فراشناخت به توانایی های فرد در یادگیری اشاره دارد. هر فردی و توانایی در چگونگی یادگیری"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "کوتاه مدت و حافظه کاری با مشکلاتی مواجه هستند (سوانسون و ساچز-لی، ۲۰۰۱). مشکلات در حافظه کوتاه مدت شامل مشکلات در خاطرآوری اطلاعات در مدت کوتاه بعد از دیدن یا شنیدن آن است. به عنوان مثال افراد مبتلا به ناتوانی یادگیری در تکرار فهرستی از کلماتی که به صورت دیداری یا شفاهی ارائه می گردد، با مشکلاتی مواجه هستند. مشکلات در حافظه کاری بر توانایی شخص برای حفظ یا نگهداری اطلاعات در ذهن در حین انجام خودانگیخته یک تکلیف شناختی دیگر تأثیر می گذارد. تلاش برای به خاطرآوردن یک آدرس در حین گوش دادن به دستورات در زمینه چگونگی رسیدن به آن یک نمونه از حافظه کاری است. مشکلات در حافظه کودکان مبتلا به ناتوانی یادگیری به عدم استفاده آنها از راهبردهای مختلف، مربوط می شود. برای مثال افراد عادی به هنگام شنیدن فهرستی از کلمات جهت به خاطر سپاری، نام ها را پیش خود تکرار می کنند و یا آنها را مقوله بندی می کنند؛ ولی دانش آموزان مبتلا به ناتوانی یادگیری احتمالا از این راهبردها به طور خودبه خودی استفاده نمی کنند. بنابراین باید این راهبردها را آموزش ببینند که نتایج تحقیقات مختلف حاکی از بهبود عملکرد تحصیلی آنها با آموزش این راهبردها است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**شناخت** نارسایی در استفاده از راهبردهای مختلف در تکالیف حافظه نشان می دهد که کودکان مبتلا به ناتوانی یادگیری مشکلاتی را در شناخت دارند. شناخت اصطلاح وسیعی است که بسیاری از جنبه های مختلف تفکر و حل مسئله را شامل می گردد. دانش آموزان با ناتوانی یادگیری اغلب تفکر سازمان نایافته ای را نشان می دهند که منجر به مشکلاتی در برنامه ریزی و سازماندهی زندگی آنها در مدرسه و خانه می گردد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**فراشناخت** فرا شناخت به توانایی شخص در تشخیص چگونگی یادگیری، ارزیابی و کنترل فرایند یادگیری اشاره دارد. همچنین به آگاهی شخص از راهبردهای مورد نیاز برای انجام یک تکلیف و توانایی در چگونگی به کارگیری این راهبردها، فراشناخت اطلاق می شود. خودنظم بخشی"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**مشکلات اجتماعی - هیجانی** کودکان مبتلا به ناتوانی یادگیری مشکلات اجتماعی - هیجانی بیشتری را نسبت به کودکان عادی دارا هستند. آثار این مشکلات رفتاری در کودکان می تواند بادوام و تخریب گر باشد. در سال های اولیه، این کودکان اغلب توسط همسالان طرد شده و از خودپنداشت پایینی برخوردارند (برایان، براستین و ارگول، ۲۰۰۴). یک دلیل برای مشکلات اجتماعی برخی از دانش آموزان مبتلا به ناتوانی یادگیری، نارسایی های آن ها در شناخت اجتماعی است. بدین معنا که آن ها سرنخ های اجتماعی را اشتباه می خوانند و ممکن است احساس ها و هیجان های دیگران را نادرست تفسیر کنند. برای مثال بیشتر کودکان می توانند بگویند که چه وقت رفتارشان دیگران را آزار می دهد، ولی دانش آموزان مبتلا به ناتوانی یادگیری برخی اوقات به گونه ای عمل می کنند که گویا از اثرات رفتارشان بر همسالان خود بی خبر هستند. آن ها همچنین مشکلاتی در دیدگاه گیری دارند یعنی در درک دیدگاه دیگران با مشکل مواجه هستند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "البته تمامی افراد مبتلا به ناتوانی یادگیری الزاماً مشکلات اجتماعی هیجانی را تجربه نمی کنند، بلکه در مقایسه با همتایان بهنجار خود بیشتر در معرض خطر هستند و درمان مشکلات آن ها مشکل تر و طولانی تر است. اغلب آن ها در کودکی از سوی همتایان خود طرد می شوند و احساس خودپنداشت آن ها بسیار تضعیف می گردد (اسریدهار و ون، ۲۰۰۱)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "مشکلات در تعامل اجتماعی در کودکانی که در تکالیف ریاضی، دیداری - فضایی، خود نظم بخشی و سازماندهی ضعف دارند، بیشتر مشاهده می شود (رورک، ۱۹۹۵؛ ورلینگ، هامفیز، و ...)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "ناتوک (۱۹۹۹)، نتایج پژوهش ها حاکی از آن است که افراد مبتلا به ناتوانی های یادگیری غیرکلامی در مهارت های ریاضی، دیداری- فضایی و لامسه ای مشکل دارند و مسئول این مهارت ها نیمکره راست است؛ بنابراین نارساکنش وری در نیمکره راست آن ها وجود دارد. این افراد همچنین به علت طرد اجتماعی و انزوایی که ممکن است تجربه کنند، در معرض خطر خودکشی قرار دارند (بندر، روزنکرانز و کران، ۱۹۹۹؛ به نقل از هالان و کافمن، ۲۰۰۹)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "انگیزش بسیاری از افراد مبتلا به ناتوانی یادگیری از لحاظ انگیزشی مشکلات اساسی دارند. آن ها به توانایی های خود در رویارویی با مشکلات زندگی ایمان ندارند و منبع مهارگری در آن ها بیرونی است تا درونی. به بیان دیگر آن ها بر این باور هستند که زندگی آن ها تحت مهار عوامل بیرونی مانند شانس است تا عوامل درونی مانند توانایی؛ به طوری که برخی اوقات ممکن است دچار استیصال اکتسابی گردند. آنچه که مشکلات انگیزش را برای معلمان، والدین و افراد مبتلا به ناتوانی یادگیری بسیار دشوار می سازد، رابطه متقابل بین مشکلات انگیزشی و شناختی در این دانش آموزان است (مونتاگ، ۱۹۹۷). این چرخه را می توان بدین صورت شرح داد: دانش آموز یاد می گیرد تا در هر موقعیت جدید بر اساس تجربه شکست، انتظار شکست را داشته باشد، سپس انتظار شکست (یا استیصال اکتسابی)، ممکن است موجب گردد دانش آموز به هنگام رویارویی با یک تکلیف مشکل یا پیچیده آن را رها سازد. در نتیجه نه تنها در یادگیری مهارت های جدید شکست می خورد، که همچنین تجربه بد دیگری را داشته است؛ یعنی تقویت احساس استیصال و حتی بی ارزشی. بنابراین این چرخه به همین صورت پیش می رود."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "ملاحظات آموزشی روش های آموزشی متعددی برای کودکان مبتلا به ناتوانی های یادگیری وجود دارد که باید با توجه به حوزه ای که کودک در آن مشکل دارد و شدت مشکلات کودک از آن ها بهره گرفت. یکی از مهمترین روش های آموزش این کودکان، تأکید بر فرایندهای شناختی مرتبط با"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "یادگیری در آنها است. خودبازبینی، خودپرسشگری، خودتقویت گری و خودتصحیح گری از مؤلفه های الگوی شناختی به حساب می آیند. بنابراین باید به دانش آموزان مهارت های صحیح مطالعه کردن، مدیریت زمان، تقویت حافظه و ... را آموزش داد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**آموزش شناختی** در حالی که اصلاح رفتار بر اصلاح رفتارهای قابل مشاهده تمرکز می کند، آموزش شناختی با اصلاح فرایندهای تفکر غیرقابل مشاهده و بهبود مشکلات قابل مشاهده در رفتار تمرکز می کند. آموزش شناختی در کمک به حل دامنه ای از مشکلات تحصیلی افراد مبتلا به ناتوانی یادگیری مؤثر بوده است (هالاهان و همکاران، ۲۰۰۵). در این روش، معلم از یک برنامه درسی تفکر و فراهم کردن راهبردهایی برای یادگیری استفاده می کند. در این روش، معلم از یک برنامه درسی بسیار سازمان یافته بهره می گیرد که بر مشکلات یادگیری کودک تمرکز می کند. دامنه ای از تکنیک های مختلف تحت عنوان آموزش شناختی قابل بحث هستند که برخی از آنها در این قسمت شرح داده خواهند شد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**۱) آموزش خود** هدف از آموزش خود، آگاه ساختن دانش آموزان از مراحل متعدد تکالیف حل مسئله و مهار کلامی آن است. در این روش دانش آموزان به استفاده از موارد زیر تشویق می شوند: تعریف مسئله: چه چیزی را من باید انجام دهم؟ برنامه ریزی: چگونه می توانم این مسئله را حل کنم؟ استفاده از راهبرد: راهبرد پنج مرحله ای به من کمک می کند خود ارزیابی: چگونه دارم انجام می دهم؟ تقویت خود: من درست عمل کردم، کار خوبی بود."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "خودبازبینی شامل دو مؤلفه خودارزیابی و ثبت کردن توسط خود است. دانش آموزان رفتارهایی را ارزیابی می کنند و سپس ثبت می کنند که آیا آن رخ داده است یا نه. به عنوان مثال دانش آموز بعد از فعالیت بر روی چند مسئله ریاضی، پاسخ هایش را بررسی کند و سپس تعداد پاسخ های صحیح خود را بر روی یک نمودار ثبت کند. دانش آموز از این روش می تواند برای سایر مهارت های تحصیلی نیز استفاده کند (هریس و همکاران، ۱۹۹۴)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "روش تدریس دوجانبه روشی است که برای کسب مهارت های شناختی و فراشناختی مربوط به خواندن و فهمیدن در گروه های کوچک دانش آموزان ابداع شده است (پالینسکار و براون، ۱۹۸۴؛ پالینسکار، دیوید، و براون، ۱۹۸۹). این روش شامل یک گفتگوی تعاملی بین معلم و دانش آموزان است که طی آن روابط معلم-دانش آموز مشابه رابطه یک کارشناس و کارآموز است. معلم به تدریج نقش خود را به عنوان تنها آموزش دهنده کاهش می دهد و اجازه می دهد تا دانش آموز نقش مربی همکار را برای دوره کوتاه ایفا کند. معلم چهار راهبرد پیش بینی کردن، سوال کردن، خلاصه کردن، و روشن ساختن را الگو دهی می کند و سپس دانش آموزان را به استفاده از آن راهبردها تشویق کند و سرنخ ارائه می دهد (هالاهان و کافمن، ۲۰۰۹)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "در روش تدریس دوجانبه معلم و دو الی چهار دانش آموز، یک گروه یادگیری را تشکیل می دهند. در مرحله اول معلم و دانش آموزان متنی را بی صدا برای خود می خوانند. در مرحله بعد معلم چهار راهبرد فوق را در مورد متن خوانده شده اعمال می کند. سپس معلم به همراه دانش آموزان قسمت دیگری از آن متن را می خواند و یکی از دانش آموزان چهار راهبرد مورد"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "نظر را اجرا می کند. در شرایطی که دانش آموزان نتوانند از راهبردهای مورد نظر استفاده کنند، معلم با ارائه سرنخ و تشویق های لازم دخالت می کند. فرض تدریس دو جانبه این است که با گفتگوی فعال و سازمان یافته با همسالان، مشارکت دانش آموزان با مشکلات یادگیری افزایش یافت و قدرت درکشان بهبود می یابد (پالینسکار و لنک، ۱۹۹۲). انتظار می رود که پردازش شناختی که بین یادگیرندگان در طی فعالیت های یادگیری مشارکتی اتفاق می افتد در نهایت به پیشرفت تک تک دانش آموزان بیانجامد. این نکته که تحول شناختی فرد از طریق مشارکت در گروه های اجتماعی سازمان می یابد با دیدگاه ویگوتسکی همسو است. همچنین گفته می شود که تدریس دو جانبه برای دانش آموزان با ناتوانی های یادگیری مؤثر است، زیرا آن از خود نظم بخشی و انگیزه حمایت می کند و یادگیری دانش آموز را با یک حس تفنن همراه می سازد (بورکوسکی، ۱۹۹۲). به کارگیری موفق تدریس دو جانبه، مانند همه برنامه های مشارکتی به بازبینی مداوم دقیق گروه یادگیری بستگی دارد. معلم باید توجه نزدیکی به تعاملات دانش آموز و پیشرفت فردی داشته باشد و برای مداخله به هنگام ضرورت آماده باشد. تغییر عضویت گروه و یا فراهم کردن تدریس آشکار یا الگو دهی ممکن است لازم باشد. معلمان باید مطمئن شوند که هدف های تحصیلی خاص کسب شدند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**آموزش مستقیم** آموزش مستقیم بر جزئیات فرایند آموزشی تأکید می کند. طرفداران آموزش مستقیم به جای تأکید بر ویژگی های دانش آموز بر تحلیل نظام مند مفهومی که باید تدریس شود تأکید می کنند. یک مؤلفه مهم آموزش مستقیم، تحلیل تکلیف است. تحلیل تکلیف شامل شکستن مسایل تحصیلی به مؤلفه های آن است، به طوری که معلمان بتوانند هر یک از بخش ها را به طور مجزا تدریس کنند و سپس به دانش آموزان یاد دهند تا بخش های مختلف را به منظور نشان دادن مهارت وسیع تر کنار هم قرار دهند. دامنه ای از برنامه های آموزش مستقیم در حوزه های خواندن، ریاضی و زبان وجود دارد. انگلمن و همکاران، ۱۹۹۱، ۱۹۸۹، ۱۹۸۸) که برای دانش آموز مبتلا به ناتوانی یادگیری نیز مورد استفاده قرار گرفته اند. استفاده از این برنامه ها نه تنها نتایج معناداری را در سطح کوتاه"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "مدت به دنبال داشته است، که همچنین دستاوردهای تحصیلی درازمدت را نیز موجب شده است (به نقل از هالا هان و کافمن، ۲۰۰۹)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**آموزش راهبردهای مطالعه** با توجه به این که دانش آموزان مبتلا به ناتوانی های یادگیری مختلف از راهبردهای مطالعه به خوبی استفاده نمی کنند، باید به آنها راهبردهای شناختی و فراشناختی را به خوبی آموزش داد. راهبردهایی مانند یادداشت برداری، تمرین و تکرار، مدیریت زمان، فعالیت مستقل، سازماندهی مطالب، استفاده از چارت و نمودار، خلاصه کردن مطالب، خط کشیدن زیر مطالب مهم، و بسیاری از راهبردهای دیگر از مواردی هستند که بر اساس تحقیقات مختلف، در بهبود عملکرد تحصیلی دانش آموزان مبتلا به ناتوانی یادگیری مؤثر بودند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**استفاده از حواس مختلف** یکی از روش هایی که می توان به دانش آموزان مبتلا به ناتوانی های مختلف یادگیری کمک کرد، استفاده از تمامی حواس در آموزش آنها است. یکی از روش های چند حسی، روش فرنالد است که در آن از حواس دیداری، شنیداری، حرکتی و لمسی استفاده می گردد. به عنوان مثال کودک برای معلم داستانی را تعریف می کند و معلم برخی کلمات را روی تخته می نویسد. کودک ابتدا کلمه را می بیند (بینایی)، سپس آن را از زبان معلم می شنود (شنوایی)، کودک کلمه را تلفظ می کند (شنوایی)، و در نهایت کودک کلمه را می نویسد (لمسی و حرکتی). یا این که دانش آموز کلمه را به کمک معلم می نویسد (لمسی/حرکتی)، به آنها نگاه می کند (دیداری)، کلمه را با صدای بلند می گوید و می شنود (صوتی/شنیداری)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "روش فرنالد برای آموزش خواندن و نوشتن دانش آموزانی که در یادگیری و به خاطر سپاری کلمه ها مشکل دارند و دامنه واژگان آنها محدود است به کار می رود. این روش به رغم صرف وقت زیاد، بر مهارت های خواندن دانش آموزان با نارسایی های خواندن بسیار مؤثر است (بریس و آیر، ۱۹۷۰؛ تورپی و باردن، ۱۹۸۵؛ به نقل از شکوهی یکتا و پرند، ۱۳۸۵)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "فرنالد توصیه می کند که معلمان روش های زیر را به هنگام آموزش هجی کردن به کار گیرند: ۱. کلمه مورد نظر روی تخته یا کاغذ به صورت مصور و رنگی نوشته شود ۲. معلم کلمه را روشن و دقیق هجی کند و سپس کودک آن را به تقلید از مربی، هجی کند ۳. به کودک فرصت داده شود تا کلمه را مطالعه کند"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "۴. پس از یادگیری، کلمه پاک شود و کودک دوباره با کمک معلم آن را بنویسد. ۵. کاغذ تا گردد و کلمه برای بار دوم نوشته شود. ۶. کلمه به طور مکرر توسط معلم در کلاس و محیط کودک مورد استفاده قرار گیرد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**آموزش توسط همسالان** پژوهش ها نشان دادند که مداخله با واسطه همسالان در تشویق کردن کودکان و تعمیم دادن مهارت ها از مداخله توسط بزرگسالان بسیار موفق تر بوده است. مداخله از طریق همسالان شامل یک یا چند دانش آموز می شود که همسن دانش آموز هستند (حسین خانزاده، ۱۳۸۹). در این تکنیک دانش آموز نقش معلم را برای سایر دانش آموزان ایفا می کند. از این روش می توان برای زمانی که معلم مطالب درسی را توضیح داده است، به عنوان یک فعالیت کمکی به کار برد. در این روش دانش آموزان در گروه های دو نفره به یکدیگر آموزش می دهند. رویکرد آموزش توسط همسالان باعث بهبود روابط اجتماعی و عملکرد تحصیلی دانش آموزان می گردد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "پژوهش ها به طور مداوم نشان دادند که مداخلات با واسطه همسالان فواید تحصیلی و بین فردی و اجتماعی برای طیفی از دانش آموزان شامل دانش آموزان با ناتوانی دارد (یوتلی، مورتویت و گرینوود، ۱۹۹۷؛ ماهبادی، هارپر و مالت، ۲۰۰۱). شواهد حاکی از سودمندی روش مداخلات با واسطه همسالان در تسهیل آموزش تلفیقی دانش آموزان با ناتوانی شامل افزایش عملکرد تحصیلی، بهبود روابط بین فردی و پذیرش تفاوت های فردی است. به طور مشابه استفاده سیستماتیک از روش مداخلات با واسطه همسالان، یک راه حل موثر برای معلمان در جهت تلاش برای غلبه بر چالش های آموزشی دامنه گوناگونی از دانش آموزان در کلاس های درس است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "روش آموزش و مداخلات با واسطه همسالان می تواند با افراد و گروه های کوچک، بر اساس پایه سنی یا بر اساس پایه کلاس به کار رود. معلمان باید مطمئن شوند که آموزش و مداخلات با واسطه همسالان به درستی انجام می شود. همچنین بازبینی مکرر پیشرفت همه دانش آموزان برای تعیین این که آیا همه دانش آموزان به هدف های مورد نظر رسیده اند، ضروری است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "ضروری است (واگن، کلینگنر و برایانت، ۲۰۰۱). به طور خلاصه برنامه ریزی دقیق، آموزش دانش آموز، اجرای درست و بازبینی مکرر پیشرفت دانش آموز برای همکاری های موفق همسالان مؤثر است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "پژوهش ماهبادی، هارپر و مالت (۲۰۰۱) بر روی روش مداخلات با واسطه همسالان نتایجی مانند افزایش پیشرفت دانش آموز، کاهش مسائل مربوط به مدیریت رفتار و افزایش مهارت های اجتماعی را به دنبال داشته است. به طور کلی از فواید این روش می توان به این موارد اشاره کرد: به وجود آوردن محیط های آموزشی که در آن یادگیرنده راحت است افزایش زمان پاسخدهی به تکلیف موردنظر توسط دانش آموز کاهش نسبت معلم - دانش آموز به طوری که دانش آموزان بر یکدیگر تأثیر متقابل می گذارند افزایش فرصت هایی برای دانش آموزان در جهت دریافت پسخوراند و تشویق دانش آموزان روش های مختلف آموزشی تدریس توسط همسالان را ترجیح می دهند به دانش آموزان اجازه می دهد تا به صورت تک به تک به کمک دسترسی داشته باشند این روش فرصت هایی را برای یادگیری و تعامل اجتماعی از طریق روش های حمایتی متقابل فراهم می کند یادگیری را در بافت حمایتی ایجاد می کند و خودکارآمدی را بهبود می بخشد دیگران را در انجام تکالیف کمک می کند مشارکت یادگیرنده را در مواد آموزش و تکالیف افزایش می دهد فرصتی برای تمرین گسترده تر بر روی تکلیف نسبت به حالت عادی به وجود می آورد این روش انعطاف پذیر بوده و از لحاظ هزینه مؤثر بوده و به آسانی اجرا می شود الگو دهی مهارت های تحصیلی و اجتماعی توسط همسالان را ممکن می سازد نگرش ها را نسبت به دانش آموزان با ناتوانی بهبود می بخشد روابط اجتماعی را افزایش می دهد و رفتار منفی را کاهش می دهد مهارت های تحصیلی را تقویت می کند تعامل اجتماعی مثبت را تشویق می کند فرصتی برای تجربه ارزش یادگیری با هم و کمک به دیگران فراهم می کند"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "از نظر زمانی مؤثر است برای همه سطوح توانایی مؤثر است بهبودهای مهمی را از نظر عاطفی و در سطح مهارت ها برای تدریس کننده و فرد تدریس شونده موجب می گردد"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "همچنین بر اساس شواهد پژوهشی مختلف تدریس خصوصی توسط همسالان تأثیرات مثبت معناداری را در زمینه های زیر به دنبال دارد: عملکرد تحصیلی دانش آموزان (گارتنر و لیزکی، ۱۹۹۰)، به خصوص برای یادگیری و کاربرد مهارت های اساسی یا دانش واقعی پذیرش اجتماعی دانش آموزان با ناتوانی و افزایش تعامل در میان دانش آموزان با ناتوانی و همسالان عادی شان (فالتن و همکاران، ۱۹۹۴؛ به نقل از لورمن، دیلر و هاروی، ۲۰۰۵). تحول عاطفی و مهارت های اجتماعی برای تدریس کننده و تدریس شونده (فورمن، ۲۰۰۰). خودکارآمدی و نگرش های نسبت به یادگیری (کوهن، لوتان و کاتانزاریت، ۱۹۹۰). تحول مهارت های شناختی سطح بالاتر (مانند پالینسکار و بران، ۱۹۸۴؛ واگن، کلینگنر و برایانت، ۲۰۰۱)."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "آموزش مبتنی بر کامپیوتر در خواندن، نوشتن، ریاضیات، مهارت های حرفه ای و سایر مهارت های کاربردی هنگامی تأثیر دارد که به عنوان تکمیل کننده آموزش سنتی به کار رود (بندر، ۱۹۹۶). ویژگی های منحصر به فرد آموزش مبتنی بر کامپیوتر مانند زمان انتظار، پس خوراند فوری و ارائه چندرسانه ای آن، این قابلیت را دارد که به غنی شدن آموزش کودکان کمک کند. این واقعیت که دانش آموز به طور فعال در آموزش به کمک کامپیوتر درگیر می شود و تا حدی بر روی موقعیت یادگیری کنترل دارد، انگیزه وی را برای ماندن روی تکلیف افزایش می دهد. دانش آموزان در این روش در مقایسه با سایر روش ها تمایل نیرومندی نشان می دهند که یک تکلیف یادگیری را تکرار نمایند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "آموزش های مختلفی را می توان از طریق کامپیوتر آموزش داد مانند مشق نویسی، بازی های آموزشی، حل مسئله، واژه پردازی و هجی کردن. این روش نه تنها برای دانش آموزان مبتلا به ناتوانی های یادگیری، که برای همه دانش آموزان مفید است. ارائه پسخوراند فوری و آموزش گام به گام دو ویژگی مهم استفاده از این روش است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "هاسل برینگ و گوین به نقل از غباری و حسین خانزاده، ۱۳۸۸)، رایج ترین و مهم ترین کاربردهای آموزش مبتنی بر کامپیوتر را به ترتیب زیر شناسایی کردند:"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "تمرین و تجربه: کامپیوتر برای فراهم کردن دامنه ای از فعالیت های عملی مانند انجام مسائل ریاضی یا خواندن کلمات استفاده می شود. باید به خاطر داشت که فعالیت های تمرین و تجربه، یادگیری های پیشین را نسبت به آموزش مهارت های جدید تقویت می کند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "تدریس همراه با تمرین: در این روش، برخی آموزش های اولیه رخ می دهند و سپس فعالیت های تمرینی به دنبال آن انجام می شود. معلم باید نوع راهبردهای آموزشی که استفاده می کند را ارزیابی کند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "پردازش کلمات: استفاده از برنامه های پردازش کلمات برای تولید فعالیت نوشتاری ممکن است به توسعه مهارت های دانش آموزان در زبان نوشتاری کمک کند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "تفکر و حل مسئله: برخی از برنامه ها و نرم افزارهای کامپیوتری می توانند در توسعه سطوح بالاتر تفکر و مهارت های حل مسئله، تمریناتی را فراهم کنند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "شبیه سازی: شبیه سازی کامپیوتر از موقعیت های زندگی واقعی، به دانش آموزان کمک می کند تا تصمیماتی را بدون پیامدها و خطرات واقعی بگیرند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "کامپیوتر و یا به طور کلی فن آوری همچنین می تواند برای ارائه آموزش و سرنخ های آموزشی به دانش آموزان در حوزه های غیر درسی کمک کند و باعث ایجاد انگیزه برای بسیاری از دانش آموزان گردد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "مهارت های اجتماعی یک دانش آموز پیش بینی کننده سازش یافتگی های بعدی او است. فقدان مهارت های اجتماعی شاید مهم ترین مانع برای یکپارچه سازی و موفقیت کامل در بافت های"}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "مدرسه و جامعه برای دانش آموزان با نیازهای ویژه باشد (ماتسون و همکاران، ۲۰۰۹). برای کسب بهترین پیامدهای ممکن، افراد به مهارت های خاصی در حوزه هایی مانند ریاضیات، سواد آموزی، و زندگی مستقل نیاز دارند. با این حال این مهارت ها پیامدهای موفقیت آمیزی را در صورت فقدان مهارت های اجتماعی مناسب تضمین نمی کنند. مهارت های اجتماعی مناسب نوجوانان را قادر می سازند تا روابط مثبت و قوی با همسالان داشته باشند و در محیط های مختلف مانند مدرسه و محیط کار موفق باشند (حسین خانزاده، ۱۳۸۹ و ۱۳۹۰). بنابراین با توجه به این که اغلب دانش مبتلا به ناتوانی های یادگیری توسط همسالانشان طرد شده و از خودپنداشت پایینی برخوردارند، در شناخت اجتماعی ضعیف هستند، سرنخ های اجتماعی را اشتباه می خوانند و ممکن است احساس ها و هیجان های دیگران را نادرست تفسیر کنند، مشکلاتی در دیدگاه گیری دارند، و برخی از آن ها از نظر اجتماعی طرد می شوند؛ آموزش مهارت های اجتماعی باید به عنوان یکی از محورهای عمده آموزش و توانبخشی آن ها محبوب گردد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "**مداخله اولیه** در سنین پیش دبستانی برای کودکان مبتلا به ناتوانی یادگیری، برنامه ریزی مناسبی وجود ندارد، زیرا شناسایی آن ها در سنین پایین بسیار دشوار است. به عبارت دیگر از آن جایی که کودکان پیش دبستانی به طور معمول درگیر تحصیل نشدند، غیر ممکن است که بتوان به طور دقیق گفت که آن ها از لحاظ تحصیلی عقب هستند و متأسفانه همیشه پیش بینی اختلال ناتوانی یادگیری نسبت به شناسایی این اختلال، کمتر دقیق است. حداقل دو مورد می تواند پیش بینی اختلال ناتوانی یادگیری را در سنین پیش دبستانی دشوار سازد: در بسیاری از موارد اختلال ناتوانی یادگیری، مشکلات کودکان نسبتاً خفیف است. بسیاری از این کودکان تا قبل از مواجه با تکالیف تحصیلی خاص مانند خواندن یا هجی کردن افراد شایسته ای به نظر می رسند. کودکان مبتلا به ناتوانی یادگیری به اندازه سایر کودکان با ناتوانی به آسانی قابل شناسایی نیستند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "اغلب تشخیص تأخیر تحولی و آنچه که صرفاً یک کندی نمویافتگی نام دارد، دشوار است. بسیاری از کودکان عادی در سنین پایین از لحاظ پیشرفت تحولی کند هستند، اما به زودی با همسالان خود برابری می کنند. برخی متخصصان همچنین اعتقاد دارند که بهتر است از برچسب ناتوانی یادگیری برای کودکان پیش دبستانی استفاده نکرد و به جای آن از اصطلاحات تأخیر تحولی و یا در معرض خطر، استفاده کرد. متخصصانی که از برچسب ناتوانی یادگیری برای سنین پیش دبستانی حمایت می کنند بر این عقیده هستند که شناسایی هرچه زودتر مشکلات خاص کودک باعث می گردد که طرح هایی با ماهیت درازمدت برای شرایط این کودکان در نظر گرفت. یکی از راه های پیش بینی اختلال ناتوانی یادگیری در سنین پیش دبستانی، استفاده از مهارت های پیش تحصیلی است. مهارت های پیش تحصیلی، رفتارهایی هستند که برای آموزش رسمی مورد نیاز هستند، مانند شناسایی اعداد، شکل ها، و رنگ ها. یک مهارت پیش تحصیلی خاص برای خواندن، آگاهی واج شناختی است (تورگسن، ۲۰۰۲). آگاهی واج شناختی یعنی توانایی درک این که گفتار می تواند به واحدهایی کوچک تر مانند کلمات، سیلاب ها، و آواها شکسته شود. کودکان عادی معمولاً آگاهی واج شناختی را در سنین پیش دبستانی کسب می کنند. کودکان پیش دبستانی که مشکلاتی را در آگاهی واج شناختی نشان می دهند، به هنگام ورود به مدرسه ابتدایی در معرض خطر ابتلا به ناتوانی های خواندن هستند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "خلاصه فصل ناتوانی یادگیری اصطلاحی است که اولین بار توسط ساموئل کرک (۱۹۶۳) به جای برچسب هایی مانند نارساخوانی، دیرآموز، آسیب جزیی مغز، و ناتوانی ادراکی به کار رفته است. شاخص اصلی در تعریف این اختلال، تفاوت بین پیشرفت تحصیلی و توانایی هوشی در افراد مبتلا به آن است. در افراد مبتلا به ناتوانی یادگیری، بین سطح پیشرفت واقعی و سطح مورد انتظار (که از طریق سن ذهنی فرد مشخص می گردد) تفاوت قابل ملاحظه یا معناداری وجود دارد."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "سال ها فرض بر این بود که ناتوانی یادگیری با آسیب های جزیی در مغز همراه است، اما در حال حاضر اصطلاح نارساکنش وری آسیب یا صدمه مغزی شده است. بدین معنا که مغز افراد مبتلا به ناتوانی یادگیری به خوبی کار نمی کند. علاوه بر این عوامل ژنتیکی، تراتوژن ها و عوامل پزشکی مختلف نیز در ایجاد ناتوانی های یادگیری مؤثرند."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "مهمترین راهبردهای مؤثر در آموزش کودکان مبتلا به ناتوانی های یادگیری عبارتند از: آموزش شناختی (آموزش خود، خودبازبینی، تدریس دوجانبه)، آموزش مستقیم، آموزش راهبردهای مطالعه، استفاده از حواس مختلف، آموزش توسط همسالان، آموزش با استفاده از کامپیوتر. همچنین با توجه به این که بسیاری از دانش آموزان مبتلا به ناتوانی های یادگیری توسط همسالان طرد می شوند و در شناخت اجتماعی ضعف دارند، آموزش مهارت های اجتماعی نیز باید یکی از محورهای مداخله برای آنها به حساب آید. در نهایت این که شناسایی زودهنگام کودکان مبتلا به ناتوانی یادگیری بر اساس ارزیابی مهارت های پیش تحصیلی آنها و ارائه خدمات به هنگام در موفقیت درمان بسیار مؤثر است."}, {"c": "فصل چهارم: ناتوانی‌های یادگیری", "t": "Extracted images (123): `parsed-documents://20260708-121547-742992/فصل_اول_و_چهارم_کتاب_کودکان_و_نوجوانان_با_نیازهای_ویژه_تالیف_خانزاده_compre
