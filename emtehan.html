<style>
  :root{
    --bg:#05010f; --bg2:#0a0420; --neon:#00fff0; --pink:#ff007a; --purple:#8a00ff;

    --border:rgba(0,255,240,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Vazirmatn,Tahoma,sans-serif;min-height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(138,0,255,.35), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(255,0,122,.28), transparent 60%),

      linear-gradient(180deg,#05010f, #0a0420);
    min-height:100vh;
  }
  header{
    padding:22px 18px;text-align:center;border-bottom:1px solid var(--border);
    background:linear-gradient(90deg, rgba(255,0,122,.15), rgba(0,255,240,.15));
    backdrop-filter:blur(6px);
  }
  h1{margin:0;font-size:26px;letter-spacing:1px;
     background:linear-gradient(90deg,var(--neon),var(--pink),var(--yellow));
     -webkit-background-clip:text;background-clip:text;color:transparent;
     text-shadow:0 0 18px rgba(0,255,240,.25)}
  .sub{color:var(--muted);font-size:13px;margin-top:6px}
  main{max-width:900px;margin:0 auto;padding:18px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tab{
    padding:10px 14px;border:1px solid var(--border);border-radius:10px;
    background:rgba(0,255,240,.06);color:var(--text);cursor:pointer;font-family:inherit;font-size:14px;
    transition:.2s;
  }
  .tab:hover{box-shadow:0 0 12px var(--neon)}
  .tab.active{background:linear-gradient(90deg,var(--pink),var(--purple));border-color:var(--pink);box-shadow:0 0 14px var(--pink)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 0 30px rgba(138,0,255,.15) inset}
  label{display:block;margin-bottom:8px;color:var(--neon);font-size:13px}
  textarea,input,select{width:100%;background:#08031a;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px;font-family:inherit;font-size:15px;outline:none}
  textarea:focus,input:focus{border-color:var(--pink);box-shadow:0 0 10px var(--pink)}
  button.primary{
    display:inline-block;padding:11px 18px;border-radius:10px;border:none;cursor:pointer;
    background:linear-gradient(90deg,var(--neon),var(--pink));color:#05010f;font-weight:700;font-family:inherit;font-size:15px;
    box-shadow:0 0 14px rgba(0,255,240,.5);transition:.2s
  }
  button.primary:hover{transform:translateY(-1px);box-shadow:0 0 22px var(--pink)}
  .answer{white-space:pre-wrap;line-height:2;font-size:15px}
  .hit{background:linear-gradient(90deg, rgba(248,255,0,.25), rgba(255,0,122,.25));padding:2px 4px;border-radius:4px}
  .meta{color:var(--muted);font-size:12px;margin-bottom:8px}
  .opt{display:block;padding:10px;margin:6px 0;border:1px solid var(--border);border-radius:10px;cursor:pointer;background:#08031a}
  .opt:hover{border-color:var(--pink)}
  .opt.correct{background:rgba(0,255,120,.15);border-color:#00ff88}
  .opt.wrong{background:rgba(255,0,80,.15);border-color:#ff0055}
  .chapter-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .chip{padding:6px 10px;border:1px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer;color:var(--muted)}
  .chip.on{color:#05010f;background:var(--neon);border-color:var(--neon)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}
  .grid{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:640px){.grid{grid-template-columns:1fr 1fr}}
</style>

      <select id="chSel"></select>

    </div>
    <div class="card"><div id="chText" class="answer" style="max-height:60vh;overflow:auto"></div></div>

  <footer>ساخته‌شده برای مطالعه شخصی • تمام محتوا از متن جزوه استخراج شده است</footer>

ن و گفتار را به طور کامل شرح دهد\n۳ راهبردهای سنجش اختلال‌های ارتباطی را توضیح دهد\nراهبردهای آموزشی مختلف جهت بهبود اختلال‌های ارتباطی را شرح دهد\n6 نقش خانواده را در پیشگیری از اختلال‌های ارتباطی بیان کند\n۳\n\nبرقراری ارتباط یک بخش طبیعی زندگی روزمره ما است و تنها شامل صحبت کردن نمی‌گردد.\n۱ ارتباط درک گفتار و ایما و اشاره» خواندن او نوشتن را نیز شامل می‌شود. برای بُرخی افراده\n۱ برقراری ارتباط بدون تلاش و همراه با احساس خوشایند نیست. مشاهده اکتساب گفتار و زبان\n۱ در کزدکان, والاین زا شادمّان و ناتوانی کودک در تحول زیان و گفتارء آنها را مستأصل\n. می‌کند. همه اختلال‌های ارتباطی شامل اختلال های گفتار\" نمی‌گردد, همه اختلال‌های گفتاری\nکه در تعامل اجتماعی معلولیت ایجاد می‌کنند؛ شامل لکنت\" نمی‌گردد و در نهایت این که\nکت رایج‌تزین اختلالٌ گفتار نیست. بدون شناخت تحول بهنجار زبان, درک اختلال‌های\nارتباطی دشوار است. بنابراین قبل از بحث اختلال‌های زبان و گفتار» تحول بهنجار زبان را به\nطور مختصر شُرح می دهیم. ۱ :\nتحول زبان ۱ , :\nنسلون\" (۱۹۹۸) شش نظریه زبان را مطرح کرد که در زمان‌های مختلف درباره ارتباط انسانی\nِ ۱. یادگیری زبان به تحول مغز و کنش‌وری صحیح مغز وابسته است. اختلال‌های زبان بعشی\nزمان‌ها نتیجه نارساکنش‌وری مغز استء و روش‌های جبران نارساکنش‌وری بعضی اوقات\nی تواند آموزش داده شود. تأکید بر روی نمویافتگی زیست‌شناختی است.\n5660 .1\n7۲ ۷۷۱۱۱۱ 850360 2,8\n\n۸ روان شناسی و آموزش کودکان و نوجوانان\nسش توح و\n۲ پادگیری زبان تحت تأثیر پیامدهای رفتار زبانی است. اختلال‌های زبان می تواند نتیجه\nیادگیری نامناسب باشد و پیامدها می‌تواند برخی اوقات برای تصحیح اختلال زبانی به کار\nگرفته شود. تأکید بر روی روانشناسی رفتاری است.\n۳ زبان می‌تواند به عنوان دروندادها و بروندادهای مرتبط با پردازش اطلاعات مورد تحلیل\nقرار گیرد. پردازش ناقص ممکن است علت برخی اختلال‌های زبان باشد و مهارت‌های\nپردازش موثر بعضی وفت‌ها می‌تواند آموخته شود. تأکید روی پردازش اطلاعات است.\n4 زبان حاصل یک فرایند زیست‌شناختی است که قواعد حاکم بر ضرم؛ محضواء و استفاده از\nزبان را دیکته می‌کند. اختلال های زبان نتیجه شکست در کسب يا به کار بردن قواعد حاکم بر\nزبان است, و این اختلال‌ها با کمک به فرد جهت یادگیری این قواعد, قابل حل است. تاکید بر\nروی دیدگاه زبان شناسی ذاتی است.\n۵. زبان یکی از مهارت‌های شناختی منعدد است. اختلال های زبان مشکلات اساسی در تفکر\nو پادگیری را منعکس می‌کند و بعضی وقت‌ها این اختلال‌ها می‌توانشد به طور مژثری با\nآموزش مهارت‌های شناختی خاص مورد توجه فرار گیرد. تأکید بر روی تحول شناختی است.\nزبان از نیاز به برقراری ارتباط در تعاملات اجتماعی برمی‌خیزد. اختلال‌های زبان شامل\nدرهم شکستگی در توانایی ارتباط موثر با محیط است و محیط طبیعی بعضی وقت‌ها می‌تواند\nبرای تدریس و حمایت مثرتر تعامل, سازماندهی شود. تأکید بر روی تعامل اجتماعی است.\nهمه اين نظریه‌ها عناصر حقیقت علمی را در بر دارند اما هیچ کدام توانابی تبیین تحول\nزبان و اختلال‌های زبان تحول و اختلال‌های زبان به طور کامل را ندارند. هر شش نظریه فواید\nو معایبی برای تشخیص اختلال‌های زبان و نجویز مداخلات مرثر دارا هستند. پیشرفت در\nفن‌آوری تصویربرداری از نورون‌ها منجر به درک بهتر پایههای زیست‌شناختی زبان شده است\n(فونداس ,۲۰۰۱ پا این حال نظریه تعامل اجتماعی پیشترین استلزام های مستقیم را بسرای\nآسیي‌شناسان گفتار و زبان به دنبال دارده زیرا بر جگونگی پرورش مهارت‌های ارتباطی از\nطریق تعامل بزرگسال - کودک تاکید می‌کند (نز,۲۰۰4).\nدر سال اول و اوابل سال دوم زندگی باید از رفتارهای پیش زبانشناختی \" سخن گفت و\nتمی‌توان از زبان به معنای دقی کلمه استفاده نمود. بیشتر نوزادان در دو تا سه ماهگی شروع به غان أ\nاک و کیک که ۲۱ وا کت\n\nفصل هفتم: اختلال‌های ارتباطی ۹\n۳ هچ>چتتتت ۳\nو غون می‌کنند و در ۵ الی 1 ماهگی صداهایی تولید می‌شود که شبیه کلمات است و با تقویت\nوالاین؛ نکرار می‌گردند. سپس مهار تلفظ در تولید نخستین کلمات و ظرفیت بازپدیدآوری\nپلافاصله پا نقریبی کلماتی که بزرگسال می‌گوید صورت می‌گیرد. بیشتر کودکان تا یک سالگی\nاولین کلمات را بیان می‌کنند و در حدود ۱۸ ماهگی بیشتر آنها می‌توانشد جمله‌های دو کلمه‌ای\nبسازند, افزایش کلمات تولیدی و دریافتی بین بروز نخستین کلمات که تا سن یک سالگی اتفاق\nمی‌افند و پایان سال دوم زندگی به نسبت کند است » ولی پس از آن با افزایش سریع مواجه هستیم\nکه طی آَنْ جمله‌های دوکلمه‌ای يا بیشتر بیان می‌گردند. به طور کلی تحول بهنجار زبان از سئین یک\nتاهفت سالگی در جدول ۷-۱ به صورت خلاصه ارائه شده است.\nجدول ۷-۱ : تحول بهنجار زبان از یک تا هفت سالگی\nشناختن نام خوده انجام دستورات ساده» بیان یک یا دو کلمه درهم‌آمیزی واژه‌ها و\nصوت‌های بی‌معناء به کار بردن ادا و اطوارهای ارتباطی مانند نشان دادن و اشاره\nسالگی کردن\nبه کار پردن ۲۰۰ تا ۳۶۰ کلمه, بیان کردن نام اشیای رایج» بیان کردن عبارت‌های\nدوسالگی | دو واژه‌ای یا طولانی» یادگیری چند حرف اضافه» ضمیر» فعل و علاسمت جمع\n(البته هميشه آنها را درست به کار نمی برد)\nسه آبه کار بردن ۹۰۰ تا ۱۰۰۰ کلمه, ساختن جمله های ۳ تا ۶ کلمه‌ای» تکرار جمله\nهای ۵ تا ۷ سیلابی» مفهوم بودن تکلم کودک برای اعضای خانواده\nبه کار بردن ۱۵۰۰ تا ۱3۰۰ واژه» شرح دادن داستان‌ها و رویداهای گذشته نزدیک.\nغریبه\nپنج ‏ |به کار بردن ۲۱۰۰ تا ۲۳۰۰ واژه» بیان نمودن احساس‌های خودء درک بیشتر حرف\nمرحله‌ای\nسا\n03۳۱۹6۵۲ ۷۷۱۳ 5030۳۵0\n\nتعریف\nزبان و گفتاره ابزارهای مورد استفاده برای برفراری ارتبساط هستند. برشراری ارتباط فرابشد\nمشارکت دادن اطلاعات بین دو پا چند تفر اسست. گفتار به معنای تولید شفاهی کلمات در یک\nزبان معین است و تنها زمانی که اصوات بتوانند منجر به تولید کلسات معناداری گردند. به\nگفنار نبدبل می شوند. چهار فرایند در تولید گفتار نقش دارند:\n۱, تفس که نیروی لازم را برای گفتار ب وجود می آورد.\n۲ صوتی‌ساژی \" که تولید صوت بر اساس لرزش تارهای صوتی است.\n۳ طین که به کیفیت صدا اشاره دارد و ویژگی منحصر به فرد صدای گوینده را مشخص می سازد\nو لفط که به حرکت دهان و زبان و تبدیل صوت به آواهای تشکیل دهنده گفتار اشاره دارد.\n,عیلال در هر یک از چهار فرایند بالا به اختلال گفتاز می انجامد. ولی الزاماً یادگیری زبان\nپا خواندن و نوشتن را مختل نمی سازد,\nاعتلال ارتباطی ممکن است زبان یا گفتار یا هر دو را شامل شود و به کنش‌های ارتباطی\n(مانند تفاضاکردن» طرد کردن» بح کردن و استدلال) آسیب برساند. ارتباط مستلزم\nرمزگذاری\" (ارسال پیام ها به صورت قابل فهم) و رمزگشایی! (دریافت و فهم پیام ها) است.\nدر برقراری ارتباط همواره یک فرستنده و یک گیرنده پیام مشارکت دارند, اما زبان همیشه\nدرگیر نیست. برای مثال حیوانات, از طریق حرکت‌ها و صداها ارتباط برقرار می‌کنند.ء اما\nارتباطشان به عنوان زبان حقبقی نیست (جاستیک,۲۰۰۹). زبان و گفتار ابزارهای مهم برای\nارتباط انسان هستند.\nاما زبان ارتباط افکار (فرستادن و دریافت آنها) از طریق سیستم اختیاری نمادهاست و بر\nاساس قواعد معینی جهت انتقال معنا (مفهوم) به کار می رود ؛ کنش پیچیده‌ای که بیان و ادراک\nحالت‌های عاطفی؛ مفاهیم و افکار را توسط نشانه‌های صوتی يا تصویری میسر می‌سازد. رمزگذاری\nبا لرسال پیا‌ها به بان بیانی\"؛ و رمزگشایی با فهم پام بد زیان دریافتی\" اشاره دارد. وقتی که افراد\n0\n]1۰\nنزن رم\nری\n۷۱۲ 502060\n\n۱\nفصل هفتم: اختلال‌های ارتباطی روا\nسا\nپه زیان فکر می‌کنند آنها معمولا به زیان شفاهی فکر می کنند. گفتار - فعالیت ماهیچه‌ای/ عصبی\nشکل دادن و زنجیره‌سازی صداهای زبان شفاهی - رایج‌ترین سیستم نمادی است که در ارتباط بین\nآتسان‌ها استفاده می‌شود. با این حال بعضی زبان هاء مبتنی بر گفتار نیست. برای شال زبان اشاره\nآمریکایی ! صداهای گفتار را درگیر نمی‌کند و یک زبان دستی (راهنما) است که توسط کسانی که\nنمی‌توانند گفتار را بشنوند؛ استفاده می‌شود.\nاُ انجمن زبان - گفتار - شنیدن آمریکا\" (۲۰۰۱) تعریف اختلال های ارتباطی را شامل\nاختلال‌های گفتار و اختلال‌های زبان تعریف کرد. اختلال‌های گفتارء اختلال در تولید و استفاده\nاز زبان شفاهی هستند و شامل ناتوانی‌هایی در ایجاد صداهای گفتار تولید گفتار با جریان\nنرمال و تولید صدا است. یک اختلال ارتباطی ممکن است در فرایندهای شنیدن, زبان يا گفتار\nنمایان شود. برای این که فرد مبتلا به اختلال ارتباطی واجد شرایط دریافنت خدمات ویژه\nگردد؛ باید اختلال ارتباطی او بر یادگیری او تأثیر گذاشته باشد.\nاختلال‌های زبان شامل مشکلات در دریافت و بیان است. زبان وسط برخی قواعد\nمدیریت می‌شود. مشکلات ممکن است شامل شکل؛ محتواء یا کاربرد آن گردد. واج شناس یآ\nاُ به قواعد حاکم بر صداهای گفتار, صداهای خاص و اين که چطور آنها برای ایجاد کلسات\n۱ یامعنا مرتب شوند اشاره دارد. واج‌ها به تنهایی واجد معنا یستند. ریخت‌شناسی! به قواعد\nحاکم بر تغییرات سازمان درونی کلمات مانند اضافه کردن پسوند و قواعد دستوری دیگر برای\nساخت جمع‌های مناسب, زمان فعل, و غیره اشاره دارد. نحو به قواعد سازماندمی جمله‌ها :\nیعنی نظامی از قواعد که ترتیب و ترکیب کلمات را برای ساخت عبارت‌ها و جمله‌ها تعیین\nمی‌کند اشاره دارد. معناشناسی! به قواعد پیوند دادن معانی و مفاهیم به کلمات اشاره دارد.\nکاریردشناسی به قواعد استفاده از ز  مداخله هرگز ساده نیستند و هميشه غیر متعارف هستند,(گیلام و\nهانمن ۲۰۰۱ اونز۲۰۰4۶). یک طرح مداخله مبتنی بر سنجش باید به محنوا, شکل, زمیده\nاجتماعی, و استفاده از زبان توجه کند و در آن موارد زیر مورد توجه قرار گیرد:\n- کودک درباره چه چیزی صحبت می کند و باید پیاموزد تا درباره چه چیزی صحبت کند؟\n- چطور کودک درباره امور مختلف صحبت می‌کند و چطور می‌تواند صحبت درباره اور\nمختلف را یاد بگیرد نا قابل فهم باشد\n-کنش‌های کودک در بافت اجتماعی زبان‌شناسی چگونه است؟\n- چگونه کودک از زبان استفاده می‌کند و جگونه زبان کونک می‌نواند برای هدف‌های برقراری\nارتباط و اجتماعی موثر استفاده شرد.\nسازماندهی توالی آ موزش بر اساس داده‌های سنجش, ممکن است بر پایه توالی تحول\nبهنجار کودک باشد. با این حال» توالی‌های دیگر آسوزش ممکین است مْئرتر باشد زرا :\nکودکان مبتلا به اختلال های زبان به طور آشکار به روش بهنجار اد نگرفته‌اند و تخقیقات\nی\n\n5 مفتم؛ اختلال‌های ارتباطی ۲۹\nشش\nزان داده اسْت که توالی‌های متفاوت یادگیری ممکن است موثرتر باشد. به طور آشکار\nرراغله مر زبان باید در محیط طبیعی کودک صورت گیرد و والدین و معلمان کلاس را نیز\nثامل می‌شود نه فقط سیب شناسان گفتار - زبان (جاستیک,۲۰۰۹؛ اونز»۲۰۰۸).\nملاحظات آموزشی\nکردکان با همه انواع ناتوانی‌ها به طور فزاینده در کلاس‌های درس آموزش عمومی جای داده\nمی‌شوند. این نکته به این معنی است که همه معلمان پاید آگاه باشند ,که چگونه می‌توانشد به\nمشکلات زیانی آنها در کلاس درس توجه کنند (اونز۲۰۰۶). کمک به غلبه یافتن کودکان مبتلا\nٍ به اختلال‌های گفتار و زبان مسئولیت هر متخصص نیست. ولی فرایشد ثبناسایی» مسئولیت\nا شترک معلم کلاس, آسیب‌شناس گفتار -زبان و والدین است. معلم به هنگام صحبت کردن\nٍ کودکان با گوش دادن با دقت و همدلانه , مدل‌های مناسب گفتار و زبان را برای کودکان با\nتفلید کردن, و تشویق کودکان برای استفاده از مهارت‌های ارتباطی‌شان به طور مناسب فراهم\nمی کند, معلم کلاس می‌تواند نه تنها به بهبود گفتار و زبان کمک کند. که همچنین در\nیشگیری از تحول برخی اختلال ها مور باشد.\nتسهیل استفاده اجتماعی از زبان\nنقش اولیه معلم کلاس» تسهیل استفاده اجتماعی از زبان است. اختلال‌های زبان و گفتار یک\nدانش آموز لزوما به ان معنی نیست که معلم یا متخصص بالینی باید برای تدریس دانش آموز\nدرباره فرم» ساختارء یا محتوای زبان سخت تلاش کنند. در عوض زبان باید به عنوان یک\nروش حل مسایل با ایجاد درک مناسبی از خود و معنا بخشیدن به آنچه که دیگران می‌گویند\nتدریس شود.\nکلاس درس امکانات زیادی را برای یادگیری زبان فراهم می‌سازد. آَنْ؛ جایی است که\nفرصت‌های زیادی را برای دانش‌آموزان و معلمان فراهم می‌سازد تا زبان را به کار گیرند و در\nروابط سازنده, پسخوراند دریافت کنند. زبان شیوه‌ای است که از طریق آن بسیاری از تکالیف\nیادگیری اجتماعی و تحصیلی صورت می‌گیرد. با این حال زبان مدرسه هم در کلاس‌های\nدرس و هم در متن‌های کتاب اغلب برای دانش آموزان و معلمان مشکل است.\nرد 011 رز\n\n۳ روان شناسی و آموزش کودکان و نوجوانان\nسس و\nزبان مدرسه نسبت به زبان بسیاری از کودکان در خانه و با هم بازی ها رسمی‌تر است. زبان\nمدرسه یک گفتگوی سازمان‌یاننه است که در آن شنونده و گوینده با خواننده و نویسنده باید پیه\nطور آشکار و دقبق اطلاعات ضروری را به سرغت و سهولت انتقال داده و تفسیر نمایشد. بدون\nمهارت در استفاده از زبان مدرسه, کودک بی‌تردید از لحاظ تحصیلی شکست می‌شورد و از نظر\nاجتماعی ناموفی خوامد بود. بنابراین در مدرسه و کلاس درس معلمان باید به متخصصان\nزبان - گفتار در سنجش نانوانی‌های زبانی دانش آموز و در ارائه مداخلات کمک کنند. ۰\nراهبردهای پرسش - پاسخ\nیک نمونه از نقش زبان معلم در گفتگوی کلاس درس, پرسیدن سرال است. معلمان اغلب در\nکلاس درس از دانش آموزان سوال‌هایی در حوزه‌هایی که ضعف دارند می‌پرسند و بنابراین\nاستفاده از زبان بیانی دانش آموز را کاهش می‌دهند. به عنوان مثال معلم ممکن است از یک\nدانش آموز پیش‌دیستانی که رنگ‌ها را نمی‌شناسد, بخواهد که رنگ‌ها را شناسایی کند یا یک\nمعلم ممکن است از سوال‌های بله/ خیرء زیاد استفاده کند. این گونه پرسش‌هاء امکان گفتگو را\nدر دانش‌آموزان کاهش می دهد. متأسفانه معلمان ممکن است ندانند که چگونه باید سوال‌های\nخود را در تدریس مزثر مفاهیم اصلاح کنند و بنابراین سوال‌های آنها صرفاً به سردرگمی\nکودکان بیفزاید.\nبنابراین معلم باید در رامبردهای پرسشگری از دانش آموز تجدید نظر کند. هنگامی که\nدانش آموز در پاسخدهی به سوال سطح بالا که از سطح اطلاعصات و مهارت او بالاتر است\nشکست می‌خورد. معلم پاید مسئله را در سطح ساده‌تر مطرح کند و سپس گام به گام به سمت\nتکلیف نهایی پیش برود. برخی اوقات معلمان ممکن است منظورشان را در پرسشگری از\nدانش‌آموزان به طور آشکار بیان نکنند و موضرع سوال‌های خود را به طور آشکار حذف ۱\nمی‌کنند. برای مثال یک معلم ممکن است پپرسد \"چه چیزی را فصد داری به من بگویید \". در ۱\nنتیجه دانش‌آموز دچار سردرگمی می‌شود. معلمان باید در چنین شرایطی به طور آشکار مسئله\nرا بیان نمایند. معلمان همچنین باید به پاسخ‌های دانش‌آموزان به سوال‌هاء پسخوراند واضح\nارائه کنند. در اغلب اوقات معلمان به علت ترس از نشان دادن عدم پذیرش به طور آشکار به\nدانش‌آموز نمی‌گویند که پاسخشان اشتباه است. عدم ارائه پسخوراند صحیح و آشکار\nدانش‌آموزان را از یادگیری مفاهیم موجود در آموزش باز می‌دارد. بنابراین به طور کلی نقش 1\n\n1\nرین هفتم؛ اختلال‌های ارتباطی ۳\nشش\nبل تنها آموزش دانش‌آموزان درباره زبان نیست, که همچنین باید نحوه استفاده از زبان را به\nدقش آموز یاد پدهند, به طور خاص معلم باید به دانش‌آموزان کمک کند تا چگونگی استفاده\nاز زبان را در بافت کلاس درس بیاموزند. همچنین استفاده معلم از زبان یک عامل اصلی در\n| کیک به دانش آموزان در جهت یادگیری مر است؛ به خصوص اگر دانش‌آموزان دارای\n۱ اعتلال‌های زبانی باشند,\nمعلمان باید به اد داشته باشند که اختلال‌های زبان می‌تواند با تحول کودک تغییر کند.\nِ گر کودکی دارای زبان بیانی و دریافتی بهنجار در یک سن خاص استء بدین معنا نیست که\nدر سنین بعدی از وضعیت بهنجار برخوردار خواهد بود. مداخله‌های زبانی می‌تواند مایت و\nروند توانایی‌های زبانی کودک را تغییر دهد, اما حتی از طریت آن یک کودک ممکن است\nٍ دارای مشکلات زبانی مستمر باشد و توانایی‌های زبانی بهنجاری را نشان ندهد.\nتدریس زبان نوشتاری\nزبان نوشتاری یک مشکل خاص برای بسیاری از دانش آموزان مبتلا به اختلال های زبان و\nگفتار است. با پیشرفت دانش‌آموزان در پایه‌های بالاتر» زبان نوشتاری اهمیت فزاینده‌ای\nمی‌یاید: از دانش آموزان انتظار می‌رود متن‌های پیچیده و دشوار را بخوانند و معنای آن را\nدرک کنند. علاوه بر این از آنها انتظار می‌رود تا خود را به طور آشکار به صورت نوشتاری\nبیان کنند. تعامل معلمان با دانش‌آموزان درباره نوشتن در غلبه بر ناتوانی‌های زبان\nنوشتاری بسیار مهم است. در این ارتباط معلمان باید سوال‌هایی را از دانش‌آموزان درباره\nنحره نوشتن قابل فهم برای خوانندگان بپرسند (گراهام! و همکاران»۱۹۹۸). علاوه بر این\nراهبردهایی که معلمان برای کمک به دانش‌آموزان در جهت تسلط بر نظام الفبایی استفاده\nدر نهایت اين که برنامه مداخله‌ای مربوط به اختلال‌های زبانی» بسیاری از رامبردهای\nمورد استفاده پرای درمان ناتوانی های یادگیری مانند آموزش فراشناختی» آموزش راهبردها و\nبسیاری از شیوه‌های دیگری که در فصل ناتوانی‌های یادگیری شرح داده شدند را شامل\nمی‌گردد (هالاهان و همکاران۲۰۰۹۰).\n6۵ ۷۷۱۱ 8026۵\n\n۳۲ روان شناسی و آموزش کودکان و نوجوانان\nی ی ای\nمداخله اولیه\nمداخله اولیه در بهبود اختلال‌های زبان و گفتار کودک بسیار مهم اس اگر شروع مداخله در\nسنین بالاتر صورت گیرد, شانس اکتساب مهارت‌های زبانی مور کمتر خواهد بود. مطالصات\nدرباره تحول اولیه کودک نشان داده است که سال‌های اول زندگی یک دوره بسیار مهم برای\nیادگیری زبان است. زبان کودک و تحول اجتماعی او به ماهیت و کمیت تعامل زبانی او با\nوالاین و سایر مراقبین بستگی دارد. در خانواده‌هایی که تعامل زبانی مطلوبی بین والدین و\nکودکان صورت می‌گیرد و رفتار کودکان مورد تأیید و تشویق قرار می‌گیرد. تحول زبانی در\nکردکان با سهولت صورت می‌گیرد و این کودکان در مدرسه نیز تعاملات زبانی خوبی با\nهمسالان و معلمان خواهند داشت. بنابراین کلید پیشگیری از بسیاری از ناتوانی‌های مرتبط با\nتحول زبان, کمک به والاین در برقراری ارتباط مناسب با کودکان در دوران نوزادی و طفولیت\nاست. با این حال برای بسیاری از کودکان, مداخلات در پایه‌های پیش‌دبستانی و ابشدایی\nضروری است. اين کودکان ممکن است دارای ناتوانی‌های چندگانه‌ای باشند که برخی اوقات\nدر حد شدید با عمیق است.\nتحول زبان به طور نزدیکی با تحول شناختی گره خورده است. بنابراین نارسایی در\nتوانمندی هوشی پایین احتمالا با عقب افتادگی در تحول زبان همراه است. برعکس فقدان زبان\nنیز می‌تواند بر تحول شناختی تأثیر منفی بگذارد. از آن جایی که گفتار به تحول حرکتی و\nعصب‌شناختی وابسته است, هرگونه مشکل عصب‌شناختی یا حرکتی ممکن است بر توانایی\nصحبت کردن تأثیر بگذارد. تحول اجتماعی بهنجار در سال‌های پیش‌دبستانی همچنین به وجود\nزبان وابسته است. بنابراین یک کودک مبتلا به نارسایی زبان از لحاظ یادگیری اجتماعی! در\nوضعیت نامساعدی قرار دارد. در ننیجه زبان کودک پیش‌دبستانی به ندرت تنها موضوع مورد\nمداخله است. :\n۱\nکودکان مبتلا به اختلاا,های زبان ممکن است از مراحل تحولی مشابهی همانند ببشتر ِ\nتادکان برخوردار باشند. اما هر مهارت را در سنین بالاتری کسب نمایند. بسیاری از کودکان\nبا تأخیر در تحول زبان, شکاف تحولی را تجربه می‌کنشد که پشت سر نخواهند گذاشت\n(اونز,؟۲۰۰). نها به طور مکرر برچسب های کم‌توان ذهنی یا دیگر کم‌توانی‌هسای تحولی آ را\nی\n۳ ۱ ۲ 00 اک کل\n\nرزیل هنن اختلال‌های ارتباطی بدی\nشش\nزربه می‌کنند. برخی اوقات این کودکان, به محیط‌های محروم از تجربه‌های مخلف مربوط\nستند و از تحریکات زبانی مناسبی برخوردار نبودند يا این که به شدت مورد سوء استفاده یا\nفلت فرار گرفتند, با این حال صرف نظر از دلایل تخیر زبانی کودک » درک ماهیت تأخیر و\nرواغله‌های لازم جهت یادگیری استفاده از زبان به طور مور بسیار مهم است.\nبرخی از کودکان تا سه سالگی از زبان به طور ارتجالی! استفاده نمی‌کنشد. آنها ممکن\nاست صداهایی را تولید کنند, اما از آنها به روش‌هایی برای برقراری ارتباط استفاده می‌کنند که\nمشخصه برقراری ارتباط در نوزادان قبل از یادگیری گفتار است. به عبارت دیگر آنها از ارتباط\nپش‌زباتی استفاده می‌کنند. برای مثال آنها ممکن است از ایما و اشاره‌ها و صداها برای\nخواستن اشیاء یا فعالیت‌هایی از سوی دیگرا ان» درخواست‌های اجتماعی یا سلام و احوال\nپرسی استفاده کنند. به هنگام سنجش و برنامه‌ریزی مداخله برای کودکان مبتلا به تأخبر زبان؛\nدر نظر گرفتن رفتارهای زبانی و غیرزبانی که آنها تقلید می‌کنند؛ این که چه چیزهایی را درک ۰\nمی‌کنند, چه مهارت‌های ارتباطی را به طور خود انگیخته استفاده می‌کنند. و ارتباط چه نقشی\nدر زندگی آنها بازی می‌کند؛ دارای اهمیت است. همچنین مداخله باید در بافت‌هایی که زیان\nبرای تعامل اجتماعی بهنجار مورد استفاده قرار می‌گیرد. صورت گیرد. برای مشال والدین با\nمعلمان ممکن است از رویکرد تدریس محیطی\" استفاده کشد. این رویکرد مداخله زبانی\nطبیعت‌گرایانه‌ای است که برای تدریس مهارت‌های کنشی زبان طراحی شده است (کایسر\" و\nهمکاران,۱۹۹۵). بر اساس این رویکرد؛ تدریس پر اساس علایی کودک صورت می‌گیرد.\nهنگامی که کودک عمل, شی يا فعالیتی را از بزرگسال تقاضا می‌کندء بزرگسال زبان کودک را\nتشویق می‌کند و دسترسی کودک به تقاضای مورد نظرش را به تلاش برای برقراری ارتباط\nوابسته می‌سازد. تدریس محیطی یک رویکرد طبیعت‌گراپانه است که مداخله‌هایی را طراحی\nمی‌کند که شامل گفتگوهای عادی بین والاین و کودکان است. ارتباط پیش‌زبانی ممکن است\nنشانگر خوبی از توانایی بسدی کودک برای استفاده از زبان باشد (کالاندرلا و\nویلکاکس۰ ۰). کارآمد بودن این رویکرد تدریس ممکن است به میزان پاسخگو بودن مادر\n0 ۷۷۱۱ 58030۳۵0 ی\n\n۳ روان شناسی و آموزش کودکان و نوجوانان\nورد دیدرت ید دی دورد مودک\nبه شیوه‌های ارتباط پیش‌زبانی کودک (حداقل در برخی محیطها) وابسته باشد (یادر و\nوازن۲۰۰۱؛ به نقل از هالامان و کافمن,۲۰۰۹).\nنقش خانواده\nتحول زبان به تعاملات اولیه مادر- کودگ وابسته است. نگرانی در مورد تحول کودک از لحاظ\nتوانایی ارتباطی نمی‌تواند از نگرانی درمورد سایر حوزه‌های تحولی کودک مجزا باشد. بنابراین\nآسیب‌شناسان گفتار- زبان بخش ضروری تیم بین‌رشته‌ای هستند که کودک با ناتوانی را ارزیابی\nمی‌کنند و در طراحی طرح خدمات خانوادگی فردی شده» مشارکت دارند. پرنامه‌های\nمداخله‌ای اولیه در حقیقت شامل گسترش نقش والدین است. این برنامه‌سا شامل بازی‌های\nساده با کودک به همراه کلامی‌سازی است. مادر باید با کودک درباره اشیاء و فعالیت‌ها صحبت\nکند. باید از اشیاء, فعالیت‌ها و کلمات برای لفاظی‌ها و یا آواگری‌های کزدک استفاده نمود که\nاحتمال یادگیری زبان کاربردی در کودک افزایش یابد (فی, کاتز و لاریو,۱۹۹۵).\nمتخصصان دوران اولیه کودک بر اين باورند که مداخله پیش‌زبانی برای تحول زبان مهم\nاست. پایه‌های زیان در ماءهای اولیه زندگی در طی گفتگوهای غیرکلامی نوزاد با مادر و\nمراقب شکل می‌گیرد (نلسون»۱۹۹۸). بنابراین ارزیابی توانایی‌ها و نیازهای خانواده و آموزش\nوالاین در جهت آموزش و مدیریت کودک مهم است. در واقع والدین می‌توانشد با کسک\nمتخصصان نقش مهمی را در تحول زبان کودک ایفا کنند. ۱\nمداخله در دوران کودکی اولیه بر پایه سنجش توانایی‌های کودک در ارتباط با محتواء\nفرم» و به طور خاص استفاده از زبان در تعاملات اجتماعی باشد. سنجش و مداخله برای\nکودکی که هنوز زبان را یاد نگرفته است. بر تقلید بازی‌های تشریفانی, بازی با اشیاء» و استفاده\nکنشی از اشیاء استوار است. هنگامی که استفاده کودک از زان مورد توجه قرار می‌گیرد؛\nاولیه‌ترین هدف‌ها باید شامل این موارد باشد:\n- توجه کودک به بزرگسال در طی تعامل\n-رعایت نوبت در بازی‌ها و فعالیت‌های لذت بخش\n- دنبال کردن نگاه یک بزرگسال و هدایت رفتار توسط بزرگسال, و\n\nپمل منتم اغتلال‌های ارتباطی ۳۵\nگت\n\nِ -لتمرار در اصلاح ایما و اشاره هاء صداها یا کلماتی که بزرگسال به آنها پاسخ نمی دهد.\n\n۱ در سئین پیش‌دبستانی آموزش مهارت‌های گفتگو تمرکز اصلی مداخله زبانی است. به\nطور خاص تأکید بر آموزش کودک جهت استفاده از گفتگوهای ضروری برای موفقیت در\nملرسه است. روندهای کنونی در مداخله‌های زبان و گفتار مبتنی بر محیط‌های معمول کودکان\nاست. بنابراین معلمان و سیب شناسان گفتار -زبان باید روابط کاری نزدیکی را داشته باشند.\nمتخصص زبان و گفتار ممکن است به طور مستفیم با کودکان در کلاس درس کار کند و به\nمعلم درباره مداخله‌ای که می‌تواند به عنوان بخشی از فعالیت عادی کلاس درس انجام دمدء\nپیشتهادهایی را ارائه کند (هالاهان و کافمن»۲۰۰۹).\nخلاصه فصل\nویات‌ایه عنوان یکی از کنش‌های اصلی انسان و بهآغنوان ابزار بقراری ارتباط به حساب می‌آید. در\n\nسال‌های اول و دوم زندگی باید از رَقتَارََاََشٌ‌زبانی سخن به میان آورد. بر اساس روند بهنجار\nتحول زیانه بیشتر نوزادان در سنین ۲ تا ۳ماهگی شروع به غان و غون می‌کنند. تولید صداهایی\nشیه کلمه در سنین ۵ تا ‎٩‏ ماهگی توّلید اولین کلمات تا یک سالگی» و جمله‌های دو کلمه در\nشین ۱۸ ماهگی در بیشتر کودکان مشهود است. پس از پایان سال دوم زندگی افثزایش سریع در\nتولید کلمات و جملات اتفاق می‌افتد.\nبا این حال روند تحول بهنجار زبان و گفتار در برخی کودکان با مشکلاتی همراء است. به\nطور کلی اختلال‌های ارتباطی ممکن است زبان یا گفشار یک کودک را تحت تأثیر قرار دهد\nاختلال‌های زبان شامل مشکلات در دریافت و بیان است و اختلال‌های گفتار» اختلال ,در تولید و\nاستفاده از زیان شفاهی را در بر می‌گیرد. پرآوردها حاکی از آن است که مر خلود ۱۱۰ ۱۵ ,فرما\nکودکان پیش‌دبستانی و حدود ‎٩‏ درصد دانش‌آموزان پایه‌های ابشدایی و متوسطه به اختلال‌های\nگفتار و حدود ۲ تا ۳ درصد کودکان پیش‌دبستانی و حدود ۱ درصد جمعیت سین ملرسارو باه\nاختلال‌های زبانی مبتلا هستند.\nاختلال‌های زبانی را می‌توان در دو مقوله اختلال‌های زبان اوه و اخستلال‌های زبان نوی\nتقیم نمود. اختلال‌های زبان اولیه به اخحتلال‌هایی اشاره دارد که علت قابل شناسایی برای آن,وجود\nتدارد, مانند تأخیر اولیه در زبان بیانی و اختلال خواندن مبتنی بر زبان, اختلال‌های زبان نویه به\nرم\nم00 ۷۷۱۱ ۹۵۳۳۵۵ تون\n\n۳۶ روان شناسی و آموزش کودگان و نوجوانان\nسم یج یی یم یی |\nآن دسته از اختلال‌های زبانی اشاره دارد که توسط شرایط دیگر ماندد کم‌توانی‌ذهنی, سیب\nشنبداری, فلج مغزی و نظابر آن به وجود می‌آیند.\nاختلال‌های گفتار بسبار ناهمگن هستند, کودکان مبتلا به اخستلال‌های گفتار در تولیید ‏\nمناسب صداها, حفظ مناسب جرپان با ریثم گفتار پا استفاده مناسب از صدا مشکل دارند:\nاختلال‌های گفتار را می‌نوان در دو دسته اختلال‌های در آسسیالی گفتار و اختلال‌های\nحرکتی-گفتار تقسیم نمود. رایج‌ترین نوع اختلال در سبالی» لکنت زبان است که با نارسایی\nطبیعی در سیالی گفتار متفاوث است. کودکانی که لکنت دارند تکرار بخش‌هایی از کلسه.\nطولانی کردن صدا و انسداد صدا در آنها مشهود است. حدود یک درصد از کودکان و\nبزرگالان لکنت دارند. این اختلال همچنین در پسران بیشتر از:دختران است.\nاختلال حرکتی-گفتار ممکن است شامل دیس‌آرتریا (اختلال در صداهای گفتار) و یا\nآپرکیا (اختلال در برنامه‌ریزی و هماهنگی گفتار) باشد. هر دو اختلال بر تولید گفتار,\nآهستگی سرعت آن و کاهش تابلیت فهم تأثیر می‌گذارد و ممکن است هر دو در یک فرد\nبرای سنجش اختلال‌های ارتباطی می‌توان از آزمون‌های استاندارد؛ آزمون‌های\nغیراستاندارد. مقیاس‌های تحولی و مشاهده‌های رفتاری استفاده کرد. برنامه‌های مداخله‌ای باید\nمبتنی بر داده‌های سنجش صورت گیرد و در محیط طبیعی ,کودک صورت گیرد. نکته مورد\nتوجه این است که علاوه بر متخصص زبان-گفتار, والدین و معلمان کلاس درس نیز باید در\nبرنامه مداخله‌ای مشارکت داشته باشند.\nمحورهای مهمی که در بخش برنامه‌های آموزشی و مداخله‌ای در این فصل مورد بحث\nقرار گرفتند عبارتند از: تسهیل استفاده اجتماعی از زبان, استفاده از راهبردهای مناسب پرسش\nو پاسخ, راهبردهای مناسب در تدریس زبان نوشتاری» تمرکز بر برنامه‌های مداعت. اولیه. و\nنقش خانواده,\nی :"}, {"title": "فصل ۸", "text": "503۱۱۵۵ ۷۷۱1۱۱ ۲\n\nه 4\nفصل هشتم\nآ] هدف های یادگیری\nاز خواننده انتظار می‌رود پس از مطالعه مطالب این فصل بتواند:\n۱. تعریف‌های مختلف آسیب شنوایی را به صورت تحلیلی - مقایسه‌ای بیان کند\n۲ شیوه‌های مختلف طبقه‌بندی آسیب‌های شنوایی را شرح دهد\n۳ میزان شیوع آسیب‌های شنوایی را شرح دهد آست مس دا\n۵. ویژگی‌های مختلف افراد با آسیب شنوایی را بر حسب کنش‌های مختلف شرح\n۶ روش‌های مختلف ارتباطی را در افراد پا آسیب شنوایی بیان نماید\n۷ فرهنگ ناشنوایی را توضیح داده و مورد نقد قرار دهد\n53۲ ۷۷۱۱ 58030۵0\n\nاولین حسی که در انسان به وجود می‌آید و آخرین حسی که در انسان از بین می‌رود حس\nشنوابی است. بنابراین انسان‌ها از طریق شنیدن اطلاعات زیادی را درباره جهان اطراف کسب\nمی کنند و شنیدن نقش بسیار مهمی را در تحول فرد ایفا می‌کند. بدین ترتیب آسیب شنوایی!»\nبسته به شدت و زمان بروز» تحول فرد را در کنش‌های مختلف با تأخیرهای جدی رویرو\nمی‌سازد. با این حال با غربالگری و شناسایی زودهنگام» و در نتیجه ارائه خدمات آموزشی»\nتوانبخشی و پزشکی می‌توان تا حد زیادی تأثیر منفی آسیب شنوایی را به حداقل رساند.\nسیستم‌های طبقه بندی بسیاری برای آسیب شنوایی وجود دارد. اگرچه که اين فکر رایج است\n۹\nانوا\" بودن به معنای عدم توانایی ذر شنیدن هر چیزی است و سخت‌شنوایی\"به این معدا\nاست که فرذ تا حد کمی می‌تواند بشنود ؛ اما این مسئله به طور کلی درست نیست. بیشتر افراد\nناشنوا تا حدی از باقیمانده شنوایی برخوردارند. دو دیدگاه یا جهت‌گیری فیزیولوژیکی د\nجهت‌گیری آموزشی در ارتباط با تعریف آسیب شنوایی مطرح است.\nجهت گیری فیزیولوژیکی بیشتر به میزان قابل اندازه‌گیری سیب شنوایی مسوتیط اس\nکودکی که نمی‌تواند صداها را در یک سطح شدت خاص يا بالاتر بشنود در طبقه ناشنوا و بل\nافراد با آسیب شنوایی به عنوان سنمت شنو در نظر گرفته می شوند. حساسیت شنوایی بر\nحسب دسی‌پل اندازه‌گیری می شود. بر اساس دیدگاه فیزیولوژیکی, به طور کلی افراد با آَسیپ\nی سس\nشش\n1 رنه رس ورزممه11 1۰\n0 1 .2\nومزممهط 0۶ 13۵0۵ .3\nم... 7 ۱ ٍ\n\n۳۰ روان شناسی و آموزش کودکان و نوجوانان\nدمم\nشنوابی به اندازه ۹۰ دسی‌بل یا بیشتر به عنوان ناشنوا و افراد با آسیب‌های شنوایی پایین‌تر از\nاین میزان به عنوان سخت شنوا در نظر گرفته می‌شوند (هالاهان و کافمن؛ ۲۰۰۹).\nمتخصمان با جهت‌گیری آموزشی به اين نکته توجه دارند که تا چه اندازه سیب شنوایی\nاحتمالاً بر توانایی کودک در صحبت کردن و تحول زبان تأثیر می‌گذارد. این متخصصان به\nعلت ارتباط خیلی نزدیک بین آسیب شنوایی و تأخیر در تحول زبان, ملاک طبقه‌بندی را بیشتر\nبر اساس توانایی‌های زبان شفاهی قرار می دهند. آسیب شنوایی اصطلاح وسیعی است که افراد\nبا آسیب‌های خفیف تا عمیق را در بر می‌گیرد. آن شامل افراد ناشنوا و سخت شنوا می‌گردد.\nتعاریف ناشنوا و سخت شنوا بر اساس دیدگاه آموزشی به صورت زیر است:\n- فرد ناشنو/ کسی است که ناتوانی شنیدن او از پردازش موفقیت‌آمیز اطلاعات زبانی از طریق\nشنیدن با و یا بدون وسایل کمک شنیداری جلوگیری می‌کند.\n- فرد سخت شنوا به طور کلی می‌تواند با وسایل کمک شنیداری از باقیمانده شنوایی خود\nبرای پردازش موفق اطلاعات زبانی از طریق شنیدن استفاده کند.\nمربیان تا حد زیادی درباره سن شروع آسیب شنوایی نگران هستند. بین آسیب شنوایی و\nتأخیر در زبان رابطه نزدیکی وجود دارد. هر چه آسیب شنوایی در زندگی کودک زودتر رخ\nدهد تحول زبان در کودک با مشکلات بیشتری مواجه خواهد بود. به همین دلیل متخصصان\nبه طور مکرر از اصطلاحات ناشنوایی مادرزادی ا(افرادی که ناشنوا به دنیا می آیند) و\nناشنوایی اتفاقی آ (افرادی که مدت زمانی بعد از تولد ناشنوا می شوند) استفاده می‌کنند.\nدو اصطلاح رایج دیگر که در ارتباط خاص‌تری با زبان هستند عبارتند از ناشنوایی\nپیش‌زبانی \"و ناشنوایی پس‌زیانی ! ناشنوایی پیش‌زبانی به ناشنوایی اشاره دارد که در هنگام\nتولد یا بسیار زود در زندگی یعنی قبل از تحول زبان و گفتار رخ می‌دهد. ناشنوایی پس‌زیانی\nبه ناشنوایی اشاره دارد که بعد از تحول زبان و گفتار رخ می‌دهد. متخصصان درباره نقطه\nجداکننده این دو نوع ناشنوایی اختلاف نظر دارند. برخی معتقدند زمان هجده ماهگی باید\nملاک تقسیم دو نوع ناشنوایی پیش‌زبانی و پس‌زبانی باشد و برخی دیگر فکر می‌کنند این زمان\nباید در سئین پایین‌تری یعنی ۱۲ ماهگی یا حتی ‎٩‏ ماهگی باشد (میدو- ارلاتز ۱۹۸۷).\nکدهل ارالمانه‌و دمح .1\nبرعاه نز۸00 .2\nآهاو 2۲ ,و\nالا ۳۹\nای 5 ۸\nمومع دم جانزیی 0عم 5030\n\nپل هشتم: آسیب شئولی\nتوص\nوشن متخصصان, آسیب شنوایی را بر حسب سطح آستانه شنوایی طبقه‌بندی کردند:\nیف (۲1تا۰) دسی بل)» متوسط (۶۱ تا ۵۵ دسی بل)» نیمه شدید (۵1 تا ۷۰ دسی بل)»\nیدید (۷۱تا ۹۰ دسی بل) و عمیق (۹۱ دسی بل و بالاتر) ( اندروزء لای» و وایضراء ۲۰۰۶).\nاین سطوح شدت بر اساس از دست دادن حساسیت شنوایی» طبقه‌بندی‌های وسیع ناشنوایی و\nسخت شنوا را کنار می زند. طبقه‌بندی‌های وسیع‌تر به طور مستقیم به حساسیت شنوایی وابسته\nنیستند. در عوض آنها بر میزان تأثیرپذیری زبان و گفتار تأکید می‌کنند.\nصدا از طریق شدت و فرکانس آن اندازه‌گیری می شود. شدت و فرکانس, اندازه‌مای\nنیزیکی هستند که می‌توان آنها را به سادگی معادل بلندی و زیر و بمی دانست. بلندی صدا با\nدسی‌بل سنجیده می‌شود. در دسی‌بل صفرء شخصی که شنوایی طبیعی دارد می تواند\nضعیف‌ترین صدا را تشخیص دهد. نجوا حدود ۰ دسی بل و گفتگوی معمولی حدود ۵۰\nدسی‌یل شدت دارد. صدایی که بیش از ۱۲۵ دسی‌بل شدت داشته باشد ممکن است موجب\nدرد گوش شود و به سلول‌های مویی حلزون آسیب برساند.\nزیر و بمی صدا با دور در ثانیه یا هرتز اندازه گیری می شود. یک هرتز برابر با یک دور\nدر ثانیه است. انسان‌ها می‌توانند صداهایی با فرکانس ۲۰ تا ۲۰۰۰۰ هرتز را بشنوندء اما\nقرکاتس بسیاری از صداها پایین‌تر یا بالاتر از فرکانس صداهای گفتاری است. بیشتر صداهای\nمحیطی بین ۱۲۵ تا ۸۰۰۰ هرتز قرار می‌گیرند, در حالی که مهم‌ترین صداهای گفتاری در\nمحدوده ۳۰۰ تا ۳۰۰۰ هرتز قرار دارند.\nمیزان شیوع\nبرآورد تعداد کودکان با آسیب شنوایی به علت اختلاف در تعاریف» جمعیت‌های مورد مطالسه\nو صحت آزمون‌گری تا حد قابل ملاحظه‌ای گوناگون است. آمارهای وزارت آموزش و\nپرورش ایالات متحده آمریکا نشان می‌دهد که ۰/۱۳ درصد جمعیت 1 تا ۱۷ سال مدارس\nعمومی» ناشنوا یا سخت‌شنوا هستند. هرچند که اين دپارتمان آمارهای مجزا برای مقوله‌های\nناشنوا و سخت شنوا ارائه نمی‌دهد» با این حال شواهد قوی حاکی از آن است که میزان شیوع\n8/0۳ ونم ,1۰۸095\n7) ۷۷۱1۱۱ 5020۳۵0\n\nرز روان شناسی و آموزش کودکان و نوجوانان\nو\n۱ دانش‌آموزان سخت شنوا بیشتر از دانش‌آموزان ناشنوا است (میدو - ارلاترء مرتشزء و ساس-\nلهرراء ۲۰۰۳).\nاش تقریباً ۲۸ میلیون نفر در آمریکا اختلال های شنوایی دارند (مس ۱۹۹۱۸) و یک درصد\nجمعیت به اختلال شنوایی مبتلا هستند (هیورد/۲۰۰۹). تعیین نعداد دقیق دانش آموزان دارای\nاختلال شنوایی دشوار است, زیرا بیشتر گزارش‌ها تنها دانش‌آموزانی را که آموزش ویژه را\nدریافت می‌کنند جزء آمار به حساب می‌آورند. به سبب این که بسیاری از دانش‌آموزان دارای\nنقص شنوایی شناسایی نمی‌شوند یا نقص شنوایی خفیف دارند و خدمات ویژه دریافنت\nنمی‌کنند. میزان شیرع نقص شنوایی کمتر از مقدار واقعی آن برآورد شده است.\nنورثرن و داونز* (۲۰۰۱) گزارش کردند که از هر ۱۰۰۰ کودکی که متولد می‌شود؛ ۱\nکودک ناشنوا است و از هر ۱۰۰۰ نفر» دو کودک دیگر نیز در نخستین سال های زندگی ناشنوا\nمی شوند. از هر ۵۰ نوزادی نیز که به مراقبت‌های ویژه نیاز دارند ۱ کودک به ناشنوایی یا\nسخت شنوایی میتلا می‌شود. آنها همچنین گزارش کردند که ۰ تا ۱۵ درصد از همه دانش‌آموزان\nنمی‌توانند آزمایش‌های شنوایی مدارس را با موفقیت پشت منر بگذارند. برخی افراد از دیگر\nگروه‌های با نیازهای ویژه نیز دارای آسیب‌های شنوایی هستند. به عنوان مثال دانش‌آموزان مبتلا\nبه نشانگان داون و دانش‌آموزان مبتلا به فلج مغزی ممکن است اختلال شنوایی داشته باشند.\nعلاوه بر اين» به نظر می‌رسد ناشنوایی‌هابی که ناشی از عوامل ارئی و عفونت‌هایی مانند\nمننژیت هستند و نقایص شنوایی که به علت قرار گرفتن طولانی مدت در محیط های پر سرو\nصدا و عفرنت هایی مانند گوش میانی رخ می دهند رو به افزایش اند (هیورد:۲۰۰۹).\nآناتومی گوش\nگوش به سه بخش تقسیم می‌شود: گوش بیرونی, گوش مبانی و گوش درونی. گوش بیرونسی\nشامل لاله گوش و مجرای شنوایی است. گوش بیرونی صداها را جمع می‌کند و آنها را از راء :\nمجرای شنوایی انتقال می دهد. این صداها به گوش میانی فرستاده می‌شوند (شکل ۸-۱).\nسس سس رس\n5اعا -5295 بظ 1.2/15\n5 2\n3\n8 2 210۲65 .4\nسس ۹\n۵۲۳ ۶ 5020۵۵\n\nپیی هشتم: آسیب شنوایی ۳۳\nوا و ردو یرو وروی ویو ردیر رید\nگوش میانی شامل پرده صماخ و سه استخوان کوچک به نام‌های چکشی . سندانی, و\nرکایی است. مجموع این سه استخوان, استخوانچه‌ها یا زنجیره استخوانچه‌ای نامیده می‌شود.\nنخوان سندانی به استخوان رکابی چسبیده است. استخوان رکابی نیز به دریچه بیضی با\nورودی گوش درونی وصل است. هنگامی که امواج صدا از دریچه شنوایی می‌گذرند به رده\nصماخ برخورد می‌کنشد و باعث لرزش آن می‌شوند. لرزش‌های مکانیکی به زنجیره\nآتخوانچه‌ای می‌رسند و سپس انرژی مکانیکی به گوش درونی انتقال داده می‌شود. شیپور\nتاش که از پشت حلق تا گوش میانی ادامه دارد » باز و بسته می‌شود و فشار هوا را در دو\nطرف پرده صماخ متعادل می‌سازد.\nگوش درونی شامل حلزون؛ مجاری نیم دایره و ابتدای عصب شنوایی است. حلزون\nحسی شنوایی را مهار می‌کند و مجاری نیم دایره وظیفه مهار حس تعادل را بر عهده دارند.\nحلزون حفره‌ای پر از مایع است که با سلول‌های مویی کوچک پوشانده شده است. هنگامی که\nحرکات زنجیره استخوانچهای به گوش درونی وارد می‌شوندء مایع موجود در حلز می‌توانند با استفاده از سمعک\nاطلاغات شنیداری را دریافت کنند. می‌توانند از تکنیک کاشت حلزون بهره بگیرند. این روش\nشامل قرار دادن مجموعه‌ای الکنرود در حلزون است. الکترودها به گیرنده‌ای وصل می‌شوند که\nصداها را می‌گیرد و آنها را به تکانه الکتریکی رمزگردانی می‌کند. آن گاه الکترودهاء تکانه\nالکتریکی را از طریق مسیرهای عصبی به مغز می‌فرستند تا پردازش شود. اگر این فرایند ۳\nی\n8 ۸/2 .1\nاتانت رن 1۱ رما :\n\n۹\nپسل هشتم: آسیب شنوایی ۹۹\nپهان.. یرای ی یک\nموفقیت آمیز باشدء فرد می تواند صداهای محیطی مانند زنگ تلفن» بوق انومبیل و سرو صدای\nمشین‌ها وا بشنود. علاوه بر اين؛ کاشت حلزون می‌نواند به دانش آموزان دارای نفص شئوایی\nشدید و عمیق کمک کند تا گفتار را بهتر بیاموزند. کاشت حازون؛ روشی جادید است و بحث\nهایی وا نیز پدید آورده است. این روش گران است و اثربخشی درازمدت آن هدوز مبشخص\nنشده است. در مجموع کودکانی که کشت حلزون داشتن در درک؛ تأیید و وضوح گفتار\nشرفت بیشتری داشتند. نکته حائز اهمیت اين است که پس از کاشت حازون در سال‌های اولیه\nزندگی باید به کودک آموزش‌های فشرده داده شود. برخی اعضای جامعه ناشنوایان به دلابل بالا\nبا روش کاشت حلزون مخالف هستند. علاوه بر اين؛ آنها معنقدند که این روش به هویت\nفرهتگی ناشنوایان سیب می‌زند و خودپنداشت آنها را به عنوان اعضای سالم و با کفایت جامعه\nتضعیف می کند. حتی برای کودکان ۱۸ ماهه می توان از کاشت حلزون استفاده کرد.\nکامپیوترها\nکنیوترها و برنامه‌های آموزشی کامپیوتری به دانش آموزان دارای نقص شنوایی و نیز دانش آموزان\nشنوا عر بازنمایی دیداری کمک می کنند. استفاده از کامپیوتر در کلاس‌های درس » دسترسی افراد به\nمحتوتی درسی و برقراری ارتباط با دیگران را تسهیل می‌نماید. علاوه بر اين» برنامه های مخصوصی\nتیز یرای دانش آموزان ناشنوا تهیه شده‌اند و به آنها کمک می کنند نا مهارت های خواندن و نوشتن را\nید بگیرند و بر هجی کردن با انگشتان و زبان اشاره تسلط پیدا کشد. در برناسه هجی کردن با\nتگشتان, کاربران دستکش ویژه ای می پوشند و حروف را هجی می‌کنند و کاپیوتر حروف هجی\nششه را به متن تبدیل می کند. مزیت این برنامه‌ها آن است که به اعضای خانواده و همسالان امکان\nمی‌دهند تا مهارت ها را نمرین کنند؛ بدون این که برای نظارت بر جلسات تمرین» متخصص حضور\nداشته باشد. افراد با آسیب شنوایی می‌توانند با استفاده از ایترنت در سایت‌های مختلف جستجو کنند\nو با دوستان و معمان خود ارتباط برقرار کنند,\nوسایل ارتباط کمکی\nتا قبل از سال ۱۹۹۶ افراد با آسیب شنوایی نمی‌توانستند از تلفن استفاده کنند. تا این که رابیرت\nویت‌برشت فیزیکدان آمریکایی که خود ناشنوا بود در سال ۱۹۹۶ دستگاهی را برای برقراری\nلرتباط از طریق خط تلفن اختراع کرد و به تدریج ابزارهای ارتباط تلفنی برای ناشنوایان ساخته\n۳1\n\n۳۶۰ روان شناسی و آموزش کودکان و نوجوانان\nمس و و یس مس ی\nشدند, دورنویس‌ها\" یا وسایل ارتباط از راه دور برای ناشنوایان سیستم تلفنی هستند که به\nکاربران امکان می‌دهند نا پیامی را در تلفن تایپ کنند. این وسایل؛ تلفن‌های متنی \" نیز نامیده\nمی‌شوند. شماره‌های خاص (مانند ۱۱۸) به افرادی که دورنویس یا وسایل ارتباط از زاه دور\nندارند کمک می‌کنند تا از طریق تلفن با افراد سخت شنوا ارتباط برقرار کنند. در این روش»\nاپراتورها نقش مترجم را بازی می‌کنند؛ آنها پیام‌های نوشتاری را برای فرد شنوا می‌خوانشد و\nپیام‌های گفتاری افراد شنوا را برای افراد ناشنوا تایپ می‌کنند. تعداد زیادی از شرکت‌ها و\nسازمان‌ها سیستم‌های تلفنی مخصوص به خود دارند و به اپراتور نیاز ندارند. قانون افراد\nآمریکایی دارای ناتوانی (۱۹۹۰) همه شرکت‌های مخابراتی را ملزم می کند تا خدمات ویژه را\nبرای هميشه برای افراد ناشنوا فراهم نمایند.\n\nزیرنویس\n\nدر این روش, گفتگوهای برنامه تلویزیونی و فیلم‌ها به صورت زیرنویس در صفحه تلویزیون\nنمایش داده می‌شوند. استفاده از این روش در فیلم و سایر برنامه‌های تلویزیونی به افراد با\nآسیب شنوایی کمک می‌کند تا گفتار را درک کنند. بیشتر برنامه‌های سرگرم کننده» ورزشی و\nخبری زیرنویس پنهان دارند؛ یعنی بینندگانی که تلویزیون آنها به دستگاه رمزگشایی مجهز\nاست می توانند زیرنویس‌ها را ببینشد. از ژوئیه سال ۱۹۹۳ به بعد, همه تلویزیون‌های ۱۳ اینچ یا\nبزرگ‌تر که در آمریکا فروخته يا تولید شده‌اند به تراشه زیرنویسی مجهز هستند که به بینندگان\nامکان می‌دهند تا زیرنویس‌های برنامه‌ها را ببینند (هاردمن» درو و اگن» ۲۰۰۵). افراد دارای\nنقص شنوایی با استفاده از زیرنویس‌ها می‌توانند از رویدادها و مسائل اجتماعی روز آگاه شوند.\nبسیاری از افراد شنوا در محیط‌های پر سرو صدا از برنامه‌های زیرنویس شده استفاده می‌کنشد.\nهمچنین لازم به یادآوری است که معلمان در برنامه‌های آموزشی خود می‌توانشد از فیلم‌های\nزیرنویس دار استفاده کنند.\n\nاک ان کوک\n\nسل هشتم: آسیب شنوایی و\nشش\nوسایل هشداردهنده\nیشتر وسایل هشداردهنده‌ای که برای افراد شنوا ساخته شده اند تغییر یافته‌اند تا افراد سخت\nشنوا بتوانند از آنها استفاده کنند. زنگ منزل و زنگ‌های دیگر به چراغ‌های هشداردهنده تبدیل\nشده اند. بالش‌های لرزاننده به صدای ساعت زنگی واکنش نشان می دهند و فرد ناشنوا را\nبیدار می کنند. غلائم هشدار دهنده آتش, هم به صورت دیداری و هم شنیداری عمل می کنند.\nکاتالوگ‌هایی وجود دارند که حاوی انواع مختلف وسایل هشدار دهنده ابتکاری و پیشرفته\nهستند. این کاتالوگ‌ها را می‌توان از متخصصانی که به افراد دارای نقشص شنوایی خدمات\nمی دهندء درخواست کرد.\nفرهنگ ناشنوایان [\nپس از پی بردن به این موضوع که زبان اشاره آمریکایی زبانی واقصی و مجزا است و تمام\nویژگی‌های یک زبان واقعی مانند گویش, زبان عامیانه» وام گیری از دیگر زبان ها و ... را دارد\nو تنها برگردان اشاره‌ای زبان انگلیسی نیست مفهوم فرهنگ ناشنوایان شکل گرفت. برخی\nافراه ناشتوایان را اقلیتی جداگانه می‌دانند و ناشنوایی را مشخصه فرهنگی آن:اقلیت تلقی\nمی کنند. آنهایی که به فرهنگ ناشنوایی باور دارند» ناشنوایی را \" صفت\" می دانند نه ناتوانی.\nتوجیه این باور آن است که افراد ناشنواء مانند افراد عضو سایر گروه‌های فرهنگی» ویژگی های\nجسمی مشترک ( ناشنوایی و نقص شنوایی )» زبان مشترک ( زبان اشاره) و نیازهای مشترک\n(تغییرات ویژه در فرایند ارتباط) دارند. مدافعان فرهنگ ناشنوایی هنگامی که به جمعیت خاص\nخودشان اشاره می کنند» حرف اول کلمه ناشنوا (0621) را به صورت بزرگ می نویسند. آنها\nواژه 063 را به عنوان صفت به کار می برند؛ یعنی» افراد ناشنوا کسانی هستند که نقص\nشنوایی دارند. برخی از ناشنوایان اصطلاح افراد ناشنوا\" را به کار می برند تا بر پیوند فرهنگی\nشان تأکید کنند (ترن بال و همکاران, ۲۰۰۶). اعضای جامعه ناشنوایان؛ زبان اشاره آمریکایی را\nزبان اول کودک ناشنوا می دانند و معنقدند که انگلیسی,» زبان دوم وی محسوب می شود. آنها\nادعا می‌کنند که پس از این که کودک بر زبان اشاره آمریکایی تسلط یافت, انگلیسی را\nمی‌توان به عنوان زبان دوم آموزش داد.\nآمعل ع۶ه ۶۵۰ 860016 1۰\nمج مدمه جاززبه ۳۳۵۵دم۴ ۹۹ ۳۳۳\n\n۲ روان شناسی و آموزش کودکان و نوجوانان\nسوم\nدر اصطلاح فرهنگی اجتماعی, جامعه ناشنوایان دارای زبان و فرهنگ مشترک (فرهنگ\nناشنوایان) است. فرهنگ ناشنوایان شامل زبان» ارزش هاء رفتارهاء و سئت‌های افراد ناشئوا\nاست. شاید زبان مشترک اعضای یک افلیت فرهنگی مهمترین ویژگی شناسایی آن فرهنگ\nباشد. پنابراین زبان اشاره آمریکایی مهم‌ترین ویژگی مشخصه مرتبط با فرهنگ ناشنوایان است.\nافراد ناشنوا زبان اشاره آمریکایی را به عنوان زبان انحصاری پذیرفته و تحسین می کنشد و به\nفرهنگ ناشنوایان می‌بالند. البته تمام افراد دارای سیب شنوایی خود را بخشی از فرهنگ\nناشنوایان نمی دانند. علاوه پر استفاده و ارزش بالای زبان اشاره آمریکایی» فرهنگ ناشنوایان\nدارای ویژگی های ارزشی دیگری نیز هست. برای نمونه, اگرچه بسیاری از افراد ناشنوا از\nگفتار هنگام ارتباط با افراد دارای شنوابی بهنجار استفاده می کنندء فرهنگ ناشنوایان بهای\nزیادی به گفتار نمی‌دهد و در حقیقت حرف زدن را هنگام اشاره کردن رفتار مناسبی نمی داند.\nمتخصصان دیگر بیان کرده‌اند که آموزش تلفیقی: افلب موجب جدایی دانش آموزان ناشنوا از\nجامعه ناشنوایان می شود و آنها را در خطر انزواء ثنهایی و افسردگی قرارمی دهد؛ زیرا ممکن\nاست بتوانند تنها با عده کمی ارتباط برقرار کنند. اگر دانش آموزان ناشنوا بتوانند با دیگر افراد\nناشنوا ارتباط پایداری ایجاد کنندء پیشتر احساس امئیت می کنند. در نتیجه بسیاری از افراد\nناشنوا با همتایان خود ارتباط های گسترده‌ای برقرار می کنند. این ارتباط موجب انتقال زبان\nاشاره و یادگیری فرهنگ ناشنوایی می شود.\nافراد ناشنوا معمولاً (و نه همیشه) گرایش به ازدواج با دیگر افراد ناشنوا دارند و ترجیح\nمی‌دهند کودکانی ناشنوا مانند خود داشته باشند. ارتباطات در جامعه ناشنوایان معمولاً همیشگی\nاست و افراد ناشنوا نوعاً دوستی های دوران کودکی خود را حفظ می کنند. فعالیت های اجتماعی و\nگردهمایی‌ها روش مهم حفظ تماس؛ ارتباط و تعامل با دیگر اعضای اين فرهنگ است. در فرهنگ\nناشنوایان ارزش بالایی برای سازماندهی افراد ناشنوا وجود دارد. برای نمونه, انجمن‌های ناشنوایان\nسازمان‌های مردم نهادی هستند که با فرهنگ ناشنوایان ارتباط تنگاتنگی دارند. آمریکا و کشورهای\nاسکاندیناوی (نروژ فنلاند, دانمارک, سوئدء و ایسلند) کشورهایی هستند که فرهنگ ناشنوایان به\nطور فزاینده در آنها به رسمیت شناخته شده است.\nدرگذشته, انزوای خودخواسته ناشنوایان از جامعه شنوا نوعی مشکل اجتماعی در نظر\nگرفته می شد. برخی متخصصان, این انزوا را طبیعی می‌دانند که ناشی از پیوند مشترکی است\nکه ناشنوایان از طریق زبان اشاره با هم برقرار کرده اند. با وجود اين؛ زبان مشترک تنها یکی از\nیت\n\nهت و\nپل هشتم: آسیب شنوایی ۳\nبح ی\nبه‌های این پیوند است. ریگان (۱۹۹۲) عواملی دیگری را ذکر می کند که ممکن است.\nزهنگ ناشنوایی را تأیید کنند. برای مثال» ناشنوایان یک گروه دو زبانه هستند که به زبان اشاره\nآمریکابی و زبان انگلیسی تکلم می‌کنند. مانند فرهنگ اسپانیایی که آنها نیز دو زیان مختلف\nبزند. در جامعه ناشنوایان» نگرش‌ها و تصوراتی وجود دارند که در جامعه شنوایان راییج\nنپشد, مانند اين دیدگاه که اختلال‌های شنوایی بیماری یا ناتوانی نیستند و به درمان نیاز\nارند (پاگلیاری۲۰۰۱). اعضای جامعه ناشنوایان از همدیگر حمایت می‌کنند و معتقدند که با\nکار گروهی می‌توانند به بسیاری از منافع دست یابندء مانند دسترسی بیشتر به مشاغل مختلف.»\nتمویب قانون برای زیرنویس کردن برنامه‌ها و فراهم بودن برنامه فناوری کمکی در مکان های\nعمومی. به سبب اين که در مدارس شبانه روزی» ارزش های فرهنگی جامعه ناشنوایان به\nای به افراد شنوا منتقل می شوند» نگرانی هایی در این باره وجود دارند که برخی سیاست\nگذاری‌ها مانند آموزش تلفیقی و جایدهی دانش آموزان ناشنوا در کلاس عادی به فرهنگ\nناشنوایی سیب بزند. غده‌ای تلاش می کنند دوره‌هایی درباره تاریخ و فرهنگ ناشنوایی برای\n«تش آموزانی برگزار کنند که از جامعه ناشنوایان دور بوده‌اند و در مدارس غیرشبانه‌روزی\nتححیل کرده‌اند (گوستاد و کلووین»۱۹۹۲). موافقان و مخالفان آموزش فرهنگی جداگانه\nسکن است هیچ گاه نتوانند با هم کنار بیایند. دکتر کینگ جردن» رئیس دانشگاه گالودت و تنها\nریس ناشنوای دانشگاه در جهان, درباره اختلاف نظر متخصصان درباره فرهنگ ناشتوایی\nچنین می نویسد:\nهر برچسبی که گروه خاصی را تعریف می کند.... گروه دیگری را نادیده می‌گیرد. در حالی که\nجامعه ناشنوایان افتخار فرهنگی در سطح جهان محسوب می شودء ممکن است برخی افراد\nناشنوا را که خودشان را عضو اين جامعه نمی دانندء نادیده بگیرد. ما هميشه در حال تعریف و\nتغیر خود بوده و به دنبال زبان جدیدی هستیم که نشان دهنده دیدگاه گسترده ما باشد\nاجردن۱۹۹۲؛ به نقل از امیری مجد۱۳۸۹۰).\n503۳۵۵\n\n۴ 5\nاک\nخلاصه فصل\nانسان‌ها از دوران جنینی تا لحظه‌های احنضار می‌توانند بشنوند؛ بنابراین شنیدن نقش مهمی را\nدر تحول فرد بازی می‌کند و آسیب شنوایی نیز بسته به شدت و زمان بروزه تحول فرد را در\nکش‌های مختلف با مشکلاتی مواجه می‌سازد.\n\nسیب شنوایی اصطلاح وسیعی است که افراد با آسیب‌های خفیف تا عمیق را در بر می‌گیرد\nو طبفه‌بندی‌های مختلفی از آن وجود دارد که عبارتند از: ناشنوا سخت‌شنوا ناشنوایی مادرزادی\nاشنوایی انقانی؛ ناشنوایی یش‌زبای اناشنوایی پس‌زبانی. همچنین سیب شنوایی وا بر حسب سطح\nآستاه شنوایی نیز می‌توان به طبفه‌های خفیف» متوسط نیمه شدید؛ شدید؛ و عمیق تقسیم کرد.\n\nگوش از سه بخش بیرونی» مینی» و درونی تشکیل شدهاست. اسب در هر یگ از پخش‌های\nگوش باعث ایجاد آسیب شنوایی در فرد می‌گردد: شایع‌ترین علل نقص شنوایی پیش‌زبانی عبارتند از:\nسرخجه مادره عامل ورائت, نارس بودن نوزاد و کم‌وزنی به هنگام تولد عفونت‌های ویرسی و\nویروس سایتومگال مادرزادی. همچنین از عوامل ایجاد کننده سیب شنوایی پس از اککساب زبان\nمی‌توان به منتژیت, عفونت گوش میانیّ؛ نقش شنوایی ناشی از سر و صداء و عوامل ناشناخته اشاره کرد.\n\nبا ترجه به این که حس شنوایی نقش بسیارکهمی در تحول انسان بازی می‌کشد؛ سیب\nشنوایی بسته به شدت زمان برزز» تخول کنش‌های اساسی فرد را با تأخیرهای مهمی مواجه\nمی‌سازد. به طور کلی افراد با آسیب شنوایی در درک زبان, تولید زبان و گفتار با دشواری‌هایی\nمواجه هستند. پادگیری گفتار و زبان شفامی با شدت نقص شنوایی ارتباط مستقیم دارد. همچشین\nتوانایی مفهومی افراد ناشئو به علث مشکلات در زبان شفاهی؛ نارسا است. نکته مهم در ارزیابی\nهوشی افراد ناشنوا ستفاده از آزمن‌های عملکردی به جای آزمون‌های کلامی است. در صورت استفاده\nاز آزمون‌های عملکردی, در هوشبهر افراد عادی و ناشنواء تفاوت قابل ملاحظه‌ای وجود ندارد.\n\nآسیب شنوایی بر روی توانایی تحصیلی افراد تأنیر عمده‌ای می‌گذارد. خواندن مهمترین\nحوزه‌ای است که آسیب می‌بیند. میزان تأثیر آسیب شنوایی بر پیشرفت تحصیلی, افرادء به شدت\nاختلال شنوایی» سن شروع نقص شنوایی, توانایی هوشی فردء وضعیت اجتماعی - اقتصادی\nخانواده» و وضعیت شنوایی والدین بستگی دارد. افراد ناشنوا با توجه به مشکلات ارتباطی در\nمعرض خطر ننهایی هستند. سازش‌پافتگی اجتماعی و شخصیتی دانش‌آموزان ناشنوا به میزان\nمهارت‌های ارتباطی آنها بستگی دارد. کودکان اشنوایی که دارای والدین ناشنوا هستند نسبت\n\n2 ا\nقسل هشتم: آسیب شنوایی ۵\nمشش\nروس‌های برقراری ارتباط در افراد ناشنوا را می‌توان در سه مقوله کلی روش‌های دستی\n(تأکید بر ایما و اشاره)؛ روش‌های شفاهی (تأکید بر گفتار)» و ارتباط کلی يا همزمان (استفاده\nدا سس رس ی موی\nهمزمان از زبان اشاره و گفتار) تقسیم نمُود. در روش‌های دستی بر انتقال اطلاعات از طریی\nزیان اشاره تأکید می‌شود که به دو شیوه هجی کردن با انگشتان و استفاده از اشاره برای واژه‌ها\nپا مفاهیم صورت می‌گیرد. در روش‌های شفاهی بر انتقال زبان از راه گوش دادن و حرف زدن\nتأکید می‌شود. دو رویکرد مهم در روش‌های شفاهی عبارتند از رویکرد شنیداری/کلاسی و\nوویکرد شنیداری/ شفاهی. در نهایت این که در روش ارتباط کلی از تمامی روش‌ها مانند\nترکیب گفتار» نوشتارء ایما و اشاره, گفتارخوانی و شنیدافزاها برای برقراری ارتباط استفاده\nمی‌شود. روش ارتباط کلی برای دانش‌آموزان آزادی عمل بیشتری را فراهم می‌کند.\nآخرین نکتّه در آموزش و توانبخشی افراد با آسیب شنوایی استفاده از فناوری‌های ...مر\nو\nمختلف است. مهمترین فناوری‌ها عبارتند از: سمعک» کاشت حلزون؛ کامپیوترهاء وسایل\nمس سل تسووا ۳\nارتباط کمکی» زیرنویس» و وسایل هشدار دهنده.\n_‌ سوه «ججسض"}];

// utils
const norm = s => s.replace(/[\u064B-\u065F\u0670]/g,'').replace(/ي/g,'ی').replace(/ك/g,'ک').replace(/\s+/g,' ').trim();
const STOP = new Set(('و در به از با این آن که را برای تا هم یک های ها می شود شد است بود بر بی هر چه چون یا اگر همان بین نیز بلکه دارد ندارد دارند کرد کردن ای اند ام ات اش شان مان تان'.split(' ')));
function tokens(s){ return norm(s).split(/[^\u0600-\u06FFa-zA-Z0-9]+/).filter(w=>w && w.length>1 && !STOP.has(w)); }

// split all chapters into paragraphs
const PARAS = [];
DATA.forEach((ch,ci)=>{
  ch.text.split(/\n\s*\n/).forEach(p=>{
    const t = p.trim();
    if(t.length>40) PARAS.push({ch:ci, title:ch.title, text:t});
  });
});

function score(qTokens, para){
  const txt = norm(para.text);
  let s=0;
  qTokens.forEach(t=>{
    const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');
    const m = txt.match(re);
    if(m) s += m.length * (1 + t.length/6);
  });
  return s;
}

function findBest(q, chapterFilter, k=3){
  const qt = tokens(q);
  if(!qt.length) return [];
  const pool = chapterFilter==null ? PARAS : PARAS.filter(p=>p.ch===chapterFilter);
  return pool.map(p=>({p,s:score(qt,p)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,k).map(x=>x.p);
}

function highlight(text, q){
  const qt = tokens(q);
  let out = text;
  qt.forEach(t=>{
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','g');
    out = out.replace(re,'<span class="hit">$1</span>');
  });
  return out;
}

// tabs
document.querySelectorAll('.tab').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.pane').forEach(p=>p.style.display='none');
    document.getElementById(b.dataset.tab).style.display='';
  };
});

// chapter chips
function makeChips(container, onChange, allowAll=true){
  const el = document.getElementById(container);
  el.innerHTML='';
  const state = {v: allowAll ? -1 : 0};
  const items = allowAll ? [{i:-1,t:'همه فصل‌ها'}].concat(DATA.map((c,i)=>({i,t:c.title}))) : DATA.map((c,i)=>({i,t:c.title}));
  items.forEach(it=>{
    const c = document.createElement('span');
    c.className='chip'+(it.i===state.v?' on':'');
    c.textContent=it.t;
    c.onclick=()=>{state.v=it.i; el.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); onChange(state.v);};
    el.appendChild(c);
  });
  return state;
}
const askState = makeChips('chapsAsk',()=>{});
const quizState = makeChips('chapsQuiz',()=>{});

// ASK
document.getElementById('btnAsk').onclick = ()=>{
  const q = document.getElementById('q').value.trim();
  if(!q) return;
  const cf = askState.v===-1 ? null : askState.v;
  const hits = findBest(q, cf, 3);
  const card = document.getElementById('ansCard');
  const ans = document.getElementById('ans');
  const meta = document.getElementById('ansMeta');
  card.style.display='';
  if(!hits.length){
    meta.textContent='';
    ans.innerHTML='پاسخی در متن جزوه یافت نشد. کلیدواژه‌های سوال را تغییر دهید.';
    return;
  }
  meta.textContent = 'برگرفته از: ' + [...new Set(hits.map(h=>h.title))].join(' — ');
  ans.innerHTML = hits.map((h,i)=>'<div style="margin-bottom:14px"><b style="color:var(--neon)">◆ بخش '+(i+1)+' ('+h.title+'):</b><br>'+highlight(h.text,q)+'</div>').join('');
};

// QUIZ
function pickSentence(text){
  const sents = text.split(/[.!؟?\n]/).map(s=>s.trim()).filter(s=>s.length>60 && s.length<260);
  return sents.length ? sents[Math.floor(Math.random()*sents.length)] : null;
}
function pickKeyword(sent){
  const words = tokens(sent);
  const nouns = words.filter(w=>w.length>=4);
  if(!nouns.length) return null;
  return nouns[Math.floor(Math.random()*nouns.length)];
}
function makeQuestion(cf){
  const pool = cf==null ? PARAS : PARAS.filter(p=>p.ch===cf);
  for(let tries=0; tries<40; tries++){
    const p = pool[Math.floor(Math.random()*pool.length)];
    const sent = pickSentence(p.text);
    if(!sent) continue;
    const kw = pickKeyword(sent);
    if(!kw) continue;
    // build distractors: other keywords from other paragraphs
    const distr = new Set();
    let guard=0;
    while(distr.size<3 && guard++<80){
      const q = pool[Math.floor(Math.random()*pool.length)];
      const s2 = pickSentence(q.text);
      if(!s2) continue;
      const k2 = pickKeyword(s2);
      if(k2 && k2!==kw && !distr.has(k2) && k2.length>=3) distr.add(k2);
    }
    if(distr.size<3) continue;
    const blanked = sent.replace(new RegExp(kw,'g'),'ــــــ');
    const opts = [kw, ...distr];
    for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
    return {q:blanked, opts, ans:kw, src:p.title};
  }
  return null;
}
document.getElementById('btnQuiz').onclick = ()=>{
  const cf = quizState.v===-1 ? null : quizState.v;
  const Q = makeQuestion(cf);
  const card = document.getElementById('qCard');
  const qt = document.getElementById('qText');
  const qo = document.getElementById('qOpts');
  const qf = document.getElementById('qFb');
  card.style.display='';
  qf.innerHTML='';
  if(!Q){ qt.textContent='امکان ساخت سوال از این فصل نیست، فصل دیگری انتخاب کنید.'; qo.innerHTML=''; return; }
  qt.innerHTML = '<span style="color:var(--muted)">('+Q.src+')</span><br>'+Q.q;
  qo.innerHTML='';
  Q.opts.forEach((o,i)=>{
    const b = document.createElement('div');
    b.className='opt'; b.textContent = String.fromCharCode(1632+i+1)+') '+o;
    b.onclick=()=>{
      if(o===Q.ans){b.classList.add('correct'); qf.innerHTML='<span style="color:#00ff88">✔ پاسخ درست است.</span>';}
      else{b.classList.add('wrong'); qf.innerHTML='<span style="color:#ff5577">✘ نادرست. پاسخ صحیح: <b>'+Q.ans+'</b></span>';
        [...qo.children].forEach(c=>{if(c.textContent.endsWith(Q.ans)) c.classList.add('correct');});
      }
      [...qo.children].forEach(c=>c.onclick=null);
    };
    qo.appendChild(b);
  });
};

// BROWSE
const chSel = document.getElementById('chSel');
DATA.forEach((c,i)=>{const o=document.createElement('option');o.value=i;o.textContent=c.title;chSel.appendChild(o);});
function renderChapter(){
  const i = +chSel.value;
  const q = document.getElementById('find').value.trim();
  let t = DATA[i].text;
  t = t.replace(/</g,'&lt;').replace(/\n/g,'<br>');
  if(q){
    const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','g');
    t = t.replace(re,'<span class="hit">$1</span>');
  }
  document.getElementById('chText').innerHTML = t;
}
chSel.onchange = renderChapter;
document.getElementById('find').oninput = renderChapter;
renderChapter();
</script>
