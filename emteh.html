ممکن است مورد تأکید قرار بگیرد. به\nطور معمول استفاده از از اشارهها مطابق ساختار نحوی زبان شفاهی، رمزگذاری با دست نامیده\n۱\nمیشود. در این روش آنچه در زبان شفاهی گفته میشود اشاره میشود. برای نمونه، وقتی پسری\nمی گوید: \"گربه موش را گرفت.\" به ترتیب \"گربه\"، \" موش\"، \"را\" \" و \" گرفت را اشاره خواهد\nکرد. روش روچستر که عبارت است از استفاده همزمان از گفتار و هجی کردن با انگشتان از جمله\n۲\nروشهای رمزگذاری شده با دست است. روش ارتباط کلی برای دانش آموزان، آزادی عمل\nبیشتری را فراهم می کند.\n\nفناوری\nوسایل کمکی که مخصوص دانش آموزان دارای نقص شنوایی ساخته شده اند شامل سمعک و\nسیستمهای تقویت صدا هستند که در بخشهای قبل توضیح داده شدند. در این بخش، فناوری\nپزشکی و کمکی را توضیح میدهیم. به ویژه در مورد کاشت حلزون، کامپیوتر، وسایل کمکی\nو وسایل زیرنویس و هشدار دهنده بحث خواهیم کرد.\n\nکاشت حلزون\nکسانی که نقص شنوایی حسی - عصبی شدید تا عمیق دارند و نمیتوانند با استفاده از سمعک\nاطلاعات شنیداری را دریافت کنند، میتوانند از تکنیک کاشت حلزون بهره بگیرند. این روش\nشامل قرار دادن مجموعه ای الکترود در حلزون است. الکترودها به گیرنده ای وصل میشوند که\nصداها را میگیرد و آنها را به تکانه الکتریکی رمزگردانی میکند. آن گاه الکترودها، تکانه\nالکتریکی را از طریق مسیرهای عصبی به مغز میفرستند تا پردازش شود. اگر این فرایند\n\n1. Manual Coding\n2. Rochester\n\nنسل هشتم: آسیب شنوایی\n۲۵۹\nموفقیت‌آمیز باشد، فرد می‌تواند صداهای محیطی مانند زنگ تلفن، بوق اتومبیل و سرو صدای\nماشین‌ها را بشنود. علاوه بر این کاشت حلزون می‌تواند به دانش‌آموزان دارای نقص شنوایی\nشدید و عمیق کمک کند تا گفتار را بهتر بیاموزند. کاشت حلزون، روشی جدید است و بحث\nهایی را نیز پدید آورده است. این روش گران است و اثر بخشی درازمدت آن هنوز مشخص\nنشده است. در مجموع کودکانی که کاشت حلزون داشتند در درک، تأیید و وضوح گفتار\nپیشرفت بیشتری داشتند. نکته حائز اهمیت این است که پس از کاشت حلزون در سال‌های اولیه\nزندگی باید به کودک آموزش‌های فشرده داده شود. برخی اعضای جامعه ناشنوایان به دلایل بالا\nبا روش کاشت حلزون مخالف هستند. علاوه بر این، آن‌ها معتقدند که این روش به هویت\nفرهنگی ناشنوایان آسیب می‌زند و خودپنداشت آن‌ها را به عنوان اعضای سالم و با کفایت جامعه\nتضعیف می‌کند. حتی برای کودکان ۱۸ ماهه می‌توان از کاشت حلزون استفاده کرد.\n\nکامپیوترها\nکامپیوترها و برنامه‌های آموزشی کامپیوتری به دانش‌آموزان دارای نقص شنوایی و نیز دانش‌آموزان\nشنوا در بازنمایی دیداری کمک می‌کنند. استفاده از کامپیوتر در کلاس‌های درس، دسترسی افراد به\nمحتوای درسی و برقراری ارتباط با دیگران را تسهیل می‌نماید. علاوه بر این، برنامه‌های مخصوصی\nنیز برای دانش‌آموزان ناشنوا تهیه شده‌اند و به آن‌ها کمک می‌کنند تا مهارت‌های خواندن و نوشتن را\nید بگیرند و بر هجی کردن با انگشتان و زبان اشاره تسلط پیدا کنند. در برنامه هجی کردن با\nانگشتان، کاربران دستکش ویژه‌ای می‌پوشند و حروف را هجی می‌کنند و کامپیوتر حروف هجی\nشده را به متن تبدیل می‌کند. مزیت این برنامه‌ها آن است که به اعضای خانواده و همسالان امکان\nمی دهند تا مهارت‌ها را تمرین کنند؛ بدون این که برای نظارت بر جلسات تمرین، متخصص حضور\nداشته باشد. افراد با آسیب شنوایی می‌توانند با استفاده از اینترنت در سایت‌های مختلف جستجو کنند\nو با دوستان و معلمان خود ارتباط برقرار کنند.\n\nوسایل ارتباط کمکی\nتا قبل از سال ١٩٦٤ افراد با آسیب شنوایی نمی‌توانستند از تلفن استفاده کنند. تا این که رابرت\nویت برشت فیزیکدان آمریکایی که خود ناشنوا بود در سال ١٩٦٤ دستگاهی را برای برقراری\nارتباط از طریق خط تلفن اختراع کرد و به تدریج ابزارهای ارتباط تلفنی برای ناشنوایان ساخته\n\nروان شناسی و آموزش کودکان و نوجوانان\n۲۶۰\nشدند. دورنویس‌ها۱ یا وسایل ارتباط از راه دور برای ناشنوایان سیستم تلفنی هستند که به\nکاربران امکان می‌دهند تا پیامی را در تلفن تایپ کنند. این وسایل، تلفن‌های متنی۲ نیز نامیده\nمی‌شوند. شماره‌های خاص (مانند (۱۱۸) به افرادی که دورنویس یا وسایل ارتباط از راه دور\nندارند کمک می‌کنند تا از طریق تلفن با افراد سخت شنوا ارتباط برقرار کنند. در این روش،\nاپراتورها نقش مترجم را بازی می‌کنند؛ آنها پیامهای نوشتاری را برای فرد شنوا میخوانند و\nپیامهای گفتاری افراد شنوا را برای افراد ناشنوا تایپ می‌کنند. تعداد زیادی از شرکتها و\nسازمان‌ها سیستم‌های تلفنی مخصوص به خود دارند و به اپراتور نیاز ندارند. قانون افراد\nآمریکایی دارای ناتوانی (۱۹۹۰) همه شرکتهای مخابراتی را ملزم می‌کند تا خدمات ویژه را\nبرای همیشه برای افراد ناشنوا فراهم نمایند.\nزیرنویس\nدر این روش، گفتگوهای برنامه تلویزیونی و فیلم‌ها به صورت زیرنویس در صفحه تلویزیون\nنمایش داده می‌شوند. استفاده از این روش در فیلم و سایر برنامه‌های تلویزیونی به افراد با\nآسیب شنوایی کمک می‌کند تا گفتار را درک کنند. بیشتر برنامه‌های سرگرم کننده، ورزشی و\nخبری زیرنویس پنهان دارند؛ یعنی بینندگانی که تلویزیون آنها به دستگاه رمزگشایی مجهز\nاست میتوانند زیرنویس‌ها را ببینند. از ژوئیه سال ۱۹۹۳ به بعد، همه تلویزیون‌های ۱۳ اینچ یا\nبزرگتر که در آمریکا فروخته یا تولید شده‌اند به تراشه زیرنویسی مجهز هستند که به بینندگان\nامکان می‌دهند تا زیرنویس‌های برنامه‌ها را ببینند (هاردمن، درو و اگن، ۲۰۰۵). افراد دارای\nنقص شنوایی با استفاده از زیرنویس‌ها می‌توانند از رویدادها و مسائل اجتماعی روز آگاه شوند.\nبسیاری از افراد شنوا در محیط‌های پر سرو صدا از برنامه‌های زیرنویس شده استفاده می‌کنند.\nهمچنین لازم به یادآوری است که معلمان در برنامه‌های آموزشی خود می‌توانند از فیلم‌های\nزیرنویس دار استفاده کنند.\n...writers (TTD)\n\nفصل هشتم: آسیب شنوایی\nوسایل هشداردهنده\nبیشتر وسایل هشداردهنده‌ای که برای افراد شنوا ساخته شده اند تغییر یافته‌اند تا افراد سخت\nشنوا بتوانند از آنها استفاده کنند. زنگ منزل و زنگ‌های دیگر به چراغ‌های هشدار دهنده تبدیل\nشده‌اند. بالش‌های لرزاننده به صدای ساعت زنگی واکنش نشان می‌دهند و فرد ناشنوا را\nبیدار می‌کنند. علائم هشدار دهنده آتش، هم به صورت دیداری و هم شنیداری عمل می‌کنند.\nکاتالوگ‌هایی وجود دارند که حاوی انواع مختلف وسایل هشدار دهنده ابتکاری و پیشرفته\nهستند. این کاتالوگ‌ها را می‌توان از متخصصانی که به افراد دارای نقص شنوایی خدمات\nمی‌دهند، درخواست کرد.\n\nفرهنگ ناشنوایان\nپس از پی بردن به این موضوع که زبان اشاره آمریکایی زبانی واقعی و مجزا است و تمام\nویژگی‌های یک زبان واقعی مانند گویش، زبان عامیانه، وام گیری از دیگر زبان ها و ... را دارد\nو تنها برگردان اشاره‌ای زبان انگلیسی نیست، مفهوم فرهنگ ناشنوایان شکل گرفت. برخی\nافراد ناشنوایان را اقلیتی جداگانه می‌دانند و ناشنوایی را مشخصه فرهنگی آن اقلیت تلقی\nمی‌کنند. آنهایی که به فرهنگ ناشنوایی باور دارند، ناشنوایی را \"صفت\" می‌دانند نه ناتوانی.\nتوجیه این باور آن است که افراد ناشنوا، مانند افراد عضو سایر گروه‌های فرهنگی، ویژگی‌های\nجسمی مشترک (ناشنوایی و نقص شنوایی)، زبان مشترک (زبان اشاره) و نیازهای مشترک\n(تغییرات ویژه در فرایند ارتباط) دارند. مدافعان فرهنگ ناشنوایی هنگامی که به جمعیت خاص\nخودشان اشاره می‌کنند، حرف اول کلمه ناشنوا (Deaf) را به صورت بزرگ می‌نویسند. آنها\nواژه Deaf را به عنوان صفت به کار می‌برند؛ یعنی، افراد ناشنوا کسانی هستند که نقص\nشنوایی دارند. برخی از ناشنوایان اصطلاح افراد ناشنوا را به کار می‌برند تا بر پیوند فرهنگی\nشان تأکید کنند (ترن بال و همکاران، ۲۰۰٤). اعضای جامعه ناشنوایان، زبان اشاره آمریکایی را\nزبان اول کودک ناشنوا می‌دانند و معتقدند که انگلیسی، زبان دوم وی محسوب می‌شود. آنها\nادعا می‌کنند که پس از این که کودک بر زبان اشاره آمریکایی تسلط یافت، انگلیسی را\nمی‌توان به عنوان زبان دوم آموزش داد.\n1. People who are deaf\n\n۲۶۲\nروان شناسی و آموزش کودکان و نوجوانان\nدر اصطلاح فرهنگی اجتماعی، جامعه ناشنوایان دارای زبان و فرهنگ مشترک (فرهنگ\nناشنوایان) است. فرهنگ ناشنوایان شامل زبان ارزش ها، رفتارها، و سنت های افراد ناشنوا\nاست. شاید زبان مشترک اعضای یک اقلیت فرهنگی مهمترین ویژگی شناسایی آن فرهنگ\nباشد. بنابراین زبان اشاره آمریکایی مهمترین ویژگی مشخصه مرتبط با فرهنگ ناشنوایان است.\nافراد ناشنوا زبان اشاره آمریکایی را به عنوان زبان انحصاری پذیرفته و تحسین می کنند و به\nفرهنگ ناشنوایان می بالند. البته تمام افراد دارای آسیب شنوایی خود را بخشی از فرهنگ\nناشنوایان می دانند. علاوه بر استفاده و ارزش بالای زبان اشاره آمریکایی، فرهنگ ناشنوایان\nدارای ویژگی های ارزشی دیگری نیز هست برای نمونه، اگرچه بسیاری از افراد ناشنوا از\nگفتار هنگام ارتباط با افراد دارای شنوایی بهنجار استفاده می کنند، فرهنگ ناشنوایان بهای\nزیادی به گفتار نمی دهد و در حقیقت حرف زدن را هنگام اشاره کردن رفتار مناسبی نمی داند.\nمتخصصان دیگر بیان کرده اند که آموزش تلفیقی اغلب موجب جدایی دانش آموزان ناشنوا از\nجامعه ناشنوایان می شود و آنها را در خطر انزوا، تنهایی و افسردگی قرار می دهد، زیرا ممکن\nاست بتوانند تنها با عده کمی ارتباط برقرار کنند. اگر دانش آموزان ناشنوا بتوانند با دیگر افراد\nناشنوا ارتباط پایداری ایجاد کنند، بیشتر احساس امنیت می کنند. در نتیجه بسیاری از افراد\nناشنوا با همتایان خود ارتباط های گسترده ای برقرار می کنند. این ارتباط موجب انتقال زبان\nاشاره و یادگیری فرهنگ ناشنوایی می شود.\nافراد ناشنوا معمولاً (و نه همیشه) گرایش به ازدواج با دیگر افراد ناشنوا دارند و ترجیح\nمی دهند کودکانی ناشنوا مانند خود داشته باشند. ارتباطات در جامعه ناشنوایان معمولاً همیشگی\nاست و افراد ناشنوا نوعاً دوستیهای دوران کودکی خود را حفظ می کنند. فعالیت های اجتماعی و\nگردهمایی ها روش مهم حفظ تماس، ارتباط، و تعامل با دیگر اعضای این فرهنگ است. در فرهنگ\nناشنوایان ارزش بالایی برای سازماندهی افراد ناشنوا وجود دارد. برای نمونه، انجمن های ناشنوایان\nسازمانهای مردم نهادی هستند که با فرهنگ ناشنوایان ارتباط تنگاتنگی دارند. آمریکا و کشورهای\nاسکاندیناوی (نروژ، فنلاند، دانمارک، سوئد، و ایسلند) کشورهایی هستند که فرهنگ ناشنوایان به\nطور فزاینده در آنها به رسمیت شناخته شده است.\nدر گذشته، انزوای خودخواسته ناشنوایان از جامعه شنوا نوعی مشکل اجتماعی در نظر\nگرفته می شد. برخی متخصصان این انزوا را طبیعی می دانند که ناشی از پیوند مشترکی است\nکه ناشنوایان از طریق زبان اشاره با هم برقرار کرده اند. با وجود این، زبان مشترک تنها یکی از\n\n۲۶۳\nبل هشتم: آسیب شنوایی\nجنبه های این پیوند است. ریگان (۱۹۹۲) عواملی دیگری را ذکر می کند که ممکن است.\nفرهنگ ناشنوایی را تأیید کنند. برای مثال، ناشنوایان یک گروه دو زبانه هستند که به زبان اشاره\nآمریکایی و زبان انگلیسی تکلم می‌کنند، مانند فرهنگ اسپانیایی که آنها نیز دو زبان مختلف\nدارند. در جامعه ناشنوایان، نگرشها و تصوراتی وجود دارند که در جامعه شنوایان رایج\nنیستند، مانند این دیدگاه که اختلالهای شنوایی بیماری یا ناتوانی نیستند و به درمان نیاز\nندارند (پاگلیارو،۲۰۰۱). اعضای جامعه ناشنوایان از همدیگر حمایت می‌کنند و معتقدند که با\nکار گروهی می‌توانند به بسیاری از منافع دست یابند، مانند دسترسی بیشتر به مشاغل مختلف،\nتصویب قانون برای زیرنویس کردن برنامه‌ها و فراهم بودن برنامه‌ فناوری کمکی در مکانهای\nعمومی، به سبب این که در مدارس شبانه‌روزی، ارزش‌های فرهنگی جامعه ناشنوایان به\nآسانی به افراد شنوا منتقل می‌شوند، نگرانی‌هایی در این باره وجود دارند که برخی سیاست\nگذاری‌ها مانند آموزش تلفیقی و جایدهی دانش‌آموزان ناشنوا در کلاس عادی به فرهنگ\nناشنوایی آسیب بزند. عده‌ای تلاش می‌کنند دوره‌هایی درباره تاریخ و فرهنگ ناشنوایی برای\nدانش‌آموزانی برگزار کنند که از جامعه ناشنوایان دور بوده‌اند و در مدارس غیرشبانه روزی\nتحصیل کرده‌اند (گوستاد و کلووین، ۱۹۹۲). موافقان و مخالفان آموزش فرهنگی جداگانه\nممکن است هیچگاه نتوانند با هم کنار بیایند. دکتر کینگ جردن، رئیس دانشگاه گالودت و تنها\nرئیس ناشنوای دانشگاه در جهان، درباره اختلاف نظر متخصصان درباره فرهنگ ناشنوایی\nچنین می‌نویسد:\nهر برچسبی که گروه خاصی را تعریف می کند،… گروه دیگری را نادیده می گیرد. در حالی که\nجامعه ناشنوایان افتخار فرهنگی در سطح جهان محسوب می‌شود، ممکن است برخی افراد\nناشنوا را که خودشان را عضو این جامعه نمی‌دانند، نادیده بگیرد. ما همیشه در حال تعریف و\nتغییر خود بوده و به دنبال زبان جدیدی هستیم که نشان دهنده دیدگاه گسترده ما باشد\n(جردن،۱۹۹۲؛ به نقل از امیری مجد، ۱۳۸۹).\nScanned\n\n۲۶۴\nخلاصه فصل\nانسانها از دوران جنینی تا لحظه های احتضار میتوانند بشنوند؛ بنابراین شنیدن نقش مهمی را\nدر تحول فرد بازی میکند و آسیب شنوایی نیز بسته به شدت و زمان بروز، تحول فرد را در\nکنشهای مختلف با مشکلاتی مواجه می سازد.\nآسیب شنوایی اصطلاح وسیعی است که افراد با آسیبهای خفیف تا عمیق را در بر می گیرد\nو طبقه بندیهای مختلفی از آن وجود دارد که عبارتند از ناشنوا، سخت شنوا، ناشنوایی مادرزادی\nناشنوایی اتفاقی ناشنوایی پیش زبانی- ناشنوایی پس زبانی. همچنین آسیب شنوایی را بر حسب سطح\nآستانه شنوایی نیز می توان به طبقه های خفیف، متوسط، نیمه شدید، شدید و عمیق تقسیم کرد.\nگوش از سه بخش بیرونی، میانی و درونی تشکیل شده است. آسیب در هر یک از بخش های\nگوش باعث ایجاد آسیب شنوایی در فرد میگردد. شایعترین علل نقص شنوایی پیش زبانی عبارتند از:\nسرخجه مادر، عامل وراثت، نارس بودن نوزاد و کم وزنی به هنگام تولد، عفونت های ویروسی و\nویروس سایتومگال مادرزادی. همچنین از عوامل ایجاد کننده آسیب شنوایی پس از اکتساب زبان\nمی توان به مننژیت، عفونت گوش میانی، نقش شنوایی ناشی از سر و صدا و عوامل ناشناخته اشاره کرد.\nبا توجه به این که حس شنوایی نقش بسیار مهمی در تحول انسان بازی می کند، آسیب\nشنوایی بسته به شدت زمان بروز تحول کنشهای اساسی فرد را با تأخیرهای مهمی مواجه\nمی سازد. به طور کلی افراد با آسیب شنوایی در درک زبان، تولید زبان و گفتار با دشواری هایی\nمواجه هستند. یادگیری گفتار و زبان شفاهی با شدت نقص شنوایی ارتباط مستقیم دارد. همچنین\nتوانایی مفهومی افراد ناشنوا به علت مشکلات در زبان شفاهی، نارسا است. نکته مهم در ارزیابی\nهوشی افراد ناشنوا استفاده از آزمونهای عملکردی به جای آزمونهای کلامی است. در صورت استفاده\nاز آزمونهای عملکردی در هوشبهر افراد عادی و ناشنوا تفاوت قابل ملاحظه ای وجود ندارد.\nآسیب شنوایی بر روی توانایی تحصیلی افراد تأثیر عمده ای میگذارد. خواندن مهمترین\nحوزهای است که آسیب می بیند میزان تأثیر آسیب شنوایی بر پیشرفت تحصیلی افراد، به شدت\nاختلال شنوایی سن شروع نقص شنوایی توانایی هوشی فرد وضعیت اجتماعی - اقتصادی\nخانواده و وضعیت شنوایی والدین بستگی دارد. افراد ناشنوا با توجه به مشکلات ارتباطی در\nمعرض خطر تنهایی هستند سازش یافتگی اجتماعی و شخصیتی دانش آموزان ناشنوا به میزان\nمهارتهای ارتباطی آنها بستگی دارد کودکان ناشنوایی که دارای والدین ناشنوا هستند نسبت\nبه کودکان ناشنوای دارای والدین شنوا از نمویافتگی اجتماعی بالاتری برخوردارند.\n\nفصل هشتم: آسیب شنوایی\n۲۶۵\nروش‌های برقراری ارتباط در افراد ناشنوا را می‌توان در سه مقوله کلی روش‌های دستی\n(تأکید بر ایما و اشاره)، روش‌های شفاهی (تأکید بر گفتار)، و ارتباط کلی یا هم زمان (استفاده\nهم‌زمان از زبان اشاره و گفتار) تقسیم نمود. در روش‌های دستی بر انتقال اطلاعات از طریق\nزبان اشاره تأکید می‌شود که به دو شیوه هجی کردن با انگشتان و استفاده از اشاره برای واژه‌ها\nیا مفاهیم صورت می‌گیرد. در روش‌های شفاهی بر انتقال زبان از راه گوش دادن و حرف زدن\nتأکید می‌شود. دو رویکرد مهم در روش‌های شفاهی عبارتند از رویکرد شنیداری/ کلامی و\nرویکرد شنیداری/ شفاهی. در نهایت این که در روش ارتباط کلی از تمامی روش‌ها مانند\nترکیب گفتار، نوشتار، ایما و اشاره، گفتارخوانی و شنیدافزاها برای برقراری ارتباط استفاده\nمی‌شود. روش ارتباط کلی برای دانش‌آموزان، آزادی عمل بیشتری را فراهم می‌کند.\nآخرین نکته در آموزش و توانبخشی افراد با آسیب شنوایی استفاده از فناوری‌های\nمختلف است. مهمترین فناوریها عبارتند از: سمعک، کاشت حلزون، کامپیوترها، وسایل\nارتباط کمکی، زیرنویس، و وسایل هشدار دهنده."}];

// utils
const norm = s => s.replace(/[\u064B-\u065F\u0670]/g,'').replace(/ي/g,'ی').replace(/ك/g,'ک').replace(/\s+/g,' ').trim();
const STOP = new Set(('و در به از با این آن که را برای تا هم یک های ها می شود شد است بود بر بی هر چه چون یا اگر همان بین نیز بلکه دارد ندارد دارند کرد کردن ای اند ام ات اش شان مان تان'.split(' ')));
function tokens(s){ return norm(s).split(/[^\u0600-\u06FFa-zA-Z0-9]+/).filter(w=>w && w.length>1 && !STOP.has(w)); }

// split all chapters into paragraphs
const PARAS = [];
DATA.forEach((ch,ci)=>{
  ch.text.split(/\n\s*\n/).forEach(p=>{
    const t = p.trim();
    if(t.length>40) PARAS.push({ch:ci, title:ch.title, text:t});
  });
});

function score(qTokens, para){
  const txt = norm(para.text);
  let s=0;
  qTokens.forEach(t=>{
    const re = new RegExp(t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');
    const m = txt.match(re);
    if(m) s += m.length * (1 + t.length/6);
  });
  return s;
}

function findBest(q, chapterFilter, k=3){
  const qt = tokens(q);
  if(!qt.length) return [];
  const pool = chapterFilter==null ? PARAS : PARAS.filter(p=>p.ch===chapterFilter);
  return pool.map(p=>({p,s:score(qt,p)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,k).map(x=>x.p);
}

function highlight(text, q){
  const qt = tokens(q);
  let out = text;
  qt.forEach(t=>{
    const re = new RegExp('('+t.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','g');
    out = out.replace(re,'<span class="hit">$1</span>');
  });
  return out;
}

// tabs
document.querySelectorAll('.tab').forEach(b=>{
  b.onclick = ()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    document.querySelectorAll('.pane').forEach(p=>p.style.display='none');
    document.getElementById(b.dataset.tab).style.display='';
  };
});

// chapter chips
function makeChips(container, onChange, allowAll=true){
  const el = document.getElementById(container);
  el.innerHTML='';
  const state = {v: allowAll ? -1 : 0};
  const items = allowAll ? [{i:-1,t:'همه فصل‌ها'}].concat(DATA.map((c,i)=>({i,t:c.title}))) : DATA.map((c,i)=>({i,t:c.title}));
  items.forEach(it=>{
    const c = document.createElement('span');
    c.className='chip'+(it.i===state.v?' on':'');
    c.textContent=it.t;
    c.onclick=()=>{state.v=it.i; el.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); onChange(state.v);};
    el.appendChild(c);
  });
  return state;
}
const askState = makeChips('chapsAsk',()=>{});
const quizState = makeChips('chapsQuiz',()=>{});

// ASK
document.getElementById('btnAsk').onclick = ()=>{
  const q = document.getElementById('q').value.trim();
  if(!q) return;
  const cf = askState.v===-1 ? null : askState.v;
  const hits = findBest(q, cf, 3);
  const card = document.getElementById('ansCard');
  const ans = document.getElementById('ans');
  const meta = document.getElementById('ansMeta');
  card.style.display='';
  if(!hits.length){
    meta.textContent='';
    ans.innerHTML='پاسخی در متن جزوه یافت نشد. کلیدواژه‌های سوال را تغییر دهید.';
    return;
  }
  meta.textContent = 'برگرفته از: ' + [...new Set(hits.map(h=>h.title))].join(' — ');
  ans.innerHTML = hits.map((h,i)=>'<div style="margin-bottom:14px"><b style="color:var(--neon)">◆ بخش '+(i+1)+' ('+h.title+'):</b><br>'+highlight(h.text,q)+'</div>').join('');
};

// QUIZ
function pickSentence(text){
  const sents = text.split(/[.!؟?\n]/).map(s=>s.trim()).filter(s=>s.length>60 && s.length<260);
  return sents.length ? sents[Math.floor(Math.random()*sents.length)] : null;
}
function pickKeyword(sent){
  const words = tokens(sent);
  const nouns = words.filter(w=>w.length>=4);
  if(!nouns.length) return null;
  return nouns[Math.floor(Math.random()*nouns.length)];
}
function makeQuestion(cf){
  const pool = cf==null ? PARAS : PARAS.filter(p=>p.ch===cf);
  for(let tries=0; tries<40; tries++){
    const p = pool[Math.floor(Math.random()*pool.length)];
    const sent = pickSentence(p.text);
    if(!sent) continue;
    const kw = pickKeyword(sent);
    if(!kw) continue;
    // build distractors: other keywords from other paragraphs
    const distr = new Set();
    let guard=0;
    while(distr.size<3 && guard++<80){
      const q = pool[Math.floor(Math.random()*pool.length)];
      const s2 = pickSentence(q.text);
      if(!s2) continue;
      const k2 = pickKeyword(s2);
      if(k2 && k2!==kw && !distr.has(k2) && k2.length>=3) distr.add(k2);
    }
    if(distr.size<3) continue;
    const blanked = sent.replace(new RegExp(kw,'g'),'ــــــ');
    const opts = [kw, ...distr];
    for(let i=opts.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[opts[i],opts[j]]=[opts[j],opts[i]];}
    return {q:blanked, opts, ans:kw, src:p.title};
  }
  return null;
}
document.getElementById('btnQuiz').onclick = ()=>{
  const cf = quizState.v===-1 ? null : quizState.v;
  const Q = makeQuestion(cf);
  const card = document.getElementById('qCard');
  const qt = document.getElementById('qText');
  const qo = document.getElementById('qOpts');
  const qf = document.getElementById('qFb');
  card.style.display='';
  qf.innerHTML='';
  if(!Q){ qt.textContent='امکان ساخت سوال از این فصل نیست، فصل دیگری انتخاب کنید.'; qo.innerHTML=''; return; }
  qt.innerHTML = '<span style="color:var(--muted)">('+Q.src+')</span><br>'+Q.q;
  qo.innerHTML='';
  Q.opts.forEach((o,i)=>{
    const b = document.createElement('div');
    b.className='opt'; b.textContent = String.fromCharCode(1632+i+1)+') '+o;
    b.onclick=()=>{
      if(o===Q.ans){b.classList.add('correct'); qf.innerHTML='<span style="color:#00ff88">✔ پاسخ درست است.</span>';}
      else{b.classList.add('wrong'); qf.innerHTML='<span style="color:#ff5577">✘ نادرست. پاسخ صحیح: <b>'+Q.ans+'</b></span>';
        [...qo.children].forEach(c=>{if(c.textContent.endsWith(Q.ans)) c.classList.add('correct');});
      }
      [...qo.children].forEach(c=>c.onclick=null);
    };
    qo.appendChild(b);
  });
};

// BROWSE
const chSel = document.getElementById('chSel');
DATA.forEach((c,i)=>{const o=document.createElement('option');o.value=i;o.textContent=c.title;chSel.appendChild(o);});
function renderChapter(){
  const i = +chSel.value;
  const q = document.getElementById('find').value.trim();
  let t = DATA[i].text;
  t = t.replace(/</g,'&lt;').replace(/\n/g,'<br>');
  if(q){
    const re = new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','g');
    t = t.replace(re,'<span class="hit">$1</span>');
  }
  document.getElementById('chText').innerHTML = t;
}
chSel.onchange = renderChapter;
document.getElementById('find').oninput = renderChapter;
renderChapter();
</script>
