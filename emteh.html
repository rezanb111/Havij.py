 موقعیتهای زندگی\nواقعی .است یک نمونه از سنجش اصیل مجموعه کار است مجموعه کار، جمع آوری نمونه\nهای کار دانش آموز است که در طول زمان انجام داده است. این روش شواهد وسیع تری را در\nارتباط با کار دانش آموز در اختیار میگذارد؛ شواهدی که به طور نزدیکی با مهارتهای\nزندگی واقعی ارتباط دارد.\nبا این حال سنجش از طریق مجموعه کار بسیار مشکل و زمان بر است هالاهان) و\nهمکاران (۲۰۰۵). معلمان باید به دانش آموزان بگویند که چه مواردی را باید در مجموعه کار\nقرار دهند و ملاک ارزیابی چیست. این روش اگر به درستی انجام شود منبع غنی از اطلاعات\nدرباره تواناییها و علایق دانش آموز در اختیار قرار می دهد. علاوه بر این مجموعه کار\nمی تواند ارزش خاصی برای دانش آموزانی که از لحاظ فرهنگی متفاوت هستند داشته باشد،\nزیرا تست های استاندارد شده ممکن است نتواند تواناییهایی واقعی آنها را منعکس کند (رودا\nو گارسیا ، ۱۹۹۷).\nویژگیهای افراد مبتلا به ناتوانی یادگیری\nه\nقبل از بحث درباره ویژگیهای افراد مبتلا به ناتوانی یادگیری باید یادآور شد که تنوع و یا\nتفاوت ویژگیهای آنها در دو سطح درون فردی و بین فردی قابل بحث است. در سطح\nتنوعات بین فردی در بین دانش آموزان مبتلا به ناتوانی یادگیری باید یادآور شد که برخی از\nآنها مشکلاتی را در ریاضی ،دارند برخی دیگر مشکلاتی را در هجی کردن و نظایر آن یک\nاصطلاح برای چنین گوناگونی بین فردی ناهمگنی است. اگر چه که ناهمگنی، مشخصه\nکودکان مربوط به همه گروه های با نیازهای ویژه است با این حال عبارت « هیچ دو نفری\nفصل چهارم ناتوانیهای یادگی\nدقیقاً مثل هم نیستند »\nاین ناهمگنی بزرگترین\nتنوعات درون ف\nتنوعاتی را در نیمرخ تا\nلحاظ خواندن دو یا سی\nکردن بسیار ضعیف تر\nتنوع درون فردی در\nعنوان یکی از ویژگی\nاست. در هر صورت\nبرخی از مهمترین و\nمشکلات تحصیلی\nمشکلات تحصیلی\nقابل مشاهده است\n(۱) خواندن خوا\nمفاهیم جدید یاد\nاز مهارتهای ا\nآنها است. در\nدر سالهای اخ\nآموزش رسمی\nبازشناسی و\nمی تواند در مـ\nورود به مدر\n---\n\nفصل چهارم: ناتوانی‌های یادگیری\nدقیقاً مثل هم نیستند»، به طور خاصی برازنده دانش‌آموزان مبتلا به ناتوانی یادگیری است.\nاین ناهمگنی بزرگ‌ترین چالش معلمان در آموزش این دانش‌آموزان است.\nتنوعات درون فردی به این مسئله اشاره دارد که کودکان مبتلا به ناتوانی یادگیری\nتنوعاتی را در نیمرخ توانایی‌های خود نشان می‌دهند. برای مثال یک کودک ممکن است از\nلحاظ خواندن دو یا سه سال بالاتر از سطح پایه خود عمل کند، ولی در نوشتن و یا حساب\nکردن بسیار ضعیف‌تر عمل کند. ساموئل کرک یکی از مؤثرترین افراد در حمایت از دیدگاه\nتنوع درون فردی در دانش‌آموزان مبتلا به ناتوانی یادگیری است. این دیدگاه اکنون نیز به\nعنوان یکی از ویژگی‌های مهم بسیاری از دانش‌آموزان مبتلا به ناتوانی یادگیری قابل‌پذیرش\nاست. در هر صورت با این توضیح درباره تنوعات بین فردی و درون فردی، به بررسی اجمالی\nبرخی از مهم‌ترین ویژگی‌های دانش‌آموزان مبتلا به ناتوانی یادگیری می‌پردازیم.\n\nمشکلات تحصیلی\nمشکلات تحصیلی مهم‌ترین شاخص ناتوانی‌های یادگیری است که در حوزه‌های مختلف زیر\nقابل مشاهده است:\n۱) خواندن: خواندن یکی از مهارت‌های اساسی است که ما را در دریافت و درک اطلاعات و\nمفاهیم جدید یاری می‌دهد. اغلب دانش‌آموزان مبتلا به ناتوانی یادگیری در یک یا چند سطح\nاز مهارت‌های اساسی مشکل دارند. اختلال در خواندن یکی از رایج‌ترین مشکلات در میان\nآنها است. در حدود ۹۰ درصد دانش‌آموزان مبتلا به ناتوانی یادگیری در خواندن مشکل دارند.\nدر سال‌های اخیر، شواهد نشان داده‌اند که اختلال در خواندن قبل از ورود به مدرسه و شروع\nآموزش رسمی شکل می‌گیرد (پاگت، ۱۹۹۸). عدم توانایی خردسالان در به کارگیری درست\nبازشناسی و تولید واج‌های مجزا می‌تواند پیش‌بینی‌کننده مشکلات خواندن باشد. این مشکل\nمی‌تواند در مشکلات تحصیلی کودکان هنگام ورود به مدرسه نمود پیدا کند. اغلب آنها در بدو\nورود به مدرسه، ابتدا در یادگیری صدای حروف مشکلاتی را نشان می‌دهند، سپس مشکلات\nآنها به بازشناسی حروف نوشتاری و کلمه‌های ساده نیز تعمیم می‌یابد، در نهایت در پایان پایه\nتحصیلی اول، ناتوانی یادگیری به طور معناداری نمایان می‌گردد.\n\n۱۵۴\nروان شناسی و آموزش کودکان و نوجوانان\nخواندن مهمترین مشکل بیشتر دانش آموزان مبتلا به ناتوانی یادگیری است. دانش آموزان\nبا ناتوانیهای خواندن احتمالا مشکلاتی را در سه جنبه خواندن یعنی رمزگشایی۱، سیالی۲ و\nدرک۳ دارند (هالاهان) و همکاران، ۲۰۰۵). رمزگشایی توانایی تبدیل نوشتار به زبان گفتاری\nاست. این توانایی تا حد زیادی به آگاهی واج شناختی۴ و آگاهی واجی۵ وابسته است. آگاهی\nواج شناختی، درک این نکته است که گفتار شامل واحدهای کوچک صدا مانند کلمات،\nسیلابها و آواها است ( پولن۶، ۲۰۰۲). کودکان با آگاهی واج شناختی درک می‌کنند که\nکلمات از صداها یا آواها تشکیل می‌شوند؛ مانند این که کلمه‌‌ی سلام از س ل ا م تشکیل شده\nاست.\nفصل چهارم: ناتوانی‌های\nگراوز (۱۹۹۲). برای مثال\nپیچیده کمتری استفاده مـ\nدر تولیدهای نوشتاری و\nویژگی‌های اصلی، تو\nزبان گفتاری. بسیاری\nمکانیکی و اجتماعی از\nمعناشناختی (معنای کلم\nو آمیختن صداها به یکد\nیادگیری گفتگـوکنـنـده‌هـا\nسکوتهای طولانی هم\n٤) ریاضی. به طور کل\nبررسی و مطالعه قرار\nتوانمندی فرد و پیشر\nریاضی فرد توجه چن\nشناسایی نمی‌گردند\nتوانایی‌های شن\nدانش آموزانی که مشکلاتی در رمزگشایی دارند به طور یکنواخت مشکلاتی در سیالی\nخواندن دارند. سیالی خواندن به توانایی خواندن بدون تلاش و آرام اشاره دارد. سرعت\nخواندن و توانایی خواندن با ابراز مناسب، مؤلفه‌های روانی خواندن هستند. مشکلات در سیالی\nخواندن دلیل اصلی مشکلات در درک خواندن در دانش آموزان است (گـود و\nهمکاران، ۲۰۰۱). درک خواندن توانایی به دست آوردن معنا از متن خواندن است.\n۲) زبان نوشتاری: افراد مبتلا به ناتوانی یادگیری اغلب مشکلاتی در یک یا بیشتر از یکی از\nحوزه‌های دست خط، هجی کردن، و ترکیب۷ دارند (هالاهان و همکاران، ۲۰۰۵). اگرچه که\nحتی بهترین دانش آموزان ممکن است از لحاظ دست خط کامل نباشند، با این حال انواع\nمشکلاتی که توسط برخی دانش آموزان مبتلا به ناتوانی یادگیری نشان داده می‌شود، بسیار\nشدیدتر است. کودکان مبتلا به ناتوانی یادگیری اغلب اوقات نویسنده‌های بسیار کندی هستند.\nهجی کردن می‌تواند مسئله مهمی باشد، زیرا مشکلاتی را در درک تطابق بین صداها و حروف\nبه وجود می‌آورد.\nروابط فضایی و استد\nدر ریاضی مؤثرند. آنی\nدر مهارتهای حساس\nمشکلات ادراکی\nعلاوه بر حوزه‌های مکانیکی‌تر دست خط و هجی کردن، دانش آموزان مبتلا به ناتوانی\nیادگیری به طور مکرر مشکلاتی را در جنبه‌های خلاق‌تر یعنی ترکیب کردن دارند (مونتاگ و\nنتایج مطالعات حا\n1. Decoding\n2. Fluency\n3. Phonological awarness\nادراکی/ دیداری\nمشکلاتی را در -\n\n۱۵۵\nفصل چهارم: ناتوانی های یادگیری\nگراوز (۱۹۹۲). برای مثال این دانش آموزان در مقایسه با همسالان عادی از ساختارهای جمله\nپیچیده کمتری استفاده میکنند مانند استفاده از بارگرافهای کمتر سازمان یافته عقاید کمتر\nدر تولیدهای نوشتاری و نوشتن داستانهایی که مؤلفههای مهم کمتری دارند مانند معرفی\nویژگی های اصلی، توصیف تعارض و حل آن هالاهان (و همکاران، ۲۰۰۵).\n۳) زبان گفتاری: بسیاری از دانش آموزان مبتلا به ناتوانی یادگیری مشکلاتی را در استفاده\nمکانیکی و اجتماعی از زبان دارند. آنها از لحاظ مکانیکی مشکلاتی را در نحو (گرامر)،\nمعناشناختی (معنای کلمه) و واج شناختی (توانایی شکستن کلمات به مؤلفههای آنها یعنی صداها\nو آمیختن صداها به یکدیگر برای ایجاد کلمه دارا هستند. به طور خلاصـه افـراد مبتلا بـه نـاتوانی\nیادگیری، گفتگوکننده های بسیار خوبی نیستند. برای مثال گفتگوهای این افراد به طور مکرر بــا\nسکوتهای طولانی همراه است و در پاسخدهی به جملات یا سوال های دیگران ماهر نیستند.\n٤) ریاضی: به طور کلی مشکلات ریاضی در دانش آموزان مبتلا به ناتوانی یادگیری کمتر مورد\nبررسی و مطالعه قرار گرفته است. حتی برای شناسایی این افراد و در بحث محاسبه تفاوت بین\nتوانمندی فرد و پیشرفت تحصیلی از عملکرد در خواندن استفاده می شود و به نمره های\nریاضی فرد توجه چندانی نمیگردد. به همین دلیل بیشتر دانش آموزان با مشکلات ریاضی\nشناسایی نمی گردند و خدمات آموزش ویژه را دریافت نمی کنند.\nتوانایی های شناختی متعددی بر مهارتهای ریاضی تأثیر دارند. توانایی های زبانی، درک\nروابط فضایی و استدلال از مهمترین تواناییهای شناختی محسوب میشوند که بر عملکرد افراد\nدر ریاضی مؤثرند. انواع مشکلات ریاضی در افراد مبتلا به ناتوانی های یادگیری عبارتند از: مشکلات\nدر مهارتهای حساب کردن راهبردهای حل مسئله شمارش مراحل محاسبه و مانند آن.\n\nمشکلات ادراکی و ادراکی/ حرکتی\nنتایج مطالعات حاکی از آن است که کودکان مبتلا به ناتوانی یادگیری دارای ناتوانایی های\nادراکی دیداری ٤ و یا شنیداری هستند کودک با مشکلات ادراک دیداری ممکن است\nمشکلاتی را در حل پازلها یا دیدن و به خاطر آوردن شکلهای دیداری داشته باشد. کودک با\n1. Montague & Graves\n\n۱۵۶\nروان شناسی و آموزش کودکان و نوجوانان\nمشکلات ادراک شنیداری (1) ممکن است مشکلاتی را در تمیز بین دو کلمه که شبیه هم هستند\n(مانند یارانه و رایانه) و پیروی از دستورالعملهای شفاهی داشته باشد. معلمان و والدین\nهمچنین گزارش می‌کنند که برخی دانش آموزان مبتلا به ناتوانی یادگیری مشکلاتی را در\nفعالیتهای فیزیکی از جمله مهارتهای حرکتی دارا هستند. مشکلات آنها ممکن است هم در\nمهارتهای حرکتی درشت (2) عضلات حرکتی بزرگ) باشد و هم در مهارتهای حرکتی\nظریف (3) عضلات حرکتی کوچک). مهارتهای حرکتی ظریف اغلب شامل هماهنگی سیستم\nهای دیداری حرکتی است (هالاهان و کافمن، ۲۰۰۹).\n\nمشکلات در توجه و فزون کنشی\nدانش آموزان با مشکلات توجه ویژگیهایی مانند حواس پرتی (4)، تکانشگری و فزون کنشی را\nنشان می‌دهند. بر اساس توصیف والدین و معلمان، این کودکان اغلب قادر نیستند بر روی یک\nتکلیف به مدت طولانی بمانند، در گوش دادن به دیگران شکست می‌خورند، بدون توقف\nصحبت می کنند و در برنامه‌ریزی فعالیتهای خود در داخل و خارج از مدرسه به طور کلی\nسازمان‌نایافته عمل می کنند (هالان و کافمن، ۲۰۰۹). اغلب اوقات مشکلات توجه در افراد مبتلا\nبه ناتوانی یادگیری به حدی است که برچسب نارسایی توجه/ فزون کنشی را نیز دریافت\nمی کنند. اختلال نارسایی توجه/ فزون کنشی با ویژگیهایی مانند نارسایی توجه، فزون‌کنشی و\nیا تکانشگری همراه است. بر اساس برآوردها، هم‌پوشی ۱۰ تا ۲۵ درصدی بین مقوله ناتوانی\nیادگیری و اختلال نارسایی توجه/ فزون کنشی وجود دارد (فورنس و کاوال، ۲۰۰۲).\n\nحافظه\nفصل چهارم: ناتوانی‌های یادگیری\nکوتاه مدت و حافظه کاری\nمشکلات در حافظه‌ی کوتاه و\nاز دیدن یا شنیدن آن است.\nکلماتی که به صورت دیداری\nحافظه‌ی کاری بر توانایی شنیدن\nخودانگیخته یک تکلیف شفاهی\nدر حین گوش دادن به دستورالعمل\nاست. مشکلات در حافظه‌ی\nمختلف مربوط می شود. به\nخاطر سپاری، نام‌ها را پیش‌بینی\nآموزان مبتلا به ناتوانی -\nنمی‌کنند. بنابراین باید این\nعملکرد تحصیلی آنها با -\n\nشناخت\nنارسایی در استفاده از راهبرد\nناتوانی یادگیری مشکلات را\nجنبه‌های مختلف تفکر و\nتفکر سازمان‌نایافته‌ای را نشان\nزندگی آنها در مدرسه و -\n\nفراشناخت\nمعلمان و والدین به خوبی آگاه هستند که دانش آموزان مبتلا به ناتوانی یادگیری مشکلاتی را\nدر به‌خاطرآوری تکالیف دارند. مشکلات واقعی حافظه در این دانش آموزان در یافته‌های\nپژوهشی متعدد نیز تأیید شده است. این دانش آموزان حداقل در دو نوع حافظه یعنی حافظه فرا شناخت (2) به توانایی\nیادگیری اشاره دارد. هم\nو توانایی در چگونگی\n\n1. Auditory perception\n2. Gross motor skills\n3. Fine motor skills\n4 Distractibility\n\nفصل چهارم: ناتوانی های یادگیری\n۱۵۷\nکوتاه مدت و حافظه کاری با مشکلاتی مواجه هستند اسوانسون و ساچز - لی (۲۰۰۱).\nمشکلات در حافظه کوتاه مدت شامل مشکلات در به خاطر آوری اطلاعات در مدت کوتاه بعد\nاز دیدن یا شنیدن آن است. به عنوان مثال افراد مبتلا به ناتوانی یادگیری در تکرار فهرستی از\nکلماتی که به صورت دیداری یا شفاهی ارائه میگردد، با مشکلاتی مواجه هستند. مشکلات در\nحافظه کاری بر توانایی شخص برای حفظ یا نگهداری اطلاعات در ذهن در حین انجام\nخودانگیخته یک تکلیف شناختی دیگر تأثیر می گذارد. تلاش برای به خاطر آوردن یک آدرس\nدر حین گوش دادن به دستورات در زمینه چگونگی رسیدن به آن یک نمونه از حافظه کاری\nاست. مشکلات در حافظه کودکان مبتلا به ناتوانی یادگیری به عدم استفاده آنها از راهبردهای\nمختلف، مربوط میشود. برای مثال افراد عادی به هنگام شنیدن فهرستی از کلمات جهت به\nخاطر سپاری، نام ها را پیش خود تکرار میکنند و یا آنها را مقوله بندی می کنند؛ ولی دانش\nآموزان مبتلا به ناتوانی یادگیری احتمالا از این راهبردها به طور خودبه خودی استفاده\nنمی کنند. بنابراین باید این راهبردها را آموزش ببینند که نتایج تحقیقات مختلف حاکی از بهبود\nعملکرد تحصیلی آنها با آموزش این راهبردها است.\n\nشناخت\nنارسایی در استفاده از راهبردهای مختلف در تکالیف حافظه نشان میدهد که کودکان مبتلا به\nناتوانی یادگیری مشکلاتی را در شناخت ۲ دارند شناخت اصطلاح وسیعی است که بسیاری از\nجنبه های مختلف تفکر و حل مسئله را شامل میگردد دانش آموزان با ناتوانی یادگیری اغلب\nتفکر سازمان نایافته ای را نشان میدهند که منجر به مشکلاتی در برنامه ریزی و سازماندهی\nزندگی آنها در مدرسه و خانه می گردد.\nفراشناخت\nفرا شناخت ۴ به توانایی شخص در تشخیص چگونگی یادگیری ارزیابی و کنترل فرایند\nیادگیری اشاره دارد. همچنین به آگاهی شخص از راهبردهای مورد نیاز برای انجام یک تکلیف\nو توانایی در چگونگی به کارگیری این راهبردها فراشناخت اطلاق میشود. خودنظم بخشی\n1. Swanson & Saches-Lee\n2. Cognition\n\nروان شناسی و آموزش کودکان و نوجوانان\n۱۵۸\nیک مؤلفه فراشناخت است. بر اساس دیدگاه بورکوسکی۱ و همکاران (۱۹۹۲)، خودنظم‌بخشی\nاصطلاح وسیعی است که به توانایی شخص در تنظیم رفتارهای خود اشاره دارد. قابلیت\nخودنظم‌بخشی به عنوان قلب فراشناخت در نظر گرفته شده است (غباری و حسین\nخانزاده، ۱۳۸۸). نتایج تحقیقات متعدد حاکی از آن است که دانش‌آموزان مبتلا به ناتوانی\nیادگیری در برخی زمینه فراشناختی مانند خودبازبینی۲ دارای ضعف هستند.\n\nمشکلات اجتماعی ـ هیجانی\nکودکان مبتلا به ناتوانی یادگیری مشکلات اجتماعی ـ هیجانی بیشتری را نسبت به کودکان\nعادی دارا هستند. آثار این مشکلات رفتاری در کودکان می‌تواند بادوام و تخریب‌گر باشد. در\nسال‌های اولیه، این کودکان اغلب توسط همسالان طرد شده و از خودپنداشت پایینی\nبرخوردارند (برایان، براستین و ارگول۳، ۲۰۰۴). یک دلیل برای مشکلات اجتماعی برخی از\nدانش آموزان مبتلا به ناتوانی یادگیری، نارسایی‌های آنها در شناخت اجتماعی۴ است. بدین معنا\nکه آن‌ها سرنخ‌های اجتماعی را اشتباه می‌خوانند و ممکن است احساس‌ها و هیجان‌های دیگران\nرا نادرست تفسیر کنند. برای مثال بیشتر کودکان می‌توانند بگویند که چه وقت رفتارشان\nدیگران را آزار می‌دهد، ولی دانش آموزان مبتلا به ناتوانی یادگیری برخی اوقات به گونه‌ای\nعمل می‌کنند که گویا از اثرات رفتارشان بر همسالان خود بی‌خبر هستند. آنها همچنین\nمشکلاتی در دیدگاه‌گیری۵ دارند یعنی در درک دیدگاه دیگران با مشکل مواجه هستند.\nالبته تمامی افراد مبتلا به ناتوانی یادگیری الزاماً مشکلات اجتماعی هیجانی را تجربه\nنمی‌کنند، بلکه در مقایسه با همتایان بهنجار خود بیشتر در معرض خطر هستند و درمان\nمشکلات آن‌ها مشکل‌تر و طولانی‌تر است. اغلب آن‌ها در کودکی از سوی همتایان خود طرد\nمی‌شوند و احساس خودپنداشت آنها بسیار تضعیف می‌گردد (اسریدهار و ون۷، ۲۰۰۱).\nمشکلات در تعامل اجتماعی در کودکانی که در تکالیف ریاضی، دیداری - فضایی، خود نظم\nبخشی و سازماندهی ضعف دارند، بیشتر مشاهده می‌شود (رورک۶، ۱۹۹۵؛ ورلینگ، هامفیرز، و\n\nفصل چهارم: ناتوانی‌های\nنانوک، (۱۹۹۹). نتایج\nغیر کلامی در مهارت\nمهارت‌ها نیم‌کره راست\nاین افراد همچنین در\nخطر خودکشی قرار می‌\nانگیزش\nبسیاری از افراد ممکن\nتوانایی‌های خودشان را\nاست تا درونی باشد نه\nشانس است تا عزت نفس\nاکتسابی گردند. در\nبسیار دشوار می‎‌نماید\n(مونتاگ، ۱۹۹۷).\nموقعیت جدید موفقیت\nاستیصال اکتسابی به\nیا پیچیده آن می‌رسند.\nهمچنین تجربه شکست\nاین چرخه به وجود می‌آورد\n\nملاحظات\nروش‌های\nتوجه به ....\nیکی از\n\n1. Borkowski\n2. Self monitoring\n3. Bryan. Burstein & Ergul\n\nفصل چهارم: ناتوانی های یادگیری\n۱۵۹\nناوک، (۱۹۹۹). نتایج پژوهش‌ها حاکی از آن است که افراد مبتلا به ناتوانی های یادگیری\nغیرکلامی در مهارت‌های ریاضی، دیداری- فضایی و لامسه‌ای مشکل دارند و مسئول این\nمهارت‌ها نیمکره راست است؛ بنابراین نارساکنش وری در نیمکره راست مغز آنها وجود دارد.\nاین افراد همچنین به علت طرد اجتماعی و انزوایی که ممکن است تجربه کنند، در معرض\nخطر خودکشی قرار دارند ،بندر، روزنکرانتر و کران، ۱۹۹۹ به نقل از هالاهان و کافمن (۲۰۰۹).\n\nانگیزش\nبسیاری از افراد مبتلا به ناتوانی یادگیری از لحاظ انگیزشی مشکلات اساسی دارند. آنها به\nتوانایی‌های خود در رویارویی با مشکلات زندگی ایمان ندارند و منبع مهارگری۳ در آنها بیرونی\nاست تا درونی به بیان دیگر آنها بر این باور هستند که زندگی آنها تحت مهار عوامل بیرونی مانند\nشانس است تا عوامل درونی مانند توانایی؛ به طوری که برخی اوقات ممکن است دچار استیصال\nاکتسابی گردند. آنچه که مشکلات انگیزش را برای معلمان، والدین و افراد مبتلا به ناتوانی یادگیری\nبسیار دشوار می سازد، رابطه متقابل بین مشکلات انگیزشی و شناختی در این دانش آموزان است\n(مونتاگ ،۱۹۹۷). این چرخه را می توان بدین صورت شرح داد: دانش آموز یاد می گیرد تا در هر\nموقعیت جدید بر اساس تجربه شکست، انتظار شکست را داشته باشد، سپس انتظار شکست (یا\nاستیصال اکتسابی) ممکن است موجب گردد دانش آموز به هنگام رویارویی با یک تکلیف مشکل\nیا پیچیده آن را رها سازد. در نتیجه نه تنها در یادگیری مهارت های جدید شکست می خورد، که\nهمچنین تجربه بد دیگری را داشته است؛ یعنی تقویت احساس استیصال وحتی بی ارزشی. بنابراین\nاین چرخه به همین صورت پیش می رود.\n\nملاحظات آموزشی\nروشهای آموزشی متعددی برای کودکان مبتلا به ناتوانی های یادگیری وجود دارد که باید با\nتوجه به حوزه ای که کودک در آن مشکل دارد و شدت مشکلات کودک از آنها بهره گرفت.\nیکی از مهمترین روشهای آموزش این کودکان تأکید بر فرایندهای شناختی مرتبط با\n\n1. Worliny, Humphires & Tannock\n2. Bender, Rosen krans & Crane\n\n۱۶۰\nروان شناسی و آموزش کودکان و نوجوانان\nیادگیری در آنها است. خود ازبیابی، خود پرسشگری ۲، خود تقویت گری ۲ و\nخودتصیح گری از مولفه‌های الگوی شناختی به حساب می‌آیند. بنابراین باید به دانش\nآموزان مهارتهای صحیح مطالعه کردن، مدیریت زمان، تقویت حافظه و ...۱ را آموزش داد.\nآموزش شناختی\nدر حالی که اصلاح رفتار بر اصلاح رفتارهای قابل مشاهده تمرکز می‌کند، آموزش شناختی ۴ با\nاصلاح فرایندهای تفکر غیرقابل مشاهده و بهبود مشکلات قابل مشاهده در رفتار تمرکز\nمی‌کند. آموزش شناختی در کمک به حل دامنه ای از مشکلات تحصیلی افراد مبتلا به ناتوانی\nیادگیری مؤثر بوده است (هالاهان و همکاران، ۲۰۰۵). آموزش شناختی شامل تغییر فرایندهای\nتفکر و فراهم کردن راهبردهایی برای یادگیری است. در این روش، معلم از یک برنامه درسی\nبسیار سازمان یافته بهره می‌گیرد که بر مشکلات یادگیری کودک تمرکز می‌کند. دامنه ای از\nتکنیک‌های مختلف تحت عنوان آموزش شناختی قابل بحث هستند که برخی از آنها در ایـن\nقسمت شرح داده خواهند شد.\n(۱) آموزش خود۱\nهدف از آموزش خود، آگاه ساختن دانش آموزان از مراحل متعدد تکالیف حل مسئله و مهار\nکلامی آن است. در این روش دانش آموزان به استفاده از موارد زیر تشویق می‌شوند:\nتعریف مسئله: چه چیزی را من باید انجام دهم؟\nبرنامه ریزی: چگونه می‌توانم این مسئله را حل کنم؟\nاستفاده از راهبرد: راهبرد پنج مرحله‌ای به من کمک می‌کند\nخود ارزیابی: چگونه دارم انجام می‌دهم؟\nتقویت خود ۲: من درست عمل کردم. کار خوبی بود.\nفصل چهارم: ناتوانی‌های یادگیری\n(۲) خود بازبینی\nخو بازبینی ۳ شامل دو مؤلفه\nرفتارهایی را ارزیابی می‌کن\nدانش آموز بعد از فعالیت\nتعداد پاسخ‌های صحیح -\nمی‌تواند برای سایر مهار\n(۳) تدریس دوجانبه\nروش تدریس دوجانبه\nبه خواندن و فهمیدن\n۱۹۸۴؛ پالینسکار، دیو\nدانش آموزان است که\nاست. معلم به تدریس\nمی‌دهد تا دانش آموز\nپیش بینی کردن، سو\nدانش آموزان را به\nکافمن، ۲۰۰۹).\nدر روش تد\nمی‌دهند. در مر\nبعد معلم چهار\nدانش آموزان قـ\n1. Self evaluation\n\nم و نوجوانان\nفصل چهارم: ناتوانی های یادگیری\n۱۶۱\n۱۶۱\nفصل چهارم: ناتوانی‌های یادگیری\n۲) خودبازبینی\nخود بازبینی ا، شامل دو مؤلفه خودارزیابی و ثبت کردن توسط خود است. دانش‌آموزان\nرفتارهایی را ارزیابی می‌کنند و سپس ثبت می‌کنند که آیا آن رخ داده است یا نه. به عنوان مثال\nدانش آموز بعد از فعالیت بر روی چند مسئله ریاضی، پاسخ‌هایش را بررسی کند و سپس\nتعدادِ پاسخ‌های صحیح خود را بر روی یک نمودار ثبت کند. دانش آموز از این روش\nمی‌تواند برای سایر مهارت‌های تحصیلی نیز استفاده کند (هریس و همکاران، ١٩٩٤).\n(۳) تدریس دوجانبه\nروش تدریس دوجانبه روشی است که برای کسب مهارت‌های شناختی و فراشناختی مربوط\nبه خواندن و فهمیدن در گروه‌های کوچک دانش آموزان ابداع شده است (پالینسکار و براون،\n١٩٨٤؛ پالینسکار، دیوید و براون (۱۹۸۹). این روش شامل یک گفتگوی تعاملی بین معلم و\nدانش آموزان است که طی آن روابط معلم - دانش آموز مشابه رابطه یک کارشناس و کارآموز\nاست. معلم به تدریج نقش خود را به عنوان تنها آموزش‌دهنده کاهش می‌دهد و اجازه\nمی‌دهد تا دانش آموز نقش مربی همکار را برای دوره کوتاه ایفا کند. معلم چهار راهبرد\nپیش‌بینی کردن، سؤال کردن، خلاصه کردن و روشن ساختن را الگودهی می‌کند و سپس\nدانش آموزان را به استفاده از آن راهبردها تشویق می‌کند و سرنخ ارائه می‌دهد (هالاهان و\nکافمن، ۲۰۰۹).\nدر روش تدریس دوجانبه معلم و دو الی چهار دانش آموز، یک گروه یادگیری را تشکیل\nمی‌دهند. در مرحله اول معلم و دانش آموزان متنی را بی‌صدا برای خود می‌خوانند. در مرحله\nبعد معلم چهار راهبرد فوق را در مورد متن خوانده شده اعمال می‌کند. سپس معلم به همراه\nدانش آموزان قسمت دیگری از آن متن را می‌خواند و یکی از دانش آموزان چهار راهبرد مورد\n\n۱۶۲\nروان شناسی و آموزش کودکان و نوجوانان\nنظر را اجرا می کند. در شرایطی که دانش آموزان نتوانند از راهبردهای مورد نظر استفاده کنند،\nمعلم با سرنخ و تشویق های لازم دخالت می کند.\nفرض تدریس دو جانبه این است که با گفتگوی فعال و سازمان یافته با همسالان، مشارکت\nدانش آموزان با مشکلات یادگیری افزایش خواهد یافت و قدرت درکشان بهبود می یابد (پالینسکار و\nلینک (۱۹۹۲) انتظار می رود که پردازش شناختی که بین یادگیرندگان در طی فعالیتهای یادگیری\nمشارکتی اتفاق می افتد در نهایت به پیشرفت تک تک دانش آموزان بیانجامد. این نکته که تحول\nشناختی فرد از طریق مشارکت در گروه های اجتماعی سازمان می یابد با دیدگاه ویگوتسکی همسو\nاست. همچنین گفته می شود که تدریس دو جانبه برای دانش آموزان با ناتوانی های یادگیری مؤثر است،\nزیرا آن از خود نظم بخشی و انگیزه حمایت می کند و یادگیری دانش آموز را با یک حس تفنن همراه\nمی سازد (بورکوسکی، ۱۹۹۲). به کارگیری موفق تدریس دوجانبه، مانند همه برنامه های مشارکتی به\nبازبینی مداوم دقیق گروه یادگیری بستگی دارد. معلم باید توجه نزدیکی به تعاملات دانش آموز و\nپیشرفت فردی داشته باشد و برای مداخله به هنگام ضرورت آماده باشد. تغییر عضویت گروه و یا\nفراهم کردن تدریس آشکار یا الگودهی ممکن است لازم باشد. معلمان باید مطمئن شوند که\nهدفهای تحصیلی خاص کسب شدند.\n\nآموزش مستقیم\nآموزش مستقیم۲ بر جزئیات فرایند آموزشی تأکید می کند. طرفداران آموزش مستقیم به جای\nتأکید بر ویژگیهای دانش آموز بر تحلیل نظام مند مفهومی که باید تدریس شود تأکید می کنند.\nیک مؤلفه مهم آموزش مستقیم، تحلیل تکلیف\" است. تحلیل تکلیف شامل شکستن مسائل\nتحصیلی به مؤلفه های آن است به طوری که معلمان بتوانند هر یک از بخش ها را به طور مجزا\nتدریس کنند و سپس به دانش آموزان یاد دهند تا بخش های مختلف را به منظور نشان دادن\nمهارت وسیع تر کنار هم قرار دهند.\nدامنه ای از برنامه های آموزش مستقیم در حوزه های خواندن، ریاضی و زبان وجود دارد\nانگلمان و همکاران (۱۹۹۱، ۱۹۸۹، ۱۹۸۸) که برای دانش آموزان مبتلا به ناتوانی یادگیری نیز\nمورد استفاده قرار گرفته اند. استفاده از این برنامه ها نه تنها نتایج معناداری را در سطح کوتاه\n\nفصل چهارم\nمدت به دنبال داشته است که\nاست (به نقل از هالاهان و کا\nآموزش راهبردهای مطل\nبا توجه به این که دانش آمـ\nخوبی استفاده نمی کنند بیـ\nراهبردهایی مانند یادداشت.\nمطالب، استفاده از چارت\nبسیاری از راهبردهای دیـ\nتحصیلی دانش آموزان.\n\nاستفاده از حواس مت\nیکی از روشهایی که\nکرد، استفاده از تمامی\nفرنالد است که در آن\nمثال کودک برای مـ\nمی نویسد. کودک ایـ\nکودک کلمه را تلفظ\nحرکتی)، یا این که\nمی کند (دیداری)،\nروش فرنال\nخاطرسپاری کلم\nبه رغم صرف و\nمؤثر است (بری.\nفرنالد تو\n۱. کلمه مورد\n۲. معلم کلمه\n\n۱۶۳\nفصل چهارم: ناتوانیهای یادگیری\nمدت به دنبال داشته است، که همچنین دستاوردهای تحصیلی درازمدت را نیز موجب شده\nاست (به نقل از هالاهان و کافمن، ۲۰۰۹).\nآموزش راهبردهای مطالعه\nبا توجه به این که دانش آموزان مبتلا به ناتوانیهای یادگیری مختلف از راهبردهای مطالعه به\nخوبی استفاده نمی کنند باید به آنها راهبردهای شناختی و فراشناختی را به خوبی آموزش داد.\nراهبردهایی مانند یادداشت برداری، تمرین و تکرار، مدیریت زمان، فعالیت مستقل، سازماندهی\nمطالب، استفاده از چارت و نمودار، خلاصه کردن مطالب، خط کشیدن زیر مطالب مهم، و\nبسیاری از راهبردهای دیگر از مواردی هستند که بر اساس تحقیقات مختلف، در بهبود عملکرد\nتحصیلی دانش آموزان مبتلا به ناتوانی یادگیری مؤثر بودند.\nاستفاده از حواس مختلف\nیکی از روشهایی که می توان به دانش آموزان مبتلا به ناتوانیهای مختلف یادگیری کمک\nکرد، استفاده از تمامی حواس در آموزش آنها است. یکی از روشهای چند حسی، روش\nفرنالد است که در آن از حواس دیداری، شنیداری، حرکتی و لمسی استفاده می گردد. به عنوان\nمثال کودک برای معلم داستانی را تعریف می کند و معلم برخی کلمات را روی تخته\nمی نویسد. کودک ابتدا کلمه را می بیند (بینایی)، سپس آن را از زبان معلم می شنود (شنوایی)،\nکودک کلمه را تلفظ می کند (شنوایی)، و در نهایت کودک کلمه را می نویسد (لمسی و\nحرکتی). یا این که دانش آموز کلمه را به کمک معلم می نویسد (لمسی/حرکتی)، به آنها نگاه\nمی کند (دیداری)، کلمه را با صدای بلند می گوید و می شنود (صوتی/شنیداری).\nروش فرنالد برای آموزش خواندن و نوشتن دانش آموزانی که در یادگیری و به\nخاطرسپاری کلمه ها مشکل دارند و دامنه واژگان آنها محدود است به کار می رود. این روش\nبه رغم صرف وقت زیاد، بر مهارتهای خواندن دانش آموزان با نارسایی های خواندن بسیار\nمؤثر است (بریس و آیر، ۱۹۷۰؛ ثورپی و باردن، ۱۹۸۵؛ به نقل از شکوهی یکتا و پرند، ۱۳۸۵).\nفرنالد توصیه می کند که معلمان روشهای زیر را به هنگام آموزش هجی کردن به کار گیرند:\n۱. کلمه مورد نظر روی تخته یا کاغذ به صورت مصور و رنگی نوشته شود\n۲. معلم کلمه را روشن و دقیق هجی کند و سپس کودک آن را به تقلید از مربی، هجی کند\n۳. به کودک فرصت داده شود تا کلمه را مطالعه کند\n---\n\n۱۶۴\nروان‌شناسی و آموزش کودکان و نوجوانان\n۴. پس از یادگیری، کلمه پاک شود و کودک دوباره با کمک معلم آن را بنویسد.\n۵. کاغذ تا گردد و کلمه برای بار دوم نوشته شود.\n۶. کلمه به طور مکرر توسط معلم در کلاس و محیط کودک مورد استفاده قرار گیرد.\nآموزش توسط همسالان\nپژوهش‌ها نشان دادند که مداخله با واسطه‌ی همسالان ۱ در تشویق کردن کودکان و تعمیم دادن\nمهارت‌ها از مداخله توسط بزرگسالان بسیار موفق‌تر بوده است. مداخله از طریق همسالان شامل\nیک یا چند دانش‌آموز می‌شود که همسن دانش‌آموز هستند (حسین خانزاده، ۱۳۸۹). در این تکنیک\nدانش‌آموز نقش معلم را برای سایر دانش‌آموزان ایفا می‌کند. از این روش می‌توان برای زمانی که\nمعلم مطالب درسی را توضیح داده است، به عنوان یک فعالیت کمکی به کار برد. در این روش\nدانش‌آموزان در گروه‌های دو نفره به یکدیگر آموزش می‌دهند. رویکرد آموزش توسط همسالان\nباعث بهبود روابط اجتماعی و عملکرد تحصیلی دانش‌آموزان می‌گردد.\nپژوهش‌ها به طور مداوم نشان دادند که مداخلات با واسطه همسالان فواید تحصیلی و\nبین‌فردی و اجتماعی برای طیفی از دانش‌آموزان شامل دانش‌آموزان با ناتوانی دارد (یوتلی،\nمورتویت و گرینوود ۱۹۹۷؛ ماهیادی، هارپر و مالت, ۲۰۰۱). شواهد حاکی از سودمندی\nروش مداخلات با واسطه همسالان در تسهیل آموزش تلفیقی دانش‌آموزان با ناتوانی شامل\nافزایش عملکرد تحصیلی، بهبود روابط بین‌فردی و پذیرش تفاوت‌های فردی است. به طور\nمشابه استفاده سیستماتیک از روش مداخلات با واسطه‌ی همسالان، یک راه‌حل مؤثر برای\nمعلمان در جهت تلاش برای غلبه بر چالش‌های آموزشی دامنه گوناگونی از دانش‌آموزان در\nکلاس‌های درس است.\nروش آموزش و مداخلات با واسطه همسالان می‌تواند با افراد و گروه‌های کوچک، بر\nاساس پایه سنی یا بر اساس پایه‌ی کلاس به کار رود. معلمان باید مطمئن شوند که آموزش و\nمداخلات با واسطه همسالان به درستی انجام می‌شود. همچنین بازبینی مکرر پیشرفت همه\nدانش‌آموزان برای تعیین این که آیا همه دانش‌آموزان به هدف‌های مورد نظر رسیده‌اند،\nفصل چهارم\nضروری است\nدانش‌آموز، اجر\nهمسالان مؤثر\nپژوهش\nنتایجی مانند\nمهارت‌های ا\nموارد اشاره\nـ به وجود\nـ افزایش ز\nـ کاهش نـ\nـ افزایش\nـ دانش آ\nـ به دانش\nـ این ر\nمتقابل فـ\nـ یادگی\nـ دیگ\nـ\nـ مشا\nـ فرد\nـ آی\nـ الـ\nـ\n\nفصل چهارم: ناتوانی های یادگیری\n۱۶۵\nضروری است واگن کلینگنر و برایانت (۲۰۰۱۰) به طور خلاصه برنامه ریزی دقیق آموزش\nدانش آموز، اجرای درست و بازبینی مکرر پیشرفت دانش آموز برای همکاری های موفق\nهمسالان موثر است.\nپژوهش ماهیادی، هارپر و مالت (۲۰۰۱) بر روی روش مداخلات با واسطه همسالان\nنتایجی مانند افزایش پیشرفت دانش آموز کاهش مسائل مربوط به مدیریت رفتار و افزایش\nمهارتهای اجتماعی را به دنبال داشته است. به طور کلی از فواید این روش می توان بـه ایــن\nموارد اشاره کرد:\n- به وجود آوردن محیطهای آموزشی که در آن یادگیرنده راحت است\n- افزایش زمان پاسخدهی به تکلیف مورد نظر توسط دانش آموز\n- کاهش نسبت معلم - دانش آموز به طوری که دانش آموزان بر یکدیگر تأثیر متقابل میگذارند\n- افزایش فرصتهایی برای دانش آموزان در جهت دریافت پسخوراند و تشویق\n- دانش آموزان روشهای مختلف آموزشی تدریس توسط همسالان را ترجیح میدهند\n- به دانش آموزان اجازه میدهد تا به صورت تک به تک به کمک دسترسی داشته باشند\n- این روش فرصتهایی را برای یادگیری و تعامل اجتماعی از طریق روشهای حمایتی\nمتقابل فراهم می کند\n- یادگیری را در بافت حمایتی ایجاد میکند و خودکارآمدی را بهبود میبخشد\n- دیگران را در انجام تکالیف کمک میکند\n- مشارکت یادگیرنده را در مواد آموزش و تکالیف افزایش میدهد\n- فرصتی را برای تمرین گسترده تر بر روی تکلیف نسبت به حالت عادی به وجود می آورد\n- این روش انعطاف پذیر بوده و از لحاظ هزینه مؤثر بوده و به آسانی اجرا میشود\n- الگودهی مهارتهای تحصیلی و اجتماعی توسط همسالان را ممکن می سازد\n- نگرشها را نسبت به دانش آموزان با ناتوانی بهبود میبخشد\n- روابط اجتماعی را افزایش میدهد و رفتار منفی را کاهش میدهد\n- مهارتهای تحصیلی را تقویت میکند\n- تعامل اجتماعی مثبت را تشویق میکند\n- فرصتی را برای تجربه ارزش یادگیری با هم و کمک به دیگران فراهم می کند\n\n۱۶۶\nروان شناسی و آموزش کودکان و نوجوانان\n- از نظر زمانی موثر است\n- برای همه سطوح توانایی موثر است\n- بهبودهای مهمی را از نظر عاطفی و در سطح مهارت ها برای فرد تدریس کننده و فرد\nتدریس شونده موجب می گردد\nهمچنین بر اساس شواهد پژوهشی مختلف تدریس خصوصی توسط همسالان تاثیرات\nمثبت معناداری را در زمینه های زیر به دنبال دارد:\n- عملکرد تحصیلی دانش آموزان (گارتنر و لیپزکی ، ۱۹۹۰)، به خصوص برای یادگیری و\nکاربرد مهارت های اساسی یا دانش واقعی\n۲\n- پذیرش اجتماعی دانش آموزان با ناتوانی و افزایش تعامل در میان دانش آموزان با ناتوانی و\nهمسالان عادی شان (فالتن و همکاران ١٩٩٤؛ به نقل از لورمن، دیلر و هاروی، ۲۰۰۵).\n- تحول عاطفی و مهارتهای اجتماعی برای تدریس کننده و تدریس شونده (فورمن،۲۰۰۰).\n٤\n- خودکارآمدی و نگرش های نسبت به یادگیری (کوهن، لوتان و کاتانزاریت، ۱۹۹۰).\n- تحول مهارتهای شناختی سطح بالاتر (مانند پالینسکار و بران، ١٩٨٤؛ واگن، کلینگنر و\nبرایانت، ۲۰۰۱).\n\nآموزش با استفاده از کامپیوتر\nآموزش مبتنی بر کامپیوتر در خواندن، نوشتن، ریاضیات، مهارتهای حرفه ای و سایر\nمهارت های کاربردی هنگامی تأثیر دارد که به عنوان تکمیل کننده آموزش سنتی به کار رود\n(بندر، ١٩٩٦). ویژگی های منحصر به فرد آموزش مبتنی بر کامپیوتر مانند زمان انتظار،\nپسخوراند فوری و ارائه چندرسانه ای آن، این قابلیت را دارد که به غنی شدن آموزش کودکان\nکمک کند. این واقعیت که دانش آموز به طور فعال در آموزش به کمک کامپیوتر درگیر می شود\nو تا حدی بر روی موقعیت یادگیری کنترل دارد، انگیزه وی را برای ماندن روی تکلیف\nافزایش می دهد. دانش آموزان در این روش در مقایسه با سایر روشها تمایل نیرومندی نشان\nمی دهند که یک تکلیف یادگیری را تکرار نمایند.\n\nF\nفصل چهارم: ناتوان\nآموزش هـ\nآموزشی، حل\nناتوانی های یا\nگام به گام در\nهاسل\nمهمترین کا\nتمرین و تـ\nریاضی یا\nیادگیری هـ\nتدریس\nفعالیت هـ\nمی کند.\nپردازش\nاست\nتفكر\nبالاتي\nشب\nتص\n\n۱۶۷\nفصل چهارم: ناتوانی های یادگیری\nآموزش های مختلفی را می توان از طریق کامپیوتر آموزش داد مانند مشق نویسی، بازی های\nآموزشی، حل مسئله، واژه پردازی و هجی کردن. این روش نه تنها برای دانش آموزان مبتلا به\nناتوانی های یادگیری که برای همه دانش آموزان مفید است. ارائه پسخوراند فوری و آموزش\nگام به گام دو ویژگی مهم استفاده از این روش است.\nهاسل برینگ و گوین (۱۹۸۹)؛ به نقل از غباری و حسین خانزاده، ۱۳۸۸)، رایج ترین و\nمهمترین کاربردهای آموزش مبتنی بر کامپیوتر را به ترتیب زیر شناسایی کردند:\nتمرین و تجربه: کامپیوتر برای فراهم کردن دامنه ای از فعالیت های عملی مانند انجام مسائل\nریاضی یا خواندن کلمات استفاده می شود. باید به خاطر داشت که فعالیت های تمرین و تجربه،\nیادگیری های پیشین را نسبت به آموزش مهارت های جدید تقویت می کند.\nتدریس همراه با تمرین: در این روش، برخی آموزش های اولیه رخ می دهند و سپس\nفعالیت های تمرینی به دنبال آن انجام می شود. معلم باید نوع راهبردهای آموزشی که استفاده\nمی کند را ارزیابی کند.\nپردازش کلمات: استفاده از برنامه های پردازش کلمات برای تولید فعالیت نوشتاری ممکن\nاست به توسعه مهارت های دانش آموزان در زبان نوشتاری کمک کند.\nتفکر و حل مسئله: برخی از برنامه ها و نرم افزارهای کامپیوتری می توانند در توسعه سطوح\nبالاتر تفکر و مهارت های حل مسئله، تمریناتی را فراهم کنند.\nشبیه سازی: شبیه سازی کامپیوتر از موقعیت های زندگی واقعی، به دانش آموزان کمک می کند تا\nتصمیماتی را بدون پیامدها و خطرات واقعی بگیرند.\nکامپیوتر و یا به طور کلی فن آوری همچنین می تواند برای ارائه آموزش و سرنخ های\nآموزشی به دانش آموزان در حوزه های غیر درسی کمک کند و باعث ایجاد انگیزه برای بسیاری\nاز دانش آموزان گردد.\nآموزش مهارت های اجتماعی\nمهارت های اجتماعی یک دانش آموز پیش بینی کننده سازش یافتگی های بعدی او است. فقدان\nمهارت های اجتماعی شاید مهمترین مانع برای یکپارچه سازی و موفقیت کامل در بافت های\n\nروان شناسی و آموزش کودکان و نوجوانان\n۱۶۸\nمدرسه و جامعه برای دانش آموزان با نیازهای ویژه باشد (ماتسون' و همکاران، ۲۰۰۹). برای\nکسب بهترین پیامدهای ممکن، افراد به مهارت‌های خاصی در حوزه‌هایی مانند ریاضیات، سواد\nآموزی، و زندگی مستقل نیاز دارند. با این حال این مهارت‌ها پیامدهای موفقیت‌آمیزی را در\nصورت فقدان مهارت‌های اجتماعی مناسب تضمین نمی‌کنند. مهارت‌های اجتماعی مناسب\nنوجوانان را قادر می‌سازند تا روابط مثبت و قوی با همسالان داشته باشند و در محیط‌های\nمختلف مانند مدرسه و محیط کار موفق باشند (حسین خانزاده، ۱۳۸۹ و ۱۳۹۰).\nبنابراین با توجه به این که اغلب دانش مبتلا به ناتوانی‌های یادگیری توسط همسالانشان طرد\nشده و از خودپنداشت پایینی برخوردارند، در شناخت اجتماعی ضعیف هستند، سرنخ های\nاجتماعی را اشتباه می‌خوانند و ممکن است احساس‌ها و هیجان‌های دیگران را نادرست تفسیر\nکنند، مشکلاتی در دیدگاه‌گیری دارند، و برخی از آنها از نظر اجتماعی طرد می‌شوند؛ آموزش\nمهارت‌های اجتماعی باید به عنوان یکی از محورهای عمده آموزش و توانبخشی‌ آنها محسوب\nگردد.\n\nمداخله اولیه\nدر سنین پیش‌دبستانی برای کودکان مبتلا به ناتوانی یادگیری، برنامه‌ریزی مناسبی وجود ندارد،\nزیرا شناسایی آنها در سنین پایین بسیار دشوار است. در این سنین بیشتر باید درباره پیش‌بینی\nاختلال ناتوانی یادگیری سخن گفت تا شناسایی. به عبارت دیگر از آن جایی که کودکان\nپیش‌دبستانی به طور معمول درگیر تحصیل نشدند، غیر ممکن است که بتوان به طور دقیق\nگفت که آنها از لحاظ تحصیلی عقب هستند و متأسفانه همیشه پیش‌بینی اختلال ناتوانی\nیادگیری نسبت به شناسایی این اختلال، کمتر دقیق است. حداقل دو مورد می‌تواند پیش‌بینی\nاختلال ناتوانی یادگیری را در سنین پیش‌دبستانی دشوار سازد:\n- در بسیاری از موارد اختلال ناتوانی یادگیری، مشکلات کودکان نسبتاً خفیف است. بسیاری\nاز این کودکان تا قبل از مواجه با تکالیف تحصیلی خاص مانند خواندن یا هجی کردن افراد\nشایسته‌ای به نظر می‌رسند. کودکان مبتلا به ناتوانی یادگیری به اندازه سایر کودکان با ناتوانی\nبه آسانی قابل شناسایی نیستند.\nفصل چهارم: ناتوانی‌های \n- اغلب تشخیص \nبسیاری از کودکان\nهمسالان خود برای \nبرخی متخصص\nکودکان پیش‌دبست\nخطر، استفاده کـ\nمی‌کنند بر این \nطرح‌هایی با م\nاختلال ناتوانی\nمهارت \nمانند شناسا\nآگاهی واجـ\nگفتار می‌تو\nکودکان ع\nپیش دبس\nابتدایی \nخلاص\nناتوانی\nبرچس\nاست \nافراد\nمو\nو\n\n۱۶۹\nفصل چهارم: ناتوانی های یادگیری\n- اغلب تشخیص تأخیر تحولی' و آنچه که صرفا یک کندی نمویافتگی نام دارد، دشوار است.\nبسیاری از کودکان عادی در سنین پایین از لحاظ پیشرفت تحولی کند هستند، اما به زودی با\nهمسالان خود برابری می‌کنند.\nبرخی متخصصان همچنین اعتقاد دارند که بهتر است از برچسب ناتوانی یادگیری برای\nکودکان پیش‌دبستانی استفاده نکرد و به جای آن از اصطلاحات تأخیر تحولی و یا در معرض\nخطر۲ استفاده کرد. متخصصانی که از برچسب ناتوانی یادگیری برای سنین پیش‌دبستانی حمایت\nمی‌کنند بر این عقیده هستند که شناسایی هرچه زودتر مشکلات خاص کودک باعث می‌گردد که\nطرح‌هایی با ماهیت درازمدت برای شرایط این کودکان در نظر گرفت. یکی از راه‌های پیش‌بینی\nاختلال ناتوانی یادگیری در سنین پیش‌دبستانی، استفاده از مهارت‌های پیش‌تحصیلی است.\nمهارت‌های پیش‌تحصیلی، رفتارهایی هستند که برای آموزش رسمی مورد نیاز هستند،\nمانند شناسایی اعداد، شکل‌ها و رنگ‌ها. یک مهارت پیش‌تحصیلی خاص برای خواندن،\nآگاهی واج‌شناختی است (تورگسن ،۲۰۰۲). آگاهی واج‌شناختی یعنی توانایی درک این‌که\nگفتار می‌تواند به واحدهایی صدایی کوچکتر مانند کلمات، سیلاب‌ها و آواها شکسته شود.\nکودکان عادی معمولا آگاهی واج‌شناختی را در سنین پیش‌دبستانی کسب می‌کنند. کودکان\nپیش‌دبستانی که مشکلاتی را در آگاهی واج‌شناختی نشان می‌دهند، به هنگام ورود به مدرسه\nابتدایی در معرض خطر ابتلا به ناتوانی‌های خواندن هستند.\nخلاصه فصل\nناتوانی یادگیری اصطلاحی است که اولین بار توسط ساموئل کرک (۱۹۶۳) به جای\nبرچسب‌هایی مانند نارساخوانی، دیرآموز، آسیب جزئی مغز، و ناتوانی ادراکی به کار رفته\nاست. شاخص اصلی در تعریف این اختلال، تفاوت بین پیشرفت تحصیلی و توانایی هوشی در\nافراد مبتلا به آن است. در افراد مبتلا به ناتوانی یادگیری، بین سطح پیشرفت واقعی و سطح\nمورد انتظار (که از طریق سن ذهنی فرد مشخص می‌گردد) تفاوت قابل ملاحظه یا معناداری\nوجود دارد.\n\n1. Developmental delay\n---\n\n۱۷۰\nروان شناسی و آموزش کودکان و نوجوانان\nسالها فرض بر این بود که ناتوانی یادگیری با آسیب‌های جزیی در مغز همراه است. اما\nدر حال حاضر اصطلاح نارسا کنش‌وری جایگزینِ آسیب با صدمه مغزی شده است. بدین معنا\nکه مغز افراد مبتلا به ناتوانی یادگیری به خوبی کار نمی‌کند. علاوه بر این عوامل ژنتیکی،\nتراتوژنها و عوامل پزشکی مختلف نیز در ایجاد ناتوانی‌های یادگیری مؤثرند.\nمیزان شیوع ناتوانی یادگیری در پسران در مقایسه با دختران به نسبت ۳ به ۱ بیشتر است. برخی\nمحققان این مسئله را به آسیب‌پذیری زیست‌شناختی در مردان و برخی دیگر از محققان آن را ناشی از\nسوگیری در ارجاع و برچسب‌گذاری می‌دانند. دو رویکرد مهم در شناسایی ناتوانی یادگیری عبارتند از:\nتفاوت پیشرفت-توانایی، پاسخ به مداخله یا پاسخ به درمان. رویکرد پاسخ به مداخله توسط دولت\nفدرال در تصویب مجدد قانون آموزش افراد ناتوانی در سال ۲۰۰۴ مطرح شد و هنوز در ابتدای راه\nاست و لازم است تحقیقات بیشتری درباره چگونگی به کارگیری آن صورت گیرد. برای سنجش\nناتوانی‌های یادگیری نیز می‌توان از تست‌های پیشرفت تحصیلی استاندارد، سنجش تکوینی، روش‌های\nسنجش غیررسمی، و سنجش اصیل (مانند مجموعه کار) استفاده نمود. در بحث ویژگی‌های افراد مبتلا\nبه ناتوانی‌های یادگیری باید یادآور شد که این افراد در مقایسه با یکدیگر از ویژگی‌های بسیار متفاوتی\nبرخوردار هستند و از ناهمگنی بسیار زیادی برخوردارند (تنوعات بین‌فردی). همچنین در سطح\nدرون‌فردی نیز ویژگی‌های آنها قابل بحث است. بدین معنا که کودکان مبتلا به ناتوانی یادگیری، تنوعات\nو تفاوتهای زیادی را در نیمرخ توانایی‌های خود نشان می‌دهند. به طور کلی ویژگی‌های افراد مبتلا به\nناتوانی یادگیری را می‌توان این گونه خلاصه کرد: مشکلات تحصیلی (خواندن، نوشتن، و حساب کردن)\n، مشکلات ادراکی، مشکلات توجه و فزون‌کنشی، مشکلات در حافظه و فراحافظه، نارسایی در\nمهارت‌های فراشناختی، و مشکلات اجتماعی-هیجانی.\nمهمترین راهبردهای مؤثر در آموزش کودکان مبتلا به ناتوانی‌های یادگیری عبارتند از:\nآموزش شناختی (آموزش خود، خودبازبینی، تدریس دوجانبه)، آموزش مستقیم، آموزش\nراهبردهای مطالعه، استفاده از حواس مختلف، آموزش توسط همسالان، آموزش با استفاده از\nکامپیوتر. همچنین با توجه به این که بسیاری از دانش‌آموزان مبتلا به ناتوانی‌های یادگیری\nتوسط همسالان طرد می‌شوند و در شناخت اجتماعی ضعف دارند، آموزش مهارت‌های\nاجتماعی نیز باید یکی از محورهای مداخله برای آنها به حساب آید. در نهایت این که\nشناسایی زودهنگام کودکان مبتلا به ناتوانی یادگیری بر اساس ارزیابی مهارت‌های\nپیش‌تحصیلی آنها و ارائه خدمات به هنگام در موفقیت درمان بسیار مؤثر است.\nهدف ها\nاز خواندن\n۱. تعریف\nنشانه ها\n۲. فرا\n۳. عو\n٤. و\n٥. ر"}, {"title": "فصل ۵ و ۶", "text": "روانشناسی و آموزش\nکودکان و نوجوانان\nبا نیازها ویژه\nتالیف:\nدکتر عباسعلی حسین خانزاده\n(استادیار روانشناسی دانشگاه گیلان)\n\nفصل پنجم\nنارسایی توجه / فزون کنشی\nهدف‌های یادگیری\nاز خواننده انتظار می‌رود پس از مطالعه مطالب این فصل بتواند:\n۱. تعریف اختلال نارسایی توجه/ فزون‌کنشی را به همراه ریخت‌های مختلف آن و\nنشانه‌های تشخیصی بیان نماید\n۲. فرایند سنجش و تشخیص اختلال نارسایی توجه/ فزون‌کنش‌ی را شرح دهد\n۳. عوامل ایجادکننده اختلال نارسایی توجه/ فزون‌کنشی را توضیح دهد\n٤. ویژگی‌های اختلال نارسایی توجه/ فزون‌کنشی را به کامل بیان نماید\n٥. راهبردهای مختلف در درمان اختلال نارسایی توجه/ فزون‌کنشی را شرح دهد\n\nقانون آموزش افراد با ناتوانی، کودکان مبتلا به اختلال نارسایی توجه/فزون کنشی ۱ را در طبقه\nجداگانه‌ای قرار داده است و از زمان تصویب مجدد قانون آموزش افراد با ناتوانی در سال\n۱۹۹۷ و ۱۹۹۱، کودکان مبتلا به این اختلال، بسته به نشانه‌های اختلال در طبقه «دیگر اختلال\nهای سلامتی»، ناتوانی‌های یادگیری یا آشفتگی‌های هیجانی قرار گرفتند و از آموزش ویژه\nبهره گرفتند. اختلال نارسایی توجه/فزون کنشی در همه گروه‌های فرهنگی، نژادی و\nاجتماعی-اقتصادی وجود دارد.\nافراد مبتلا به اختلال نارسایی توجه/فزون کنشی ممکن است دارای رفتارهای تکانشی،\nبی‌قراری۲ و نارسایی توجه باشند. آنها به سادگی دچار حواس‌پرتی می شوند و انرژی فراوانی\nدارند. دانش‌آموزان مبتلا به نارسایی توجه/فزون کنشی در مدرسه با مشکلات قابل توجهی\nروبرو هستند و همیشه برای معلمان چالش برانگیز هستند. بنابراین با توجه به اهمیت موضوع\nو تعداد رو به فزونی کودکان مبتلا به اختلال نارسایی توجه/فزون کنشی در مدارس، در این\nفصل به طور جداگانه به بررسی این اختلال پرداخته می شود.\n\nتعریف اختلال نارسایی/فزون کنشی\nبیشتر متخصصان به ملاک‌های تشخیص انجمن روان‌پزشکی آمریکا برای تشخیص اختلال\nنارسایی توجه/فزون کنشی استفاده می کنند. در طول سال‌ها محققان و متخصصان بحث کردند\nکه آیا این اختلال یک نشانگان واحد است یا زیرمقوله‌های مختلفی از آن وجود دارد. در نتیجه\nنام این شرایط در طول زمان تغییر کرده است. برای مثال برای سالیان متعدد، انجمن\nروان‌پزشکی آمریکا از اصطلاح کلی «اختلال نارسایی توجه ۳» برای همه افراد با این شرایط\n\n1. Attention deficit / hyperactivity disorder (ADHD)\n2. Restlessness\n3. Attention deficit disorder (ADD)\n\nروان شناسی و آموزش کودکان و نوجوانان\n۱۷۴\nاستفاده کرده است. آن همچنین از زیرمقوله های «اختلال نارسایی توجه همراه با فزون\nکنشی» و «اختلال نارسایی توجه بدون فزون کنشی» استفاده کرده است (هالاهان و\nکافمن، ۲۰۰۹).\nراهنمای آماری و تشخیص اختلال‌های روانی در حال حاضر از اصطلاح نارسایی\nتوجه/فزون کنشی به عنوان یک اصطلاح کلی استفاده کرده است و آن را به سه مقوله تقسیم\nکرده است: (۱) نارسایی توجه/فزون کنشی، غلبه بر نوع نارسایی توجه، (۲) نارسایی توجه/\nفزون کنشی، غلبه بر نوع فزون کنشی و تکانشگری، و (۳) نارسایی توجه/فزون کنشی، نوع\nترکیبی (انجمن روانپزشکی آمریکا، ۲۰۰۰).\nدر جدول ۵-۱ ملاک های تشخیصی اختلال نارسایی توجه/فزون کنشی بر اساس چهارمین\nراهنمای آماری و تشخیص اختلال‌های روانی - متن تجدید نظر شده ارائه شده است:\n\nجدول ۵-۱: ملاک های تشخیصی اختلال نارسایی توجه / فزون کنشی\n\nالف) وجود مورد ۱ یا ۲\n۱. نارسایی توجه: شش مورد یا بیشتر از نشانه‌‌های نارسایی توجه زیر را حداقل به مدت\nشش ماه و به شکل سازش نایافته و ناهماهنگ با سطح تحول نشان دهد:\n- اغلب نمی‌تواند به جزئیات توجه کند و از روی بی‌دقتی در کارهای مدرسه، شغلی یا سایر\nفعالیت ها اشتباه می‌کند\n- در انجام تکالیف و بازیها اغلب نمی‌تواند توجهش را حفظ کند\n- اغلب به نظر می‌رسد که وقتی به طور مستقیم مورد خطاب قرار می‌گیرد، نمی‌شنود\n- اغلب اوقات از دستورالعمل‌ها پیروی نمی‌کند و از عهده اتمام تکلیف‌های مدرسه، وظایف\nشغلی یا سایر فعالیت ها برنمی‌آید نه به خاطر رفتار تضادورزانه یا شکست در درک\nدستورالعمل‌ها)\n- اغلب در سازماندهی تکالیف و فعالیت ها ناتوان است\n- اغلب از مشارکت در تکالیفی که مستلزم فعالیت ذهنی مستمر است اجتناب کرده یا بیزاری\nو بی‌میلی نشان می‌دهد (مانند تکالیف مدرسه یا تکالیف خانه)\n\nفصل پنجم: نا\n- اغلب اشیای لازم برای\nتکالیف، مدرسه، مداد، کتاب\n- اغلب به راحتی توسط\n- در فعالیت‌های روزمره\n۲. فزون کنشی - تکانه\nرا حداقل به مدت شش\nفزون کنشی\n- اغلب دست و پاها\n- در کلاس یا دیگر\nمی‌کند\n- اغلب در جاهای\nو بزرگسالان ممکن\n- اغلب در بازی\n- اغلب در حال\n- اغلب زیاد حرک\nتکانشگری\n- اغلب قبل از\n- رعایت نوبت\n- اغلب حرف\nدیگران وارد\nب) برخی از\nسالگی وجه\nپ) برخی\nت) باید\nشغلی و\n\nفصل پنجم نارسایی توجه فزون کنشی\n۱۷۵\n- اغلب اشیای لازم برای انجام تکالیف و فعالیتها را گم میکند مانند اسباب بازیها،\nتکالیف مدرسه، مداد، کتاب یا سایر ابزارها)\n- اغلب به راحتی توسط محرکهای نامربوط دچار حواس پرتی می شود.\n- در فعالیتهای روزمره اغلب فراموشکار است.\n۲. فزون کنشی - تکانشگری: شش مورد یا بیشتر از نشانههای فزون کنشی - تکانشگری زیر\nرا حداقل به مدت شش ماه و به شکل سازش نایافته و ناهماهنگ با سطح تحول نشان دهد\nفزون کنشی\n- اغلب دست و پاهایش بی قرار است و در حالت نشسته وول می خورد\n- در کلاس یا دیگر موقعیتهایی که انتظار میرود یک جا بنشیند، اغلب صندلی خود را ترک\nمی کند\n- اغلب در جاهای نامناسب این طرف و آن طرف میرود یا بالا و پایین می پرد (در نوجوانان\nو بزرگسالان ممکن است به شکل احساس بی قراری باشد)\n- اغلب در بازی کردن یا مشارکت در فعالیتهای اوقات فراغت مشکل دارد\n- اغلب در حال حرکت است و به نظر میرسد که توسط موتوری به حرکت در می آید\n- اغلب زیاد حرف می زند.\nتکانشگری\n- اغلب قبل از تمام شدن سوالها، جواب می دهد\n- رعایت نوبت برایش دشوار است\n- اغلب حرف دیگران را قطع کرده یا مداخله می کند به عنوان مثال وسط گفتگو یا بازی\nدیگران وارد می شود)\nب) برخی از نشانه های فزون کنشی - تکانشگری یا نارسایی توجه منجر به اختلال قبل از ۷\nسالگی وجود داشته باشد\nپ) برخی از این نشانه در دو موقعیت یا بیشتر دیده می شوند\nت) باید شواهد آشکار درباره آسیب بالینی معنادار از لحاظ کنش وری اجتماعی، تحصیلی یا\nشغلی وجود داشته باشد\n\n۱۷۶\nروان شناسی و آموزش کودکان و نوجوانان\nث) نشانه ها منحصراً در طی دوره اختلال فراگیر تحولی اسکیزوفرنیا یا یا دیگر اختلالهای\nسایکوتیک رخ نمیدهد یا نمیتوان آن را با تشخیص اختلال روانی دیگر (مانند اختلال\nخلقی، اختلال اضرابی اختلال تجزیه ای یا اختلال شخصیت) بهتر تبیین نمود.\n\nکدگذاری بر اساس نوع:\nاختلال نارسایی توجه / فزون کنشی نوع مرکب اگر در شش ماه گذشته ملاک الف (۱) و (۲)\nوجود داشته باشد\nاختلال نارسایی توجه / فزون کنشی، غلبه بر نارسایی توجه اگر در شش ماه گذشته ملاک\nالف یک وجود داشته باشد ولی ملاک الف دو وجود نداشته باشد\nاختلال نارسایی توجه فزون کنشی، غلبه بر فزون کنشی - تکانشگری: اگر در شش ماه گذشته\nملاک الف دو وجود داشته باشد ولی ملاک الف یک وجود نداشته باشد. یادآوری برای افرادی\n(به خصوص نوجوانان و بزرگسالان که در حال حاضر نشانه هایی دارند که با ملاک های مطرح\nشده مطابقت کامل ندارد باید عبارت \" بهبودی نسبی \" ذکر شود.\n\nلازم به یادآوری است که اختلال نارسایی توجه فزون کنشی اغلب با سایر مشکلات رفتاری\nو یادگیری در فرد وجود دارد. دو نمونه از از اختلالهای همبود با اختلال نارسایی توجه فزون\nکنشی عبارتند از ناتوانی یادگیری و اختلالهای هیجانی - رفتاری مطالعات با استفاده از ملاکهای\nتشخیصی دقیق همپوشی ۱۰ تا ۲۵ درصد را بین نارسایی توجه فزون کنشی و ناتوانی های\nیادگیری نشان دادند (فورنس و کاوال، ۲۰۰۲). برخی متخصصان مطرح کردند که رابطه بین\nناتوانی های یادگیری و اختلال نارسایی توجه فزون کنشی که غلبه بر نارسایی توجه است،\nنسبت به ریختهای دیگر بیشتر است.\nهمچنین نتایج تحقیقات مختلف حاکی از آن است که همپوشی بین اختلال نارسایی\nتوجه فزون کنشی با برخی شکلهای اختلال هیجانی رفتاری از ۲۵ تا ۵۰ درصد است\nفرنس و کاوال، ۲۰۰۲)، برخی افراد مبتلا به نارسایی توجه فزون کنشی رفتارهای\nفصل پنجم: نارسایی توجه فزون کـ\nخاشگرانه و برون ریزی را نتـ\nکه همراه با اضطراب و افسرد\nپر\nمیزان شیوع\nمیزان شیوع اختلال نارسایی\n۱\n۱\nیک سوم تا یک دوم موارد\nاختلال است (ریچترز و\nجمعیت سنین مدرسه مبت\nسلامت روان، ۲۰۰۳). با\nتوجه فزون کنشی را به\nاین که چه تعداد دانش\nدریافت می\nکنند، دشوا\nدر هر صورت نا\n(دالی ، ۲۰۰۴). بر اساس\nکنشی دارای شیوع مت\nنارسایی توجه فزون\nنوع فزون کنشی - تک\nایگان، ۲۰۰۶).\nاین اختلال در\nا یا بالاتر (بارکلی\nاست بیشتر به عنوا\nکمتر به عنوان نارس\nگرایش دارند نوع\n\nفصل پنجم نارسایی توجه فزون کنشی\n۱۷۷\nپرخاشگرانه و برون ریزی را نشان میدهند، در حالی که برخی دیگر از آنها رفتارهای گوشه گیرانه را\nکه همراه با اضطراب و افسردگی است نشان می‌دهند (هالاهان و کافمن، ۲۰۰۹).\n\nمیزان شیوع\nمیزان شیوع اختلال نارسایی توجه/ فزون کنشی روز به روز در حال افزایش است. در حدود\nیک سوم تا یک دوم مواردی که به کلینیکهای راهنمایی ارجاع داده می شوند، برای همین\nاختلال است (ریچترز و همکاران (۱۹۹۵). بیشتر مؤلفان برآورد کردند که سه تا پنج درصد\nجمعیت سنین مدرسه مبتلا به اختلال نارسایی توجه/ فزون کنشی هستند (انستیتوی ملی\nسلامت روان، ۲۰۰۳). با این حال چون دپارتمان آموزش و پرورش ایالات متحده، نارسایی\nتوجه/ فزون کنشی را به عنوان یک مقوله مجزای آموزش ویژه در نظر نگرفته است، برآورد\nاین که چه تعداد دانش آموز مبتلا به نارسایی توجه/ فزون کنشی در آموزش ویژه خدمات\nدریافت می کنند، دشوار است.\nدر هر صورت نارسایی توجه/فزون کنشی رایج ترین اختلال در دوره کودکی است\n(دالی، ۲۰۰۴). بر اساس برخی دیدگاه‌ها، ریختهای مختلف اختلال نارسایی توجه فزون\nکنشی دارای شیوع متفاوت هستند، به طوری که بیشتر از نیمی از افراد مبتلا، نوع ترکیبی\nنارسایی توجه/ فزون کنشی، ۲۷ درصد مربوط به نوع نارسایی توجه، و ۱۸ درصد مربوط به\nنوع فزون کنشی - تکانشگری را دارا هستند (مک برنت، ۱۹۹۵؛ به نقل از هاردمن، درو و\nايگان، ۲۰۰۶).\nاین اختلال در پسرها با فراوانی بیشتری نسبت به دخترها رخ می دهد؛ یعنی نسبت ۵ به\n۱ یا بالاتر (بارکلی، ۱۹۹۸). این میزان شیوع منجر به این پیشنهاد شده است که پسرها ممکن\nاست بیشتر به عنوان نارسایی توجه فزون کنشی شناسایی شوند و یا دخترها ممکن است\nکمتر به عنوان نارسایی توجه فزون کنشی شناسایی شوند. برخی نیز مطرح کردند که پسران\nگرایش دارند نوع غلبه بر فزون کنشی یا تکانشگری را اغلب اوقات نشان دهند، ولی نوع غلبه\n\n1. Richters\n2. National Institute of Mental Health (NIMH)\n3. Daley\n4. Mc Burnett\n5. Barkley\n\nروان شناسی و آموزش کودکان و نوجوانان\n۱۷۸\nبر نارسایی توجه در دختران بیشتر است. بارکلی (۱۹۹۸) بر این باور است که تفاوتهای\nجنسیتی احتمالا ناشی از تفاوتهای سرشتی یا زیست شناختی است.\n\nسنجش\nفرایند سنجش و تشخیص اختلال نارسایی توجه/ فزون کنشی باید توسط متخصصان حوزه\nپزشکی روانشناسی و آموزش صورت گیرد؛ بنابراین متخصصان باید از مجموعه ای از\nداده های مختلف در تشخیص استفاده کنند. بیشتر متخصصان بر این باورند که چهار مؤلفه مهم\nباید برای سنجش و تشخیص اختلال نارسایی توجه/ فزون کنشی در دانش آموز در نظر گرفته\nشود: معاینه پزشکی، مصاحبه بالینی، مقیاس درجه بندی معلم و والدین، و مشاهدات رفتاری.\nمعاینه پزشکی برای بررسی شرایط پزشکی مانند تومورهای مغزی مشکلات تیرويید، یا\nاختلالهای صرع به عنوان علت نارسایی توجه و یا فزون کنشی ضروری است (بارکلی، ۱۹۹۸).\nمصاحبه بالینی با والدین و کودک اطلاعاتی را درباره ویژگیهای جسمانی و روانشناختی و\nپویایی های خانواده و تعاملات با همسالان فراهم میکند. اگرچه که مصاحبه برای تشخیص\nنارسایی توجه/ فزون کنشی ضروری است با این حال متخصصان بالینی باید ماهیت غیر طبیعی\nموقعیت مصاحبه را در نظر بگیرند. برخی کودکان مبتلا به این اختلال می توانند به طور\nفصل پنجم نارسایی توجه\nسبب شناسی\nدیدگاه های مختلفی درباره\nمتعددی در ایجاد این اختـ\nمختلف متخصصان در او\nناشی از صدمه مغزی نسر\nو PET به دانشمندان امت\nدست بیاورند. محققان ـ\nعصب شناختی نارسایی\nتوجه/ فزون کنشی همای\nعصب شناسی است تا\nاز آن است که وراثت\nایجاد نارساکنش وری\nنتایج بررسی با\nفرونتال، عقده های پای\n(کاستلانوس ، ۲۰۰۱؛\nمحققان دریافتند که ا\nفزون کنشی نسبت به\nاست که فعالیتهای\nفزون کنشی پایین است\nفرونتال مسئول کنت\nهمچنین عقده های\nاین که مخچه نیز\nنتایج تحقی\nمی تواند باعث ا\nشگفت انگیزی در موقعیت سازمان یافته و جدید مطب دکتر به صورت بهنجار رفتار کنند.\nمتخصصان همچنین برخی مقیاسهای درجه بندی را برای والدین و معلمان فراهم کردند که\nمعروف ترین آنها مقیاس درجه بندی نارسایی توجه/ فزون کنشی است که توسط کانرز تهیه شده\nاست و ویرایشهای مختلفی از این مقیاس برای معلمان و والدین وجود دارد (کانرز، ۱۹۸۹ الف و\nب و ۱۹۹۷). مقیاس درجه بندی نارسایی توجه/ فزون کنشی - ویرایش چهارم (دیوپال و\nهمکاران (۱۹۹۸) بر اساس ملاکهای چهارمین راهنمای آماری و تشخیص اختلال روانی ساخته\nشده است (به نقل از هالاهان و کافمن، ۲۰۰۹).\nدر صورت امکان متخصص بالینی باید دانش آموز را از لحاظ رفتاری مشاهده کند. این کار\nمی تواند در کلاس درس صورت گیرد یا این که متخصص بالینی که در تشخیص و درمان کودکان\nنارسایی توجه/ فزون کنشی تخصص دارد اتاقهای خاصی را در مرکز خود در نظر می گیرد و به\nدانش آموز تکالیفی برای انجام در آن اتاق ارائه میدهد که مستلزم حفظ توجه است.\n\nفصل پنجم: نارسایی توجه فزون کنشی\nسبب شناسی\n۱۷۹\nدیدگاه‌های مختلفی درباره سبب‌شناسی اختلال نارسایی توجه فزون‌کنشی وجود دارد. عوامل\nمتعددی در ایجاد این اختلال نقش دارند مانند ساختار مغز، عوامل ژنتیکی و عوامل محیطی\nمختلف. متخصصان در اوایل و اواسط قرن بیستم نارسایی توجه و فزون‌کنشی را به مشکلات\nناشی از صدمه مغزی نسبت می‌دادند. تحول تکنیک‌های تصویربرداری از نرون ها مانند MRI\nو PET به دانشمندان امکان داده است تا اندازه‌های مفصل‌تر و معتبرتری از کنش‌وری مغز به\nدست بیاورند. محققان با استفاده از این تکنیک‌ها شواهد زیادی را در ارتباط با پایه‌های\nعصب‌شناختی نارسایی توجه فزون‌کنشی پیدا کردند. محققان نشان دادند که اختلال نارسایی\nتوجه فزون‌کنشی همانند ناتوانی‌های یادگیری با احتمال زیاد ناشی از نارسا کنش‌وری\nعصب‌شناسی است تا آسیب مغزی واقعی. همچنین مشابه ناتوانی‌های یادگیری، شواهد حاکی\nاز آن است که وراثت به همراه تراتوژن‌ها و سایر عوامل پزشکی، نقش بسیار مهمی را در\nایجاد نارساکنش‌وری مغزی ایفا می‌کنند.\nنتایج بررسی با استفاده از تکنیک‌های تصویربرداری از مغز نشان داده است که لوب‌های\nفرونتال، عقده‌های پایه و مخچه در افراد مبتلا به نارسایی توجه فزون‌کنشی نابهنجار است\n(کاستلانوس ، ۲۰۰۱؛ کاستلانوس و همکاران، ۲۰۰۲؛ تیچر و همکاران، ۲۰۰۰). به طور خاص\nمحققان دریافتند که اندازه هر یک از این نواحی در کودکان و بزرگسالان مبتلا به نارسایی توجه\nفزون‌کنشی نسبت به افراد عادی کوچکتر است. علاوه بر این نتایج اسکن‌های PET نشان داده\nاست که فعالیت‌های متابولیکی در لب‌های فرونتال و عقده‌های پایه در افراد مبتلا به نارسایی توجه\nفزون‌کنشی پایین است (لو و همکاران، ۱۹۸۴ و ۱۹۸۹؛ به نقل از هالاهان و کافمن، ۲۰۰۹). لب‌های\nفرونتال مسئول کنش‌های اجرایی هستند. کنش‌های اجرایی یعنی توانایی فرد در تنظیم رفتار خود.\nهمچنین عقده‌های پایه مسئول هماهنگی و مهار رفتارهای حرکتی هستند (پینل ، ۲۰۰۳). در نهایت\nاین که مخچه نیز مسئول هماهنگی و مهار رفتار حرکتی است.\nنتایج تحقیقات گوناگون نشان داده است که نابهنجاری در انتقال‌دهنده‌های عصبی\nمی تواند باعث اختلال نارسایی توجه فزون‌کنشی گردد. انتقال‌دهنده‌های عصبی مواد شیمیایی\n\n1. Castellanos\n2. Teicher\n3. Lou\n4. Executive functions\n5. Pinel\n\n۱۸۰\nروان شناسی و آموزش کودکان و نوجوانان\nفزون کنشی نقش دارند (بارکلی، ۲۰۰۰ ب، سولانتو ، ۲۰۰۲).\nهستند که در ارسال پیامها بین نورونها در مغز نقش ایفا میکنند. محققان دریافتند که سطوح\nغیر عادی دو انتقال دهنده به نام های دوپامین و نوراپی نفرین در اختلال نارسایی توجه\nدر مورد نقش عامل وراثت تاکنون هیچ ژن یا ژنهای مشخصی که ممکن است در بروز\nنارسایی توجه فزون کنشی نقش داشته باشند شناسایی نشد. بارکلی (۱۹۹۸) در برسی مطالعات\nمختلف نتیجه گرفت که به طور کلی برادر یا خواهر کودک مبتلا به نارسایی توجه فزون کنشی\nهمین اختلال را دارا باشند. همچنین چندین مطالعه نشان داد که والدین کودکان مبتلا به نارسایی\nتوجه فزون کنشی در مقایسه با والدین کودکان بدون این اختلال دو تا هشت برابر بیشتر احتمال\nدارد که خود دارای این اختلال باشند (فاراوان و دویل ، ۲۰۰۱). همچنین مطالعات بر روی\nدوقلوهای یک تخمکی و دوتخمکی نیز نشان داده است که اگر یکی از دوقلوهای یک تخمکی،\nمبتلا به نارسایی توجه فزون کنشی باشد، با احتمال زیاد آن یکی نیز همین اختلال را دارا است. این\nاحتمال در دوقلوهای یک تخمکی بیشتر از دوقلوهای دو تخمکی است.\nفصل پنجم: نارسایی توجه \nمدل بار کلی از نارس\nحجم زیادی از پژوهش\nفزون کنشی نشان\nهمکاران، ۲۰۰۰؛ ویلک\nفزون کنشی را ارائه کر\nشکل بیان میکند که\nو مدیریت زمان به و\nمحور پایدار مختل مـ\n(۱) بازداری رفتاری\nتأخیر در پاسخ داد\nتوانایی بازداری از\nناگهانی در الزامات.\nحفظ پاسخ در مقـ\nدر نهایت این که تراتوژنها و عوامل پزشکی نیز میتوانند در ایجاد اختلال نارسایی\nتوجه فزون کنشی نقش ایفا کنند تراتوژنها عوامل سمی موجود در محیط هستند که در تحول\nطبیعی جنین اختلال ایجاد میکنند سرب دود سیگار و مصرف مشروبات الکلی توسط\nمادران باردار با بروز نارسایی توجه فزون کنشی همبستگی دارند. هر چند که نقش مواد سمی\nبه اندازه نقش وراثت در ایجاد نارسایی توجه فزون کنشی نیست، با این حال تأثیر آن را\nنمی توان نادیده گرفت. شرایط پزشکی مانند عوارض هنگام تولد و کم وزنی به هنگام تولد با\nاختلال نارسایی توجه فزون کنشی مرتبط هستند (میلبرگر و همکاران (۱۹۹۷).\nمشکلات در\nقطع کردن مکالمه.\nتأخیر در لذت جویی\nو آلسوپ ، ۲۰۰۱)\nکودکان مبتلا به نار\n(سمرود - كليكمن\nویژگی ها\nاگر چه که بسیاری از افراد فکر میکنند که نارسایی توجه ویژگیهای اصلی اختلال نارسایی\nتوجه فزون کنشی است، با این حال اجماع رو به افزایشی وجود دارد که نارسایی توجه، فزون\nکنشی و تکانشگری در واقع نتیجه مشکلات در بازداری رفتاری هستند.\n(۲) کنشهای اجر\nاجرایی ارجاع داد\nمی شوند و نتایج\n1. Solanto\n\nفصل پنجم: نارسایی توجه/ فزون کنشی\nمدل بارکلی از نارسایی توجه/ فزون کنشی\n۱۸۱\nحجم زیادی از پژوهشها مشکلات در بازداری رفتاری را در افراد مبتلا به نارسایی توجه/\nفزون کنشی نشان دادند (بارکلی، ۱۹۹۷، ۱۹۹۶ ،۲۰۰۰ الف ب؛ سمرود - کلیکمن۱ و\n۲\n،همکاران ۲۰۰۰؛ ویلکات و همکاران (۲۰۰۱). بارکلی مدل خاصی از تبیین نارسایی توجه/\nفزون کنشی را ارائه کرد که بازداری رفتاری عامل اصلی آن است. این مدل بر اساس ساده‌ترین\nشکل بیان می کند که مشکلات در بازداری رفتاری مشکلاتی را در کنش های اجرایی و آگاهی\n۳\nو مدیریت زمان به وجود می آورد که در نتیجه توانایی فرد برای مشارکت در رفتارهای هدف\n۴\nمحور پایدار مختل می گردد.\n(۱) بازداری رفتاری بازداری رفتاری شامل توانایی انجام دادن موارد زیر است:\n- تأخیر در پاسخ دادن\n- توانایی بازداری از تداوم پاسخ، در صورتی که فرد تشخیص دهد که پاسخ، به علت تغییرات\nناگهانی در الزامات تکلیف نامناسب است.\n۵\n- حفظ پاسخ در مقابل محرکهای حواس پرت کن یا متناقض (لارنس و همکاران، ۲۰۰۲).\nمشکلات در بازداری رفتاری می تواند در توانایی فرد برای انتظار نوبت، خودداری از\nقطع کردن مکالمه دیگران، مقاومت در مقابل حواس پرتی های بالقوه در حین کار کردن، یا\nتأخیر در لذت جویی فوری جهت به دست آوردن پاداشهای درازمدت، منعکس گردد (تریپ\n۶\nو آلسوپ ، ۲۰۰۱). علاوه بر این شواهد حاکی از آن است که مشکلات در بازداری رفتاری در\nکودکان مبتلا به نارسایی توجه/ فزون کنشی با نابهنجاریها در هسته دمی ۷ مغز ارتباط دارد\n(سمرود - کلیکمن و همکاران (۲۰۰۰).\n۸\n(۲) کنشهای اجرایی توانایی مشارکت در رفتارهای خود هدایت شده به عنوان کنشهای\nاجرایی ارجاع داده می شود. کنشهای اجرایی توسط لوب های فرونتال و پروفرونتال کنترل\nمی شوند و نتایج مطالعات با استفاده از تصویربرداری از نرونها نشان داده است که این نواحی\n\n1. Semrud - Clikman\n2. Willcutt\n3. Time awarness & managment\n4. Persisteent Goal-directed behavior\n5. Lawrence\n6. Tripp & Alsop\n7. Caudate\n8. Self- directed\n\n۱۸۲\nروان شناسی و آموزش کودکان و نوجوانان\nمغز در افراد مبتلا به نارسایی توجه فزون کنشی غیرعادی است. بر اساس مدل بارکلی افراد\nمبتلا به نارسایی توجه فزون کنشی مشکلاتی را در کنشهای اجرایی به چهار روش کلی\nدارند:\nاول این که آنها اغلب مشکلاتی را در حافظه کاری دارند. نارسایی در حافظه کاری در\nافراد مبتلا به نارسایی توجه فزون کنشی می‌تواند منجر به فراموشکاری، فقدان بازاندیشی و\nمشکلات در مدیریت زمان گردد.\nدوم این که افراد مبتلا به این اختلال به طور مکرر مشکلاتی را در گفتار درونی دارند.\nگفتار درونی، صدای درونی است که به افراد اجازه می‌دهد تا درباره راه حلهای گوناگون در\nموقع حل مسئله با خودشان صحبت کنند. دانش آموزان مبتلا به این اختلال که در گفتار\nدرونی مشکل دارند، مشکلاتی در هدایت کردن رفتار خود در موقعیت‌هایی که مستلزم پیروی\nاز مقررات یا دستور العمل هاست، دارا هستند.\nسوم این که کودکان و بزرگسالان مبتلا به نارسایی توجه فزون کنشی مشکلاتی را در مهار\nهیجان‌ها و سطوح برانگیختگی خود دارند. آنها اغلب بر تجربه های مثبت یا منفی، واکنش\nبیش از حد نشان می‌دهند. آنها با شنیدن یک خبر خوب ممکن است با صدای بلند جیغ بزنند\nو قادر به مهار هیجان خود نباشند.\nچهارم این که کودکان و بزرگسالان مبتلا به این اختلال مشکلاتی را در تحلیل مشکلات و\nمشارکت دادن راه حل ها با دیگران دارند. آنها به هنگام رویارویی با موقعیت های دشوار،\nاغلب به صورت تکانشی پاسخ می دهند، یعنی اولین پاسخی را که به ذهن آنها می آید بیان\nمی کنند.\n۳) آگاهی و مدیریت زمان بارکلی (۲۰۰۰ الف) مشکلاتی را در آگاهی و مدیریت زمان در\nافراد مبتلا به نارسایی توجه فزون کنشی پیدا کرده است. بارکلی می گوید \"درک زمان و\nچگونگی سازماندهی رفتارهایمان در قالب زمان یک عامل اصلی در درک نارسایی توجه\nفزون کنشی است\".\n٤) رفتارهای هدف محور پایدار بسیاری از مشکلات در کنش های اجرایی که توسط افراد\nمبتلا به نارسایی توجه فزون کنشی تجربه می شود به نارسایی هایی در مشارکت در فعالیت‌های\nهدف محور پایدار منجر می‌گردد. از دیدگاه بارکلی مشکلات توجه در اختلال نارسایی توجه\n\nفصل پنجم: نارسایی تو\nفزون کنشی نشانه اصل\nخودنظم بخشی یا مها\n\nمشکلات در سازش\nکودکان و نوجوانان ــ\nهمسالان با مشکلاتی\nهمسالان و حتی مع\nمختلف دارند و در\nمشکلات در بازدارـ\nشدت اختلال\nبرخی از افراد مبتلا\nعصبانی می‌شوند و\nنارسایی توجه فرد\nثابت نشان می‌دهنـ\nبه نارسایی توجه\nمانند کوکائین در\nبیدرمن و همکا\nاختلال که همزمـ\nهستند، بیشتر است\nمشکلاتی هستند\nدوستان کمی د\n\nمشکلات تحـ\nیکی\nزیادی را تجر\n\nفصل پنجم نارسایی توجه/ فزون کنشی\n۱۸۳\nفزون کنشی نشانه اصلی آن نیست، بلکه مشکلات توجه پیامد نارسایی در بازداری رفتاری و\nخود نظم بخشی با مهار اجرایی رفتار است.\n\nمشکلات در سازش یافتگی اجتماعی\nکودکان و نوجوانان مبتلا به نارسایی توجه/ فزون کنشی اغلب در برقراری روابط اجتماعی با\nهمسالان با مشکلاتی مواجه هستند. رفتارهای چالش برانگیز آنها باعث طرد آنها از سوی\nهمسالان و حتی معلمان آنها می گردد. این افراد همچنین مشکلاتی را در مهارتهای سازشی\nمختلف دارند و در نتیجه دوستان بسیار اندکی دارند. افراد مبتلا به این اختلال به علت\nمشکلات در بازداری رفتاری و هیجانی توسط دیگران، گستاخ نگریسته می شوند.\nشدت اختلال در برقراری روابط اجتماعی بسیار مؤثر است و دارای پیامدهای متفاوتی است.\nبرخی از افراد مبتلا به این اختلال زمانی که سعی میکنند دوست پیدا کنند، به طور فزاینده ای\nعصبانی می شوند و حتی فرد مقابل را بیشتر آزار میدهند. تقریباً ۷۵ درصد کودکانی که تشخیص\nنارسایی توجه/فزون کنشی را دریافت میکنند، نشانه های رفتاری پرخاشگری و نافرمانی را به طور\nثابت نشان میدهند. همچنین نتایج تحقیقات نشان داده است که مصرف مواد مخدر در افراد مبتلا\nبه نارسایی توجه/فزون کنشی زیاد است. احتمال مصرف مشروبات الکلی یا وابستگی به داروهایی\nمانند کوکائین در افراد مبتلا به نارسایی توجه/فزون کنشی دو برابر بیشتر از افراد عادی است\n(بیدرمَن۱ و همکاران، ۱۹۹۸؛ لامبرت و هارت سوگ۲، ۱۹۹۸). این احتمال در نوجوانان مبتلا به این\nاختلال که همزمان دارای اختلالهای دیگری مانند رفتارهای پرخاشگرانه و آسیب های اجتماعی\nهستند، بیشتر است. به طور خلاصه افراد مبتلا به این اختلال در سازش و همراهی با دیگران دارای\nمشکلاتی هستند، در نتیجه در برقراری روابط با همسالان شکست میخورند و در بیشتر اوقات\nدوستان کمی دارند و آنها را رنج میدهند.\n\nمشکلات تحصیلی\nیکی از حوزه هایی که دانش آموزان مبتلا به نارسایی توجه/فزون کنشی در آن مشکلات\nزیادی را تجربه می کنند، مشکلات تحصیلی است. دانش آموزان مبتلا به این اختلال در کلاس های\n\n1. Biederman\n2. Lambert & Hartsough\n\n۱۸۴\nروان شناسی و آموزش کودکان و نوجوانان\nفصل پنجم: نارسایی توجه\nاین است که مدیریت رفتار\nداده شود، زیرا کودک بیشتر\nوضعیت رفتاری او مستعد\nبه‌کارگیری روش‌های\nبیش‌فعالی/فزون کنشی می‌تواند مفهوم\nمسئله را یاد بگیرد و توجه\nوالدین و آموزش خود و\nو\nحد زیادی بهبود ببخشد.\nنکته دیگر ساماندهی\nدانش آموزان در کلاس\nتوجه/فزون کنشی باعث\nداشته باشند و برخی از\nمعلمان باید تکالیف مناسب\nنارسایی توجه/فزون کنشی\nصورت کتبی به آنها ارائه\nدر نهایت این مطالعه\nارتباط چشمی مناسب\nتکنیک‌های اصلاحی\nدرس به کار ببرند.\nدر مجموع متخصصین\nمختلف مانند پزشک، روانشناس\nمنظم و دقیق در آموزش\nباشند. ترکیب روشهای\nدرس به علت مشکلات توجه، از پیشرفت تحصیلی بالایی برخوردار نیستند. تکرار پایه\nتحصیلی در آنها فراوان است. مشکلات تحصیلی در آنها اغلب بر عزت نفس آنها نیز تاثیر\nمی‌گذارد و احتمال بروز مشکلات بیشتر را در آنها افزایش می‌دهد. بیشتر از ۱۰ تا ۳۰ درصد\nاز آنها ممکن است نتوانند از دبیرستان فارغ التحصیل گردند و مشکلات تحصیلی آنها اغلب\nدر سال‌های اولیه ورود به مدرسه آشکار می‌شود لاهی و همکاران، ۱۹۹۸؛ به نقل از شکوهی،\nیکتا و پرند، ۱۳۸۴).\n\nمداخله‌های آموزشی و درمانی\nدرمان مؤثر اختلال نارسایی توجه/فزون‌کنشی شامل در نظر گرفتن رویکرد تیمی،\nبین‌رشته‌ای و ترکیبی از روش‌های گوناگون است. مداخله‌های لازم برای این اختلال در دو\nمقوله کلی رفتاری و پزشکی قرار می‌گیرند. داروهای محرک مانند متیل‌فنیدیت و\nدگزآمفتامین تقریباً در سه چهارم کودکان مبتلا به نارسایی توجه/فزون‌ کنشی مؤثر است.\nمتیل‌فنیدیت دارویی با تأثیر کوتاه مدت است و به طور معمول در ساعت‌های مدرسه مورد\nاستفاده قرار می‌گیرد تا کودک بتواند در کلاس درس بماند و تمرکز کند. شایع‌ترین عوارض\nاین دارو عبارتند از سردرد، دل درد، تهوع و بی‌خوابی. برخی کودکان، اثر واکنشی به این دارو\nنشان می‌دهند یعنی برای دوره کوتاهی پس از تمام شدن دارو، نشانه‌های فزون‌کنشی در آنها\nافزایش می‌یابد. همچنین مصرف متیل‌فنیدیت ممکن است امکان وقفه در تحول فرد را موجب\nگردد، بنابراین باید مصرف دارو در آخر هفته یا تابستان متوقف گردد تا تحول طبیعی حاصل\nگردد.\nدگزآمفتامین به هنگامی که متیل‌فنیدیت مؤثر واقع نشود، به طور معمول به عنوان داروی\nردیف دوم تجویز می‌شود. نکته جالب این است که مصرف یک دارو ممکن است برای یک کودک\nمبتلا به نارسایی توجه‌فزون‌ کنشی مؤثر واقع گردد، ولی همان دارو برای کودک دیگر مؤثر نباشد.\nدارودرمانی فقط دانش آموز را برای یادگیری آماده می‌کند و به تنهایی نمی‌تواند موجب\nبهبود یادگیری و پیشرفت دانش آموز گردد. مداخله‌های رفتاری در سال‌های اخیر پیشرفت و\nموفقیت بسیاری داشته است. شیوه‌های مختلفی را می‌توان برای رویکرد رفتاردرمانی به کار\nبرد، مانند تقویت مثبت و منفی، شکل دهی، رفتارها، الگودهی۲، زنجیره‌سازی۳. نکته قابل توجه\n\n1. Shaping\n2. Modeling\n3. Chaning\n\n۱۸۵\nفصل پنجم: نارسایی توجه فزون کنشی\nو آموزش کودکان و نوجوانان\nر نیستند. تکرار پایه \nنفس آنها نیز تأثیر\nر از ۱۰ تا ۳۰ درصد\nتحصیلی آنها اغلب\n؛ به نقل از شکوهی\nاین است که مدیریت رفتار و تکنیک‌های اصلاح رفتار باید به والدین به طور کامل آموزش\nداده شود، زیرا کودک بیشتر زمان‌های شبانه‌روز را در خانواده به سر می‌برد و والدین از\nوضعیت رفتاری او مستأصل می‌گردند.\nبه کارگیری روش‌های شناختی/ رفتاری نیز برای برخی افراد مبتلا به نارسایی توجه/\nفزون‌کنشی می‌تواند مفید باشد. در این روش به کودک کمک می‌شود تا مهارت‌های حل\nمسئله را یاد بگیرد و توانایی خودمهارگری۲ را افزایش دهد. به نظر می‌رسد که ترکیب آموزش\nوالدین و آموزش خودمهارگری به همراه دارودرمانی و رفتاردرمانی بتواند وضعیت کودک را تا\nحد زیادی بهبود ببخشد.\nفتن رویکرد تیمی،\nبن اختلال در دو\nد متیل فیندیت و\nشی مؤثر است.\nی مدرسه مورد\nح‌ترین عوارض\nنشی به این دارو\nن کنشی در آنها\nفرد را موجب\nطبیعی حاصل\n۲\nنکته دیگر ساماندهی کلاس درس است. چینش صندلی‌ها در کلاس و شیوه گروه‌بندی\nدانش‌آموزان در کلاس درس باید به گونه‌ای باشد که تکانشگری کودک مبتلا به نارسایی\nتوجه/ فزون‌کنشی باعث مزاحمت دیگران نگردد. معلمان باید قواعد و برنامه‌های روشنی\nداشته باشند و برخی زمان‌ها به کودک مبتلا اجازه دهند که بایستد یا بیرون برود. همچنین\nمعلمان باید تکالیف و دستورالعمل‌ها را به صورت گام به گام برای دانش‌آموز مبتلا به\nنارسایی توجه/ فزون‌کنشی ارائه کنند. دستورالعمل‌ها باید هم به صورت شفاهی و هم به\nصورت کتبی به آنها داده شود.\nدر نهایت این که استفاده از نرم‌افزارهای آموزشی و رایانه در کلاس درس، برقراری\nارتباط چشمی مناسب با دانش‌آموز، ارتباط مناسب با والدین و شناخت و به کارگیری\nتکنیک‌های اصلاح رفتار، از فعالیت‌های دیگری است که معلمان باید در کلاس‌های\nدرس به کار ببرند.\nدر مجموع می‌توان چنین نتیجه‌گیری کرد که مجموعه‌ای از افراد با تخصص‌های\nمختلف مانند پزشک، روانشناس، معلم و مدیریت مدرسه به همراه معلم باید با یک برنامه\nمنظم و دقیق در آموزش و درمان کودک مبتلا به نارسایی توجه/ فزون‌کنشی مشارکت داشته\nباشند. ترکیب روش‌های دارودرمانی، رفتاردرمانی، شناخت/ رفتاردرمانگری، آموزش والدین،\nعنوان داروی\nیک کودک\nنباشد.\nتواند موجب\nپیشرفت و\nنی به کار\nقابل توجه\n1. Cognitive/behgavioral\n2. Self control\n1. Shapin\n2. Model\n3. Chanin\n\n۱۸۶\nروان شناسی و آموزش کودکان و نوجوانان\nآموزش مهارت‌های اجتماعی و مدیریت کلاس درس، بسته به شدت اختلال کودک بهترین\nنتیجه را خواهد داد.\nخلاصه فصل\nاختلال نارسایی توجه/ فزون کنشی یکی از شایع ترین مشکلات رفتاری است که معلمان و\nوالدین را به استیصال می‌کشاند. ریخت‌های مختلفی از این اختلال وجود دارد که عبارتند از:\n(۱) نارسایی توجه/ فزون کنشی، غلبه بر نوع نارسایی توجه، (۲) نارسایی توجه/ فزون کنشی،\nغلبه بر نوع فزون کنشی و تکانشگری، و (۳) نارسایی توجه/ فزون کنشی، نوع ترکیبی. این\nاختلال همپوشی قابل ملاحظه‌ای با مقوله ناتوانی یادگیری و اختلال‌های هیجانی/ رفتاری دارد.\nمیزان شیوع این اختلال روز به روز در حال افزایش است و در حدد سه تا پنج درصد جمعیت\nسنین مدرسه به اختلال نارسایی توجه/ فزون کنشی مبتلا هستند.\nاختلال نارسایی توجه/ فزون کنشی در پسرها رایج تر از دخترها است نسبت ۵ به ۱ یا بالاتر)\nکه احتمالا ناشی از تفاوت‌های زیست شناختی است. این اختلال هم دارای جنبه‌های پزشکی است\nو هم دارای جنبه‌های روان‌شناختی و آموزشی. بنابراین در تشخیص این اختلال باید معاینه پزشکی\nمصاحبه بالینی، مقیاس‌های درجه‌بندی معلم و والدین و مشاهدات رفتاری لحاظ گردد.\nعوامل مختلفی مانند ساختار مغز، عوامل ژنتیکی و عوامل محیطی در ایجاد اختلال\nنارسایی توجه/ فزون کنشی نقش دارند. محققان با استفاده از تکنیک‌های MRI و PET دریافتند\nکه همانند افراد مبتلا به ناتوانی‌های یادگیری، نارساکنشوری مغزی در افراد مبتلا به نارسایی\nتوجه/ فزون کنشی مشهود است. همچنین شواهد حاکی از آن است که اندازه لوب‌های فرونتال،\nعقده‌های پایه و مخچه در افراد مبتلا به نارسایی توجه/ فزون کنشی نسبت به افراد عادی\nکوچک‌تر است. مطالعه بر روی دوقلوهای یک تخمکی و دوتخمکی نیز نقش عوامل ژنتیکی را\nدر ایجاد این اختلال آشکار ساخته است. در نهایت تراتوژن‌ها عوامل سمی موجود در محیط)\nو شرایط پزشکی مانند کم‌وزنی به هنگام تولد نیز در ایجاد این اختلال نقش دارند.\nاختلال نارسایی توجه/ فزون کنشی با ویژگی‌های زیر همراه است: ضعف در بازداری\nرفتاری، ضعف در کنش‌های اجرایی، مشکلات در مدیریت زمان، مشکلات در رفتارهای\nهدف‌محور پایدار، مشکلات در سازش‌یافتگی اجتماعی و مشکلات تحصیلی. از آنجایی که\nاختلال نارسایی توجه/ فزون کنشی دارای جنبه‌های مختلف پزشکی، آموزشی و رفتاری است،\nفصل یم\nبنابراین درمان آن\nرفتار درمانی شایع تری\nآموزش والدین، آمو\nاز دیگر برنامه‌های\nداده شده‌اند.\n\n۱۸۷\nفصل پنجم: نارسایی توجه فزون کنشی\n\nبنابراین درمان آن نیز به مجموعه‌ای از مداخله‌ها توسط تیم متخصص نیاز دارد. دارودرمانی و\nرفتاردرمانی شایع‌ترین مداخله‌های ممکن هستند. علاوه بر این شناخت رفتار درمانگری،\nآموزش والدین، آموزش مهارت‌های اجتماعی و مدیریت رفتار در کلاس درس توسط معلم،\nاز دیگر برنامه‌های مداخله‌ای هستند که در درمان نارسایی توجه فزون‌کنشی بسیار مؤثر نشان\nداده شده‌اند.\n\nفصل ششم\nاختلال‌های هیجانی / رفتاری\n\n☑ اهداف یادگیری\nاز خواننده انتظار می‌رود پس از مطالعه مطالب این فصل بتواند:\n۱. تعریف‌های مختلف اختلال‌های هیجانی/ رفتاری را به صورت تحلیلی/ مقایسه‌ای\nبیان نماید.\n۲. طبقه‌بندی‌های مختلف اختلال‌های هیجانی/ رفتاری را شرح دهد.\n۳. میزان شیوع و عوامل مؤثر بر اختلال‌های هیجانی/ رفتاری را توضیح دهد.\n۴. عوامل ایجاد کننده اختلال‌های هیجانی/ رفتاری را به طور کامل شرح دهد.\n۵. فرایند شناسایی اختلال‌های هیجانی/ رفتاری را توضیح دهد.\n۶. ویژگی‌های کودکان و نوجوانان مبتلا به اختلال‌های هیجانی/ رفتاری را توضیح دهد.\n۷. روش‌های عمده در مداخله و درمان افراد مبتلا به اختلال‌های هیجانی/ رفتاری را\nبیان نماید.\n\nاختلال‌های رفتاری به طور قابل ملاحظه‌ای بر عملکرد تحصیلی، اجتماعی و حرفه‌ای کودکان\nو نوجوانان تأثیر منفی می‌گذارد و احتمال ابتلای به بیماری‌های روانی در دوره بزرگسالی را\nافزایش می‌دهد (پاندینا و همکاران، ۲۰۰۷). اختلال‌های رفتاری، احتمال ابتلای افراد به سوء\nمصرف مواد، فعالیت‌های بزهکارانه، اختلال‌های اضطرابی و خلقی، ناتوانی یادگیری، اختلال‌های\nعصب‌روان‌شناختی و اختلال شخصیت مرزی را افزایش می‌دهد (بامیستر و سوین ، ۱۹۹۰).\nکودکان با اختلال‌های رفتاری مشکلات گوناگونی دارند. این کودکان دارای دامنه توجه\nکوتاهی هستند، عزت نفس پایینی دارند، در ارتباط با اعضای خانواده، اطرافیان و مردم مشکل\nدارند و به آسانی مأیوس می‌شوند (سوزر و والر ، ۲۰۰۶).\nتکانشگری، بی‌قراری و فزون‌کنشی، پرخاشگری، دروغگویی و دزدی، عملکرد تحصیلی\nضعیف و ادراک ضعیف از خودکارآمدی نیز از ویژگی‌های کودکان و نوجوانان دارای اختلال\nهای رفتاری است (انجمن روانپزشکی آمریکا، ۱۹۹۴). همچنین خودآزاری، دیگرآزاری،\nتخریب محیط، نافرمانی، حرکات و گفتار کلیشه‌ای، گوشه‌گیری از دیگر ویژگی‌های کودکان و\nنوجوانان دارای اختلال‌های رفتاری است (فارل، ۲۰۰۶). این قبیل الگوهای رفتاری در کودکان\nمبتلا به اختلال‌های رفتاری در خانه، مدرسه، و در برخورد با همسالان دیده می‌شوند. اگر این\nالگوها تداوم یابند ممکن است منجر به مشکلات عمده‌ای در سازش‌یافتگی گردند و از کیفیت\nزندگی بکاهند. وضعیت اقتصادی – اجتماعی پایین، فقدان شایستگی اجتماعی، سوء استفاده از\nکودک، تعداد زیاد اعضای خانواده، مشکلات زناشویی (از قبیل جدایی، طلاق، اختلافات\n\n1.  Behavioral disorders\n2.  Pandina\n3.  Baumister & Sevin\n\nفصل شش\n۱۹۲\nروان شناسی و آموزش کودکان و نوجوانان\n،خانوادگی عدم سازش والدین و خشونت خانوادگی و مشکلات والدین از قبیل مشکلات و\nبیماریهای روانی جسمانی و رفتارهای بزهکارانه از جمله عوامل خطرساز ابتلای کودکان و\nنوجوانان به اختلالهای رفتاری هستند.\nتعریف اختلالهای هیجانی / رفتاری\nارائه تعریف عینی از اختلالهای هیجانی رفتاری چندان ساده نیست عواملی که تعریف از\nاین اختلالها را با مشکلاتی مواجه میسازند عبارتند از:\n- فقدان تعریفهایی دقیق از سلامت روان و رفتار بهنجار\n- تفاوتهای اساسی در بین مدل های مفهومی\n- نادقیق بودن اندازه گیری هیجانها و رفتارها\n- همپوشی بین اختلالهای هیجانی و رفتاری با سایر ناتوانی ها\n- عدم توافق بین متخصصانی که در امر تشخیص و ارائه خدمات فعالیت میکنند هالاهان و\nکافمن، (۲۰۰۹).\nاین\nرا در به\nمربوط\nتعریف\nرفتار\nهیجا\nپرند\nتعری\nاخل\nدر\nتعریف دولت فدرال آمریکا\nتعریفی که برای آشفتگی هیجانی بر اساس قانون دولت فدرال آمریکا و در متن قانون آموزش\nافراد با ناتوانی آمده است به صورت زیر است:\n۱ این اصطلاح به معنای وجود شرایطی است که واجد یک یا چند مورد از ویژگیهای زیر با\nبروز طولانی مدت و شدت کافی باشد و بر عملکرد تحصیلی فرد تأثیر منفی گذارد. این\nویژگی ها عبارتند از:\n- ناتوانی در یادگیری که ناشی از عوامل هوشی، حسی، یا سلامتی نباشد\n- ناتوانی در ایجاد یا حفظ روابط رضایت بخش با همسالان و معلمان\n- وجود انواع رفتارها یا احساسهای نامناسب تحت شرایط بهنجار زندگی\n- وضعیت خلقی اندوه یا افسرده فراگیر کلی\n- تمایل به نشان دادن نشانههای جسمانی یا ترسهای مرتبط با مشکلات شخصی یا تحصیلی\n\nفصل ششم: اختلال‌های هیجانی/ رفتاری\n۱۹۳\n۱. این اصطلاح کودکان اسکیزوفرنیک را شامل می‌گردد، ولی کودکان سازش‌نایافته اجتماعی\nرا در بر نمی‌گیرد، مگر این که مشخص گردد دارای آشفتگی هیجانی هستند.\nتعریف دولت فدرال با انتقادهای زیادی مواجه شده است. یکی از مهمترین انتقادها\nمربوط به خارج ساختن کودکان سازش‌نایافته اجتماعی، که دارای اختلال هیجانی نیستند از\nتعریف است (هالاهان و کافمن، ۲۰۰۹). انتقاد دیگر نیز مربوط به عدم به کارگیری اصطلاح\nرفتاری در تعریف است یعنی اصطلاح آشفتگی یا اختلال هیجانی به جای اختلال‌های\nهیجانی- رفتاری استفاده شده است (ترنبال۲ و همکاران، ۲۰۰۲؛ به نقل از شکوهی یکتا و\nپرند، ١٣٨٤).\n\nتعریف شورای کودکان استثنائی\nاختلال‌های هیجانی/ رفتاری به شرایطی اطلاق می‌شود که در آن پاسخ‌های هیجانی و رفتاری\nدر مدرسه با هنجارهای فرهنگی، سنی و قومی تفاوت داشته باشد، به طوری که بر عملکرد\nتحصیلی فرد، مراقبت از خود، روابط اجتماعی، سازش‌یافتگی فردی، رفتار در کلاس و\nسازش‌یافتگی در محیط کار نیز تأثیر منفی گذارد. اختلال‌های هیجانی/ رفتاری شامل پاسخ‌های\nقابل قبول کودک یا نوجوان به عوامل تنیدگی‌زای محیطی نمی‌شود. این اختلال‌ها بر اساس\nداده‌های حاصل از منابع مختلف در مورد کنش‌های هیجانی یا رفتاری فرد شناسایی می‌شوند و\nباید دست کم در دو موقعیت متفاوت که یکی از آنها مدرسه است بروز نماید. اختلال‌های\nهیجانی/ رفتاری می‌تواند به طور همزمان با سایر معلولیت‌ها نیز ظاهر شود. این اختلال‌ها\nشامل اسکیزوفرنی، نارسایی توجه، و سازش‌نایافتگی نیز می‌گردد (انجمن کودکان\n۳\nاستثنائی ، ١٩٩١).\n\nمزیت‌های تعریف شورای کودکان استثنائی نسبت به تعریف دولت فدرال\n۱. این تعریف آسیب‌های مربوط به رفتار انطباقی را که در رفتارها و هیجان‌ها نشان داده می‌شوند\nنیز در بر می‌گیرد\n۲. در ارزیابی فرد به هنجارهای فرهنگی و قومی توجه می کند\n\n1. Socially adjusted\n2. Turnball\n3. Council for Exceptional Children\n\n۱۹۴\nروان شناسی و آموزش کودکان و نوجوانان\n.۳ قبل از این که کودک یا نوجوان در گروه افراد مبتلا قرار بگیرد در جهت تغییر رفتار او\nتلاش می گردد\n.٤ افراد سازش نایافته اجتماعی را نیز شامل می گردد هاردمن، درو و ایگان (۱۹۹۹).\nفصل ششم: اختلال\nه. این تعریف م\n. این تعریف\nچندگانه داشته\n.دامنه وسیعی\nآموزش ویژه و\nدر هر ص\nاختلال هیجان\n- رفتاری که\n- مشکلی مز\n- رفتاری است\nطبقه بندی\nتاکنون طبق\nپژوهشگرا\nدرونی سا\nاضطراب\nکه شامل\nکانرز ، ۱\nهـ\nهای رف\nنشان د\nبرخی\nگیری،\nتعریف ائتلاف آموزش ویژه و سلامت روان\n۱. اصطلاح اختلال هیجانی/ رفتاری به معنای ارائه پاسخهای رفتاری و هیجانی در مدرسه به\nگونه ای است که با هنجارهای سنی، فرهنگی، یا نژادی تفاوت زیادی دارد و بر عملکرد\nآموزشی فرد تأثیر نامطلوب می گذارد. عملکرد آموزشی شامل مهارتهای تحصیلی، اجتماعی،\nحرفه ای، و شخصی می گردد. این ناتوانی:\n- بیشتر از پاسخ موقتی و مورد انتظار به رویدادهای تنیدگی زا در محیط است\n- به طور مستمر در دو موقعیت مختلف بروز پیدا میکند، که حداقل یکی از آنها مدرسه است ، و\n- مداخله مستقیم مربوط به آموزش عمومی برای آن کارساز نیست، به سخن دیگر شرایط\nکودک به گونه ای است که مداخله های آموزش عمومی برای آن ناکافی است.\n۲. اختلالهای هیجانی/ رفتاری می توانند همراه با سایر اختلالها وجود داشته باشند\n۳. اختلالهای اسکیزوفرنی، اختلال عاطفی، اختلال اضطراب، یا سایر اختلالهای در رفتار\nهنجاری یا سازش یافتگی هنگامی که بر عملکرد آموزشی کودک یا نوجوان مطابق با بند ۱\nتأثیر منفی گذارند، در این مقوله قرار می گیرند.\nامتیازات این تعریف در مقایسه با تعریف دولت فدرال به شرح زیر است:\n۱. این تعریف از اصطلاحاتی استفاده میکند که مورد توافق متخصصان کنونی بوده و همسو با\nکمینه سازی برچسب گذاری است\n۲. هم اختلالهای رفتاری و هم اختلالهای هیجانی را در بر می گیرد و مشخص می کند که\nاین دو دسته اختلال ممکن است به طور جدا از هم یا به صورت ترکیبی ظاهر گردند\n۳. این تعریف مدرسه محور است اما در عین حال تصدیق میکند اختلالهایی که در بیرون از\nمدرسه رخ میدهند نیز دارای اهمیت هستند\n٤. این تعریف به تفاوتهای نژادی و فرهنگی حساس است\n\n۱۹۵\nنوجوانان\nفصل ششم اختلالهای هیجانی/رفتاری\n۵. این تعریف مشکلات جزیی یا گذرا یا پاسخهای معمولی به تنیدگی را شامل نمی‌گردد.\n.۶ این تعریف بر این نکته تأکید می‌کند که کودکان و نوجوانان می‌توانند ناتوانی‌های\nچندگانه داشته باشند\n۷. دامنه وسیعی از اختلالهای هیجانی یا رفتاری مورد توجه متخصصان سلامت روان و\nآموزش ویژه را بدون خارج ساختن اختیاری در بر می‌گیرد (هالاهان و کافمن، ۲۰۰۹).\nدر هر صورت با توجه به تمامی تعاریف بالا، توافق کلی بین همه‌ی آن‌ها این است که\nاختلال هیجانی یا رفتاری به موارد زیر اشاره دارد:\n- رفتاری که در حد افراطی است؛ یعنی با وضعیت عادی خرد تفاوت معنادار دارد\n- مشکلی مزمن است؛ یعنی مشکلی است که به سرعت ناپدید نمی‌گردد\n- رفتاری است که به علت انتظارات اجتماعی یا فرهنگی غیرقابل پذیرش است\n\nتاکنون طبقه‌بندی‌های مختلفی برای اختلالهای رفتاری صورت گرفته است. بعضی از\nپژوهشگران اختلال‌های رفتاری را به دو دسته بزرگ تقسیم کرده اند: اختلال‌های رفتاری\nدرونی سازی که شامل مواردی است که با دنیای درونی فرد سروکار دارد مانند افسردگی و\nاضطراب که با تعارض‌های روانی و هیجانی همراه است، و اختلال‌های رفتاری برونی سازی\nکه شامل مواردی است که به مشکلات فرد با دیگران ارتباط دارد (آخن باخ، هاول، کوای، و\nکانرز، ۱۹۹۱).\n۲\n۳\nهمه‌ی اختلال‌ها می‌توانند در این دو بعد وسیع قرار گیرند. برخی افراد ممکن است ویژگی\nهای رفتاری هر دو بعد را نشان دهند. یعنی کودک یا نوجوان ممکن است برخی رفتارهایی\nنشان دهد که با مشکلات درونی سازی مرتبط باشد مانند دامنه توجه کوتاه، تمرکز پایین و\nبرخی رفتارهایی نشان دهد که با مشکلات برونی سازی مرتبط باشد (مانند دعوا کردن، تخریب\nگری، آزار دادن دیگران). در واقع همبودی دو یا چند شرایط در یک فرد غیرمعمول نیست\n\n1. Internalizing behavior disorders\nاز\n\n۱۹۶\nروان شناسی و آموزش کودکان و نوجوانان\n۱\nكولينان (۲۰۰۴)، افراد کمی با اختلال هیجانی یا رفتاری وجود دارند که فقط یک نوع رفتار\nسازش نایافته را نشان دهند.\nاختلالهای رفتاری دامنه وسیعی دارند و مشکلات بسیاری را در بر میگیرند، به طوری\nکه هر طبقه در برگیرنده گروه هایی است که ممکن است ویژگی های متفاوتی داشته باشند.\nطبقه بندی به ویژه برای مقاصد آموزشی مفید به نظر میرسد، زیرا که ریشه ها و علل اختلالها\nمتفاوتند. برای مثال کودکی ممکن است مضطرب و گوشه گیر و کودکی دیگر عصبانی و\nتندخو باشد. اگرچه هر دو در طبقه اختلال های رفتاری قرار می گیرنــد ولـی بـه خـدمات\nآموزشی متفاوتی نیاز دارند (کرک، گالاگر و آناستازیو، ۲۰۰۰). همان گونــه کـه اشـاره شــد در\nحیطه اختلال های رفتاری، طبقه بندی های متعددی ارائه شده است که برخی از آنها بـر\nروشهای آماری پیشرفته مبتنی است. در این روشها خوشه ها و الگوهای مربوط به رفتارها\nمشخص میشوند. برای مثال کوای و پیترسون (۱۹۸۷) اختلالهای رفتاری را به شش دسته\n۳\nتقسیم کرده اند: اختلال رفتار نابهنجاری، پرخاشگری اجتماعی، مشکلات مربوط به توجه و\nناپختگی، اضطراب - گوشه گیری، رفتار روان گسستگی و تحرک مفرط. آخن باخ (۱۹۹۱) نیز\nاختلالهای رفتاری را به ده طبقه تقسیم کرده است: اضطراب، افسردگی، شکایت های جسمانی\n، مشکلات اجتماعی، مشکلات تفکر، مشکلات توجه، قانون شکنی، رفتارهای پرخاشگرانه،\nدرونی سازی و برونی سازی و سایر مشکلات.\n\nمیزان شیوع\nبرآورد میزان شیوع اختلالهای هیجانی یا رفتاری در کودکان و نوجوانان بسیار گوناگون است،\nزیرا تعریف استاندارد و معتبر و ابزار غربالگری دقیق وجود ندارد. همچنین برآورد میزان شیوع\nاختلالهای رفتاری به دلیل فقدان تعاریف واحد، مشکلات روش شناختی، سیاست های\nاجتماعی، و عوامل اقتصادی با دشواریهایی همراه است. مطالعات دقیق در ایالات متحده و\nدیگر کشورها به طور مستمر نشان دادند که حداقل ۶ تا ۱۰ درصد کودکان و نوجوانان سن\nمدرسه مشکلات جدی و پایدار هیجانی رفتاری را نشان میدهند (کافمن، ۲۰۰۵ الف). با این\n\nفصل ششم: اختلالهای هیجان\nحال در ایالات متحده حـ\nهدفهای آموزشی ویژه\nویکس - نلسون و\nکودکان و نوجوانان را به\nاختلال ن
