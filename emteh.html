. جزو\n۴. رویکردهای پز\nروانشناختی یا ر\nعوامل خانوادگی\nبرخی اوقات و\nدارند و برخی\nاختلال‌های هیج\nرفتاری ساده نـ\nبودن به نیازهاســ\n۹. و به کارگیری\nکودکان می‌تواند\n۱۹۸\nروان شناسی و آموزش کودکان و نوجوانان\nرفتاری آشکار مانند اختلال نارسایی توجه/فزون‌کنشی، اختلال رفتار نابهنجاری، پرخاشگری و\nرفتارهای ضداجتماعی در پسران شایع‌تر است (براست– هارکنت و باتلر، ۲۰۰۷). به طور\nکلی گزارش شده است که شیوع اختلال‌های رفتاری در پسران بیشتر از دختران است. این امر\nمی‌تواند ناشی از عوامل زیر باشد: اولا همان گونه که ذکر شد اختلال‌های رفتاری پسران\nبیشتر از نوع اختلال‌های رفتاری آشکار است که نسبت به اختلال‌های رفتاری پنهان که در\nدختران شایع‌تر است، هم بیشتر هستند و هم راحت‌تر قابل تشخیص‌اند (هورویتز و\nهمکاران، ۱۹۹۲). ثانیاً شیوه‌های سنجش اختلال‌های رفتاری متناسب با جنسیت نیست و\nدختران و پسران هر دو به یک شیوه ارزیابی می‌شود (وهبای و همکاران ، ۱۹۹۷).\nسبب شناسی\nاگرچه که در بیشتر موارد نمی‌توان به طور دقیق مشخص کرد که علت اختلال ناشی از چیست،\nبا این حال بر اساس نتایج پژوهش‌های مختلف می‌توان مجموعه‌ای از عوامل زیست‌شناختی،\nروابط خانوادگی نابسامان، تجربیات نامطلوب در مدرسه، و تأثیرات فرهنگی منفی را در ایجاد\nاختلال‌های هیجانی / رفتاری دخیل دانست. پیدا کردن یک علت واحد که به طور مستقیم\nمنجر به یک اختلال گردد، تا حد بسیار زیادی غیرمعمول است.\nعوامل زیست شناختی\nرفتارها و هیجان‌ها ممکن است توسط عوامل ژنتیکی، عصب‌شناختی، یا زیست‌شیمیایی یا\nترکیبی از این عوامل تأثیر پذیرند. بی‌تردید بین بدن و رفتار رابطه وجود دارد، بنابراین در نظر\nگرفتن عامل زیست‌شناختی برای برخی اختلال‌های هیجانی یا رفتاری منطقی به نظر می‌رسد\n(کوپر، ۲۰۰۵). برای بیشتر کودکان با اختلال‌های هیجانی یا رفتاری به سادگی نمی‌توان\nمشخص کرد که عوامل زیست‌شناختی ممکن است در شرایط آنها نقش داشته باشد.\n1. Breasett-Hett & Butler\n2. Horwitz\n\n۱۹۹\nکان و نوجوانان\nخاشگری و\n). به طور\nست. این امر\nاری پسران\nان که در\nر و\nنیست و\nفصل ششم: اختلال‌های هیجانی / رفتاری\nرفتاری\nهمه کودکان با سبک رفتاری از قبیل تعیین شده زیست‌شناختی یا خلق و خو خاص به\nدنیا می‌آیند. هر چند که خلق و خوی کودکان ممکن است با توجه به روش تربیتی تغییر یابد،\nبا این این حال برخی افراد معتقدند که کودکان با خلق و خوهای به اصطلاح دشوار، مستعد\nاختلال‌های هیجانی یا رفتاری هستند. با این حال رابطه یک به یک بين \"خلق و خو\" و\nاختلال‌ها وجود ندارد (کوگ، ۲۰۰۳). سایر عوامل زیست‌شناختی مانند بیماری، سوءتغذیه و\nآسیب مغزی در کنار \"خلق و خو\" بر مشکلات هیجانی یا رفتاری مؤثرند.\nدر مورد عوامل زیست‌شناختی باید همواره در نظر داشت که\n۱. به ندرت علت یک اختلال هیجانی رفتاری منحصراً زیست‌شناختی یا روان‌شناختی است.\nهنگامی که یک اختلال زیست‌شناختی رخ می‌دهد تقریباً همیشه منجر به مشکلات روانی /\nاجتماعی می‌گردد که در ایجاد اختلال هیجانی یا رفتاری نقش دارند.\n۲) درمان زیست‌شناختی یا پزشکی اختلال به ندرت برای حل مشکل کافی است. دارو درمانی\nممکن است فواید زیادی داشته باشد اما به ندرت تنها مداخله مورد نیاز است (فورنس و\nکاوال، ۲۰۰۱). جنبههای روانشناختی و اجتماعی اختلال باید همچنین مورد توجه قرار گیرد و\n۳) رویکردهای پزشکی یا زیست‌شناختی برخی اوقات فایده‌ای ندارند و مداخلات اصلی جنبه\nروان‌شناختی یا رفتاری دارند؛ هرچند که علت اختلال زیست‌شناختی تشخیص داده شده باشد.\n\nعوامل خانوادگی\nبرخی اوقات والدین بسیار خوب کودکان مبتلا به اختلال‌های هیجانی یا رفتاری بسیار شدید\nدارند و برخی اوقات والدین بدون صلاحیت غفلت کننده یا سوء استفاده‌گر، کودکان مبتلا به\nاختلال‌های هیجانی یا رفتاری معنادار ندارند. رابطه بین فرزندپروری و اختلال‌های هیجانی یا\nرفتاری ساده نیست اما برخی اعمال فرزندپروری بی تردید بهتر از برخی دیگر است. حساس\nبودن به نیازهای کودکان و روش‌های متمرکز بر دوست بودن در رویارویی با رفتارهای نادرست\nو به کارگیری تقویت مثبت برای رفتارهای مناسب بی‌ تردید باعث ایجاد رفتارهای مطلوب در\nکودکان می‌گردد. والدینی که به طور کلی در تربیت کودک اهمال‌کاری می‌کنند و در عوض در\n\nچیست،\nناختی\nایج\nستقیم\nی یا\nنظر\nسد\nفان\n1. Temerament\n2. Difficult\n3. Keogh\n4. Forness & Kayale\n\nروان شناسی و آموزش کودکان و نوجوانان\n۲۰۰\nرویارویی با رفتارهای نادرست، خصمانه، طردکننده، ظالمانه و ناپایدار عمل می‌کنند، احتمالاً\nکودکانی پرخاشگر و بزهکار خواهند داشت. خانواده‌های از هم پاشیده و نابسامانی که در آن\nوالدین خود سابقه خشونت و نقض قوانین دارند، احتمالاً فرزندان آنها بزهکار و فاقد قابلیت\nاجتماعی ۱ هستند. باید توجه داشت که والدین کودکان با اختلال‌های هیجانی/ رفتاری\nمی‌خواهند که فرزندشان به طور مناسبی رفتار کند و هر کاری را برای کمک به فرزندشان\nانجام می‌دهند. بنابراین این والدین به منابع حمایتی نیاز دارند، نه سرزنش و انتقاد. در نتیجه\nباید روش‌های فرزندپروری و چگونگی اصلاح رفتار فرزندشان را به طور منظم به آنها\nآموزش داد.\n\nعامل مدرسه\nبرخی کودکان با ورود به مدرسه و سال‌های بعد از آن به خاطر تجربه‌های آسیب‌زا در کلاس\nدرس به اختلالهای هیجانی یا رفتاری دچار می‌شوند. رفتارهای همکلاسی‌ها و معلمان\nمی تواند همراه با خلق و خو و قابلیت اجتماعی کودک در ایجاد مشکلات هیجانی یا رفتاری\nنقش داشته باشد. مدرسه می‌تواند در رشد مشکلات هیجانی به روش‌های متعددی عمل کند.\nبرای مثال معلمان ممکن است به فردیت ۲ کودکان حساس نباشند و آنها را بدون تفکر به\nهمسویی با قوانین و مقررات وا دارند. معلمان یا والدین ممکن است انتظارات بسیار بالا یا\nپایینی برای پیشرفت تحصیلی و یا رفتار کودک در نظر بگیرند. شیوه انظباطی مدرسه ممکن\nاست بسیار سهل‌گیرانه، بسیار سخت‌گیرانه یا ناپایدار باشد. محیط مدرسه ممکن است به\nگونه‌ای باشد که رفتار نادرست کودک با توجه خاص (حتی اگر به صورت انتقاد کردن یا تنبیه\nباشد) پاداش داده شود، در حالی که کودکی که به درستی رفتار می‌کند مورد بی‌توجهی قرار\nگیرد. در نهایت این که معلمان و همسالان ممکن است مدل‌های رفتار نادرست باشند و\nکودک ممکن است با تقلید از آنها عمل کند (کافمن، ۲۰۰۵ الف، کافمن و همکاران، ۲۰۰٦).\n\nعوامل فرهنگی\nبسیاری از شرایط محیطی بر انتظارات بزرگسالان از کودکان و انتظارات کودکان از بزرگسالان و\nهمسالان تأثیر می‌گذارند. ارزش‌ها و استانداردهای رفتاری از طریق دامنه‌ای از شرایط فرهنگی،\n\nفصل ششم: اختلا\nتقاضاها، بازدا\nسطح خشونت\nرفتار جنسی،\nرفتاری و هی\nخاص بعد از\nفرهنگی که\nسطح خشوع\nکودکان است\nمدرسه مت\nمشکلات\nدر تعامل\nفرایند\nشناسا\nاوقات\nآنها\nدانش\nتو\n1. Social competence\n\nفصل ششم: اختلالهای هیجانی/رفتاری\n۲۰۱\nتقاضاها، بازداری‌ها و مدلهای فرهنگی به کودکان منتقل میشوند. تأثیرات فرهنگی خاص مانند\nسطح خشونت در رسانه، در دسترس بودن داروها و سوءاستفاده از آن‌ها، تغییر دادن استانداردهای\nرفتار جنسی، تقاضاهای مذهبی و محدودیت‌های رفتاری و بسیاری از عوامل دیگر بــر مســائل\nرفتاری و هیجانی کودکان تأثیر می‌گذارند. همسالان منبع مهم دیگر تأثیر فرهنگی است که به طور\nخاص بعد از این که کودک وارد پایه‌های ابتدایی بالاتر می‌گردد، عمل می‌کند (فارمر ۱، ۲۰۰۰). بی‌تردید\nفرهنگی که کودک در آن پرورش می‌یابد بر تحول هیجانی، اجتماعی و رفتاری او تأثیر می‌گذارد.\nسطح خشونت که توسط تلویزیون و فیلم‌ها نشان داده می‌شود یک عامل مؤثر در افزایش خشونت\nکودکان است. در هر صورت با توجه به این که اثرات فرهنگی بر چگونگی رفتار کودکان در\nمدرسه مشهود است، با این حال ما باید از اثرات تعامل عوامل مختلف ایجاد کننده مسایل و\nمشکلات هیجانی و رفتاری کودکان آگاه باشیم. مدارس و خانواده‌ها بر فرهنگ تأثیر می‌گذارند و\nدر تعامل با یکدیگر بر رفتارهای کودکان تأثیر می‌گذارند.\n\nفرایند شناسایی\nشناسایی اختلالهای رفتاری نسبت به تعریف، طبقه‌بندی و سبب‌شناسی آن آسان تر است. برخی\nاوقات چنین دانش‌آموزانی به کسی آزار نمی‌رسانند، بنابراین غیرقابل مشاهده هستند. اما تشخیص\nآنها به طور معمول برای معلمان با تجربه آسان است. معلمان اغلب در ارزیابی توانمندی های\nدانش‌آموزان مبتلا به اختلالهای هیجانی یا رفتاری شکست می‌خورند. با این حال ارزیابی\nتوانمندی‌های این دانش‌آموزان علاوه بر نقاط ضعف و نارسایی‌های آن‌ها مهم است.\nرایج‌ترین نوع اختلال هیجانی یا رفتاری، اختلال رفتار هنجاری است که یک مشکل\nبرونی‌سازی است. این اختلال توجه فوری را به دنبال دارد و به ندرت در شناسایی آن مشکل\nاساسی وجود دارد. دانش‌آموزان با مشکلات درونی‌سازی ممکن است کمتر آشکار باشند، اما\nشناسایی آنها نیز چندان دشوار نیست. دانش‌آموزان مبتلا به اختلالهای هیجانی یا رفتاری به\nآسانی توسط پرسنل مدرسه شناسایی می‌شوند. تشخیص کودکان مبتلا به اسکیزوفرنی به\nندرت با افراد از لحاظ تحولی بهنجار مشتبه می‌گردد. زبان غیرمعمول آنها، ادا و اطوار، و\nروش‌های برقراری ارتباط با دیگران بسیار زود مورد توجه والدین و معلمان قرار می‌گیرد.\n\n۲۰۲\nروان شناسی و آموزش کودکان و نوجوانان\nکودکان مبتلا به اسکیزوفرنی درصد بسیار کوچکی از افراد با اختلالهای هیجانی/رفتاری را\nتشکیل می‌دهند و در شناسایی آنها معمولا مشکلی وجود ندارد. با این حال آنها ممکن است\nدر ابتدا برچسب اختلال‌های دیگر مانند نارسایی توجه/ فزون کنشی یا افسردگی را دریافت\nکنند و در مراحل بعد تشخیص اسکیزوفرنی را دریافت کنند.\nهر چه کودک سن پایین‌تری داشته باشد، قضاوت درباره جدی بودن مشکل او دشوارتر\nاست. برخی از کودکان مبتلا به اختلالهای هیجانی/رفتاری تشخیص داده نمی‌شوند، زیرا\nمعلمان به مشکلات کودکان حساس نیستند و حتی معلمان حساس نیز برخی اوقات در\nقضاوت دچار اشتباه می‌گردند. همچنین به یاد داشته باشید که برخی از کودکان مبتلا به\nاختلالهای هیجانی/رفتاری در محیط مدرسه مشکلاتی را نشان نمی‌دهند.\nفصل ششم: اختلال\nویژگی‌های افراد\nتوصیف ویژگی‌های\nزیرا دامنه این اختلا\nنوع اختلال مطرح -\nغربالگری اولیه و شناسایی اولیه صحیح با هدف برنامه‌ریزی مداخله آموزشی، با توجه\nبه مشکلات در تعریف اختلات هیجانی/رفتاری پیچیده می‌گردد. اما به طور کلی اطلاعات\nمعلمان و قضاوت آنها به عنوان روش‌های معتبر و روا جهت غربالگری دانش‌آموزان است\n(در مقایسه با قضاوتهای روان‌شناسان و روانپزشکان). در هر صورت معلمان گرایش دارند تا\nدانش‌آموزان با مشکلات رفتاری برونی‌سازی را بیشتر ارجاع داده و دانش‌آموزان با مشکلات\nدرونی‌سازی را کمتر ارجاع دهند. بدین منظور می‌توان به شرح زیر عمل کرد:\nهوش و پیشرفت\nنتايج تحقيقات مو\nرفتاری در اطراف\nدارند. البته باید\nهوشی بسیار بالا\nدارد. مشکلات\nهوشی موانعی\nتحصیلی و اجـ\nمعلم دانش‌آموزان با مشکلات برونی‌سازی و درونی‌سازی را فهرست و رتبه‌بندی کند.\nسپس آنها را بر اساس میزان نزدیک بودن ویژگی‌های آنها به نشانه‌های اختلال‌های\nبرونی‌سازی و درونی‌سازی مرتب کند. سپس هر یک از دانش‌آموزانی را که از نظر مشکلات\nرفتاری دارای بالاترین رتبه هستند مشخص نماید. در مرحله بعد روان‌شناس مدرسه یا هر\nفرد دیگر در حیاط مدرسه یا کلاس درس آنها را مورد مشاهده عمیق قرار دهد. مشاهدات\nکلاس درس، میزانی را که دانش‌آموز انتظارات رفتاری را برآورده می‌سازد نشان می‌دهد و\nمشاهدات زمین بازی، کیفیت و ماهیت رفتار اجتماعی را مشخص می‌سازد. چنین سیستم\nغربالگری می‌تواند به ارائه خدمات پیشرفته برای کودکان مبتلا به اختلال‌های هیجانی یا\nرفتاری منجر گردد. لازم به یادآوری است که بعد از این سیستم غربالگری، می‌توان کودک\nمورد نظر را جهت تشخیص نهایی، با تستهای استاندارد مورد ارزیابی دقیق رسمی قرار داد.\nبیشتر د\nاستاندارد شد\nیک دانش‌آم\nخود عمل نـ\nدر واقع بس\nریاضی هست\nبکارگیری\nویژگی\nویژگی‌ها\nبرون‌\nهـ\nبرون ری\n\n۲۰۳\nفصل ششم: اختلالهای هیجانی/ رفتاری\n\nویژگی‌های افراد مبتلا به اختلالهای هیجانی/ رفتاری\n\nتوصیف ویژگی‌های کودکان و نوجوانان با اختلال‌های هیجانی/ رفتاری بسیار دشوار است،\nزیرا دامنه این اختلالها گسترده است و نمی‌توان یک ویژگی قطعی را برای همه کودکان با هر\nنوع اختلال مطرح کرد.\n\nهوش و پیشرفت\nنتایج تحقیقات متعدد حاکی از آن است که هوشبهر بیشتر کودکان مبتلا به اختلالهای هیجانی/\nرفتاری در اطراف ۹۰ است و برخی از آنها در دامنه افراد دیرآموز و کم‌توان‌ذهنی خفیف قرار\nدارند. البته باید یادآور شد که برخی از کودکان مبتلا به اختلالهای هیجانی/ رفتاری از نمرات\nهوشی بسیار بالایی برخوردارند. همچنین در ارزیابی هوشی این کودکان نیز چالش‌هایی وجود\nدارد. مشکلات هیجانی یا رفتاری این دانش آموزان در پاسخدهی و نمره گرفتن در تست‌های\nهوشی موانعی ایجاد می‌کند. با این حال هوشبهر عامل پیش‌بینی کننده خوبی برای پیشرفت\nتحصیلی و اجتماعی این دانش آموزان است.\nبیشتر دانش آموزان مبتلا به اختلال‌های هیجانی یا رفتاری با استفاده از تست‌های\nاستاندارد شده در مدرسه جزء دانش آموزان با پیشرفت پایین هستند (کافمن، ۲۰۰۵، الف).\nیک دانش آموز مبتلا به اختلال هیجانی/ رفتاری معمولا به اندازه سطح مورد انتظار سن ذهنی\nخود عمل نمی‌کند. به طور کلی این دانش آموزان به ندرت از لحاظ تحصیلی پیشرفته هستند.\nدر واقع بسیاری از دانش آموزان با اختلال‌های شدید فاقد مهارت‌های اساسی خواندن و\nریاضی هستند و عده کمی از آنها که به نظر می‌رسد در خواندن یا ریاضی قایل هستند، قادر به\nبکارگیری مهارت‌هایشان در مسایل روزمره نیستند.\n\nویژگی‌های اجتماعی و هیجانی\nویژگی‌های دانش‌آموزان مبتلا به اختلالهای هیجانی/ رفتاری را می‌توان در دو مقوله\nبرونی‌سازی و درونی‌سازی توصیف کرد. بعد برونی‌سازی با رفتارهای پرخاشگرانه و\nبرون‌ریزی و بعد درونی‌سازی با رفتارهای اضطرابی، گوشه‌گیرانه، و افسردگی مشخص\nمی‌گردد. با این حال برخی دانش آموزان ممکن است هر دو دسته رفتارهای پرخاشگرانه و\n\nروان‌شناسی و آموزش کودکان و نوجوانان\n۲۰۴\nگوشه‌گیرانه یا افسرده‌وار را نشان دهند. نتایج مطالعات حاکی از آن است که افراد مبتلا به\nاختلالهای هیجانی/رفتاری ممکن است از نظر اجتماعی طرد شوند. طرد اولیه توسط\nهمسالان و رفتار پرخاشگرانه، کودک را در معرض خطر بالا برای مشکلات اجتماعی و هیجانی\nبعدی قرار می‌دهد. رابطه بین اختلالهای هیجانی/رفتاری و اختلالهای ارتباطی به طور\nفزاینده‌ای آشکار است. بسیاری از کودکان و نوجوانان مبتلا به اختلال‌های هیجانی/رفتاری\nمشکلات زیادی در درک و استفاده از زبان در موقعیت‌های اجتماعی دارند.\nدر مقوله مشکلات رفتاری برونی سازی، اختلال رفتار هنجاری رایج‌ترین مشکلی است\nکه توسط دانش آموزان با مشکلات هیجانی/رفتاری نشان داده می‌شود. ویژگی‌هایی مانند\nکتک زدن، دعوا کردن، فریاد زدن، امتناع از اجابت درخواست‌ها، گریه کردن، تخریب‌گری،\nزورگویی در کودکان با این اختلال شایع هستند. کودکان عادی نیز تقریباً این رفتارها را انجام\nمی‌دهند اما نه به صورت تکانشی و نه اغلب اوقات.\nدر مقوله مشکلات رفتاری برونی سازی، اختلال دیگر نارسایی توجه/فزون کنشی\nاست. رفتار این کودکان نه تنها بسیار مزاحم است، که همچنین از طریق شیوه انضباطی عادی\nقابل تغییر نیست. اختلال نارسایی توجه/فزون کنشی در فصلی جداگانه به طور مفصل\nمورد بحث قرار گرفته است، بنابراین از توضیح آن در این بخش صرف نظر می‌گردد.\nپرخاشگری نیز از دیدگاه‌های مختلف تحلیل شده است. قویترین نظریه در این ارتباط\nمربوط به نظریه‌های یادگیری اجتماعی مانند بندورا (۱۹۷۳، ۱۹۸۶) و روانشناسان رفتاری\nمانند کالوین (۲۰۰۴)، والکرا و همکاران (۲۰۰۶) و پاترسون۳ و همکاران (۱۹۹۲) است.\nمطالعات آنها بر تجربه کودک و انگیزه او بر پایه پیامد‌های پیش‌بینی شده پرخاشگری است.\nبه طور خلاصه آنها پرخاشگری را به عنوان رفتار یاد گرفته شده در نظر گرفته و فرض می‌‌-\nکنند که می‌توان شرایطی که در آن پرخاشگری آموخته می‌شود، شناسایی کرد. کودکان،\nبسیاری از رفتارهای پرخاشگرانه را با مشاهده والدین، برادر و خواهر، همبازی‌ها، و افرادی\nکه در تلویزیون و فیلم‌ها نشان داده می‌شوند، یاد می‌گیرند. افرادی که به عنوان مدلهای\nپرخاشگری عمل می‌کنند اگر مورد تنبیه قرار نگیرند و به گونه‌ای پاداش هم دریافت کنند،\nکاملاً مورد تقلید قرار می‌گیرند.\n\nفصل ششم: اختلال\nمفیدترین\n- کمک کردن به\n- فراهم کردن\nتحریک‌کننده\n- فراهم کردن\n- جلوگیری ا\n- استفاده از\nاما در\nدارند که دار\nپیامدهای\nضعیفی را\nروابط انس\nبرای برقر\nدارند به\nهستند\nدیگر\nانگیزه\nشکست\nاست\nمحیط\nصور\nمتو\n\nفصل ششم: اختلال‌های هیجانی/رفتاری\n۲۰۵\nمفیدترین تکنیک‌ها برای درمان پرخاشگری عبارتند از:\n- کمک کردن به کودک جهت تمرین کردن یا ایفای نقش رفتار غیر پرخاشگرانه\n- فراهم کردن نمونه‌ها یا مدل‌هایی از پاسخهای رفتاری غیر پرخاشگرانه که در شرایط\nتحریک کننده پرخاشگری بروز کردند\n- فراهم کردن تقویت برای رفتار غیر پرخاشگرانه\n- جلوگیری از به دست آوردن پیامدهای مثبت برای رفتار پرخاشگرانه، و\n- استفاده از روشهای تنبیهی مانند محروم سازی یا جداسازی اجتماعی.\nاما در بعد دیگر اختلال‌های هیجانی/ رفتاری، کودکان با مشکلات درونی سازی قرار\nدارند که دارای رفتارهای نمونایافته، گوشه‌گیری و افسردگی هستند. چنین اختلالهایی نه تنها\nپیامدهای جدی برای افراد در سالهای کودکی به دنبال دارند، که همچنین پیش‌آگهی بسیار\nضعیفی را برای سلامت روانی بزرگسالی به دنبال دارند. کودک با این ویژگی‌ها نمی‌تواند\nروابط انسانی نزدیک و رضایت بخشی که نشانگر تحول بهنجار است برقرار کند. این کودکان\nبرای برقراری تعامل با دیگران دچار تردید هستند، گوشه‌گیری اجتماعی دارند، دوستان اندکی\nدارند، به ندرت با دوستان هم سن خود بازی می‌کنند، و فاقد مهارتهای اجتماعی ضروری\nهستند (هالاهان و کافمن، ۲۰۰۹).\nدیدگاه روان‌تحلیل‌گری در تبیین گوشه‌گیری و افسردگی، آن را به تعارضهای درونی و\nانگیزه‌های ناهوشیار پیوند می‌دهد. روانشناسان رفتاری‌نگر چنین مشکلاتی را به صورت\nشکست در یادگیری اجتماعی تبیین می‌کنند که پژوهشهای تجربی نیز از آن حمایت کرده\nاست (کافمن، ۲۰۰۵ الف). تحلیل یادگیری اجتماعی گوشه‌گیری و نمونایافتگی را به یک\nمحیط نامناسب نسبت می‌دهد.\nبه طور کلی می‌توان ویژگیهای افراد مبتلا به اختلال‌های هیجانی/ رفتاری را به\nصورت زیر خلاصه نمود:\n- بیشتر کودکان مبتلا به اختلال‌های رفتاری در مقایسه با کودکان عادی، هوش متوسط و\nمتوسط به پایین دارند\n- این افراد مشکلات متعددی را در سازش یافتگی در محیطه‌ای خانه، مدرسه و محیط‌های\nاجتماعی دارند\n\nاصل ششم: اختلالهای هیجانه\nبنابر این کودکان و\nآموزش ویژه به دامنه ای\nآموزش مرتبط با استخد\nبیشتر این کودکان و نو\nایفا می کند (فارمر و فا\nهماهنگ تر، هم اکنون\nبدون توجه به مـ\nآموزشی کودکان و نو\nنظر گرفت. این راهبر\nمداخله های نظام مند\  اجتماعی یک فرد بر توانایی او در بازی کردن، یادگیری،\nکار، و مشارکت در فعالیتهای تفریحی در طول زندگی تأثیر میگذارد. مهارتهای اجتماعی\nبرای به دست آوردن تقویت و پذیرش اجتماعی و اجتناب از موقعیتهای اجتماعی آزارنده\nاستفاده می‌شوند. مهارتهای اجتماعی دسته‌ای از قابلیتها را نشان می‌دهند که تمامی افراد را\nبرای مقابله و سازش با نیازهای روزمره محیط اجتماعی توانمند می‌سازند. افرادی که در تحول\nقابلیت‌های اجتماعی مناسب شکست می‌خورند، در معرض مواجه شدن با پیامدهای منفی\nشامل طرد شدن توسط همسالان، ظهور اختلال های روان شناختی، اخراج از مدرسه،\nگوشه‌گیری، جرم و جنایت، و عملکرد تحصیلی پایین هستند (گرشام، وان، و کوک۲، ۲۰۰۶؛\nواكر، رامسی۳ ، و گرشام٢ ، ٢٠٠٤).\nبه طور کلی نتایج تحقیقات مختلف حاکی از آن است که مهارت‌های اجتماعی ضعیف\nو مشکلات ارتباطی با همسالان، خانواده و معلمان با بسیاری از شکلهای مشکلات روانی\nمانند افسردگی (سگرین۴ ، ۲۰۰۰)، اختلال رفتار هنجار (اسپنس۵، ۱۹۸۱)، هراس اجتماعی\n(اسپنس و همکاران، ۱۹۹۹)، نشانگان اوتیسم و آسپرگر (هاریس۶ ، ۱۹۹۸)، و شروع زودهنگام\nاسكیزوفرنی (اسكولز و کولر۷ ، ۱۹۸۹) مرتبط است (به نقل از اسپنس، ۲۰۰۳). همچنین\nآموزش مهارتهای اجتماعی باعث کاهش مشکلات رفتاری در دانش‌آموزان (ورداین۸ و\nهمکاران، ۱۹۹۰؛ سوگای و لویس۹ ، ۱۹۹۶؛ کامپز و کای۱۰ ، ۲۰۰۲؛ سیم۱۱ و همکاران،۲۰۰۶)\nکاهش رجوع نوجوانان به دادگاه (هامند۱۲، ۱۹۹۱) کاهش تعداد رفتارهای بزهکارانه و\nافزایش پیشرفت تحصیلی و مشارکت بیشتر در فعالیتهای مدرسه (گاتفردسون۱۳، ۱۹۸۷؛\nمالکی و الیوت۱۳، ۲۰۰۲)، کاهش تعداد رفتارهای نامناسب در کلاس درس مانند پرخاشگری،\n\n1. Mather & Rutherford\n2. Gresham, Van & Cook\n3. Ramsey\n4. Segrin\n5. Spence\n6. Harris\n7. Schulz & Koller\n8. Verduyn\n9. Kamps & Kay\n10. Sim\n11. Hammend\n12. Gattfredson\n13. Malecki & Elliott\n\n۲۱۰\nروان شناسی و آموزش کودکان و نوجوانان\nتکانشگری و رفتارهای خارج از صندلی (کامپز و همکاران، ۲۰۰۰)، افزایش در مفهوم خود،\nخودکارآمدی اجتماعی و کاهش در مشکلات درونی سازی می‌شود. همچنین بهبود\nمهارت‌های اجتماعی نو نوجوانان و توانایی مقابله با عوامل تنیدگی‌زای اجتماعی می‌تواند مانع\nسازش نایافتگی‌های اجتماعی شدید گردد (هارل ۱ و همکاران، ۲۰۰۸). بنابراین به طور کلی\nمی‌توان نتیجه گرفت که افزایش مهارت‌های اجتماعی با کاهش مشکلات هیجانی - رفتاری\nمرتبط است (کامینگ ۲ و همکاران، ۲۰۰۸؛ پریس و ملور، ۲۰۰۸؛ به نقل از حسین\nخانزاده، ۱۳۸۹ و ۱۳۹۰).\nمداخله اولیه\nفصل ششم: اختلالها\nشناختی و حرکتی پیچ\nروابط اجتماعی داشته\n۲. در فعالیت‌های پر\nکودکان پیش‌دبستانی\nخانواده نمو نیافته-\nاین گونه تصور نگر\nدر سال‌های پیش\nقضاوت درباره ایم\n۴. شدیدترین انوا\nمشاهده می‌گردن\nشناسایی اولیه و پیشگیری هدف‌های اصلی برنامه‌های مداخله برای هر نوع ناتوانی است.\nهمواره هزینه ارائه خدمات پیشگیرانه کمتر از هزینه‌های مربوط به درمان در سنین بالاتر است.\nمداخله‌های مربوط به کودکان خردسال با هدف پیشگیری یا کاهش تأثیر اختلال رفتاری\nاست. نقش خانواده در این میان بسیار مهم است، چرا که کودک در محیط خانه به سر\nمی‌برد. گسترش مهارت‌های ارتباطی و تعامل اجتماعی مناسب با اعضای خانواده از محورهای\nعمده مداخله است.\nاز آن جایی که رفتارهای اجتماعی - هیجانی کودکان خردسال بسیار انعطاف‌پذیر است،\nبه نظر می‌رسد که شانس موفقیت تلاش‌های پیشگیرانه بالا باشد (کافمن، ۲۰۰۵ج). تعریف\nاختلال‌های هیجانی - رفتاری کار دشواری است، با این حال تعریف و شناسایی این اختلال‌ها\nدر کودکان پیش‌دبستانی جهت مداخله اولیه با دشواری‌های بیشتری روبرو است که عبارتند از:\n۱. تکالیف تحولی که از کودکان خردسال انتظار می‌رود در مقایسه با کودکان مسن‌تر آسان‌تر\nاست، زیرا دامنه رفتارهای بهنجاری که از کودکان خردسال انتظار می‌رود، کاملاً محدود است.\nاز نوزادان و کودکان خردسال خوردن، خوابیدن، و انجام مهارت‌های حرکتی نسبتاً ساده و\nپاسخ‌دهی اجتماعی به والدین انتظار می‌رود. با این حال کودکان سنین مدرسه باید مهارت‌های\nدیگری مانند کم\nپایه (مانند تغذ\nاست. مشکلات\nنشان می‌دهند\nمشکلات ممـ\nناتوانی‌های\nبسیار\nبالینی ارجا\nنشان دادند\nدارای خل\nپاسخ‌های\nنشان می\nاست.\nمؤثر.\n\n۲۱۱\nفصل ششم: اختلالهای هیجانی/رفتاری\nشناختی و حرکتی پیچیده و متنوع‌تری را انجام دهند و با دامنه‌ای از همسالان و بزرگسالان\nروابط اجتماعی داشته باشند.\n۲. در فعالیتهای پرورش کودک توسط والدین شایسته و در انتظارات خانواده از رفتارهای\nکودکان پیش‌دبستانی در فرهنگهای مختلف، تنوع زیادی وجود دارد. رفتارهایی که در یک\nخانواده نمونه‌یابته [؟]، گوشه‌گیرانه و پرخاشگرانه توصیف می‌شود، ممکن است در خانواده دیگر\nاین‌گونه تصور نگردد.\n۳. در سال‌های پیش‌دبستانی، تحول کودکان سریع و اغلب غیر یکنواخت است، بنابراین\nقضاوت درباره این که چه پیشرفتهای ارتجالی ممکن است رخ دهد، دشوار است.\n۴. شدیدترین انواع اختلال‌های هیجانی-رفتاری اغلب اوقات در ابتدا در سال‌های پیش‌دبستانی\nمشاهده می‌گردند. اما در بیشتر موارد تفاوت بین اختلال‌های هیجانی/ رفتاری با شرایط\nدیگری مانند کم‌توانی ذهنی دشوار است. اغلب، اولین نشانه‌ها مشکلات در کنشهای زیست‌شناختی\nپایه (مانند تغذیه، خوابیدن، دفع)، پاسخ‌های اجتماعی نامناسب، یا تأخیر در یادگیری زبان\nاست. مشکلات در این ابعاد اساسی یا در نقاط عطف تحولی مانند راه رفتن و صحبت کردن\nنشان می‌دهند که کودک ممکن است ناتوانی‌های هیجانی یا رفتاری داشته باشد، اما این\nمشکلات ممکن است همچنین نشانگرهای شرایط دیگر مانند کم‌توانی ذهنی، آسیب حسی، یا\nناتوانی‌های جسمانی باشند (هالاهان و کافمن، ۲۰۰۹).\nبسیاری از کودکانی که به خاطر رفتارهای مخرب در سنین ۷ تا ۱۲ سالگی به متخصصان\nبالینی ارجاع داده می‌شوند، نشانه‌های آشکار مشکلات رفتاری را در سنین ۴ الی ۷ سالگی\nنشان دادند (لوبر¹ و همکاران، ۱۹۹۲ ؛ والکر و همکاران، ۲۰۰٤). نوزادان و خردسالانی که\nدارای خلق و خوی دشوار² هستند (یعنی دارای الگوهای نامنظم خواب، تغذیه، و دفع هستند؛\nپاسخ‌های بسیار شدید به بسیاری از محرکها و واکنش‌های منفی نسبت به موقعیتهای جدید\nنشان می‌دهند)، در معرض خطر جدی مشکلات رفتاری هستند.\nاز آن جایی که رفتارهای کودکان نسبت به شرایط محیط اجتماعی کاملاً پاسخ دهنده\nاست، بنابراین نقش پیشگیری اولیه³ بسیار مهم است. اگر والدین و معلمان بتوانند مهارتهای\nمؤثر مدیریت رفتار کودک را بیاموزند، احتمالاً بسیاری از مشکلات رفتاری کودک پیشگیری\n\n1. Loeber\n2. Difficult temprament\n\n۲۱۲\nروان شناسی و آموزش کودکان و نوجوانان\nمی‌گردد (والكر و همكاران ؛ ٢٠٠٤). همچنین در صورتی که والدین و معلمان از این مهارت‌ها\nبرخوردار باشند، از بدتر شدن وضعیت کودکان مبتلا به اختلال‌های هیجانی- رفتاری\nجلوگیری میگردد (پیشگیری ثانویه ').\nدر صورتی که رفتارهای پرخاشگرانه یا گوشه‌گیرانه در کودکان پیش‌دبستانی مشاهده\nگردد، بهترین نوع مداخله از نوع مداخله‌های رفتاری است که تا حد زیادی مؤثر هستند. یک\nرویکرد رفتاری به تعریف و اندازه‌گیری رفتارهای کودک و چیدمان مجدد محیط (به\nخصوص پاسخ‌های بزرگسالان و دیگر کودکان نسبت به مشکل کودک) جهت تدریس و\nحمایت از رفتارهای مناسب‌تر اشاره دارد. در مورد کودکان پرخاشگر، پاداش‌های اجتماعی\nبرای پرخاشگری باید قطع گردد. به عنوان مثال کتک زدن دیگران به جای دریافت توجه\nبزرگسال باید طرد اجتماعی و محروم‌سازی را به دنبال داشته باشد. در هر صورت اگر کودکان\nمبتلا به اختلال‌های هیجانی- رفتاری در سنین اولیه شناسایی گردند و مداخله کافی جامع،\nشدید و مستمر دریافت کنند، با احتمال زیاد بهبود می‌یابند و الگوهای رفتاری از نظر تحولی\nبهنجار را نشان خواهند داد (والکر و همکاران، ٢٠٠٤).\nخلاصه فصل\nتعریف اختلال‌های هیجانی/ رفتاری به علت فقدان تعریف دقیق از سلامت روان و رفتار\nبهنجار، تفاوت‌های اساسی در مدل‌های مفهومی و مشکلات در اندازه‌گیری هیجان‌ها و رفتار\nچندان ساده نیست. این اختلال‌ها تأثیر معناداری را بر عملکرد تحصیلی، اجتماعی و حرفه‌ای\nافراد می‌گذارند. طبقه‌بندی‌های مختلفی از اختلال‌های هیجانی/ رفتاری تاکنون صورت گرفته\nاست که رایج‌ترین آن عبارت است از: اختلال‌های رفتاری درونی‌سازی (مانند اضطراب و\nافسردگی) و اختلال‌های رفتاری برونی سازی (مانند پرخاشگری، تخریب‌گری). برخی کودکان\nممکن است هر دو دسته اختلال‌های درونی‌سازی و برونی‌سازی را دارا باشند.\nنتایج تحقیقات حاکی از آن است که حداقل ۶ تا ۱۰ درصد کودکان و نوجوانان سن\nمدرسه مشکلات جدی و پایدار هیجانی/ رفتاری را نشان می‌دهند. گزارش‌های مختلف میزان\nشیوع ۰/۵ تا ۲۰ درصد را در میان جمعیت مدرسه نشان داده‌اند. همچنین میزان شیوع\nاختلال‌های هیجانی/ رفتاری در بین پسران نسبت به دختران بیشتر است (نسبت ۵ به ۱).\n\n1. Secondary prevention\n\nفصل ششم: اختلالهای هیجانی/رفتاری\n۲۱۳\nبه طور کلی مجموعه‌ای از عوامل زیست‌شناختی، ژنتیکی، خانوادگی، و فرهنگی در\nایجاد اختلال‌های هیجانی/ رفتاری مؤثرند که تعیین سهم هر یک از آنها دشوار است. فرآیند\nشناسایی اختلال‌های هیجانی/ رفتاری نسبت به تعریف، طبقه‌بندی و سبب‌شناسی آسان‌تر\nاست. با این حال هر چه سن کودک پایین‌تر باشد، قضاوت درباره جدی بودن مشکل او دشوار\nاست و بسیاری از آنها مورد شناسایی قرار نمی‌گیرند. به نظر می‌رسد که غربالگری اولیه توسط\nمعلمان و در مرحله بعد ارزیابی توسط روان‌شناس یا روان‌پزشک، فرآیند شناسایی را دقیق و\nمطمئن می‌سازد.\nنتایج تحقیقات حاکی از آن است که دانش‌آموزان مبتلا به اختلال‌های هیجانی/ رفتاری از\nنظر هوشی در سطح متوسط یا پایین‌تر از متوسط قرار دارند و به ندرت از لحاظ پیشرفت\nتحصیلی، پیشرفته هستند. افت تحصیلی و اخراج از مدرسه در آنها شایع است. این\nدانش‌آموزان به مقررات عمل نمی‌کند و قوانین خانه، مدرسه و جامعه را نادیده می‌گیرند.\nهمچنین در برقراری ارتباط و دوست‌یابی دارای مشکلات اساسی هستند.\nمحورهای عمده در مداخله و درمان اختلال‌های هیجانی/ رفتاری عبارتند از: آموزش\nخانواده، مشاوره، رفتارد و درمانی و دارودرمانی. آموزش مهارت‌های اجتماعی بدون توجه به\nمدل‌های مفهومی متعدد، راهبردهای مؤثر در برنامه‌ریزی آموزشی دانش‌آموزان مبتلا به\nاختلال‌های هیجانی/ رفتاری عبارتند از: مداخله‌های سیستماتیک مبتنی بر داده‌ها، سنجش\nمستمر و بازبینی پیشرفت، تمرین مهارت‌ها در محیط‌های طبیعی، همسو بودن درمان با مشکل،\nدرمان چندمؤلفه‌ای، برنامه‌ریزی برای انتقال یادگیری به موقعیت‌های جدید، و تعهد نسبت به\nمداخله مستمر.\nیکی از محورهای عمده در درمان اختلال‌های هیجانی/ رفتاری، آموزش مهارت‌های\nاجتماعی است. نتایج تحقیقات متعدد حاکی از آن است که آموزش مهارت‌های اجتماعی باعث\nکاهش در تعداد رفتارهای بزهکارانه، پرخاشگری، تکانشگری، نارسایی توجه، و افزایش\nپیشرفت تحصیلی، خودکارآمدپنداری اجتماعی و سازش‌یافتگی اجتماعی می‌گردد.\nدر نهایت این که شناسایی اولیه و پیشگیری و مداخله اولیه همواره هم برای کودک و\nخانواده او و هم برای جامعه مفید و به‌صرفه است و بسیاری از کودکانی که در سنین\nمدرسه، مشکلات رفتاری زیادی را نشان می‌دهند در سنین خردسالی، نشانه‌های آشکار آن را\n\n۲۱۴\nروان شناسی و آموزش کودکان و نوجوانان\nدارا بودند. مهمترین راهبرد در مورد مشکلات رفتاری کودکان پیش‌دبستانی، آموزش والدین و\nمداخله‌های رفتاری است.\nهدف\nاز خوان\n۱. تحمـ\n۲. انو\n۳. را\n۴. ر\n۵. ن"}, {"title": "فصل ۷", "text": "روانشنا و آموزش\nکودکان و نوجوانان\nبا نیازها ویژه\nتأليف:\nدکتر عباسعلی حسین خالونژاد (چشمک)\n(استادیار روانشناسی دانشگاه گیلان)\n\nفصل هفتم\nاختلال‌های ارتباطی\n\nاهداف یادگیری\nاز خواننده انتظار می‌رود پس از مطالعه مطالب این فصل بتواند:\n۱. تحول بهنجار زبان را در سنین مختلف بیان نماید.\n۲. انواع اختلال‌های زبان و گفتار را به طور کامل شرح دهد.\n۳. راهبردهای سنجش اختلال‌های ارتباطی را توضیح دهد.\n۴. راهبردهای آموزشی مختلف جهت بهبود اختلال‌های ارتباطی را شرح دهد.\n۵. نقش خانواده را در پیشگیری از اختلال‌های ارتباطی بیان کند.\n\nبرقراری ارتباط یک بخش طبیعی زندگی روزمره ما است و تنها شامل صحبت کردن نمی‌گردد.\nارتباط، درک گفتار و ایما و اشاره، خواندن و نوشتن را نیز شامل می‌شود. برای برخی افراد،\nبرقراری ارتباط بدون تلاش و همراه با احساس خوشایند نیست. مشاهده اکتساب گفتار و زبان\nدر کودکان، والدین را شادمان و ناتوانی کودک در تحول زبان و گفتار، آنها را مستأصل\nمی‌کند. همه اختلال‌های ارتباطی شامل اختلال‌های گفتار۱ نمی‌گردد، همه اختلال‌های گفتاری\nکه در تعامل اجتماعی معلولیت ایجاد می‌کنند، شامل لکنت۲ نمی‌گردد، و در نهایت این که\nلکنت رایج‌ترین اختلال گفتار نیست. بدون شناخت تحول بهنجار زبان، درک اختلال‌های\nارتباطی دشوار است. بنابراین قبل از بحث اختلال‌های زبان و گفتار، تحول بهنجار زبان را به\nطور مختصر شرح می‌دهیم.\n\nتحول زبان\nنسلون۲ (۱۹۹۸) شش نظریه زبان را مطرح کرد که در زمان‌های مختلف درباره ارتباط انسانی\nمورد بحث قرار گرفتند:\n۱. یادگیری زبان به تحول مغز و کنش‌وری صحیح مغز وابسته است. اختلال‌های زبان بعضی\nزمان‌ها نتیجه نارساکنش‌وری مغز است، و روش‌های جبران نارساکنش‌وری بعضی اوقات\nمی‌تواند آموزش داده شود. تأکید بر روی نمویافتگی زیست‌شناختی است.\n\n1. Speech\n2. Stuttering\nScanned with CamScanner\n\n۲۱۸\nروان شناسی و آموزش کودکان و نوجوانان\n۲. یادگیری زبان تحت تأثیر پیامدهای رفتار زبانی است. اختلالهای زبان می تواند نتیجه\nیادگیری نامناسب باشد و پیامدها می‌تواند برخی اوقات برای تصحیح اختلال زبانی به کار\nگرفته شود. تأکید بر روی روانشناسی رفتاری است.\n۳. زبان می تواند به عنوان دروندادها و بروندادهای مرتبط با پردازش اطلاعات مورد تحلیل\nقرار گیرد. پردازش ناقص ممکن است علت برخی اختلالهای زبان باشد و مهارتهای\nپردازش مؤثر بعضی وقت‌ها می‌تواند آموخته شود. تأکید روی پردازش اطلاعات است.\n٤. زبان حاصل یک فرایند زیست شناختی است که قواعد حاکم بر فرم، محتوا، و استفاده از\nزبان را دیکته می کند. اختلالهای زبان نتیجه شکست در کسب یا به کار بردن قواعد حاکم بر\nزبان است، و این اختلالها با کمک به فرد جهت یادگیری این قواعد، قابل حل است. تأکید بر\nروی دیدگاه زبان شناسی ذاتی است.\n٥. زبان یکی از مهارتهای شناختی متعدد است. اختلالهای زبان مشکلات اساسی در تفکر\nو یادگیری را منعکس می کند و بعضی وقت ها این اختلالها می‌توانند به طور مؤثری با\nآموزش مهارت‌های شناختی خاص مورد توجه قرار گیرد. تأکید بر روی تحول شناختی است.\n٦. زبان از نیاز به برقراری ارتباط در تعاملات اجتماعی بر می خیزد. اختلالهای زبان شامل\nدرهم شکستگی در توانایی ارتباط مؤثر با محیط است و محیط طبیعی بعضی وقت‌ها می تواند\nبرای تدریس و حمایت مؤثرتر تعامل، سازماندهی شود. تأکید بر روی تعامل اجتماعی است.\nهمه این نظریه ها عناصر حقیقت علمی را در بر دارند، اما هیچ کدام توانایی تبیین تحول\nزبان و اختلالهای زبان تحول و اختلالهای زبان به طور کامل را ندارند. هر شش نظریه فواید\nو معایبی برای تشخیص اختلالهای زبان و تجویز مداخلات مؤثر دارا هستند. پیشرفت در\nفن آوری تصویربرداری از نورونها منجر به درک بهتر پایه های زیست شناختی زبان شده است\n(فونداس۱، ۲۰۰۱). با این حال نظریه تعامل اجتماعی بیشترین استلزام های مستقیم را برای\nآسیب شناسان گفتار و زبان به دنبال دارد، زیرا بر چگونگی پرورش مهارت های ارتباطی از\nطریق تعامل بزرگسال - کودک تأکید می کند (آنز۲، ٢٠٠٤).\nدر سال اول و اوایل سال دوم زندگی باید از رفتارهای پیش زبان شناختی۳ سخن گفت و\nنمی توان از زبان به معنای دقیق کلمه استفاده نمود. بیشتر نوزادان در دو تا سه ماهگی شروع به غان\nFundas\n\nفصل هفتم: اختلال‌های ارتباطی\n۲۱۹\nو غون می‌کنند و در ۵ الی ۶ ماهگی صداهایی تولید می‌شود که شبیه کلمات است و با تقویت\nوالدین، تکرار می‌گردند. سپس مهار تلفظ در تولید نخستین کلمات و ظرفیت بازپدیدآوری\nبلافاصله یا تقریبی کلماتی که بزرگسال می‌گوید صورت می‌گیرد. بیشتر کودکان تا یک سالگی\nاولین کلمات را بیان می‌کنند و در حدود ۱۸ ماهگی بیشتر آنها می‌توانند جمله‌های دو کلمه‌ای\nبسازند. افزایش کلمات تولیدی و دریافتی بین بروز نخستین کلمات که تا سن یک سالگی اتفاق\nمی‌افتد و پایان سال دوم زندگی به نسبت کند است، ولی پس از آن با افزایش سریع مواجه هستیم\nکه طی آن جمله‌های دوکلمه‌ای یا بیشتر بیان می‌گردند. به طور کلی تحول بهنجار زبان از سنین یک\nتا هفت سالگی در جدول ۱-۷ به صورت خلاصه ارائه شده است.\nجدول ۱-۷: تحول بهنجار زبان از یک تا هفت سالگی\nسن\nوضعیت زبان\nیک\nسالگی\nشناختن نام خود، انجام دستورات ساده، بیان یک یا دو کلمه، درهم‌آمیزی واژه‌ها و\nصوت‌های بی‌معنا، به کار بردن ادا و اطوارهای ارتباطی مانند نشان دادن و اشاره\nکردن\nبه کار بردن ۲۰۰ تا ۳۰۰ کلمه، بیان کردن نام اشیای رایج، بیان کردن عبارت‌های\nدوسالگی\nدو واژه‌ای یا طولانی، یادگیری چند حرف اضافه، ضمیر، فعل و علامت جمع\n(البته همیشه آنها را درست به کار نمی‌برد)\nسه\nسالگی\nبه کار بردن ۹۰۰ تا ۱۰۰۰ کلمه، ساختن جمله‌های ۳ تا ۴ کلمه‌ای، تکرار جمله\nهای ۵ تا ۷ سیلابی، مفهوم بودن تکلم کودک برای اعضای خانواده\nچهار\nسالگی\nبه کار بردن ۱۵۰۰ تا ۱۶۰۰ واژه، شرح دادن داستان‌ها و رویدادهای گذشته نزدیک،\nبه کار بردن حروبط ربط (مانند اما، چون)، قابل فهم بودن تکلم کودک برای\nغریبه\nپنج\nسالگی\nبه کار بردن ۲۱۰۰ تا ۲۳۰۰ واژه، بیان نمودن احساس‌های خود، درک بیشتر حرف\nهای اضافه مربوط به مکان (بالا، پایین) و زمان (قبل، بعد)، انجام دستورهای سه\nمرحله‌ای\nScanned with CamScanner\n\n۲۲۰\nروان شناسی و آموزش کودکان و نوجوانان\nتعریف\nزبان و گفتار، ابزارهای مورد استفاده برای برقراری ارتباط هستند. برقراری ارتباط فرایند\nمشارکت دادن اطلاعات بین دو یا چند نفر است. گفتار به معنای تولید شفاهی کلمات در یک\nزبان معین است و تنها زمانی که اصوات بتوانند منجر به تولید کلمات معناداری گردند، به\nگفتار تبدیل می شوند. چهار فرایند در تولید گفتار نقش دارند:\n۱. تنفس که نیروی لازم را برای گفتار به وجود می آورد.\n۲. صوتی‌سازی که تولید صوت بر اساس لرزش تارهای صوتی است.\n۳. طنین که به کیفیت صدا اشاره دارد و ویژگی منحصر به فرد صدای گوینده را مشخص می سازد\n۴. تلفظ که به حرکت دهان و زبان و تبدیل صوت به آواهای تشکیل دهنده گفتار اشاره دارد.\nاختلال در هر یک از چهار فرایند بالا به اختلال گفتار می انجامد، ولی الزاماً یادگیری زبان\nیا خواندن و نوشتن را مختل نمی سازد.\nاختلال ارتباطی ممکن است زبان یا گفتار یا هر دو را شامل شود و به کنشهای ارتباطی\n(مانند تقاضا کردن، طرد کردن، بحث کردن و استدلال آسیب برساند. ارتباط مستلزم\nرمزگذاری (ارسال پیام ها به صورت قابل فهم) و رمز ge disorder\n2. Secondary\n3. Specific Language impairement (SLI)\n4. Early expressive Language delay (EELD)\n5. Language-based reading impairment\n\nScanned with CamScanner\n\n۲۲۴\nروان شناسی و آموزش کودکان و نوجوانان\nاختلال طیف اوتیسم است (اونز، ۲۰۰۴). مشکل در استفاده از زبان در تعاملات اجتماعی و\nروابط، هم اکنون به عنوان مشکل اصلی در بسیاری از اختلال‌ها نگریسته می‌شود. برای مثال\nاختلال‌های هیجانی و رفتاری، ممکن است از گوشه‌گیری اجتماعی تا برون‌ریزی شدید و\nپرخاشگری گسترده باشد (باتلر، ۱۹۹۹ الف). کودکان خردسالی که اختلال‌های زبان دارند\nممکن است مشکل خاص در تحول مهارت‌ها در تعامل اجتماعی داشته باشند، زیرا آنها شرایط\nاجتماعی را درست تفسیر نمی‌کنند و در ابراز خود مشکل دارند.\nاختلال‌های گفتار\nاختلال‌های گفتار بسیار ناهمگن هستند. انواع، درجات و ترکیب‌های متفاوتی از این اختلال‌ها\nوجود دارد. اختلال‌های گفتار دامنۀ وسیعی از چالش‌های ارتباطی کودکان مدرسه را در بر\nمی‌گیرد. کودکان مبتلا به اختلال‌های گفتار در تولید مناسب صداها، حفظ مناسب جریان یا\nریتم گفتار، با استفاده مناسب از صدا مشکل دارند.\nاختلال‌های در سیالی\nگفتار طبیعی عادی با برخی وقفه‌ها در سیالی گفتار مشخص می‌شود. به طور خاص وقتی که\nیک کودک صحبت کردن را یاد می‌گیرد، نارسایی در سیالی گفتار او طبیعی است. به طور کلی\nاین نارسایی‌ها شامل درنگ‌ها، تکرارها، و سایر وقفه‌های در سیالی گفتار، بخش‌های طبیعی\nیادگیری استفاده از زبان هستند. همه ما برخی صداهای گفتار را با نظم غلط (گفتن یارانه به\nجای رایانه) تلفظ می‌کنیم یا در جای نامناسبی در یک جمله توقف می‌کنیم و یا این که از\nالگوی نامناسب تاکید استفاده می‌کنیم. اما هنگامی که این نشانه‌ها فراگیر و مکرر صورت گیرد\nبه طوری که فهم جملات را تحت تأثیر قرار دهد، به عنوان اختلال در نظر گرفته می‌شود.\nرایج‌ترین نوع اختلال در سیالی، لکنت است. لکنت با نارسایی طبیعی در سیالی گفتار از\nجنبه‌های میزان و نوع نارسایی در سیالی متفاوت است. کودکانی که لکنت دارند در مقایسه با\nکودکان بدون لکنت، عدم سیالی را در سطح وسیع‌تری نشان می‌دهند و تقریباً بیشتر از ده\n1. Owens\n۲. butler\n\n۲۲۵\nفصل هفتم: اختلال های ارتباطی\nدرصد از گفتار آنها را شامل می‌گردد (گیتار، ۱۹۹۸). لکنت زبان ویژگی سخن گفتن در\nکودکانی است که پیشاپیشی واکنش‌های فزون تنودی در آنها مشهود است. کودکانی که لکنت\nدارند بخش‌هایی از یک کلمه را تکرار می‌کنند (من- می‌- می- می‌خواهم)، طولانی کردن\nصدا (آن در خااا اا نه من است...) و انسداد صدا همگی انواع مشکلات در سیالی گفتار هستند.\nحدود ۱ درصد کودکان و بزرگسالان لکنت دارند. پسران بیشتر از دخترها لکنت دارند.\nبسیاری از کودکان به طور سریع عدم سیالی در گفتار را پشت سر می‌گذارند و والدین و\nمعلمان آنها درباره الگوی گفتارشان نگران نیستند. آنهایی که برای بیشتر از یک سال و نیم یا\nدو سال لکنت دارند با خطر لکنت‌های مزمن مواجه هستند.\nبه طور کلی لکنت با عوامل مختلفی مرتبط است. این عوامل عبارتند از: ۱) جنسیت\nمیزان لکنت در پسرها نسبت به دخترها ۳ تا ۷ برابر بیشتر است. ۲) عامل وراثت: تبیین رابطه\nلکنت و وراثت بسیار دشوار است. ۳) تقلید کردن: یکی از شایع‌ترین علت لکنت در کودکان\nتقلید و اکتساب از الگوهای ناصحیح است. بدین معنا که کودک با مشاهده نحوه تکلم افراد\nالکن در مجاورت خود، به صورت ناخودآگاه شیوه نادرست تکلم را یاد می‌گیرد و به لکنت\nدچار می‌شود. ٤) شرایط محیطی و عاطفی: شرایط تنش‌زا و نابسامان خانواده‌ها می‌تواند\nباعث ایجاد لکنت در کودک گردد. ترساندن کودک، تصادف با ماشین، افتادن از بلندی، و دیگر\nشرایط تنیدگی‌زا می‌تواند باعث ایجاد لکنت گردد. بر این اساس لکنت می‌تواند یک رفتار\nواکنشی باشد؛ یعنی پاسخ ناخودآگاه کودک به رویدادهای تنیدگی‌زای محیطی.\nبرای درمان لکنت باید محورهای مختلفی را مورد توجه قرار داد مانند: آموزش والدین\nجهت برخورد مناسب با کودک، تقویت اعتماد به نفس کودک، صحبت کردن با فرد الکن\nدرباره مشکل او، تشویق کودک به حرف زدن درباره ترس‌ها، تنش‌ها و کام‌نایافتگی‌های خود و\nدر نتیجه کاهش تنیدگی‌های روانی، پذیرش کودک با وضعیت گفتاری که دارد با تمام وجود و\nبا صمیمیت، نه با ترحم (نشان دادن واکنش هیجانی نامناسب والدین به هنگامی که کودکشان\nدچار لکنت می‌شود بسیا آسیب‌زا است).\nدر هر صورت کودکی که تصور می‌شود لکنت دارد باید توسط یک آسیب‌شناس گفتار\n- زبان ارزیابی شود. تشخیص زودهنگام برای اجتناب از تحول لکنت مزمن مهم است.\nمتأسفانه، بسیاری از معلمان و پزشکان لکنت‌های بالقوه را برای سنجش عمیق ارجاع\n1. Guitar\n\nروان شناسی و آموزش کودکان و نوجوانان\n۲۲۶\nنمی دهند، چون عدم سیالی را یک بخش طبیعی از تحول گفتار – زبان می‌پندارند. بعضی\nمتخصصان همچنین از رویکرد صبر و مشاهده۱ دفاع می‌کنند (کرلی و یارلی۲، ۱۹۹۷). اما عدم\nمراجعه برای کودکانی که در خطر لکنت هستند به شدت مضر است. اگر لکنت مداوم آن‌ها\nبدون درمان بماند ممکن است منجر به یک اختلال مادام العمر گردد که در توانایی‌شان برای\nارتباط، تحول احساسات مثبت درباره خودشان، دنبال کردن فرصت‌های آموزشی و استخدام\nتأثیر گذارد.\n\nاختلال‌های حرکتی - گفتار۳\n\nماهیچه‌هایی که گفتار را ممکن می‌سازند تحت مهار ارادی هستند. وقتی که آسیب در نواحی\nمغز که ماهیچه‌های مربوط به گفتار یا اعصاب منتهی به آن ماهیچه‌ها را مهار می‌کنند وجود\nدارد در توانایی صحبت کردن طبیعی، اختلال به وجود می‌آید. این اختلال‌ها ممکن است شامل\nصداهای گفتار (دیس‌آرتریا۴) یا برنامه‌ریزی و هماهنگی گفتار (آپراکسیا۵) شود. هر دو اختلال\nبر تولید گفتار، آهستگی سرعت آن و کاهش قابلیت فهم تأثیر می‌گذارند (آنز و\nهمکاران، ۲۰۰۰). به یاد داشته باشید که دیس‌آرتریا و آپراکسیا مانعه‌الجمع نیستند و یک فرد\nمی‌تواند هر دو مشکل را داشته باشد. چون این اختلال‌ها توسط مشکلات عصب‌شناختی ایجاد\nمی‌شوند و اغلب به عنوان اختلال‌های گفتار نوروژنتیک۶ نامیده می‌شوند.\nبا شنیدن گفتار شخص و رسیدگی به مکانیسم گفتارش، آسیب‌شناسان گفتار - زبان\nتوانایی شخص مبتلا به اختلال حرکت - گفتار یا اختلال گفتار نوروژنتیک را با مهار نفس\nکشیدن، صوتی‌سازی، طنین۷ و حرکت‌های مفصل‌بندی۸ ارزیابی می‌کنند. متخصصان پزشکی،\nجراحی و توانبخشی در درمان اختلال‌های عصب‌شناختی، همچنین باید مشکل شخص را\nارزیابی کنند و یک راهبرد مدیریتی را طرح‌ریزی کنند. در موارد این چنین که اختلال عصب\n\n1. Wait & See\n2. Curlee & Yairi\n3. Motor-Speech disorders\n4. Dysarteria\n5. Apraxia\n6. Neurogentic disorders of speech\n7. Resonation\n۸. Articulation\n\n۲۲۷\nفصل هفتم: اختلالهای ارتباطی\nشناختی، گفتار شخص را غیر قابل فهم می‌سازد، یک سیستم ارتباطی افزایشی یا جایگزین\nممکن است لازم باشد.\nاختلال دیس‌آرتریا: مشکلات در صحبت کردن ممکن است به این علت باشد که ماهیچه‌های\nمهار کننده تنفس، حنجره، نای، زبان، فک (آرواره)، و یا لبها نتوانند به درستی مهار گردند.\nبسته به ماهیت آسیب به مغز، کنشهای ادراکی و شناختی ممکن است تحت تأثیر قرار گیرند\nو فرد ممکن است اختلال زبان را علاوه بر اختلال گفتار داشته باشد.\nدیس آرتریا با گفتار آهسته، پرزحمت، جویده جویده و غیر دقیق مشخص می‌شود. در\nنتیجه آسیب مغز، حمایت تنفسی شخص برای تولید صداهای گفتار تحت تأثیر واقع می‌شود و\nگفتار فرد ممکن است با تنفس کم عمق، گرفتگی صدا و کاهش بلندی مشخص شود. شخص\nممکن است به خاطر ضعف ماهیچه، قادر به تولید صداهای گفتار به طور دقیق نباشد. احتمالاً\nشرایطی که به طور رایج در توجیح اختلال دیس‌آرتریا در کودکان مطرح است، فلج مغزی\nاست. آسیب مغزی قبل، هنگام، و بعد از تولد به ضعف ماهیچه‌ای یا فلج منجر می‌گردد.\nبسیاری از علل آسیب مغزی عبارتند از: آسیب جسمانی، محرومیت اکسیژن، مسمومیت،\nبیماری‌ها و سکته. تصادفات وسایل نقلیه یک دلیل رایج آسیب مغزی ناشی از ضربه در\nنوجوانان و جوانان است. به طور کلی هر عاملی که به آسیب مغزی منجر گردد، می‌تواند باعث\nدیس‌آرتریا گردد.\nآپراکسیا: آپراکسیا با اختلال در برنامه‌ریزی حرکتی مشخص می‌گردد، به گونه‌ای که گفتار\nآهسته، پرتقلا، و ناپایدار است. یک شخص با این اختلال ممکن است تشخیص دهد که\nخطاهایی دارد و برای اصلاح آنها تلاش کند، اما تلاش‌هایش در جهت اصلاح، درک گفتار او\nرا مشکل‌تر می‌سازد.\nآپراکسیای تحولی، یک اختلال در برنامه‌ریزی حرکتی است که با تحول مهارتهای\nگفتاری و زبانی کودک پدیدار می‌گردد. کودکان مبتلا به این اختلال تأخیر معناداری در توانایی\nتولید صداهای گفتار و سازمان دادن صداها به کلمات برای ارتباط مؤثر نشان می‌دهند.\nآپراکسیای اکتسابی، دارای نشانه‌های مشابه است اما به خاطر یک سکته یا انواع دیگر آسیب\nمغزی بعد از یادگیری گفتار اتفاق می‌افتد. معمولاً شخص مبتلا به اختلال آپراکسیا می‌داند که\nخطاهایی دارد، می‌خواهد آنها را تصحیح کند، و آنچه که برای ارتباط می‌خواهد را می‌داند؛ اما\n\nScanned with CamScanner\n\n۲۲۸\nروان شناسی و آموزش کودکان و نوجوانان\nبه سادگی نمی‌تواند انجام دهد. در نتیجه آپرکسیا یک اختلال مأیوس کننده غیرمعمول برای\nگوینده است.\nفرایند سنجش\nاولین استراتژی به طور خاص شامل استفاده از آزمون‌های استاندارد، غیراستاندارد‌ شده،\nمقیاس‌های تحولی و مشاهدات رفتاری است. آزمون‌گری استاندارد شده خطرات زیادی دارد و\nهمیشه در برنامه‌ریزی یک برنامه مداخله‌ای مفید نیست. اما بعضی اوقات می‌تواند مقایسه‌های\nاجمالی از توانایی‌های کودک در حوزه معین مفید باشد. مقیاس‌های تحولی، مشاهدات یا\nدرجه‌بندی‌هایی هستند که می‌تواند به وسیله مشاهده مستقیم یا مبتنی بر حافظه و گزارش\nهای مراحل برجسته تحول کامل گردند. آزمون‌های غیر استاندارد شده و مشاهدات رفتاری، از\nلحاظ ماهیت غیرهنجاری هستند، اما می‌توانند بیشترین اطلاعات سنجش را به دست دهند.\nقضاوت غیرعینی یک متخصص بالینی با تجربه مبتنی بر مشاهده زبان کودک در محیط‌ها و\nشرایط گوناگون می‌تواند پایه مفیدتری برای مداخله فراهم کند. از آن جایی که اختلال‌ها از\nنظر ماهیت بسیار متنوع هستند در افراد در محدوده سنی اوایل کودکی تا سنین پیری دیده\nمی شوند. سنجش و مداخله هرگز ساده نیستند و همیشه غیر متعارف هستند. (گیلام و\nهافمن، ۲۰۰۱؛ اونز، ۲۰۰۴). یک طرح مداخله مبتنی بر سنجش باید به محتوا، شکل، زمینه\nاجتماعی، و استفاده از زبان توجه کند و در آن موارد زیر مورد توجه قرار گیرد:\n- کودک درباره چه چیزی صحبت می‌کند و باید بیاموزد تا درباره چه چیزی صحبت کند؟\n- چطور کودک درباره امور مختلف صحبت می‌کند و چطور می‌تواند صحبت درباره امور\nمختلف را یاد بگیرد تا قابل فهم باشد\n- کنش‌های کودک در بافت اجتماعی زبان‌شناسی چگونه است؟\n- چگونه کودک از زبان استفاده می‌کند و چگونه زبان کودک می‌تواند برای هدف‌های برقراری\nارتباط و اجتماعی مؤثر استفاده شود.\nسازماندهی توالی آموزش بر اساس داده‌های سنجش، ممکن است بر پایه توالی تحول\nبهنجار کودک باشد. با این حال، توالی‌های دیگر آموزش ممکن است مؤثرتر باشد، زیرا\nکودکان مبتلا به اختلال‌های زبان به طور آشکار به روش بهنجار یاد نگرفته‌اند و تحقیقات\n\n۲۲۹\nفصل هفتم: اختلال های ارتباطی\nنشان داده است که توالی‌های متفاوت یادگیری ممکن است مؤثرتر باشد. به طور آشکار\nمداخله مؤثر زبان باید در محیط طبیعی کودک صورت گیرد و والدین و معلمان کلاس را نیز\nشامل می‌شود نه فقط آسیب‌شناسان گفتار-زبان (جاستیک، ٢٠٠٦؛ اونز، ٢٠٠٤).\n\nملاحظات آموزشی\nکودکان با همه انواع ناتوانی‌ها به طور فزاینده در کلاس‌های درس آموزش عمومی جای داده\nمی‌شوند. این نکته به این معنی است که همه معلمان باید آگاه باشند که چگونه می‌توانند به\nمشکلات زبانی آن‌ها در کلاس درس توجه کنند (اونز، ٢٠٠٤). کمک به غلبه یافتن کودکان مبتلا\nبه اختلال‌های گفتار و زبان مسئولیت هر متخصص نیست. ولی فرایند شناسایی، مسئولیت\nمشترک معلم کلاس، آسیب‌شناس گفتار-زبان و والدین است. معلم به هنگام صحبت کردن\nکودکان با گوش دادن با دقت و همدلانه، مدل‌های مناسب گفتار و زبان را برای کودکان با\nتقلید کردن و تشویق کودکان برای استفاده از مهارت‌های ارتباطی‌شان به طور مناسب فراهم\nمی‌کند. معلم کلاس می‌تواند نه تنها به بهبود گفتار و زبان کمک کند، که همچنین در\nپیشگیری از تحول برخی اختلال‌ها مؤثر باشد.\n\nتسهیل استفاده اجتماعی از زبان\nنقش اولیه معلم کلاس، تسهیل استفاده اجتماعی از زبان است. اختلال‌های زبان و گفتار یک\nدانش‌آموز لزوماً به این معنی نیست که معلم یا متخصص بالینی باید برای تدریس دانش‌آموز\nدرباره فرم، ساختار، یا محتوای زبان سخت تلاش کنند. در عوض زبان باید به عنوان یک\nروش حل مسایل با ایجاد درک مناسبی از خود و معنا بخشیدن به آنچه که دیگران می‌گویند\nتدریس شود.\nکلاس درس امکانات زیادی را برای یادگیری زبان فراهم می‌سازد. آن، جایی است که\nفرصت‌های زیادی را برای دانش‌آموزان و معلمان فراهم می‌سازد تا زبان را به کار گیرند و در\nروابط سازنده، پسخوراند دریافت کنند. زبان شیوه‌ای است که از طریق آن بسیاری از تکالیف\nیادگیری اجتماعی و تحصیلی صورت می‌گیرد. با این حال زبان مدرسه هم در کلاس‌های\nدرس و هم در متن‌های کتاب اغلب برای دانش‌آموزان و معلمان مشکل است.\n\nروان شناسی و آموزش کودکان و نوجوانان\n۲۳۰\nزبان مدرسه نسبت به زبان بسیاری از کودکان در خانه و با هم بازی ها رسمی‌تر است. زبان\nمدرسه یک گفتگوی سازمان‌یافته است که در آن شنونده و گوینده یا خواننده و نویسنده باید به\nطور آشکار و دقیق اطلاعات ضروری را به سرعت و سهولت انتقال داده و تفسیر نمایند. بدون\nمهارت در استفاده از زبان مدرسه، کودک بی‌تردید از لحاظ تحصیلی شکست می‌خورد و از نظر\nاجتماعی ناموفق خواهد بود. بنابراین در مدرسه و کلاس درس معلمان باید به متخصصان\nزبان- گفتار در سنجش ناتوانایی‌های زبانی دانش آموز و در ارائه مداخلات کمک کنند.\n\nراهبردهای پرسش- پاسخ\nیک نمونه از نقش زبان معلم در گفتگوی کلاس درس، پرسیدن سوال است. معلمان اغلب در\nکلاس درس از دانش آموزان سوال‌هایی در حوزه‌هایی که ضعف دارند می‌پرسند و بنابراین\nاستفاده از زبان بیانی دانش آموز را کاهش می‌دهند. به عنوان مثال معلم ممکن است از یک\nدانش آموز پیش‌دبستانی که رنگ‌ها را نمی‌شناسد، بخواهد که رنگ‌ها را شناسایی کند یا یک\nمعلم ممکن است از سوال‌های بله/ خیر، زیاد استفاده کند. این گونه پرسش‌ها، امکان گفتگو را\nدر دانش آموزان کاهش می‌دهد. متأسفانه معلمان ممکن است ندانند که چگونه باید سوال‌های\nخود را در تدریس مؤثر مفاهیم اصلاح کنند و بنابراین سوال‌های آنها صرفاً به سردرگمی\nکودکان بی‌افزاید.\nبنابراین معلم باید در راهبردهای پرسشگری از دانش آموز تجدید نظر کند. هنگامی که\nدانش آموز در پاسخدهی به سوال سطح بالا که از سطح اطلاعات و مهارت او بالاتر است\nشکست می‌خورد، معلم باید مسئله را در سطح ساده‌تر مطرح کند و سپس گام به گام به سمت\nتکلیف نهایی پیش برود. برخی اوقات معلمان ممکن است منظورشان را در پرسشگری از\nدانش آموزان به طور آشکار بیان نکنند و موضوع سوال‌های خود را به طور آشکار حذف\nمی‌کنند. برای مثال یک معلم ممکن است بپرسد \"چه چیزی را قصد داری به من بگویی؟\". در\nنتیجه دانش آموز دچار سردرگمی می‌شود. معلمان باید در چنین شرایطی به طور آشکار مسئله\nرا بیان نمایند. معلمان همچنین باید به پاسخ‌های دانش آموزان به سوال‌ها، پسخوراند واضح\nارائه کنند. در اغلب اوقات معلمان به علت ترس از نشان دادن عدم پذیرش به طور آشکار به\nدانش آموز نمی‌گویند که پاسخشان اشتباه است. عدم ارائه پسخوراند صحیح و آشکار،\nدانش آموزان را از یادگیری مفاهیم موجود در آموزش باز می‌دارد. بنابراین به طور کلی نقش\n\n۲۳۱\nفصل هفتم: اختلالهای ارتباطی\nمعلم تنها آموزش دانش‌آموزان درباره زبان نیست، که همچنین باید نحوه استفاده از زبان را به\nدانش‌آموز یاد بدهند. به طور خاص معلم باید به دانش‌آموزان کمک کند تا چگونگی استفاده\nاز زبان را در بافت کلاس درس بیاموزند. همچنین استفاده معلم از زبان یک عامل اصلی در\nکمک به دانش‌آموزان در جهت یادگیری مؤثر است؛ به خصوص اگر دانش‌آموزان دارای\nاختلال‌های زبانی باشند.\nمعلمان باید به یاد داشته باشند که اختلال‌های زبان می‌تواند با تحول کودک تغییر کند.\nاگر کودکی دارای زبان بیانی و دریافتی بهنجار در یک سن خاص است بدین معنا نیست که\nدر سنین بعدی از وضعیت بهنجار برخوردار خواهد بود. مداخله‌های زبانی می‌تواند ماهیت و\nروند توانایی‌های زبانی کودک را تغییر دهد اما حتی از طریق آن یک کودک ممکن است\nدارای مشکلات زبانی مستمر باشد و توانایی‌های زبانی بهنجاری را نشان ندهد.\nتدریس زبان نوشتاری\nزبان نوشتاری یک مشکل خاص برای بسیاری از دانش‌آموزان مبتلا به اختلال‌های زبان و\nگفتار است. با پیشرفت دانش‌آموزان در پایه‌های بالاتر زبان نوشتاری اهمیت فزاینده‌ای\nمی‌یابد. از دانش‌آموزان انتظار می‌رود متن‌های پیچیده و دشوار را بخوانند و معنای آن را\nدرک کنند. علاوه بر این از آنها انتظار می‌رود تا خود را به طور آشکار به صورت نوشتاری\nبیان کنند. تعامل معلمان با دانش‌آموزان درباره نوشتن در غلبه بر ناتوانی‌های زبان\nنوشتاری بسیار مهم است. در این ارتباط معلمان باید سوال‌هایی را از دانش‌آموزان درباره\nنحوه نوشتن قابل فهم برای خوانندگان بپرسند گراهام و همکاران، ۱۹۹۸). علاوه بر این\nراهبردهایی که معلمان برای کمک به دانش آموزان در جهت تسلط بر نظام الفبایی استفاده\nمی کنند نیز مهم است.\nدر نهایت این که برنامه مداخله‌ای مربوط به اختلال‌های زبانی بسیاری از راهبردهای\nمورد استفاده برای درمان ناتوانی‌های یادگیری مانند آموزش فراشناختی، آموزش راهبردها و\nبسیاری از شیوه‌های دیگری که در فصل ناتوانی‌های یادگیری شرح داده شدند را شامل\nمی‌گردد (هالاهان و همکاران، ۲۰۰۵).\nScanned with CamScanne\n\nروان شناسی و آموزش کودکان و نوجوانان\n۲۳۲\nمداخله اولیه\nمداخله اولیه در بهبود اختلالهای زبان و گفتار کودک بسیار مهم است. اگر شروع مداخله در\nسنین بالاتر صورت گیرد، شانس اکتساب مهارتهای زبانی مؤثر کمتر خواهد بود. مطالعات\nدرباره تحول اولیه کودک نشان داده است که سالهای اول زندگی یک دوره بسیار مهم برای\nیادگیری زبان است. زبان کودک و تحول اجتماعی او به ماهیت و کمیت تعامل زبانی او با\nوالدین و سایر مراقبین بستگی دارد. در خانواده‌هایی که تعامل زبانی مطلوبی بین والدین و\nکودکان صورت می‌گیرد و رفتار کودکان مورد تأیید و تشویق قرار می‌گیرد، تحول زبانی در\nکودکان با سهولت صورت می‌گیرد و این کودکان در مدرسه نیز تعاملات زبانی خوبی با\nهمسالان و معلمان خواهند داشت. بنابراین کلید پیشگیری از بسیاری از ناتوانی‌های مرتبط با\nتحول زبان، کمک به والدین در برقراری ارتباط مناسب با کودکان در دوران نوزادی و طفولیت\nاست. با این حال برای بسیاری از کودکان، مداخلات در پایه‌های پیش‌دبستانی و ابتدایی\nضروری است. این کودکان ممکن است دارای ناتوانی‌های چندگانه‌ای باشند که برخی اوقات\nدر حد شدید با عمیق است.\nتحول زبان به طور نزدیکی با تحول شناختی گره خورده است، بنابراین نارسایی در\nتوانمندی هوشی پایین احتمالا با عقب افتادگی در تحول زبان همراه است. برعکس فقدان زبان\nنیز می‌تواند بر تحول شناختی تأثیر منفی بگذارد. از آن جایی که گفتار به تحول حرکتی و\nعصب‌شناختی وابسته است، هرگونه مشکل عصب‌شناختی یا حرکتی ممکن است بر توانایی\nصحبت کردن تأثیر بگذارد. تحول اجتماعی بهنجار در سالهای پیش‌دبستانی همچنین به وجود\nزبان وابسته است، بنابراین یک کودک مبتلا به نارسایی زبان از لحاظ یادگیری اجتماعی۱ در\nوضعیت نامساعدی قرار دارد. در نتیجه زبان کودک پیش‌دبستانی به ندرت تنها موضوع مورد\nمداخله است.\nکودکان مبتلا به اختلال‌های زبان ممکن است از مراحل تحولی مشابهی همانند بیشتر\nکودکان برخوردار باشند، اما هر مهارت را در سنین بالاتری کسب نمایند. بسیاری از کودکان\nبا تأخیر در تحول زبان، شکاف تحولی را تجربه می‌کنند که پشت سر نخواهند گذاشت\n(اونز، ۲۰۰۴). آنها به طور مکرر برچسب‌های کم‌توان ذهنی یا دیگر کم‌توانی‌های تحولی۲ را\nSooned\n\n۲۳۳\nفصل هفتم: اختلالهای ارتباطی\nتجربه می‌کنند. برخی اوقات این کودکان، به محیطهای محروم از تجربه‌های مختلف مربوط\nهستند و از تحریکات زبانی مناسبی برخوردار نبودند یا این که به شدت مورد سوء استفاده یا\nغفلت قرار گرفتند. با این حال صرف نظر از دلایل تأخیر زبانی کودک ، درک ماهیت تأخیر و\nمداخله‌های لازم جهت یادگیری استفاده از زبان به طور مؤثر بسیار مهم است.\nبرخی از کودکان تا سه سالگی از زبان به طور ارتجالی۱ استفاده نمی‌کنند. آن‌ها ممکن\nاست صداهایی را تولید کنند، اما از آن‌ها به روش‌هایی برای برقراری ارتباط استفاده می‌کنند که\nمشخصه برقراری ارتباط در نوزادان قبل از یادگیری گفتار است. به عبارت دیگر آن‌ها از ارتباط\nپیش‌زبانی استفاده می‌کنند. برای مثال آن‌ها ممکن است از ایما و اشاره‌ها و صداها برای\nخواستن اشیاء یا فعالیت‌هایی از سوی دیگران، درخواست‌های اجتماعی یا سلام و احوال\nپرسی استفاده کنند. به هنگام سنجش و برنامه‌ریزی مداخله برای کودکان مبتلا به تأخیر زبان،\nدر نظر گرفتن رفتارهای زبانی و غیر زبانی که آن‌ها تقلید می‌کنند، این که چه چیزهایی را درک\nمی‌کنند، چه مهارت‌های ارتباطی را به طور خود انگیخته استفاده می‌کنند، و ارتباط چه نقشی\nدر زندگی آن‌ها بازی می‌کند؛ دارای اهمیت است. همچنین مداخله باید در بافت‌هایی که زبان\nبرای تعامل اجتماعی بهنجار مورد استفاده قرار می‌گیرد، صورت گیرد. برای مثال والدین یا\nمعلّمان ممکن است از رویکرد تدریس محیطی۲ استفاده کنند. این رویکرد مداخله زبانی\nطبیعت‌گرایانه‌ای است که برای تدریس مهارت‌های کنشی زبان طراحی شده است (کایسر۳ و\nهمکاران، ۱۹۹۵) بر اساس این رویکرد، تدریس بر اساس علایق کودک صورت می‌گیرد.\nهنگامی که کودک عمل، شی یا فعالیتی را از بزرگسال تقاضا می‌کند، بزرگسال زبان کودک را\nتشویق می‌کند و دسترسی کودک به تقاضای مورد نظرش را به تلاش برای برقراری ارتباط\nوابسته می‌سازد. تدریس محیطی یک رویکرد طبیعت‌گرایانه است که مداخله‌هایی را طراحی\nمی‌کند که شامل گفتگوهای عادی بین والدین و کودکان است. ارتباط پیش‌زبانی ممکن است\nنشانگر خوبی از توانایی بعدی کودک برای استفاده از زبان باشد (کالاندِرلا و\nویلکاکس۴، ۲۰۰۰). کارآمد بودن این رویکرد تدریس ممکن است به میزان پاسخگو بودن مادر\n۱ ...\nScanned with CamSc\n\nروان شناسی و آموزش کودکان و نوجوانان\n۲۳۴\nبه شیوه های ارتباط پیش‌زبانی کودک (حداقل در برخی محیط‌ها) وابسته باشد (یادر و\nوارن ، ۲۰۰۱؛ به نقل از هالاهان و کافمن، ۲۰۰۹).\nنقش خانواده\nتحول زبان به تعاملات اولیه مادر کودک وابسته است. نگرانی در مورد تحول کودک از لحاظ\nتوانایی ارتباطی نمی‌تواند از نگرانی در مورد سایر حوزه‌های تحولی کودک مجزا باشد. بنابراین\nآسیب‌شناسان گفتار-زبان بخش ضروری تیم بین‌رشته‌ای هستند که کودک با ناتوانی را ارزیابی\nمی‌کنند و در طراحی طرح خدمات خانوادگی فردی شده، مشارکت دارند. برنامه‌های\nمداخله‌ای اولیه در حقیقت شامل گسترش نقش والدین است. این برنامه‌ها شامل بازی‌های\nساده با کودک به همراه کلامی‌سازی است. مادر باید با کودک درباره اشیاء و فعالیت‌ها صحبت\nکند. باید از اشیاء، فعالیت‌ها و کلمات برای لفاظی‌ها و یا آواگری‌های کودک استفاده نمود که\nاحتمال یادگیری زبان کاربردی در کودک افزایش یابد (فی، کاتز و لاریو ، ١٩٩٥).\nمتخصصان دوران اولیه کودک بر این باورند که مداخله‌ پیش‌زبانی برای تحول زبان مهم\nاست. پایه‌های زبان در ماههای اولیه زندگی در طی گفتگوهای غیرکلامی نوزاد با مادر و\nمراقب شکل می‌گیرد (نلسون، ۱۹۹۸). بنابراین ارزیابی توانایی‌ها و نیازهای خانواده و آموزش\nوالدین در جهت آموزش و مدیریت کودک مهم است. در واقع والدین می‌توانند با کمک\nمتخصصان نقش مهمی را در تحول زبان کودک ایفا کنند.\nمداخله در دوران کودکی اولیه بر پایه سنجش توانایی‌های کودک در ارتباط با محتوا،\nفرم، و به طور خاص استفاده از زبان در تعاملات اجتماعی باشد. سنجش و مداخله برای\nکودکی که هنوز زبان را یاد نگرفته است، بر تقلید بازی‌های تشریفاتی، بازی با اشیاء، و استفاده\nکنشی از اشیاء استوار است. هنگامی که استفاده کودک از زبان مورد توجه قرار می‌گیرد،\nاولیه ترین هدف‌ها باید شامل این موارد باشد:\n- توجه کودک به بزرگسال در طی تعامل\n- رعایت نوبت در بازی‌ها و فعالیت‌های لذت بخش\n- دنبال کردن نگاه یک بزرگسال و هدایت رفتار توسط بزرگسال، و\nWorren\n\nفصل هفتم: اختلالهای ارتباطی\n۲۳۵\n- استمرار در اصلاح ایما و اشاره‌ها، صداها یا کلماتی که بزرگسال به آنها پاسخ نمی دهد.\nدر سنین پیش دبستانی آموزش مهارتهای گفتگو، تمرکز اصلی مداخله زبانی است. به\nطور خاص تأکید بر آموزش کودک جهت استفاده از گفتگوهای ضروری برای موفقیت در\nمدرسه است. روندهای کنونی در مداخله‌های زبان و گفتار مبتنی بر محیط‌های معمول کودکان\nاست. بنابراین معلمان و آسیب شناسان گفتار - زبان باید روابط کاری نزدیکی را داشته باشند.\nمتخصص زبان و گفتار ممکن است به طور مستقیم با کودکان در کلاس درس کار کند و به\nمعلم درباره مداخله‌ای که می‌تواند به عنوان بخشی از فعالیت عادی کلاس درس انجام دهد،\nپیشنهادهایی را ارائه کند (هالاهان و کافمن، ۲۰۰۹).\n\nخلاصه فصل\nزبان به عنوان یکی از کنش‌های اصلی انسان و به عنوان ابزار برقراری ارتباط به حساب می‌آید. در\nسال‌های اول و دوم زندگی باید از رفتارهای پیش‌زبانی سخن به میان آورد. بر اساس روند بهنجار\nتحول زبان، بیشتر نوزادان در سنین ۲ تا ۳ ماهگی شروع به غان و غون می‌کنند. تولید صداهایی\nشبیه کلمه در سنین ۵ تا ۶ ماهگی، تولید اولین کلمات تا یک سالگی، و جمله‌های دو کلمه در\nستین ۱۸ ماهگی در بیشتر کودکان مشهود است. پس از پایان سال دوم زندگی افزایش سریع در\nتولید کلمات و جملات اتفاق می‌افتد.\nبا این حال روند تحول بهنجار زبان و گفتار در برخی کودکان با مشکلاتی همراه است. به\nطور کلی اختلالهای ارتباطی ممکن است زبان یا گفتار یک کودک را تحت تأثیر قرار دهد.\nاختلال‌های زبان شامل مشکلات در دریافت و بیان است و اختلال‌های گفتار، اختلال در تولید و\nاستفاده از زبان شفاهی را در بر می‌گیرد. برآوردها حاکی از آن است که در حدود ۱۰ تا ۱۵ درصد\nکودکان پیش‌دبستانی و حدود ۶ درصد دانش‌آموزان پایه‌های ابتدایی و متوسطه به اختلال‌های\nگفتار و حدود ۲ تا ۳ درصد کودکان پیش‌دبستانی و حدود ۱ درصد جمعیت سنین مدرسه‌رو به\nاختلال‌های زبانی مبتلا هستند.\nاختلال‌های زبانی را می‌توان در دو مقوله اختلال‌های زبان اولیه و اختلال‌های زبان ثانویه\nتقسیم نمود. اختلال‌های زبان اولیه به اختلال‌هایی اشاره دارد که علت قابل شناسایی برای آن وجود\nندارد، مانند تأخیر اولیه در زبان بیانی و اختلال خواندن مبتنی بر زبان. اختلال‌های زبان ثانویه به\n\nروان شناسی و آموزش کودکان و نوجوانان\n۲۳۶\nآن دسته از اختلالهای زبانی اشاره دارد که توسط شرایط دیگر مانند کم‌توانی ذهنی، آسیب\nشنیداری، فلج مغزی و نظایر آن به وجود می‌آیند.\nاختلال‌های گفتار بسیار ناهمگن هستند. کودکان مبتلا به اختلال‌های گفتار در تولید\nمناسب صداها، حفظ مناسب جریان یا ریتم گفتار یا استفاده مناسب از صدا مشکل دارند.\nاختلال‌های گفتار را می‌توان در دو دسته اختلال‌های در سیالی گفتار و اختلال‌های\nحرکتی گفتار تقسیم نمود. رایج‌ترین نوع اختلال در سیالی، لکنت زبان است که با نارسایی\nطبیعی در سیالی گفتار متفاوت است. کودکانی که لکنت دارند تکرار بخش‌هایی از کلمه،\nطولانی کردن صدا و انسداد صدا در آن‌ها مشهود است. حدود یک درصد از کودکان و\nبزرگسالان لکنت دارند. این اختلال همچنین در پسران بیشتر از دختران است.\nاختلال حرکتی گفتار ممکن است شامل دیس آرتریا (اختلال در صداهای گفتار) و یا\nآپراکسیا (اختلال در برنامه‌ریزی و هماهنگی گفتار) باشد. هر دو اختلال بر تولید گفتار،\nآهستگی سرعت آن و کاهش قابلیت فهم تأثیر می‌گذارد و ممکن است هر دو در یک فرد\nمشاهده گردند.\nبرای سنجش اختلال‌های ارتباطی می‌توان از آزمونهای استاندارد، آزمونهای\nغیر استاندارد، مقیاس‌های تحولی و مشاهده‌های رفتاری استفاده کرد. برنامه‌های مداخله‌ای باید\nمبتنی بر داده‌های سنجش صورت گیرد و در محیط طبیعی کودک صورت گیرد. نکته مورد\nتوجه این است که علاوه بر متخصص زبان گفتار، والدین و معلمان کلاس درس نیز باید در\nبرنامه مداخله‌ای مشارکت داشته باشند.\nمحورهای مهمی که در بخش برنامه‌های آموزشی و مداخله‌ای در این فصل مورد بحث\nقرار گرفتند عبارتند از: تسهیل استفاده اجتماعی از زبان، استفاده از راهبردهای مناسب پرسش\nو پاسخ، راهبردهای مناسب در تدریس زبان نوشتاری، تمرکز بر برنامه‌های مداخله اولیه، و\nنقش خانواده."}, {"title": "فصل ۸", "text": "فصل هشتم\nآسیب شنوایی\n\nهدف های یادگیری\nاز خواننده انتظار می‌رود پس از مطالعه مطالب این فصل بتواند:\n۱. تعریف‌های مختلف آسیب شنوایی را به صورت تحلیلی- مقایسه‌ای بیان کند.\n۲. شیوه‌های مختلف طبقه‌بندی آسیب‌های شنوایی را شرح دهد.\n۳. میزان شیوع آسیب‌های شنوایی را شرح دهد.\n۴. علت‌های مختلف آسیب شنوایی را بر حسب نوع آسیب و محل آسیب توضیح دهد.\n۵. ویژگی‌های مختلف افراد با آسیب شنوایی را بر حسب کنش‌های مختلف شرح دهد.\n۶. روش‌های مختلف ارتباطی را در افراد با آسیب شنوایی بیان نماید.\n۷. فرهنگ ناشنوایی را توضیح داده و مورد نقد قرار دهد.\n\nاولین حسی که در انسان به وجود می آید و آخرین حسی که در انسان از بین می‌رود حس شنوایی است. بنابراین انسان‌ها از طریق شنیدن اطلاعات زیادی را درباره جهان اطراف کسب می‌کنند و شنیدن نقش بسیار مهمی را در تحول فرد ایفا می‌کند. بدین ترتیب آسیب شنوایی۱، بسته به شدت و زمان بروز، تحول فرد را در کنش‌های مختلف با تأخیرهای جدی روبرو می‌سازد. با این حال با غربالگری و شناسایی زودهنگام، و در نتیجه ارائه خدمات آموزشی، توانبخشی و پزشکی می‌توان تا حد زیادی تأثیر منفی آسیب شنوایی را به حداقل رساند.\nتعریف و طبقه‌بندی\nسیستم‌های طبقه‌بندی بسیاری برای آسیب شنوایی وجود دارد. اگر چه که این فکر رایج است ناشنوا۲ بودن به معنای عدم توانایی در شنیدن هر چیزی است و سخت‌شنوایی۳ به این معنا است که فرد تا حد کمی می‌تواند بشنود؛ اما این مسئله به طور کلی درست نیست. بیشتر افراد ناشنوا تا حدی از باقیمانده شنوایی برخوردارند. دو دیدگاه یا جهت‌گیری فیزیولوژیکی و جهت‌گیری آموزشی در ارتباط با تعریف آسیب شنوایی مطرح است.\nجهت‌گیری فیزیولوژیکی بیشتر به میزان قابل اندازه‌گیری آسیب شنوایی مرتبط است. کودکی که نمی‌تواند صداها را در یک سطح شدت خاص یا بالاتر بشنود در طبقه ناشنوا و بقیه افراد با آسیب شنوایی به عنوان سخت‌شنوا در نظر گرفته می‌شوند. حساسیت شنوایی بر حسب دسی‌بل اندازه‌گیری می‌شود. بر اساس دیدگاه فیزیولوژیکی، به طور کلی افراد با آسیب\n\n1. Hearing impairment\n2. Deaf\n3. Hard of hearing\n\n۲۴۰\nروان شناسی و آموزش کودکان و نوجوانان\nشنوایی به اندازه ۹۰ دسی بل یا بیشتر به عنوان ناشنوا و افراد با آسیبهای شنوایی پایین تر از\nاین میزان به عنوان سخت شنوا در نظر گرفته میشوند (هالاهان و کافمن، ۲۰۰۹).\nمتخصصان با جهت گیری آموزشی به این نکته توجه دارند که تا چه اندازه آسیب شنوایی\nاحتمالاً بر توانایی کودک در صحبت کردن و تحول زبان تأثیر میگذارد این متخصصان به\nعلت ارتباط خیلی نزدیک بین آسیب شنوایی و تأخیر در تحول زبان ملاک طبقه بندی را بیشتر\nبر اساس تواناییهای زبان شفاهی قرار میدهند آسیب شنوایی اصطلاح وسیعی است که افراد\nبا آسیبهای خفیف تا عمیق را در بر میگیرد. آن شامل افراد ناشنوا و سخت شنوا می گردد.\nتعاریف ناشنوا و سخت شنوا بر اساس دیدگاه آموزشی به صورت زیر است:\n- فرد ناشنوا کسی است که ناتوانی شنیدن او از پردازش موفقیت آمیز اطلاعات زبانی از طریق\nشنیدن با و یا بدون وسایل کمک شنیداری جلوگیری میکند.\n- فرد سخت شنوا به طور کلی میتواند با وسایل کمک شنیداری از باقیمانده شنوایی خود\nبرای پردازش موفق اطلاعات زبانی از طریق شنیدن استفاده کند.\nمربیان تا حد زیادی درباره سن شروع آسیب شنوایی نگران هستند بین آسیب شنوایی و\nتأخیر در زبان رابطه نزدیکی وجود دارد هر چه آسیب شنوایی در زندگی کودک زودتر رخ\nدهد، تحول زبان در کودک با مشکلات بیشتری مواجه خواهد بود به همین دلیل متخصصان\nبه طور مکرر از اصطلاحات ناشنوایی مادرزادی (افرادی که ناشنوا به دنیا می آیند ) و\nناشنوایی اتفاقی (افرادی که مدت زمانی بعد از تولد ناشنوا میشوند) استفاده می کنند.\nدو اصطلاح رایج دیگر که در ارتباط خاص تری با زبان هستند عبارتند از ناشنوایی\nپیش زبانی و ناشنوایی پس زبانی ناشنوایی پیش زبانی به ناشنوایی اشاره دارد که در هنگام\nتولد یا بسیار زود در زندگی یعنی قبل از تحول زبان و گفتار رخ میدهد. ناشنوایی پس زبانی\nبه ناشنوایی اشاره دارد که بعد از تحول زبان و گفتار رخ میدهد متخصصان درباره نقطه\nجداکننده این دو نوع ناشنوایی اختلاف نظر دارند برخی معتقدند زمان هجده ماهگی باید\nملاک تقسیم دو نوع ناشنوایی پیش زبانی و پس زبانی باشد و برخی دیگر فکر میکنند این زمان\nباید در سنین پایینتری یعنی ۱۲ ماهگی یا حتی ۶ ماهگی باشد (میدو - ارلانز ،۱۹۸۷).\n\n1. Congenitally deaf\n2. Adventitiousy deaf\n3. Prelingual\n4. Postlingual\n5. Mee Orlans\n\nهزارهشتم: آسیب شنوایی\nبرخی متخصصان، آسیب شنوایی را بر حسب سطح آستانه شنوایی طبقه‌بندی کردند:\nخفیف (٢٦ تا ٤٠ دسی‌بل)، متوسط ( ٤١ تا ٥٥ دسی‌بل)، نیمه شدید (٥٦ تا ٧٠ دسی‌بل)،\nشدید (٧١ تا ٩٠ دسی‌بل) و عمیق‌(٩١ دسی‌بل و بالاتر) (آندروز لای، و واینر، ٢٠٠٤).\nاین سطوح شدت بر اساس از دست دادن حساسیت شنوایی، طبقه‌بندی‌های وسیع ناشنوایی و\nسخت‌شنوا را کنار می‌زند. طبقه‌بندی‌های وسیع‌تر به‌طور مستقیم به حساسیت شنوایی وابسته\nنیستند. در عوض آنها بر میزان تأثیرپذیری زبان و گفتار تأکید می‌کنند.\nصدا از طریق شدت و فرکانس آن اندازه‌گیری می‌شود. شدت و فرکانس، اندازه‌های\nفیزیکی هستند که می‌توان آنها را به سادگی معادل بلندی و زیر و بمی دانست. بلندی صدا با\nدسی‌بل سنجیده‌ می‌شود. در دسی‌بل صفر، شخصی که شنوایی طبیعی دارد می‌تواند\nضعیف‌ترین صدا را تشخیص دهد. نجوا حدود ۱۰ دسی‌بل و گفتگوی معمولی حدود ۵۰\nدسی‌بل شدت دارد. صدایی که بیش از ۱۲۵ دسی‌بل شدت داشته باشد ممکن است موجب\nدرد گوش شود و به سلول‌های مویی حلزون آسیب برساند.\nزیر و بمی صدا با دور در ثانیه یا هرتز اندازه‌گیری می‌شود. یک هرتز برابر با یک دور\nدر ثانیه است. انسان‌ها می‌توانند صداهایی با فرکانس ۲۰ تا ۲۰۰۰۰ هرتز را بشنوند، اما\nفرکانس بسیاری از صداها پایین‌تر یا بالاتر از فرکانس صداهای گفتاری است. بیشتر صداهای\nمحیطی بین ۱۲۵ تا ۸۰۰۰ هرتز قرار می‌گیرند، در حالی که مهم‌ترین صداهای گفتاری در\nمحدوده‌ی ۳٠٠ تا ٣٠٠٠ هرتز قرار دارند.\nمیزان شیوع\nبرآورد تعداد کودکان با آسیب شنوایی به علت اختلاف در تعاریف، جمعیت‌های مورد مطالعه\nو صحت آزمون‌گری تا حد قابل ملاحظه‌ای گوناگون است. آمارهای وزارت آموزش و\nپرورش ایالات متحده آمریکا نشان می‌دهد که ٠/١٣ درصد جمعیت ٦ تا ١٧ سال مدارس\nعمومی، ناشنوا یا سخت‌شنوا هستند. هرچند که این دپارتمان آمارهای مجزا برای مقوله‌های\nناشنوا و سخت‌شنوا ارائه نمی‌دهد، با این حال شواهد قوی حاکی از آن است که میزان شیوع\n1. Andrews, Leigh & Weiner\n\n۲۴۲\nروان شناسی و آموزش کودکان و نوجوانان\nدانش آموزان سخت شنوا بیشتر از دانش آموزان ناشنوا است (میدو - اولاتر، مرتنز، و ساس\nل خورد می‌کنند و باعث لرزش آن می‌شوند. لرزش‌های مکانیکی به زنجیرۀ\nاستخوانچه‌ای می‌رسند و سپس انرژی مکانیکی به گوش درونی انتقال داده می‌شود. شیپور\nاستاش که از پشت حلق تا گوش میانی ادامه دارد، باز و بسته می‌شود و فشار هوا را در دو\nطرف پردۀ صماخ متعادل می‌سازد.\nگوش درونی شامل حلزون، مجاری نیم دایره و ابتدای عصب شنوایی است. حلزون\nحس شنوایی را مهار می‌کند و مجاری نیم دایره وظیفه مهار حس تعادل را بر عهده دارند.\nحلزون حفره‌ای پر از مایع است که با سلول‌های مویی کوچک پوشانده شده است. هنگامی که\nحرکات زنجیره استخوانچه‌ای به گوش درونی وارد می‌شوند، مایع موجود در حلزون را به\nحرکت در می‌آورند و باعث می‌شوند که سلول‌های مویی به حرکت مایع واکنش نشان دهند.\nواکنش‌های سلول‌های مویی (تکانه‌های عصبی) به عصب شنوایی فرستاده می‌شوند. این\nتکانه‌ها از راه عصب شنوایی به مغز می‌روند و توسط کرتکس شنوایی مغز پردازش می‌شوند.\n\nاستخوان گیجه‌ای\nمجاری\nنیم‌دایره\nدهلیز\nعصب دهلیزی\nعصب صورتی\nعصب حلزونی\nعضلۀ پرده\nگوش\nحلزون\nمجرای استاش\n(با گلو ارتباط دارد)\nبرده گوش\nدریچۀ دریچۀ\nگرد بیضی\n\nشکل ۸-۱: بخش‌های مختلف گوش (خارجی، میانی، داخلی)\n\nسلول‌های\nماستوئید\n\nمجرای\nشنیداری\nخارجی\n\nروان شناسی و آموزش کودکان و نوجوانان\n۲۴۴\nسبب شناسی\nعلل آسیب شنوایی را می‌توان بر اساس نوع آسیب ( یعنی انتقالی، حسی - عصبی۱، و\nمختلط۳) و محل آسیب شنوایی (یعنی بیرونی۴، میانی۵، درونی۲) مورد بررسی قرار داد. قانون\nکلی این است که آسیب‌های شنوایی بیشتر از ۶۰ تا ۷۰ دسی‌بل مربوط به گوش داخلی است.\nهنگامی که عاملی مانع از ورود صداها به گوش بیرونی یا میانی می‌شود، نقص شنوایی انتقالی\nرخ می‌دهد. زمانی که گوش درونی وظیفه خود را به خوبی انجام ندهد، نقص شنوایی حسی\nعصبی پدید می‌آید. نقایص شنوایی انتقالی هنگامی رخ می‌دهند که صداها از گوش بیرونی\nو میانی به خوبی عبور نمی‌کنند. هر گونه بسته شدن کانال گوش، مانند جمع شدن جرم گوش\nیا نقص مادرزادی در شکل‌گیری کانال گوش ممکن است در انتقال صداها مشکل ایجاد کند.\nنقص شنوایی انتقالی اغلب ناشی از تجمع مایع در گوش میانی به دلیل عفونت است ( عفونت\nگوش میانی). تجمع مایع در گوش میانی موجب می‌شود که زنجیره‌ استخوانچه‌ها نتواند صدا\nرا به گوش درونی انتقال دهد. علاوه بر این، عفونت‌ها و بیماری‌ها ممکن است باعث شوند که\nپرده صماخ یا استخوانچه‌ها به خوبی کار نکنند. اتواسکلروز، عارضه‌ای که مشخصه آن رشد\nاستخوان اسفنجی شکل بر روی استخوانچه‌هاست، مانع از ارتعاش مناسب استخوانچه‌ها و\nانتقال مؤثر صداها به حلزون می‌شود. در بیشتر موارد می‌توان نقص انتقالی را از طریق جراحی،\nدرمان دارویی یا تقویت صداها برطرف نمود تا صداها بتوانند از گوش میانی بگذرند و\nساختارهای گوش درونی را تحریک کنند.\nنقایص شنوایی حسی- عصبی هنگامی رخ می‌دهند که صداها از گوش درونی به مغز\nانتقال نمی‌یابند یا به صورت تحریف شده به مغز فرستاده می‌شوند. وارد شدن آسیب به\nحلزون و عصب شنوایی موجب نقص شنوایی حسی- عصبی می‌شود. مهم ترین علل نقص\nشنوایی حسی- عصبی عبارتند از: بیماری‌های ویروسی، ناسازگاری Rh، داروهایی که به\nمکانیسم شنوایی آسیب می‌زنند اما برای درمان بیماری‌های دیگر استفاده می‌شوند، پیری و\nقرار گرفتن مداوم در معرض صداهای بلند. نقص شنوایی حسی- عصبی معمولا پایدار و\n\n1. Conductive\n2. Sensineural\n3. Mixed\n4. Outer\n5. Middle\n\n۲۴۵\nاصل هشتم: آسیب شنوایی\nپیشگی است. این نوع نقص از طریق تقویت صدا برطرف می‌شود، اما به طور معمول با\nدارو یا جراحی درمان پذیر نیست. نقص شنوایی آمیخته هنگامی رخ می‌دهد که شخص\nترکیبی از نقص شنوایی انتقالی و حسی- عصبی را دارا باشد.\nعوامل ایجاد کننده آسیب شنوایی قبل از اکتساب زبان\nشنوایی پیش‌زبانی به ناشنوایی اشاره دارد که در هنگام تولد یا بسیار زود در زندگی یعنی قبل از\nتحول زبان و گفتار رخ می‌دهد. برخی از شایع‌ترین علل نقص شنوایی پیش‌زبانی عبارتند از:\nسرخجه مادری. ابتلای مادر به سرخجه در دوران بارداری به ویژه در سه ماهه نخست بسیار\nخطرناک است. این ویروس می‌تواند موجب نقایص شنوایی، نقایص بینایی و قلبی در نوزاد گردد.\nعامل وراثت. ۹۰ درصد از افراد مبتلا به ناشنوایی مادرزادی، والدین شنوا دارند و، در حدود\n۲۰ درصد از بستگان آنها ناشنوا یا کم شنوا هستند (مورس، ١٩٩٦). برآوردها نشان می‌دهند که\nحداقل ۶۰ درصد از نقایص شنوایی حسی- عصبی متوسط تا عمیق که پیش از اکتساب زبان\nرخ می‌دهند، ناشی از عوامل ژنتیکی هستند (مارازیتا و همکاران، ۱۹۹۳).\nنارس بودن نوزاد و کم وزنی به هنگام تولد. نتایج تحقیقات حاکی از آن است که نارس بودن\nنوزاد و پایین بودن وزن آن و همچنین زایمان‌های سخت با آسیب‌های شنوایی رابطه دارند.\nعفونت‌های ویروسی. مننژیت ممکن است سلول‌های مویی گوش درونی را تخریب کند و به\nآسیب شنوایی زود هنگام و پایدار منجر شود.\nویروس سایتومگال مادرزادی. این ویروس تقریباً ۱ درصد از همه نوزادان را مبتلا می‌کند.\nویروس سایتومگال علت حدود ۳ درصد از نقایص شنوایی در کودکان زیر 6 سال ( تقریباً\n۱۰۰۰۰ نفر) و ٤٠٠٠ مورد نقص شنوایی خفیف تا عمیق در دانش آموزان است. تقریباً ۹۰\nدرصد از دانش آموزان واجد شرایط، نقص شنوایی پیش زبانی دارند و اغلب حلزون آنها\nآسیب دیده است (اشتراوش، ۱۹۹۷؛ به نقل از امیری مجد، ۱۳۸۹).\nعوامل ایجاد کننده آسیب شنوایی پس از اکتساب زبان\nناشنوایی پس زبانی به ناشنوایی اشاره دارد که بعد از تحول زبان و گفتار رخ می‌دهد. تنها ۵ درصد\nاز کودکان ناشنوا یا سخت شنوا، آسیب شنوایی پس زبانی دارند. برای درمان آموزشی نقص\n1. Moores\n\nروان شناسی و آموزش کودکان و نوجوانان\n۲۴۶\nپس زبانی معمولا تلاش می‌شود تا مهارتهای گفتاری و زبانی که پیش از شروع نقص شنوایی\nکسب شده‌اند حفظ شوند. برخی از شایع‌ترین علل نقص شنوایی پس‌زبانی عبارتند از:\nمننژیت. عامل اصلی اختلال شنوایی پیش‌زبانی و نیز اختلال شنوایی پس‌زبانی، مننژیت است.\nمننژیت به عفونت باکتریایی یا ویروسی سیستم اعصاب مرکزی اشاره دارد که در اغلب موارد\nباعث آسیب‌های شنوایی عمیق می‌شود.\nعفونت گوش میانی. عفونت گوش میانی یک اصطلاح کلی برای اشاره به عفونتهایی است\nکه موجب تجمع مایع در حفره گوش میانی می‌شوند. عدم درمان به موقع عفونت ها ممکن\nاست باعث ایجاد آسیب شنوایی انتقالی دائم گردد.\nنقص شنوایی ناشی از سرو صدا. سر و صدای همیشگی ممکن است موجب بروز نقص\nشنوایی حسی - عصبی شود. مردان جوان بیش از زنان جوان در خطر ابتلا به نقص شنوایی\nناشی از صدای بلند قرار دارند، زیرا مردان بیشتر از زنان به فعالیتهایی مانند تیراندازی و\nتعمیر موتور ماشین می‌پردازند (هالاهان و کافمن، ۲۰۰۶).\nعلل ناشناخته. علت حدود ۵۰ درصد از همه نقایص شنوایی پس‌زبانی ناشناخته است\n(اسمیت، ۲۰۰۶). در اغلب موارد، تعیین سبب‌شناسی بسیاری از نقایص شنوایی دشوار است،\nزیرا این نقایص در طول زمان ایجاد می‌شوند یا ناشی از مواجهه مکرر با شرایط یا عارضه‌های\nمتعددی هستند.\n\nویژگی‌های افراد با آسیب شنوایی\nتحول زبان\n\nدر افراد مبتلا به شنوایی شدید یا عمیق دارد به برنامه‌های حمایتی زیادی نیاز دارند. احتمالا این\nوالدین با زبان اشاره آشنا نیستند یا نمی‌دانند که فرزندشان به جنبه‌های دیداری محیط وابسته\nاست نه جنبه‌های شنیداری.\nوالدین شنوایی که فرزند ناشنوا دارند، نسبت به فرزند خود دید منفی‌تری دارند، در حالی که\nوالدین ناشنوا نسبت به فرزند ناشنوای خود دید مثبت‌تری دارند. در نتیجه والدین شنوا ممکن است\nوضعیت فرزند خود را ناگوارتر از آنچه هست توصیف کنند (هالاهان و کافمن، ۲۰۰۶‌). برنامه‌های\nمداخله زودهنگام باید به دانش آموز دارای اختلال شنوایی کمک کنند تا در ساختار خانواده پرورش\nیابد. برای بهبود تحول کودک، والدین باید تحول طبیعی را بشناسند و از توانایی‌های کودک نیز\nآگاه باشند. والدین باید مهارت‌های مورد نیاز را بیاموزند تا بتوانند به تحول کودک کمک کنند.\nاساسی‌ترین مهارت‌هایی که والدین باید یاد بگیرند عبارتند از: مهارت در ایجاد ارتباط، آگاهی از\nتحول زبانی و انتقال خودپنداشت مثبت به دانش آموز. برنامه‌های پیش دبستانی نیز برای دانش\nآموزان دارای اختلال شنوایی اهمیت دارند. این برنامه‌ها به بسیاری از دانش آموزان دارای اختلال\nشنوایی کمک می‌کنند تا با دانش آموزان شنوا و سخت شنوا ارتباط برقرار کنند. دانش آموز می‌تواند\nبه کمک این برنامه‌ها مهارت‌های زیر را یاد بگیرد: مهارت فعالیت در گروه ؛ قواعد تعامل در گروه\nمانند نحوه بازی کردن، همکاری کردن و رعایت نوبت ؛ و مهارت‌های اجتماعی مختلف که برای\nموفقیت در تحصیل ضروری هستند. برنامه‌های پیش‌دبستانی برای دانش آموزان و والدین فرصتی\n\nاصل هشتم: آسیب شنوایی\n۲۵۳\nفراهم می کنند تا بتوانند زبان اشاره را تمرین کنند به دانش آموزان کمک می کنند تا با آموزش\nشنیداری و سمعک یاد بگیرند از باقیمانده شنوایی خود استفاده کنند و مهارت های خواندن و\nریاضیات خود را بهبود بخشند (کرک گالاگر آناستازیو و کلمن، ۲۰۰۶).\nروش‌های مختلف ارتباطی\nروش‌های برقراری ارتباط را می‌توان در سه مقوله روش‌های دستی (آنها که بر استفاده از ایما\nو اشاره تأکید می کنند)، روشهای شفاهی (آنها که بر گفتار تأکید دارند) و ارتباط کلی یا\nهمزمان (زبان اشاره و گفتار به صورت همزمان استفاده می شوند) تقسیم نمود.\nدر روش‌های دستی بر انتقال اطلاعات از طریق زبان اشاره تأکید می شود. ارتباط دستی\nبرای ارائه واژه ها از د
