<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>دستیار جزوه — کودکان با نیازهای ویژه</title>
<style>
  :root{
    --bg:#05010f; --bg2:#0a0420; --neon:#00fff0; --pink:#ff007a; --purple:#8a00ff;
    --yellow:#f8ff00; --text:#e8f7ff; --muted:#8fb3c9; --card:rgba(15,5,35,.75);
    --border:rgba(0,255,240,.35);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:Vazirmatn,Tahoma,sans-serif;min-height:100%}
  body{
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(138,0,255,.35), transparent 60%),
      radial-gradient(900px 500px at 110% 10%, rgba(255,0,122,.28), transparent 60%),
      radial-gradient(700px 400px at 50% 120%, rgba(0,255,240,.25), transparent 60%),
      linear-gradient(180deg,#05010f, #0a0420);
    min-height:100vh;
  }
  header{
    padding:22px 18px;text-align:center;border-bottom:1px solid var(--border);
    background:linear-gradient(90deg, rgba(255,0,122,.15), rgba(0,255,240,.15));
    backdrop-filter:blur(6px);
  }
  h1{margin:0;font-size:26px;letter-spacing:1px;
     background:linear-gradient(90deg,var(--neon),var(--pink),var(--yellow));
     -webkit-background-clip:text;background-clip:text;color:transparent;
     text-shadow:0 0 18px rgba(0,255,240,.25)}
  .sub{color:var(--muted);font-size:13px;margin-top:6px}
  main{max-width:900px;margin:0 auto;padding:18px}
  .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
  .tab{
    padding:10px 14px;border:1px solid var(--border);border-radius:10px;
    background:rgba(0,255,240,.06);color:var(--text);cursor:pointer;font-family:inherit;font-size:14px;
    transition:.2s;
  }
  .tab:hover{box-shadow:0 0 12px var(--neon)}
  .tab.active{background:linear-gradient(90deg,var(--pink),var(--purple));border-color:var(--pink);box-shadow:0 0 14px var(--pink)}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px;box-shadow:0 0 30px rgba(138,0,255,.15) inset}
  label{display:block;margin-bottom:8px;color:var(--neon);font-size:13px}
  textarea,input,select{width:100%;background:#08031a;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px;font-family:inherit;font-size:15px;outline:none}
  textarea:focus,input:focus{border-color:var(--pink);box-shadow:0 0 10px var(--pink)}
  button.primary{
    display:inline-block;padding:11px 18px;border-radius:10px;border:none;cursor:pointer;
    background:linear-gradient(90deg,var(--neon),var(--pink));color:#05010f;font-weight:700;font-family:inherit;font-size:15px;
    box-shadow:0 0 14px rgba(0,255,240,.5);transition:.2s
  }
  button.primary:hover{transform:translateY(-1px);box-shadow:0 0 22px var(--pink)}
  .answer{white-space:pre-wrap;line-height:2;font-size:15px}
  .hit{background:linear-gradient(90deg, rgba(248,255,0,.25), rgba(255,0,122,.25));padding:2px 4px;border-radius:4px}
  .meta{color:var(--muted);font-size:12px;margin-bottom:8px}
  .opt{display:block;padding:10px;margin:6px 0;border:1px solid var(--border);border-radius:10px;cursor:pointer;background:#08031a}
  .opt:hover{border-color:var(--pink)}
  .opt.correct{background:rgba(0,255,120,.15);border-color:#00ff88}
  .opt.wrong{background:rgba(255,0,80,.15);border-color:#ff0055}
  .chapter-select{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
  .chip{padding:6px 10px;border:1px solid var(--border);border-radius:999px;font-size:12px;cursor:pointer;color:var(--muted)}
  .chip.on{color:#05010f;background:var(--neon);border-color:var(--neon)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:20px}
  .grid{display:grid;grid-template-columns:1fr;gap:10px}
  @media(min-width:640px){.grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<header>
  <h1>◤ دستیار جزوه ◥ کودکان و نوجوانان با نیازهای ویژه</h1>
  <div class="sub">پرسش تستی و تشریحی از متن جزوه — تالیف: دکتر عباسعلی حسین‌خانزاده</div>
</header>
<main>
  <div class="tabs">
    <button class="tab active" data-tab="ask">پرسش تشریحی</button>
    <button class="tab" data-tab="quiz">آزمون تستی</button>
    <button class="tab" data-tab="browse">مرور متن</button>
  </div>

  <section id="ask" class="pane">
    <div class="card">
      <label>سوال خود را بنویسید (تشریحی):</label>
      <textarea id="q" rows="3" placeholder="مثلاً: تعریف کودکان با نیازهای ویژه چیست؟"></textarea>
      <div class="chapter-select" id="chapsAsk"></div>
      <div style="margin-top:10px"><button class="primary" id="btnAsk">پاسخ بده</button></div>
    </div>
    <div class="card" id="ansCard" style="display:none">
      <div class="meta" id="ansMeta"></div>
      <div class="answer" id="ans"></div>
    </div>
  </section>

  <section id="quiz" class="pane" style="display:none">
    <div class="card">
      <label>آزمون تستی چهار‌گزینه‌ای از متن جزوه</label>
      <div class="chapter-select" id="chapsQuiz"></div>
      <button class="primary" id="btnQuiz">تولید سوال جدید</button>
    </div>
    <div class="card" id="qCard" style="display:none">
      <div class="meta">سوال:</div>
      <div id="qText" style="font-size:16px;margin-bottom:10px;line-height:2"></div>
      <div id="qOpts"></div>
      <div id="qFb" style="margin-top:10px"></div>
    </div>
  </section>

  <section id="browse" class="pane" style="display:none">
    <div class="card">
      <label>انتخاب فصل:</label>
      <select id="chSel"></select>
      <input id="find" placeholder="جست‌وجو در متن..." style="margin-top:10px">
    </div>
    <div class="card"><div id="chText" class="answer" style="max-height:60vh;overflow:auto"></div></div>
  </section>

  <footer>ساخته‌شده برای مطالعه شخصی • تمام محتوا از متن جزوه استخراج شده است</footer>
</main>

<script>
const DATA = [{"title": "فصل ۱ و ۴", "text": "روانشناسی و آموزش\nکودکان و نوجوانان\nبا نیازها ویژه\n\nتالیف :\nدکتر عباسعلی حسین خانزاده\n(استادیار روانشناسی دانشگاه گیلان)\n\nفصل اول \nمقدمه‌ای‌بر\nآموزش کودکان با نیازهای ویژه\n\nهدف‌های ‌یادگیری\nاز خواننده انتظار می‌رود پس از مطالعه مطالب این فصل بتواند:\n۱. تعریف یادگیرندگان با نیازهای ویژه را بداند.\n۲. ضرورت آموزش ویژه را برای دانش‌آموزان با نیازهای ویژه بیان نماید.\n۳. گروه‌های مختلف دانش‌آموزان با نیازهای ویژه را نام ببرد.\n۴. میزان شیوع گروه‌های مختلف دانش‌آموزان با نیازهای ویژه را بیان کند.\n۵. موقعیتهای آموزشی مختلف دانش‌آموزان با نیازهای ویژه را به طور کامل شرح دهد.\n\nیادگیرندگان استثنایی یا افراد با نیازهای ویژه از نظر آموزشی افرادی هستند که شکوفا شدن توانایی -\nتوانایی‌های بالقوه آن‌ها نیاز به آموزش ویژه۳ و خدمات مرتبط دارد. این افراد بنا به دلایل کم‌توانی ذهنی،\nمشکلات یادگیری، اختلال‌های هیجانی یا رفتاری، ناتوانی‌های جسمانی، اختلال‌های ارتباطی، اوتیسم،\nآسیب مغزی ناشی از ضربه، آسیب شنوایی، آسیب بینایی، یا تیزهوشی به آموزش ویژه نیاز دارند.\nبنابراین توانمندی‌ها و استعدادهای افراد با نیازهای ویژه با آموزشی که افراد عادی دریافت می‌کنند\nشکوفا نمی‌شود. آموزش ویژه و خدمات مرتبط بسته به نوع ناتوانی، شدت ناتوانی و زمان بروز آن\nمی‌تواند از جنبه‌های محتوای آموزشی، راهبردهای آموزشی خاص، فن‌آوری آموزشی، موقعیت‌های\nآموزشی خاص و ... متنوع باشد.\nدانش‌آموزان استثنایی (که در این کتاب معادل دانش‌آموزان با نیازهای ویژه برای آن‌ها به\nکار برده می‌شود در مقایسه با جمعیت عادی، گروه بسیار متنوعی هستند و تعمیم‌دهی بسیار\nاندکی برای آن‌ها صورت می‌گیرد. جنبه‌های خاص و استثنایی این کودکان شامل توانایی‌های\nحسی، جسمانی، شناختی، هیجانی، ارتباطی یا ترکیبی از این موارد است. علاوه بر این افراد با\nنیازهای ویژه از لحاظ سبب‌شناسی، شدت، و تأثیر بر پیشرفت آموزشی با هم فرق دارند و این\nاثرات ممکن است تا حد زیادی بسته به سن، جنس، و شرایط زندگی متفاوت باشد.\n\n1. Exception Learners\n2. Individuals with special needs\n3. Special education\n4. Educational technology\n5. Educational settings\n6. Exceptional students\n\nروان شناسی و آموزش کو\nهر دانش آموزی که آموزش ویژه را دریافت میکند ممکن است در وضعیت کنونی،\n۲۴\nناتوانی آشکاری نداشته باشد ولی در مدرسه ابتدایی و راهنمایی مشکلات پایداری در یادگیری\nداشته باشد، در نتیجه مشکلات او بیشتر جنبه ،تحصیلی اجتماعی یا رفتاری داشته باشد. ایــن\nمشکلات برای بسیاری از معلمان تا چند هفته یا ماه آشکار نمی شود. تلاش های معلم برای\nبرآوردن نیازهای این دانش آموزان با برنامه درسی عادی که بیشتر دانش آموزان در آن موفق\nعمل میکنند به نتیجه نمی انجامد. بر اساس قانون فدرال هیچ دانش آموز استثنایی، واجد\nشرایط دریافت آموزش ویژه شناخته نمی شود مگر این که سنجش دقیق نشان دهد که او در\nبرنامه مدرسه عادی بدون دریافت خدمات ویژه قادر به پیشرفت رضایت بخش نیست.\nمیزان شیوع\nمیزان شیوع به درصد یا تعداد افرادی که یک ویژگی خاص یا استثنایی یا نیاز ویژه را دارا\nهستند اشاره دارد. برای مثال میزان شیوع اختلال کم توانی ذهنی ممکن است ۲/۳ درصد برآورد\nشود. این میزان بدین معناست که ۲/۳ درصد از افراد جمعیت یا ۲۳ نفر از هر هزار نفر فرض\nمی شود که دارای اختلال کم توانی ذهنی هستند.\nبرآورد میزان شیوع بیشتر گروه های با نیازهای ویژه بسیار دشوار است. برخی از عوامل\nمرتبط با میزان شیوع عبارتند از مبهم بودن تعاریف تغییرات مکرر در تعاریف، نقش مدارس\nدر تعیین نیازهای ویژه نمونه گیریهای مختلف و عوامل دیگر کافمن و هالاهان، ۲۰۰۵\nالف). درصد جمعیت افراد با نیازهای ویژه در طول دهه های مختلف به طور قابل ملاحظه ای\nتغییر کرده است. برای مثال تعداد دانش آموزان مبتلا به ناتوانیهای یادگیری از اواسط دهه\n۱۹۷۰ بیشتر از دو برابر شده است. در عوض درصد دانش آموزانی که ناتوانی اصلی آنها\nآسیب های زبان یا گفتار است به طور قابل ملاحظه ای کاهش یافته است یعنی در مقایسه با\nسال ١٩٧٦، میزان شیوع آنها به نصف کاهش یافته است). البته باید یادآور شد که میزان شیوع\nبالای اختلال ناتوانی یادگیری تا حدی به خاطر نداشتن بار نگرشی منفی برچسب این اختلال\nو قابل پذیرش بودن آن است.\n\nفصل اول : مقدمه ای بر آموزش کودکان با نیازهای ویژه\n۲۵\nبرخی از ناتوانی‌ها با فراوانی نسبتاً بالایی رخ می‌دهند. ناتوانی‌های با میزان بروز بالا عبارتند\nاز : ناتوانی‌های یادگیری، اختلالهای ارتباطی (زبان و گفتار)، آشفتگی هیجانی، و کم توانی-\nذهنی خفیف ناتوانی‌های دیگر که نسبتاً نادر هستند و میزان بروز آنها پایین است عبارتند از :\nکم‌بینایی و نابینایی، ناشنوایی، ناشنوا- نابینا، کم توانی ذهنی شدید، و اوتیسم.\nاگرچه که میزان رخداد بیشتر ناتوانی‌های با میزان شیوع بالا در اوایل قرن بیست و یکم\nتقریباً ثابت مانده است، با این حال افزایش چشمگیری در برخی از گروه‌های با میزان شیوع\nپایین رخ داده است. برای مثال تغییر چشمگیری در شناسایی اختلال اوتیسم یا اختلال های\nطیف اوتیسم از سال ۱۹۹۵ اتفاق افتاده است. گروه دیگری که افزایش معناداری در بروز آن\nرخ داده است، آسیب مغزی ناشی از ضربه و آسیب‌های ارتوپدی است که خود ناشی از\nافزایش آسیب‌های مربوط به نخاع شوکی و زنده ماندن افراد با ضربات جسمانی شدید با\nتوجه به پیشرفت‌های پزشکی می‌باشد.\nافزایش در تعداد افراد مبتلا به اوتیسم، احتمالا مربوط به پیشرفت در روش‌های\nتشخیص و شناسایی موارد خفیف‌تر این اختلال است. اگرچه که افزایش موارد آسیب مغزی\nناشی از ضربه، ممکن است ناشی از تشخیص بهتر باشد، با این حال ممکن است ناشی از\nافزایش واقعی در صدمات مغزی باشد. افزایش در تعداد افراد با آسیب‌های ارتوپدی نیز\nممکن است ناشی از افزایش در میزان زنده ماندن نوزادانی که با نابهنجاری‌های جسمانی\nمعنادار به دنیا می‌آیند و همچنین کودکان تصادفی باشد. در نهایت این که افزایش در تعداد\nافراد با مبتلا آسیب‌های بینایی و شنوایی نیز ممکن است ناشی از تشخیص بهتر این ناتوانی‌ها\nباشد (هالاهان و کافمن، ۲۰۰۲).\n\nمعرفی گروههای مختلف دانش آموزان با نیازهای ویژه\nدانش‌آموزان با نیازهای ویژه فقط شامل دانش‌آموزان با ناتوانی‌های مختلف نمی‌گردند. دانش-\nآموزان تیزهوش و با استعداد نیز دارای نیازهای ویژه هستند. بر اساس گزارش وزارت آموزش و\nپرورش آمریکا (۱۹۹۴) حدود ۱۱ درصد دانش آموزان مدرسه‌ای در گروه دانش آموزان با ناتوانی\nقرار می‌گیرند. همچنین باید یادآور شد که بسیاری از دانش آموزان در مدارس، دارای مشکلات\n---\n\nروان شناسی و آموزش کودکان و نوجوانان با نیازهای ویژه\n۲۶\nفصل اول : مقدمه ای بر\nرفتاری و یادگیری هستند، ولی نه به آن اندازه که در گروه دانش آموزان با نیازهای ویژه قرار گیرند.\nاین دانش آموزان در معرض خطر نام دارند و مشکلات و پیامدهای آنها را نمی توان نادیده گرفت.\nبنابراین دانش آموزان با نیازهای ویژه را میتوان بدین گونه تقسیم نمود:\n(۲) چه منابعی در مـ\nاین دانش آموزان بی\nاختلال کم توانی ذهنی، اختلال های هیجانی / رفتاری، ناتوانی های یادگیری، اختلال های\nارتباطی، آسیب های شنوایی آسیب های بینایی، ناتوانی های جسمانی و آسیب های سلامت.\nاختلال های فراگیر تحولی ناتوانیهای چندگانه و شدید و دانش آموزان تیزهوش. به این\nحداقل محي\nکافمن، ۲۰۰۹)\nدانش آموزان آگا\nتجهیزات و روش\nفهرست می توان دانش آموزان در معرض خطر را نیز اضافه نمود.\nمتخصصان ممك\nنیازهای دانش\nناتوانی خفیف\nتعریف آموزش ویژه\nدر سطح\nروشهای خـ\nدانش آموزان با آسیب بینایی ممکن است به مواد خواندنی با چاپ درشت یا بریل؛ دانش\nآموزان با آسیب شنوایی ممکن است به وسایل شنیداری و یا آموزش زبان اشاره؛ دانش آموزان\nبا ناتوانی جسمانی به تجهیزات خاص و مانند آن نیاز داشته باشند. خدمات مرتبط مانند\nسنجش روانشناختی فیزیوتراپی درمان پزشکی و مشاوره بسته به نوع و شدت اختلال ممکن\nاست مورد نیاز باشد. مهمترین هدف آموزش ویژه شناسایی و تاکید بر نقاط قوت دانش آموز\nبا نیاز ویژه است. در مقایسه با آموزش عمومی آموزش ویژه از لحاظ سرعت، شدت، ساختار،\nتقویت، برنامه درسی نسبت شاگرد - معلم و بازبینی و سنجش به دقت کنترل شده است\n(کافمن و هالاهان ۲۰۰۵ الف). بهترین نوع آموزش عمومی نمیتواند جایگزین آموزش ویژه\nاست. شود\nگردد؛ به خصوص برای افرادی که دارای ناتوانیهای جدی هستند.\nآموزش ویژه به معنای برنامه ای است که برای برآوردن نیازهای خاص یک فرد استثنایی (با)\nنیازهای ویژه) طراحی شده است. مواد ویژه تکنیکهای تدریس یا تجهیزات و تسهیلات\nمواد نیاز بسته به نوع ناتوانی در فرایند آموزش ویژه مورد استفاده قرار می گیرند. برای مثال\nدهد، یا نحـ\nنیاز در حد\nدر س\nو یا معلم\nبه مدرسه\nیا در گرو\nعادی فرا\nویژه هنو\nمدرسه\nدر\nمی کنند\nزمان\nارزیابی\nموقعیت آموزشی\nفراهم کردن آموزش ویژه می تواند از ارائه توسط معلم عادی در مدرسه عادی تا ارائه در یک\nمرکز شبانه روزی متنوع باشد. این که چه کسی و در چه مکانی آموزش ویژه را ارائه کند به دو\nعامل بستگی دارد: (۱) دانش آموز با نیاز ویژه تا چه اندازه از دانش آموز عادی تفاوت دارد، و\n\nویژه\nفصل اول: مقدمه ای بر آموزش کودکان با نیازهای ویژه\n۲۷\n(۲) چه منابعی در مدرسه و جامعه در دسترس هستند. طرح‌های اجرایی مختلف برای آموزش\nاین دانش‌آموزان بر اساس میزان یکپارچه‌سازی فیزیکی به شرح زیر است (هالاهان و\nكافمن ، ۲۰۰۹):\nحداقل محیط خاص همان کلاس درس عادی است که معلم عادی از نیازهای فردی\nدانش‌آموزان آگاه است و در برآوردن نیازهای آنها ماهر است و ممکن است بتواند مواد،\nتجهیزات و روش‌های آموزشی مناسب را برای آنها فراهم سازد. در این سطح خدمات مستقیم\nمتخصصان ممکن است مورد نیاز نباشد و تخصص معلم عادی ممکن است برای برآوردن\nنیازهای دانش‌آموزان کافی باشد. بنابراین در این کلاس‌ها نیازهای برخی از دانش‌آموزان با\n۲\nناتوانی خفیف برآورده می‌شود.\nدر سطح دوم معلم کلاس درس عادی ممکن است علاوه بر کسب مواد، تجهیزات یا\nروش‌های خاص به مشورت با مربی خاص یا دیگر متخصصان (مانند روانشناس مدرسه) نیاز\nداشته باشد. معلم خاص ممکن است معلم عادی را آموزش دهد، معلم را به منابع ديگر ارجاع\nدهد، یا نحوه استفاده از مواد، تجهیزات، یا روش‌ها را شرح دهد. بنابراین آموزش ویژه‌ مورد\nنیاز در حد جزئی است.\nدر سطح سوم یک معلم خاص ممکن است خدمات سیار را برای دانش‌آموز با نیاز ویژه\nو یا معلم کلاس درس عادی فراهم کند. معلم سیار برنامه‌ مستمری را با حرکت از يک مدرسه\nبه مدرسه دیگر و بازدید از کلاس‌های درس جهت آموزش دانش‌آموزان به صورت انفرادی\nیا در گروه‌های کوچک پی‌ریزی می‌کند. این معلم مواد و پیشنهادهای تدریس را برای معلم\nعادی فراهم می‌سازد و با معلم عادی درباره مشکلات خاص مشورت می‌کند. سطح آموزش\nویژه‌ هنوز بسیار بالا نیست.\n۳\nدر سطح چهارم معلم مرجع خدمات را برای دانش‌آموزان و معلمان فقط در یک\nمدرسه فراهم می‌سازد. دانش‌آموزان تحت حمایت در کلاس‌های درس عادی ثبت نام\nمی‌کنند و بسته به شدت و ماهیت مشکلات خاص با معلم آموزش‌دیده خاص برای مدت\nزمان طولانی کار می‌کنند. معلم مرجع به طور مستمر نیازهای دانش‌آموزان و معلمان را\nارزیابی می‌کند و معمولاً با دانش‌آموزان به صورت انفرادی یا در گروه‌های کوچک در يک\n\n1. Physical integration\n2. Mild disability\n3. Resource teacher\n\nروان شناسی و آموزش کودکان و نوجوانان با نیازهای و\n۲۸\nفصل اول: -\nبا اختلال\nدسترس\nمدت زمـ\nمعلم عاد\nایـ\nیک از د\nملزم کر\nباشد. به\nدر پاییـ\nمداخله\nنکند. بـ\nنیازهای\nآموز :\nخاص\nتاحه\nبا ناتـ\nدیگر\nوقت\nمخت\nکلاس درس خاص به همراه تجهیزات و مواد خاص فعالیت می‌کند. به طور معمول معلم\nخاص همچنین به عنوان یک مشاور برای معلم کلاس درس عادی نیز عمل می‌کند و در زمـ\nآموزش و مدیریت دانش آموز در کلاس درس و احتمالاً شرح تکنیک‌های آموزشی کمـ\nمی‌کند. انعطاف پذیری این طرح و این واقعیت که دانش آموز با نیاز ویژه در بیشتر زمان‌ها\nهمسالان عادی به سر می‌برد آن را راه حلی جذاب و رایج ساخته است.\nدر سطح پنجم، آموزش در کلاسهای مستقل خاص مطرح است. در چنین کلاسی به\nطور معمول پانزده دانش آموز استثنایی یا کمتر با ویژگیها یا نیازهای خاص ثبت نام می‌کنند.\nبه طور معمول معلمی که در زمینه آموزش ویژه تخصص دارد همه یا بیشتر فرایند آموزش\nبرعهده دارد. دانش آموزان این کلاس‌ها به طور معمول همه یا بیشتر زمان مدرسه را مجزا\nهمسالان عادی سپری می‌کنند. اغلب دانش آموزان با ناتوانی با دانش آموزان عادی در بخشی\nاز روز (شاید برای آموزش جسمانی، موسیقی، یا فعالیت های دیگری که به خوبی می‌توانند\nانجام دهند) تلفیق می‌گردند.\nدر سطح ششم مدارس روزانه خاص مطرح هستند که طی آن دانش آموزان با نیازهای\nویژه یا استثنایی در همه روزهای مدرسه در موقعیت آموزشی خاص جایدهی ۲ می‌شوند\nمدرسه خاص معمولا برای یک گروه خاص از دانش آموزان با نیازهای ویژه سازماندهی می‌شود\nو شامل تجهیزات خاص ضروری برای مراقبت و آموزش آنها است. لازم به یادآوری است که\nدانش آموزان پس از اتمام مدرسه به خانه‌هایشان باز می گردند.\nدر سطح هفتم در مدرسه شبانه روزی، دانش آموزان با نیازهای ویژه به دور از خانه و\nجامعه، مراقبت ٢٤ ساعته را دریافت می‌کنند. این روش بالاترین سطح ویژه بودن خدمات\nآموزشی و توانبخشی است که توسط قانون آموزش افراد با ناتوانی مشخص شده است. این\nدانش آموزان ممکن است بازدیدهای دوره ای از خانه داشته باشند و دوباره به مرکز\nشبانه روزی باز گردند.\n۴\nدر سطح هشتم آموزش محدود به خانه یا بیمارستان مطرح است که اغلب اوقات\nمربوط به دانش آموزان با ناتوانی‌های جسمانی است، هرچند برخی اوقات برای دانش آموزان\n\nفصل اول : مقدمه ای بر آموزش کودکان با نیازهای ویژه\n۲۹\nبا اختلال های هیجانی / رفتاری یا دیگر ناتوانایی‌هایی که هیچ گزینه دیگری برای آنها در\nدسترس نیست استفاده می‌گردد، به طور معمول دانش آموز در بیمارستان یا در خانه برای\nمدت زمانی کوتاه محبوس می‌گردد و معلم بیمارستانی یا مخصوص خانه، ارتباط خود را با\nمعلم عادی حفظ می‌کند.\nاین که نظام آموزشی برای جایدهی مناسب دانش آموزان با نیازهای ویژه بر اساس کدام ۱\nیک از طرح‌های جایدهی بالا عمل کند، به عوامل متعددی بستگی دارند. قوانین آموزش ویژه\nملزم کرده است که جایدهی دانش آموز با نیاز ویژه باید در محیط با کمترین میزان محدودیت\nباشد. بدین معنا که جدایی دانش آموز از همکلاسی‌های عادی، خانه، خانواده، و جامعه باید\nدر پایین ترین حد ممکن باشد. یعنی زندگی دانش آموز باید تا حد ممکن عادی باشد و\nمداخله باید با نیازهای فرد همسو باشد و بیشتر از حد نیاز با آزادی‌های فرد تداخل ایجاد\nنکند. برای مثال اگر دانش آموزی می‌تواند خدمات مناسبی توسط معلم مرجع دریافت کند و\nنیازهای او برآورده شود نباید در کلاس‌های ویژه جایدهی شود و اگر نیازهای یک دانش\nآموز سر کلاس ویژه برآورده می‌شود، نباید در مدرسه شبانه روزی جایدهی شود و خدمات\nخاص دریافت کند.\nدر هر صورت محیط مناسب برای آموزش و توانبخشی یک دانش آموز با نیازهای ویژه\nتا حد زیادی به نوع ناتوانی و شدت ناتوانی او بستگی دارد. به عنوان مثال بیشتر دانش آموزان\nبا ناتوانی یادگیری می‌توانند به طور مناسبی در کلاس‌های عادی جایدهی شوند. از سوی\nدیگر تدریس دانش آموزان با آسیب‌های شدید شنوایی و بینایی ممکن است به جایدهی پاره\nوقت آنها در کلاس های خاص نیاز داشته باشد. بحث بیشتر در زمینه آموزش تلفیقی و انواع\nمختلف آن در فصل آخر کتاب ارائه خواهد شد.\n\n۳۰\nخلاصه فصل\nروان شناسی و آموزش کودکان و نوجوانان با نیازهای و\n\nدانش آموزان با نیازهای ویژه افرادی هستند که برنامه های آموزش عمومی موجود در مدارس\nجهت شکوفایی استعدادها و تواناییهای بالقوه آنها کافی نیست و بسته به نوع و شدت ناتوانر\nبه آموزش ویژه نیاز دارند. این دانش آموزان به محتوای آموزشی خاص، راهبردهای تدریس\nخاص، موقعیت آموزشی خاص و فن آوری آموزشی نیاز دارند.\nمیزان شیوع به تعداد کل افراد مبتلا به یک اختلال در یک زمان خاص و میزان بروز به\nتعداد موارد جدیدی که به کل موارد مبتلا اضافه میشوند اشاره دارد. برآورد میزان شیوع بیشتر\nگروه های با نیازهای ویژه دشوار است. مبهم بودن تعاریف و تغییرات مکرر در آن، پیشرفت.\nهای پزشکی، اثرات منفی برچسب و نمونه گیریهای مختلف از عوامل موثر بر میزان شیوع\nهستند.\n- دانش آموزان با نیازهای ویژه بسته به شدت اختلال میتوانند در موقعیتهای مختلف\nآموزشی جایدهی شوند. این موقعیتهای مختلف میتوانند از کلاس عادی تا مدارس\nشبانه روزی گسترده باشد. این که کودک با نیازهای ویژه باید در چه موقعیتی جایدهی شود\nباید بر اساس اصل کمترین میزان محدودیت عمل کرد. بدین معنا که جایدهی دانش آموز از\nهمکلاسی های عادی خانه خانواده و جامعه باید در پایین ترین میزان ممکن باشد.\n\nفصل چهارم\nناتوانی‌های یادگیری\n\nهدف‌های یادگیری\nاز خواننده انتظار می‌رود پس از مطالعه مطالب این فصل بتواند:\n۱. تعریف‌های مختلف ناتوانی یادگیری را به صورت تحلیلی/مقایسه‌ای شرح دهد\n۲. عوامل ایجاد کننده ناتوانی‌های مختلف یادگیری را بیان نماید\n۳. روش‌های مختلف شناسایی و سنجش ناتوانی یادگیری را شرح دهد\n۴. ویژگی‌های مختلف افراد مبتلا به ناتوانی‌های یادگیری را از جنبه‌های مختلف تحولی\nبیان کند\n۵. راهبردهای آموزشی و درمانی گوناگون ناتوانی‌های یادگیری را شرح دهد\n۶. اهمیت مداخله اولیه را در درمان ناتوانی‌های یادگیری توضیح دهد.\n\nاز دیدگاه تاریخی، ناتوانیهای یادگیری به علت اختلال عصب‌شناختی رخ می‌دهند. بسیاری از\nوالدین و معلمان بر این باورند که برچسب آسیب جزیی مغزی ۱ مشکل‌ساز است. این\nاصطلاح به افرادی اشاره دارد که نشانه‌های رفتاری را نشان می‌دهند نه نشانه‌های\nعصب‌شناختی. آنها همانند افراد با آسیب مغزی واقعی، رفتارهایی مانند حواس پرتی، فزون\nکنشی ۲ و نارسایی‌های ادراکی ۳ را نشان می‌دهند، اما آزمایشهای عصب‌شناختی آنها با افراد\nعادی قابل تشخیص نیست.\nبرچسب آسیب جزیی مغز استلزامهای بسیار خوبی برای برنامه‌ریزی آموزشی و به\nکارگیری درمان ندارد. اصطلاح نارساخوانی ۴ نیز فقط مشکلات خواندن را توصیف می‌کند و\nبسیاری از افراد مبتلا به ناتوانی یادگیری مشکلاتی نیز در حوزه‌های تحصیلی دیگر مانند\nریاضی دارند. همچنین اصطلاحات دیگر مانند ناتوان ادراکی ۵ و دیرآموز ۶ نیز نارسا است و\nتوصیف کننده کامل وضعیت یک فرد مبتلا به ناتوانی یادگیری نیست. ساموئل کرک (۱۹۶۳)\nاصطلاح ناتوانیهای یادگیری را برای افرادی که از نظر هوشی بهنجار هستند و نمی توان آنها\nرا در کلاسهای درسی ویژه جای داد، به کار برد. بسیاری از آنها دارای اختلال‌های رفتاری\nنیز هستند و برخی از آنها فاقد مشکلات رفتاری هستند. بنابراین جایدهی افراد مبتلا به\n\n1. Minimally brain injury\n2. Hyperactivity\n\nروان شناسی و آموزش کودکان و نوجوانان\n۱۴۲\nناتوانی‌های یادگیری در کلاس‌های درسی ویژه دانش آموزان با آشفتگی‌های هیجانی نیز\nغیرمنطقی و غیرعلمی است.\nتعریف ناتوانی یادگیری\nاز سال ۱۹۶۰، یازده تعریف مختلف از ناتوانی‌های یادگیری ارائه شد که از درجات مختلف\nپذیرش برخوردار شدند (هامیل، ۲۰۰۲) دو تا از مؤثرترین تعریف‌ها، تعریف دولت فدرال\nآمریکا و تعریف کمیته ملی مشترک ناتوانی‌های یادگیری است.\n\n۲\nتعریف دولت فدرال\nاولین بار این تعریف در سال ۱۹۷۷ ارائه شد و با تغییرات جزئی در سال ۱۹۹۷ توسط دولت\nفدرال دوباره پذیرفته شد و در سال ۲۰۰۴ مجدداً تصویب شد (هالاهان و کافمن، ۲۰۰۹).\nه اصطلاح ناتوانی یادگیری خاص عبارت است از وجود اختلال در یک یا بیشتر از یک فرایند\nروانشناختی پایه که در درک یا استفاده از زبان شفاهی یا نوشتاری نقش دارند. این اختلال\nممکن است در توانایی ناکامل افراد در گوش دادن، فکر کردن، صحبت کردن، خواندن،\nنوشتن، هجی کردن، یا انجام محاسبات ریاضی ظاهر گردد.»\nه این اصطلاح شرایطی مانند ناتوانی‌های ادراکی، آسیب مغزی، نارساکنش وری جزئی مغز،\nنارساخوانی، و ناگویی تحولی را شامل می‌گردد.\n٤\nه این اصطلاح مشکلات یادگیری را که بیشتر ناشی از ناتوانی‌های دیداری، شنیداری، یا\nحرکتی، کم‌توانی ذهنی، آشفتگی‌های هیجانی، یا شرایط نامساعد محیطی، فرهنگی، یا اقتصادی\nباشند، شامل نمی‌گردد.\nفصل چها\n۱. رجو\nیادگیری\nتحصیلی\nادراکی\n۲. حذ\nیادگیری\nیادگیری\n۳. حل\nاختلال\nدوران\n٤. حا\nیادگی\nخودت\nه. ش\nمعتق\nادراک\n٦. ا\nناتو\nناتو\nیادگ\nکم\n۷. ه\nتعریف کمیه ملی مشترک ناتوانی‌های یادگیری: این کمیته در هفت بند به شرح زیر تعریف\nدولت فدرال را نقد کرده و بر اساس آن تعریف خود را ارائه کرده است (هالاهان و\nکافمن، ۲۰۰۹):\n\nفصل چهارم: ناتوانی‌های یادگیری\n۱۴۳\n۱. رجوع به فرایندهای روان شناختی پایه. بسیاری از پیشگامان اولیه در حوزه ناتوانی‌های\nیادگیری بر این باورند که پردازش اطلاعات دیداری و شنیداری، علت زیربنایی مشکلات\nتحصیلی مانند ناتوانی‌های خواندن است. با این حال محققان مشخص کردند که تمرین‌های\nادراکی و ادراکی - حرکتی منجر به پیشرفت در خواندن کودک نمی‌شود.\n۲. حذف علت درونی ناتوانی‌های یادگیری. دولت فدرال عوامل علی اختلال ناتوانی\nیادگیری را بیان نکرده است، در حالی که کمیه ملی مشترک ناتوانی‌های یادگیری، ناتوانی\nیادگیری را ناشی از نارساکنش‌وری در سیستم عصبی مرکزی فرد تلقی کرده است.\n۳. حذف بزرگسالان. کمیه ملی مشترک ناتوانی‌های یادگیری، ناتوانی‌های یادگیری را یک\nاختلال مربوط به دوران کودکی در نظر نگرفته است. ناتوانی یادگیری مربوط به شرایط تمام\nدوران زندگی است.\n۴. حذف خودنظم‌بخشی و مشکلات در تعامل اجتماعی. کمیه ملی مشترک ناتوانی‌های\nیادگیری بیان کرده است که دانش‌آموزان مبتلا به ناتوانی‌های یادگیری اغلب مشکلاتی را در\nخودنظم‌بخشی۱ و تعامل اجتماعی۲ تجربه می‌کنند.\n۵. شمول اصطلاحاتی که تعریف آن‌ها مشکل است. کمیه ملی مشترک ناتوانی‌های یادگیری\nمعتقد است که تعریف دولت فدرال به خاطر وارد کردن اصطلاحاتی مانند معلولیت‌های\nادراکی، نارساخوانی، و نارساکنش‌وری جزیی مغز که تعریف‌شان مشکل است، مبهم می‌باشد.\n۶. سردرگمی در شرط عدم شمول. دولت فدرال مشکلات یادگیری که بیشتر ناشی از شرایط\nناتوان کننده دیگر مانند کم‌توانی ذهنی هستند را خارج کرده است. اما وضعیت فردی که هم\nناتوانی یادگیری دارد و هم دارای اختلال دیگر، مبهم است. کمیه ملی مشترک ناتوانی‌های\nیادگیری به طور آشکار مشخص ساخت که امکان دارد فرد با شرایط ناتوان کننده دیگر مانند\nکم‌توانی ذهنی نیز می‌تواند ناتوانی یادگیری داشته باشد.\n۷. شمول هجی کردن کمیه ملی مشترک ناتوانی‌های یادگیری معتقد است که نیازی به ذکر\nهجی کردن در تعریف نیست.\nکمیه ملی مشترک ناتوانی‌های یادگیری بر اساس هفت نقدی که به شرح بالا بر تعریف\nدولت فدرال وارد کرده است، تعریف زیر را ارائه کرده است:\n\n1. Self-regulation\n\n۱۴۴\nروان شناسی و آموزش کودکان و نوجوانان\nناتوانی یادگیری یک اصطلاح کلی است که به گروهی ناهمگن از اختلالها اشاره دارد که به\nصورت مشکلات معنادار در اکتساب و استفاده از گوش دادن، صحبت کردن، خواندن، نوشتن،\nاستدلال، با تواناییهای ریاضی بروز می‌کند. این اختلالها درونی بوده و فرض بر این است که\nناشی از نارساکنشوری در سیستم اعصاب مرکزی هستند و ممکن است در تمام طول زندگی\nرخ دهند. مشکلات در رفتارهای خودنظم‌بخشی، درک اجتماعی و تعامل اجتماعی ممکن است\nهمراه با ناتوانیهای یادگیری وجود داشته باشد، اما ایجاد کننده ناتوانی یادگیری نیستند.\nاگرچه که ناتوانی یادگیری ممکن است هم‌زمان با سایر معلولیت‌ها (مانند آسیب حسی،\nکم‌توانی ذهنی، آشفتگی‌های هیجانی شدید) یا عوامل بیرونی (مانند تفاوت‌های فرهنگی، آموزش\nناکافی یا نامناسب) رخ دهد، با این حال نتیجه این شرایط یا عوامل نمی‌باشد.\nمیزان شیوع\nبر اساس برآوردهای دولت آمریکا، در مدارس عمومی بین ۵ تا ٦ درصد دانش آموزان ٦ تا ١٧\nسال، مبتلا به ناتوانی یادگیری شناسایی شده‌اند. ناتوانی‌های یادگیری بزرگترین مقوله آموزش\nویژه است. بیشتر از نیمی از همه دانش آموزانی که در مدارس عمومی برای دریافت آموزش\nویژه شناسایی می‌شوند به ناتوانی یادگیری مبتلا هستند.\nاز سال ۱۹۷۷-۱۹۷٦ یعنی زمانی که دولت فدرال شروع به نگهداری شکل های میزان\nشیوع کرد تا هم اکنون میزان مقوله ناتوانی یادگیری بیشتر از دو برابر شد. بسیاری از مؤلفان بر\nاین عقیده اند که افزایش سریع مقوله ناتوانی‌های یادگیری، فعالیت تشخیصی ضعیف را منعکس\nمی‌کند. آنها معتقدند که معلمان، دانش‌آموزان با مشکلات یادگیری جزیی را با سرعت برچسب\nناتوانی یادگیری می‌زنند. با این حال برخی دیگر بحث می‌کنند که افزایش میزان شیوع ممکن\nاست ناشی از تغییرات اجتماعی و فرهنگی باشد که باعث آسیب‌پذیری کودکان نسبت به ناتوانی\nیادگیری مشخص می‌کنند شده است (هالاهان، ۱۹۹۲). برای مثال تعداد کودکانی که در فقر\nزندگی می‌کنند بین سالهای ۱۹۷۵ و ۱۹۹۳ دو برابر شده است (مرکز ملی کودکان در\nفقر، ۲۰۰۲) و فقر با میزان بالاتر مشکلات اجتماعی و یادگیری همراه است. علاوه بر این حتی\nخانواده‌هایی که در فقر هم نیستند نسبت به هر زمان قبل تحت عوامل تنیدگی زا قرار دارند.\nاصل چهارم: ناتوانی‌های یا\nبرخی دیگر معتقد\nذهنی شناسایی می‌شوند\nدریافت می‌کنند وجود و\nذهنی باشد، پرسنل مدر\nنگرش منفی کمتری به\nسیپراستین، ۲۰۰۲).\nمیزان شیوع ناتو\nاست. برخی محققان\nآسیب‌پذیری زیست\nبیشتر است و مردان\nبیشتری قرار دارند.\nناشی از سوگیری\nبیشتر برای دریافت\nفيليپس، ١٩٨٦؛ شـ\nسوگیریها، آسیب\nفدرال آمریکا هـ\nنمی توان تصور\n۵۳ درصد در\nدر مردان ) (ها\nسبب شناسی\nبرای سال ها\nناتوانی‌های\nمبتلا به ناتو\n\nفصل چهارم: ناتوانی های یادگیری\n۱۴۵\nبرخی دیگر معتقدند که یک رابطه علی بین کاهش در تعداد دانش‌آموزانی که کم‌توان\nذهنی شناسایی می‌شود و افزایش در تعداد دانش‌آموزانی که بر چسب ناتوانی یادگیری\nدریافت می‌کنند وجود دارد. هنگامی که یک دانش‌آموز می‌تواند واجد شرایط دریافت کم‌توان\nذهنی باشد، پرسنل مدرسه قواعد را به گونه‌ای پیش می‌برند تا برچسب ناتوانی یادگیری را که\nنگرش منفی کمتری به دنبال دارد را به جای کم‌توانی ذهنی به کار برند (مک میلان و\nسپر استین (۲۰۰۲).\nمیزان شیوع ناتوانی یادگیری در پسران در مقایسه با دختران به نسبت ۳ به ۱ بیشتر\nاست. برخی محققان فزونی میزان شیوع ناتوانی یادگیری در مردان نسبت به زنان را ناشی از\nآسیب پذیری زیست شناختی آنها نسبت دادند. میزان مرگ و میر نوزادان پسر نسبت به دختر\nبیشتر است و مردان نسبت به زنان از لحاظ نابهنجارهای زیست شناختی در معرض خطر\nبیشتری قرار دارند. برخی دیگر از محققان میزان شیوع بیشتر ناتوانی یادگیری در پسران را\nناشی از سوگیری در ارجاع می‌دانند. مثلاً معلمان دانش‌آموزان پسر را به خاطر فزون‌کنشی،\nبیشتر برای دریافت آموزش ویژه ارجاع می‌دهند تا دانش‌آموزان دختر (کلاریزیو و\nفیلیپس، ١٩٨٦؛ شای ویتز\" و همکاران، ۱۹۹۰). در مجموع می‌توان گفت به رغم وجود برخی\nسوگیری‌ها، آسیب‌پذیری زیست شناختی نیز در مردان وجود دارد. زیرا بر اساس برآورد دولت\nفدرال آمریکا همه ناتوانی‌هایی که در مردان بیشتر از زنان است در برگیرنده شرایطی اند که\nنمی‌توان تصور کرد علت آن به خاطر سوگیری در سنجش یا ارجاع است مانند آسیب شنوایی\n(۵۳ درصد در مردان )، آسیب ارتوپدی ( ٥٤ درصد در مردان )، و آسیب بینایی (٥٦) درصد\nدر مردان ) (هالاهان و همکاران، ۲۰۰۵، ص ۳۵).\n\nسبب‌شناسی\nبرای سال‌ها بسیاری از متخصصان فکر می‌کردند که عوامل عصب شناختی علت اصلی\nناتوانی‌های یادگیری هستند. با این حال شواهد عصب شناختی اندکی وجود دارد که در افراد\nمبتلا به ناتوانی یادگیری، آسیب واقعی در بافتهای مغز وجود دارد. بنابراین امروزه اصطلاح\n\n۱۴۶\nروان شناسی و آموزش کودکان و نوجوانان\n۱\nنارساکنش وری جایگزین آسیب یا صدمه \" شده است. بنابراین، کودک مبتلا به ناتوانی یادگیری به\nنارساکنش وری در سیستم اعصاب مرکزی ارجاع داده می شود تا صدمه مغزی. نارساکنش وری\nضرورتاً، به معنای آسیب در بافت مغزی نیست، که به معنای بد کار کردن مغز یا سیستم اعصاب\nمرکزی است. در سالهای اخیر، محققان برای ارزیابی فعالیت مغز از فنآوری های پیشرفته ای\nVA،PET ،FMRI،MRI استفاده می‌کنند که رایج ترین آنها جهت تشخیص نارساکنش وری های عصب شناختی در برخی\nافراد مبتلا به ناتوانی یادگیری عبارتند از :\nبا استفاده از این تکنیک ها، محققان شواهدی را در ارتباط با تفاوتهای ساختاری و\nکنشی بین مغزهای افراد عادی و افراد مبتلا به ناتوانی یادگیری به خصوص افراد مبتلا به\nناتوانیهای خواندن جمع آوری کردند (ریچاردز ، ۲۰۰۱). تفاوتهای ساختاری، مربوط به\nاندازه مناطق مختلف مغز و تفاوتهای کنشی مربوط به فعالیت در مغز است. برای مثال، با\nتوجه به تفاوتهای کنشی، محققان دریافتند که نواحی مختلفی از مغز در طی تکالیف\nخواندن در افراد مبتلا به نارساخوانی در مقایسه با افراد عادی فعال می گردند.\nباید یادآور شد که شواهد قطعی در مورد اساس عصب شناختی دانش آموزان مبتلا به\nناتوانی یادگیری وجود ندارد و حتی اگر این شواهد جمع آوری گردد، باز هم این سوال باقی\nاست که علت نارساکنش وری مغز در افراد مبتلا به ناتوانی یادگیری چیست؟ هالاهان و\nکافمن (۲۰۰۹) این علل را در سه مقوله ژنتیکی، تراتوژنها، و عوامل پزشکی تقسیم کردند:\nعوامل ژنتیکی\nشواهد مختلف حاکی از آن است که ناتوانی های یادگیری می تواند ارثی باشد. شواهد\nمختلف مربوط به مطالعات بر روی دوقلوهای همسان یا یک تخمکی حاکی از آن است که اگر\nیکی از دوقلوها نارساخوان باشد، کودک دیگر نیز احتمالا به نارساخوانی مبتلا خواهد شد.\nفصل چهارم: ناتوان\nهمچنین مشکلات\nیادگیری و جو\nعوامل تراتوان\nتراتوژن ها به\n۲.\nبه عنوان مثا\nاین باورند\nاندازه ای\nعوامل\nبرخی ت\nشرایط\nقرار می\nزمان\nا. عمـ\nمصر\n---\n\n۱۴۷\nفصل چهارم: ناتوانی های یادگیری\nهمچنین مشکلات خواندن و زبان در بین اعضای خانواده دانش آموزان مبتلا به ناتوانی\nیادگیری وجود دارد.\nعوامل تراتوژن\nتراتوژنها عواملی هستند که می‌توانند موجب بدشکلی‌ها یا نقص‌هایی در رشد جنین گردند.\nبه عنوان مثال نشانگان الکلی جنین یکی از عوامل ایجاد کننده کم‌توانی ذهنی است. محققان بر\nاین باورند برخی افراد ممکن است در معرض سطوح مختلف این مواد قرار گیرند ولی نــه بـه\nاندازه‌ای که منجر به کم‌توانی ذهنی گردد؛ بنابراین باعث ناتوانی یادگیری در آنها می‌گردد.\nعوامل پزشکی\nبرخی شرایط پزشکی وجود دارد که می‌تواند تأثیر منفی بر کودکان بگذارد. از جمله ایــن\nشرایط، تولد پیش از موعد است که کودکان را در معرض خطر نارسا کنش وری عصب شناختی\nقرار می‌دهد.\nبه طور کلی عوامل ایجاد کننده احتمالی اختلال ناتوانی یادگیری را می‌توان بر حسب\nزمان نیز به سه دسته تقسیم کرد:\n۱. عوامل قبل از تولد: مانند ناسازگاری عامل ارهاش، اشعه ایکس، مصرف مواد مخدر،\nمصرف دارو، سن مادر، عفونت‌هایی مانند سرخجه\n۲. عوامل هنگام تولد: مانند کمبود اکسیژن، زایمان زودرس یا دیررس\n۳. عوامل پس از تولد: مانند تب بالا، ضربات به سر، مننژیت\nروش‌های شناسایی و سنجش ناتوانی یادگیری\nشیوه‌های شناسایی ناتوانی یادگیری در حال حاضر در وضعیت انتقال است. همان طوری که\nدر بخش تعریف این اختلال مطرح شد، دولت فدرال، قانون آموزش افراد با ناتوانی را در سال\n٢٠٠٤ مجدداً تصویب کرد. همچنین روشی که دانش آموزان ممکن است جهت دریافت\nخدمات آموزشی ویژه واجد شرایط شوند، به طور چشمگیری تغییر کرد. رویکرد سنتی در\n\nفصل چهارم ناتوانی هـ\nات\n۱۴۸\nروان شناسی و آموزش کودکان و نوجوانان\nشناسایی، تفاوت پیشرفت - توانایی ۱ نام دارد. راه حل جایگزین برای شناسایی ناتوانی\nیادگیری، پاسخ به مداخله است که در تصویب مجدد دولت فدرال در سال ۲۰۰۴ ذکر شده\nاست. به عبارت دیگر تصویب مجدد قانون آموزش افراد با ناتوانی در سال ٢٠٠٤ اجازه داده\nاست تا بین استفاده از دو روش فوق برای شناسایی دانش آموزان مبتلا به ناتوانی یادگیری،\nانتخاب صورت گیرد.\n۱) تفاوت پیشرفت - توانایی\nبر اساس قواعد دولت فدرال بعد از ارائه تعریف در سال ۱۹۹۷، عنصر اساسی در شناسایی\nافراد مبتلا به ناتوانی یادگیری، وجود تفاوت شدید بین پیشرفت و توانایی هوشی است. دولت\nفدرال تصمیم گیری دقیق درباره تعیین این تفاوت شدید را بر عهده ایالتها قرار داد. بسیاری\nاز ایالات ها به تفاوت هوشبهر - پیشرفت متکی هستند، یعنی مقایسه بین نمرات هوش استاندارد\nشده و آزمونهای پیشرفت. بسیاری از آنها از فرمولهای آماری مختلفی برای شناسایی تفاوت\nاستفاده میکنند که در طول سالها ایرادهای زیادی بر استفاده از این فرمول ها وارد شد. برخی\nاز این فرمولها از لحاظ آماری نقص دارند و منجر به قضاوت نادرست می گردند و برخی\nدیگر که از لحاظ آماری مناسب هستند، اجرای آنها دشوار و هزینه بر است.\nبرخی مؤلفان مانند فلتچر (۲۰۰۲) علاوه بر دشوار بودن استفاده از فرمول ها، نقدهای\nمفهومی دیگری را مطرح کردند. به عنوان مثال این ایراد را مطرح کردند که هوشبهر یک عامل\nپیش بینی کننده بسیار قوی از توانایی خواندن نیست. علاوه بر این نمرات هو شبهر دانش آموزان\nمبتلا به ناتوانی یادگیری در معرض کمترسنجی۴ قرار دارد زیرا عملکرد بر روی آزمون های\nهوشبهر تا اندازه ای به توانایی خواندن وابسته است. به عبارت دیگر دانش آموزان با مهارت-\nهای خواندن ضعیف در بسط دادن واژگان خود و یادگیری درباره جهان مشکلاتی دارند. در\nنتیجه این افراد نمرات پایین تر از متوسط را در آزمونهای هوشبهر به دست می آورند و تفاوت\nبين هوشبهر و پیشرفت در آنها کم می شود. در نهایت این که برخی مربیان نیز از دیدگاه\nتفاوت بدین صورت ایراد گرفتند که این روش در پایه های ابتدایی فاقد کاربرد است. در پایه-\nاول و دوم ان\nهای\nشناسایی با این ر\nشکست مشهور\n۲) پاسخ به مد\nبر اساس انتقاد\nجایگزینی را به\nبه مداخله یابی\n- دانش آموزا\nپیشرفت آن\n- آنهایی که\nشخص دیگ\n- پیشرفت\n- آنهایی که\nدریافت خد\nطرف\nتفاوت پیش\nناشی از -\nبا -\nدارد و فـ\n- ماهیت\nدریافت\n- این\nروش\n- آیا\n\n۱۳۹\nهای اول و دوم انتظار چندانی برای خواندن و یا ریاضی وجود ندارد. به خاطر همین تاخیر در\nشناسایی با این روش است که رویکرد تفاوت هو شبهر پیشرفت به مدل \" انتظار برای\nنکست \" مشهور است.\n۲) پاسخ به مداخله یا پاسخ به درمان\nبر اساس انتقادهای ذکر شده در مورد رویکرد تفاوتِ هو شبهر- پیشرفت، محققان روش های\nجایگزینی را برای شناسایی دانش آموزان مبتلا به ناتوانی یادگیری مطرح کردند. رویکرد پاسخ\nبه مداخله یا پاسخ به درمان در تعیین اختلال ناتوانی یادگیری شامل مؤلفه های زیر است:\n- دانش آموزان آموزش مؤثر کلی را توسط معلم کلاس درس دریافت کنند\n- پیشرفت آنها بازبینی گردد\n- آنهایی که به آموزش پاسخ نمی دهند آموزش دیگر یا بیشتری را توسط معلم خود یا\nشخص دیگر دریافت کنند\n- پیشرفت آنها مجدداً مورد بازبینی گردد\n- آنهایی که هنوز به آموزش پاسخ ندادند یا برای آموزش ویژه و یا برای ارزیابی جهت\nدریافت خدمات آموزش ویژه ارجاع داده شوند.\nطرفداران رویکرد بالا ذکر می کنند که این روش علاوه بر اجتناب از نقایص رویکرد\nتفاوت پیشرفت - توانایی این فایده مهم را دارد که تضمین می کند پیشرفت پایین دانش آموز\nناشی از عدم دریافت آموزش مؤثر نیست.\nبا این حال باید یادآور شد که تحقیقات بسیار کمی درباره کارآمدی این روش وجود\nدارد و فقدان این پژوهشها سوالهای زیر را بر می انگیزد:\n- ماهیت مداخله چه چیزی باید باشد؟ آیا باید فردی باشد یا همه افراد مداخله یکسانی را\nدریافت کنند و در واقع مداخله باید شامل پروتکل استانداردی باشد؟\n- این روش برای دانش آموزان با مشکلات ریاضی چگونه عمل خواهد کرد؟ تاکنون این\nروش برای دانش آموزان با مشکلات خواندن استفاده شده است.\n- ایا مداخله باید به صورت آموزش عادی که در کلاس درس آموزش عمومی ارائه می شود\nصورت گیرد یا باید نوع خاص تری از آموزش مانند آموزش یک به یک اجرا شود؟\n\n1. Wait-to- fail\n\n۱۵۰\nروان شناسی و آموزش کودکان و نوجوانان\n- چه کسی باید آموزش را ارائه دهد: معلم آموزش عمومی یا معلم آموزش خاص؟\n- چه ملاکی برای تعیین میزان پاسخدهی این روش به کار رود؟\n- شدت مداخله چقدر باید باشد (مانند سی دقیقه در روز هر روز پنجاه دقیقه هر روز سه\nبار در هفته؟)\n- چقدر مداخله باید طول بکشد، مانند ده هفته یک نیمسال تحصیلی (به نقل از هالامان و\nکافمن (۲۰۰۹).\n\nروشهای سنجش ناتوانی یادگیری\nچهار نوع سنجش در حوزه ناتوانی های یادگیری رایج است: سنجش استاندارد پیشرفت،\nسنجش تکوینی ، سنجش غیر رسمی ، سنجش اصیل .\n\n۱. سنجش استاندارد پیشرفت\nمعلمان و روانشناسان به طور رایج از سنجش استاندارد پیشرفت برای دانش آموزان مبتلا به\nناتوانی یادگیری استفاده میکنند زیرا مشکلات در پیشرفت، ویژگی اصلی این دانش آموزان\nاست. تستهای متعددی برای این منظور وجود دارد. برای مثال تست پیشرفت انفرادی\nوکسلر - دومین ویرایش همه حوزه های تعریف فدرال را از ناتوانی یادگیری اندازه گیری\nمی کند، مانند خواندن ،پایه درک ،خواندن هجی کردن بیان ،نوشتاری استدلال ریاضی، عملیات\nعددی درک گوش دادن و بیان شفاهی تهیه کنندگان این تست آن را به گونه ای تهیه کردند\nتا بتوان از آن در تلفیق با مقیاس هوش وکسلر کودکان جهت بررسی تفاوت بین پیشرفت و\nتوانایی استفاده کرد. محدودیت بیشتر ابزارهای استاندارد شده این است که نمی توانند درباره\nعلت مشکلات دانش آموز اطلاعاتی ارائه دهند معلمان و متخصصان بالینی از این تستها\nبیشتر برای شناسایی دانش آموزان با مشکلات یادگیری و فراهم کردن نشانگرهای اصلی\nتواناییها و ضعفهای تحصیلی آنها استفاده می کنند.\n\nفصل چهارم ناتوانی\n.۲ سنجش تکو\nسنجش تکوینی\nاست ولی به چه\nاین نوع ارزیابی\n\n\\\nسنجش معمر\nمعلم رفتارها\nمعلم رفتار\nمثال معلم می\nمعلم از این\nمعلم از سـ\nیک م،\n\nزیادی توس\nاین روش\nمی شود.\nمدرسه خ،\n\n. سنجش\nیک روش\nرو
