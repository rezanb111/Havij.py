«چارت ها»
چارت ها رسانه هایی هستند که ارائه ایده ها و مفاهیمی که تفهیم آنها از طریق کتبی یا شفاهی مشکل است استفاده می شود و همچنین برای روشن کردن نکات مهم نیز توصیه می شود.
چارت های کارآ و موثر ترکیبی از فرمهای ترسیمی - تصاویر نقاشیها کارتونها دیاگرامها و مواد لغوی هستند.

انواع چارت ها
تقسیم چارت ها بر اساس فرم ارائه مطالب
۱- چارت زمانی: چارتهای زمانی خود دارای انواع مختلفی هستند.
۱/۱ یک نمونه از چارتهای زمانی مشخص کننده ی وقایع و حوادث تاریخی در یک دوره از تاریخ است. (محور عمودی و افقی از عکس نیز می توان استفاده کرد.)
محور افقی برای مشخص کردن حوادث
محور عمودی برای جدا کردن ادوار تاریخی
۲- چارت نواری
برای ارائه ی اطلاعات به صورت متوالی استفاده می شود.

دارای قسمت های متوالی پوشیده از نوار و یا کاغذ هستند که میتوانند در موقع لازم جدا شده و قسمت مربوطه را آشکار سازند.
۳- چارت برگردان: برای ارائه ی اطلاعات به صورت متوالی مورد استفاده قرار میگیرد روی پایه قرار می گیرد.
۴- چارت های طبقه بندی و سازمانی
برای استفاده شاگردان کلاسها و پایه های بالا مناسب می باشد.

• جریانی
• درختی
• شاخه ای

چارت های جریانی: در این چارت ها گامهایی که در تهیه یک چیز طی میشود یا رویدادهایی که به دنبال هم می آیند بر روی یک صفحه نمایش داده میشوند. چرخه ی آب
چارت شاخه ای: به کمک این چارتها نحوه ی ترکیب چند رویداد و به وجود آمدن یک رویداد دیگر یا ترکیب چند جزء و به وجود آمدن یک کل نشان داده میشود (از به هم پیوستن چند شاخه متعدد یک شاخه واحد بوجود می آید.)
چارت درختی: این چارتها برعکس چارت شاخه ای هستند و نشان میدهند چگونه از یک کل چند جزء به وجود می آید. شجره نامه فامیلی
19

چارت جدولی (جدول بندی)
اطلاعات در دو ستون افقی و عمودی ارائه میشوند و ارتباط هر عامل در ستون افقی با عامل دیگر در ستون عمودی نشان داده می شود. برنامه کلاس درس، تولیدات معدنی استانها
چارت نقشه ای: برای ارائه منظم اطلاعات و خلاصه کردن آنها گاهی از نقشه و انواع مختلف نمادها (سمبلها) استفاده می شود. برای نشان دادن نقاطی که تحت پوشش تلویزیون هستند.
چارتهای تصویری: در این چارتها از تصاویر معمولی یا سمبولیک برای نشان دادن اجزاء مختلف یک عضو یا انواع مختلف یک چیز استفاده میشود. (تصویر گوش - یا چشم)

پوسترها
پوسترها برای انتقال صریح روشن جالب توجه و ارزان قیمت اطلاعات به کار می رود.
در تهیه پوسترها هر چه قدر پیامها را ساده تر و مستقیم تر ارائه دهیم تأثیر آنها زیادتر و موثر تر است.
انواع پوسترها - یک نظری، چند نظری

اصولی که در تهیه پوستر و (چارت) باید مد نظر قرار گیرد:
۱ - خلاصه بودن
۲ - سادگی
20

۳ - بداعت
۴ - طرح
۵ - تنظیم
۶ - رنگ ها

۱- خلاصه بودن: منظور اینکه بشود در عرض چند ثانیه آن را قرائت، درک پیام را فهمید. حروف به کار رفته درشت باشد مطالب خلاصه شده باشد.

عنوان پوستر در یکی از طبقات زیر قرار می گیرد:
• دستوری: در هنگام تراش فلزات از عینک های ایمنی استفاده کنید.
• پرسشی: آیا موتورهای دیزل را می شناسید.
• پیشنهادی: امتحانات نزدیک است مطالعه کنید.
• اخباری: اشعه X زیان آور است از آن بپرهیزید.
۲- سادگی: پوسترها یا چارتهای خوب دارای نقوش و تصاویر زیادی نیستند.
۳- بداعت: پوسترها باید بدیع جالب و نو باشد بداعت کلیه جنبه ها کلمات، جملات، طرحها، روابط بین عناصر را شامل می شود.
۴- طرح: پوسترها را میتوان تنها به یک نوشته یا تیتر خلاصه کرد اما ارائه طرح باعث جلب توجه بیننده می شود (هفته معلم)
۵- تنظیم: نحوه قرار گرفتن قسمتهای مختلف پوسترها و چارت ها مورد توجه قرار گیرد.
۶- رنگها: همیشه مبین ایده ها و احساسات بوده است استفاده از اصول فنی رنگها در پوستر یا چارت

نمودارها نشان دهنده ی روابط عددی و نسبی اقلام هستند که خواننده را قادر به درک معنای خاص یک توده از اطلاعات پیچیده می کند.

انواع نمودار
۱- نمودار خطی: این نوع نمودار دقیق ترین و صحیح ترین نوع نمودار میباشند - نمودارهای خطی نحوه گسترش و یا توسعه اطلاعات را در یک مدت زمان معین به خوبی نشان میدهند. دو مقیاس اندازه گیری دارد.
۲- نمودار ستونی: ساده ترین نوع نمودار و درک آن توسط فراگیران می باشد.
۳- نمودار دایره ای: اطلاعات را به صورت نسبی و یا درصدی از کل نشان می دهد.

دو خصوصیت دارند:
الف - كل اطلاعات را بدون توجه به متغیر دیگری نشان می دهد.
ب - هر قسمت به صورت درصد یا کسری از کل بیان می شود.
۴- نمودار تصویری (مصور): از انواع شکلهای سیاه و سفید و رنگی جالب استفاده میشود. (به نمودار حالت حقیقی و جذابیت می دهد.) این نمودار از نمودار ستونی گرفته شده اند. این نوع نمودارها دقت و صحت سایر نمودارها را دارا نمی باشند.

* نقشه ها
تصاویری از بخش های مختلف سطح زمین یا سایر کرات آسمانی است هر بخش از نقشه مطابق اصل آن در طبیعت است.

/* ---------- نرمال‌سازی فارسی ---------- */
function normalize(s){
  if(!s) return "";
  return s
    .replace(/[\u064B-\u0652\u0670\u0640]/g,"")
    .replace(/[ﻱﻲﻳﻴﯼﯽﯾﯿى]/g,"ی").replace(/ي/g,"ی")
    .replace(/[ﻙﻚﻛﻜك]/g,"ک")
    .replace(/ة/g,"ه").replace(/ۀ/g,"ه")
    .replace(/[۰-۹]/g,d=>"0123456789"["۰۱۲۳۴۵۶۷۸۹".indexOf(d)])
    .replace(/[٠-٩]/g,d=>"0123456789"["٠١٢٣٤٥٦٧٨٩".indexOf(d)])
    .replace(/[‌‍]/g," ")
    .replace(/[^\u0600-\u06FF0-9a-zA-Z\s\.،؛:؟!\-\(\)«»\*]/g," ")
    .replace(/\s+/g," ").trim().toLowerCase();
}

const STOP = new Set(("از به با در بر را که این آن های ها یک یه و یا اما ولی پس چون اگر تا برای بدون درباره دربارهٔ روی زیر بالا کنار میان بین نیز هم همه هیچ چیست چیه چه چرا کجا کی کدام چگونه چطور آیا می شود شد شده خواهد بود است هست نیست نمی شوند کنند کند کنیم کنید کرد کرده کنند داشت دارد دارند داشته باشد باشند باشید باید نباید آنها ایشان ما شما من تو او ای یعنی مثلا مثلاً مانند طور طوری گونه گاهی گاه فقط بسیار خیلی کاملا کاملاً اصلا اصلاً حتی هرگز همچنین لذا بنابراین چنین چنانچه هرچه ولی اگر چه گرچه").split(" "));

/* ---------- توکن‌سازی ---------- */
function tokenize(s){
  return normalize(s).split(/[\s\.،؛:؟!\(\)«»\-\*]+/).filter(t=>t && t.length>1 && !STOP.has(t));
}

/* ---------- بلوک‌بندی ---------- */
const RAW_LINES = JOZVE.split(/\r?\n/);
const BLOCKS = [];
{
  let cur = {start:1, lines:[]};
  RAW_LINES.forEach((ln,i)=>{
    const trimmed = ln.trim();
    const isNum = /^\d+$/.test(trimmed);
    if(isNum){ return; }
    if(trimmed===""){
      if(cur.lines.length){
        BLOCKS.push({start:cur.start, end:i, text:cur.lines.join("\n")});
        cur={start:i+2, lines:[]};
      } else { cur.start = i+2; }
    } else {
      if(cur.lines.length===0) cur.start = i+1;
      cur.lines.push(trimmed);
    }
  });
  if(cur.lines.length) BLOCKS.push({start:cur.start, end:RAW_LINES.length, text:cur.lines.join("\n")});
}

/* ---------- ایندکس TF/IDF ---------- */
const DF = new Map();
const BLOCK_TF = BLOCKS.map(b=>{
  const toks = tokenize(b.text);
  const tf = new Map();
  toks.forEach(t=>tf.set(t,(tf.get(t)||0)+1));
  const seen = new Set();
  toks.forEach(t=>{ if(!seen.has(t)){ seen.add(t); DF.set(t,(DF.get(t)||0)+1);} });
  return {tf, len:toks.length, norm:normalize(b.text)};
});
const N = BLOCKS.length;
const IDF = new Map();
DF.forEach((d,t)=>IDF.set(t, Math.log(1 + N/d)));

/* ---------- جستجو ---------- */
function search(query){
  const qToks = tokenize(query);
  if(qToks.length===0) return [];
  const qNorm = normalize(query);
  const phrases = qNorm.split(/[،؛\.؟!]/).map(s=>s.trim()).filter(s=>s.length>4);
  const scores = BLOCK_TF.map((b,i)=>{
    let s = 0;
    qToks.forEach(t=>{
      const tf = b.tf.get(t)||0;
      if(tf>0){
        const idf = IDF.get(t)||0;
        s += (tf/(b.len||1)) * idf * 10;
      }
    });
    // exact phrase bonus
    phrases.forEach(p=>{ if(b.norm.includes(p)) s += 4; });
    // single token presence bonus
    qToks.forEach(t=>{ if(b.norm.includes(" "+t+" ") || b.norm.startsWith(t+" ") || b.norm.endsWith(" "+t)) s += 0.3; });
    return {i, s};
  });
  scores.sort((a,b)=>b.s-a.s);
  return scores.filter(x=>x.s>0.15).slice(0,4).map(x=>({...BLOCKS[x.i], score:x.s}));
}

/* ---------- ساخت پاسخ روان ---------- */
function splitSentences(text){
  return text.split(/(?<=[\.؟!])\s+|\n+/).map(s=>s.trim()).filter(s=>s.length>3);
}
function compose(query, hits){
  if(hits.length===0){
    return {
      answer:"این مطلب در متن جزوه یافت نشد. لطفاً سؤال را با کلمات کلیدی موجود در جزوه بازنویسی کنید.",
      quote:"", lines:""
    };
  }
  const qToks = new Set(tokenize(query));
  // best sentences across top hits
  const sents = [];
  hits.forEach(h=>{
    splitSentences(h.text).forEach(s=>{
      const toks = tokenize(s);
      let overlap = 0; toks.forEach(t=>{ if(qToks.has(t)) overlap++; });
      sents.push({s, overlap, len:toks.length, src:h});
    });
  });
  sents.sort((a,b)=> (b.overlap - a.overlap) || (a.len - b.len));
  const picked = [];
  const seen = new Set();
  for(const x of sents){
    if(picked.length>=5) break;
    if(x.overlap===0 && picked.length>=2) break;
    const key = x.s.slice(0,40);
    if(seen.has(key)) continue;
    seen.add(key); picked.push(x);
  }
  // Smooth answer with natural connectors
  const connectors = ["بر اساس جزوه، ", "همچنین ", "افزون بر این، ", "به بیان دیگر، ", "در نهایت، "];
  const answer = picked.map((p,i)=>{
    let t = p.s.replace(/\s+/g," ").trim();
    t = t.replace(/^[\*\-•]\s*/,"");
    if(!/[\.؟!]$/.test(t)) t += ".";
    return connectors[Math.min(i,connectors.length-1)] + t;
  }).join(" ");

  // Quote block: union of hit texts
  const quote = hits.map(h=>h.text.trim()).join("\n\n———\n\n");
  const lines = hits.map(h=> h.start===h.end? `خط ${h.start}` : `خطوط ${h.start}–${h.end}`).join(" · ");
  return {answer, quote, lines};
}

const chat = document.getElementById("chat");
const form = document.getElementById("form");
const qEl  = document.getElementById("q");
const sendBtn = document.getElementById("send");

function esc(s){return s.replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));}

function addUser(text){
  const d=document.createElement("div"); d.className="msg user";
  d.innerHTML = `<div class="bubble">${esc(text)}</div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function addTyping(){
  const d=document.createElement("div"); d.className="msg bot"; d.id="typing";
  d.innerHTML = `<div class="bubble"><span class="typing"><i></i><i></i><i></i></span></div>`;
  chat.appendChild(d); chat.scrollTop = chat.scrollHeight;
}
function removeTyping(){ const t=document.getElementById("typing"); if(t) t.remove(); }
function addBot({answer, quote, lines}){
  const d=document.createElement("div"); d.className="msg bot";
  const quoteHtml = quote ? `
    <div class="quote">
      <div class="quote-head">
        <span>◆ نسخهٔ نهایی برای کپی (عین متن جزوه)</span>
        <button class="copy-btn" type="button">کپی</button>
      </div>
      <div class="quote-body">${esc(quote)}</div>
      ${lines?`<div class="src">منبع: ${esc(lines)}</div>`:""}
    </div>` : "";
  d.innerHTML = `<div class="bubble">
      <div class="answer-title">▸ پاسخ بر اساس جزوه</div>
      <div class="answer-body">${esc(answer)}</div>
      ${quoteHtml}
    </div>`;
  chat.appendChild(d);
  const btn = d.querySelector(".copy-btn");
  if(btn){
    btn.addEventListener("click",()=>{
      const txt = d.querySelector(".quote-body").innerText;
      const done = ()=>{ btn.textContent="کپی شد ✓"; btn.classList.add("ok");
        setTimeout(()=>{ btn.textContent="کپی"; btn.classList.remove("ok"); },1600); };
      if(navigator.clipboard && window.isSecureContext){
        navigator.clipboard.writeText(txt).then(done).catch(()=>fallback(txt,done));
      } else fallback(txt,done);
    });
  }
  chat.scrollTop = chat.scrollHeight;
}
function fallback(txt,done){
  const ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0";
  document.body.appendChild(ta); ta.select();
  try{document.execCommand("copy");done();}catch(e){alert("کپی ناموفق بود");}
  ta.remove();
}

form.addEventListener("submit",e=>{
  e.preventDefault();
  const q = qEl.value.trim();
  if(!q) return;
  addUser(q); qEl.value=""; qEl.style.height="auto";
  sendBtn.disabled=true; addTyping();
  setTimeout(()=>{
    const hits = search(q);
    const res = compose(q, hits);
    removeTyping(); addBot(res); sendBtn.disabled=false; qEl.focus();
  }, 420);
});
qEl.addEventListener("keydown",e=>{
  if(e.key==="Enter" && !e.shiftKey){ e.preventDefault(); form.requestSubmit(); }
});
qEl.addEventListener("input",()=>{
  qEl.style.height="auto"; qEl.style.height=Math.min(qEl.scrollHeight,140)+"px";
});
qEl.focus();
