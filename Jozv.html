هند. به عنوان مثال اگر به کودکان تعدادی ماشین کوچک بدهیم که بعضی از آن‌ها مثل هم و برخی باهم تفاوت دارند، می‌توانند ماشین‌هایی را که مثل هم نیستند تشخیص دهند و جدا کنند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "• فعالیت ۱ تعدادی کارت رنگی به شکل سه گوش، چهارگوش، دایره و ... که بعضی از نظر رنگ و اندازه مثل هم نیستند و برخی از آن‌ها، مثل هم‌اند، به کودکان می‌دهیم و از آنان می‌خواهیم کارت‌هایی را که مثل هم نیستند و با هم تفاوت دارند، از بقیه جدا کنند و در کنار هم قرار دهند. پس از انجام فعالیت با آن‌ها گفت‌وگو می‌کنیم: آیا همه‌ی کارت‌ها مثل هم‌اند؟ چه تفاوت‌هایی باهم دارند؟ کارت‌هایی را که جدا کرده‌اید مثل هم هستند یا با هم تفاوت دارند؟ و ..."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۲ تصویرهای متفاوت: تعدادی تصاویر خانه که برخی مثل هم و بعضی باهم تفاوت دارند، به کودکان می‌دهیم و از آنان می‌خواهیم خانه‌هایی را که با هم تفاوت دارند از بقیه جدا کنند و در کنار هم قرار دهند. سپس با آنان به گفت‌وگو می‌پردازیم: آیا همه‌ی خانه‌ها مثل هم‌اند؟ آیا همه‌ی خانه‌ها باهم تفاوت دارند؟ خانه‌هایی که مثل هم نیستند، چه تفاوت‌هایی باهم دارند؟ و ..."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین برای درک تفاوت‌ها، یک فعالیت عملی و یک فعالیت تصویری برای کودکان طراحی کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۷ـ ابقا یا نگهداری ذهنی: منظور از ابقا این است که اگر در یک مجموعه، شکل ظاهری آن تغییر کند یعنی اعضای یک مجموعه را در شکل‌های گوناگون قرار دهیم، تعداد و کمیت آن تغییر نمی‌کند. به‌نظر پیاژه این توانایی در سال‌های اول دبستان در کودکان ایجاد می‌شود اما تجربیاتی که در این زمینه در کشور ما (در مهدهای کودک تهران) صورت گرفته است، نشان می‌دهد که کودکان آمادگی (۶ساله)، توانایی درک مفهوم ابقا را دارند. ابقا در زمینه‌های زیر صورت می‌گیرد: الف ـ ابقای طول (خط): کودکان باید درک کنند اگر دو خط باهم برابر باشند، اگر طرز قرار گرفتن آن‌ها، تغییر کند اندازه‌ی آن‌ها تغییر نمی‌کند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ دو قطعه چوب مساوی را به کودک می‌دهیم. کودک، این دو قطعه چوب را کنار یکدیگر قرار می‌دهد و درک می‌کند که باهم برابرند. حال اگر یکی از چوب‌ها را بالا یا پایین ببریم، کودک ممکن است بگوید، یکی از چوب‌ها درازتر یا کوتاه‌تر است. اما پس از چند بار آزمایش و با توجه به سؤالاتی که از او می‌شود، کودک به این نتیجه می‌رسد که چوب‌ها باهم برابرند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "دو قطعه چوب مساوی که در حالت اول کنار هم قرار دارند و در حالت دوم یکی از آن‌ها جابه‌جا شده است"}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین یک فعالیت برای ابقای خط، طراحی کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "ب ـ ابقای سطح: کودکان باید درک کنند که اگر دو سطح (دوشکل) باهم برابرند، با تغییر شکل آن‌ها، اندازه‌ی آن‌ها تغییر نمی‌کند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ دو چهارگوش را که باهم برابرند، به کودک می‌دهیم. کودک چهارگوش‌ها را کنار هم می‌گذارد و تشخیص می‌دهد که باهم برابرند. یکی از چهارگوش‌ها را به دو سه گوش تبدیل می‌کنیم و از کودک می‌پرسیم آیا این دو شکل باهم برابرند؟ ابتدا کودک ممکن است بگوید باهم برابر نیستند. اما با چند بار آزمایش، که توسط خود کودک صورت می‌گیرد و با تبدیل چهارگوش به سه گوش و سه گوش به چهارگوش و با توجه به سؤالاتی که از او می‌شود، کودک به این نتیجه دست می‌یابد که دو سطح (چهارگوش و دو سه گوش) باهم برابرند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین یک فعالیت برای ابقای سطح، طراحی کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "ج - ابقای حجم: کودکان باید درک کنند که اگر دو حجم باهم برابرند، با تغییر شکل آن‌ها، اندازه‌ی آن‌ها، تغییر نمی‌کند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ سه لیوان با اندازه‌های بلند و باریک، پهن و کوتاه و متوسط را جلوی کودکان می‌گذاریم. از یک پارچ آب، با یک پیمانه، به اندازه‌ی مساوی در این سه لیوان آب می‌ریزیم. آن‌گاه از کودکان می‌پرسیم، آب کدام یک از لیوان‌ها بیش‌تر است. معمولاً اکثر کودکان، لیوان بلند و باریک را انتخاب می‌کنند. کودکان، با تکرار آزمایش و ریختن آب از پیمانه در لیوان‌ها و با توجه به سؤالاتی که از آنان می‌شود، پس از مدتی به این نتیجه می‌رسند که آب هرسه لیوان، یکسان است."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین یک فعالیت برای ابقای حجم، طراحی کنید. می‌توانید بازی با خمیر را انتخاب کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "د ـ ابقای عدد: کودکان، مفهوم عدد را وقتی به خوبی درک می‌کنند که ابقای عدد در ذهن آن‌ها شکل گرفته باشد. یعنی اگر چند مجموعه‌ی عدد به آن‌ها داده می‌شود، با تغییر شکل مجموعه‌ها، درک کنند که تعداد اعداد، تغییر نکرده است."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ سه مجموعه‌ای از اعداد به اشکال زیر به کودکان می‌دهیم و از آنان می‌خواهیم بگویند کدام یک از مجموعه‌ها، بیشتر است. معمولاً در نگاه اول، بیشتر کودکان، مجموعه‌ی بزرگ‌تر را انتخاب می‌کنند اما وقتی از آن‌ها می‌خواهیم بگویند چرا بزرگ‌تر است؟ تعداد نقطه‌های آن‌ها چندتاست؟ و ... با چند بار شمردن تعداد مجموعه‌ها، می‌گویند هر سه مجموعه، برابر است."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین برای ابقای عدد، یک فعالیت برای کودکان طراحی کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "در انجام فعالیت‌های مربوط به ابقا، رعایت نکات زیر ضروری است: ـ این فعالیت‌ها با کودکان آمادگی (۶ـ۵ ساله) اجرا می‌شود. ـ در اجرای فعالیت‌ها به کودکان فرصت کافی داده می‌شود که فعالیت را خود تکرار کنند تا به نتیجه برسند. ـ در هر فعالیت سؤالات مناسبی با کودکان مطرح می‌شود تا با دادن پاسخ به آن‌ها به حل مسئله نزدیک شوند. ـ هرگز پاسخ سؤالات را به کودکان نمی‌گوییم و به آنان فرصت می‌دهیم خود به حل مسئله دست یابند تا لذت آن را احساس کنند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "کودکان از طریق کشف و شهود به حل مسئله می‌پردازند. بنابراین، باید فعالیت‌هایی را انتخاب کنیم که برای کودکان امکان مشاهده، تجربه، عمل و دست‌ورزی را فراهم سازد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "یادگیری اعداد یادگیری و درک مفاهیم کمّی مانند اعداد، بعد از شناخت روابط کیفی در کودکان حاصل می‌شود. شمارش واقعی اعداد و درک مفهوم آن‌ها، وقتی صورت می‌گیرد که کودکان، روابط کیفی، یعنی مفهوم طبقه‌بندی، مقابله‌ی یک به یک، ترتیب، مجموعه و ابقا را آموخته باشند. شمارش اعداد و گفتن اسامی آن‌ها که در سال‌های اولیه‌ی کودکی به سبب تکرار و تقلید صورت می‌گیرد، شمارش واقعی و درک مفهوم اعداد به حساب نمی‌آید. برای یادگیری شمارش اعداد از شعر، تصاویر، اشیا و وسایل گوناگون می‌توان استفاده کرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ شمارش اعداد: مقداری حبوبات (نخود و لوبیا) به کودکان می‌دهیم و از آنان می‌خواهیم آن‌ها را بشمارند. سپس با آنان در مورد فعالیتی که انجام می‌دهند، گفت و گو می‌کنیم. این فعالیت را می‌توان با کارت‌های رنگی نیز اجرا کرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین یک فعالیت برای شمارش اعداد، طراحی کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۲ یادگیری شکل اعداد: برای آموزش شکل اعداد به کودکان می‌توان از لوتوی اعداد استفاده کرد. روی یک صفحه، اعداد از ۱ تا ۹ را می‌نویسیم. روی ۹ کارت کوچک، به تعداد هر عدد، نقطه می‌گذاریم. کارت‌ها را به کودکان می‌دهیم تا هر کارت را روی عدد مربوط قرار دهند. سپس، در مورد فعالیتی که انجام داده‌اند با آنها گفت و گو می‌کنیم."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین با استفاده از تصاویر مناسب یک لوتوی اعداد درست کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۳ نوشتن اعداد: کودکان پس از درک مفهوم اعداد و شناخت شکل آن‌ها می‌توانند نوشتن اعداد را نیز بیاموزند. برای نوشتن اعداد، طرز نوشتن درست آن را باید به کودکان آموخت (شکل ۲۳ـ۹)."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "_________________________________________________ ۱ـ لوتو، یک بازی فکری است که می‌توان از آن برای آموزش مفاهیم گوناگون مانند رنگ، شکل، اعداد و... استفاده کرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "در مورد کودکانی که در نوشتن اعداد مشکل دارند، می‌توانید ابتدا اعداد را نقطه‌گذاری کنید تا کودک آن را کامل کند. این فعالیت برای کودکان کلاس آمادگی مناسب است."}, {"section": "شناخت اشکال", "text": "اشکال بخشی از ریاضیات است که به نام هندسه در سال‌های ابتدایی به کودکان آموزش داده می‌شود. دو نوع هندسه وجود دارد: ۱ـ هندسه‌ی اقلیدسی: این هندسه شامل شکل‌های منظم مانند دایره، سه‌گوش، چهارگوش و ... است. این اشکال تغییر نمی‌کنند و از نظر اضلاع، زوایا و خطوط، ثابت‌اند. ۲ـ هندسه توپولوژیک: در این هندسه، اشکال ثابت نیستند و صورت‌های مختلفی به خود می‌گیرند به همین دلیل به آن هندسه‌ی لاستیکی هم می‌گویند. این اشکال به صورت منحنی‌های باز یا بسته‌اند."}, {"section": "شناخت اشکال", "text": "تحقیقات پیاژه نشان داده است که کودکان ابتدا هندسه‌ی توپولوژیک را درک می‌کنند. آنان بین منحنی‌های باز و بسته، تفاوت قائل می‌شوند اما شکل‌های اقلیدسی مانند سه‌گوش و چهارگوش برای آن‌ها تاحدی یکسان است. به عنوان مثال اگر از کودک چهارساله بخواهیم یک سه‌گوش یا چهارگوش بکشد، ممکن است یک دایره بکشد، زیرا برای او تمام اشکال اقلیدسی، تقریباً یکسان است. در مورد شناخت حجم و سطح، بررسی‌های پیاژه نشان داده است که کودکان ابتدا حجم را درک می‌کنند زیرا می‌توانند آن را لمس کنند و سپس، سطح را می‌شناسند. بنابراین، ابتدا باید کودکان را با حجم آشنا ساخت، مانند توپ، مکعب و ... سپس سطح را به آنان آموزش داد."}, {"section": "شناخت اشکال", "text": "● فعالیت ۱ استفاده از جعبه‌ی اشکال: جعبه‌ی اشکال را در اختیار کودک قرار می‌دهیم و به او فرصت می‌دهیم تا از طریق مشاهده، مقایسه، آزمایش و خطا اشکال را در جای خود قرار دهد، آن‌ها را لمس کند، تفاوت آن‌ها را درک کند و با نام آن‌ها آشنا شود."}, {"section": "شناخت اشکال", "text": "● فعالیت ۲ استفاده از لامسه برای تشخیص اشکال: در این فعالیت، تعدادی از اشیای آشنا، مانند شانه، پاک‌کن، تراش، اشکال هندسی پلاستیکی، توپ تخم‌مرغی و ... را در داخل یک کیسه می‌ریزیم کودک باید با لمس اشیای درون کیسه، نام آن‌ها را بگوید."}, {"section": "شناخت اشکال", "text": "● فعالیت ۳ شکل‌های دایره، سه‌گوش، چهارگوش را روی مقوا یا فوم می‌بریم. آن‌ها را روی زمین قرار می‌دهیم. از کودکان می‌خواهیم نام هر شکلی را که گفتیم، روی آن شکل بایستد."}, {"section": "شناخت اشکال", "text": "تمرین برای آشنایی کودکان با حجم و اشکال، یک فعالیت طراحی کنید."}, {"section": "شناخت اشکال", "text": "خود را بیازمایید ۱ـ ریاضی را تعریف کنید. ۲ـ چرا آموزش مفاهیم ریاضی به کودکان پیش‌دبستانی ضرورت دارد؟ ۳ـ دانش منطقی ـ ریاضی را تعریف کنید. ۴ـ مفهوم «پایداری شیئی» را از نظر پیاژه، توضیح دهید. ۵ـ چرا آشنایی با رشد شناختی کودکان در آموزش مفاهیم ریاضی به آنان ضرورت دارد؟ ۶ـ مفهوم پیوستگی فرایند یادگیری در ریاضی را توضیح دهید. ۷ـ روش فعال در آموزش مفاهیم ریاضی را تعریف کنید. ۸ـ چرا بازی، روش مناسبی در آموزش مفاهیم ریاضی به کودکان است؟ ۹ـ مفاهیم مربوط به اندازه را فهرست کنید. ۱۰ـ مفاهیم مکانی (فضایی) را فهرست کنید. ۱۱ـ چرا آموزش مفاهیم زمانی به کودکان پیش‌دبستانی دشوار است؟ ۱۲ـ طبقه‌بندی را تعریف کنید و تفاوت آن را با ترتیب، توضیح دهید. ۱۳ـ مقابله‌ی یک به یک را با ذکر یک مثال توضیح دهید. ۱۴ـ مجموعه را با ذکر یک مثال تعریف کنید. ۱۵ـ ابقا یا نگهداری ذهنی را تعریف کنید و انواع آن را نام ببرید. ۱۶ـ چرا درک روابط کیفی مقدم به درک روابط کمی در کودکان است؟ ۱۷ـ هندسه‌ی توپولوژیک را، با ذکر یک نمونه، تعریف کنید. ۱۸ـ ابقای عدد را تعریف کنید و نقش آن را در درک مفهوم عدد توضیح دهید. ۱۹ـ چرا آشنایی با احجام، مقدم بر آشنایی با اشکال است؟ ۲۰ـ آموزش مفهوم ابقا را در چه سنی به کودکان شروع می‌کنیم؟"}, {"section": "کتاب‌نامه", "text": "۱ـ مقدمه‌ای برای آموزش مفاهیم ریاضی ـ انتشارات کارگاه کودک ـ مؤسسه پژوهشی کودکان دنیا، شهره یوسفی، اکرم امینایی، سال ۱۳۸۵ ۲ـ کرمی که اعداد را می‌دانست ـ راجر هارگریوز ـ علی دانش ـ انتشارات قدیانی ـ ۱۳۶۸ ۳ـ چگونه استعداد ریاضی کودکان خود را پرورش دهیم، فرانسس موزلی، سوزان مردیت ـ ترجمه‌ی مصطفی کریمی، انتشارات خجسته، ۱۳۸۰ ۴ـ بازی‌های هدف‌دار ریاضی، محمدتقی مبینی، انتشارات آستان قدس، سال ۱۳۷۵ (چاپ سوم) ۵ـ آموزش ریاضیات قبل از دبستان، محمدتقی مبینی، انتشارات آستان قدس سال ۱۳۸۰ ۶ـ فعالیت‌های تشخیصی و یادگیری در ریاضیات برای کودکان، ریچارد کوپلند، ترجمه مصطفی کریمی، انتشارات آموزش، (چاپ جدید) ۷ـ بازی کنیم و بیاموزیم، ملانی رایس، لیلی انگجی، عادل یغما، انتشارات مدرسه ۱۳۷۰ ۸ـ راز شکل‌ها، ملانی، پل راجرز، محمدحسن فکری، نشر زلال، ۱۳۶۹"}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "هدف‌های رفتاری: در پایان این فصل، دانش‌آموز باید بتواند: • تعریفی از فرایند اجتماعی ارائه کند و برای هر یک سه مثال ذکر کند. • هدف از آموزش مفاهیم اجتماعی را توضیح دهد. • جنبه‌های مختلف یادگیری هر نقش اجتماعی را به همراه مثالی شرح دهد. • کاربردهایی را، که از شناخت تحولات رشد اجتماعی کودکان می‌توان نتیجه گرفت، بیان کند. • مهارت‌های اجتماعی مورد نیاز کودکان را با ذکر مثال تشریح کند. • روش‌های آموزش مهارت‌های اجتماعی را با ذکر مثال توضیح دهد. • نمونه‌هایی از فعالیت‌های مربوط به هر روش را اجرا کند."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "فرایند اجتماعی شدن اجتماعی شدن جریانی است که در آن هنجارها، مهارت‌ها، انگیزه و طرز تلقی و رفتار فرد شکل می‌گیرد، تا ایفای نقش کنونی یا آتی او در جامعه‌ی مطلوب و مناسب شناخته شود. اجتماعی شدن یک ارتباط دوجانبه است بین فرد و جامعه. کودک در حال رشد، جهان اطراف خود را به صور گوناگون تجربه و تفسیر می‌کند. بنابراین، علاوه بر توجه به جریان رشد کودک، باید به ارزش‌هایی که توسط جامعه و گروه‌های اجتماعی انتقال می‌یابد نیز توجه کرد."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "بیندیشید: درباره‌ی چند مفهوم اجتماعی (دانشی، رفتاری و ارزشی) بیندیشید و با یکدیگر بحث کنید. سپس برای هر کدام مثالی بیاورید و نتیجه را به کلاس گزارش کنید."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "متغیرهای اجتماعی شدن را می‌توان در چهار بعد مورد بررسی قرار داد: ۱ـ متغیرهای مربوط به تفاوت‌های فردی، سن، جنس، شخصیت و هوش ۲ـ متغیرهای مربوط به منابع انتقال ارزش‌ها که دربرگیرنده‌ی فرهنگ، ملیت، خانواده و وسایل ارتباط جمعی (روزنامه‌ها، مجلات، تلویزیون، ادبیات و...) است. ۳ـ متغیرهای مربوط به روش‌های انتقال ارزش‌ها، مانند مراسم مذهبی، هویت نظام‌ها و تجارب ناشی از چگونگی فرزندپروری ۴ـ متغیرهای مربوط به الگوها و ارزش‌های رفتاری (نقش جنسی، پرخاشگری، اخلاقیات، دوستی‌ها و...) بنابراین، انسان باید در سراسر زندگی، وظایف مربوط به نقش‌ها را، جهت کسب توانایی ارتباط متقابل با دیگران، به طریقی خاص که در عرف جامعه قابل قبول و ارزشمند است و در عین حال برای خودش نیز سودمند باشد، فراگیرد. آموزش مفاهیم اجتماعی به کودکان، با هدف اجتماعی کردن یا جامعه‌پذیری آن‌ها صورت می‌گیرد. مقصود از جامعه‌پذیری، پذیرش اعتقادات، باورها، هنجارها و ارزش‌های مورد قبول جامعه، کسب توانایی در تطبیق و سازگاری با این هنجارها و یا تغییرات مطلوب در آن‌هاست. از این‌رو، دست‌اندرکاران جامعه‌پذیری، اعم از خانواده، مدرسه، گروه هم‌سالان، مسجد، رسانه‌ها و... به‌صورت‌های گوناگون، شخص را برای ایفای نقش‌های اجتماعی در حال و آینده، آماده می‌کنند. یادگیری هر نقش دارای دو جنبه است: جنبه‌ی اول، یادگیری وظایف مربوط به هر نقش و حقوق مربوط به آن است. در این بعد، شخص یاد می‌گیرد که فرضاً به‌عنوان عضوی از یک خانواده، یک شهروند، یک معلم و یا یک مسلمان، دارای چه وظایف و حقوقی است و این که چگونه باید به وظایف خود عمل کند. جنبه‌ی دوم، یادگیری احساسات، عواطف، نگرش‌ها و ارزش‌های مربوط به هر نقش است. در این بعد، اشخاص یاد می‌گیرند که در هر یک از نقش‌های جامعه با کدام منش، احساسات و برخورد با مخاطبان خود، روبه‌رو شوند."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "بحث کنید تصور کنید که در مقام مربی کودک، می‌خواهید در یک کودکستان یا آمادگی ایفای نقش کنید. درباره‌ی وظایف مربوط به این نقش و جنبه‌ی احساسات، عواطف، نگرش‌ها و ارزش‌های مربوط به این نقش بحث کنید و نتیجه را به کلاس گزارش دهید."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "نکاتی که والدین و مربیان باید بدانند: تحولات مربوط به رشد اجتماعی در کودکان پیش‌دبستانی رفتار اجتماعی کودکان دارای الگو و شکل خاصی است. این رفتار ضمن آن که متأثر از خصوصیات فردی است از محیط اجتماعی نیز تأثیر می‌پذیرد. این محیط شامل خانواده، هم‌سالان، همسایگان و رسانه‌ها (به‌ویژه تلویزیون) است. کودکان در مراحل رشد خود و در هر مرحله‌ی سنی، رفتارهای خاصی را از خود بروز می‌دهند که برخی غیر‌اجتماعی و برخی اجتماعی‌اند."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "آگاهی از این مراحل می‌تواند به والدین و مربیان کمک کند تا با کودکان در هر مرحله به طریق مناسبی برخورد کنند و انتظارات خود را با توانایی‌های او تطبیق دهند. هم‌چنین بروز این رفتارها را در کودکان باید امری طبیعی تلقی کرد. بروز رفتارهای غیراجتماعی، فرصتی برای والدین و مربیان فراهم می‌کند تا از این طریق به کودکان آموزش دهند و زمینه‌ی رشد اجتماعی آن‌ها را فراهم کنند."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "برای آگاهی از نمونه‌های این رفتارها می‌توانید به جدول رشد کودکان در فصل اول کتاب رجوع کنید. با مشاهده‌ی رفتار کودکان با توجه به جدول رشد کودکان، شایسته است که والدین و مربیان در تربیت اجتماعی آنان، به نکات زیر توجه کنند: ۱ـ کودکان در فرآیند رشد اجتماعی خود پیوسته تغییراتی را پشت‌سر می‌گذرانند. با توجه به این تغییرات، بروز رفتارهای غیراجتماعی در کودک فرصت‌هایی را در اختیار والدین و مربیان می‌گذارد تا از طریق تعامل حساب شده با کودک، زمینه‌ی رشد اجتماعی او را فراهم کنند. ۲ـ هماهنگی والدین با یکدیگر و با مربیان در مورد نحوه‌ی برخورد با کودک در رشد اجتماعی او نقش مؤثری دارد. ۳ـ انتظارات والدین و مربیان از کودکان باید در حد توانایی آن‌ها باشد، اما هیچ‌گاه از آموزش کودکان نباید غفلت کرد. ۴ـ کودکان از رفتار ما بیشتر از گفتار ما می‌آموزند. بنابراین، سعی کنیم الگوی شایسته‌ای برای آنان باشیم. ۵ـ آموزش مهارت‌های اجتماعی مانند هر رفتار دیگری بهتر است از دوران کودکی شروع شود، زیرا یادگیری در این سال‌ها عمیق‌تر، آسان‌تر و سریع‌تر صورت می‌گیرد. ۶ـ کودکان از نظر رشد اجتماعی مانند سایر جنبه‌های رشد، با یکدیگر متفاوت‌اند و باید این تفاوت‌ها را در نظر گرفت."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "تمرین با توجه به جدول رشد اجتماعی کودکان، چند کودک پیش‌دبستانی را با آن مقایسه کنید و نظر خود را در کلاس بیان نمایید."}, {"section": "نقش و اهمیت آموزش مفاهیم اج بپردازد. داشتن برخورد خوب با دیگران، پیروی از دستورات، همانندسازی با قهرمانان کتاب، احترام به بزرگ‌ترها، همکاری با هم‌سالان، سلام به هنگام ورود و خداحافظی به هنگام جدا شدن، استفاده از کلمات مؤدبانه، گوش دادن به سخنان دیگران، شرکت در بازی‌های گروهی، رعایت نوبت در سخن گفتن و بازی، قطع نکردن صحبت دیگران، فروخوردن احساس خشم به هنگام آزار دیدن، احترام به دیگران، رعایت حقوق خود و دیگران، اجازه گرفتن برای استفاده از اشیای دیگران و ... نمونه‌هایی از این نوع مهارت‌هاست."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "ج ـ مهارت‌های مربوط به شناخت محیط: یکی از اهداف اساسی آموزش و پرورش کمک به فرد در ایجاد ارتباط با محیط است. لازمه‌ی این امر دسترسی به یک سری اطلاعات درباره جهان است. کودک، محیط اطراف خود را درک می‌کند و از آن‌جا که در سنین پایین بیش از هر زمان دیگری قابلیت پذیرش آموختنی‌های مفید را دارد باید به طور مداوم همگام با دیگر آموختنی‌ها، طی برنامه‌های آموزشی مناسب علاقه‌مندی کودکان را نسبت به احترام به مسائل محیطی و آموزش برای بقا را افزایش داد."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "بنابراین، برای شناخت محیط زندگی، کودک علاوه بر آموزش مهارت‌هایی چون، دانستن نشانی خانه‌ی مسکونی، محیط اطراف خانه و مراکز پیش از دبستان یا مهدکودک، مشاغل مهم در محیط اطراف، شغل والدین، نحوه‌ی رفت و آمد، آشنایی با مقررات راهنمایی و رانندگی، باید نسبت به پاکیزگی محیط زیست، آلوده نکردن آب و هوا، جلوگیری از انهدام گیاهان و درختان، صرفه‌جویی در مصرف انرژی و سوخت، شناخت سرزمین ایران، پرچم، نکات ایمنی در حوادث غیرمترقبه ... آگاه شود."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "تمرین فهرستی از مهارت‌های اجتماعی مربوط به شناخت محیط، شناخت خود و مهارت‌های میان فردی تهیه کنید و در کلاس ارائه دهید."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "شیوه‌های آموزش مهارت‌های اجتماعی آموزش مهارت‌های اجتماعی از موضوعات مهم در تعلیم و تربیت است و همان‌گونه که اشاره شد، غالباً بر محور نحوه‌ی ارتباط متقابل میان کودک و هم‌سالان او با بزرگ‌سال قرار دارد و هدف اولیه آن است که اهداف کودک و بزرگ‌سال از طریق روابط متقابل مثبت حاصل آید."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "ایجاد یک رفتار و یا تغییر در رفتار را می‌توان به طریق مختلف ایجاد کرد، اما استفاده از روش‌ها و فعالیت‌ها به موضوع آموزش، شرایط مخاطب از نظر تحولات مربوط به رشد و توانایی فردی بستگی دارد."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "از جمله روش‌ها و فعالیت‌هایی که مربیان می‌توانند در آموزش مهارت‌های اجتماعی به کار گیرند عبارت‌اند از:"}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "۱ـ روش الگوبرداری: ایجاد الگویی از رفتار اجتماعی که موجب شود فرد دیگری آن رفتار را از طریق مشاهده و تقلید فراگیرد «الگوسازی اجتماعی» نام دارد. کودک، رفتار شخص دیگری را مشاهده می‌کند. سپس با اجرای مشابه در موقعیتی مشابه تقلید آن رفتار را به نمایش درمی‌آورد. الف: مشاهده‌ی رفتار هم‌سالان و بزرگ‌ترها ب: تأثیرپذیری از شنیده‌های دیگران (هم‌سالان، مربی و خانواده) کودکان از طریق تقلید یا همانندسازی خود با دیگران (والدین و هم‌سالان و...) اقدام می‌کنند از نظر روان‌شناس معروف بندورا کودکان به شدت تحت تأثیر مشاهدات و شنیده‌ها قرار دارند. والدین پرخاشگر به فرزند خود درس پرخاشگری می‌آموزند. چنان‌چه والدین آرام باشند، کودکان خود را به آرامش تشویق می‌کنند و اگر مسئول باشند، مسئولیت را در کودکان بهینه می‌کنند. هرگاه والدین متدین باشند، به فرزندان خود درس دین‌داری یاد می‌دهند. هم‌سالان نیز در آموزش مهارت اجتماعی الگوی مناسب‌اند. کودکانی که عملکرد ضعیفی دارند و نمی‌توانند از روش‌های دیگری چون ایفای نقش و الگوسازی بهره گیرند می‌توانند از هم‌سالان بسیار بیاموزند. معمولاً هم‌سالانی الگو قرار می‌گیرند که مورد احترام کودک دیگر باشند و از نظر سن، جنس و موقعیت اقتصادی، اجتماعی وضعیت مشابهی داشته باشند و در رفتار اجتماعی آموزش دیده و مهارت نشان داده باشند. مثال: الفـ برای افزایش تعاملات اجتماعی بین کودک و دیگران، تشویق او به ادای سلام در مواقع مختلف مناسب است. ـ به دوستان و آشنایانی که به خانه‌ی شما می‌آیند سلام کنید و کودک را تشویق کنید که او هم این عمل را تکرار کند. ـ از تلفن اسباب‌بازی و واقعی استفاده کنید تا کودک عبارت «سلام حال شما چطور است» را بگوید. ـ در بیرون از منزل وقتی از مغازه‌ای خرید می‌کنید به فروشنده سلام کنید. استفاده از الگوهای زنده، که از انعطاف‌پذیری بالایی برخوردار است. به کودک فرصت می‌دهد تجربه‌ی آموزشی پرباری را به دست آورد. مثال: بـ کتاب‌ها و قصه‌هایی با شخصیت‌های واقعی و قابل قبول، از جمله موادی هستند که برای آموزش مهارت اجتماعی می‌توانند مفید باشند. قصه‌ها نه تنها در ایجاد اصول منطقی و الگو برای مهارت اجتماعی مناسب‌اند، بلکه به آن‌ها فرصت می‌دهد که گوش دادن را بیاموزند و با تجارب دیگران آشنا شوند. با انتخاب قصه‌هایی از سرزمین ایران به کودکان فرصت دهید تا ضمن کسب مهارت‌های اجتماعی با بزرگان و قهرمانان ایران آشنا شود و از آن‌ها الگو گیرد. ـ کتاب‌های ساده با شخصیت‌های ملموس را انتخاب کنید و در ساعات آرام روز برای آن‌ها بخوانید. ـ پس از پایان داستان با او در مورد آن بحث و گفت‌وگو کنید. ـ از او بخواهید قصه را پیش‌بینی کند. و یا با نگاه کردن به تصویر و با استفاده از کلمات مناسب احساس قهرمان را بیان و یا تقلید کند. استفاده از عروسک‌ها، گفت‌وگو با عروسک‌ها و ایفای نقش توسط آن‌ها، به منظور طرح مسئله و ارائه‌ی الگویی برای رفتار می‌تواند یکی دیگر از ابزار آموزش مهارت اجتماعی باشد. این عروسک‌ها که معمولاً به شکل شخصیت‌های محبوب کودکان‌اند، گاهی می‌تواند توسط کودکان نیز ساخته شود. عروسک‌ها وسیله‌ی مناسبی است که کودک، علاوه بر لذت بردن از آن، می‌تواند به عنوان وسیله‌ای برای ابراز احساسات مثبت و منفی خود به کار گیرد."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "۲ـ روش مربی‌گری: روش دیگر آموزش رفتار به کودک روش «مربی‌گری» است. این روش برخلاف الگو که از رفتار تقلید می‌شود به شکل راهنمایی کلامی به‌طور پیاپی و طی جلساتی صورت می‌گیرد و از طریق آن کودک می‌تواند به کودکان دیگر نزدیک شود و با آن‌ها ارتباط پیدا کند و دوستانی بیابد. بسیار دیده شده که کودکان پیش از دبستانی نقش عمده‌ای در منزوی کردن خویش دارند و در حالی که شاید تواناتر از دیگران باشند کمتر در بازی‌ها شرکت می‌کنند. در اینجا مربیان باید به اختصاص دادن وقت بیشتر به آن‌ها و طرح سؤال و تشویق آن‌ها به پاسخ و تکرار آن، به‌عنوان هم‌بازی آن‌ها را در بازی‌ها شرکت دهند. ـ فعالیت‌هایی را ترتیب دهید که در آن گروه‌های کوچکی از کودکان و آن کودک خاص، در آن شرکت کنند. ـ کودک را به سلام گفتن تشویق کنید. ـ درباره‌ی افرادی که در گروه هستند با او صحبت کنید، نام آن‌ها را بپرسید و کودک را به صحبت با آنان تشویق کنید. ـ کودکان هم‌سن و سال را دور هم جمع کنید و به تعداد کافی اسباب‌بازی‌های بی‌خطر (حیوانات پارچه‌ای، ماشین‌های کوچک، مکعب‌های ساختمان‌سازی) در اختیارشان قرار دهید و به آن‌ها فرصت باهم بودن بدهید. در طول بازی با آن‌ها صحبت کنید و آن‌ها را تشویق کنید که با یکدیگر تبادل کلامی داشته باشند."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "کودکان از این طریق مهارت‌های اساسی همکاری را، که پایه‌ی تعامل‌های اجتماعی آینده‌ی اوست، یاد می‌گیرند. ۳ـ فراهم کردن فرصت برای سخن‌گویی کودکان: قبل از این که کودک به کودکستان و یا آمادگی برود، توانایی آرام نشستن و توجه به فعالیت‌های گروه برای او ضرورت دارد. توجه به افراد گروه، او را برای یادگیری و توانایی گوش دادن به صحبت دیگران و نهایتاً صحبت کردن با آن‌ها آماده می‌سازد. سخن‌گویی در برابر جمع روش مناسبی برای اجتماعی شدن است کودکانی که به راحتی با کودکان دیگر ارتباط کلامی برقرار می‌کنند، از تماس‌های اجتماعی بهتری برخوردار می‌شوند و آمادگی بیشتری برای پذیرش اجتماعی دارند از طریق دیگر کودک را تدریج احساسات خود را می‌شناسد و شیوه‌ی مناسب بیان آن را یاد می‌گیرد. پس باید از راه‌های گوناگون این فرصت را در اختیار او قرار داد. ـ از کودکان بخواهید در مورد آنچه دوست دارند صحبت کنند و چرایی را شرح دهند (مثلاً عروسکشان) ـ از بچه‌ها بخواهید به جای پاسخ‌های بله و خیر، با جملات بلند احساسات خود را بگویند. ـ آن‌ها را تشویق کنید که جلوی بزرگ‌ترها صحبت کنند. با نگاه و لبخند آن‌ها را تشویق کنید. ـ از آن‌ها بخواهید قصه‌ای را که شنیده‌اند و یا در مورد فیلمی که دیده‌اند، صحبت کنند. ۴ـ روش خودآموزی: روش خودآموزی به این‌گونه است که کودک در مورد یک مسئله و علت بروز آن (مثل یک اختلاف کودکانه بین بچه‌ها) بیندیشد و سپس نتیجه‌گیری کند. آن‌گاه با راهنمایی معلم و از طریق حل مسئله در حضور دیگران اندیشه‌های خود را بیان کند و رفتار خود را بر اساس آن تغییر دهد. ـ کتابی را تا اوج داستان بخوانید و از کودکان بخواهید راهکارهایی برای قهرمان پیش‌بینی کنند. ـ از کودکان بخواهید، خود را جای قهرمان داستان قرار دهند و بیان کنند چگونه مسئله را حل می‌کنند. ـ در یک بازی گروهی علی نوبت را رعایت نمی‌کند. بچه‌ها او را کنار می‌گذارند و او تنها می‌ماند. مربی از او می‌پرسد چرا بازی نمی‌کنی؟ علی می‌گوید: من دوست دارم بازی کنم اما باید صبر کنم تا نوبتم بشود و حوصله‌ام سر می‌رود. (بیان مسئله) مربی می‌گوید: به‌نظر تو چرا بچه‌های دیگر ندارند با تو بازی کنند؟ چه کار باید کرد تا همه بتوانند بازی کنند؟ (بازیابی و تجزیه و تحلیل اطلاعات)"}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "علی می‌گوید: به نظر من تنها راه، بازی کردن با نوبت است که بهتر از تنها ماندن است (نتیجه‌گیری). کشف قاعده: در بازی‌های گروهی رعایت نوبت لازم است. در آموزش خودآموزی دو هدف اساسی مطرح می‌شود ۱ـ کودک بتواند قبل از اجرای نوعی رفتار نامناسب، از اجرای آن خودداری کند ۲ـ کودک بتواند رفتار خود را از راه «گفت‌وگوی درون» هدایت کند."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "۵ـ روش قضاوت و داوری: در این روش سعی بر این است که کودک بتواند انواع واکنش‌های احتمالی یک موقعیت را، که برخی انطباق‌پذیرترند و یا حتی اتفاق افتاده‌اند، تشخیص دهد. وقتی دو کودک به هر دلیلی با یکدیگر اختلاف دارند، از طریق تشکیل یک دادگاه کودکانه به آن‌ها فرصت دهید از خود دفاع کنند. کودکان بزرگ‌تر به عنوان داوران قضاوت خواهند کرد و در نهایت به هر یک از کودکان تذکرات اخلاقی و رفتاری لازم داده خواهد شد. ـ واقعه‌ای رخ داده است. کودکان را به تفکر وادارید احساس را تشخیص بدهید و واکنش‌ها را بررسی نمایید و در نهایت قضاوت کنید. ـ از کودکان بخواهید به عنوان پلیس یا شهردار کودکستان خود، راهکارهایی را ارائه دهند. ـ از این فعالیت به عنوان بازی‌های نمایشی نیز می‌توانید استفاده کنید."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "۶ـ روش تقویت رفتار: اگر کودک بتواند موقعیت برقراری ارتباط را بهتر بشناسد، در افزایش درک اجتماعی او مؤثر است. بنابراین، نارسایی‌های ادراک اجتماعی نشانه ناتوانی در تغییر دقیق و تلفیق علائم و نماد‌های مختلف محیط تلقی می‌شوند. به طور مثال چنان‌چه کودکی نتواند تشخیص دهد در موقعیتی خاص باید یک سری رفتارهای خاص را رعایت کند، طبیعتاً پاسخ مناسب نمی‌دهد. بنابراین، باید برای رشد ادراک اجتماعی به ارتباط غیرکلامی، علائم محیطی و ... توجه کرد. حالات چهره، حرکت اعضای بدن، علائم صوتی، بلندی و کوتاهی صدا، پوشش، فرم لباس‌ها همه می‌توانند به نوعی جنبه‌های اجتماعی را نشان دهند. با توجه به مطالب فوق، تکرار و تقویت می‌تواند در شناخت و یا ثبت یک رفتار کمک کند. ـ عکس‌هایی از چهره‌های مختلف (از کتاب یا مجلات) را جمع‌آوری کنید و از کودکان بپرسید که سبب شاد یا غمگین یا خندان بودن آن‌ها چیست؟ ـ چندین دایره رسم کنید و از کودکان بخواهید با کشیدن چشم چشم دو ابرو، حالت‌های مختلف صورت و تصاویر احساسی گوناگونی را به نمایش بگذارند. ـ روی کارت‌هایی احساس‌های گوناگون را بنویسید، کودکان یکی از کارت‌ها را برمی‌دارند شما کلمه را می‌خوانید و آن‌ها احساس را نمایش می‌دهند. معمولاً برای تقویت رفتار از نشانه‌های تشویقی مانند لبخندزدن، کف زدن، بیان کلمات تحسین‌آمیز و در بعضی موارد از پاداش‌های مادی، مانند خرید کتاب، اسباب‌بازی یا برچسب‌های نمایشی استفاده می‌شود."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "۷ـ روش نمایش و قصه‌گویی: قصه و نمایش از دیگر ابزارهای مؤثر برای آموزش مهارت‌های اجتماعی‌اند. قصه‌ها گاهی بر رفتار پسندیده یا ناپسند افراد برتری کامل دارند، زیرا افکار درونی، اعتقادات و انگیزه‌های قهرمانان را منعکس می‌سازند. قصه‌هایی را انتخاب کنید که در سطح دانش کودک باشد و بر نیاز خاصی تأکید می‌کند. برای بچه‌ای که دوست ندارد اسباب‌بازی‌اش را به کسی بدهد، کتاب یا قصه‌ای حول همین مسئله پیش‌بینی شود. نگرشی واقع‌گرایانه داشته و شخصیت‌ها برای کودک ملموس باشد. بعد از خواندن کتاب و یا گفتن قصه، از کودکان بخواهید آن نقش را وانمود کنند. ایفای نقش به کودک کمک می‌کند، علاوه"}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "بر شناخت خود و کاهش خودمحوری، به درک و شناخت دیگران نیز توجه کند. در واقع با افزایش توانایی‌های کودک نسبت به دیدگاه دیگران ادراک اجتماعی‌اش نیز افزایش می‌یابد."}, {"section": "نقش و اهمیت آموزش مفاهیم اجتماعی در دوران پیش از دبستان", "text": "در پایان سال‌های کود /* ==========================================================================
   NORMALIZATION & TOKENIZATION
   ========================================================================== */
const PERSIAN_DIGITS = "۰۱۲۳۴۵۶۷۸۹";
const ARABIC_DIGITS  = "٠١٢٣٤٥٦٧٨٩";

function normalize(s) {
  if (!s) return "";
  let out = s
    .replace(/[يى]/g, "ی")
    .replace(/ك/g, "ک")
    .replace(/ة/g, "ه")
    .replace(/[ًٌٍَُِّْـ]/g, "")   // harakat + tatweel
    .replace(/\u200c/g, " ")       // ZWNJ -> space
    .replace(/[«»"'`(){}\[\]<>،؛؟?!.,:;/\\|~@#$%^&*_+=\-]/g, " ")
    .toLowerCase();
  // normalize digits
  out = out.replace(/[۰-۹]/g, d => String(PERSIAN_DIGITS.indexOf(d)));
  out = out.replace(/[٠-٩]/g, d => String(ARABIC_DIGITS.indexOf(d)));
  out = out.replace(/\s+/g, " ").trim();
  return out;
}

const STOPWORDS = new Set((
  "و در به از را که این آن با برای بر تا یا هم نیز است هست بود شد شده می را های یک دو سه چهار پنج ولی اما اگر چون چرا چه چون هر همه بعضی هیچ خود خودم خودت خودش خودمان خودشان بنابراین پس دیگر دیگری دیگرش دیگران بی بلکه لذا فقط تنها یعنی مثل مانند حتی زیرا زیرآنکه چنانچه چنانکه چنانچه‌ای کنم کنید کند کنیم کنند می‌کند می‌کنند می‌کنیم می‌کنید کرده کردن کردم کردی کرد کردیم کردید کردند شود شوند بشود باشد باشند باشم باشی باشیم باشید هستند هستیم هستید داشت داشته داشتن دارد دارند داری داشتم داشتی داشتیم داشتید داشتند خواهد خواهند خواهم خواهی خواهیم خواهید بعد قبل روی زیر بالا پایین کنار وسط دور نزدیک بین اکنون سپس آنگاه آنجا اینجا آنکه اینکه چیز کسی کسانی درباره طبق بدون گاه گاهی همچنین همان همین همچون طور اینطور آنطور مثلا حدود حد باید نباید مورد موارد نوع"
).split(/\s+/));

function tokenize(s) {
  const norm = normalize(s);
  if (!norm) return [];
  return norm.split(" ").filter(w => w.length >= 2 && !STOPWORDS.has(w));
}

function ngrams(tokens, n) {
  const out = [];
  for (let i = 0; i <= tokens.length - n; i++) out.push(tokens.slice(i, i+n).join(" "));
  return out;
}

/* ==========================================================================
   INDEXING (TF-IDF)
   ========================================================================== */
const INDEX = (() => {
  const docs = CORPUS.map((p, i) => {
    const norm = normalize(p.text);
    const tokens = tokenize(p.text);
    const tf = new Map();
    for (const t of tokens) tf.set(t, (tf.get(t) || 0) + 1);
    return { i, section: p.section, text: p.text, norm, tokens, tf, len: tokens.length };
  });
  const df = new Map();
  for (const d of docs) {
    for (const t of new Set(d.tokens)) df.set(t, (df.get(t) || 0) + 1);
  }
  const N = docs.length;
  const idf = new Map();
  for (const [t, c] of df) idf.set(t, Math.log(1 + N / c));
  // precompute norm-length for cosine
  for (const d of docs) {
    let s = 0;
    for (const [t, f] of d.tf) {
      const w = f * (idf.get(t) || 0);
      s += w * w;
    }
    d.vecNorm = Math.sqrt(s) || 1;
  }
  return { docs, idf, N };
})();

/* ==========================================================================
   SCORING
   ========================================================================== */
function scoreQuery(query) {
  const qNorm = normalize(query);
  const qTokens = tokenize(query);
  if (qTokens.length === 0) return [];
  const qTf = new Map();
  for (const t of qTokens) qTf.set(t, (qTf.get(t) || 0) + 1);
  let qNormLen = 0;
  for (const [t, f] of qTf) {
    const w = f * (INDEX.idf.get(t) || 0);
    qNormLen += w * w;
  }
  qNormLen = Math.sqrt(qNormLen) || 1;

  const qBigrams = ngrams(qTokens, 2);
  const qTrigrams = ngrams(qTokens, 3);
  // detect longer exact substring
  const qPhrase = qNorm;

  const scored = INDEX.docs.map(d => {
    // cosine
    let dot = 0;
    for (const [t, f] of qTf) {
      const df = d.tf.get(t);
      if (!df) continue;
      const idf = INDEX.idf.get(t) || 0;
      dot += (f * idf) * (df * idf);
    }
    const cos = dot / (qNormLen * d.vecNorm);
    // bigram overlap
    const dBigrams = new Set(ngrams(d.tokens, 2));
    let bg = 0;
    for (const g of qBigrams) if (dBigrams.has(g)) bg++;
    const dTrigrams = new Set(ngrams(d.tokens, 3));
    let tg = 0;
    for (const g of qTrigrams) if (dTrigrams.has(g)) tg++;
    // phrase bonus
    let phrase = 0;
    if (qPhrase.length >= 6 && d.norm.includes(qPhrase)) phrase = 1;
    // keyword coverage
    let covered = 0;
    for (const t of qTf.keys()) if (d.tf.has(t)) covered++;
    const coverage = covered / qTf.size;
    // proximity: min-window of any two distinct query tokens in doc
    let prox = 0;
    if (qTokens.length >= 2) {
      const positions = new Map();
      d.tokens.forEach((w, idx) => {
        if (qTf.has(w)) {
          if (!positions.has(w)) positions.set(w, []);
          positions.get(w).push(idx);
        }
      });
      const keys = [...positions.keys()];
      if (keys.length >= 2) {
        let best = Infinity;
        for (let a = 0; a < keys.length; a++) {
          for (let b = a+1; b < keys.length; b++) {
            for (const pa of positions.get(keys[a])) {
              for (const pb of positions.get(keys[b])) {
                const d0 = Math.abs(pa - pb);
                if (d0 < best) best = d0;
              }
            }
          }
        }
        if (best !== Infinity) prox = 1 / (1 + best / 5);
      }
    }
    const total = cos * 3.0 + bg * 0.6 + tg * 1.2 + phrase * 2.5 + coverage * 1.5 + prox * 0.4;
    return { d, cos, bg, tg, phrase, coverage, prox, total };
  });
  scored.sort((a, b) => b.total - a.total);
  return scored;
}

/* ==========================================================================
   ANSWER COMPOSITION (extractive; no invention beyond neutral connectors)
   ========================================================================== */
function splitSentences(text) {
  return text
    .split(/(?<=[.!?؟])\s+|(?:•\s*)/)
    .map(s => s.trim())
    .filter(s => s.length > 8);
}

function sentenceScore(sent, qTokens, qTf) {
  const sTokens = tokenize(sent);
  if (!sTokens.length) return 0;
  const sSet = new Set(sTokens);
  let hit = 0, weighted = 0;
  for (const t of qTf.keys()) {
    if (sSet.has(t)) { hit++; weighted += (INDEX.idf.get(t) || 0); }
  }
  return weighted + hit * 0.3;
}

function composeEssayAnswer(query, scored) {
  const THRESHOLD = 0.35;
  if (!scored.length || scored[0].total < THRESHOLD) return null;
  const qTokens = tokenize(query);
  const qTf = new Map();
  for (const t of qTokens) qTf.set(t, (qTf.get(t) || 0) + 1);

  // take top 4 paragraphs above a soft threshold
  const top = scored.filter(s => s.total >= scored[0].total * 0.35).slice(0, 4);

  // collect scored sentences from these paragraphs
  const cand = [];
  for (const s of top) {
    const sents = splitSentences(s.d.text);
    for (const sent of sents) {
      const sc = sentenceScore(sent, qTokens, qTf);
      if (sc > 0) cand.push({ sent, sc, para: s.d });
    }
  }
  if (!cand.length) {
    // fallback: return top paragraph as-is
    const p = top[0].d;
    return {
      paras: [p.text],
      cites: [{ section: p.section, idx: p.i + 1 }],
    };
  }
  cand.sort((a, b) => b.sc - a.sc);

  // pick up to 6 sentences, de-duplicated, preserving original order per paragraph
  const chosen = [];
  const seen = new Set();
  for (const c of cand) {
    const key = normalize(c.sent).slice(0, 60);
    if (seen.has(key)) continue;
    seen.add(key);
    chosen.push(c);
    if (chosen.length >= 6) break;
  }
  // group by paragraph, keep original order inside each
  const byPara = new Map();
  for (const c of chosen) {
    if (!byPara.has(c.para.i)) byPara.set(c.para.i, []);
    byPara.get(c.para.i).push(c);
  }
  const paras = [];
  const cites = [];
  for (const [i, arr] of byPara) {
    const para = arr[0].para;
    const originalOrder = splitSentences(para.text);
    arr.sort((a, b) => originalOrder.indexOf(a.sent) - originalOrder.indexOf(b.sent));
    paras.push(arr.map(a => a.sent).join(" "));
    cites.push({ section: para.section, idx: para.i + 1 });
  }
  return { paras, cites };
}

/* ==========================================================================
   MCQ DETECTION & SOLVING
   ========================================================================== */
const MCQ_MARKERS = [
  { re: /(?:^|\n|\s)([1-4۱-۴])[\)\.\-]\s*/g, kind: "digit" },
  { re: /(?:^|\n|\s)(الف|ب|ج|د)[\)\.\-]\s*/g, kind: "letter" },
];

function parseMcq(query) {
  // find markers with positions
  let markers = [];
  for (const { re } of MCQ_MARKERS) {
    re.lastIndex = 0;
    let m;
    while ((m = re.exec(query)) !== null) {
      markers.push({ label: m[1], start: m.index + (m[0].length - m[1].length - 1), afterLabel: m.index + m[0].length });
    }
  }
  if (markers.length < 2) return null;
  markers.sort((a, b) => a.start - b.start);
  // dedupe positions
  const uniq = [];
  const seenPos = new Set();
  for (const mk of markers) {
    if (seenPos.has(mk.start)) continue;
    seenPos.add(mk.start);
    uniq.push(mk);
  }
  if (uniq.length < 2) return null;
  const stem = query.slice(0, uniq[0].start).trim();
  const options = [];
  for (let i = 0; i < uniq.length; i++) {
    const from = uniq[i].afterLabel;
    const to = i + 1 < uniq.length ? uniq[i+1].start : query.length;
    const txt = query.slice(from, to).trim().replace(/\s+/g, " ");
    if (txt.length > 0) options.push({ label: uniq[i].label, text: txt });
  }
  if (options.length < 2) return null;
  return { stem, options };
}

function solveMcq(stem, options) {
  const stemScored = scoreQuery(stem);
  const stemTop = stemScored.slice(0, 8); // limit context to top paragraphs
  const results = options.map(opt => {
    const combined = stem + " " + opt.text;
    const sc = scoreQuery(combined);
    const bestOverall = sc[0] ? sc[0].total : 0;
    // also score option-only supporting context inside stem's top paragraphs
    const optTokens = tokenize(opt.text);
    let bestInStem = 0;
    let bestPara = null;
    for (const s of stemTop) {
      const norm = s.d.norm;
      let hits = 0;
      for (const t of optTokens) if (norm.includes(t)) hits++;
      const cov = optTokens.length ? hits / optTokens.length : 0;
      const phrase = norm.includes(normalize(opt.text)) ? 1 : 0;
      const local = s.total * 0.4 + cov * 2.0 + phrase * 3.0;
      if (local > bestInStem) { bestInStem = local; bestPara = s.d; }
    }
    return { opt, score: bestOverall + bestInStem, para: bestPara || (sc[0] ? sc[0].d : null) };
  });
  results.sort((a, b) => b.score - a.score);
  return results;
}

const qEl = document.getElementById("q");
const sendBtn = document.getElementById("sendBtn");
let mode = "auto";

document.querySelectorAll(".mode-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    document.querySelectorAll(".mode-btn").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
    mode = btn.dataset.mode;
  });
});

qEl.addEventListener("input", () => {
  qEl.style.height = "auto";
  qEl.style.height = Math.min(qEl.scrollHeight, 180) + "px";
});
qEl.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); formEl.requestSubmit(); }
});

function el(tag, cls, html) {
  const e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

function addMsg(role, contentNode) {
  const wrap = el("div", "msg " + role);
  const av = el("div", "avatar", role === "user" ? "شما" : "ج");
  const bubble = el("div", "bubble");
  bubble.appendChild(contentNode);
  wrap.appendChild(av);
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth", block: "end" });
  return { wrap, bubble };
}

function textNode(s) { const d = document.createElement("div"); d.textContent = s; return d; }

function renderEssay(answer) {
  const wrap = document.createElement("div");
  const intro = document.createElement("div");
  intro.className = "answer-para";
  intro.innerHTML = "<b style='color:var(--cyan)'>بر اساس متن جزوه:</b>";
  wrap.appendChild(intro);
  const CONN = ["", "همچنین در ادامه آمده است: ", "افزون بر این: ", "به بیان دیگر: "];
  answer.paras.forEach((p, i) => {
    const d = document.createElement("div");
    d.className = "answer-para";
    d.textContent = (CONN[i] || "") + p;
    wrap.appendChild(d);
  });
  const cite = document.createElement("div");
  cite.className = "cite";
  cite.innerHTML = "<b>مرجع:</b> " + answer.cites.map(c => escapeHtml(c.section) + " (پاراگراف " + c.idx + ")").join(" ؛ ");
  wrap.appendChild(cite);
  return wrap;
}

function renderNotFound() {
  const d = document.createElement("div");
  d.innerHTML = "<b style='color:#f0abfc'>پاسخ در متن جزوه یافت نشد.</b><br/>" +
                "این دستیار فقط به سوالاتی پاسخ می‌دهد که پاسخشان صریحاً در متن جزوه آمده باشد. " +
                "لطفاً سوال را بازنویسی کنید یا کلمات کلیدی نزدیک‌تر به متن جزوه استفاده کنید.";
  return d;
}

function renderMcq(stem, results) {
  const wrap = document.createElement("div");
  const head = document.createElement("div");
  head.className = "answer-para";
  head.innerHTML = "<b style='color:var(--cyan)'>تحلیل سوال تستی بر اساس متن جزوه:</b>";
  wrap.appendChild(head);
  const maxScore = results[0].score;
  const winThreshold = 0.5; // relative
  const winner = results[0];
  results.forEach((r, idx) => {
    const line = document.createElement("div");
    line.className = "mcq-line" + (idx === 0 && r.score > 0 ? " win" : "");
    const rel = maxScore > 0 ? (r.score / maxScore) : 0;
    line.innerHTML = "<span class='opt'>" + escapeHtml(r.opt.label) + ")</span>" +
                     "<span>" + escapeHtml(r.opt.text) + "</span>" +
                     "<span class='score'>پشتوانه: " + (rel * 100).toFixed(0) + "٪</span>";
    wrap.appendChild(line);
  });
  const verdict = document.createElement("div");
  verdict.className = "answer-para";
  verdict.style.marginTop = "10px";
  if (winner.score <= 0) {
    verdict.innerHTML = "<b style='color:#f0abfc'>هیچ‌یک از گزینه‌ها در متن جزوه پشتوانه‌ی کافی ندارد.</b>";
  } else {
    verdict.innerHTML = "<b style='color:#34d399'>گزینه‌ی پیشنهادی: " + escapeHtml(winner.opt.label) + ") " + escapeHtml(winner.opt.text) + "</b>";
  }
  wrap.appendChild(verdict);
  if (winner.para) {
    // show supporting snippet
    const ev = document.createElement("div");
    ev.className = "answer-para";
    ev.style.marginTop = "8px";
    ev.style.fontSize = "13px";
    ev.style.color = "var(--muted)";
    ev.innerHTML = "<b style='color:var(--cyan)'>شاهد از متن:</b> " + escapeHtml(winner.para.text);
    wrap.appendChild(ev);
    const cite = document.createElement("div");
    cite.className = "cite";
    cite.innerHTML = "<b>مرجع:</b> " + escapeHtml(winner.para.section) + " (پاراگراف " + (winner.para.i + 1) + ")";
    wrap.appendChild(cite);
  }
  return wrap;
}

function showTyping() {
  const wrap = el("div", "msg bot");
  wrap.appendChild(el("div", "avatar", "ج"));
  const bubble = el("div", "bubble");
  bubble.innerHTML = "<div class='typing'><i></i><i></i><i></i></div>";
  wrap.appendChild(bubble);
  chatEl.appendChild(wrap);
  wrap.scrollIntoView({ behavior: "smooth", block: "end" });
  return wrap;
}

function handleQuery(query) {
  const asUser = textNode(query);
  addMsg("user", asUser);
  const typing = showTyping();
  setTimeout(() => {
    typing.remove();
    let effectiveMode = mode;
    const mcq = parseMcq(query);
    if (effectiveMode === "auto") effectiveMode = mcq ? "mcq" : "essay";
    if (effectiveMode === "mcq") {
      const parsed = mcq || parseMcq(query);
      if (!parsed) {
        addMsg("bot", textNode("سوال تستی معتبر شناسایی نشد. لطفاً گزینه‌ها را با ۱) ۲) ۳) ۴) یا الف) ب) ج) د) بنویسید."));
        return;
      }
      const results = solveMcq(parsed.stem || query, parsed.options);
      addMsg("bot", renderMcq(parsed.stem, results));
    } else {
      const scored = scoreQuery(query);
      const answer = composeEssayAnswer(query, scored);
      if (!answer) addMsg("bot", renderNotFound());
      else addMsg("bot", renderEssay(answer));
    }
  }, 450);
}

formEl.addEventListener("submit", e => {
  e.preventDefault();
  const q = qEl.value.trim();
  if (!q) return;
  qEl.value = "";
  qEl.style.height = "auto";
  handleQuery(q);
});

/* Welcome message + suggestions */
(function welcome() {
  const wrap = document.createElement("div");
  wrap.innerHTML = "سلام! من دستیار اختصاصی این جزوه هستم. پاسخ‌های من <b>فقط و فقط</b> از متن هاردکد شده‌ی جزوه استخراج می‌شوند." +
                   "<br/>می‌توانید سوال <b>تشریحی</b> بپرسید یا سوال <b>تستی</b> با گزینه بدهید.";
  const box = addMsg("bot", wrap);
  const suggestions = [
    "چرخه‌ی یادگیری کُلب را توضیح دهید.",
    "ویژگی‌های کتاب فعالیت‌های پیش‌دبستانی چیست؟",
    "روش‌های آموزش مهارت‌های اجتماعی به کودکان کدام‌اند؟",
    "ابقا یا نگهداری ذهنی را تعریف کنید.",
    "مفاهیم مربوط به اندازه را فهرست کنید.",
  ];
  const sug = el("div", "suggestions");
  for (const s of suggestions) {
    const c = el("button", "chip");
    c.type = "button";
    c.textContent = s;
    c.addEventListener("click", () => { qEl.value = s; handleQuery(s); });
    sug.appendChild(c);
  }
  box.bubble.appendChild(sug);
})();
