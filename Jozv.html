<!doctype html>
<html lang="fa" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>دستیار هوشمند جزوه ـ آفلاین</title>
<meta name="description" content="دستیار پرسش‌وپاسخ اختصاصی جزوه‌ی پیش‌دبستانی، کاملاً کلاینت‌ساید، بدون سرور و بدون API." />
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg-0: #05060d;
  --bg-1: #0b1024;
  --cyan: #22d3ee;
  --magenta: #f0abfc;
  --pink: #ff2d7f;
  --violet: #7c3aed;
  --text: #e6edf7;
  --muted: #94a3b8;
  --glass: rgba(15, 23, 42, 0.55);
  --border: rgba(148, 163, 184, 0.18);
}
html, body { height: 100%; }
body {
  font-family: 'Vazirmatn', system-ui, -apple-system, sans-serif;
  background: radial-gradient(1200px 800px at 85% -10%, rgba(124,58,237,0.35), transparent 60%),
              radial-gradient(1000px 700px at -10% 110%, rgba(34,211,238,0.25), transparent 60%),
              linear-gradient(180deg, var(--bg-0), var(--bg-1));
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
  line-height: 1.9;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background-image: linear-gradient(rgba(34,211,238,0.05) 1px, transparent 1px),
                    linear-gradient(90deg, rgba(240,171,252,0.04) 1px, transparent 1px);
  background-size: 44px 44px;
  pointer-events: none;
  z-index: 0;
  mask-image: radial-gradient(ellipse at center, black 40%, transparent 90%);
}
.app { position: relative; z-index: 1; max-width: 980px; margin: 0 auto; padding: 20px 16px 140px; }
header.hero {
  display: flex; align-items: center; gap: 16px;
  padding: 18px 22px;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 20px;
  backdrop-filter: blur(18px) saturate(140%);
  -webkit-backdrop-filter: blur(18px) saturate(140%);
  box-shadow: 0 0 0 1px rgba(34,211,238,0.08), 0 20px 60px -20px rgba(124,58,237,0.35);
  position: sticky; top: 12px; z-index: 5;
}
.logo {
  width: 46px; height: 46px; border-radius: 14px;
  background: conic-gradient(from 210deg, var(--cyan), var(--magenta), var(--violet), var(--cyan));
  box-shadow: 0 0 22px rgba(34,211,238,0.55), inset 0 0 12px rgba(0,0,0,0.35);
  position: relative;
}
.logo::after {
  content: 'ج'; position: absolute; inset: 0; display: grid; place-items: center;
  color: #05060d; font-weight: 900; font-size: 22px;
}
.titles h1 { font-size: 18px; letter-spacing: 0.5px; font-weight: 800; }
.titles h1 span { background: linear-gradient(90deg, var(--cyan), var(--magenta)); -webkit-background-clip: text; background-clip: text; color: transparent; }
.titles p { font-size: 12px; color: var(--muted); margin-top: 2px; }
.badge {
  margin-inline-start: auto;
  font-size: 11px; color: var(--cyan);
  padding: 6px 10px; border-radius: 999px;
  border: 1px solid rgba(34,211,238,0.35);
  background: rgba(34,211,238,0.08);
  white-space: nowrap;
}

.mode-bar {
  display: flex; gap: 8px; margin: 18px 4px 10px;
}
.mode-btn {
  flex: 1; text-align: center;
  padding: 10px 14px; border-radius: 12px;
  background: rgba(15,23,42,0.5);
  border: 1px solid var(--border);
  color: var(--muted); cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600;
  transition: all .2s ease;
}
.mode-btn:hover { color: var(--text); border-color: rgba(34,211,238,0.4); }
.mode-btn.active {
  color: #05060d;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  border-color: transparent;
  box-shadow: 0 0 20px rgba(34,211,238,0.35);
}

.chat {
  margin-top: 8px;
  padding: 18px;
  min-height: 55vh;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 22px;
  backdrop-filter: blur(18px);
  -webkit-backdrop-filter: blur(18px);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.03);
  display: flex; flex-direction: column; gap: 14px;
}
.msg { display: flex; gap: 10px; align-items: flex-start; animation: fadeUp .35s ease; }
.msg .avatar {
  width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;
  display: grid; place-items: center; font-size: 13px; font-weight: 800;
}
.msg.user { flex-direction: row-reverse; }
.msg.user .avatar { background: linear-gradient(135deg, var(--pink), var(--violet)); color: #fff; }
.msg.bot .avatar {
  background: linear-gradient(135deg, var(--cyan), #0ea5e9); color: #05060d;
  box-shadow: 0 0 14px rgba(34,211,238,0.5);
}
.bubble {
  padding: 12px 14px; border-radius: 14px; max-width: 82%;
  line-height: 1.9; font-size: 14.5px;
}
.msg.user .bubble {
  background: linear-gradient(135deg, rgba(255,45,127,0.18), rgba(124,58,237,0.18));
  border: 1px solid rgba(240,171,252,0.28);
}
.msg.bot .bubble {
  background: rgba(2,6,23,0.55);
  border: 1px solid rgba(34,211,238,0.22);
}
.bubble .cite {
  margin-top: 10px; padding-top: 8px;
  border-top: 1px dashed rgba(148,163,184,0.25);
  font-size: 11.5px; color: var(--muted);
}
.bubble .cite b { color: var(--cyan); font-weight: 700; }
.bubble .mcq-line { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
.bubble .mcq-line .opt { font-weight: 700; color: var(--muted); min-width: 22px; }
.bubble .mcq-line .score { margin-inline-start: auto; font-size: 11px; color: var(--muted); }
.bubble .mcq-line.win { color: #a7f3d0; }
.bubble .mcq-line.win .opt { color: #34d399; }
.bubble .mcq-line.win .score { color: #34d399; }
.bubble .answer-para { margin-bottom: 8px; }
.bubble .answer-para:last-child { margin-bottom: 0; }

.typing { display: inline-flex; gap: 4px; padding: 6px 0; }
.typing i { width: 7px; height: 7px; border-radius: 50%; background: var(--cyan); box-shadow: 0 0 8px var(--cyan); animation: blink 1s infinite; }
.typing i:nth-child(2) { animation-delay: .15s; background: var(--magenta); box-shadow: 0 0 8px var(--magenta); }
.typing i:nth-child(3) { animation-delay: .3s; background: var(--violet); box-shadow: 0 0 8px var(--violet); }
@keyframes blink { 0%,80%,100% { opacity: .25 } 40% { opacity: 1 } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.suggestions { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
.chip {
  font-size: 12px; padding: 6px 10px; border-radius: 999px;
  background: rgba(15,23,42,0.6); border: 1px solid var(--border);
  color: var(--muted); cursor: pointer; font-family: inherit;
}
.chip:hover { color: var(--text); border-color: rgba(240,171,252,0.4); }

.composer {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  width: min(960px, 94vw);
  padding: 10px; border-radius: 20px;
  background: rgba(5,6,13,0.7);
  border: 1px solid rgba(34,211,238,0.28);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px -10px rgba(34,211,238,0.35), 0 0 0 1px rgba(240,171,252,0.12);
  display: flex; gap: 8px; align-items: flex-end;
  z-index: 10;
}
.composer textarea {
  flex: 1; resize: none;
  background: transparent; border: none; outline: none; color: var(--text);
  font-family: inherit; font-size: 14.5px; line-height: 1.8;
  padding: 10px 12px; max-height: 180px; min-height: 44px;
}
.composer textarea::placeholder { color: rgba(148,163,184,0.7); }
.send {
  padding: 10px 16px; border-radius: 14px; border: none; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: 14px;
  color: #05060d;
  background: linear-gradient(135deg, var(--cyan), var(--magenta));
  box-shadow: 0 0 20px rgba(34,211,238,0.5);
  transition: transform .15s;
}
.send:hover { transform: translateY(-1px); }
.send:disabled { opacity: .5; cursor: not-allowed; }

footer.foot { text-align: center; margin-top: 30px; font-size: 11px; color: var(--muted); }
footer.foot b { color: var(--cyan); }

@media (max-width: 600px) {
  .titles h1 { font-size: 15px; }
  .bubble { max-width: 90%; font-size: 13.5px; }
  header.hero { padding: 12px 14px; }
  .logo { width: 40px; height: 40px; }
}
</style>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="logo"></div>
    <div class="titles">
      <h1><span>دستیار هوشمند جزوه</span></h1>
      <p>پاسخ‌گویی اختصاصی به سوالات این جزوه ـ کاملاً آفلاین و رایگان</p>
    </div>
    <span class="badge">آفلاین • بدون سرور</span>
  </header>

  <div class="mode-bar" role="tablist">
    <button class="mode-btn active" data-mode="auto" type="button">تشخیص خودکار</button>
    <button class="mode-btn" data-mode="essay" type="button">تشریحی</button>
    <button class="mode-btn" data-mode="mcq" type="button">تستی</button>
  </div>

  <div class="chat" id="chat" aria-live="polite"></div>

  <footer class="foot">
    ساخته شده با ❤️ ـ منبع پاسخ‌ها <b>صرفاً</b> متن هاردکد شده جزوه است. اگر پاسخ در متن نبود، صریحاً اعلام می‌شود.
  </footer>
</div>

<form class="composer" id="composer" autocomplete="off">
  <textarea id="q" rows="1" placeholder="سوال خود را بنویسید… برای تست، گزینه‌ها را با ۱) ۲) ۳) ۴) یا الف) ب) ج) د) بنویسید"></textarea>
  <button class="send" type="submit" id="sendBtn">ارسال</button>
</form>

<script>
/* ==========================================================================
   CORPUS: کل متن جزوه به‌صورت هاردکد. هیچ پاسخی خارج از این آرایه تولید نمی‌شود.
   ========================================================================== */
const CORPUS = [{"section": "بخش دوم", "text": "فهرست بخش دوم : توجه کنیم"}, {"section": "بخش دوم", "text": "ـ هدف کلی ـ اهداف رفتاری ـ مقدمه ـ رویکرد آموزشی ـ ویژگی‌های کتاب فعالیت‌های پیش‌دبستانی ـ چرخه یادگیری گُلب ـ طبقه‌بندی فراگیران براساس چرخه یادگیری ـ تهیه پوشه کار ـ فرم شماره ۱ برنامه‌ریزی یک فعالیت آموزشی ـ راهنمای تکمیل فرم شماره ۱ و نمونه کار ـ فرم شماره ۲ برنامه‌ریزی مفاهیم آموزشی ـ راهنمای تکمیل فرم شماره ۲ و نمونه‌های کار ـ چند عنوان برای تمرین هنرجویان ـ چند نمونه پروژه آموزشی برای تمرین ـ طراحی درس و ارزیابی آن ـ فرم‌های مراحل طراحی درس و ارزیابی از خود ـ یک نمونه «خود را بیازمایید»"}, {"section": "بخش دوم", "text": "کاربرد روش‌ها و راهکارها برای رسیدن به اهداف کتاب درسی"}, {"section": "بخش دوم", "text": "اهداف رفتاری بخش دوم در پایان این بخش هنرآموز باید بتواند: ١ـ ویژگی‌های کتاب درسی را فهرست کند. ٢ـ چرخه‌ی یادگیری را با مثالی توضیح دهد. ٣ـ با توجه به چرخه‌ی یادگیری، فراگیران را طبقه‌بندی کند. ٤ـ یک نمونه پوشه‌ی کار ارائه دهد. ٥ـ نمونه‌ی تکمیل شده‌ای از فرم برنامه‌ریزی فعالیت آموزشی برای کودکان پنج تا شش ساله ارائه دهد. ٦ـ نمونه‌ی تکمیل شده‌ای از فرم برنامه‌ریزی مفاهیم آموزشی برای کودکان چهار تا پنج ساله ارائه دهد. ٧ـ فرم برنامه‌ریزی فعالیت آموزشی تکمیل شده را ارزیابی کند. ٨ـ فرم برنامه‌ریزی مفاهیم آموزشی تکمیل شده را ارزیابی کند."}, {"section": "بخش دوم", "text": "مقدمه آموزش و یاددهی اثربخش، مستلزم قرار گرفتن هنرآموزان و هنرجویان در دنیایی با زمینه‌های فرهنگی مناسب و مرتبط با زندگی است. اگرچه یادگیری در ذهن صورت می‌گیرد ولی زمانی مؤثر است که در زندگی واقعی قابل طرح و اجرا باشد. در این فصل هنرآموزان با رویکرد آموزشی کتاب و نحوه‌ی تکمیل فرم‌های آموزشی برای ارائه‌ی پروژه‌ها آشنا می‌شوند."}, {"section": "بخش دوم", "text": "رویکرد آموزشی کتاب انسان موجودی چند بعدی و دارای نیازهای گوناگون، که برای زندگی، نیازمند برخورداری از مهارت‌های متنوع است. بنابراین ادامه‌ی حیات او و بهره‌مند شدن از نعمت‌های الهی و حل مسائل مربوط به زندگی واقعی، دانش و مهارت‌های مختلفی را می‌طلبد و نمی‌تواند یک بعدی باشد. از این‌رو، آموزش و پرورش نیز باید به این رویکرد آموزشی خاص تأکید کند که مدارس باید تعلیم را فرایندی جهت ایجاد توانایی‌های مورد نیاز برای زندگی در آینده تلقی نماید، یعنی تدریس و یاددهی باید کل‌نگر باشد، رویکردی که منتج از دنیای واقعی است و دانش‌آموزی پرورش دهد که بتواند واجد مهارت‌های گوناگون (مهارت آکادمیک، مهارت عملی، مهارت حل مسئله، مهارت کار تیمی و گروهی) باشد و به آسانی جذب بازار کار شود (کاندی، فالکنر ١٩٩٥). تحقق چنین امری تا حدی در یک برنامه‌ی درسی منسجم و یکپارچه ممکن می‌شود (لیک ١٩٩٤)، که به آن روش یا برنامه‌ی درسی تلفیقی گویند. این روش برنامه‌ای است که: • به دانش‌آموز اجازه می‌دهد تا روابط درونی موضوعات درسی را مشاهده کند. • همکاری بین دانش‌آموزان و معلمان را برای طرح‌ریزی تیمی افزایش می‌دهد. • تغییرات از شکل سنتی به شکل راهبردهای آموزشی نوین که به جای یادگیری عادتی، فهم مطالب را تشویق می‌کنند، درمی‌آید. • از اقدامات مبتکرانه و خلاق حمایت می‌کند. • چندین درس را در یک پروژه‌ی فعال ترکیب می‌کند تا نشان دهد چگونه کودک از طریق دروس، با دنیای واقعی آمیخته در یک فعالیت، مواجه می‌شود."}, {"section": "بخش دوم", "text": "روان‌شناسان شناختی اعتقاد دارند، آموزش اندیشه تلفیق به عرصه کاربرد عملی مهارت‌ها بسیار نزدیک است و این نوع آموزش شرایطی فراهم می‌کند که دانش‌آموز بتواند فراگرفته‌های خود را عملاً در برخورد با واقعیت‌های زندگی مورد آزمایش قرار دهد."}, {"section": "بخش دوم", "text": "کتاب فعالیت‌های پیش‌دبستانی با چنین دیدگاهی تألیف شده است. هدف اصلی این کتاب آشنا کردن هنرجو با نیازهای همه‌جانبه کودکان است و ارائه فعالیت‌ها برای آموزش مفاهیم به کودکان، در جهت غنی‌سازی اطلاعات و نیازهای آنان و کاربرد آن مفاهیم در زندگی واقعی، بنابراین کتاب با دو هدف دنبال می‌شود: ابتدا هنرجو، دانش خود را در زمینه شناخت ویژگی‌های کودک می‌افزاید و از نظر ضرورت و اهمیت فعالیت‌ها (بازی، هنر، زبان‌آموزی ... جمعاً ده فعالیت) به‌طور کامل در مفاهیم، جست‌وجو و کشف می‌کند و در همان زمینه با تمرین به کسب تجربه می‌پردازد."}, {"section": "بخش دوم", "text": "سپس به این مفاهیم به صورت مرتبط و پیوسته نگاه می‌کند. زیرا که حوزه‌های فعالیت‌هایی مانند کاردستی، بازی، نقاشی و هنر، علوم و ... می‌توانند در متن یک موضوع معین مطالعه شوند و به این ترتیب آنها دانش پیشین و تجارب خود را با بازی، هنر، حرکات و ... برای خلق روابط مختلف در حیطه شناختی، عاطفی و حرکتی به کار می‌گیرند و بین آموخته‌ها، جامعه و زندگی واقعی پیوند برقرار می‌کنند. در اینجا روابط معناداری بین موضوعات درسی، آنچه می‌دانند و آنچه باید با کوشش و جست‌وجو یاد بگیرند و سپس در مورد آن فکر کنند و در اجرای بعدی به کار گیرند، به‌وجود آمده است."}, {"section": "بخش دوم", "text": "ویژگی‌های کتاب فعالیت‌های پیش‌دبستانی ویژگی‌های این کتاب عبارت‌اند از: • سازماندهی محتوا براساس اهداف برای تسهیل در فرایند یاددهی ـ یادگیری؛ • تلفیق مواد درسی به روش سازماندهی چند رشته‌ای؛ • تحت پوشش قرار دادن دو بعد زندگی فردی و اجتماعی؛ • فرصت برای یک تجربه عملی و مهارت؛ • صرف وقت و مشارکت بیشتر بین هنرآموز و هنرجو؛ • توجه به مهارت‌های اساسی مثل مسئله حل مسئله و خلاقیت؛ • محدود نبودن منابع درسی و ارائه مطالبی برای مطالعه آزاد (سی‌دی، فیلم و ...) • انعطاف‌پذیری برنامه‌ها؛ • ارتباط بین مفاهیم و فعالیت‌ها؛ • ارزش گذاشتن به فعالیت‌های گروهی؛ • دادن فرصت برای بحث و تبادل‌نظر به هنرجو و هنرآموز؛ • امکان اجرای فعالیت‌ها در فضاهای گوناگون؛ • پیشنهاد استفاده از وسایل ساده و قابل دسترس؛ • توجه به ایمنی و سلامت محیط؛ • تشویق و علاقه‌مند کردن دانش‌آموزان به کلاس درس؛"}, {"section": "بخش دوم", "text": "• ارزیابی مداوم در طول سال مبتنی بر اعتماد و خلاقیت. براساس این ویژگی‌ها هنرآموز می‌تواند در طی سال، با توجه به مفاهیم گوناگونی که دانستن آن‌ها برای کودکان ضروری است، فعالیت‌ها را انجام دهند، مشاهده کنند، فکر کنند و برنامه‌ریزی کنند (کُلب ۱۹۸۴) و به این ترتیب با تلفیق روش‌های گوناگون، موضوعات و اطلاعات بیشتری کسب کنند و آن‌ها را به کار گیرد."}, {"section": "بخش دوم", "text": "گذری بر چرخۀ یادگیری ـ چرخۀ یادگیری کُلب با توجه به مراحل یادگیری، که مفصلاً در بخش اول به آن اشاره شد، به معرفی چرخۀ یادگیری تجربی کُلب می‌پردازیم. چرا که در اینجا استفاده از این چرخه پاسخ‌دهی بهتری دارد. این چرخه براساس مراحل چهارگانۀ یادگیری، تئوری یادگیری تجربی «کُلب» با نگاهی کل‌نگر با تلفیق تجربه، شناخت و رفتار شکل گرفته است، که شامل: • تجارب محسوس یا ملموس دادن (Do) • بازتاب مشاهدات یا مشاهده (Observe) • مفهوم‌سازی انتزاعی یا تفکر (Think) • فعالیت اجرایی یا برنامه (Plan)"}, {"section": "بخش دوم", "text": "• تجارب ملموس • مشاهدات و بازتاب‌ها • مفهوم‌سازی انتزاعی (تفکر) • آزمایش در موقعیت جدید • مراحل یادگیری و تجربی کُلب"}, {"section": "بخش دوم", "text": "۱ـ kolb ۲ـ do - observe - think - plan"}, {"section": "چرخه‌ی یادگیری کُلب", "text": "• انجام دادن / داشتن تجربه از اجرای فعالیت‌ها و یا کار عملی • تجارب ملموس • سعی در برنامه‌ریزی جدید براساس آزمایش تئوری‌ها و آموخته‌ها و تجارب گذشته • آزمایش موقعیت‌های جدید • تصمیم‌گیری - یادگیری • (تفکر) مفهوم‌سازی انتزاعی • یادگیرنده مبادرت به مفهوم‌سازی تئوری یا درست کردن یا ساختن چیزی که دیده مبادرت می‌نماید. • تکرار - مرور واکنش‌ها و بازتاب‌ها تجدیدنظر در آنچه آگاهانه از تجارب کسب کرده است. • مشاهدات و بازتاب‌ها"}, {"section": "چرخه‌ی یادگیری کُلب", "text": "چرخه‌ی مراحل یادگیری کُلب نشان می‌دهد که چگونه اجرای یک فعالیت، در عمل به بازتاب و واکنش در مفاهیم منجر می‌شود که این مفاهیم به نوبه‌ی خود موجب تجربه و شکل‌گیری مفاهیم جدید می‌گردد."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "تئوری یادگیری کُلب یا اساس یادگیری تجربی، راه مفیدی است که مراحل یادگیری را شرح می‌دهد. کلید اصلی دو تئوری (یادگیری تجربی کُلب و چرخه‌ی یادگیری) این است که هر دو یادگیری را نتیجه‌ی تجربه می‌دانند و فراگیران نیاز دارند که به این تجربه بازتاب نشان دهند و از این طریق مفهوم درس و نتایج کلی را بیرون کشند و تعمیم دهند."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "این تمرین‌های تأمل‌برانگیز می‌تواند چهارچوب و ملاک‌هایی برای رفتارهای آینده را فراهم کند. از طرف دیگر می‌تواند عملاً تبلیغ یا تشویقی باشد بسیار مثبت برای پیامد کارهای عملی که در موقعیت‌ها و تجارب جدید فراگیرنده رخ می‌دهد."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "به عنوان یک مشاور می‌توان به فراگیران کمک کرد که برای توسعه‌ی یادگیری‌شان، با طراحی سؤالات باز، بهتر بتوانند نتایج تجربیاتی را که داشته‌اند در آینده تعمیم دهند تا انتصاب‌های آینده‌شان براساس درک واقعیات صورت گیرد."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "سؤالات باز فرد را به توصیف تجارب، بازتاب‌ها، ادراکات و راه‌هایی برای آزمایش ایده‌های جدید تشویق و ترغیب خواهد کرد."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "در این راستا به نکاتی چند اشاره می‌شود:"}, {"section": "چرخه‌ی یادگیری کُلب", "text": "• تشویق فراگیران برای تشریح تجاربشان از ملاقات‌ها و نشست‌های قبلی. این مسئله می‌تواند بر اهداف جلسه‌ی قبل یا بر کار عملی مدرسه یا حتی تشریح موقعیتی که در کلاس داشته‌اند و آنها را خوشحال و یا ناشاد کرده است، تمرکز کند. • برای شرح کامل و شناخت موقعیت و ... باید سؤالاتی معنی‌دار و جست‌وجوگر مطرح کرد و آنها را به پاسخ دادن تشویق نمود. • با طرح سؤالات ترغیب‌کننده در زمینه‌ی موقعیت‌ها فراگیران را تشویق کنند که تجاربشان را در مورد موقعیت‌های مختلف امتحان کنند."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "• با فراگیران کار کنید تا نتیجهٔ بازتاب‌هایشان را که نشئت گرفته از تجاربشان است تعمیم دهند. به آن‌ها کمک کنید تا این تجارب را با سایر موقعیت‌های مشابه مقایسه کنند. • فراگیرنده نهایتاً آنچه را در نتیجهٔ تجربه آموخته است با کاربرد آن در موقعیت جدید نشان خواهد داد. • این مرحله می‌تواند شامل ملاحظاتی از قبیل تنوع عملیات مختلف، بحث و گفت‌وگوی ضد و نقیض و بالأخره موافقت و پذیرش در عمل باشد."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "سؤالات زیر نمونه‌هایی است که می‌توانید از آن‌ها در مراحل گوناگون چرخهٔ یادگیری تجربی استفاده کنید. سؤالات بازی که می‌تواند فراگیرنده را به تفکر و تعمیم و نهایتاً به کاربرد آن مفهوم تشویق نماید."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "مرحله سؤالات تجربه • آنچه را در جلسهٔ گذشته اتفاق افتاد تعریف کنید. به‌خصوص از بهترین و بدترین تجاربتان که کسب کردید صحبت کنید. • موقعیت تجربه یا شرایطی را که داشتید شرح دهید. • در آن موقع چه احساسی داشتید؟ • چه چیزی منجر به رسیدن به این مرحله شد؟ بازتاب • دیگران در این مورد چه گفتند، چه احساسی و چه فکری داشتند؟ • قبل از این شما در چه موردی این احساس را داشتید؟ • آیا این اتفاق برای اولین بار برای شما افتاد؟ • این تجربه با تجارب قبلی شما چه تفاوت‌ها و مشابهاتی داشت؟ • چه چیزی این تجربه را خوب یا بد می‌کند؟ نتیجهٔ کلی یا حکم کلی (یادگیری) • چه عواملی منجر به این موقعیت شد؟ • چه مراحلی برای رسیدن به این مسئله یا عمل صورت گرفت؟ • چگونه می‌توان از اشتباه یا موقعیت بد برای برنامه‌های بعدی اجتناب کرد؟ • به چه چیزهایی نیاز دارید؟ • چیزهای مهم و بالعکس بی‌ارزش و کم‌اهمیت در مورد این تجربه و موقعیت چه بودند؟ • از این تجربه چه آموختید؟ • چرا این اتفاق افتاد؟ کاربرد • چه انتخاب‌های متفاوتی قابل دسترسی است؟ • دلایل موافق و مخالف هریک از انتخاب‌ها چیست؟ • من چگونه می‌توانم برای رسیدن به این هدف کمک کنم؟ • ابتدا به چه نیازی داریم؟ • ابتدا باید چه کار کرد؟ • چنانچه طرحتان موفقیت‌آمیز باشد، چگونه متوجه خواهید شد؟ • کی و چه کاری را باید انجام دهید؟"}, {"section": "چرخه‌ی یادگیری کُلب", "text": "این نوع سؤاالت باید در آموزش به کودکان نیز طراحی و اجرا شود."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "طبقه‌بندی فراگیران براساس چرخۀ یادگیری با توجه به چرخۀ یادگیری و یادگیری تجربی کُلب، فراگیران را می‌توان در چهار گروه تقسیم کرد: • همگون‌سازی یا جذب و درون‌سازی: پاسخ دادن به محیط فیزیکی بر طبق ساخت‌های شناختی موجود. جذب به نوعی درون‌سازی یا جور شدن ساخت‌های شناختی و محیط فیزیکی گفته می‌شود. جذب را می‌توان تا حدی دانستن یا بازشناسی دانست. بنابراین بهتر یاد می‌گیرد وقتی که تئوری‌های منطقی به او ارائه شود. • همگرایی: نوعی تفکر، مشخص است با ترکیب یا ادغام اطلاعات و معلومات متمرکز بر راه حل مسئله‌ای خاص. در تفکر همگرا برنامه‌های درسی از پیش تعیین شده است و فراگرفتن آنها برای دانش‌آموز حتمی و بی‌چون و چراست. در صورتی که یادگیری در انسان روندی پیچیده دارد و ذهن از راه‌های مختلف مسائل را درمی‌یابد. پس باید به دانش‌آموز فرصت داده شود که از تمام استعدادهای ذهنی خود برای دریافت مطالب استفاده کند. بنابراین بهتر می‌آموزد وقتی تئوری‌ها در کاربرد واقعی عملاً به آنها داده شود. • همسازی، انطباق برون‌سازی: تغییر دادن ساخت‌های شناختی ناشی از تجربه، برای قابل جذب کردن آنها به ساخت شناختی، که تقریباً معادل یادگیری است. یا به طور کلی، هر حرکت یا سازگاری، خواه درونی، خواه فیزیکی، که به منظور آمادگی در مقابل محرک‌های ورودی صورت می‌گیرد. بنابراین وقتی تجربیات عملی در اختیارش گذاشته شود، بهتر یاد می‌گیرد. • واگرایی: واگرایی به کار بردن رمزها و افکار است برای به‌دست آوردن یک سلسله وسیع از راه‌حل‌های یک مسئله یا مشکل. تفکر واگرا تفکری با حرکت در جهات مختلف مشخص است. و غالباً با خلاقیت مربوط می‌شود چون به راه‌حل‌های جدید می‌رسد. در سیستم درسی باید شاگرد تشویق شود مسئله را از هر راهی که بهتر تشخیص می‌دهد بررسی کند. و از این طریق است که می‌توان از همۀ اطلاعات در زمینه‌های مختلف یادگیری استفاده کرد. بنابراین زمانی که به او اجازه مشاهده و کسب اطلاعات گسترده داده شود بهتر یاد می‌گیرد. طبیعتاً هنرجو با چنین اطلاعات و تجاربی، مهارت‌های مورد نیاز شغلی خود را فرامی‌گیرد و به این ترتیب فردی موفق است، هم به عنوان مربی کودک و هم به عنوان مادری آماده و متعهد، مسئول در ساخت آیند‌ه‌ای بهتر."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "تهیۀ پوشۀ کار در همان جلسۀ اول از هنرجو بخواهید پوشه‌ای تهیه کند که نام و مشخصات او روی پوشه قید شده باشد. برای او توضیح دهید که تمرینات نمونه‌ها، طراحی‌ها و فعالیت‌های عملی، که از فصل‌های گوناگون کتاب در طی سال انجام می‌دهد، با ذکر نام و تاریخ و فصل کتاب موردنظر در این پوشه به‌طور منظم درج شود، تا در مراحل بعدی برای آموزش یک مفهوم به کار رود. کار عملی هنرجویان در پایان هر فصل با جدول ارزشیابی سنجیده می‌شود. علاوه بر این، نکات دیگری درخصوص اجرای کار عملی وجود دارد که باید برای دستیابی به اهداف، مورد توجه خاص قرار گیرد."}, {"section": "چرخه‌ی یادگیری کُلب", "text": "۱ـ برای انجام کار عملی فضا را آماده سازید و از قبل در مورد ابزار مورد نیاز اطلاع‌رسانی کنید. ۲ـ تشویق هنرجو مستلزم احترام به او، توجه به تفاوت‌های فردی و مهارت‌های خاص اوست، که در قبال کاری که انجام می‌دهد باید دریافت کند. ۳ـ به هنرجو نشان دهید که کلاس محیط مناسبی برای مشارکت است. پس از بی‌ارزش شمردن کار آنها بپرهیزید. ۴ـ هرگز کار عملی دانش‌آموز را به تمسخر نگیرید و آن را بی‌ارزش جلوه ندهید. ۵ـ پس از تکمیل کار عملی هنرجو باید او را از مرحلهٔ برنامه‌ریزی اقدامات مورد انتظار آگاه ساخت (قرار دادن آن در پوشهٔ کار عملی و استفادهٔ بهینه از آن در آموزش و برنامه‌ریزی نهایی). ۶ـ در حین فرایند ارزیابی، باید هنرجویان را از میزان پیشرفت کار عملی‌شان مطلع سازید و به یاد داشته باشید هنرجویان به صورت‌های گوناگون با انگیزه می‌شوند. گروهی با نمره، بعضی با نمایش کارشان یا برپایی نمایشگاه و بازدید از نمایشگاه‌ها که برای بعضی پاداش عظیمی است. ۷ـ زمانی که کارهای عادی کلاس جریان دارد، در مورد ملاک‌های ارزیابی صحبت کنید (اجرای صحیح فعالیت، کاربرد صحیح وسایل، نظم و انضباط، ایمنی و خلاقیت و ...) ۸ـ گاهی به هنرجو فرصت دهید که کار خود و دیگران را ارزشیابی کنند. این روش به آنها نشان می‌دهد که به آنها اعتماد دارید. ۹ـ نظر دانش‌آموز را در مورد نحوهٔ ارزیابی (نمره دادن) بپرسید و به روش‌های پیشنهادی آنها گوش دهید. شاید روش‌های مناسب‌تری پیشنهاد شود. ۱۰ـ برپایی نمایشگاه در اردیبهشت ماه بسیار ضروری است. به غیر از نمونهٔ کارهای عملی، دو فرم دیگر نیز باید به مرور کامل شود و در پوشه قرار گیرد: فرم شمارهٔ ۱ آموزش یک فعالیت و فرم شمارهٔ ۲ برنامه‌ریزی آموزشی برای آموزش یک فعالیت به کودکان باید هنرجو برنامه‌ریزی کند. لذا او، علاوه بر کسب اطلاعات گسترده در زمینهٔ یک فعالیت و انجام کارهای عملی و کسب تجارب در هر فصل، باید بتواند برای آموزش به کودکان برنامه‌ریزی کند (فصل ۱۱، ۲۱۰ تا ۲۱۶). لذا هنرجو پس از پایان هر فصل باید فرم شمارهٔ ۱ را برای آموزش یک فعالیت پرکند. این فرم شامل موضوع، هدف، نوع فعالیت و ... است، که گام به گام مراحل آموزش را دنبال می‌کند. آنچه در این فرم بسیار اهمیت دارد توجه به ویژگی‌های رشدی کودک است (فصل ۱) که براساس آن هنرجو باید برنامه‌ریزی کند. فرم شمارهٔ ۱ و راهنمای تکمیل آن و نمونهٔ کامل شده آن در صفحات ۵۰، ۵۱ و ۵۲ آورده شده است. تمرین و کار روی این فرم به مرور و مرحله به مرحله هنرجو را برای برنامه‌ریزی آموزشی یک مفهوم آماده می‌سازد. زیرا در هر فصل فعالیت جدیدی را می‌آموزد و برای تدریس آن به کودکان را پیش‌بینی یا طراحی می‌کند. به‌طور مثال در فصل دوم، پس از اینکه هنرجوها در زمینهٔ ویژگی‌های سنّی کودکان اطلاعاتی کسب کردند (فصل۱) باید بتوانند برای کودکان در زمینهٔ آموزش یک فعالیت (فرم شمارهٔ ۱) را پرکنند و به همین ترتیب با مطالعهٔ فصول بعدی در نوشتن فعالیت‌های کامل‌تر، آموزش بازی و هنر را درآمیزند، به‌طور مثال هدف، درست کردن یک کاردستی و استفاده آن در بازی باشد یا یک کاردستی که بتوان آن را به صورت بازیچه برای کودک سه‌ساله به کار"}, {"section": "چرخه‌ی یادگیری کُلب", "text": "گرفت و اینکه از نظر ایمنی و سلامت چه نکاتی را باید در آن منظور کرد یا کاردستی تهیه شده چگونه در زبان‌آموزی می‌تواند مورد استفاده قرار گیرد، الی آخر. به این ترتیب هنرجو با کسب اطلاعات گسترده، تمرین و تجربه و مشاهدهٔ عملی فعالیتش می‌تواند فکر کند که برای طراحی آموزشی چه برنامه‌هایی را بنویسد تا کودک آن مفهوم را از جهات مختلف بررسی نماید و درک کامل‌تر و کاربردی‌تری پیدا کند (یادگیری تجربی گُلب) هنرجویان با پرکردن نمونه‌هایی از فرم شمارهٔ ۱ و تمرین برای پرکردن فرم شمارهٔ ۲ آمادگی پیدا خواهند کرد."}, {"section": "راهنمای برنامه‌ریزی فعالیت آموزشی", "text": "شناخت عناصر فعالیت‌ها • موضوع فعالیت : نام فعالیتی است که برای آموزش مفاهیم در نظر گرفته می‌شود و محتوای موردنظر براساس هدف آن تهیه می‌شود. • هدف فعالیت : هدف با توجه به موضوع شکل می‌گیرد و منظور از آموزش را بیان می‌کند. • تأکید بر رشد : دلالت دارد بر تمرکز اصلی آن بر رشد فیزیکی، هیجانی و زیباشناسی، شناختی و زبان • محل اجرا و یا مراکز رغبت : محل پیشنهادی برای اجرای برنامه شامل دور هم بودن (گردهمایی) فضای بیرون و داخل یا در مراکز رغبت، هنر، فضا برای نمایش و اجرا • تعداد کودکان : تعیین تعداد کودکان برای اجرای هر فعالیت • مدت زمان : تخمین زدن زمان تقریبی‌ای که هر فعالیتی نیاز دارد. • سن تقریبی یا میانگین سنی : سه تا چهار ساله‌ها و چهار تا پنج ساله، که به توانمندی و مناسب بودن فعالیت کمک می‌کند. • مواد : مواد و ابزار پیشنهادی که برای اجرای فعالیت‌های فهرست شده نیاز است. • آماده‌سازی و تنظیم قبل از اجرا : آماده کردن مواد مورد نیاز و پیشنهاد برای مراحل کار جهت سهولت فعالیت‌ها • روش کار یا استراتژی معلم : توصیه‌ی کارهای مربی که فعالیت‌ها را رهبری می‌کند. این مسئله شامل مراحل اجرا و مشارکت کودکان در برنامه است. • پیامد حاصل از آموزش : شرح رفتارهایی که انتظار دارید، بعد از اجرای آن فعالیت کودک به آن برسد، که شامل مفاهیم، خزانه لغات و مهارت‌هاست. • مفاهیم : منظور ایده‌ی اصلی و روشی است که از هدف نشئت گرفته است. • مهارت‌ها : رشد توانایی که در برنامه‌ریزی و فعالیت روی آن تمرکز شده است. • خزانه‌ی لغات : کلمات مرتبط با موضوع و هدف را در مکالمات و انجام فعالیت‌ها به کار گیرد."}, {"section": "راهنمای برنامه‌ریزی فعالیت آموزشی", "text": "یک نمونه تکمیل شده فرم شماره ۱"}, {"section": "راهنمای برنامه‌ریزی فعالیت آموزشی", "text": "موضوع فعالیت : من رشد می‌کنم. هدف : کسب تجارب برای اندازه‌گرفتن و دقت در رشد. تأکید بر رشد : شناختی و کلامی محل اجرا : فضای درونی کاردستی هنر و فعالیت‌های دست‌ورزی تعداد کودکان : ۱۰ نفر زمان : بستگی به ادامه کار کودکان دارد. سن : چهار تا پنج ساله‌ها مواد لازم : جورچین (پازل)، وسایل ساختمان‌سازی، کارت اعداد، نوار اندازه‌گیری (۱ متر)، نخ، پاکت، قیچی، تعدادی کارت مقوایی، تصاویری از دست، پا و سر، ترازوی وزن‌کشی، ماژیک و مقوای بزرگ زمینه‌سازی قبل از اجرا : تمام وسایل را در سبد یا محل مخصوص قرار دهید. این ابزار را در بخشی که برای پرورش حواس یا کاردستی است قرار دهید."}, {"section": "راهنمای برنامه‌ریزی فعالیت آموزشی", "text": "روش کار مربی ۱ـ مواد جدید را معرفی می‌کند و در مورد اندازه‌گیری با دست، انگشت، پا، ساق پا، نوار اندازه‌گیری و نخ صحبت می‌کند. ۲ـ بچه‌ها را دو به دو تقسیم می‌کند تا بعد از اندازه‌گیری دست و پای هر یک، حتی انگشتان آنها با نخ، نخ‌ها را علامت بزنند و ببرند."}, {"section": "راهنمای برنامه‌ریزی فعالیت آموزشی", "text": "پیامد حاصل از آموزش مفاهیم : انگشت‌ها، ساق‌پاها و بازوها دارای اندازه‌های متفاوتی هستند. نوار اندازه‌گیری اندازه دقیق را به ما نشان می‌دهد. مهارت‌ها : اندازه‌گیری، مقایسه خزانه لغات : اندازه، درازا، پهنا، سانتی‌متر همراهی بچه‌ها : بچه‌ها روی مقوا می‌خوابند، دورشان را با ماژیک بکشید. از آنها بخواهید این مقوا را (مو، لباس و ...) را رنگ‌آمیزی و پوستر کلاسی بزرگی تهیه کنند. این اندازه‌گیری را روی وزن، اندازه مو و ... ادامه دهید."}, {"section": "راهنمای برنامه‌ریزی فعالیت آموزشی", "text": "در فرم برنامه‌ریزی (شماره ۲) مربی کودک و یا هنرجو، با توجه به ویژگی‌های سنی کودکان، برای آموزش یک مفهوم باید او را درگیر فعالیت‌های مختلف نمود. بنابراین، علاوه بر توجه به ویژگی‌های سنی و انواع فعالیت‌ها، که محل انجام آنها می‌تواند در مراکز رغبت باشد (زیرا برای هر فعالیتی وسایل و ابزار خاص لازم است)، به کودکان فرصت دهیم تا با توجه به تفاوت‌های فردی و هوش چندگانه زمینه برای یادگیری بهتر فراهم گردد. در اینجا پیشنهاد می‌شود در طراحی این فرم (فرم شماره ۲) بهتر است نام مرکز رغبت برای هر فعالیتی مشخص شود، ضمیمه است. راهنمای تکمیل فرم شماره ۲ در صفحات ۵۴ و ۵۳ آمده است."}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "زمان اجرا: .../.../... نام مربی: گروه کودکان: نام پروژه: هدف اصلی:"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "نوع فعالیت‌ها در فضای برنامه"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "هنر بازی و فعالیت‌های خلاق سلامتی، بهداشت، تغذیه ارتباطات کلامی ریاضی حرکات جسمانی موسیقی و شعر علوم مهارت‌های اخلاقی و اجتماعی فعالیت‌های گروهی:"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "• فعالیت‌ها باید با توجه به رشد همه‌جانبه کودک (جسمانی، هیجانی، شناختی، زبانی و اجتماعی) صورت گیرد."}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "راهنمای تکمیل فرم برنامه‌ریزی مفاهیم آموزشی (فرم شمارهٔ ۲) براساس فعالیت‌ها در مراکز رغبت"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "علوم زبان، ادبیات و ارتباطات هنر علوم ادبیات هنر رسانه‌ای علوم فیزیکی و جسمانی ارتباطات کلامی تجارب هنری زیستی سوادآموزی هنر کاردستی اکتشافات خواندن فعالیت‌های خلاق گیاهان دوزبانگی شکل و فرم حیوانات هنر زبان فناوری (تکنولوژی) ریاضیات ادراکات اجتماعی موسیقی و ریتم حساب و فناوری دنیای اجتماعی موسیقی و ریتم زمان، فضا، اعداد کمک‌رسان‌های ارتباطی مردم جهان تجارب موسیقی اندازه و شکل نمایش‌های اجتماعی ترانه و بازی‌های انگشتی تجارب ریاضی آموزش فرهنگ‌ها آواهای موسیقایی حرکات نمایش خلاق سلامت، ایمنی و تغذیه حرکات تجارب نمایشی سلامت حسی حرکتی عروسکی ایمنی ادراکات حسی نمایش‌های اجتماعی تغذیه ادراکات حرکتی آشپزی"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "نمونه تکمیل شده برنامه‌ریزی آموزشی فرم شماره ۲ موضوع: معرفی حیوانات اهلی هدف: معرفی یک مزرعه حیوانات به کودکان و آشنایی آنها با مزرعه‌دار (کشاورز) و کاری که آنها انجام می‌دهند. • هنر • رنگ‌آمیزی با آبرنگ حیوانات مزرعه • تهیه یک کاردستی از مزرعه (روی یونولیت) با استفاده از حیوانات پلاستیکی کوچک • تهیه پوستر و چسباندن عکس حیوانات (کار گروهی) • موسیقی و حرکت • استفاده از صدای حیوانات و تقلید صدا و حرکات آنها • استفاده از نوارهایی با صدای حیوانات • علوم • بحث در مورد وضعیت ظاهری حیوانات (پشم و پوست و پر) • بحث در مورد غذای آنها • بحث در مورد بچه‌های حیوانات (کره اسب، گوساله و ...) • بحث در مورد تخم مرغ و مراحل تبدیل آن به جوجه • بحث در مورد موارد مصرف آنها • ریاضیات • طبقه‌بندی حیوانات براساس شکل، رنگ و اندازه • جور کردن حیوان با بچه‌اش • اندازه‌گیری تخم پرنده‌ها با تخم مرغ • شمردن تعداد حیوانات در پوستر و کاردستی مزرعه • سلامت و ایمنی • مزه و طعم ماست و شیر • خطرات ناشی از مسمومیت شیر • درست کردن کره • درست کردن نان • نمایش خلاق • وانمود کردن برای صدا و حرکات حیوانات • اجرای قسمتی از کتاب‌های خوانده شده • ارتباطات و ادبیات • کتاب‌هایی در مورد زندگی حیوانات مزرعه • کتاب‌هایی با قهرمانی حیوانات مزرعه • آشنایی با نام بچه‌های حیوانات (کره اسب، جوجه، گوساله، بره) • فعالیت گروهی • خواندن کتاب (مرغ سرخ پاکوتاه) • میهمان: مزرعه‌دار • ابزار برای کار در صورت امکان • آوردن حیوانات یا بردن کودکان برای بازدید • تصاویر کلاسی می‌تواند پوستر آنها بعد از اتمام باشد."}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "نمونه تکمیل شده از برنامه‌ریزی مفاهیم آموزشی (فرم شمارهٔ ۲) موضوع درس یا آموزش: حمل و نقل هدف: معرفی وسایل نقلیه به کودکان و شناخت علائم ایمنی برای آنها"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "هنر _ کولاژ از تصاویر ماشین‌های مختلف _ استفاده از لاستیک ماشین اسباب‌بازی برای چاپ _ رنگ کردن عکس ماشین"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "زبان‌آموزی ادبیات و ارتباطات _ نام بردن انواع وسایل حمل و نقل (ماشین، وانت، کامیون) _ گفتن مشخصات ماشین و حدس زدن نام _ خواندن کتاب"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "علوم _ ابزار ماشین (چرخ، دنده و ...) _ فعالیت‌های آهن‌ربا _ شناخت قسمت‌های ماشین"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "ریاضیات _ اندازه ماشین‌ها _ اندازه لاستیک‌ها _ شمردن ماشین‌ها و تعداد پارکینگ _ میزان گنجایش کامیون‌ها و اندازه‌گیری"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "سلامت و ایمنی _ علائم راهنمایی و رانندگی _ چهارراه‌ها و چراغ‌ها"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "مطالعات اجتماعی _ شناخت محدوده‌های وسایل نقلیه _ درست کردن جاده و استفاده از علائم _ درست کردن جاده روی میز شن بازی و رعایت نکات راهنمایی _ نکات مهم در حمل و نقل عمومی"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "حرکات و موسیقی _ وانمود کردن برای رانندگی _ وانمود کردن حرکت ماشین‌ها _ وانمود کردن به عنوان چراغ راهنمایی (قرمز، سبز و زرد) _ ماشین بازی خیالی _ نوار صدای وسایل نقلیه و حدس زدن"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "فعالیت‌های گروهی _ فعالیت گروهی برای حمل وسایل با واگن‌های بازی _ بازی واگن (دو گروه که هریک به عنوان یک واگن گروه دوم را می‌کشد) _ شناخت علائم ایمنی _ کار وسایل نقلیه عمومی"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "میهمان‌ها (واردین) _ راننده اتوبوس _ نگهبان پارک اتومبیل _ تعمیرکار دوچرخه یا مکانیک"}, {"section": "فرم شمارۀ ۲ـ فرم برنامه‌ریزی مفاهیم آموزشی", "text": "تصاویر کلاسی _ علائم رانندگی _ ماشین‌های گوناگون _ مواظب بودن و فرز بودن"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "موضوع فعالیت: زندگی حیوانات (جوندگان) موش هدف: به کودکان فرصت دهیم تا با زندگی یکی از جوندگان (موش) آشنا شوند. نام پروژه: موش با تأکید بر رشد همه‌جانبه رشد جسمانی: زبان رشد شناختی: هیجانات و عواطف"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "هنر ریاضیات ادبیات (کتاب‌ها) • کاردستی بریدن و چسباندن تصاویر • شمردن تعداد موش‌ها • موش کوچولو • ترکیب کردن آن‌ها (کولاژ) • مفهوم بزرگ، کوچک • موش و مار • بالا و پایین • موش شهری و موش روستایی • پشت دیوار چه خبر؟ • پشت پستوی مشهدی باقر چه خبر؟ • موش و موش کوکی درک اجتماعی علوم سلامتی، بهداشت و تغذیه • نوعی زندگی موش‌ها • شکل موش • نوع خطر موش • در شهر و روستا • انواع موش‌ها • موادی که می‌خورد. • موش کور • موادی که آلوده می‌کند. ضرب‌المثل‌ها • موش خرمایی • نحوهٔ اجتناب از موش • موشه آب کشیده • موش سیاه • تمیز نگاه داشتن محیط • موش تو آش انداختن • موش صحرایی • ویژگی‌ها • محیط زندگی • مکانیزم‌های دفاعی بازی • موش و گربه • نمایش خلاق وانمودسازی"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "ترانه • یک روز یک آقا خرگوشه"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "اگر توجه کنید این تلفیق نگاهی به هوش چندگانه نیز دارد. زیرا هر یک از این فعالیت‌ها در راستای تقویت یکی از هوش‌هاست. به‌طور مثال: • بازی کردن (حلقه‌ای درست کنید یکی گربه و دیگران موش. با علامت از پیش تعیین شده مربی، موش‌ها حرکت می‌کنند. گربه باید موش‌ها را، که حلقه را ترک می‌کنند، بگیرد) (هوش حرکتی و میان‌فردی) • وانمود کنید که موش هستید (جویدن، حرکت، چنگ زدن) (هوش حرکتی و درون‌فردی) • از میان تصاویری از حیوانات یا حیوانات مینیاتور پلاستیکی موش‌ها را جدا کنید. (هوش مکانی) • عکس موش را از مجلات ببرید و به‌صورت کولاژ روی یک مقوا یا در دفترچه بچسبانید. (هوش مکانی و حرکتی) • شعری با سوژهٔ موش با کودکان بخوانند (یک روز یک آقا خرگوشه، دوید دنبال موشه). (هوش موسیقیایی) • قصه‌ای با قهرمانان موش برای بچه‌ها بخوانید (داستان موش و مار) و یا قصهٔ موش شهری، موش صحرایی. (هوش زبانی) • تصاویری از حیوانات از جمله موش در اختیار بچه‌ها قرار دهید تا آن‌ها را براساس جثه طبقه‌بندی کنند. سپس آن‌ها را بشمارید. (هوش مکانی، منطقی و ریاضی) • در طبیعت لانهٔ موش را جست‌وجو کنند و یا در کتب علمی زندگی و انواع و لانه‌سازی موش را بررسی کنید (شکل - انواع). (هوش طبیعت‌گرا)"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "چند عنوان برای برنامه‌ریزی آموزشی و آموزش فعالیت‌ها فرم شمارۀ ۱ و ۲ ـ سلامت دندان ـ دارو آب نبات نیست. ـ ذوب شدن یخ ـ دانۀ گیاهان ـ شناخت اعضای بدن ـ زندگی یک دوزیست (قورباغه) ـ پوشش حیوانات ـ مشاغل (پلیس، آتش‌نشان، نانوا) ـ بچۀ حیوانات ـ پختن نان ـ وسایل حمل و نقل ـ آشنایی با آتش‌نشانی ـ آشنایی با علائم رانندگی ـ شناخت برگ‌ها ـ شناخت لبنیات"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "یک پروژۀ آموزشی (برای طراحی برنامه‌ریزی یک مفهوم) این فعالیت هنرجو را گام به گام با طراحی آشنا می‌کند. ۱ـ انتخاب موضوع (میوه‌ها) ۱ـ۱ـ میوه‌ها از چند جهت قابل بررسی هستند. (از هنرجو بپرسید)"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "میوه‌ها انواع نحوۀ استفاده نام(۵۸"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "۲ـ۱ـ شما چه نکاتی را می‌توانید برای این موضوع اضافه کنید؟"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "۳ـ۱ـ باز هم کامل‌تر کنید (با رنگ‌های مختلف نشان دهید) بگذارید هنرجویان تمام مواردی را که در خصوص میوه در ذهن دارند را به طرح اولیۀ شما اضافه کنند. از هنرآموز بخواهید مفاهیمی را، که نهایتاً کودکان از این موضوع (میوه‌ها) خواهند آموخت، بنویسند. این مفاهیم هدف آموزشی‌ای خواهد بود که با توجه به ویژگی‌های سن مورد نظر، تنظیم می‌شود."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "۲ـ اهداف ـ نام میوه، انواع، کاربرد، نحوۀ ارائه ـ نیاز گیاهان، محل رشد گیاه ـ مراقبت‌های خاص (شستن میوه، خام نخوردن، پوست کندن)"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "۲ـ۱ـ با توجه به اهداف، برنامه‌ریزی می‌تواند به مسائل خاص اختصاص یابد، در واقع مفاهیمی که کودکان یاد خواهند گرفت. ـ میوه‌های گوناگونی وجود دارد. ـ اغلب آن‌ها توسط دانه زیاد می‌شوند. ـ بعضی را با پوست و بعضی را بدون پوست می‌خوریم. ـ بعضی خام و بعضی پخته مصرف می‌شوند."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "از هنرجو بخواهید اهداف و همچنین مواردی را برای آموزش اضافه کنند. ۳ـ برای آموزش مفهوم میوه، با توجه به اهداف، فعالیت علمی طراحی کنید، مثل: ـ نشان دادن انواع میوه‌ها و نام بردن و طبقه‌بندی کردن آن‌ها"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "— بریدن میوه و خوردن (طعم و مزه و بو) — کاشتن دانه‌ها — شناخت میوه‌های فصول مختلف • از هنرآموزان بخواهید فعالیت علمی بیشتری مطرح کنند و با پرکردن فرم شماره ۱ (آموزش یک فعالیت) چندین طرح آموزش فعالیت برای این پروژه تهیه نمایند. ۴ـ برای آموزش همین مفهوم از هنرجویان بخواهید فعالیت‌های هنری طراحی کنند، مثل: — کلاژ تصاویر میوه‌ها — کلاژ دانه‌ها — استفاده از فیبر • هنرجو را تشویق کنید فعالیت‌های هنری بیشتری پیشنهاد کنند. ۵ـ از هنرجو بخواهید چندین فعالیت برای استفاده کاربردی از میوه‌ها طراحی کنند، به طور مثال: درست کردن کمپوت درست کردن مربا ۶ـ از هنرجو بخواهید در خصوص سلامتی و بهداشت فعالیتی را طراحی کند. به طور مثال: — طرز خوردن میوه، شستن آن و پوست کندن — پرورش حواس در این نوع فعالیت‌ها می‌توانند از کتاب یا نمایش خلاق نیز استفاده کنند. ۷ـ در راستای همین پروژه از هنرجو بخواهید در خصوص مسائل اجتماعی و اخلاقی نیز فعالیتی را طراحی کند، به طور مثال: — صحبت صاحبان مشاغل (راننده کامیون، باغ‌دار، کشاورز) — صحبت مغازه‌دارها (قصابی، نانوایی، میوه‌فروشی) — بازدید از یک مرکز یا ... — نقش آفرینش — شکرگزاری و اسراف نکردن ۸ـ در راستای همین پروژه چند فعالیت برای مفاهیم ریاضی طراحی کنند، به طور مثال: — ترسیم و شکل میوه (اشکال هندسی) — طبقه‌بندی بر اساس رنگ، فرم، شکل ۹ـ ارائه کتاب‌های پیشنهادی برای این پروژه، همچنین شعر و سرود — گفت و گوی درختان — درخت بخشنده ۱۰ـ طراحی بازی و حرکت بر اساس همین پروژه — حدس بزن چه میوه‌ای هستم؟"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "— نام بردن میوه‌ها براساس میله‌ای از میوه‌ها — پازل یا دومینوی میوه‌ها."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "به این ترتیب هنرجو گام به گام می‌تواند به هدف کلی، که نگاه همه‌جانبه به مفهوم میوه است، برسد. درواقع پیامد حاصل از آموزش، که با توجه به هدف طراحی شده است، کودکان با مفاهیم گوناگونی در مورد میوه‌ها آشنا شده‌اند (شکل، رنگ، مزه، کاربرد و...). آنها مهارت در مورد شناخت میوه‌ها، کاربردشان و حتی تهیه‌ی بعضی از آنها را یاد گرفته‌اند (از طریق شعر، کاردستی، کسب تجارب دست اول، دست‌ورزیده)."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "خزانه‌ی لغات: خاک، نور، آب، پختن، خشک کردن، ریشه، ساقه، میوه، پختن، باغبان و ..."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "در اینجا با توجه به تنوع فعالیت‌ها، هوش چندگانه‌ی «گاردنر»، تمرکز کوتاه کودک و رسیدن به تجارب دست اول نیز به خوبی رعایت شده است. شما می‌توانید از این طرح و طرح‌های مشابه برای کامل کردن فصل ۱۱، که هدف اصلی کتاب است، آماده کنید و فعالیت‌ها را به ترتیب بر اساس فصل کتاب تنظیم نمایید. سن کودکان، بازی‌ها، هنر و ...، در نهایت فصل ۱۱ را تکمیل خواهند کرد."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "پروژه: یک پروژه‌ی آموزشی دیگر برای برنامه‌ریزی یک مفهوم. این نمونه هنرجو را گام به گام با طراحی و برنامه‌ریزی آموزشی یک مفهوم آشنا می‌کند. به یاد داشته باشید که در برنامه‌ریزی برای آموزش باید و می‌توان از مفاهیم ساده و ملموس استفاده کرد (مثلاً کلاه)."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "۱ـ از هنرجو بخواهید آنچه را که در مورد کلاه می‌تواند طبقه‌بندی کند. پس نام پروژه «کلاه» است."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "• بخش‌های مختلف کلاه: بند، لبه، کاسه • جنس: کاموا و پشم، پلاستیک، کائوچو، چرم، حصیری، نخ • اندازه: کوچک، متوسط، بزرگ • مدل و شکل: اسکی، کلاه اسب‌سواری، روستائی، (نمدی)، نوزادان، کلاه بزرگسالان • رنگ: قرمز، زرد، آبی، سبز، سفید، سیاه • برای چه افرادی کاربرد دارد: پلیس، نامه‌رسان، موتورسیکلت‌سواران، بازیکنان بعضی از ورزش‌ها (اسب‌سواری، شنا)، مراسم رسمی"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "۲ـ از آن‌ها بخواهید ذیل هر موضوع آنچه را می‌دانند، اضافه کنند (شما می‌توانید این طرح را روی تخته پیاده کنید). ۳ـ با مشارکت هنرجویان و کامل کردن طرح کلاه فکر می‌کنید کودکان از این موضوع چه یاد می‌گیرند؟ از هنرجو بخواهید اهداف موضوع را بنویسد: ۱ـ انواع کلاه‌ها ۲ـ استفاده‌کنندگان از کلاه ۳ـ رنگ ۴ـ اندازه ۵ـ جنس فکر کنید یک موضوع دیگر از قلم افتاده است بله ۶ـ قسمت‌های مختلف کلاه. ۴ـ براساس اهداف موضوعی به راحتی می‌توانید مفاهیمی را، که کودکان از این موضوع خواهند آموخت، بنویسید، به طور مثال: ـ کلاه یک وسیله حفاظتی است. ـ کلاه برای مشاغل گوناگون قابل استفاده است. ـ کلاه از جنس‌های گوناگون ساخته می‌شود. ـ بعضی کلاه‌ها برای محافظت از سرماست. ـ بعضی کلاه‌ها برای جشن‌ها مورد استفاده است. ٭ شما چه اهداف دیگری را می‌شناسید و مفاهیمی را که کودکان از این طرح خواهند آموخت نام ببرید. ۵ـ هنرجویان را تشویق کنید که با کشیدن و رنگ‌آمیزی کلاه‌های مختلف، آن‌ها را ببرند و یک کولاژ تهیه کنند (کودکان نیز می‌توانند این فعالیت را انجام دهند یا از مجلات عکس کلاه را ببرند و بچسبانند)."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "یک پیشنهاد هیچ می‌دانید که در اینجا فرصت خوبی است که برای بچه‌ها داستان یا قصه‌ای در مورد کلاه بگویید، مثلاً «کلاه‌های فروشی». مردی کلاه فروش که دوره‌گرد است، روزی کنار درختی خوابش می‌برد. وقتی بیدار می‌شود می‌بیند از کلاه‌هایش خبری نیست. با نگرانی و عصبانیت کلاه سرش را برمی‌دارد و فریاد می‌زند که وای چه شد؟ در همین موقع چشمش به بالای درخت می‌افتد که تعدادی میمون کلاه‌های او را بر سر دارند. کلاه فروش ناگزیر فریاد می‌زند کلاه‌هایم را بدهید. میمون‌ها از فریاد او تقلید می‌کنند اما کلاه را همچنان بر سر دارند. کلاه فروش فکری به سرش می‌زند و این بار کلاه خودش را با فریاد پرتاب می‌کند. میمون‌ها نیز چنین می‌کنند. کلاه فروش، کلاه‌ها را جمع می‌کند و به راهش ادامه می‌دهد."}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "گاهی عکس این فعالیت نیز جالب است. بعد از گفتن قصه، آنها را تشویق به تهیه‌ی کولاژ کنید. هنرجوی شما برای آموزش یک مفهوم یک فعالیت هنری انجام داده است: کشیدن، رنگ‌آمیزی، بریدن و چسباندن (کولاژ)، همچنین برای بخش ادبی و ارتباطی (قصه گفته است) و حتی نمایش خلّاق بچه‌ها (صحنه‌ی پرتاب کلاه توسط کلاه‌فروش و میمون‌ها). • درست کردن کلاه با روزنامه و مقوا پیشنهاد دیگری‌ست (کاردستی) • شما چه پیشنهادی دارید؟ • می‌توانید از کودکان بخواهید برای یک روز خاص هریک کلاهی بیاورند، مثل روز کلاه‌های محبوب من. این فعالیت می‌تواند با تصاویر یا شیئی واقعی همراه باشد. در مورد هریک از کلاه‌ها صحبت و بحث کنید. این یک فعالیت چندجانبه است. مثل پروژه کلاس"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "از هنرجویان بخواهید: برای مفهوم ریاضیات ۱- تعدادی عکس کلاه‌های مختلف را از روزنامه‌ها و مجلات ببرند و روی مقوا بچسبانند. سپس مقوا را به دو قسمت تقسیم کنند (پازل دو قطعه) از کودکان بخواهند تکه‌ی درست هر کلاه را انتخاب کنند و آنها را جور کنند. ۲- تعدادی کلاه در جعبه‌ای بگذارند تا کودکان آنها را براساس اندازه مرتب کنند. می‌توانند براساس رنگ یا جنس کلاه نیز طبقه‌بندی را انجام دهند. • آنها را در همین خصوص به طراحی فعالیت‌های ریاضی تشویق کنید. از هنرجویان بخواهید برای آشنایی با مشاغل، بازی طراحی کنند، مثل: ۱- بازی حدس بزن من کیستم؟ با گذاشتن کلاهی خاص (پلیس، پستچی، پرستار و ...) یا نشان دادن تصاویر این کلاه‌ها بچه‌ها حدس بزند که کلاه متعلق به کیست؟ • آنها را تشویق کنید که فعالیت‌های دیگری برای بازی طراحی کنند. ۲- بازدید از مغازه‌ی کلاه‌فروشی را پیشنهاد کنید. • فعالیتی در همین پروژه برای علوم طراحی کنید، به‌طور مثال: ۱- جنس کلاه از چیست؟ شما چه حدس می‌زنید؟"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "ـ آیا کتاب‌هایی را می‌شناسید یا قصه‌ای را شنیده‌اید که در آن‌ها کلاه موضوع اصلی باشد؟ آیا شعر یا سرودی شنیده‌اید که مرتبط با کلاه باشد؟ واژه‌ها و خزانه لغات کلاه، کاربرد کلاه، قسمت‌های مختلف کلاه (لبه و کاسه) و"}, {"section": "نمونه دیگری از برنامه‌ریزی آموزشی (فرم شمارهٔ ۲)", "text": "طراحی درس و ارزیابی آن از آنجا که برنامه‌ریزی اساس یک آموزشِ مؤثر است. علاوه بر راهنمای تدریس، که برای هر فصل منظور شده است، شما می‌توانید ساده‌ترین مدل برنامه‌ریزی درسی را برای خودتان طراحی کنید و براساس این چهارچوب تدریس را آغاز کنید. اما به یاد داشته باشید که با طرح سؤالات زمینه‌ساز قبل از تدریس (طرح یک موضوع روز، تهیهٔ پوستر، گفتن قصه، طرح یک مسئله، نشان‌دادن فیلم و عکس و ...) کلید جرقهٔ فکری زده شود. در اینجا فرمی برای طراحی برنامهٔ درسی معلم پیشنهاد شده است، که با توجه به راهنمای هر فصل، می‌تواند آن را برای خود کامل کند. علاوه بر این در انتهای هر فصل فرمی برای ارزیابی تدریس (معلم) طراحی شده که برای فصول بعدی یا استفاده در سال‌های آینده می‌تواند مفید باشد."}, {"section": "طراحی درس", "text": "چنانچه طراحی برای هر فصل برایتان مشکل است می‌توانید در فرم زیر برنامۀ تدریس خود را طراحی کنید و بنویسید. قبل از پر کردن این فرم باید کلیۀ سؤالات را بخوانید."}, {"section": "طراحی درس", "text": "• هدف این مبحث چیست؟ • از فراگیران می‌خواهید چه چیز را یاد بگیرند؟ (خروجی تدریس) • روش و الگویی که به کار می‌برید چیست؟ • آیا هیچ‌گونه مشکل یا مسئله‌ای در خصوص محتوا و فراگیران وجود دارد که باید در اینجا روی آن دقت کنید. اگر وجود دارد آن را مشخص کنید. • چه منابع یا چه آموزشی در این مبحث به کار می‌گیرید؟ • چگونه فضا و محیط را برای این بخش آماده کنید؟ • محل نشستن بچه‌ها را چگونه باید کنترل کنید؟ • چگونه و با چه وسیله‌ای در مورد برنامه‌تان قضاوت خواهید کرد؟ • قبل از شروع درس دانسته‌های هنرجویان را در ارتباط با موضوع ارزیابی کنید. • آیا از برنامه‌ریزی خودتان راضی هستید، بله یا خیر. علت را مشخص کنید."}, {"section": "طراحی درس", "text": "فرم ارزیابی هنرآموز بعد از تدریس هر فصل چگونه تدریسم را در آینده بیشتر اثرگذار کنم؟"}, {"section": "طراحی درس", "text": "چه فعالیت‌ها و برنامه‌ای را باید بیشتر انجام دهیم؟ چه نیاز و فعالیت‌هایی را فراگیرانم باید بیشتر انجام دهند؟ چه فعالیت‌ها و برنامه‌ای را کمتر باید انجام دهیم؟ فراگیرانم چه فعالیت‌ها و نیازهایی را باید کمتر انجام دهند؟ سایر پیشنهادها:"}, {"section": "طراحی درس", "text": "هنرآموز عزیز خود را بیازمایید لطفاً برنامۀ تدریس ریاضی را مطالعه کنید و جلوی هر ردیف بنویسید چه فعالیتی قابل اجراست. یک برنامۀ تلفیقی برای تدریس ریاضی: ۱ـ شمارش تعداد گام‌های بچه‌های (۵ یا ۶ ساله) ۲ـ اندازه (کوچک، کوچک‌تر، کوچک‌ترین، سبک، سبک‌تر، سبک‌ترین، همانند و ...) ۳ـ مکان (جلو، جلوتر، جلوترین، بالا، بالاتر، بالاترین و ...) ۴ـ زمان (امروز، دیروز، فردا، زود، دیر و ...) ۵ـ پرش از ارتفاع (پرش زمینی، پریدن از روی طناب و ...) ۶ـ ساختن شکل اعداد با بدن ۷ـ کشیدن شکل اعداد روی شن و ماسه ۸ـ درست کردن شکل اعداد و اشکال هندسی با طناب ۹ـ حرکت روی زمین بر اساس اشکال، خطوط منحنی و زیگزاگ غیرمستقیم ۱۰ـ استفاده از ساعت و نام بردن اعداد ۱۱ـ توجه به صدای حیوانات و اجرای حرکات آن‌ها و تقلید صدا ۱۲ـ توجه به حرکات حیوانات و مقایسۀ حرکات آن‌ها با دیگر حیوانات (طبقه‌بندی) ۱۳ـ گوش کردن به ریتم موسیقی و شمارش ضرباهنگ ۱۴ـ نقاشی کردن و کشیدن اعداد با مداد رنگی ۱۵ـ بیان یک قصۀ مرتبط با اعداد ۱۶ـ بازی «یک مرغ دارم» ۱۷ـ خواندن شعر اعداد ۱۸ـ اجرای پانتومیم (از اشکال و اعداد و حدس زدن آن‌ها) ۱۹ـ استفاده از کولاژ (اعداد) ۲۰ـ تمرین برای گرفتن شمارۀ تلفن و آدرس ۲۱ـ تعادل و بالانس و جاذبه، پاروزدن، اهرم، پرتاب و پرتاب توپ با ریتم موسیقی ۲۲ـ مرتب کردن اشیاء بر اساس شکل و رنگ ۲۳ـ اشاره به آسمان و شمردن ماه، ستاره و خورشید و نقش آفریدگار. شما می‌توانید با جمع‌بندی فعالیت‌های صورت‌گرفته مشخص کنید برای یک مفهوم (ریاضی) از چند روش تدریس و فعالیت استفاده کرده‌اید؟"}, {"section": "نقش و اهمیت آموزش مفاهیم ریاضی در دوران پیش از دبستان", "text": "هدف‌های رفتاری: در پایان این فصل، دانش‌آموز باید بتواند: • ضرورت آموزش مفاهیم ریاضی به کودکان را توضیح دهد. • روش‌های آموزش مفاهیم ریاضی به کودکان را توضیح دهد. • مفاهیمی را، که به کودکان پیش‌دبستانی باید آموزش دهند، فهرست کند. • هریک از مفاهیمی را، که به کودکان پیش‌دبستانی باید آموزش دهند، توضیح دهد. • نکاتی را، که والدین و مربیان در آموزش مفاهیم ریاضی باید بدانند، توضیح دهد. • در مورد آموزش هریک از مفاهیم ریاضی، فعالیت‌های مناسبی را طراحی کند."}, {"section": "نقش و اهمیت آموزش مفاهیم ریاضی در دوران پیش از دبستان", "text": "تعریف ریاضی برای آشنایی با هر موضوعی، باید ابتدا تعریف روشنی از آن ارائه داد. در مورد ریاضی، تعاریف متعددی وجود دارد که به اختصار به آن‌ها اشاره می‌شود: • ریاضی، روش فکر کردن است. با کمک ریاضی می‌توان به راهبردهایی برای سازماندهی افکار، تجزیه و تحلیل، ترکیب داده‌ها و نظم فکری دست یافت. • ریاضی، ابزار است. این ابزار، هم در زندگی روزانه برای همه‌ی افراد مورد استفاده قرار می‌گیرد و هم در بسیاری از مشاغل، کاربرد دارد. از جمله مهندسان در علوم کاربردی، برای طراحی ساختمان‌ها، پل‌ها و ... از آن استفاده می‌کنند. ریاضی، زبان است. ریاضی دارای اصطلاحات دقیق و نمادهای معینی است که توانایی ما را در توضیح مسائل و بیان یافته‌های علمی، افزایش می‌دهد (مانند اعداد، فرمول‌ها و نشانه‌های ریاضی). • ریاضی، مطالعه و بیان روابط است. انسان، نیازمند شناخت روابط موجود بین پدیده‌های محیط پیرامون خود است. به کمک ریاضی می‌توان از این روابط آگاه شد."}, {"section": "نقش و اهمیت آموزش مفاهیم ریاضی در دوران پیش از دبستان", "text": "• ریاضی، دانش ناب بشری است. ریاضی نه تنها خود در حل بسیاری از مسائل به ما کمک می‌کند، بلکه در همه ی رشته‌های دانش بشری، مورد استفاده قرار می‌گیرد. • این تعاریف، هرکدام، جنبه‌ای از دانش ریاضی را توصیف می‌کند. تعریف کامل ریاضی، در نظر گرفتن تمام جنبه‌های این دانش، یعنی توجه به همه‌ی این تعاریف است."}, {"section": "ضرورت و اهمیت آموزش مفاهیم ریاضی به کودکان پیش‌دبستانی", "text": "دوران پیش از دبستان، سال‌های حساس رشد و یادگیری است و از آن‌جا که آموزش در این سال‌ها، آسان‌تر، عمیق‌تر و سریع‌تر صورت می‌گیرد، از اهمیت خاصی برخوردار است. آموزش مفاهیم ریاضی نیز در این سال‌ها، مانند سایر آموزش‌ها، مورد تأکید روان‌شناسان و مربیان تربیتی قرار گرفته است و صاحب‌نظرانی مانند پستالوزی، فروبل و مونتسوری، آن را در برنامه‌های آموزشی خود وارد کرده‌اند. مطالعات پیاژه، روان‌شناس معاصر نیز، نقش آموزش ریاضی را در رشد شناختی کودکان، با روش‌های تجربی، نشان داده است. آموزش مفاهیم ریاضی، نه تنها به رشد ذهنی کودکان، در سال‌های اول کودکی کمک می‌کند، بلکه براساس بررسی‌های انجام شده، در دوران بزرگ‌سالی نیز تأثیرگذار است و کودکان را برای آموزش ریاضی در دوران ابتدایی و سال‌های بالاتر، آماده می‌سازد. همان‌گونه که در تعریف ریاضی گفته شد، آموزش ریاضی، در زندگی روزانه برای کودکان نیز مورد استفاده قرار می‌گیرد. مانند تشخیص و جابه‌جایی اسباب‌بازی‌ها، میزان خوراکی‌ها، شمردن پول و ... آموزش مفاهیم ریاضی به کودکان، سبب پرورش برخی از ویژگی‌های اساسی، از جمله نظم فکری، دقت و تمرکز، تجزیه و تحلیل، استدلال و ... در آنان می‌شود. ادوارد دوبونو، روان‌شناس و پژوهشگر معاصر در زمینه‌ی خلاقیت، در کتاب خود به نام «مکانیسم ذهن» ارتباط بین خلاقیت و مغز انسان و نقش ریاضی را در این زمینه توضیح می‌دهد. به نظر او تفکر خلاق، نوعی مبادله‌ی اطلاعات است که در کنار سایر روش‌های مبادله‌ی اطلاعات، از ریاضی نیز، در حد زیادی استفاده می‌شود. آموزش مفاهیم ریاضی به کودکان، علاوه بر تأثیرات فردی که به مهم‌ترین آن‌ها اشاره شد، از نظر اجتماعی نیز، نقش مؤثری دارد. با توجه به این که دانش ریاضی، در بیش‌ترین رشته‌های علوم، کاربرد دارد، می‌توان گفت که در توسعه‌ی علمی و صنعتی جامعه، تأثیرگذار است. با توجه به نقش مؤثر ریاضی در رشد فردی و توسعه‌ی اجتماعی، ضرورت آموزش آن، در مراکز پیش از دبستان، باید مورد توجه قرار گیرد."}, {"section": "انواع دانش و جایگاه ریاضی در آن", "text": "پیاژه، انواع دانش را در چهار گروه به شرح زیر تقسیم نموده و جایگاه ریاضی را در آن، مشخص کرده است: ۱ـ دانش حسی - حرکتی: این دانش، بدون آموزش، به صورت بازتاب‌ها در انسان و غرایز در سایر موجودات، حاصل می‌شود. مانند عمل مکیدن، تنفس، کارکرد حواس و ... در انسان و مهاجرت، لانه‌سازی و ... در پرندگان. ۲ـ دانش فیزیکی: این دانش، به صورت مستقیم و از راه حواس، دریافت می‌شود و از این طریق، ما بسیاری از اطلاعات"}, {"section": "انواع دانش و جایگاه ریاضی در آن", "text": "و تجربیات را به دست می‌آوریم. فراهم کردن محیط غنی و محرک برای کودکان، این دانش را در آنان افزایش می‌دهد. به ویژه اگر با تشویق کودکان به کشف، تجربه و جست‌وجوگری همراه باشد."}, {"section": "انواع دانش و جایگاه ریاضی در آن", "text": "دانش فیزیکی شامل شناخت خصوصیات اشیا، مانند رنگ، شکل، اندازه، جنس، وزن و ... است. یادگیری این ویژگی‌ها، پیش‌نیاز آموزش مفاهیم ریاضی است."}, {"section": "انواع دانش و جایگاه ریاضی در آن", "text": "۳ـ دانش اجتماعی: این دانش شامل موارد زیر است: • آشنایی با آداب و رسوم اجتماعی، مانند سلام کردن، خداحافظی کردن و ... • آشنایی با محیط اجتماعی، مانند مشاغل، ساختمان‌ها، مراکز آموزشی، محیط زیست و ... • آشنایی با مناسبت‌ها و سنت‌های اجتماعی، مانند روزهای ملی، مذهبی، زبان و ... • آشنایی با جنبه‌های رشد اجتماعی کودکان، مانند دوستی، مشارکت، همکاری، ارتباط با هم‌سالان، بزرگ‌سالان، کمک، همدلی و ..."}, {"section": "انواع دانش و جایگاه ریاضی در آن", "text": "۴ـ دانش منطقی ـ ریاضی: این دانش شامل آموزش مفاهیم ریاضی، مانند طبقه‌بندی، ترتیب، درک مفهوم اعداد و ... است. یادگیری این مفاهیم، از راه بیان شفاهی، حاصل نمی‌شود بلکه با ایجاد محیط و فضای مناسب و با استفاده از حواس، وسایل ملموس و تشویق کودکان به کشف، تجربه و پرسش و پاسخ به دست می‌آید."}, {"section": "انواع دانش و جایگاه ریاضی در آن", "text": "با توجه به انواع دانش، ریاضی شامل دانش فیزیکی و منطقی ـ ریاضی است."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "پیاژه، رشد شناختی کودکان را به چهار دوره تقسیم‌بندی می‌کند. هر دوره، دارای مراحلی است که در زیرمجموعه‌ی آن قرار دارد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "شما با این تقسیم‌بندی، در درس بهداشت روانی، آشنا شده‌اید. در اینجا به اختصار، چگونگی شکل‌گیری مفاهیم ریاضی، در دو دوره از رشد شناختی که هم‌زمان با سال‌های پیش از دبستان است، آورده می‌شود."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۱ـ دوره‌ی حسی ـ حرکتی از تولد تا دوسالگی: در این سال‌ها، ادراک و شناخت کودک از محیط پیرامون خود، به کمک بازتاب‌ها و حواس صورت می‌گیرد. تفکر او در سال اول حسی ـ حرکتی و پیش‌کلامی است، یعنی به سبب این که از نظر رشد تکلم، هنوز پیشرفت زیادی نکرده است، از کلمات به عنوان نشانه‌ها نمی‌تواند استفاده کند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "در پایان این دوره، کودک می‌تواند به جداسازی خود از دیگران و اشیا دست یابد و با توجه به رشد زبان، کلمات را به‌صورت نمادها، به کاربرد مفهوم «پایداری شئ» را درک می‌کند، به این معنا که درمی‌یابد اشیا وجود دارند حتی اگر در معرض دید او نباشند. بنابراین، اگر یک اسباب‌بازی را به کودک نشان دهید و بعد آن را پنهان کنید، او برای پیدا کردن آن، به جست‌وجو می‌پردازد. این توانایی به او در شناخت و تشخیص اشیا کمک می‌کند. در این دوره، کودک خود را مرکز جهان می‌پندارد و همه‌چیز را در رابطه با آن می‌سنجد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۲ـ دوره‌ی پیش عملیاتی از دو تا هفت‌سالگی: این دوره، به دو مرحله تقسیم می‌شود: • مرحله‌ی تفکر پیش مفهومی از دو تا چهار سالگی: در این مرحله، توانایی تجسّم در کودک شکل می‌گیرد و می‌تواند اشیا را در نبود آن‌ها، به یاد آورد و بشناسد. تکلم او به سرعت رشد می‌کند و با استفاده از کلمات و کاربرد نمادها در مورد اشیا و افرادی که حضور ندارند، گفت‌وگو می‌کند. بازی‌های نمادین و تخیلی شکل می‌گیرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "در این مرحله، «تصویرسازی ذهنی» یا به گفته‌ی پیاژه «کارکرد نمادی»، از طریق بازی، تقلید، رشد کلامی و شناختی کودک،"}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "گسترش می‌یابد. اشیا را براساس یک ویژگی محسوس، طبقه‌بندی می‌کند (مانند رنگ). خودمحوری او کاهش می‌یابد و تدریجاً با دیگران ارتباط برقرار می‌سازد. در پایان این مرحله، آموزش مفاهیم، ریاضی به کودکان، به صورت هدفمند، آغاز می‌شود."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "ـ مرحله‌ی تفکر شهودی از چهار تا هفت‌سالگی: تفکر شهودی یا مکاشفه‌ای در حدود چهارسالگی آغاز می‌شود و به دلیل رشد زبان، حافظه، کاربرد نمادها و تصویرسازی ذهنی، شناخت او گسترش می‌یابد. توانایی استدلال در این سال‌ها، آغاز می‌شود. رشد ترسیمی او در این دوره به مرحله‌ی تصویرگری می‌رسد و از این توانایی می‌توان در آموزش مفاهیم ریاضی، به صورت تصویری، توسط خود کودک، استفاده کرد. رابطه‌ی بین کل و جزء را درک می‌کند. روابط کیفی ریاضی، مانند طبقه‌بندی براساس چند ویژگی و ترتیب به صورت‌های متفاوت را می‌فهمد. در این مرحله، کودکان هنوز به ادراکات حسی خود وابسته‌اند و استدلال آنان، براساس مشاهداتشان صورت می‌گیرد. به نظر پیاژه، مفهوم «برگشت‌پذیری» و «ابقا» را در دوران دبستان درک می‌کنند. در حالی که آزمایش‌های انجام شده با کودکان ۶ـ۵ ساله (آمادگی) نشان می‌دهد که این مفاهیم برای این کودکان نیز قابل درک است."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تأکید بر نظرات پیاژه، به این سبب است که او با کاربرد روش‌های تجربی به‌صورت مستقیم در مورد کودکان، به نتایج خود دست یافته است اما اینک با گذشت چند دهه از این پژوهش‌ها، با توجه به تغییراتی که در رشد و تکامل کودکان به جهت برخورداری از امکانات و شرایط مناسب صورت گرفته، برخی از این نتایج نیز، تغییر کرده است. این‌گونه تغییرات نه‌تنها در رشد شناختی، که در سایر جنبه‌های رشد، از جمله رشد جسمی حرکتی، عاطفی ـ روانی و اجتماعی ـ اخلاقی نیز صورت گرفته است."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "در حال حاضر، توانمندی‌های کودکان در همه‌ی جنبه‌های رشد، فراتر از حدی است که در جداول رشد و تقسیم‌بندی‌های رشد شناختی و سایر جنبه‌های رشد و تکامل کودکان، مشخص شده است و این نکته‌ای است که در آموزش مفاهیم ریاضی به کودکان و سایر آموزش‌ها باید مورد توجه قرار گیرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "### نکاتی که والدین و مربیان باید بدانند در آموزش مفاهیم ریاضی به کودکان به نکات زیر باید توجه کرد: ۱ـ توجه به رشد شناختی کودکان: آموزش مفاهیم ریاضی به کودکان باید از ساده به مشکل و با توجه به مراحل رشد آنان، به‌ویژه رشد شناختی، صورت گیرد. مربیان باید آشنایی با این مراحل، آموزش مفاهیم ریاضی را به کودکان، در سنین مختلف، برنامه‌ریزی کنند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "معمولاً برای کودکان زیر ۳ سال، آموزش برخی از مفاهیم ریاضی، در قالب بازی‌های ساده، به صورت غیرمستقیم و به‌منظور آشنایی اولیه با آن‌ها صورت می‌گیرد. از چهارسالگی آموزش مفاهیم ریاضی، به صورت برنامه‌ریزی شده، آغاز می‌شود."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۲ـ توجه به علایق کودکان: در آموزش مفاهیم ریاضی به کودکان، مانند سایر آموزش‌ها، باید علایق آنان را در نظر گرفت. استفاده از بازی‌ها و روش‌های جذاب، این امر را امکان‌پذیر می‌سازد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۳ـ ایجاد انگیزه در کودکان برای یادگیری: انگیزه، حالتی درونی است که انسان را به انجام فعالیتی جذب و یا منع می‌کند. انگیزه، محرک قوی برای کودکان، در امر یادگیری است. می‌دانیم که کودکان به صورت طبیعی به یادگیری، اشتیاق و علاقه نشان می‌دهند، به شرطی که روش آن مناسب باشد. بنابراین، می‌توان با کاربرد روش‌های مناسب، انگیزه‌ی یادگیری را در کودکان، تقویت کرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۴ـ توجه به درک مفاهیم ریاضی: مفاهیم ریاضی، به کمک حافظه و با توضیحات شفاهی و حتی تصویری، آموخته نمی‌شوند، بلکه از راه تجربه و عمل، کشف می‌شوند. به عنوان مثال، برای درک مفهوم طبقه‌بندی، کودک باید، با استفاده از"}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "________________________________________________________________________________ ۱ـ مفهوم «برگشت‌پذیری» بعداً توضیح داده می‌شود. ۲ـ مفهوم «ابقا» بعداً توضیح داده می‌شود."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "اشیاء گوناگون، به طبقه‌بندی آن‌ها براساس یک یا چند ویژگی - مثلاً رنگ یا شکل - بپردازد. ۵ـ توجه به پیوستگی فرایند یادگیری: آموزش مفاهیم ریاضی باید از ساده به مشکل صورت گیرد، زیرا این مفاهیم با یکدیگر، ارتباط و پیوستگی دارند، به‌گونه‌ای که یک مطلب جدید، به کمک مطلب قبلی، آموخته می‌شود. مثلاً تا کودک طبقه‌بندی را یاد نگیرد، ردیف کردن را نمی‌تواند به درستی اجرا کند. ۶ـ توجه به تفاوت‌های فردی: در آموزش مفاهیم ریاضی، مانند سایر آموزش‌ها، کودکان با یکدیگر تفاوت دارند. برخی زودتر و بعضی دیرتر این مفاهیم را یاد می‌گیرند. ۷ـ تمرین و تکرار: برای آموزش مفاهیم ریاضی، کودکان باید آن‌ها را درک کنند اما برای تثبیت آن‌ها، تمرین و تکرار، ضروری است. به عنوان مثال، کودکان مفهوم طبقه‌بندی براساس رنگ را با تعدادی مهره‌های رنگی، درک می‌کنند اما برای تثبیت این مفهوم و طبقه‌بندی براساس سایر ویژگی‌ها، باید بارها آن را تکرار و تمرین کنند. تکرار فعالیت‌ها باید با تنوع آن‌ها همراه باشد تا در کودکان خستگی ایجاد نکند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "روش آموزش مفاهیم ریاضی برای آموزش مفاهیم ریاضی به کودکان پیش‌دبستانی، از روش‌های زیر می‌توان استفاده کرد. ۱ـ روش مکاشفه‌ای: مکاشفه یعنی شناخت یک پدیده از طریق حواس و بدون نیاز به استدلال. سرچشمه‌ی همه‌ی معلومات ما، داده‌هایی است که از راه حواس و به کمک مکاشفه به دست می‌آوریم. با توجه به این روش، می‌توان با ایجاد محیط مناسب و ارائه‌ی محرک‌های متنوع، حواس کودک را تحریک کرد و به او، در درک مفاهیم ریاضی، یاری رساند. ۲ـ روش فعال: منظور از روش فعال، این است که کودک با انجام یک فعالیت عملی، به درک یک مفهوم ریاضی، دست یابد. در روش فعال، کودک به تجربه و دست‌ورزی می‌پردازد. این روش، از آن جهت اهمیت دارد که در مورد کودکان، بدون فعالیت و عمل، تفکری ایجاد نمی‌شود. در واقع عمل، ابزار تفکر است. ۳ـ بازی: بازی با توجه به جذابیت آن برای کودکان، روش مناسبی برای آموزش آنان در همه‌ی زمینه‌ها، از جمله در مورد مفاهیم ریاضی است. همه‌ی مفاهیم ریاضی را می‌توان با طراحی بازی‌های مناسب، به کودکان آموزش داد. در آموزش مفاهیم ریاضی به کودکان، همان‌گونه که در روش‌های بالا توضیح داده شد، کودکان باید ابتدا، به صورت ملموس، عینی و با استفاده از اشیا و انجام تجربه، مفاهیم موردنظر را درک کنند. بعد از این مرحله می‌توان، از تصاویر مناسب، نقاشی و کاردستی نیز استفاده کرد. نکته‌ی مهم دیگری، که در آموزش مفاهیم ریاضی به آن باید توجه کرد، این است که این آموزش‌ها لزوماً نباید در ساعات خاصی اجرا شود، بلکه در قالب فعالیت‌های دیگر نیز مانند قصه‌گویی، نمایش، شعر، موسیقی، ورزش و ... می‌توان این مفاهیم را به کودکان آموزش داد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "مفاهیم ریاضی در پیش از دبستان مفاهیم ریاضی که در سال‌های پیش از دبستان به کودکان آموزش داده می‌شود، شامل دو بخش است: الف ـ مفاهیم مربوط به دانش فیزیکی"}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "ب ـ مفاهیم مربوط به دانش منطقی ـ ریاضی الف ـ مفاهیم مربوط به دانش فیزیکی: دانش فیزیکی، همان‌گونه که قبلاً گفته شد، شامل خصوصیات ظاهری اشیاست، که از طریق حواس دریافت می‌شود. این دانش، مقدم بر دانش منطقی ـ ریاضی است و به عنوان پیش‌نیاز آموزش مفاهیم ریاضی، در نظر گرفته می‌شود."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "مفاهیم مربوط به دانش فیزیکی، شامل موارد زیر است: ۱ـ مفاهیم مربوط به اندازه: درک مفهوم اندازه در کودکان پیش‌دبستانی با روش کمّی صورت نمی‌گیرد بلکه از طریق تشخیص، تخمین و مقایسه اجرا می‌شود. مفهوم اندازه شامل موارد زیر است: • بزرگ، بزرگ‌تر، بزرگ‌ترین، همانند • کوچک، کوچک‌تر، کوچک‌ترین، همانند • بلند، بلندتر، بلندترین، همانند • کوتاه، کوتاه‌تر، کوتاه‌ترین، همانند • سنگین، سنگین‌تر، سنگین‌ترین، همانند • سبک، سبک‌تر، سبک‌ترین، همانند • پهن، پهن‌تر، پهن‌ترین، همانند • باریک، باریک‌تر، باریک‌ترین، همانند • بیش، بیشتر، بیشترین، همانند • کم، کمتر، کم‌ترین، همانند"}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "درک مفاهیم اصلی مربوط به اندازه، مانند بزرگ، کوچک و ... ساده‌تر از درک مفاهیم نسبی، مانند بزرگ‌تر، بزرگ‌ترین و هم‌اندازه است. بنابراین، ابتدا مفاهیم ساده‌تر و سپس مفاهیم دشوارتر، آموزش داده می‌شود. مفاهیم ساده‌تر برای کودکان ۴ـ۳ سال و مفاهیم مشکل‌تر، برای کودکان بالاتر از ۴ سال در نظر گرفته می‌شود. برای آموزش این مفاهیم از فعالیت‌های عملی، بازی و نمایش و... می‌توان استفاده کرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ تعدادی توپ‌های رنگی در اندازه‌های مختلف به کودک داده می‌شود و او ضمن بازی با توپ‌ها، مشاهده و لمس آن‌ها، تشخیص می‌دهد کدام بزرگ و کدام کوچک است. این بازی برای کودکان ۴ـ۳ سال مناسب است."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۲ تعدادی از اشیای مختلف، مانند توپ پلاستیکی، لیوان، بشقاب، کتاب و ... به کودک داده می‌شود و او با دست زدن به اشیا، بلند کردن آن‌ها و مقایسه‌ی آن‌ها با یک‌دیگر، تشخیص می‌دهد کدام یک از آن‌ها از همه سبک‌تر است. این فعالیت برای کودکان ۶-۵ سال مناسب است."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین برای هریک از مفاهیم مربوط به اندازه، یک فعالیت را طراحی کنید و در صورت امکان در مورد کودکان، اجرا نمایید و نتیجه را در کلاس ارائه دهید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۲- مفاهیم مکانی (فضایی): درک مکان و فضا، یعنی آگاهی کودک از محیط پیرامون خود و موقعیت اشیا در آن، در ارتباط با جسم خود. در واقع کودکان برای تشخیص مکان اشیا از بدن خود، به عنوان نقطه‌ی مرجع، استفاده می‌کنند و به کمک مشاهده، تجربه و دست‌ورزی به درک این مفاهیم دست می‌یابند. مفاهیم مکانی شامل موارد زیر است: • بالا، بالاتر، بالاترین، همانند • پایین، پایین‌تر، پایین‌ترین، همانند • داخل، خارج • زیر، زیرتر، زیرترین، همانند • رو، روتر، روترین، همانند • دور، دورتر، دورترین، همانند • نزدیک، نزدیک‌تر، نزدیک‌ترین، همانند • اول، وسط، آخر • جلو، جلوتر، جلوترین، همانند • عقب، عقب‌تر، عقب‌ترین، همانند • چپ، راست • در مورد مفاهیم مکانی نیز، مفاهیم اصلی مانند بالا، پایین و ... ساده‌تر از مفاهیم نسبی مانند بالاتر، پایین‌ترین و ... است. برای آموزش این مفاهیم، از فعالیت‌های عملی، بازی، تجربه و ... می‌توان استفاده کرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ ورزش با موسیقی: ورزش برای درک مفاهیم فضایی، از فعالیت‌های مناسب است. کودکان دایره‌وار می‌ایستند و همراه با آهنگ، دست‌ها را بالا، پایین، به چپ، به راست می‌برند و با اجرای این حرکات، به درک این مفاهیم، دست می‌یابند. به‌نظر پیاژه، حرکت سبب درک مفاهیم فضایی می‌شود."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۲ نقاشی: از کودکان می‌خواهیم تصویر یک خانه را بکشند. در جلوی آن چند گل و در عقب آن، چند درخت نقاشی کنند. بالای درخت، یک پرنده و در زیر آن یک آدم بکشند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین هنرجویان به چند گروه تقسیم می‌شوند. هر گروه، برای یکی از مفاهیم مکانی، فعالیتی را طراحی و در کلاس ارائه می‌دهد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۳ـ مفاهیم زمانی: کودکان پیش‌دبستانی، درک محدودی از زمان دارند زیرا زمان یک مفهوم انتزاعی است. در حدود سه سالگی، کودکان زمان را در ارتباط با فعالیت‌های روزانه‌ی خود، مانند غذا خوردن، خوابیدن، بازی کردن و ... درک می‌کنند و در این ارتباط معنی کلماتی مانند صبح و شب را تا حدی می‌فهمند. درک مفاهیمی مانند امروز، دیروز و فردا برای آنان دشوار است. اما از رویدادهایی که در یک روز اتفاق افتاده است، آگاهی دارند. در حدود شش سالگی، ساعت را می‌شناسند، اما قادر به درک آن نیستند. روزهای هفته، ماه و فصل را در قالب شعر و تصویر یاد می‌گیرند، اما درک درستی از آن‌ها ندارند. به‌طور کلی، درک مفهوم زمان، برای کودکان پیش‌دبستانی دشوار است اما می‌توانند گذشت زمان را احساس کنند. مفاهیم زمانی شامل موارد زیر است: • مفهوم شب، روز، صبح، عصر، ظهر • روزهای هفته، ماه، فصل، سال • امروز، فردا، دیروز • دیر، زود • تند، آهسته • کودک، جوان، پیر معمولاً مفاهیم زمانی را با استفاده از نشانه‌های ملموس و فعالیت‌های روزانه آموزش می‌دهیم. از شعر، بازی، داستان و نمایش هم می‌توان استفاده کرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ آشنایی با مفهوم روز و هفته برای کودکان ۶-۵ سال: به هر کودک، یک صفحه مقوا، به اندازه‌ی A4 داده می‌شود. آن را به شکل دایره یا بیضی و یا مربع درمی‌آورد. به کمک مربی آن را به هفت قسمت مساوی برای هر روز هفته، تقسیم می‌کند. هر قسمت را با هر رنگی که دوست دارد، رنگ‌آمیزی می‌کند. روی هر قسمت، یکی از فعالیت‌هایی را که آن روز در مهدکودک صورت می‌گیرد، نقاشی می‌کند (مثلاً ورزش، بازی، نقاشی و ...). یک عقربه برای آن می‌گذارد و هر روز صبح، عقربه را روی روز مربوط قرار می‌دهد. به این ترتیب کودک با حرکت عقربه و با توجه به رنگ هر روز و فعالیتی که در آن روز اجرا می‌کند، درکی از مفهوم روز و هفته به‌دست می‌آورد. مربی یک تقویم برای کلاس تهیه می‌کند و هر کودک نیز یک تقویم برای خود درست می‌کند، به خانه می‌برد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۲ استفاده از ساعت شنی: برای این که کودکان از مفهوم زمان، احساس و درکی داشته باشند، می‌توان یک ساعت شنی را که مدت یک دقیقه خالی شدن آن طول می‌کشد، به کودکان نشان داد و از آنان خواست هرکدام به یک فعالیت مانند رنگ کردن، بریدن کاغذ، خوردن میوه و ... مشغول شوند و ببینند در یک دقیقه، چه قدر از این کارها را می‌توانند اجرا کنند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین برای هریک از مفاهیم زمانی، یک فعالیت طراحی کنید و آن را در مورد کودکان اجرا نمایید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "ب - مفاهیم مربوط به دانش منطقی - ریاضی: مفاهیم مربوط به دانش منطقی - ریاضی شامل مفاهیم زیر است: ۱- طبقه‌بندی: منظور از طبقه‌بندی، گروه‌بندی اشیا براساس یک خصوصیت مشترک است. مانند طبقه‌بندی براساس رنگ، شکل، اندازه و ..."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "طبقه‌بندی یک فعالیت ذهنی اساسی است که در زندگی روزانه مورد استفاده قرار می‌گیرد. کودکان از زمانی که اشیا را می‌شناسند، به نوعی به طبقه‌بندی آن‌ها می‌پردازند. مثلاً، عروسک‌ها را در یک سبد و لگوها را در سبد دیگر قرار می‌دهند. اما به صورت هدفمند و برنامه‌ریزی شده، می‌توانیم آن را به کودکان (از چهار سالگی) بیاموزیم. کودکان ابتدا اشیا را براساس یک ویژگی (مثلاً رنگ) و سپس با توجه به چند ویژگی (مانند رنگ و شکل)، طبقه‌بندی می‌کنند (طبقه‌بندی چندگانه)."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ ساختن آلبوم: کودکان می‌توانند از روزنامه‌ها و مجلات، تصاویر مختلفی را شامل حیوانات، گل‌ها، آدم‌ها و ... ببرند و هر گروه تصاویر را در یک صفحه بچسبانند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۲ طبقه‌بندی براساس شکل و رنگ: تعدادی کارت‌های رنگی (سبز، قرمز، زرد) در اشکال مختلف (دایره، سه‌گوش، چهارگوش) به کودکان می‌دهیم و از آنان می‌خواهیم آن‌ها را براساس رنگ و شکل جدا کنند. سپس در مورد فعالیتی که اجرا کرده‌اند، با آن‌ها گفت‌وگو می‌کنیم: به چه کاری اقدام کرده‌اید؟ چرا همه‌ی دایره‌های زرد را جدا کردید؟ چرا سه‌گوش‌های قرمز را در کنار مربع‌های قرمز قرار ندادید؟ با طرح این سؤالات، کودکان می‌توانند با توضیح فعالیت‌های خود، به درک و کشف مفاهیم آن پی ببرند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "فعالیت‌هایی را برای طبقه‌بندی طراحی کنید و در کلاس ارائه دهید (طبقه‌بندی اشیا براساس جنس آن‌ها، براساس اندازه آن‌ها و سایر خصوصیات)."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۲ـ ترتیب (ردیف سازی): ترتیب، یعنی طبقه‌بندی منظم و یا کشف یک نظم در یک مجموعه. ترتیب نیز مانند طبقه‌بندی، یکی از فعالیت‌های اساسی ذهن، در آموزش مفاهیم ریاضی از جمله یادگیری مفهوم اعداد است."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ ساختن ردیف از روی الگو: تعدادی کارت رنگی در اشکال گوناگون به کودکان می‌دهیم. ابتدا یک ردیف از کارت‌های رنگی را برای آنان درست می‌کنیم سپس از آن‌ها می‌خواهیم این ردیف را ادامه دهند و ردیف‌های دیگری نیز بسازند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "در پایان، با کودکان در مورد فعالیتی که انجام داده‌اند گفت و گو می‌کنیم تا مفهوم ردیف‌سازی را بهتر درک کنند: بعد از سه‌گوش، چه شکلی قرار می‌گیرد؟ چرا بعد از دایره، چهارگوش را گذاشته است؟ و ... این فعالیت را می‌توان با حبوبات (نخود ـ لوبیا ـ عدس) و ژتون‌های رنگی نیز انجام داد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۲ مرتب کردن تصاویر مربوط به رشد یک گیاه (گل): چند تصویر، در ارتباط با رشد یک گیاه به کودک می‌دهیم (تصویر دانه در خاک، ریشه زدن، جوانه زدن، رویش برگ‌ها، روییدن گل) و از او می‌خواهیم تصاویر را با توجه به ترتیب زمانی آن‌ها، مرتب کند. پس از انجام فعالیت، با او گفت‌وگو می‌کنیم: چرا تصویر مربوط به ریشه، بعد از تصویر دانه در خاک، قرار دارد؟ چرا تصویر گل، در آخر قرار دارد؟ ..."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "این فعالیت را می‌توان با داستان‌های تصویری نیز اجرا کرد. ترتیب، برای درک مفهوم عدد، یک فعالیت اساسی است. برای این که کودک بتواند ردیف‌سازی کند باید مفهوم «برگشت‌پذیری» را درک کند. «برگشت‌پذیری» یعنی توانایی مرتب کردن اشیا از دو جهت، مثلاً از بزرگ به کوچک و از کوچک به بزرگ. برای ایجاد توانایی «برگشت‌پذیری» در کودکان، باید به تمرین‌های متعدد و متنوعی (در ارتباط با ترتیب، از دو جهت) بپردازند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین یک داستان تصویری تهیه کنید و آن را در مورد کودکان اجرا نمایید. برای مفهوم «برگشت‌پذیری» فعالیت‌هایی را طراحی کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۳ـ مقابله یک به یک: مقابله یک به یک یا تناظر یک به یک، یعنی مقایسه‌ی اعضای دو مجموعه با یک‌دیگر و قرار دادن آن‌ها در کنار هم، با توجه به ارتباطی که بین آن‌ها وجود دارد. به عنوان مثال اگر تعدادی لیوان و بشقاب پلاستیکی رنگی به کودک بدهیم او باید بتواند، با توجه به رابطه‌ای که بین لیوان و بشقاب وجود دارد، هر لیوان را داخل بشقاب هم‌رنگ خود قرار دهد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ به هر کودک ۵ برگ و ۵ گل می‌دهیم. از کودکان می‌خواهیم ابتدا برگ‌ها را در یک طرف و گل‌ها را در طرف دیگر قرار دهند. آن‌گاه هر گل را روی یک برگ بگذارند. سپس با آن‌ها گفت‌وگو می‌کنیم: چندتا برگ دارید؟ چند تا گل دارید؟ چرا هر گل را روی یک برگ قرار دادید؟ ... این فعالیت را می‌توان با کارت‌ها و مهره‌های رنگی نیز اجرا کرد."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "Illustration of five green leaves arranged in a horizontal row above five pink flowers, also arranged in a horizontal row."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۲ وصل کردن تصاویر مربوط به هم: دو دایره می‌کشیم. داخل یک دایره ۶ گل و داخل دایره‌ی دیگر ۶ گلدان کوچک می‌کشیم. به این ترتیب دو مجموعه داریم که اعضای آن با هم ارتباط دارند. تصویر را به کودکان می‌دهیم و از آنان می‌خواهیم هر گل را به گلدان هم‌رنگ خود وصل کند. پس از انجام فعالیت با کودکان گفت‌وگو می‌کنیم: چند تا گل دارید؟ چندتا گلدان دارید؟ چرا دو گل را به یک گلدان وصل نکردید؟ و ... این فعالیت را کودکان می‌توانند با نقاشی خودشان نیز اجرا کنند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین با کارت‌های رنگی (اشکال سه‌گوش، دایره، چهارگوش) یک فعالیت برای مقابله‌ی یک به یک، طراحی کنید. با مهره‌های رنگی، در شکل‌ها و اندازه‌های مختلف، یک فعالیت برای مقابله‌ی یک به یک طراحی کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۴ـ مجموعه‌ها: مجموعه، یعنی تعدادی از اشیا یا پدیده‌ها که حداقل در یک خصوصیت باهم مشترک‌اند. به هریک از اشیا یا پدیده‌هایی که یک مجموعه را تشکیل می‌دهند، اعضای مجموعه یا زیرمجموعه می‌گویند. به عنوان مثال، پرندگان، یک مجموعه هستند، همین‌طور گل‌ها و یا اشکال هندسی که از نظر شکل یا رنگ، مانند هم‌اند، یک مجموعه می‌دهند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ تعدادی مهره‌های رنگی (سبز، قرمز، زرد) در اشکال مختلف (دایره، سه‌گوش، چهارگوش) به کودکان می‌دهیم. ۳ بشقاب پلاستیکی به شکل دایره، سه‌گوش و چهارگوش در اختیار کودکان قرار می‌دهیم و از آنان می‌خواهیم مهره‌های هر شکل را در داخل بشقاب‌های هم‌شکل خود قرار دهند. پس از انجام فعالیت با آنان گفت‌وگو می‌کنیم: آیا همه‌ی مهره‌ها یک شکل‌اند؟ آیا همه‌ی بشقاب‌ها یک شکل دارند؟ آیا برای هر مهره، بشقاب هم شکل خود هست؟ آیا برای هر مهره، بشقاب هم رنگ خود هست؟ و ..."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۲ تعدادی کارت‌های تصویری مربوط به حیوانات، گل‌ها، میوه‌ها و ... به کودکان می‌دهیم. به هر کودک چند نخ کاموا به طول ۶۰ سانتی‌متر می‌دهیم از کودکان می‌خواهیم نخ‌های کاموا را به هر شکل که می‌خواهند (دایره، بیضی و ...) در مقابل خود قرار دهند و تصاویر مربوط به هم را در داخل آن بگذارند. گل‌ها در یک دایره، حیوانات در یک مجموعه، میوه‌ها در یک مجموعه و ... به این ترتیب چندین مجموعه درست می‌شود. سپس با کودکان به گفت‌وگو می‌نشینیم. چند تا تصویر حیوان در دایره دارید؟ چند تا تصویر میوه؟ چند تا تصویر گل؟ آیا تعداد تصاویر هر مجموعه با هم برابرند؟ چرا گل‌ها را در داخل دایره میوه‌ها قرار ندادید؟ و ..."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تصویر سه دایره که در هر کدام دسته‌ای از تصاویر شامل گل‌ها، حیوانات و میوه‌ها قرار دارد"}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین با توجه به مفهوم مجموعه‌ها، فعالیت عملی و تصویری برای کودکان طراحی کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۵_ درک شباهت‌ها: کودکان، با مشاهده و مقایسه، شباهت بین اشیا و پدیده‌ها را تشخیص می‌دهند. به عنوان مثال اگر به کودکان مقداری لوبیا در رنگ‌های مختلف (سفید، قرمز) بدهیم، می‌توانند لوبیاهای شبیه به هم را از نظر رنگ تشخیص دهند و جدا سازند."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "● فعالیت ۱ تعدادی دکمه در اندازه‌ها، شکل‌ها و رنگ‌های مختلف به کودکان می‌دهیم و از آنان می‌خواهیم دکمه‌هایی را که مانند هم هستند، پیدا کنند و در کنار هم قرار دهند. پس از فعالیت با آنان گفت‌وگو می‌کنیم: چند رنگ دکمه دارید؟ آیا همه‌ی دکمه‌ها یک اندازه‌اند؟ آیا همه‌ی دکمه‌ها یک شکل‌اند؟ دکمه‌هایی را که انتخاب کرده‌اید مثل هم‌اند؟ و ..."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "• فعالیت ۲ تصویرهای مشابه: ده تصویر گل به کودک می‌دهیم. بعضی از گل‌ها، مانند هم و برخی با هم متفاوت‌اند. از کودک می‌خواهیم گل‌های مانند هم را پیدا کند و در کنار هم قرار دهد. پس از انجام فعالیت با او گفت‌وگو می‌کنیم: آیا همه گل‌ها مثل هم هستند؟ گل‌ها، چه شباهت‌هایی باهم دارند؟ و ..."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "تمرین برای درک شباهت‌ها، یک فعالیت تصویری و یک فعالیت عملی برای کودکان طراحی کنید."}, {"section": "چگونگی شکل‌گیری مفاهیم ریاضی در کودکان بر اساس نظریات پیاژه", "text": "۶ـ درک تفاوت‌ها: کودکان، تفاوت بین اشیا و پدیده‌ها را، مانند شباهت‌های آن‌ها، با مشاهده و مقایسه، تشخیص می‌د
